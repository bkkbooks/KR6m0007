body:
  text: 中論疏記卷第八之末大安寺沙門安澄撰疏第十卷觀涅槃品第二十五疏問何以故次四諦品等者約此品由來大文有二初明來由次釋涅槃不同下第二明品因初中有二初明近次四諦品以起次問何故下第二明二十五品復此品由此文初也有二即問與答答中有四初明大小二乘所説不同次又此滅下第二明大般涅槃是究竟果諸聖之所歸為萬法之統本次又由下第三明受教生解斷惑證理次又成論者下第四明即世所以所説如文言所以大小乘等者案聰法師成論意初卷云生滅流動是為三聚法體有此為故詺之有為三無為無此為故名無為勝鬘經言三諦入有為唯一滅諦是無為也大乘所明準之可悉言又成論者云等者案聰章初卷云第一大意者佛説四諦理是法輪之始化聲聞法凡有二意一通引要門二入空勝詮此有近遠遠者為除三惑先調其心近者令四諦平等入第一義空也言四諦平等者即有兩義一捉苦諦入空謂以無常等柝法作不有不無觀則入第一義空一時平等二者相待入空謂苦滅苦既不實滅則為如此相待觀門入第一義空準之可悉言大品盛有此説等者案彼經第三十八卷末佛告須菩提言是四諦平等故我説即是涅槃準之可悉疏問何故等者此下第二明遠二十五品此品來由文中有二即間與答答中有四如文言故肇公云等者案涅槃無名論第一開宗末云恬乎而夷怕焉而泰九流於是乎交歸衆聖於此乎冥會今略引之述義解云次彰所得怡乎夷謂大智等者行功德皆成就故怕焉而泰謂大悲等化他功德悉備足説尚書注恬安也方言恬靜也怕焉猶宴寂義九道衆生並歸趣之三乘聖人皆會向之無一衆生不成佛者當知一切皆趣如大經云一切衆生乃至須陀洹等皆悉歸於大般涅槃準之可悉言故法華云等者案彼經第三卷藥草喻品長行合喻中合同異處明佛能知文今略引之為證涅槃引歸終於空文者疏主解云或名畢竟空或名大般涅槃或名諸佛道然此品末破四句是涅槃畢結云涅槃絶四句起百非不知何以目之強名為空準之可悉言二者論佛等者案碩疏云外人謂諸佛菩薩出世大意本為令衆生捨生死得涅槃則應有生死可捨有涅槃可得以理惟不應都空也言三者外謂等者案碩疏云然言汝上來如此破者衆生既苦生死可捨涅槃果可得驗知諸法非都空若言不欲令衆生脫苦取樂何事劬勞出世作教化物破邪顯正耶復何以用汝為菩薩有大慈悲以此義故知當有涅槃準之可悉疏釋涅槃不同等者此下第二明品目文中有二初明外人計情即為所治次問此品何故下第二問答申論旨歸以遣惑清初中有三初明外道所計次小乘二師下第二明小乘所説執次大乘四種下第三明大乘所立此文初也凡有七家初四百論所列論後三餘論所破言一執涅槃等者案百論下卷破常品末外曰有涅槃法常無煩惱涅槃不異故疏主解云立中三句有涅槃是出世常法言常者明涅槃也無煩惱下釋常義也有煩惱則有生是故無常若無煩惱則無生死是故名常正是成實義也言二計等者論次文云外曰作因故修妬路涅槃為無煩惱作因疏主解云此第二計明涅槃與無煩惱異前觀涅槃然後生解或得於無纍如因中發觀觀生或滅故名作因亦如會真生解及數人因境發智境為無煩惱此是成論本有及地論性淨數人無為皆是有法在生死外故修解斷惑然後得之言三立等者論次文云外曰無煩惱果修妬路此涅槃非是無煩惱亦非無煩惱因是無煩惱果是故非無涅槃疏主解云此第三計亦立涅槃與無煩惱異名由斷惑而得故是無煩惱果此是成實始有義故故實師斷五住惑盡二生死滅然後得大涅槃即地論方便淨義由息妄故然後顯真名無煩惱果上來三家所計此彼家有餘涅槃也言四明等者論次文云外曰有涅槃是若無修妬路若縛可縛方便三事無處是名涅槃疏主解云第四立斷無為涅槃即是立無餘也外云有於身智故名為患若灰身滅智此則無患準之可悉言次檀提婆羅門等者案阿毗曇八犍度論第二卷愛恭敬跋渠云如彼檀提婆羅門身生癰疽如蛇無常實苦實空實無我復以二手摩枚身言此瞿曇不病此泥洹此檀提梵志不識不病況當識見涅槃準之可悉法華疏第四云檀提婆羅門指自腹為涅槃即計欲界苦為涅槃也言次阿羅羅計無想為涅槃等者二十字缺言鬱頭藍弗計非總為涅槃等者疏小乘二師等者此下第二明小乘所執言毗曇計無為涅槃等者案雜心論第一卷界品云善有四種自性相應共起第一義第一義者謂涅槃也又云一法界有為無為於中三種常故無為餘法無常故有為是故為無為其一不為三相所遷名常論又有為法滅善故常故説無上準之可悉疏主解云數人所以説涅槃有者是第三諦故為滅智知故為無為各有相故無為是常故有也言二成實明等者案成實論第八卷四業品第一百七末云又泥洹名非白是故此業應名非白又亦應説非黑非白所以者何泥洹名無法此業為泥洹故名不黑不白聰法師疏解云下第二二事從泥洹名名為不白就中有二一事明泥洹名非白從果名名為不白又亦下第二從泥洹無法不白名無漏為不白不黑準之可悉疏大乘四種等者此下第三明大乘所立文中有二初明諸涅槃次又此四師下第二明三點涅槃初中又二初明所計涅槃次雖有四師下明能計人此文初也疏唯四師不同等者此下第二明能計人言大明二種等者案碩疏云若大乘中計有常住妙有為涅槃但釋者不同若靈味解有體相涅槃有功用涅槃若舊相傳有本有涅槃始有涅槃也若脫地論人解有性淨涅槃方便淨涅槃雖有三解終是一意體相與本有及性淨終故是本有涅槃耳功用與始有方便淨終故是始有涅槃耳準之可悉言成實者明等者案三論略章云但體本有義不同開善云本有於當有故云本有第二解云本來已有衆德用惑障故不得修習第三解云於此無常即有常樂説為本有第四解云本有而非德道理即是常例如二諦天然任有也始有者佛修因始得故名始有大乘玄第三云成論師本有始有其義雖異但是一體也準之可悉言十地師明性淨方便淨等者案大乘玄第三卷涅槃義云性淨涅槃是如來藏本有佛性顯為法身亦名涅槃方便淨涅槃是萬德上無纍稱為滅度故二涅槃各別然窮論亦是正法中道為體也述義解云此二涅槃有通有別就通義言以體涅槃名為性淨以用涅槃為方便淨就別義言即有三解且就本始其體涅槃出於三世非先有染後時顯淨夫涅槃者不從作因而有唯從了因故曰性淨如佛果中修生功德斷結無為本無而今除障始淨曰方便淨廣如肇論述義也言攝大乘論四種等者案梁攝論第十三卷釋學果寂滅勝相第九釋論云菩薩此滅於四種涅槃中是無住處一本來清淨涅槃二無住處涅槃三有餘四無餘菩薩不見生死涅槃異由般若不住生死由慈悲不住涅槃若分別生死則住生死若分別涅槃則住涅槃菩薩得無分別智無所分別故無所住章第五卷涅槃義解云本來性淨通是有垢真如若據相説本來性淨是非擇滅不因擇力自餘是擇滅為體準之可悉言釋無住處二一依三身品等者案梁論第十二卷釋依慧學差別勝相第八云菩薩於無餘涅槃恆起二身無有邊際何況法身以自利利他圓滿故有應身故不墮斷有化身故不墮盡也攝論章第五卷涅槃義云又依梁論及金光明經説法身是無餘應化二身是有餘三身為無住所準此等文今言釋等者釋攝論人師之語也又案第十三卷釋無住涅槃有六相中第六相云論曰六廣大轉由菩薩通達法無我故釋曰人境功能三義皆廣大是菩薩人故人廣大觀法無我故境廣大自度度他又能究竟故功能廣大分別是菩薩繫縛為除此繫縛故修法無我觀法無我是本人無我是末若得法無我心先得人無我雖復先得猶未清淨以根本未除故證法無我後方得清淨法無我境能顯四德故觀此境得離八倒準之可悉疏又此四師同釋涅槃等者此下第二明三點涅槃言謂法身般若解脫者述義解云初法身者顯本法性以成其身又以一切功德法而成身故言般若者此云智慧能鑒照故言解脫者勉絶一切諸繫縛故其有二種謂心解脫與慧解脫就淺深者斷四住惑世諦心淨為心解脫斷除無明真諦慧明為慧解脫就體用者斷五住地性結真心體淨為心解脫斷染汚無知慧解自在為慧解脫就此三點有同異義言同義者此三同體其猶虛空以同體故諸德積聚義為法身諸德離纍義為解脫諸德明淨義為般若言異義者此三異體何者以慧數為般若諸佛於好色身功德以為法身自餘諸德悉為解脫若以解脫數而為解脫者自餘諸德同為法身言生死與涅槃相對等者述義解云翻對煩惱而説般若般若慧明能除惑故對於業因而説解脫解脫無纍斷繫縛故對於苦執以説法身法身清淨離衆苦故而言備於三德者法身斷德應身恩德如實義者三身皆具三德就法身者本來自性無染為斷德本覺解性自體變照為智德性淨慈悲等解利法身為恩德也就應身者斷三煩惱盡為斷德十地行滿成根本智證為智德起如量智解現淨土益諸菩薩為恩德也就化身者示斷煩惱為斷德食消見性成一切智為智德恆行大悲益地前菩薩二乘凡夫為恩德也言二者欲顯如來等者案大經南本第四五兩斷盡四相一品廣説如來身口意三密謂品初佛復告迦葉善男子菩薩摩訶薩分別開示大般涅槃有四相義何等為四一者自生他三者能隨問答四者善解因緣義乃至善男子如來亦爾雖不現於閻浮提界入涅槃中不名無常如來出於無量煩惱入于涅槃安樂之處遊諸覺花觀娛受樂第一既口密次迦葉復問如佛言曰我已名度煩惱大海乃至第五卷是故涅槃名無瘡疣第二説身密次世尊為等名涅槃乃至若有善男子善女人欲斷煩惱諸結縛者當作如是持護正法第三明意密即是三業次第二者明昔身智是持護正法第三明意密即是三業次第二者明昔身智是有解脫是無身智是有有即礙無解脫是無無即礙有有礙無故無非無有無礙有故無非有無此有無相礙故即不並所以名祕密準之可悉述義解云具般若慧故口中發語所説自在也言如涅槃四相品者疏主解云今言四相品者從初段開般若為四於用因此為名故云四相品準之可悉言四者對二乘等者疏主解云一者明昔三德不圓有身智時無解脫有解脫時無身智時解脫不足解脫足時已無身智終不得三德圓正故名為祕準之可悉疏問此品何故等者此下第二問答中論旨歸以建或情文中有二即問與答中有四第一明破惑人執非涅槃為涅槃第二明破執涅槃為非涅槃第三明破大小乘人計有涅槃之執第四明欲釋諸大乘經明涅槃義如文言一者惑人等者案琳疏云一者上明外道二乘同稱涅槃是有心存所得便惑有見見即生死不名涅槃今求生死涅槃皆不可得名為解脫方名涅槃今解上所別七種外道執非涅槃為涅槃故須破之言二者惑人等者案琳疏云二者二乘之人謂生死涅槃條然異體斷除生死別取涅槃今明生死涅槃性常平等彼此樂情理情一味故下論云生死之實際及以涅槃際如是之二際無豪釐差別準之可悉言故下文云等者案此品説二際平等偈文所引全同琳法師解云此偈正明染淨雖殊而異際不二無性理同何得不齊所言豪釐者元康師解云蠶口初出絲名忽十忽為豪十釐名絲以其微細故以為喻也言華嚴云等者案彼經第十五卷回向品第五回向中有此文今略引之法藏師解云次生死非離等者明離背向相以法離生死相故非雜亂亦離涅槃相故非寂靜具如縛解品記也言三者雖有內外大小不同等者案琳疏云四者涅槃體寂相盡有無隨何所見悉不相應然復總之寂滅取為涅槃者唯是自心建立妄想所存翻成生死何預涅槃故攝論云若言涅槃本寂不生不滅是依分別性説準之可悉言四者欲釋等者所言如大品云等者案彼經第十二卷幻人聽法品須菩提語諸天子言我説佛道如幻如夢我説涅槃亦如幻如夢若常有法勝於涅槃者我説亦復如幻如夢今略引之言所以然者諸法等者琳法師云所以然者法性虛凝未曾生死生死不有理無可除豈有寂滅稱曰涅槃但以衆生妄想故成生死為止生死強名涅槃妄想既除涅槃亦息準之可悉言故華嚴云等者案彼經第九卷菩薩雲集妙勝殿上説偈品第十中第七智慧菩薩説偈曰流轉則生死非轉是涅槃生死及涅槃二皆不可得今略引之法藏師疏第五卷解云聞教生慧故云智慧謂生死涅槃相待故俱不可得又是二乘涅槃故又染分是生死淨分是涅槃雙融故俱不可得準之可悉述義解云今改及作與也言是法不可示者案法華經方便品略開三顯一偈中有此文今略引上半文疏初偈上半牒空義等者言下半正破空若一切法空等者案琳疏云何斷者是小乘有餘涅槃斷煩惱子縛故名斷也何所滅者是無餘涅槃彼入無餘身智俱盡故稱為滅一切法空無滅何有得二涅槃準之可悉言如大品下帙已去等者案道證師大般若藉因云大品經在王舍城耆闍崛山中大比丘衆大數五千人及士女五百菩薩無量四十卷或三十或二十七卷八十九品後秦弘始年鳩摩羅什於常案逍遙園譯今約中本故云下帙已去等也所言帙者玉篇作𮖈字除𮚟反蒼頡篇𮖈纒也説文亦帙字也在巾部也有本作帙字説文書衣也亦作帙字玉篇亦作帣字居瑗反囊也三解為一帣也疏答曰下等者言下半破有若爾大小內外等者案碩疏云若諸法定性有亦無生無滅亦無斷無滅亦無得涅槃義若定性有智慧不能斷惑是性有決定不可斷惑惑凡定是凡豈有得涅槃理耶言裁者玉篇辭哉反制也野玉案制斷也爾雅裁節也廣雅制裂也今須斷訓也疏長行云所名涅槃者發下略示正涅槃等者言又上是就緣假破等者案一卷玄義云就緣假者外又執有諸法諸佛菩薩就彼推求檢竟不得名就緣假對緣假者如對治常説於無常對治無常是故説常準之可悉言就小乘義等者案影疏云有為果稱得無為果名至盡相續曰斷相不為故常行中起故生諸行終故滅而實非故以不準之可悉疏復次經説涅槃下第二等者言依楞伽等者案入楞伽經第三卷佛告大慧菩薩言愚癡凡夫不能覺知唯自心見執著外種種諸法相以為實有是故虛妄分別一異俱不俱等因自心熏習依虛妄分別心故譬如群獸為渴所逼依熱陽炎自心迷亂而作水想東西馳走不知非水今取意略引之言一逈破門等者述義解云逈有多訓而今義言逈猶直也謂不交申而直破不交破而直申耳言若破外道等者案琳疏云外道計三有為涅槃如檀提計此身是涅槃即欲界有阿羅羅計無想即色界有鬱頭藍弗計非想即無色有故是老死準之可悉若破內法有所得義等者案碩疏云今第一偈涅槃若是有即是老死門然者明有即是有所得有所得不免二十五有生死老之患準之可悉疏第二偈有為破等者言智度論等案彼論第三十一卷釋初品中十八第三十四云復次若人捨有為著無為以著故無為即成有為以是故雖破無為而非邪見是名有為無為空今略引之慧影疏解云若人下明此之無為則與有為俱悉被著故云即成以生著處不殊故云成也以是故雖破無為言無為空以破著故而非邪見邪見者盡撥無一切所有法等此言無者但即法明無破著明無有二意故為異也準之可悉言五十五卷云等者案大論第五十五卷上下文未見此文蓋是論本不同哉然彼卷釋散華品中云如來亦不在五衆五衆生滅無常苦空無我相故非是如來若是如來者如來亦應是生滅復次五衆是五法如來是一云何五法作一若即是一一亦應即是五若爾者世間法出世間法一切亂壞今取意引之影疏解云即五衆非如來也今私案云如來者無為也五衆者有為也然則應云汝如來從何而得若因五衆而得如來亦目如來而得五衆若爾此兩相因即實相為故皆是有為更可撿求之言若破常義等者案琳疏云此偈正破大乘人言涅槃是妙有也亦應是妙為若言妙故非為亦何妙故非有破明妙有是涅槃體為是三相故是有而非為若爾亦應涅槃體離三相故非有若有而非為亦應為而非有也準之可悉疏第三偈有受破等者言若涅槃是有等者案碩疏云若涅槃是有即名為受不得名無受所以然者有必從受生若是有即是受著法若有受著即縛縛即是生死不得名涅槃準之可悉言大品云等者案彼經第五卷須菩提語舍利弗中有此文今略引之言汝今乃受於有等者案康疏云凡言受者可有兩種一以五受陰法名之為受二以有受著心名之為受今言受者是受著心也又化城喻品疏云受者受著也準之可悉疏問曰下生第二無是涅槃等者言若作二外道等者案百論下卷破常品末凡有四外道一計涅槃與無煩惱不異三計涅槃是無煩惱因三計涅槃是無煩惱四計斷無以為涅槃四計之中初三計有餘後一計無餘準此疏文今言二外道者約計為二初三外道同立有是涅槃後一外道立無是涅槃也言故百論云等者案彼論下卷破常品四外道計中是第四計修治疏文所引全同言前執今妙有等者述義解云前章説有是涅槃此云則執今妙有也第二章計無是涅槃此云此執昔斷無也今妙有者大乘涅槃也昔斷無者小乘涅槃也疏問曰下生下第二等者言離合二種破者述義解云初破有是涅槃次破無是涅槃者離也第三破有無合是涅槃者合也疏答曰下兩偈為二等者言如華嚴云等者案彼經第九卷菩薩雲集説品中有十菩薩各別説偈今此文第七智慧菩薩所説偈凡有十行今此生死涅槃相待故俱不可得之偈文今略引上半文準上可悉言可謂損之又損者案涅槃無名論演明漸第七云是豈頓得之要損之又損之以至于無損耳述義解云謂修甚深正觀道者遊心於中道理寂靜無為既遊心於中道而見疑等萬纍念念消損如此之事何頓得耶必經地地漸次消損損之更損至於佛果都損盡已更無可損損者漸之異名修正觀者見諸煩惱本來不生今亦無滅乃是正道如此之人不起惑染是名損之準之可悉言答斗藪等者述義解云斗藪者唐俗語也謂執衣頸而振之塵也又云猶慰也玄應師四分律音義云斗擻又作藪郭璞注曰方言曰斗擻舉也言乃至十地及以摩羅等者案五重遊意云十地論以八識為宗不及第九識前七識如前但第八識為異何者以真如為體也攝論以九識上八識就妄用辨體第九阿摩羅識以清淨真如為體今謂十地論師所計性淨方便涅槃及以攝論師所立四種涅槃皆是化城準之可悉言故空權度一切者案大論第二十卷初品中三三昧第二十二引佛説偈云我坐道場時智慧不可得空捲誑小兒以度於一切今取意略引下半偈文準之可悉疏答曰下第二四偈即四等者言破云等者案康疏云有是前有無是前無也解脫本脫於有無豈即二體而為之耶準之可悉言又經云等者案大經第五卷佛告迦葉菩薩言夫涅槃者名為解脫乃至真解脫者名曰遠離一切繫縛今略引之疏主解云或人言正翻涅槃為解脫以此文今謂不爾涅槃是彼國語解脫是此國語佛于時復不自翻那忽彼國説法此國語翻譯耶今明將總別釋耳涅槃名總解脫語別準之可悉言又若有無等者案碩疏云此偈並決破汝若有無合為涅槃則應有無合為解脫亦解脫名涅槃而汝義有無不得合為解脫解脫但是無耳若爾何得有無合為涅槃準之可悉言又涅槃等者案碩疏云復言非解脫破者解脫是無法有法非解脫而今取有為解脫乃取縛為脫也準之可悉疏第三偈上半牒而總非等者案琳疏云又受此有所得者有無智皆是有為法不免生死今私案上文即是大論第三十一卷文意準上可悉言又因有為等者大論第五十五卷文意引之如上言如百論云等者案彼論下卷破常品初內曰若強以為常無常同修妬路汝有因故説常耶無因故説常耶若常法有則無常若無因説常者亦可説無常今略引注釋文疏主解云為有所以故説常為無所以漫噵常耶此二俱破於常若有所以則是有因汝言無因法常今既有因則無常耶若無所以漫説常者既是漫説則是無常準之可悉疏第四偈上半牒非等者言成論云明暗共處等者十三字缺疏問曰下第三等者言是中假師等者述義解云此詮法師等也言亦是立涅槃等者案琳疏云問意明涅槃出二諦外故非有非無是莊嚴義也言又攝論師等者案上疏云釋無住涅槃有二釋一依金光明經釋云二云以二無我理三無性理準之可悉疏答曰下兩偈為二等者言影師云等者案曇影師此論疏有此文所引全同述義解云於妄有餘者妄相勝故餘猶勝也言今依長行等者述義解云言所因者所由謂有無矣言智度論六十五卷等者案彼論第六十五卷釋無作品之餘云有人説説有四種相一者説有二者説無三者説亦有亦無四者説非有非無是中邪憶念故四種邪行著此四法故名為邪道是中正道道是中破非有非無故名無法有法空佛説乃至破非有非無故説無有轉無有轉破非有非無有二種一者用上三句破二者用涅槃實相破今略引之言肇師涅槃論破非有非無云等者案彼涅槃無名論折徴出第二云請核妙道之本意果若有者雖妙非無雖妙非無即入有境果若無者無則無而無差則入無境述義解云次作二關難果猶決定義為定是有為定是無若定有者言妙有而非無即同虛空之有若定無者無法即無別同兔角之無準之可悉疏如來滅度下第二就人門破涅槃等者言此以能證之人等者案碩疏云亦名舉況破如來是能證之人涅槃是所證之法又既四句求不得所證法豈有無四句中故人法皆不可得準之可悉言又成論云如來在世尚非有無等者二十五字缺言答過現已起等者案碩疏云所以不舉未來此是略耳明現花是已起過去是已滅就已起已滅尚不可四句求豈況未來是未起未滅而當有四句耶準之可悉疏涅槃與世間下自上以來等者言肇師妙存章等者案涅槃無名論演第四名曰妙存述義解云既言涅槃不在有無不出有無而為妙有非有非無在於即真故曰妙存今通取一章意故云爾言故涅槃經云等者案彼經第七卷有此文今略引之言法華明諸佛知見等者案彼經一卷方便品廣開三顯一中有此今取大旨準之可悉言復為對真俗異體家等者案二諦章下卷二諦相即義中云次龍光解二諦相即義此師是開善大學士彼云空色不相離為空即色色即空乃至但不相離為即此師立二諦異體乃至廣説準之可悉而言經言等者案大品經第卷有此文今略引之疏滅後有無等下第二明等者言如淨名等者案彼經中卷入不二法門品有三十一菩薩各説不二法門是也言答淨名經云等者案彼經中卷文殊問疾品中文殊師利問言空當於何求維摩詰答曰當於六十二見中求又問六十二見當於何求答曰當於諸佛解脫中求又問諸佛解脫當於何求答曰當於一切衆生心行中求今取意略引然以初重答以答第三重問疏主解云問意欲明衆生與佛不二故發此問也答意六十二見即畢竟空故就諸見求佛解脫即泯邪正準之可悉言例如大品等者案彼經第二十八卷中具有此事若通亘一部然也引文如上言經中云等者案大品經第六卷末舍利弗言我見衆生乃至斷見常見諦見因緣等見佛見轉法輪見為斷如是見故而為説法是名菩薩摩訶薩今略引之疏長行釋三偈等者言如智度論等者案彼論第十一卷舍利弗因緣第十四中云菩薩摩訶薩欲以一切種知一切法當習行般若論問曰云何名一切種云何名一切法答曰智慧門名為種有人以一智慧門觀有以二三十百千萬乃至恆河沙等阿僧祇智慧門觀諸法今以一切智慧門入一切種觀一切法是名一切種今略引之慧影解云今言菩薩欲以一切種者即是經之宗旨一切種智一切法即是一切種智是於果德般若問曰已下上既告身子辨經宗致欲以一切種知一切法者此義云何也答曰一切種者即是一切種種智門法者即是一切諸法如來具一切種種智門知一切法種別皆知無不罄盡欲得如此智慧能如是知者常習行般若準之可悉言阿含梵動品明本劫本見末劫末見等者述義解云本劫本見者就過去言末劫末見就未來言也言今依智度論七十卷等者案彼論第七十卷佛母品之餘廣説六十二見今略引之慧影師解云若略則就十四難明廣則六十二見也神及世間常下神即是衆生世間者即是二種世間也上常無常既有四句五陰上盡爾四五則成二十見次邊無邊歷五陰上復二十足前成四十即是十四難中八句神即是身神異身異名即陰離陰兩我合為二句次如去不如去有四句歷五陰上復二十足前合成十四難離為六十二見準之可悉言身一神一等者慧師解云言身一神一者以五見收之屬於邪見即身即是神故身滅神亦滅也身異神異者以二見生於五見五見為六十二見之根本也此是常邊故屬邊見也言智度論云等者案彼論第七十卷云問曰先説常無常等即是後世或有或無今何以別説如去四句答曰上總説一切世間常後世有無事要故別説今略引之影疏解云此中問答明之先言常者即是如去言無常者指爾而滅即是不如去義何故經中乃更明之答曰下言上無常無常乃總就衆生等三種世間及三世等明之今此中乃但就後世明之言楞伽經等者案入楞伽經第六卷佛告大慧菩薩言譬如釋提桓因帝釋王等名異義一不依多名言有多體我亦如是三阿僧祇百千名號凡夫雖説而不知是如來異名或有衆生知如來者乃至有知真如來者有知實際者有知涅槃者有知法界者有知法性者今言法身者即是如來涅槃準之可悉言答淨名玄義等者案淨名玄論第一卷同異門云今更開十門四句以詳得失一者人四句二者法四句三者塵識四句以上三句名單四句四復論四句五重復四句六鑒深四句七絶四句八四句絶九一句絶十絶一假有委曲如彼也觀十二因緣品第二十六疏論有二分等者約此品由來大文有二初明來由次所言觀十二因緣品下第二明品名目初中有二初約大小以明來由次兩品即為二章下第二約邪正以明來由初正明大小兩觀次門他亦明下第二問答顯釋此文初也言四依如佛者述義解云實行菩薩名如佛權行菩薩名即是佛也準之可悉疏問他亦明等者此下第二問答顯釋凡有兩番問答如文言初品所明者述義解云指因緣品初牒也言今略明一意等者案曇影疏云雖法性不並真聖賢無異道然悟各有由故令開津不一而著相者未能要其會歸遂取信非見非大乘法空未肯便信故復就其非見以明其空準之可悉疏兩品即為二章等者此下第二約邪正以明來由文中有二初總明邪正後問答以明來由文中有二即問與答答中有四第一約淺深以明大小差別第二約傍正言第三約廣略言第四約説教本意而為之如文言蔓莚者曇捷法華字釋云上王怨文傳云蔓延也廣雅云蔓長也疏所言觀十二因緣品等者此下第二明品目文中有三初明諸佛菩薩説十二因緣之意次問諸部云何下第二敘諸執計次但末世衆生下第三明觀旨此文初也有二即問與答答中有二初明説因緣之意次當時下第二明論主重論如文言借妄止妄者述義解云以輕妄止重妄也疏問諸部云何等者此下第二敘諸部執計凡有二重問答即分為二初番問答示邪後番問答顯正此文初也即二謂問與答答中有二初正敘執計次此之三部下顯執人差別如文言毗婆闍婆提等者案毗婆沙論第十二卷人品云問曰何故造此論答曰為止他義故如毗婆闍婆提説緣起是無為法問曰彼以何義故説緣起是無為法答彼彼佛經佛經説若佛出世若不出世住法界如來成等正覺為他顯現乃至彼以是義故説緣起是無為為止如是説者意故緣起法墮在世中當知緣起法定是有為非是無為所以者何無有無為法墮在世中準之可悉疏問論主今明等者此下第二顯正文中有二即問與答如文言如大集云等者三十三字缺言文殊問經云等者案彼經下卷分別部品有此文今略引之具文如記第二也言涅槃經三十諍論者案彼經第三十四卷迦葉品廣説諸諍論事疏主解云善男子若言如來畢竟涅槃下第二別明説教即具出諸諍論事此第一明佛畢竟涅槃不畢竟涅槃次善男子有諸衆生生於斷見下第二明我無我諍論次我於經中復作是言下第三明中陰有無次復説有退下第四明羅漢退不退次如來凡有二種下第五明佛是為無為次云何名十二因緣下第六明十二是為無為次我經中説作善惡業下第七明心是常無常次遠離煩惱下第八明世第一法通三界唯在色界等次四種施下第九明施體通三業不通三業次涅槃即是下第十明三無為有別體無別體次為跋婆比丘下第十一明造色有無次菩提王子下第十二明無作有無次聖人色陰下第十三明心數有無次我唯有一有下第十四六道五道次住迦毗羅下第十五明五八戒等具不具受得次犯四重下第十六明犯四重失不失戒次一乘一道下第十七明三乘成佛諍次佛性具六事下第十八明諍佛性次以是因緣或有言犯四重下第十九明犯重禁五逆等佛性有無次我於處處經下第二十明十方佛有無然元康師云涅槃經第三十一卷中明諍論凡有二十一雙案法寶師疏第七第八中間立五欲障道不障諍論而今言三十諍論者若是卷數為當文字點餘也疏但末世衆生等者此下第三明觀旨文中有三初總標觀旨次問以何文下第二問答以顯觀旨次今正觀因緣下第三總結也初中言故下破邪見品等者案彼品文凡有三十一偈大分為二初二十九偈破邪以明小乘觀末後二偈重明大乘觀初中有二初中為二兩立邪見次何因緣故名邪見下論主破邪見開為二別初十二偈約道理破二世八見約第二中又二初六偈破過去四見次若世間有邊下九偈破未來四見初中又二初四偈就即事破於四見次復次生死無始下偈就道理破除四句又初周就人破四見後周就法破四見準之可悉疏問以何文等者此下第二問答以顯觀旨凡有六番問答此初番問答答中言智度論釋小乘生法二空等者案彼論第十八卷釋般若第二十云是經中佛説法空若説誰老死是邪見是名生空若説是老死是邪見是名法空乃至無明亦如是影疏解云若説誰老死等者誰即是人我等為執實有人我等法是老死故是邪見諸老死誰老死不可得此明無又可老死故云誰老死是生空也是老死者若執著實有此老死法定是老死故是邪見是老死者明是老死法無實不可得是老死法空故故云是老死是法空今正欲取法空但舉生空成法空義也而言大因緣經者論第三十一卷云雜阿含大空經又云大空者聲聞法中法空為大空私案云雜阿含經中廣説十二因緣故云大因緣經亦説法空故云大空經準之可悉疏問論主等者此下第二番問答言如法華信解品第等者案彼經第二卷信解品偈有此文今略引之疏主解云此兩偈釋不欣意也空無小大者此是成論人聲聞空也慈恩解云此二頌空無相觀諸法皆空空觀也二我既無何有生等故次下説無生滅等六種所無並無相觀也言大品云須菩提等者二十二字缺疏問何故經論等者此下次四番問答此中有四初番問答明經論説二空之次番問答明大小乘説二空之差別如文可悉疏品開為二等者言即是鈍根等者案康疏云總以二乘為小道通名聲聞也有人云聲聞二種一緣覺聲聞二聲聞聲聞今言聲聞是緣覺聲聞也言智度論云等者案彼論第七十九卷釋中屬纍品云復次二乘得空有分有量諸佛菩薩無分無量如渴者飮河不過自足何得言俱行空不應有異又如毛孔之空欲比十方空無及一今略引之疏答曰下第二正明十二緣觀等者言答欲明三乘等者案大經第二十七卷説三獸同渡河及菩薩善戒經亦有此説準之可悉言又智度論釋無盡品等者案彼論第八十卷釋無盡品第六十七云問云若無無明亦無諸行等云何説十二因緣答曰説十二因緣有三種一者凡夫肉眼所見顛倒者我心起諸煩惱業往來生死中二者賢聖以法眼分別諸法老病死心厭欲出世間求老死因緣由生故是生由諸煩惱業因緣何以故無煩惱人則不生是故知煩惱為生因煩惱因緣是無明無明故應捨而取應取而捨乃至是法無定相但從虛誑因緣相續生行者知是虛誑不實則不生戲論是但滅苦故入於涅槃不究盡求諸苦相三者諸菩薩摩訶薩大智人利根故但求究竟十二因緣根本相不以憂怖自沒求時不得定相老法畢竟空但從虛誑假名有所以者何分別諸法相者説老是心不相應行是相不可得頭白等是色相非老相二事不可得故無老相今取意略引之言答智度論云等者案彼論第二十七卷釋初品中大慈大悲第三十五云譬如長者有一子愛之甚重其子得病但求良藥能差病者不求分別諸藥名字取之時節合味分數以是故諸菩薩從果觀十二因緣不從因觀見多者從因觀愛多者從果觀諸聲聞人因邪位故有正位菩薩邪位故但名菩薩位今取意略引之影疏解云長者喻菩薩子喻衆生也從果觀下若從無明行觀名從因觀今菩薩唯為見衆生生老病死生憐愍故欲救撥之又所以經中恆作二種明觀十二因緣者為衆生雖諸煩惱無邊以或大分之不過見愛為二人恆説此二觀也準之可悉言婆沙問云等者案彼論第十二卷雜犍度人品云問曰若為下根衆生説緣起果菩薩於一切衆生中其根最勝以何等故觀緣起果答曰或有説者彼隨順觀法故所以者何菩薩見老死病作是思惟此老病死何緣而有皆由有生復有説者如先所説為初學者説果菩薩於最後生名為初學雖曾無數劫觀因緣法後若觀時還從本始如人先雖數數上樹後若上時還從根上彼亦如是今略引之述義解云一切根中最上者菩薩於一切人中最上利根也言於最後生等者然三十四心之前但有漏行未修無漏定慧至最後身坐菩提樹下始得無漏故名初學曾無數劫者大論第四云釋迦文佛從過去釋迦文佛至四剡那尸棄佛為初阿僧祇從尸棄佛至燃燈佛為二阿僧祇從燃燈佛至毗婆尸佛為第三阿僧祇若過三阿僧祇劫是時菩薩種三十二相業因緣極遲百劫極疾九十一劫也還從本起者老死為起正觀之本故最後身坐菩提樹下時得初無漏還觀十二因緣中初無明也言答聲聞法中自有利鈍等者案婆沙第五十九卷智犍度相應品下云有四十四智體知老死智體知老死集智體知老死滅智體知老死滅道智體乃至知行亦如是又云問曰何故不説知無明智體耶答曰應説而不説者當知此説有餘述義解云十二因緣中除無明就餘十一明四十四智何者無明之因無故無明不具四四諦而先從果應觀何者老死即苦老死之因是生如言生緣老死即集老死之滅即是滅諦得此滅諦無漏聖道即是道諦如此求時十二因緣具四十四智言利根人觀十二等案婆娑五十九卷云云何七十七智體答曰知生是老死緣是一智體非不緣生有老死是二智體過去生曾為老死緣是三智體非不曾緣過緣過去生有老死是四智體未來生當為老死緣是五智體非不當緣未來生有老死是老死體及智法住智此法是無常是有為從因緣生是盡法是滅法是無欲法知如來法者是第七智體如知老死有七智體乃至知行亦有七智體十一七智體則有七十七智體而不説無明者當知此説有餘述義解云七十七者除無明就十一因緣各具七故正觀審法三世各二合以為六並泥洹智為七此智無三世相故一而言三世各二者就過去十二因緣亦就現在及未來世十二因緣其義應知準之可悉疏衆生癡所覆者此第一辨無明支等者言無明者從所無受稱等者言答經云等者案八卷金光明經第四卷空品第八卷云無明體相本自不有妄想因緣和合而生無所有故假名無明是故我説名曰無明準之可悉言答十使中無明等者所言使者案慧基師毗曇章第二卷十使義云婆娑有二説初一論師三義釋使一者微義謂微者細也在衆生身微細常起二者堅著義謂一切諸使念念常生執著三者相逐義謂使得在身能生依果譬如空行之烏乃為水行之魚隨也第二外國法師四義解使一者微義謂自性微細所以亦細二者著義謂使於此身難離堅著猶如小兒堅著於乳三者遍義謂使遍在身如油在麻四者相逐謂如空行影水魚隨復次微義使自性著使所行遍義謂相應也相逐是使得也又云十名無明諦寶中愚無知不名為無明又云此之十使七十五法但用所法以為體性前五見使用通大地慧為體性無明一使煩惱大地無明為體性貪瞋慢疑五大地外十法三中貪等四法以為體性準之可悉言三毒中無明等者三十九字缺言今此中通取一切煩惱等者案化城喻品疏云言無明者一顯通隱別故説無明過去世中一切煩惱皆有暗惑迷理之義就此通義故説無明二者無明煩惱迷於本際集起生死其力最強從強為名故説無明無明有四一迷理無明所謂迷於二諦之理二發業無明所謂三根三毒煩惱三根煩惱能發業思三毒煩惱發身口業三覆業無明謂造業已重於前境起貪瞋等覆助前業令其增長四潤生無明若依成實唯愛能潤餘但遠助若據斯義潤生則狹唯在於愛生即廣通於餘結地經亦然故彼經云愛水為潤無明覆蔽我心溉灌毗曇云潤生受生諸結皆能但能纒垢等能潤不能受生準之可悉疏為後起三行者第二次辨行支等者言答婆沙云亦得説因等者案彼論第十二卷云問曰以何等故但説無明緣行不説無明因行耶答曰或有説者亦説無明因行如摩訶尼陀那經所説佛告阿難以如是因如是緣如是事為老死因如生為老死因乃至無明為行作因亦如是復有説者若説無明因行但説因緣不説餘若説無明緣行則具説四緣今略引之言成實者云等者二十六字缺言問大集經云等者案彼經第三卷佛告陀羅尼自在王菩薩言知諸衆生以因緣故貪樂生死云何名因緣若諸衆生思惟不善是名生死因緣因不善思惟故生長無明是故不善為因無明為緣因無明故即生於行是故無明為因諸行為緣乃至因生有老死等苦故生即為因老死為緣今略引以難問之言答婆娑云等者案彼論第十二卷云問曰以何等故唯説無明緣行不説行緣無明答曰或有説者若説行緣無明則唯説緣不説因復次此中説此時緣起法前生者是無明後生者是行問曰如無明是十二支緣何以但説無明緣行答曰或有説者緣有二種有近有遠若説無明緣行則説近緣若於餘緣則説遠緣是中説近不説遠今略引之言問五陰中行等述義解云四識住者色識住受識住想識住行識住識者心王此心王住色等四陰故名識住依著彼故有漏四陰唯有情數除心王及三無為餘隨四者為四識住也疏以諸行因緣識受六道身者第三明識支等言五陰中識等者案婆娑第三十九卷云云何識陰謂六識身眼身乃至意識身又云復次陰是有漏無漏取陰是有漏準之可悉言六大四食中識等者所言六大者亦名六界故婆沙三十九卷云六界地水火風界虛空界識界又云復次六界能生養長色身生者是識界養者是地水火風界長者是虛空界復次此六界是一切衆生根謂欲色界衆生從生有乃至死有心此六界無有無勢用時乃至廣説言故論云等案婆娑論第三十九卷云云何識界答曰五識身及有漏意識問曰何故界中不説無漏意識答曰若有法能令有憎長者立界無漏識與此相違故不立界今略引之言是四食説等者案雜心論第十卷擇品云四食在欲界四生趣亦然三食上二界摶食彼則無釋曰地獄中鐵丸銅洋雖復增苦壞飢渴故名及冷風觸身亦名為食也上二界無摶食身輕微故無色故問諸趣一一何食增答餓鬼趣意食增以彼意行多故明生亦意思食增以彼處卵當念母故得不爛壞三無色亦意思食增意行多故除第四空也人趣中摶食增多以摶食持身故地獄識食增識持名色故非想非非想亦爾欲界天摶食增色界觸食增受修禪食故畜生趣中濕生者觸食增持義是食義如技持瓶安住不壞如是以食持身身則不壞牽有故説食問若然者一切有漏法是食牽有故答增上故説力能牽有故説食有二事故説食謂前方便牽牽已復長養問何故説四是食答隨量所應故説四彼摶食者長養諸根四大故説食觸者長養心心數法故説食意思者長養當來有故説食識者長養名色故説食是故説四食述義解云毗曇人云食以次益為義皆唯有漏色十一中欲界香味觸名段食也觸數令心境和合為長養心心數名觸食也思數名思食心王名識食也成論人云美飮等名段食如冷熱觸身名觸食過去思業名為命根此是命根一期果報不令滅壞故名思食諸根不令敗壞故名識食若色聲者不相續故不為食若無漏者滅有漏相續故不為食欲界具四食上二界但有識食也言四空中識虛體是四陰等者二十九字缺言此中明識等者案婆娑第十二卷云如行緣識亦説名色緣識復説緣二生識此三有何差別答曰有説者行緣名色緣識説染行識緣二生識説染行不染行識又云何識相續心及眷屬又云行緣識有二種與悔俱有不與悔俱毗曇章第五卷十二因緣義中解云悔俱者謂而欲內三惡道中中陰識也準之可悉言成論者云等者案開善師成實論大義記第十卷五陰義中三次色識通別前後者識是了別義心皆當念了別一切心是識此通義但了別功異取緣前後故於通立別何者心始造緣對實法境既造實境照識義又同現在故初心宜名識識復相應沒識為數是以識陰從別立又第十一卷十二因緣義中云行緣識者隨業善惡得受今身身是父母遺體有此色法若無識託則非衆生故受身初心名此為識然識來託胎自有多品故論文所説有四入胎初一不自憶入胎出胎所謂恍忽不自覺知便來受身形也後復三種雖甚優劣然利根福德也但就初入復三品一謂處厠衆穢惡中二謂處林河之間三謂處殿堂登上高山也品雖多大別唯兩一是五陰初識二是前身行陰通識為識也所以前後二身業報懸絶既改形易道必生初識若二身業果相似非隔絶者則於前身見受生處起愛而來未更分別者故經云有善惡心無善惡心者謂此也大集經云從業因緣父母和合初受意識歌羅羅時其身猶如亭歷子許未有出入氣息亦不覺苦樂不苦不樂離先色相未具後色無力無欲無有精進無有憍慢初入胎心名之為識準之可悉言問何故此識必是染汚等者四十字缺言問中陰屬何支等者述義解云識支以正業感故屬生陰中陰以方便業感故名屬行支又生陰在後故識支屬生陰中陰在前故屬行支又唯言識支屬識支耳識支生陰同果報故言又釋中陰等者此文難知何者中陰與生陰以別體故但生陰受生耳中陰不受生故為受生生陰攝中陰事難也疏以有識著故下第四辨名色等者言一云四陰名名色陰名色等者三十三字缺言阿含經云等者述義解云痛謂識陰想謂陰受樂謂受陰思惟謂行陰痛者覺惱義故有人偈云痛者受陰昔翻經時不知漢俗語而為謬耳今案彼四十二字缺言次云即以色陰為名色等者二十八字缺言故成論引經云心依名色者二十八字缺言問化生云何識緣名色等者案婆娑論第十二卷云問曰如化生云何識緣名色答曰此説胎生不説化生也評曰應説化生亦爾如化生者初得諸根未猛利時説是識時後若猛利説名準之可悉言答婆娑云等者案彼論第十二卷云云何名色已受生相續未生四種色根六入未具一歌羅羅二阿浮陀三卑尸四伽那五波羅奢呵如是等名曰色準之可悉述義解云未生四種色根者眼耳鼻舌此四根未開時不具六識故名六入未具也歌羅羅者正言羯藍此云和合於七日中阿浮陀者正言遏部曇此云皰結於第二七日卑尸者正言閉尸此云肉團於第三七日伽耶者正言鍵南此云堅厚於第四七日波羅奢者正言鉢羅賖迦此云枝枝於第五七日也大論第五卷云歌羅羅受胎七日赤白精和合時頞浮陀二七日時如雲胞狀伽那三七日時如凝酪五皰時也準之可悉疏情塵和合下第六明觸支等言婆娑云等者案彼論第十二卷云云何為觸此諸根已能為觸作所依未別苦樂不能避厄害搊火觸毒把刀諸不淨是時名觸今略引之搊者二十八字缺疏因於六觸下第七明受支等者言婆娑云等者案彼論第十二卷云云何為能分別苦樂避諸厄害不搊火觸毒不把刃離諸不淨能生貪愛不起淫欲於一切物不生染著是時名受今取意加爾時但至淫欲合十八字引之而言即涅槃經等者案彼經第二十七卷中佛言染習一受是名為受準之可悉阿毗曇章第五卷十二因緣義中解云云何受時四五歲知分別苦樂避諸危害於一切物資生愛無淫欲愛也言婆娑問等者案彼論第十二卷云問曰受相應共有法何故説觸緣受不説受緣觸耶答曰雖是相應共有法自有法與彼法有隨順有不隨順如觸與受作緣隨順受觸作緣不隨順如燈雖與照俱生燈是照因照非燈因彼亦如是如向所説此中説時緣起法觸是前時受是後時是故説觸緣受緣觸今略引之疏以因三受故下第八次明愛使等者言愛以染著為義者章解云云何為受十五已去於二受中能資生淫欲等愛也言然三受通為愛作緣等者案婆娑第十二卷云受緣愛問曰如樂受緣受可爾所以者何為稱意故四方追求苦受云何與受作緣尊者和須蜜説曰苦受與受作緣勝於樂受不苦不樂受其事云何如世尊説為苦受所逼貪求樂受樂受故為欲愛使復有説者三種受盡能與愛作緣其事云何義言曰樂受作如是説我能使生有相續衆生以貪我故四方追求苦受作如是説我亦能使生有相續為我所逼以貪樂故四方追求不苦不樂受作如是説有苦樂受處我亦能使生有相續何況第四禪以上無苦樂處而不能也準之可悉言問三受等者案婆娑論第十二卷云問曰此三受云何與愛作緣耶答曰愛有五種一求樂愛二不欲離樂愛三不生苦愛四速離苦愛五愚愛求樂愛者未生樂受欲令生故生愛不欲離樂愛者已至樂受心不欲離故生愛不生苦愛者苦受未至欲令不生故生愛速離苦愛者已生苦受欲令速滅故生愛未生不苦不樂受欲令生故生愛已生欲不失故生愛亦能生於愚愛準之可悉述義解云於捨受亦生二愛者如外道身在欲界計色界無想天為涅槃樂生彼天以無想天心是不苦不樂捨受之心又彼生無想天者慕不避彼處故云已生欲令不失也言問何故過去等者案婆娑第十二卷云問曰以何等故前生緣起無明在初後生緣起愛在最初答曰復有説者無明有四事一緣有漏無漏二緣有為無為二是遍非遍四能緣自界他界愛唯緣有漏緣有為是不遍緣自界以是事故愛能生未來苦勝故説在後緣起法初此中因事故略説後當廣説準之可悉疏因愛有四取下第九取支等者言問愛取何異等者案婆娑第十二卷云問曰受緣愛取中愛此二有何差別答曰初生名愛愛憎廣名取復有説者下者名愛上者名取復有説者若愛以受為因是以愛為因是名為取復有説者若愛是受果是名受緣受若受是愛果是名為取準之可悉言成實者云貪使為愛餘九使名取者三十六字缺言婆娑云等者案彼論第十二卷云云何為取以貪境界故四方追求是時名取準之可悉疏因取故有有者第十有支等者言謂能有來果等者化城喻品疏解云業能牽於三有故名為有又令有來果故名為有也言婆娑云等者案彼論第十二卷云云何為有追求之起身口意業是時名有準之可悉疏從有而生生者第十一生支等者言數人生以起成為生等者案俱舍論第七卷分別世間品云由此業從今生更退於未來世正託生位偈曰更接有名生釋曰此位名更接何以故於今生是識分於未來名生又云生者是未有向有法相準之可悉言成論是本無今有義者案大義記第十一卷云生者起成義亦本無今有也言數人又云生是生相等者案俱舍論第七卷云如此法起名生又云生是有為法相故不曾見餘常住法應成無常法相準之可悉疏從生有老死下第十二支等者言衰耄等者案大義記云衰變為老神逝死也述義解云耄者衰老也書曰六十曰耆七十曰耄也最勝王經信行音義云耄毛報反莫報反八十曰耄耄諙忘也又亂也言數人云等者案俱舍論第七卷云變異名老滅名死準之可悉疏從老死故有憂悲苦惱者此四等者言經云將死之時等者案華嚴經第二十七卷十地品中第六地云死別別離時貪著心熱名為悲發聲啼哭五識為苦意識為憂憂苦轉多名為惱今取意略引之法華疏第六卷引十地經第七卷云死別離時愚人貪著心熱名憂發聲啼哭為悲五根相對為苦意根相對為憂苦轉深為惱準之可悉疏如是等諸事下等者自上以來別明十二因緣今第二總結過患文中凡有二十三番問答今此初番問答案婆娑第十二卷云當知三道亦如是章解云以三道者無明愛取是煩惱道行有二支是為業道現五來二七因緣分以為苦道準之可悉疏問何故二世等者此下第二番問答文中有二即問與答如文答中答三問即三初答煩惱道問案婆娑第十二卷云問曰何故過去業緣説是無明現在業緣説是一切業答曰趣生方時為方便起處身緣諸過去世不現見故説行緣是無明現在世如上所説趣乃至緣盡是現見是故彼業説緣是一切結次過業下答第二業道問案婆娑第十二卷云問曰以何等故過去業説名為行現在業説名為有耶答曰以過去業已消已用已作已與果無勢力報已熟猶如糞掃棄於空地不能生果報以是事故説名為行與上相違説名為有次現果交起下答第三苦道疏問何故三世中等者此下第三第四兩番問答案婆娑第十二卷云問曰三世各有十二支緣何故説二在過去二在未來八在現在耶答曰現在法以因推果以果推因現在以因推果者現在愛取有是未來生老死生老死是其果以果推因者現在五果是因此過去無明行以現在因推果以現在果推因故而作是説此中説衆生數緣起法準之可悉疏問無明有因等者此下第五番問答案婆娑第十二卷云問曰無明為有因不老死為有果不若有者云何不有十三十四支緣耶若無者云何無明非是無因法老死非是無果法耶答曰應作是説無明有因老死有果但不在有支中何者是無明因謂不正念思惟何者是老死果謂憂悲苦惱復有説者無明有因老死有果體是有枝非不在有枝中是故有枝有非十三十四無明因是何謂老死老死果何謂無明現在愛取是過去無明現在名色六入觸受此四若在未來名老死如説受緣愛當知説老死緣無明十二枝緣當知猶如輪轉準之可悉疏問三世各具八支等者此下第六番問答述義解云答約一身等者就一世身而説十二也疏問三界具十二等者此下第七番問答案婆娑第十二卷云此十二枝緣幾在欲界幾在上二界答曰或有説者此中唯説欲界網生衆生復有説者欲界有十二枝色界有十二枝除名色時無色界有十枝除名色六入時色界應作是説識緣六入無色界應作是説識緣觸評曰應作是説三界各有十二緣枝問曰色界無六入云何俱有十二耶答曰如初生色界衆生諸根未猛利名色時無色界雖無色有名雖無色根而有意彼應作是説識緣名名緣意入意入緣觸以是義故一切處悉有十二枝緣準之可悉疏問十二因緣等者此下第八番問答案婆娑論第十二卷云問曰此十二枝緣何剎那幾何相續答曰二是剎那謂識與生餘是相續今加增引之言增一阿含三十卷云識支具六識等者三十四字缺言大集經等者案彼經第二十五卷末佛告明星菩薩言訶羅羅時住六七日六七日轉名頞浮陀形色猶如小棗住七七日轉名伽那形色胡桃殼今取意引之言智度論云等者案彼論第四卷云伽那時知住伽那三七日時如凝酪時名也此亦取意也又第四十四卷云問曰何故説識即是六情六情即是五衆答曰是識十二因緣中第三事是中亦有色亦有心數法未熟故受識名從識生六入是二時俱有五衆色成故名五情名成故名意情六情不離五情以是故説識準之可悉疏問五果等者此下第九第十兩番問答述義解云答極小等者除名色愛取有故云有八也除名色故云十一也疏問十二支等者此下第十一問答言答婆娑云何者案彼論十二卷云問此緣起法體性是何答曰體是五陰五陰是緣起體是性是我是物是相今略引之言智度論云等者案彼論第四十卷云問曰若爾十二因緣中處處皆有五衆何以但説六情有五衆答曰是識今身之本衆生多錯名色未熟未有所能故不説六情受苦樂能生罪福故説其餘十二因緣故説五衆今略引之疏問十地經曰等者此第十二十三十四並三番問答言十地經云等者十地經第七卷文今案花嚴經第二十七卷十地品第七地中云又十二因緣説名三苦無明行識名色六入名為行苦觸受名為苦苦受取有生老死憂悲苦惱名為壞苦準此經文今言十地經者十地經論第七卷第七地文也今略引之述義解云答無明等者無明至六入為無常所切故云行苦觸受知冷熱苦樂故云苦苦從愛至惱雖我身不衰不死而衰老死故云壞苦也毗曇章解云名色六入未是麁心分別苦樂分齊同判行苦愛取有等心是同歸老死散壞判壞苦又觀未來散壞苦也疏問四果具幾支等者此下第十五十六十七十八并四番問答言答羅漢不起三因果等案婆娑第十二卷云言問何故三相中等者案婆娑論第十二卷云問曰以何等故三有為相中生獨説一枝老死共説一枝耶尊者波奢説曰佛知諸法相餘無能過乃至廣説復有説者隨其事相故法起時生勢用勝法滅時老死勢用勝復有説者法起時生能使此法相續成立老死能使不相續不成立準之可悉疏問病何故不立支等者此下第十九番問答案婆娑第十二卷云問何等故病不立有枝耶答曰或有説者病無枝相故復有説者若一切衆生一切時一切處有者説枝病非一切衆生一切時處盡有如尊者婆拘羅所説我於佛法中出家年過八十不曾有小頭何況身病如此欲界衆生不盡有身病況色無色界準之可悉述義引付法藏經云過去施藥故今得羅漢百六十年未曾有病身熱頭痛五死報燒不燃釜煮不爛水溺不死魚吞不壞刀割不傷也疏問十二相生等者此下第二十番問答述義解云無明若生不善等者無明起過去三業事不礙故有所作因即增上緣依無明起三業惡與惡相生故有自分因為起業之親因故有遍因以上二因并是因緣也今案婆娑論第十三卷云無明與不善行作四因謂相應共生相似遍因為作因緣無明與色界隱沒無記行亦爾今所説此有何所出可求定之行生識等者由行生識支之果時以不礙義有所作因即是緣緣就報因報果門故有報因即是因緣也識生名色等者由識生名色之峙以不礙義有所作因自類相生故有自今因若識生識陰者次第緣若識生餘四陰者緣緣增上緣也名色生六入等者若名色生六入者以不礙義名所作因自類相生是自分因若約名色生六入者名生六入是緣緣義色生六入是因緣義亦增上緣也言及觸受等者二十六字缺言受生愛等者由受生愛之時唯有不礙義故是所作因即增上緣也言愛生取等者不障義所作因即次第緣自類相生義自分因愛與取同是現在煩惱故亦是因緣也取生有等者若取生現在不善三業者取起三業事不障故有所作因即增上緣作取起業自類相生故有自分因為起業之親因故有遍因以上二因并是因緣義故云同無明生行也有生生等者由有生生之時以不障義有所作因即是緣緣就報因報果故有報因即是因緣義故云同行緣識也生生老死等者若識生名者自分因識生色云所作因也疏問十二相生通三性等者此下第二十一番問答疏問十二幾漏無漏等者此下第二十二番問答婆娑等者案彼論第十二卷云幾是染汚幾是不染汚答曰五是染汚謂無明識愛生取餘是染汚不染汚詳詳曰此中説時緣起法應説是染汚不染汚如前所説五時若是心心數數是染汚餘染汚不染汚今略引之疏問十二因緣云何如樹等者此下第二十三番問答案婆娑論第十二卷云此十二枝緣如樹有根有體有花有果無明行是其根識名色六入觸受是其體愛取有是其果此十二枝緣或有花有果或無華無果者謂阿羅漢準之可悉疏問十二因緣云何破除十使等者此下第二十四番問答疏問緣生與緣起何異等者此下第二十五番問答婆娑論第十二卷云問曰緣起法緣生法有何差別答曰或有説者因是緣起果是緣生乃至尊者富那奢説曰此中應作四句或有緣起非緣起過去現在阿羅漢最後是也亦緣生或緣起除過去現在阿羅漢死五陰諸餘過去現在法是也或非緣生無為法是也準之可悉言又有緣生等者案大經第三十四卷迦葉品云佛告善男子有十二緣生謂未來世十二枝也有從緣生非十二緣謂阿羅漢所有五陰也有從緣謂凡夫人所有五陰十二因緣有非緣生非十二因緣謂虛空涅槃疏主解云有不從緣生者謂未來世十二未有現在因緣故非緣而有未來十二因緣也有從緣生非十二因緣謂阿羅漢所有五陰從前十二生故有緣不更起從因果故非十二也準之可悉言毗曇又有四種十二因緣等者案雜心論第八卷修多品云問有四種緣起何等為四答謂彼相續轉剎那與連縛及前謂分段此則説緣起釋曰相緣縛者是無始義因果展轉相縛故説緣起輪猶如滿月始不可知乃至一剎那頃一切有枝現在前故説剎那如身輪説於莊嚴事乃至展轉相縛故説連縛因緣根本展轉久遠義乃至分段間可得故説分段彼過去生時煩惱分説無明餘如前説也法魏疏解云偈明四種十二因緣相緣轉者輪轉十二枝剎那者一念具十二支連縛者由因生果果不離因造相連屬名連縛分段者明三世十二支各有分齊段也而言明一支起時等者法魏師解云合備具十二支如一念具五陰莊嚴身輪事也今且就貪心起時説十二於事無知即是無明同時生於貪數即無明緣行由愛造作名為行同時心五分別前物是識與識俱生四陰是名色與名色相隨諸想是六入總名名色離為六入六入和合是觸心法中觸數非時分以色為觸觸所更是受心法中欲數為愛支俱生睡掉無慚等為取支思幾及身口作業是有支現在五果是過去家未來名生支陰熟為老捨陰是死準之可悉觀邪見品第二十七疏此是第二等者約此品由來大文有二初明來由次明品所詮義即釋品目初總明次十二因緣品後邪見品次問答顯大小觀差別如文案琳疏云小乘法中上辨因緣發生正觀正觀既興理須遺惑故因緣品後次明邪見品故云既破邪見也疏問大小乘等者此下第二明品所詮義即釋品目文中有二初廣邪見次問前破大乘迷下第二明詮旨歸初中有三初問答邪見次就文下第二辨通一論明邪見次就今下第三明此品辨邪此文初也有二即問與答答中有二初明外道邪見次小乘下明二乘邪見有三初總明二乘有俱為邪見次如云下別明空有邪見次故知下總結別明之中有二初引大經第二十四卷德王品文明邪見次引大經二十一卷德王品文明有邪見並略引之初文意疏主解云小乘又入於空觀不見布施破大乘行故云破戒破大乘邪見也次文案彼經第二十一卷德王品初佛告高貴德王菩薩言見於菩薩從兜率下化我象降神母胎乃至㸸尸那城入般涅槃如是等見是名聲聞緣覺曲見準之可悉疏就文明異等者此下第二明通一論辨邪見文中有二初明就大乘法中説邪見次就小乘法中明邪見案碩疏云若大乘教中辨凡謂有毫末有依有得不問生死涅樂凡聖解惑皆是耶見也小乘法中但以五見及六十二見也而言耶見者案康疏云邪見不正之名見是分則之稱凡言邪見可有二種一通以一切有所得報皆名邪見二別以凡夫二乘所見各異名為邪見準之可悉疏就今品意等者此下第三就此品而為言之文中有二初約所執明三邪見次問此品何故下第三約此品偏破我見及斷常初中有二初列三種邪見次故下偈云下引論文問答釋成此文初也言一者斷常等者案此品文凡有三十一偈今之為二初二十九偈正明小乘破邪見次末後二偈歸功禮讃初中有二初二偈立後二十七偈破破中開為二別初十二偈就理破二世八見次復次若天即人下十五偈就事破二世八見初中為二初十一偈廣破過去世四見次一偈略破未來世四見初中有三初六偈破常有句次過去我不作下四偈破斷無句次復次如過去世中下一偈合破亦常亦無常亦有亦無二句故云斷常為邪見也如此等即是我也言二者別有我體等者案論文言若當離於身何處別有我疏主解云若言我見本我而身非本身則我離身離身何處有我耶此即破小乘人犢子及假有體家準之可悉言三者若世諦中覩無我等者二十九字缺疏故下偈云等者此下第二引論文問答釋成言故下偈云等者案論文以六偈破過去世四見第六偈第三句云非無受非無今加增引之疏主解云非無受結重破離門非無結破即中若都無有我門言故下結云等者第四句此是決定義疏主解云非即非離非有非無此是小乘中決定義也以小乘中有假名我故非是都無也言答下偈破生死始等者案論文第二周指事破八見中云法若定有未來及定有去者生死則無始而實無此事疏主解云此偈正破無始辨無有常義意云求法往來義成可有無始既無往來則無無始此文分明辨小乘教中有法空義言又破無常等者次偈云今若無有常云何有無常亦常亦無常非常非無常疏主解云舉初句例後三句前偈明三句無故後句無也既破無始墮於常見亦破有始墮於常見亦破有始墮於斷見亦始亦無始非始無始墮後二見準之可悉疏問此品何故等者此下第二此品偏破我見及以斷常文中有二即問與答中又三初明邪見次六十二見者下第二明六十二見次問住下第三問答會違初中又二初正明破斷常等次又此品下重廣明邪見此文初也言如二夜經等者案大論初卷引之二夜經今略引之具文如上述義云未見經本良是未譯經也疏又此品破三種邪見等者此下第二重廣明邪見文中有四初通內外明邪見次就小乘法中下第二偏就小乘法明邪次就亦邪亦見下第三明通別耶見次所言五見者下第四別明五見如文言是見非邪等者案琳疏云了知世間陰入等法但名為見不名為邪也碩法師云世間正見也言非邪非見等者案碩疏云除前三其餘諸法是也言五陰名身等者案成實論第十卷身品云五陰中我心名為身見實無我故説緣五陰五陰名身於中生見名為身見於無我中而取我相故名為見邊見品云若説諸法或斷或常是名邊見有論師言若人説我若斷若常是名邊見非一切法所以者何現見外物有生滅故經中説有名常無見名斷案次二取品云於非實事中生決定心但是事實餘皆妄語是名及先説非勝法中定生勝想亦名見取案次文云若人捨智以洗浴等戒望得清淨為戒取又云又戒取因緣處受諸苦謂受寒熱臥灰土木刺棘等上投淵赴火自墜高等後世亦受劇苦果報如經説持牛説若成則還為牛若不能成則墮地獄次案邪見品云若實有法而生生無心是名邪見如言無四諦三寶等又云取要言之所有倒心皆名邪見問曰是邪見云何生答曰以癡故生染著非因似因故邪見生乃至廣説聰疏解云五陰中下莊嚴解云明我見體一標體二釋名而言五陰中等者有二解一云會身見我見二名二解今所習標我見體也説緣五陰者無離五陰緣假名我要帶五陰緣假名義就中有二初明身見名計五陰身生見故名為身見也於無我中下第二明我見名於無我中計我故名為我見明身見我見二名有二解一舊解云然從境得名計五陰身計假名我故二白馬解云身見同舊我見名者從心所作我境得名之解今所習身見同舊我見名從心功用得名執有我相故從心用得名也次明邊見謂斷常二見乖中道理故云邊見言若説諸法等者略明邊見體有三初標斷常二見體次有論師下出他解次經中説下第三論主引經會通前二解若通而為論一切萬法但一世都盡後世永無生邪見名為斷常如前解若別而為論計有情物是常是斷者如他解何者無情物現見一世盡不復更生故非此斷見故論主不非他解引經會通次於非實事下明見取體有二初明從起見趣即是正諸見從五見起故言從起見取也但是實等者是五見人所見所説皆是實佛與弟子所見所説皆是虛事妄語也及先説下第二明獨頭見取即非勝勝想謂非見取屬邪見攝取者引取向己義是正諸見見取非勝勝想見取我計法是勝妙法引取向己故成取義勝想者無引取同己義故不成取義故非見取也次若人捨智下明戒取有二初標戒取體次又戒取因緣下明過患也言持牛戒等者貪牛一生中持牛戒以持牛戒惡業得牛報是人計牛惑以持牛戒惡業得牛報是人計持牛戒得涅槃果故持牛戒臨命終時見受生處則生邪見我持牛戒故得涅槃而今我受後生斯則無戒因亦以邪見惡業墮阿鼻地獄次若實有法下明邪見體有二初明別邪見是撥無一切法也次取要言之下明通邪見是不當一切道理邪心心盡推初中有二初總標邪見體次如言下第二別釋邪見次取要言之下明通邪見一家解云通一見取就見取中離出四見四見不攝屬見取攝莊嚴解云就通邪見離出四見四見不攝屬耶見攝但非勝勝想是名見取勝非勝想淨道非道想是屬邪見攝今用後説而言如前釋者此品初釋通別邪見今指此文故云如前也疏六十二見等者此下第二明六十二邪見言上以一釋者言一者即色是我等者案婆娑第四卷云如分別行緣陰應説二十不分別所起處見色是我色異我色屬我我在色中如色四種受想行識亦如是如是四見則有二十又云色是我者云何為色諸所有色盡四大四大所造定諸所有有二種一者不盡如求糟粳等小物有二者盡如求一切物及糟粳等此中唯説盡諸所有色也色異我者於此四陰展轉計異於我如人有財名為有財也色屬我者於此四陰展轉計屬我如人有僮言屬我也色中我者於此四陰展轉計是色中我如油在麻中準之可悉言又釋世出世等者案上涅槃品説滅後有無等偈長行云如來滅後有無等四見依涅槃起世間有邊等四見依未來世間常等四見依過去世起準之可悉疏問經何故等者此下第三問答會違言我見攝六十二見者案大品經第二十八卷具有此文引文如上言或云斷常為本者案大經三十八卷云佛言諸有薄福之人不種善根不隨善知識沒在我見中乃至一切種種見中隨在邊若斷若常以邪見故非法言法法言非法今略引之言或云一異為本者案大品經第二十一卷佛母品云神即是身見依色神異身異是見依色受想行識亦如是今此一經三處相違故舉問之言答我等者正會三處違文言我是本等者會初即是身者有人言身即是神神即是身者有人言身即是神所以者何分折此身求神不可得故復次受好醜苦樂皆是身是故言身即是神身異神異者有人言神微細五情所不得多亦非凡人所見揲心清淨得禪定人乃能得見是故言身異神異復次若身即是身滅神亦滅是邪見説身異神異身滅神常在是邊見準之可悉疏問前破大乘迷等者此下第二大段問答明論旨歸此有四番問答如文可悉述義解云前破小乘復次破大乘者指二十五品言也今破外道等者小乘兩品是也疏開此品者多有錯誤等者言錯誤者玉篇上七各七故反雜也交也合錯亂之錯也言答小乘邪見局等者所言局者狹也言問何故不立現在邪見等者案碩疏云問約三世起六十二見此中那止出過未不舉現在耶緣云此是文略故耳又云過未冥晦難了故須辨之現世顯著易解不待出準之可悉言冥漠者下摩木反幽隱也百論記云冥漠者暗昧也言答上半明見本等者案康疏云明勝有我無我等則起常無常等四見我無我等是因常無常等是見準之可悉疏何因緣故名邪見下生起第二破等者言如青目等者案重牒長行初釋第二偈次不生者下釋初偈次不生者下釋初偈文中有二初就第一義門釋次復次萬物無生下就世諦門釋準之可悉言龍樹解八不始末等者因緣品説八不初謂不生不滅去來品説八不未謂不去不來故云爾也言亦有亦無是一句故今案下疏文云復次如過去世中下第三章一偈次破其第三亦作不作非作準此硫文今文應云後一偈合破亦常常亦有亦無非有非無二句也故論文云若共若不共是皆不然也言下半正明等者下半正明過去我不作今我也言明我遍等者案琳疏云外人明等也言又釋離身既無等者案曇影疏云第三偈言離身既無更不過二若即身若都無下當破也所言若都無者若猶及也言餘二章破如文可解者案碩疏云上半作滅難汝義我是常身相生滅無常何得身即是我耶故知身不得即是我也下半作人法顛倒難受即是法受者人法即是人便成人法倒亂故不得以受即為受者準之可悉而論云但身者案百論上卷破一品經云非但是為身疏主解云此云非但者非是也準此應云但身者是身也疏若離身有我下此第三重破離等者言如莎提比丘等等者成實論第二卷立論品末云沙提比丘説生死往來常是一識準之可悉言一者如本住等者案此論第二卷本住初長行云有論師言先來有眼等法應有本住因是本住眼等諸根而得增長今取意引之疏長行釋總別二章等者言如人浣衣時下等者浣者胡管反漱也刈者魚廢反取也絶也疏問曰下第二救等者言有用者有二種用等者案康疏云初明舉喻明罪福依我我有所依之用我有用以此二義故非無用也故知者應是起業因緣者知者能起諸業故業因緣者又云知者是我此我能起諸故名起業因緣者有人云故字屬上句也罪福是作法者是我所作法也有本云知者應是我從起業因緣屬下文亦可然也作者是我身是我所用者我用身作罪福業我是能作罪福是所作我有用準此疏文於法説中有二初明所依用須知者應是下明造作用也喻合準之而言繫者玉篇居的反未燒者也字書士軌也疏復次若有顛倒下第五總破有我等者言若有顛倒等者案琳疏云若過去有我復作今世我則顛倒過父子一我也言遮通者外云等者案碩疏云若謂無我等者此是取外人意外人反過論主汝若言我計有實我有上過者汝佛法中説五陰相續名之為我亦有如上過不應獨破我也文云無我五陰者此是三藏中説佛無我但有五陰和合相續假名為我但有名字為破外道實我彼今執此為過汝亦有此假名我豈不同前過耶論主彈云不然明三藏中雖説五陰相續有假名字我而有興廢故有時用有時不用但衆緣和合則有用有假我名字此則興衆緣離散則如苦酒既有時用有時無用則無定法豈有常為破斷見不識罪福者説有假名此則有用若為常見有無我即是無用故無上過汝計有一我始終常定故有如上過準之可悉疏是故當知下生起第二等者言前第二句等者案上科文云就初文三前六偈破常有句次四偈破斷無句後一偈合破亦常無常亦有亦無二句準此疏文今言第二句者四句之中第二句也言計過去世四句皆言等者案此品初文凡有二偈初偈立過去四見謂我於過去世為有為無為有無為非有非無後偈立未來四見謂我於未來世為作為不作為作不作為非作不作又案碩疏云前偈破我過去是有破過去我作今我義今破過去我是無過去我不作今日我亦不可準之可悉言故不作之言等者述義解云上釋為有句説竟今釋為無之句也次三偈別破等者案碩疏云第二偈明相離過昔不作今離昔有今昔我滅前今我自生後也第三出相離有大過則成斷滅前時之用無復感果之功因既滅不得果則失業行果報義過去之我既今我豈不他此此受此不可也第四偈重出過上半本無今有過下半明無因過昔不作無因耶準之可悉疏復次如過去世中下第三章等者案碩疏云此偈釋破我於過去世亦有亦無非有非無牒有無二句既不成下半例破餘二句亦懷偈云若共不亦有亦無若不共即非有非無此兩句亦同前過若前有無兩句成可有亦有亦無前兩句不成汝義第四句還是第三句非有是亦無非無是亦有若第三句成可有第四第三既不成故第四句自壞也疏復次今生死無始下生第二周等者言佛為聲聞等者案雜阿含經第五卷云佛在毗舍離獼猴地中為在學地阿練若比丘説法云比丘當知生死長遠無有能知其根源者琳法師解云佛為令衆生於生死起厭離故説生死長遠無始而凡夫不解佛意執有無始則是常見準之可悉言光宅云等者述義解云衆生無頭云衆生無始也頭猶始也言開善云始於無明初念等者案琳疏云他云無始無明始盡初念而言無始者無復始於此者也言地論師云等者述義解云以彼論云作無始觀故云如此也違真起妄猶舉也言初偈意云等者案碩疏云今求往來生死之人不可得誰於無始中往來六道若有往來有可有無始生死今求不可得無往來者豈有無始耶言第二偈舉初句等者案碩疏云復次今若無有常下第二偈例除為兩上一句牒前破常無始是常無始不可得故無有常也下三句例破餘三句見若有常可有無常等三句既無有常三句亦破準之可悉疏就初五偈為四等者言初偈意明等者案碩疏云上半偈借後世破有邊若有邊即斷滅那行有後世而今有後世故非有邊也下半借後世破無邊無邊即是常常法始終是一無相作義那有後世而有後世故知非無邊也言第二偈明等者案碩疏云標正見章門即是借相續義破邊無邊相續不斷故非邊念念滅故非無邊小乘中相續生滅離斷常名為正見如此也言初偈明若先陰壞等者案碩疏云若先世陰滅壞壞故無所因則無後世世間便有邊有邊即斷滅也言次偈明前陰不滅等者案碩疏云若先陰不壞不壞則始終常一亦無有因前生後義如是則世間無邊無邊墮常見而今現見有後世相續不斷故知非是邊與無邊也言三災洞盡者述義解云洞者消也通也疏復次如四百觀論中説下等者言付法藏經云提婆菩薩等者四十二字缺言例如龍樹智度論第十八卷歎等者案智度論第十八卷釋般若第二十如讃般若偈説般若波羅不顛倒念想觀已除言語法亦滅乃至廣説凡有二十行偈今指此文慧影師解云明此般若其德特尊能出三世諸佛等四種大人故就體相中應須讃歎準之可悉言但龍樹等者案馬鳴傳云龍樹菩薩南方之照韋羅法師西方之𭫒鳩摩羅羅陀法師北方之善馬鳴菩薩兼三方於東方又云鳩摩羅陀韋羅二法師善業三藏不信大乘也言偈意明等者案碩疏云此明若具真法如行説者及聽者三事具足生死無邊便有邊若無三事邊而無邊邊無邊出兩緣也真法者即無可得無所得無依深無生滅法説者即無説無示聽者即無問無得具此三事也而言答其説法者等者三十字缺疏一切法空故下論有三分等者言生起來意具如初品者指初牒明論章段開合尋之可悉言又依攝大乘論等者案梁攝論第十二卷釋云聲聞乘有上及大乘故菩薩乘無上以無別乘勝大乘為體於大乘智為上首故由此五義故二乘智與苦薩智有差別言又接此邪見品生等者不暢者玉篇敕亮反漢書音義曰暢通也廣雅暢達也長也充也蕩者玉篇達朗反説文滌器也搖動也疏瞿曇大聖主下第二推歸於佛等者言如百論云等者案彼論下卷破空品內曰雖自性空取相故縛修妬路注釋云一切法雖自性空但為邪想分別故縛為破是顛倒故言破實無所破譬如愚人見熱時炎妄生水想逐之疲勞智者告言此非水也為斷彼想不為彼水如是諸法性空衆生取相故著為破是顛倒故言破實無所破今略引喻説文疏主解云注為三謂法譬合法説如文譬説中舉愚人者對上外道呵論主若空而破是為癡人是故今明愚人見炎生於水想外道顛倒無神見神見法無空見空今欲止其水想實無水可破此是但除其病而不除法謂病故見法無法可除名不除法準之可悉言一者釋迦等者案十二遊經云昔賢劫之初有一昔薩作大國王護國與弟出家學道遊行深山求覓師故見一婆羅門性曰瞿曇因從學道形體改常復歸本國無人識者謂為小瞿曇菩薩於城外甘蔗園中以作精舍坐禪行道王問曰汝無子何次王位菩薩答曰命在須臾何陳子孫王即殺之大瞿曇悲泣取土中餘血以泥團之持著山中分作三分著左右器願曰此道士若有其識天神當使血作為人却後十月左即成男右即成女從此已後經八萬四千二百一十士為摩迦城王於是立瞿曇姓準之可悉中論疏記卷第八之末夫以尋師於千里典賁之所著求法於百城遍照之所宣是以名賢傷佛日暉沒屢設傳法莚後生悲法輪榍脫常增泥習勤於是貧道猥當行撰謬事復述是以集衆師異説勒成八卷所恐每文違於本疏朋友難會負譏白骨所冀同賢誹謗不及良是自為不敢示他然誡罔像若契先望謹誓願正觀之光耀於三千中道之風扇於百億廣及四恩一切含靈同寂二輪俱歸不二焉起延曆二十季迄于大同元年了
