body:
  text: 中論疏記卷第五之本疏第四卷去來品集衆異説不敢和會疏問二十七品為有次第等者約此品由來大文有二初明來意後辨品名初中有二即問與答此即問也此問大意謂此論凡有二十七品若有次第以不若言無者一切聖人則顛倒説法若言有者何故次觀因緣品有觀去來品耶疏答一切經論等者此下第二答於中又二初總辨一切經論皆有次第後別明次第差別就初次第差別中又二初總標二種次第後隨標別釋就別釋中又二初明隨根次第後辨隨義次第今隨難而解釋見次可悉言而答一切經論等者案硯疏云問諸品來有次第不答顛倒亂起無有次第起則隨破有何次第耶雖無次第而有深意準此疏意應答言一切經論隨宜有次第有不次第何言必有若如此者應是定執然今意者隨宜有次第不次第是也隨根次第釋意如此也疏隨根次第凡有三義等者此下別明隨根次第凡有三義言一歷法次第等者案硯疏云一者明菩薩歷法觀行故來所以前觀因緣今觀來去準之可悉言去來乃至涅槃者述義云從淺至深謂始觀世間最初之淺事終觀出世最極之深道也二者衆生取悟不悟等者案硯疏云三者根有利鈍自有又聞觀因緣而不悟聞破去來而得解所以前觀因緣今破去來也所言開張者述義云張猶施也言三者欲釋等者涅槃經第二十七菩薩本業瓔珞經下卷淨名大品等諸大乘經皆有此文如上所引問第三義何是隨次第耶答隨聞佛經略説而不得悟之人聞論主廣釋即悟故是隨根義也疏隨義次第凡有七門等者此下第二約隨義次第解釋來意言一明八不為論大宗等者案硯疏云問去來何故繫因緣後答因緣辨不生則解八不之始去來明不去則釋八不之終破始洗終中間自淨是故因緣之後繫以去來準之可悉所言領者猶解也言二者上破四緣等者所言通破一切法者毗曇立四緣攝一切法盡疏主顯此意云失四緣也通為無為但四緣果是有為法準此疏意上破四緣通破色心不相應法及無為法故云總觀也言舉下之色者有本云餘下是色謂如人靜坐真是人耳正動一足便名去者舉足所履以為去處謂只去者舉足下足名之為色不通餘法故名別觀也言三者破於去來等者所言數人但有一種三世者如此論第三卷觀有無品云若法定有有相則終無無相是則為常何以故如説三世者未來中有法相是法來至現在轉入過去不捨本相是則為常乃至廣説琳法師疏云如説三世者此是薩婆多義明未來性有現在事有過去冥伏有有性不失故是常見也道基師毗曇章第五卷三世義中解云流轉義去義是世義也故婆沙云去義是世世別不同乃有三種謂過去未來現在有為諸法已起已滅名為過去已起未滅故曰現在未起未滅稱之未來譬如眼根見色色滅説為過去見色未滅是説現在未見色者名為未來又云一切有為有漏無漏五陰是三世體故婆沙云三世五陰是世體性乃至廣説準之可悉言成實論有二種三世等者案大乘記第十一卷三世義中云三世者過去未來現在也世者總代謝之一期也過於現相曰過去生而已滅者也未嘗現相曰未來應生而未生者也法體現起而未謝曰現在也斯則過於現相明其體無是時俗遷易不得常在而是曾有因義不失也稱為未來明體未有而是當有果義非無也然則過去未來體是無為而有有為義現在之世體是有為而有無為義故二世體無不得言常皆有有義不所謂斷現在炳然豈得邪見言無故三世理明即正見因果也三世法體不出三聚以此三聚有代謝不得故名三世又云三世之名或云三際際者限極義不相參監也而三世隔別故言三世但經稱前後際釋義不同一云過去名後際未來是前際以生滅論之方向未來也二云過去名前際未來曰後際以次第前後義未來在後故故經云從無明前際未後際亦如是知未來為後乃至廣説準此記文今言成論者是開善師也述義云實法三法者過去之法過去已滅不成現在餘二世亦爾過去法止過去不成現在故也假名轉三世者就實法滅假名相續也過去之法應滅不滅而成現在法故言從過去等者初念滅是過去第二念生是現在第三念是未來此就生滅門明也初念轉作第二念故名過去來現在第二念轉作第三念故名現在轉作未來此就假名門明也如識滅於前想生於後以轉變續義轉前作後世淡海記亦同也言四者有二種觀等者所言青目二周等者約重牒長行初約真諦門以釋八不即是理觀次復次萬物無生以下約世諦以解八不即是事觀所以作此理事二觀者以見龍樹論主因緣一品作理觀去來品作事觀故但前品長行明以本顯釋今明以子述本故云爾耳言五者望成實義等者如彼第二卷二世無品云又汝言不應得觀內心內受者有二種心一念念生滅二次第相續用現在心觀相續心續非令猶在聰法師云下失念處難一念念生滅二次第相續者有二解一小莊嚴解約一心體有三力一生滅力二成就力三相續力今不用此解三力者為當三心為三力為當一念為三力此二種別可能今所習約一心體為語約曾有遍名次第相續即是有我約今無邊為語名念念生滅即是無義用現在心觀相續心者解者不同一小莊嚴解現在觀成相續假前實法心乃至廣説今案硯疏云論又有三種去來一則假名道中有來有去實法道中無來無去道燒爛去來假名故有實法道中無如是事一者世諦有來有去真諦無來無去三者應身有來有去法身無來無去準此等文實法道中念念生滅故無去來假名相續故有來去然前因緣品破生以辨無生難念念生滅今破今破去以難假名相續也述義云前品破生者破能生之實法也此撿無去者破所生之假義也而言實法假名者案大義記第七卷假名實法義中云五塵及心并無作此之七法名為實法撿世諦有唯此七法也因成相續相得此云假名乃至廣説也準之可悉言六者上因緣品末等者如彼偈云復次若果從生是緣無自性從無自性生何得從緣生果不從緣生不從非緣生以果無有故緣非緣亦無疏主釋云初一行半結無所生之果次半偈結無能生緣非緣故云結無能所生也言外人云等者案硯流云二者從前偈生汝若以四門求生不得故生不得生證一切諸法皆空我亦以三時有去證一切諸法皆有也是故因緣之後辨去來也準之可悉疏問觀何法去來等者此下第二釋品名目文中有二即問與答答中有二初舉前顯後以釋品名後別約三義以釋品名初中言上因緣品明觀三種因緣者四緣十二因緣通因緣觀此三種因緣故云名觀因緣品言今品亦明三義者一約因緣辨不去來二通觀一切法無去來義三觀即事去來辨無去來義故云亦明三義也疏一者上品明十二因緣不生不滅等者此下別約三義以釋品名三義為三初約十二因緣辨無來去義次約一切法明無去來義後約即事以辨無去來此文初也有二初正明品名義後問答顯説初中言今觀此去來者案康疏云觀是照察之名去來是所觀之法從此向彼為去從彼向此為來此就人釋睿法師云過住為去向住為來此就法釋也品中先破人去來後破法去來故先偈云已去無有去未去亦無去後偈云所有行止法皆同於去義也雖品名觀去來而偈文但觀去者言去即兼來也亦以此見為去彼見為來彼見為來雖是一名義二種故云觀去來品準此疏文五因謝滅名之為去七果生死是名為來照察此去來故云觀去來品也言故十二因緣等者引大經第二十七卷并華嚴經文意證成五因七果義也疏問何故觀因緣去來等者此下第二問答顯釋此中有八番問答今此第一間答也答中言一世俗人等者案琳疏云凡情所見動靜去來以為實法準之可悉述義云而不知生等不知從無明來向涅槃也言二者九十六術等者如重牒長行云有人雖聞六種破諸法猶以來出成諸法來者言諸法從自在天世性微塵等來出者還去至本處準此論文外道摩陀羅論師言自在天造作衆生還沒彼處名為涅槃毗世師論師説微塵是常能生一切物是涅槃因僧佉説自性是常能生諸法是涅槃因而言不知因緣本末者述義云無明為本老死為末又過去二因為本現在五果為末又因緣為本衆生為末也別記亦同也言三者五百論師等者取智度論第六十四卷信毀品文意準上可悉言四者譬喻跋摩等者述義云梵語鳩摩羅陀此云日出亦云譬喻此二或是人號或是論名此經部宗中一人也今案慈恩唯識疏云譬喻者經部本師佛去世後一百年中北天竺翅羅國有鳩摩羅多此云重尊造九百論時五天竺有五大德師喻如日出明道世間名日出者以似於日亦名譬喻師或為此師造喻鬘論集諸奇事名譬喻師言跋摩者語存略具足應言訶梨跋摩此云師子鎧造成論師即本是鳩摩羅多弟子具明如上問玄義鳩摩羅陀此薩婆多部慈恩云經部本師云何相違答見聞不同不須和會唯所疑也鳩摩羅陀實是薩婆多部師雖然師子鎧即經部之中一人以是為經部之中一人師子鎧之本師故云經部本師也言五者學大乘人等者方廣道人此四五二計取初牒長行云聞大乘法説畢竟空等文意具明如上準之可悉疏問何故破此五人等者第二番問答言經云十二因緣等者如大經第二十七卷佛告師子吼菩薩言十二因緣不生不滅乃至以是義故我經中説十二因緣其義甚深無知無見不可思惟又第二十三卷云如彼駛河能漂香象煩惱駛河亦復如是能漂聲聞緣覺唯佛菩薩能得底故故名極深乃至所言底者名為空相準此等文今言十二因緣河深難得底者第二十七卷文所言底等者第二十三卷文並取意略引之疏問二乘人亦了十二因緣空等者此下第三第四二番問答言答二乘但知十二緣空等者如大經第二十七卷佛告師子吼菩薩言聲聞緣覺見一切空不見不空以此義故不得第一義空不得第一義空故不行中道無中道故不見佛性疏主釋云此出不行中道之人前直云見一切空不空不行中道而未知是何人今出其人即是聲聞緣覺言大士達十二緣空等者又大經第二十七卷云佛性者名第一義空第一義空者名為智慧所言空者不見空與不空智者見空與不空乃至空者一切生死不空者謂大涅槃疏主釋云次智者見空下為緣開用明智者能見空與不空乃至我無我等次空者下釋謂生死是有所死義故云空者一切生死也涅槃即無所有義故云不空者謂大涅槃也準之可悉別記云第一義空名為智慧者有二義一者不見空與不空故云第一義空也如此即不見慧與不慧強名為慧也二者第一義空者正性也名為智慧者果性也今謂不然違疏説故也疏問就此義宗等者此下第五第六二番問答言凡有三種二諦等者述義云初一義依大經後二義依大品等般若教也今案此意大經欲稱歎涅槃妙有故生死虛妄空名為世諦涅槃妙有名為真諦大品等意欲對治有執故若生死若涅槃假令有一毫者皆為世諦生死涅槃一切皆空名為真諦也言虛妄本空名世諦者別記云約無定性無實義名世諦也非是本性空也言一者大品文十八空云等者如彼經第八卷初一佛言復有摩訶衍所謂內空外空內外空空空大空有為空無為空畢竟空無始空散空性空自相空諸法空不可得空無法空有法空無法有法空乃至第一義名涅槃涅槃空非常非滅故大論第三十一卷釋初品中釋十八空第四云第一義空者第一義名諸法實相不破不壞故是諸法實相亦空何以故無受無著故若諸法實相有者應受應著以無實故不受不著若受著者即是虛誑復次諸法中第一法名為涅槃如阿毗曇中説云何有上法一切有為法及虛空非智緣盡云何無上法智緣盡智緣盡是則涅槃涅槃中亦無涅槃相涅槃定是第一義空間曰若涅槃空無相云何聖人乘三種乘入涅槃又一切佛法皆為涅槃故説譬如衆流皆入于海答曰有涅槃是第二寶無上法是有二種一者有餘涅槃二無餘涅槃愛等諸煩惱斷是名有餘涅槃聖人今世所受五衆盡更不復受是名無餘涅槃不得言涅槃無以衆生聞涅槃名生邪見著涅槃音聲而作戲論若有若無以破著故説涅槃空若人著有是著世間若人著無別著涅槃破是凡夫所著涅槃不破聖人所得何以故聖人於一切法不取相故慧影師疏云第一義空者已下明諸法實相即是第一義此實相中都無一法可得而大涅槃經云第一義中有三種樂謂涅槃佛性實相等樂者是修相道説此義據行人得此法時能得此三樂就實相道中實無樂可得又能生三樂故也如阿毗曇説已下明欲以小況大取彼云無上義成證涅槃是第一義故引成也答曰有涅槃是第一已下此意明就世諦中實有涅槃是第一無上法也是有二種已下次釋有涅槃義何物為有二種涅槃也不得言涅槃無已下所以言無者有二義一以從緣生故説無二以除著故説無此並是即法説無非是世諦中涅槃事等亦實無也言涅槃經云等者如彼經第二十六卷末説十功德之中第九功德佛告高貴德王菩薩言不但因是三昧而見空也六度亦空如來亦空大般涅槃亦空是故菩薩見一切法皆悉是空是故我在迦毗羅城告阿難言汝見迦毗真實而有我見空寂悉無所有汝見釋種悉是親戚我修空故悉無所有今略引之疏問此品但據即事動靜等者此下第七第八二番問答也言上品云為已習大乘人等者如初牒長行云又為已習行有大心想受深法者以大乘法説因緣相所謂一切法不生不滅不一不異等畢竟空無所有元康師云此為菩薩宜聞不生不滅故説因緣不生不滅準之可悉疏二者通觀一切法無去來義等者此下第二約通觀一切法無去來義以釋品名也言一者世間人等者案琳疏云一者凡情所見動靜去來以為實法準之可悉言寒暑往來者千字文云寒來暑往注曰冬氷夏條匪虧令著春蘭秋菊無記終去泛往泛來乃氣序之𢛸事受收藏故民生之常業者也言二者外道等者案琳疏云二者外道謬存一切萬物從自在天冥性而來還反為去準此疏文今言從自在天而來去者摩陀羅論師計也言復云無因而來等者如提婆論云第十六外道無因論師作如是説無因無緣生一切拘無深因無淨因乃至廣説準之可悉言三者二世有部等者案琳疏云三者三世有部法從未來流至現在稱之為來現法謝往呼之曰去準此疏文今言二世有部者薩婆多部言二世無部者成實師也所言二世者過去未來也今案道基師毗曇章第五卷三世義云小乘法中薩婆多宗三世皆有故雜心云一切世悉有不達其所應牟尼之所説聲聞僧無佛長行釋云有三世蔭婆多此立一切有也大義記第十一卷云二世無者是形今現時二世體自無準之可悉言五者成實大乘義云等者所言成實大乘義者案聰法師章第一卷云説四諦制立有五重一制立乃至五大小異乃至第五大乘夫人經明四聖諦明義廣達而不別制立是明界外變易生死故成無邊聖諦大經亦爾四諦本是正化聲聞於大士是通行之境故於大乘非始制立不明而已明其界內與小乘不異但其變易以無漏為因無明為緣而亦不取前意準此章文釋成實論章疏之中有明大乘義之處今指其處故云成實大乘義不須異釋也言從無明識窟等者述義云彼云三界外有識窟流出衆生來入三界故一切衆生以識窟為源有接識佛在識窟邊若受化者即化佛去不受生死不受化者流入三界後時厭苦樂求解脫修空斷惑惑盡解滿凝然常住名涅槃佛也言七者攝大乘師明等者述義云六道衆生皆從本識來等者本識任持六道及三乘種子至忍處定其根也從清淨法界等者所言清淨法界者中道理也就本其佛與十二部經皆從理起應知所言附者依也言聞熏習漸增等者以聞熏習熏本識時其中解性漸漸增長生死果報漸漸損減然解性也染在煩惱中自性清淨心即不如是唯此解性及與萬行為報身佛即是正因自性清淨心即是緣就遠近之解果與解性是同類故若就法佛者自性清淨心便為正因解性與萬行乃為緣因如言隱為如來藏顯為法身也別記亦同今案三十六字缺疏三者如文明觀即事去來等者此下第三約觀即事去來以釋品名也言故肇師物不遷論云等者如彼論云中觀云觀方知彼去去者不至方也元康師云中觀者中論一名中觀論以此論中明觀因緣等法故也然彼論中無有此語應是取去來品意耳去來品云已去無有去未去亦無去離已去未去去時亦無去今取此意故云去者不至方也述義云諸法本來不生不滅故無去來又推假云實為即為離從來無常畢竟空寂後無去來而撿中論無有此語應是取去來品意耳觀方知去者就俗諦言既至既去去者不至方者就真諦言不去不至何以故去義至義不同立故問去者以初步至以後步至若以初步至者立於初步若以後步至者誰當得至答第二步依初步而去問第二步依初步者其於如何成步而依未成而依若成而依者已成法何為更依若未成依者誰得依若無其體必名無耳若爾誰依故知去者不至方也而言物不遷論者元康師云莊子云凡有貌像色聲者皆物也公孫龍子名實論云天與地其所産焉物也毛長詩傳云遷徒也人謂物皆遷徒變易無常今明物本不遷當世各有言雖變常義仍合道故云物不遷論也有人解云此文取一品初後意而引之何者初云已去無有去來去亦無去離已去未去去時亦無去來長行云如先有人有城邑得有所趣後長行云如是思惟觀察去法去者所去處皆相因待故云爾耳言又云江河競注而不流等者如物不遷論云然則旋嵐偃嶽而常靜江河競注不流野馬飄鼓而不動日月歷天而不周復何惟乎元康師云江河者有本云江海不及河也日月歷天者有本云麗天也言歷易見也日月周旋故言歷也麗者著也前水非後水後水故競注而不流前日非後日故歷天而不周也述義云既無往反至復性乎者第二示不動相也言江河競注等者本來無有性競注故又有假競注而本來常不流下句亦爾若依世諦是為競注而依真諦為不流也日月周旋故日歷天如外典説日月周天有三百六十五度亦有一度為四分中之一乃以三千九百三十二里為一度也日於一日夜但行一度月於一日夜行十二度若就日言以十二月一周天竟餘有五度四分之一正以一度為五日已四分之一是為入六日之一也十二月中六月小也有餘六月通前五度四分之一至于三歲而成閏月然日月之道橫徑速行故一月行三百六十度而一周天日遲行故一年行三百六十度而一周天問四分之一此一分者為在中間為在前邊為在後邊答在中間何者日月徑行行此四分之一度時其三百六十度中一度若日於一日夜但度三分不得度一分若同但度十一度三分不得度一分即以此餘一分以此餘一及集小月一日成閏月也今略引之所言注流者玉篇上之𭮥反濱也猶寫也私案注猶流也又音徴𭮥反猶記也下旅周反水行也求也下也猶移也放也猶行也猶失禮也𢲟也覃也未也化也言答近而不可知等者引不遷論文以答之言近而不可知等者元康師云近而等者動靜不二物之性也近對目前而人不覺今傷歎之故云爾也述義云一道真理物之性也近對目前然人不知今傷歎之故云爾耳言言動而靜等者此亦論文元康師云若動而靜似去而留據言教則如動如去也據理實則如靜如留也可以神會不可以事求者可以般若神心契會不可以言迹事相而求也述義云交據云教如動如去正望理實是靜是留可以般若神慧契會不可以云迹事相而求之準可悉言請陳近喻等者案注法華經序品云佛此云曰覺有一夕之寢必有一朝之覺且有大夢然後有大覺覺亦悟也物無不惑聖無不悟也準之可悉疏問前云此品釋經中無來去義等者言前云此品等者上隨根次三義之中第三義云三者欲釋大乘中要觀經中或就無生無滅明中道觀行或就無來無去明中道觀行今指此文故云前云也言淨名經云等者如彼準中則文殊問疾品維摩詰云菩來文殊師利不來相而來不見相而見文殊師利云如是居士若來已更不來若去已更不去所以者何來者無所從來去者無所至所可見者更不可見羅什曰若默然無云似賓主不諸讃云善來者欲明賓來得會主亦虛受故云時維摩詰云善來文殊師利也釋僧肇曰將明法身大士舉動進止不違實相實相不來以之而來實相無見以之而見不來而能來不見而能見法身若此何善如之竺道生曰既以體理為懷來則於其為不來相之來矣有不來相之來者善之極也故云不來相而來不見相而見也云文殊師利云等者竺道生曰如是者請前理而爾也若者設使來不能自表於不來更來不復更來來為不來相居然顯矣體之無功我有何善哉云所以者何等者竺道生曰來本在於來者來者尚無所從而來況來者可得更來耶以去對來相明也云所可見等者釋僧肇曰明無來去相成淨名之所善也夫去來相見皆因緣假稱耳未來亦非來來已更不來捨來已未來復於何所有來去見亦然耳其中曲辨當求之諸論準此經文今云不來相來不去相去者淨名之辭次言無來所從來去無所至者文殊之辭述義云淨名言善來文殊汝以不來相而來故我亦以不見相而見唯從佛所至方丈故名去就方丈見時是來也疏主釋云時維至而見此第三淨名慰問云不來相而來者此文非但近是賓主交言以相慰問遠貫一經説通衆教故前以此言標其篇首所以標此言者為時衆諸文殊從菴園而來及與淨名相見故今明文殊來是不來而來見是不見而見異凡夫二乘人也以能不來而來不見而見故為善之極也文殊至可見第四文殊酬答成淨名之意也若來已更不來者此明三時無來義也來已別來事已謝故無來也又言去已更不去者菴園望方丈則見文殊有去方丈望菴園則見文殊有來故明去來義也來者無所從來者此明菴園空也去者無所至者此明方丈空也準之可悉言涅槃經云等者如彼經第二十一卷德王品一云爾時琉璃光菩薩與八萬四千諸菩薩俱持諸供具來至佛所修敬已畢却坐一面爾時世尊問彼菩薩善男子汝為到來為不到來琉璃菩薩言世尊到亦不來不到亦不來我觀此義都無有來疏主釋云爾時琉璃光菩薩與八萬下此是第六答正明菩薩來事宛然而無所來此可謂是不來而來來既如此聞亦復然故此來即是答問前問即是為來故問今菩薩來亦是為答問故來也爾時世尊問彼菩薩下佛問此問即同德王前問此是德王問正作已未難為到來者即是已來為不到者即是未來已到則無有去來若未到即是未來未來中亦無有來既已未中無來云何言從彼來耶琉璃光答佛云到亦不到亦不來者此即然佛前問明實如此到亦無來不到亦無來故都無有來也法寶師云爾時至一面第二明琉璃菩薩到來也爾時至到來第三徴問來義也琉璃光已下答也此光於到不到中未來相不可得也準此經文今言琉璃光來者明菩薩到來言佛問云等者明佛徴問來義言答云到亦不來等者明菩薩答也而云到是也來不來不到是未來不來者疏主加增非是經文今取意略引之言次大品經者者如彼總第三十卷云是時薩陀波崘菩薩從三時起已不復見佛作是念是諸佛從何所來去至何所我不見諸佛故復惆悵亦樂誰斷我疑復作是念曇無竭菩薩久遠已來常行般若得方便力及諸總持於菩薩法中得自在多供養過去諸佛世世為我師常利益我我今當問乃至我今問大師是諸佛何處來去至何處大師為我説諸佛所從來所至處今我得知知已亦常不離見諸佛爾時曇無竭菩薩語薩陀波崘菩薩言善男子諸佛無所從來去亦無所至何以故諸法如不動相諸法如即是佛乃至離是諸法更無佛如諸法如一如無分別善男子是如常一無二無三出諸數法無所有故譬如春末月日中熱時有人見炎動遂之求水望得水於汝意云何是水從何池何山何泉來今何所去若入東海間海西海北海耶薩陀波崘言大師炎中尚無水云何當有來處去處曇無竭菩薩語薩陀波崘菩薩言善男子愚夫無智為熱渴所逼見炎動無水生水想善男子若有人分別諸佛有來有去當知是愚夫何以故諸佛不可以色身見諸佛法身無來無去諸佛來處去處亦如是乃至汝若知語法佛及諸法無來無去無生無滅相必得阿耨菩提及方便力乃至薩陀波崘菩薩見曇無竭菩薩時心得悅樂譬如比丘入第三禪大論第九十九卷云此中曇無竭自種種分別譬喻説所謂如春末月見炎乃至是人不分別諸佛若來若去如炎等中雖無實事亦能誑人自生苦樂力諸法亦如是雖空無所有亦能令人得苦樂憂喜事夢等法令苦樂亦如是復次佛有二種身一者法身二者色身法身是真佛色身為世諦故有法身相上種種因緣説諸法實是諸法實相亦無來無法是故説諸佛無所從來去亦無所至若人得諸佛法身相是名近阿耨菩提未得一切智故名為近以相似故般若名諸法實相若能如是行是為行般若真佛弟子真佛弟子者得諸法實相名為佛今略引之述義云薩陀波崘此云常曇無竭此云法尚亦云法涌也淡海記云此菩薩欲聞般若而常落淚故云常啼也言次智度論解道品等者如彼論第十九卷釋初品中三十七品第二十釋八聖道分處云正業者菩薩知一切業邪相虛妄無實皆無作相何以故無有一業可得定相問曰若一切業皆空云何佛説布施等是善業殺害等是不善業餘事動作是無記業答曰諸業中尚無有一何況有三何以故如行時已過則無去業未至亦去業現狂去時亦無去業以是故無去業問曰已過處則應無未至處亦應無今去處應是有去答曰今去處亦無去何以故除去業今去處不可得若除去業今去處可得者是中應有去而不然除今去處則無去業除去業則無今去處是相與共緣故不得言今去處有去彼次若今去處有去業去業應當有今去處離今去處應當有去業問曰若爾者有何咎答曰一時有二去業故若有二去業則有二去者何以故除去者則無去若除去者今去處不可得無今去處故亦無去者復次不去者亦不去故無去業若除去者不去者更無第三去者問曰不去者不去應爾去者何以言不去答曰除去業去者不可得除去者去業不可得如是等一切業空是名正業諸菩薩入一切諸業平等不以邪業為惡不以正業為善無所作不作正業不作邪業是名實智慧即是正業慧影師正業中有三一正業二問答破執三結成正業問曰已下即引佛語為難佛説云若善惡等皆有作業及無作業無記但有作業不得報故無無作業如造井橋等後時既不更作而能得報故但有無作業如是等義云何説言一切業相不可得也答曰已下正明破業相若使深行菩薩即懸知諸法無有自性從緣生故即體皆空不假拆法若鈍根小行之徒既懸解未深要假拆法後得解故推而示之故以行為喻一明三業二明去業如欲行去時若行時已過已過即無去業時若未到亦無去業現在不住亦無去業若中論言去者此中乃云去業皆不可得也一云去業者如正動腳行時名去業去處者如腳足所行履處也去者即是假人以此三法互相推覺覓求去業等不可得也問曰已下問意云若已過處亦應無去未至處亦應無去而今現在去處時應有去耶得云悉無去處及以去者向先建三門就三世業等不可得今執家執現在去時業應實為難也答曰已下答意云今去處亦不可得何以然除去業去處不可得除去處去業不可得今既衆緣和合故有行者行步所行地等衆緣和合故始名去若法從緣和合生即體是空以此空故去處去業皆不可得如現在去時始正移亦未是去若更移彼足去時已過復非去是故今去處亦無皆不可得也復次已下若爾者即有二去去業去處皆各有一去若有二去者即是二行者若除去者即無去業若無去業即無去者今生法空故無去業又亦此和合故有去故就此去者等相推也復次已下此就情責破云若除去者即為一去者即為第二去者去者已去故除之未去者未去故除之今既除此二去者更無第三去者生者無故去業不可得故間曰已下問意又執云若不去者可言無去若今去者那得言無去此現在有去義也答曰已下破義等一一臨文當説可清淨智者實相智也今取意略引之別説云菩薩正業者謂六度行也是大乘故也三十七道亦是通行也是化他德邊也是小乘故也約小乘者三十七道是正業故今謂不爾違論文故今言菩薩正業者八聖道之中正業也言席卷者述義云席猶陳也欲攝此品文故一二之經引將成故也淡海記云席卷此文來者有二意一者如席卷易此文亦易成二者如席卷之數重此文亦重多成也曇捷字釋云席者辭亦反鄭玄曰席猶鋪也筵也疏品廣分為七等者言從能破門等者述義云唯由第一之三時門破故云從能破門非謂四門皆從能破門以為名也言四有無門破者就七門中配定不門定者有也不定者無也案碩疏云就此品內有二十七偈分文不同多有形勢今且為七段第一有十四偈破去與去者第二有三偈破住與住者第三有四偈就一異破第四有四偈就有無定破準之可悉言解云三世若無等者逆義云猶是心不可知故云眼不應見也別記亦同也能見與所見為一為異如此求覓故云故就一異後眼所見也言病乃無窮等者今以有無欲窮其所執故在有無門破也言次雖有四門等者述義云以四種三時門破為初周後別別三門為一周故云合之為二也言後周為無為一切故者有無門中無即無為法兼法兼故名破無為然未詳次也言雖有四儀等者謂去法去者住法住此中去去者為動住住者為靜也疏問曰世間眼見三時有作等者言上品求四緣生果等者言上品等者案碩疏云前道眼見劫初穀不生不滅乃至不來不出外人即道汝眼見穀不來不出證諸法皆空我亦眼見三時有去有來證諸法皆有是故有第一立義準之可悉問前阿毗曇即是舉經論為救此中何故不舉經論為立耶答許亦無邊而略有二義一者諸師道彼前舉四緣是能生諸法是所生能生為因所生為果既洗四緣洗諸法即是破因緣果彼便生忿怒眼見有因有因有果那得無因無果懷恨之辭直云所見也二者前品救義但是內人此品立義別通外道何故爾無間內外道俗皆見有因有果那忽無因無果是故衆家共與此問不勞的舉一文也言略有三種一二劫等者案大義記第十一卷三世義云但此世體辨相不同大而談之不出三種謂小中大三世也小三世者三念便是現在世前念是過去世後念名未來世也中三世者三身為體令身名現在世前身曰過去後身是未來也大三世者三劫為體如賢劫名現在莊嚴劫名過去星宿劫曰未來乃至廣説述義云所言三劫者泛論三種一者小劫謂飢饉疲疫刀兵二者大劫謂成住壞三者三無數劫此從地前至十地終應知別記云三劫者有二莊嚴劫是過去賢劫是現在星宿劫是未來也是約遠而言之二者火災風災水災是約近而為言之莊嚴劫與賢劫中間起故言三世者於此中起也何者此死彼處生等也疏答曰已去無有去下等者言然直觀此破未覺其精等者十字缺言望淨名經文殊答云等者此淨名經中卷文殊問疾品文具如上明疏主釋云若來已更不來者此明三時無來義也來已則來事已謝故云無來也準此疏文今言去已更不去者此明三時無去義也去已則去事已謝故云無去也言琉璃光等者大涅槃經第二十一卷琉璃光菩薩答文謂於到不到中來求不可得也言以淨名彌勒章等者如彼經上卷菩薩品彌勒菩薩云時維摩詰來謂我言彌勒世尊授仁者記一生當得阿耨菩提為用何生得授記畢過去耶現在耶未來耶若過去生過去生已滅若未來生未來生未至若現在生若現在生無住如佛所説比丘汝今即時亦生亦老亦滅疏主釋云此明三世門破就三世內撿無一生是故無有得一生記過去是滅無內無生故得記未來未有則未有生亦無得記現在一念不住亦無有生故無得記所言一生記者彌勒在人間次生天上後下生成佛依智度論數此以為三生但現在人間已受生故不復數之後下生成佛屬於佛身亦不數也但取生天之身故云一生耳問若爾類小乘義一生天上一來人間便得道者應是二生亦得名一往來則定二生何名一生答斯義應類但小乘之人望身盡入於無餘故受二身名為二生彌勒不取身盡但下生之身既其屬佛對彼天身以為一生也述義云一生者已過此生亦過一生而成佛故指此過生名一生耳別記云以責無一生記者已受也未受也受時也已受與未受者無漏也受時是念念生滅何時受也又不離已來也準此等文今言三時者三世之時也言望經妙者述義云望此所引之經顯此品精妙之義也言長行云離去去案碩疏云已去去法則息若言猶有去法者應離去法別有運動之業耶今實不然故不得言已去也而離運動無別去法故云不然準此疏文今言動者運動也疏問曰動處則有去下等者言若作一人立義等者二十八字缺言今但救去時有去者案碩疏云彼道已去已息未起此可無去而今只動處即有去所以只離去時有去舉例如即今人義非是惑已滅解生亦非是惑未滅解生只惑滅時即是解生時解生時即是惑滅時今亦爾我非是已去故有去亦非是未去故有去只去時有去準之可悉言處有二義等者案碩疏云動處者有奢切奢論者隨此人欲向東東即是動處欲向西西即是動處切論者明只裁舉足所即是動處既舉足去即是則有去準此疏文今言一從所履處等者奢論動處即是東西也二者即自等者切論動處也言今輸已未等者述義云所言輸者猶移也避也今案玉篇如珠反盡也墮也寫也最也更也今須寫訓也言四衢八達者爾雅云四達謂四衢注曰交道四出者也八達謂之崇期注曰四道交出者也疏答曰下等言問此破與上何異等者二十六字缺言今觀四番等者逆義云正是二番而取四雙為四番耳所言三類者第一總別一類又初一問答等者第二三世有無一類三者前破等者第三縱奪一類也述義云前正破三時有去而取其一故名破去時去故三者前破去時去等也別記云四番者四章也問是一番答是一番故云四番也言如人靜生等者案影疏云如人靜座直是人耳正動一足便名去者因此動法名之為去亦名去業亦名為後將步之前名為未去足動所徑名曰已去取其現動名為去時足之所履名為去處當步之動名曰是去餘步於此便彼去然則諸法衆緣相假虛受其名折而求之無一可得而著相者皆謂決定謂有去法時亦一法若有二體應得相離若不相離直是假名何法之有準之可悉述義云餘步形此者當之足動名為正去取已去等而名餘步也言虛受者虛猶聊也言此明時無別體等者案碩疏云觀此文意似如論主借時法一破時法異但文意不爾且有二義一者躡彼前語破二者就彼義破若為躡彼前語破今明彼前道非已去未去是故去時去我去故名去時故去於去時中有去汝若道去故名去時此則無別那得此時便去於去時中有去耶若為是就彼義破今明彼道因法假名時離法無別時若爾因法假名時無別體汝時若有別體可得言於去時中有去而今時既無別體那得此時便去於去時中有去耶準此疏文二義之中今且約第二義明時無別體也述義云無體破者從所破受名以外人言無體故也有體破亦爾別記亦同也疏去時獨去故等者言此傳顯等者述義云所言傳者重也離去有去時之句既顯相離之矢故此句名重顯也今案玉篇儲攣儲戀二反執也説也移也持著也考也舍也又音豬戀反信也今須考訓也言如數論等者如婆沙論第三十八卷云行即是世世即是行是故四大犍度作如是説世名何法答曰説各之言也道基師解云此完明無別法法即世世即法法又云為止譬論師皆與世異立三世也開善師解云三世法體不出三聚以三聚有代謝不停故名三世乃至廣説準此二師意者成實婆多宗明無別時體也言如譬喻部等者如婆沙論第三十八卷云如譬喻者作如是説世是常行是無常行是無常行行世時如物從器至器猶如多人從一舍至一舍諸行行世亦復如是準之悉之若爾上句等者述義云應言上偈也言若相離者法之與時等者案碩疏云獨去有兩種一者時法若異則離去法有去時去法獨自住去時獨自去如離屋有人人從屋中去屋自住人自去也二者兩人一人自往東一人自往西今亦爾去時獨自去去法亦獨自去今但偏顯一邊故云時獨去準之可悉言有人言等者如曇影師云若爾便應離去有時時應獨去而不能然豈非咎耶元康師顯此意云離去有時此時應獨去不因去法也準此等文今言有人者應是曇影師也然述義云此説意也若時與法相離時法一時並各去之名獨去今彈意也若時法是相離時獨去之法亦獨去此非一時並去也疏第二偈二法破來意者初偈得相因等者案碩疏云意欲免前二者一者前難道若去時有去即時法為異離法有時時則無因彼則道我因去名時去於時中而去那得無因免前無因過二者前難道若時法為異時獨自去法獨自住彼則道因去名去時法將去時共去是故取意免前二者準之可悉言初偈得相因等者述義云時與法無別體故名相因以無別體不可言從此去彼也言而失去者別記云無別體故不可言由此名為去也云問此有何過等者案碩疏云汝云去時有去免前二去不然別成二種去若為二種去耶人解道去是一去時是一去故言二去若作此解不讀長行翻成彼義彼義明去法與去時共豈非翻成彼義今不爾如長行若為是二去彼自道因去有去時即是時前一去去於去時中有去故即是時後一去則有大過大過若為即是一法成二法亦一人成二人也言免者案玉篇靡辨反強也自勸強也勤也法花字釋作免字已辨反字林云脫也疏問曰二去有何咎此生第四兩人破等者言外人未覺等者案琳疏云二去過微其人未覺故致斯問也言又雖知有者等者逆義云應有二去難者外人即例難云有何咎故云著難便例也準之可悉疏答中為二等者言又本是一人等者案影疏云則有二去者者去違離要復相已為二去二者便一去與者東一者與去西西去與者亦應相離既相離巳亦當相須復為二去二者東亦如之便為四去四者遂至無量則然一人為無量人一動為無量動一時為無量時可得然乎琳法師顯此意云則有二去者去不自運由者管御既有二去必有二者故云若有二去法則有二去者然者去相離要復相須豈非二去二者便一去與者西一者與去東西去與者亦應相離還復相須復為二去二者東亦如此是一人為無量者一動為無量去一時為無量時豈有此理也疏答曰下等者述義云言其立者所言者者猶人之異名也言此不離之言等者正非於論文唯取意耳所言凡用三處者初就兩人破之偈次就外人立定有去者文後就若離於去者去法不可得奪破之偈也言論主之言等者論主之破從初至後顯然即成故云已顯於前外人之立從初至後不成顯了故云未彰於後也別記亦同之疏去者則不去此第二縱破等者言人兩釋云等者述義云此影師意也今謂不然等者彈師義也今案彼疏云去者則不去者此關去者門明無去全同前門第一偈無第三去者者言更無第三有去之者碩法師解此意云如影師所解則有六偈就三時門破去已去不得去來去不得去去時不得去此中已偈就三者門破去已去者不得去不去者不得去去者準此等文今所破義非影師義但琳法師云此偈開三時門明無去者同前門初偈此當所破義可悉言如肇公云者此物不遷論文所引令同述義云就俗諦時既有至去故云觀方知彼去也就真諦時不是至去故云去者不至方也言亦如江河等者此亦物不遷論文述義云本來無有性競注故又有假競注而本來常不流若依世諦是為競注而依真諦為不流也但彼具有四句今略引初句具明如上準之可悉疏問曰若去者去有何咎等者言但成實二師等者案染者品疏云莊嚴師明有假人體入三成部光宅師明無人入二成部攝開善無體入二成有用入三成唯此疏意莊嚴寺慧日文師明假別有人體用名故入三成部開善寺智藏師明無人體故入二成部立有假名用故入三成部故知今言別有人體等者莊嚴義無體等者開善義也疏答下二偈為三等者言下半正作無體破等者案碩疏云今更問汝為當因去法名去者不因去法名去者若不因去法名去者則有二過一違言失汝自道去者因去法名去者而復言不因去法名去者失耶二無體過若因去法名法名去者去者指去法為體去者可有體而汝不因去法名去者去者指何物為體去者則無體豈非無體過耶若因去法名去者亦有無體過何故爾因去法名去者是則去者賴去法為體去者無別體既無別體那能用去法名為去者去耶準之可悉疏第三偈各體破等者言又此句意詔等者述義云説去者有去此據外人義成耳所言此句意詔等者述義云説去詔者玉篇諸曜反詔教也告也助也道贊免也命也今須命訓也廣雅云命呼也言問前各體破等者此問大意謂者品初外人立三時有作論主則破外人則救去時有去諭主破救有四一無體破云何於去時偈是二各體破若言去時去偈是三二法破若去時有偈是四兩人破若有二去法偈準此論文前破去中二破相次今破去者何故不爾也言外人前立者述義云去者即不去等一偈此正破是何言何言立耶由有立故有破耳是故名立今案上下文此説不爾論問曰離去者無去法可爾今三時中定有去者今指此文故云外人先立等也何以然次文云青目就二法破中等也言青目就二法破中等者次上長行末云是故先三時謂足有去者用去法是事不然元康師釋云指前章末後問曰離去者無法可爾等文也疏復次若決定等者言發與去異等者所言取其異靜之義等者案琳疏云異靜之始稱之為發動足成步目之為去去是果發是因也言世間云千里之行等者如老子德經云合抱之木生於毫末九層之臺起於纍土千里之行始於足下注曰從小成大故云合抱等也從卑立高故云九層等也從近至遠故云千里等也準之可悉所言抱毫者玉篇上蒲保反權猶庚也持也下胡高反長毛也亦細微之極也言義四等者述義云就人法言時去者為人去與發為法就因果言時以發為因以去為人為果也疏就偈為四等者言問上云去是果等者次上論云復次若決定有去去者應有初發疏主釋云去即是果發即為因若準此文應云已發中無發未發中無發發時中無發今何故就已去之果求覓初發之因耶言答此非果中等者述義云偈云已去中無發猶是已發中無下二句例此可知今謂不爾此乃更為別勢仍是三時內謂已去時無發餘句準之今案碩疏云問此中明因發故去不明因去故發那忽舉三時去以破於發答有三義一者明破義何定故如經辨或因中説果或果中説因或舉果破因或舉因破果今此中舉去破發即是舉果破因二者即約破明汝許有發為去因無出三時不爾已去中有發今三時撿發既無汝安此發持置何處三者謂情言去異發發異去今為此故明發故有去去故發是故去不異發明前破去即是破故今明破發故今明破發即是破去準此流文今答當第二義可悉疏未發無去時等者言章門偈即就三時等者言章門偈等者案碩疏云問標章門前則列已去後列去時今釋章門那忽前解去時答明已去未去發義則奢人多不計此中有發去時發義則切人多計此中有發是故前須破切後例破奢若使標依次第釋據奢切論也準之可悉所言緩者玉篇胡管反遲也舒也言又是逐文等者所言逐接者玉篇上除陸反追也騙也從也強也疾也走也今顔從訓也下子業反會也交也持也合也接續之接為接字在木部子獵反續也近也捷也連也逮也偏也今須續訓也言鉤鎖者玉篇上居唇反三十斤曰釣也陶法也又古侯反曲也又鈎作字都叫反鈎魚也今須初字也下思反或瑣字也連環也在玉部言仍釋者上玉篇如陵反乃也因也言問云何未發等者案碩流云問既舉三時破發則應噵已去中不得有發未去中不得有發去時中不得有發今那噵未發無去時番釋無去時不關釋無有發耶準之可悉言問云何未發等者準下釋亦無有已去文於此處有三番問答分為二義初之一番是顯一義次之兩番也亦也亦顯一義何以知之以下文云亦具二義故也若不爾者下文亦字不成故也言答未發有時者案碩疏云答此破三時變成洗發汝言有發無出三時今求汝三時若有可得有三時發於中發今破汝三時既無那得此三時發於中發故知無發即是破三時變成洗發也言答初章偈等者品最初偈云已去無有去未去亦無去離已去未去去時亦無去此偈明破外人三時有作即明三時無所言作者法墮三世流動起作故稱為作故云破法偈此偈大意上半明已未二門無去下半明去時無去故云三時求去法不可得言今此偈與上等品初第三偈云云何於去時而當有去法若離於去法去時不可得此偈上半牒而不受下半正作無體故汝既稱去時是時因去有時則時無別體若無別體法何所賴而得去耶準之可悉言好體破發等者述義云所言好體者體猶悟也又委曲已言但上以具明等者上破法具有四今破發亦可爾而今略舉第一無體破門則自餘各體二法兩人三門可解也言亦無有已去等者上既牒者上但説標釋二偈差別而未説文今欲説文故重牒舉耳也言是二應有發等者述義云是二應有發者謂縱上去時已去有發也而今尚無等者釋成未去中無發也今案琳疏云是二應有發者外云將去發非謂去時已去今釋言凡謂有發應在二時正由二時假發得名而不可有也未去何有發者已去去時尚無發況未去中而有發也準此疏文今言上二義等者上已去與去時二義之中應當有發而今已去去時猶尚無發故云而今尚無也未去未去等者釋成未去何有發謂已去去時尚無發況未去中而有發也疏問曰無去無去者應有住住者第二等者所言第二者案品初科文云品廣分為七處中為四略説二周今宜依四門就初為二第一破去去者第二破住住者初破去去者者既了今次破住住者故云第二而有本云第四者若以七門分別則第四以三時門破住者若爾當七門第四然不及第二也疏答中三偈四章等者言初偈明三時門無住者案康疏云去住相對理應各有三時三者門故以去家三時三者門破住準此疏文今言三時門者約三時三者門以明無住也即論云去者則不住者已去門中去者則無有住也謂三時門中云三者無住也疏第二偈破去者住等者言破意云離去法無去人等者案碩疏云問此品破何物人法耶答有體人法若五陰是體法假名我為體人於五陰上有去止等事用法去止等者為用人破五陰則破體法此品則破用人用法破於五陰上有去止等事為用法破去住止等者為用人耳準之可悉疏去未去無住等者言第三舉三時門等者案琳疏云結中上半結三時無住下半類通也此文近則結前三時無住遠別通結品初三時有作也元康師云有人將此為結前致成難解今作此分則歷然可見矣此偈上半正就三時門破下半結例諸法也碩法師云問講中論人若為結破人直漫語以去那得住餘二亦今明不爾此不讀長行長行當見今明此破其去者住其者言去息故名住今三時撿汝本息去名住以去中無復去何所息名住汝本息去名住未去中都未有去何所息名住去時正去既在去相那忽住二者屬已未破也然去去者既前三時責次兩關後相對破今亦應爾今既前兩關責次相對後三時破前亦應爾但互文現文也準之可悉言凡四過用三時者述義云以三時門破去法去者初發住住者也所言過者玉篇古貨反玷也度也誤也軼也越也貢也歷也又音古和反今須度訓也言第四類破餘法等者案碩疏云今此一品破於四法謂去住行止雖破四種不出人法既有去去者則有止止者去者是人去是法乃至止者是止是法故雖破四種不出人法準此疏文今云行止者人法通稱問行止與去住若為異無異者破去住必勞復破行止答有異無異無異者去住乃不異於行止但名目殊去對住行對止此人雖悟去住猶迷行止是故須破有異者行未必去止未必住何故然此文生死相續為行故如善逝稱為善去善逝非是生死善去未必是行色滅故名住何關滅故住未必是住也言答令悟此身等者述義云以觀發中者是化他行也因中發觀者是自利行也淡海記同之疏問汝雖種種門下若開四門等言利根聞初周略破即解等者述義云以所説法言初周廣説後段略説而重説前所餘義故名廣耳淡海記去如金剛般若經中從經初至爾時須菩提白佛此是略説般若從佛告須菩提下此是廣説般若此經亦是約所説法應言上是廣説下是略説而取重説故云上是略説下是廣説此疏亦爾重説前義故云上略今廣説也疏答曰下第二破等者言前長行呵等者案碩疏云如大論是牛羊眼所見不可信若使今論肉眼所見不可信若使總非物情雖𭞅今時撿責更物情易悟故今問汝信此眼是過去虛妄所感不汝信此眼是過去有漏業為因四住地為緣用此虛妄因緣感得此眼因既虛妄眼寧真實能見之眼既非真所見去住復何須語耶唯此疏文今言無明者四住地之惑以無明慧名為無明也顛倒者有漏業也所言因者因緣通稱也述義云長行呵云肉眼等者答前四門從後至初也今此答第四問凡有二意即是遠因與現因也又汝現世無明等者別記云現在無明心者現在無明煩惱也流入眼故者約心應云也言又眼不可信等者答第三問凡有三意也言顛倒與顛倒相應等者顛倒心與顛倒境相應也又就於立性心前念從念故云相應又就於立與所立可名相應也又所見之境能見之眼不亂故名顛倒也淡海記云只見去者不見住者還是倒故云不亂也言又若我言等者答第二問有四意也不顯答第一問而細推尋於四意中後一意答第一問也亦可又一異撿不可得等者答第一問也言故信般若即不信一切法等者如大品經第十七卷佛告須菩提言信般若波羅蜜即不信五陰十二入十八界六度十八空乃至一切種智五陰乃至一切種智不可得故準之可悉言二河傾滿等者如大經第三十二卷師子吼品中佛言如恆河邊有七種人乃至生死大海亦復如是疏主釋云文中初譬正明生死是河明此河中有七種人並欲求離生死但有方便無方便故有得離不得離師子吼菩薩前難云若衆生悉有佛性者不須修皆自然得菩提今答云如恆何邊七種人皆具手足欲度大河要須浮者得度不習浮者不得度今衆生亦爾雖有佛性要須修道得菩提不修不得也又第三十六卷迦葉品中佛言如恆河中有七衆生乃至如是微妙大涅槃河亦有種種衆生疏主釋云前既云生死河中人離水涅槃河中人不離何故爾生死河以生死煩惱為水涅槃河以佛性為水生死河以生死煩惱為水故所以得離涅槃河以佛性為水豈容離佛性水耶故明一切衆生悉有佛性同不離佛性也故前生死河中借七人為喻非水中物那得文在水中不離於水亦是涅槃河借七種衆生為喻初則大魚乃至最後是龜此是水中衆生不離於水中兩河譬其異正在於此也問何故生死河言邊涅槃河言中耶答前言邊者正言其欲度生死河從此岸到於彼岸故言邊正明發心之故為邊始自闡提終至於佛得度彼岸也今涅槃河不言邊者明此七種併是河中衆生不得離河水但借其入水非即沈沒者此是失若能縱任浮遊自在者為得故言河中準此經文今言二河者生死河與之涅槃河也言傾滿者就迷悟而言之何者若悟者生死河傾涅槃河滿若迷者生死河滿涅槃河傾也言論主以一異破等者述義云就能見與所見求之故云以一異破也即事可信者猶一異事也言如因緣品等者為證慧眼所見現可信故引之也所言世間眼見者猶以慧眼萬物無生也言答汝言眼見等者所言便爾者猶即也言又作一異破等者所言計有去者等者由計有我故生諸見即我為其本即次下大品經文意是也所言一異是斷常本者以有我故計我與陰一我與陰異故以一異為本即大品住佛母品説十四難神及世間常無常等四邊無邊等四死後如去不如去四合為十二及身與神一身與神異合為十四準此經文我與陰一即陰滅我滅便起斷見我與陰異即陰滅我存故起常見故云一異是斷常本也言斷常是六十二見本者大品第三十八卷佛言諸有薄福之人不種善根不值善知識沒在我見中乃至一切種種見中墮在邊見若斷若常以邪見故非法言法法言非法準此等文我見者本中之本一異斷常六十二見之本故次第舉三本也言故大品云等者次第釋上三本言故大品云等者如彼經第二十八卷佛告須菩提云譬如我見中悉攝六十二見是深般若波羅蜜悉攝外之處問曰我見諸見各有別相云何攝入我見中答曰雖有別相我見是本以無明因緣故空五衆中生我見生我見故言是身死如去不如去若如去即常見不如去斷見餘皆準知即是見見成本中之本也所言六十二見者法花經疏第四云大品佛母品開十四難為六十二見十四難者神及世間常無常等四神及世間邊無邊等四死後如去不如去等四合為十二及身與神一身與神異合為十四常無常四內約五陰作之一陰具常無常四句故成二十邊無法亦二十如去不如去四合為六十一異為本為六十二又釋與色是我離色是我我住色中色住我等一陰有四五陰二十約三世為六十斷常為本合六十二六為即陰三十六為離陰又釋一陰上計有無二種五陰便成十見三世為三十凡聖合論即有六十涅槃非三世攝但計涅槃有無二合成六十二見也問五見攝六十二見不答我見為六十二見本邪見撥無而六十二計有故不攝邪見見取以六十二見為第戒取謂六十二見為道則四見非六十二攝而六十二見屬邊見也婆沙鈔云六十二見以五見為體具明如疏第十卷也言由有我故等者取大論第七十卷解佛母文意釋成第二本故彼文云神即是身者有人言身即是神所以者何分折此身求神不可得故復次受好醜苦樂皆是身是故言身即是神身異神異者有人言神微細五情所不得亦非凡人所見攝心情淨得禪定人乃能得見是故言身異神異復次身即是神身滅神亦滅是邪見説身説身異神異身滅神常在是邊見今取後復次文也言既有斷常等者釋成斷常為本也言又一異是十四難等者如大論第二卷云何等十四難世界及我常無常亦有常亦無常亦非有常亦非無常世界及我有邊無邊亦有邊亦無邊亦非有邊亦非無邊死後有神去後世無神去後世亦有神去亦無神去亦非有神去亦非無神去是身是神身異神異也此以十二見並神一異為十四難是因緣所生法故不答定性等四句之問若答彌增見故佛終不答如人問構牛角得幾乳是為非問不應答也言答若直舉眼見等者述義云以一異破其立諸所一等執故云一異破一立也言答若直取色法為身等述義云身猶自體義通於人法內外同以色陰為身亦以五陰為身二義俱取然此身為人體故通別義皆有而外是定性故有一異見內是假名故無見以有微細故此處唯舉外道一異然去法與人不異故以去成人是佛法義非是外道外道一向執色與神異色者法神者人也別記同之言而自執神等者如提婆四宗論云僧佉外道言我覺二法是一何以故二相差別不可得故毗世師外道説我與覺異何以故以説異法此是我此是智故尼乾子外道説如我與覺不可説一不可説異復有異議可説一可説異故如我與命用相有異方便異故得言有異以有此有彼無此無彼得言一若提子外道説一切法不俱謂一切法不可説一不可説異以二邊見邊欲以説一異俱論師等皆有過失故智者不立如是三法具如記第四卷初也述義云彼云冥諦是本非邊非心作諸法本覺是心神亦心覺是神本冥諦是覺本有言覺是本神是末為異有言唯是一非本末覺是解知之義神是莫測之義乃至廣説準之可悉疏次兩偈雙牒雙破等者言作是瓶等者案康疏云作者語通如陶師畫師工匠等皆是作者所作之物名為作業何了知之燃可燃品偈云若燃是可燃作作者是一彼注釋云若作者是一陶師與瓶一準之可悉言師責成實義云等者案碩疏云汝去去者一人法既一為當名一人為當名一法隨意解若人法一通名一人者既通名一人則失法但有人無法但有所成無能成若爾既無法那有人既無能成那有所成若人法一通一法者既通名一法則失人但有法無人但有能成無所成既無人那有法即無能成那有所成是故失人法準此疏文今言若一則無能所者既通名一人則失法但有人無法但有所成之人而無能成之法若通名一法則失人但有法無人但有能成之法而無所成之人既無能成之法那有所成之法是故失人法故云若一則無能所等也述義云成論言善惡與人一故云若一則無能所也言若一復有能所等者案碩疏云若使之人法混然共是一今問若混然共是一為常有名為當無名若無名則人法俱失若有名名人名法耶同光難耳準此疏文今言一者混然共是一若混然共一而復有能成之人所成之法者則是亦一亦異以亦異故有能所人法以亦一故則無能所人法以混然共一故也言又能所既一等者案碩疏云且又五陰為法假名為人善惡為法假名為人汝人法若一五陰與一既一五陰亦一善惡與人既一善惡亦一也準之可悉言又如人起四心等者述義云四心迭代者造猶遷也今案玉篇上達結反更也代也道也下道齋反更也言四人亦爾者述義云人亦應四也疏長行為二等言人通四儀等者樂碩疏云有人解道此破外道神我是常所用無常今明不爾只約即事辨人常法無常明人始終是一故常法有四儀之別行息故住住息故坐坐息故臥既有四儀迭代故是無常準之可悉言異亦應有三種離等者別記云有無離者謂一時二諦也存亡離者約一法前後言之述義云應言有五離而論文既有有無離與存亡離故以去住離與不相成異攝入有無與存亡離然東西難不得攝入可有別釋故云應有三種離而略故無第一離耳淡海記云略無初離者東西而離而論言若異者則相違即是東西離今謂案論文若異者則相違等者是第二有無離次不相因待等者是第三存亡離次異中等者第四總結而略無第一東西離疏主既云無誰敢違乎所以不須海記也疏因去知去者第三因緣門破有此門來凡有三意等者言一者前一異門等者案琳疏云前明一異破人法體此破人法用故文云不能用是去不能用異去故知是破用也準之可悉述義云體之與用皆言無用故云並稱不能用也今謂不爾是去異去並稱不能用也言二者上破一異等者如俱舍論第二十二卷破説我品第九云跋私弗多羅部所説必定有我與五陰不一不異乃至復次若義如此謂因諸陰故我言成諸陰是説我言因故此執亦同前失我等説我不如此若不爾云何如約薪執説火約陰執説人亦爾云何約薪執説火若離薪火不可執説不可立火與薪有異與薪無異若火異薪薪應不熱若火不異薪所燒應即是能燒如此離諸陰不可執説人亦不可説人異諸陰由有常過失故亦不可説人與諸陰不異由有斷過故今取此論文以為破犢子部也言三者上來等者案碩疏云汝因去法知於去者去者用此去法去而今因去法知去者去者無體由法乃成無體之者那能用於去法去耶是故就因緣求不可得準此疏文今求因緣人法而不可得故破因緣人法也言是去者等者案琳疏云是故謂成者之去也異去非成者之去也成者之去此者何意不能用此去也者本無體為他所成何能自用也若爾非成者之去既異應可用之此亦不然何者人法異體不相關預云何得用若得用者即一人有二法過也述義云既言去者以去成者故去是為者所因故云是去等也既成自身之物故不得反用故云者不能用也下句準之言而此二偈等者案琳疏云然此二偈反覆成過初偈免二去過便墮無用後偈假令得用復墮二去過也準此疏文今云二法者猶二去法也言若端拱靜坐等者所言端拱者玉篇上都丸反夜有襦裳者為端也題也正也本也直也業也今復正直訓也下記冢反執也法也合手曰拱也斂手也案影疏云如人靜坐直是人耳正動一足便名去者準之可悉言是去即者所因去者案碩疏云上半明因去法知去者此去者不能用所因之法知何故而去者若不因去法成去者去者有別體去者可得能用去法而今去者因去法成去者則無體無體之者那能用去法耶準此疏文若人初舉一步即是去法用此去法知有初去者此則稱為為是去而去者不能用是去法何者若去者不用去法而成者即有別體可得能用而今不爾故云何能用去法也言如因色心等者亦約五陰之中初一陰是色法即五根五塵及無作色也最後一陰即是心王中間三陰心數并不相應行此五受陰法和合成人故云爾耳言初舉譬反釋等者述義云此文應云初舉譬次反釋言先有人等者釋舉譬文而人法互相因等者明反釋意也疏第二偈破異去等者言上半牒等者案疏上文云因去知去者牒外義也不能用是去者論主破也琳法師云上半牒計總非下半釋也元康師云上半正破下半釋破也碩法師云上半正明因去知去者不能用不因之法去下半釋成破意準此等文今言上半牒者是略耳應言上半牒而破也言外云初動一步等者是釋第一句案康疏云成者謂因初步得名去者可更不能還用初步之去而今不因餘步得名去者因應用餘步之去今破也準之可悉言又一去成者體等者述義云一去被者用者猶是所用也言如藉此五陰四微等者案碩疏云此五陰成此人彼五陰不成此人此五陰成此人此人尚不能用此五陰去破五陰不成此人此人那能用彼五陰去耶述義云云何能御等者是定異故前念相離云何能御耶也言則是他眼者猶是異眼他眼也疏決定有去者第四有無破等者言人法俱有等者述義云若定有人更不成人法亦爾之云言若踟蹰道門等者淡海記云魏時京帝有臣名周㶿此人有高慢性帝自餘除人敕臣云以肉賜周㶿㶿求刀子勿與刀子臣等奉告賜肉則㶿乞刀子不與而已則自手持肉悉食而去爾時帝曰此人怏怏非少主之臣此意自顯其德大耳所言怏快者完蒙貌也今案玉篇踟蹰者上或躊字腹留腹知二反躑躅也説文為𥲅字在心部也百論序云躊躇疏主釋云猶進退貌玉篇躇者腹於腹誅二反躊躇猶豫也怏怏者玉篇於高反動也強也對也言上半明定有人等碩疏云上半明決定有去者不能用三法若為是決定如長行解決定者名實有不用去法生故是決定去者也去法名身動身動是去法也三即已去來去去時即是已動未動動時汝若決定有去者不能用三法也何故爾既決定有去者去者不因去法成此去法那能用去法汝若因去法成去者此去者可能用去法今決者決定是有不因去法成那能用於去法耶何故爾決定有者不因去法成去者即是性有性有即是有門離法有者唯一種所以是常離者之法法三時迭代所以是無常常者那用無常之法定者那能用不定之法耶二義去者既是常即應常去不得有住去法雖未起未去去者應常去去法雖已夫已息去者恆自去去法雖正去去者亦應常去都不得有住何故爾汝離去法定有去者去者常故準之可悉言下半明若因法有人等者案碩疏云下半明不決定去者不能用三法不決定者則本實無本實無去去汝因去法故名去者既因去法名去者即無自性無自性即是無無復那能用三法耶準之可悉述義云既言因去有人而若定有人者即不用去故云上半明定有人等也言此偈上下等者述義云此非上半為進下半為退也猶是互破之也別記亦同言餘二段等者述義云亦假有體亦假無體與非假有體非假無體合為二段即四句也別記亦同今謂不爾兩偈文中開為三段初偈明定有人無人不能用法次半偈明定有法無法人不能用三半偈結人法能所一切都空今法門也訖餘二門易知疏長行釋三段即三等者言夫因去有者等者案碩疏云汝因夫法有去者因去者有去法去者息去法去法住去者可得住今既不因去法有去者去者無去法去者何所息而言是故既無去法去者若去則應常去也準之可悉言釋下半有二論本等者案康疏云釋前偈下半文有二周反覆一耳有本但有後周直云因去法故有去者若先無去法則無去者云何言不決定去者用三去也有本具有前後二周就前周中復有兩本一本云以因去法得名去者以無去法故不能用三法一本云以因去法得名去者以無去法故不不能用三去兩文相似義意大同也人本無體因法得名是故不能於三時中用去法也因去法故有去者下第二周覆釋不異前也準此疏文諭文應言若去者不決定不決定名本實無以因去法得名去者因去法故有去者若先無去法則無去者云何言不決定去者用三去文有二周若言去者下第一周因去法故下第二周然今疏主以為煩焉所言十喻者如大品經第一卷云菩薩解了諸法如幻如炎如水中月如虛空如暗如乾闥婆城如夢如影如鏡中像如化是十喻為解空法故云幻始化終慧影師云然此十喻有五相對一者幻炎內外相對二者水月虛空有無相對三者響城見聞相對四者夢影寢覺相對五者像化集散相對欲顯諸法內外俱空有無雙寂見聞悉寂虛夢覺無實合散同玄終歸莫二此明菩薩解空達理諸法皆然不可得故列此十名以之為喻大論第六卷云問曰若一切諸法空如幻何以故諸法有可見乃至可識答曰諸法相雖空亦有分別可見不可見譬如幻作象馬及種種諸物雖知無有實然與六情相對不相錯亂乃至如化者十四變化心復次化生無定物但以心生有所作皆無有實人身亦如是本無所有又云諸法雖空而有分別有難解空有易解空今以易解空喻難解空故十喻空喻諸法空也具明如彼言又求彼人法等者述義云虛者虛妄也恍者實也今案玉篇恍欣往反失意也狂貌也疏問何因緣故有此品等者約此一品由來凡有二意一者通來二者別來意初中有二初明能入雖異所入無別後明次前品而生初中凡有三審問答此初問答答中言二十七品等者述義云猶是二十七門者謂是能非之門亦是能入之門言所入更無異者體實相之理名為所入也言自斯以外等者所起假名法云皆虛妄也亦可實相者三諦法也虛妄者於彼所立去去者等也淡海記亦同之言故智度論云等者如彼論第五卷云復次除諸法實法餘殘一切法盡名為魔如諸類惱結使欲縛取纒陰入界魔王魔民如是等盡名為魔也慧影師云但有所分別者違於實相不隔生死故通名魔也言所以然者等者疏主釋顯所言一切諸法等者如大論第五云如論煩惱結使欲縛取纒陰入界盡魔準此論文今言一切諸法者陰入界等諸法慧影師云五住煩惱並名煩惱魔分段變易二種之身為陰魔二種之死為死魔第六天魔名他化自在天魔準此流文今云煩惱者既五住煩惱即煩惱魔也苦果者二死之報既陰魔故云名為魔也問何處陰入界説是魔答莫初羅山中佛教弟子羅陀色衆是魔處受想行識亦如是問何以名魔答奪慧命壞道法功德善本是故名為魔也述義問云若除實相餘皆虛妄亦是魔者佛所説教亦應爾耶答取未極之義為虛妄者佛教亦是未極故可虛妄而以妄執義名虛妄耳就魔亦爾於非有非無假説有無此假違於中道故為魔然不壞假名而説實相此就中假因緣義以淺深麁細義故淺為魔深非魔也別記亦同疏問實相何故等者此第二番問答答中四句內等者述義云即以四句為內非非有等為外故云四句內外也言故論云等者如大論第九十四卷釋畢定品云問曰天眼可見色云何見善法又言見一切法性空答曰因中説果以天眼自見己身及見十方衆生然後用他心智宿命智求其今世後世善根是善根及果報亦皆磨滅磨滅故見空是善根皆是有為法無無自性自性故空空故不可著亦不可受味不可受味故不著譬如蝿無處不著唯不著火炎衆生愛著亦如是善不善法中皆著乃至非有想非無想著故不能入涅槃唯不能著般若性空火所以者何般若般若相空若般空不空即是味是可著處菩薩住是智慧中不起有漏業為衆生説法亦知衆生假名不可得安住是無所得般若中而能具足神通事乃至飛到十方國士利益衆生今但略引譬説文也言般若如火炎等者疏王釋顯也言是以論初云等者勸因緣品初歸敬偈文言能説是因緣者顯正也善滅諸戲論者破邪謂能説八不中道因緣善滅不八戲論也疏問若爾何故有二十七門等者此第三番問答答中言或前或後等者述義云此品應前此品應後此偈應前此偈應後此偈應破此偈應立如此執故住在門外不能入理也言可謂服於甘露等者此大經第七卷偈文疏主釋云此中正歎大乘為甘露愚智兩人致成甘毒言或服甘露傷命而早夭者正是無方便服甘露成毒藥稟方等夭法身慧命準之可悉廣明如上疏而復須明次第等者第二明次去來品而生此品於中有二初正明次第後問答如文言動靜四儀者約行住坐臥初一動義後三靜義可悉言故淨名經云等者彼經下卷見阿闕佛品維摩詰答佛問文述義解云我身離諸斷常生滅六十二見具足萬德故有法身有法身故有應身有應身故有化身如觀我身具足三身觀佛亦然謂觀我身即是佛也疏主釋云此章正明法身絶四句謂佛身絶四句衆生實相亦絶四句是以實相即是法身準之可悉疏次別明六情次去來等者第二明別來意於中有七復次今此初復次言經明十二入等者述義云大論第二十八云如佛告諸比丘為汝説一切法所謂眼耳鼻舌身意色聲香味觸法是十二入名也今案毗婆沙論第三十九卷使揵度十門品云十二入眼入乃至法入問曰何故作造此論答曰此是佛經佛經説生聞婆羅門往諸佛所到已面共世尊種種語論問訊已在一面坐爾時生聞婆羅門白佛言世尊説一切者多一切有幾種沙門瞿曇為施設何一切耶佛告婆羅門我施設一切者謂眼入乃至法入是名一切如來説如是法名一切婆羅門若有作是説我能遮止沙門瞿曩所説一切更説餘一切者有是語而無有實若還問者反生疑惑所以者何非境界故佛經雖非是説而不廣分別佛經是此論所為根本彼中諸不説者今欲廣説故而作此論準之可悉毗曇章初卷解云根塵二法是苦樂所入稱之為入謂就根塵所生心心法中苦樂受為義即婆沙云輸門名入乃至廣説準之可悉疏二者接次鈎鎖相生等者第二復次文中有二初明來意次問答明觀六情此文初也言上品初外人等者如去來品初云問曰世間眼見三時有作已去未去去時以有作故當知有諸法疏主釋云上品求四緣生果畢竟無從外人理屈辭窮舌不能救故今舉眼所見立義外道數論譬喻之流同明時不可見故今但云見時中之法不言見時去來是舉下足色為眼所見故云眼見也法墮三世流動起作故稱為作準之可悉言論主即就三世等者答曰已去無有去未去亦離已去未去去時亦乃至去未去無住去時亦無住所有行正法皆同於去義疏主釋云第一三時內破謂已是曾去即時無去未是當去即時無去故無去去時不離此二亦無有去也故云即就三世等所言三世者三時之異名也言惑者問云等者如次論云問曰汝雖種種門破去去者住住者而眼見有去住疏主釋云外人反難論主若三時中無眼不應見今既眼見則不應無故無則不應見見故非是無也言論主更以三門等者如次論云答曰肉眼所見不可信若實有去去者為以一法成為以二法成二俱有過終訖一品凡有八偈初四行偈以一異門破去去者次因去知去者下二行偈以因緣門破去去者次決定有去者下二行偈以有無門破去去者故云更以三門等也謂以三門推求眼所見去住竟不可得何所見耶但有本云更以三時門等者恐時字餘也更應撿定所言不停者猶是不止也疏問云何名觀於眼情者此下第二問答以辨觀六情凡有三番問答此即第一問答言問云何等者此文應云問云何名觀於六情而以舉一餘即可解故舉一問耳答中言一者世俗之流等者案康疏云凡夫外道成實毗曇皆執六情大況相似凡夫計有此是尋常準此疏文今云世俗之流等者凡夫之人也言本末原由者述義云四大是本眼根是末故云爾耳言二者外道之人等者如成實論第四卷根等大品第三十七云問曰諸外道言眼中火大多所以者何似業因緣故因施明得眼如經中施衣得色施食得力施乘得樂施燈得眼是故眼中火大多又火能遠照眼有光故能遠對色又言人死眼還歸日故知日為本性又眼定能見色色屬火故還見自性如是虛空地水風等隨根偏多死人耳根還歸虛空耳定能聞教令屬虛空餘亦如是是故根中諸大應有多少案碩疏云第一迦毗羅人所計六根通是色法則用五塵成五大五大造五根五塵成五大者色塵成火大聲成空大香塵成地大味塵成水大觸塵成風大也五大造五根者火大造眼根空大造耳根地大造鼻根水大造舌根風大造身根也彼云五大五根有精氣之色共造意根故六情通是色法亦攝心平等根解此有兩義一者明五大五根有精氣之色平等共造意根故言心平等根也二者若是五根各用明此意根之識通緣六根六塵故云心平等根也準此疏文五塵各別而生五大五大各別而造五根也今撿百論疏云遍造是優樓迦義云五大成眼根火大偏多色是火家求那眼還見乃至五色大成身根風大偏觸是風界求那故身還覺觸而云五塵生五大者五塵為五諦塵細大麁故從塵生大但地具五塵色聲香味觸水具四塵除香火具三塵除香味風具二塵唯有聲觸空唯有聲外道云地藉塵多是故無力最在其上空藉塵小是故有力最在其下準此疏文五大和合而生一根非是五大各生一根也但五塵也具大雖別總相故云五塵生五大也述義云五塵生五根者是僧佉遍僧義也但佛法五塵唯生內法於外法中無聲塵故五大者地水火風空地者堅義水者閏義火者𤏙義風者動義空者無質礙義佛法於所成法內但有有為空如口中耳中空然眼鼻等根無有為空故無空大所以但言四微四大也今謂不爾遍造是衛世師義準上所引百論疏可見言意根既是心識等者案百論疏云心平等根有二種釋一云實是心識之心而稱心平等者眼等五根各緣一塵心識能遍緣五故云平等二云詺完芙蓉心以為平等以其處一身之中故云平等又云若是內心具五大所成心識之心非大所造撿迦毗羅論是心識之心以能分別故準之可悉述義去云肉芙蓉人者即是腹也問外道不立意根何為此説答此師今顯意根非四大所造耳良非外道義外道義二釋一者緣慮心非五大所成二者完芙蓉心是地大所成問百論疏云具五大所成今何言地耶答十六字缺言三者復有外道等者如成實論第四卷根等大品云問曰有論師云一根一性地中求那多故有香能發香水火風中有色味觸故能發味色觸知是實云何案碩疏云若是優樓迦人所計與前家為異五根是色意根是心五大成五塵五大造五根則用五大成五塵者明火大成色塵空大成聲塵地大成香塵水成味塵風大成觸塵也五大造五根者興前家大異明五大共造眼根火大偏多色是火之求那故眼能見色餘四準之今撿百論疏云次偏造是迦毗羅義以色成火大火大成眼根眼根還見色餘四亦爾五知根勝故各用一大而成五業根劣故具五大而成也準此二疏相違水火更可問求之也何者碩疏意云初師明偏造義後師立遍造本疏云初師立遍造義後立偏造義今案金七十論上卷云五唯者一聲二觸三色四味五香是香物唯體唯能五唯生五大者聲唯生空大觸唯生風大色唯生火大味唯生水大香唯生地大又智度論第七十卷云從空生耳根從風生身根從火生限根從水生舌根從地生鼻根乃至以是僧佉經廣説世性準此論文恐碩疏謬焉述義云復有外道等者是衛世偏造義者非也準上可悉言四者毗曇人云等者如雜阿毗曇心論第二卷行品云已説心心法伴力及生色今當説極微在四根十種應當知身根九餘八謂是有香地長行釋云極微在四根十種應當知者四根十種極微共生四大色香味觸眼根身根耳鼻舌根亦爾身根九者謂餘身有九種彼唯有身根種餘如前説餘八者離根色聲香味觸極微八種問此諸極微何界説答謂是有香地欲界中極微無合香味不相離有香則有味色界極微非揣食性故離香味色界四根極微八種餘身根極微七種外極微六種問若眼根極微十種者云何不眼即是色即是餘種如是則法性雜亂與阿毗曇相違阿毗曇説眼根一界一入一陰陰攝答二種極微事極微聚極微事極微者謂眼極微即眼微餘極微皆説自事以事極微故阿毗曇説眼根一界一入一陰攝聚極微者衆多事此中説聚極微住自相故法相不雜亂疏解云此偈上三旬明諸根具微多少一句明界差別極微在四根者明色法聚為衆微所成極者數之極也微者七微此是最細色十種應當知者若在四根有十微共成謂四大四微眼根身根問曰四大亦是觸入攝何故別説者外云四大造色之本功能最大所以別説聲非常有所以不論身根九者除四根外身根但有四微四大及身根故有九也餘八者離根色香味觸但有其八謂是有香地者所謂欲界也準此論文今言毗曇人云等者彼論長行文則指本論師達摩多羅此云法救言毗曇人即四種薩婆多中第一師也今案碩疏云若是阿毗曇人所計則用四大造五根不用空大何故爾空是無故不能成也明四大造五根四大即是四觸謂堅濕暖動即是實法五根即是眼耳鼻舌身即是清淨實法色意根即是心王心數也但四大造五根五根有具十者或具九者或具八者故彼偈云極微在四根十種應當知身根九餘八謂在有香地若為是極微在四根十種應當知今明眼耳鼻舌此根具十種謂能造四大及四塵即是八眼根即是九根眼必附身即是十眼既爾耳鼻舌例然故云極微在四根等何故言身根九餘八耶今明帶眼之身此身亦具十從咽喉已下去身此但具九謂身與四大四塵也從多為論故言身根九也餘八者即是身外之物此但具八謂四大四塵也謂在有香地明但在欲界欲界稱為香地色界等則不然也述義云謂地水等者數人云聲非果報以間斷故所以五塵之中但取四塵不取聲塵也言身根但有九等者身根但有身根乃四大四塵而無眼耳鼻舌四根何故爾無身根時不得有眼根但無眼根猶有身根故言故論偈云等者述義云真諦三藏所譯俱舍論文今謂不撿彼論文無此偈故此雜心論第二卷行品偈文即上所引之文是也言極微在四根等者疏云此偈上三句明諸根具微多少一句明界差別述義云極微者即十微謂四微四大所成之眼與附著身根也在四根者眼耳鼻舌也成論云四微成四大今數人四大成四微以四大望四微時四大是極微餘義亦爾以四大與四微望眼等根皆是極微以眼根等望色法時亦為極微也身根九者四大四微及身根身根不依著他故無眼等故也餘八者草木等是名餘所言八者四大四微應除所成法也有香地是欲界也色界無香味故即無鼻舌二識唯有五根為莊嚴具有六微就色界者四根但有八身根但有七草木等但有六也言五者成論云等者如彼論第三卷苦諦聚色相品第三十六卷云問曰汝言五受陰是苦諦何謂為五答曰色陰識陰想受行色者謂四大及四大所因成法亦因四大所成法總名為色四大者地水火風因色香味觸故成四大因此四大成眼等根此等相觸故有聲地者色等集會堅多故名地如是濕多故名水熱多故名火輕動多故名風眼根者但緣色眼識所依同性不依時皆名眼餘四根亦如是色者但眼識所緣及同性不緣時是名為色香味觸亦如是等相觸故有聲也又同卷非彼證品云又汝云佛説眼形中所有堅依堅是地等者佛以此言示五根因四大成或有人説從我生根或謂離大別更有根有説諸根種種性謂從地大生鼻根等佛斷此故説眼等根四大合成空無實法今略引二品論文也案碩疏云若是成實論人亦是四大造五根但四大是假名五根亦是假名明四大共造眼根發識見色故名眼乃至四大共造身根發識覺觸故名身也言就三假辨等者述義云開善一復次云四微是法假四大是受假五根是名假也今言四微是法假者從同類所成故多細色合成色塵多細香合成香塵等以自體義名法有自體故色成色塵餘義亦爾從多所成義為假五根是受假者異類所成故四塵合成眼等衆生是名假者是重所成故但有言説耳言六者犢子部云等者如大論初卷云是佛法中亦有犢子比丘説如四大和合有眼法如是五衆和合有人法述義釋云由五陰合而成人體此即非是五陰之法人云道理以為法也所言法者猶體也言四大者此事四大具如記初卷言犢子者此婆羅門之一姓以為名也佛滅度後三百年中從薩婆多部出之言第七方廣道人等者如大論初卷云更有佛法中方廣道人言一切諸法不生滅空無所有譬如菟角龜毛常無慧影師云此是方廣部中所執道人故云方廣道此人雖學大乘而失大乘旨執之太過執言一切法無間假實生之與法悉皆常無如兔角無也述義云此一説部所言似大所以為名依四阿含作如是説謂四阿含就世諦言諸法無生色欲如幻既言欲界及色界如幻無生故知空也具如記初卷也疏問論主云何破此諸計等者此下第二番問答答中言凡有此眼根等者如唯識論第六卷云云何為貪於有有具染著為性能障無貪生苦為業謂由愛力取蘊生故云何為嗔於苦苦具憎恚為性能障無嗔不安惡行所依為業謂嗔必令身心熱惱起諸惡業不善性故云何為癡於諸理事迷暗為性能障無癡一切雜染所依為業謂由無明起疑邪定貪等煩惱隨煩惱業能招後生雜染法故述義云言即生無明者猶是愚癡即捨受心也所言三業者三義一者三毒即是三業細時為煩惱麁時為業故二者身口意三業也三者罪禍不動三業也淡海記亦同之疏問云何破耶等者此下第三番問答答中言故淨名經云等者如彼經上卷弟子品阿那律章云阿那律白佛言昔有梵王名曰嚴淨問言幾阿那律天眼所見我即答言仁者吾見此釋迦牟尼佛三千大千世界如觀掌中菴摩勒果時維摩詰來謂我言唯阿那律天眼為作相耶無作相耶假使作相即與外道五通等若無作相即是無為不應有見彼梵王作禮而問世孰復有真天眼者維摩詰言有佛世尊得真天眼常在三昧悉見諸佛國不以二相今略引維摩詰語疏主云文中有四初明被呵之由菴摩勒果者形似檳榔食之除風冷眼手執此果故以為喻言見三千界者住常力即見二千功用見三千世界也又天眼但見二千願即智之力即見三千也次時維摩詰下第二述能呵之旨作色方圓相而見名為作相不作色方圓相名無作相也又釋三界報身六情諸根從結業起名有為有作相法身異之謂無無作相結兩難云若作方圓相而見即同外道以外道亦作方圓而見故若不作方圓而見即無方圓便是無法不應有見次彼梵王下第四時衆得益文有三句初問阿那律天眼第一既屈淨名自斯已外誰有真天眼者次維摩詰言下第一淨名答初總答云有次出有真天眼之人即佛世尊也下以三門釋真天眼一常有定內異小乘定外見此顯靜散無二也次悉見諸佛國此明小乘所見近諸佛所見遠此二異也不以二相者能所宛然而無眼色謂有不礙無雖無眼色而不失能所所諸無不礙有有不礙無故不同外道無不礙有故不同無為正答上二難也又就眼見明不二見宛然而無見雖無見而無所不見名為不二什公云不作精麁二相名為二準之可悉言花嚴經云等者如彼經第七卷賢首品中賢首菩薩説偈中言於眼根中入正受於色法中三昧起示現色法不思議一切天人莫能知於色法中入正受於眼起定念不亂觀眼無生無自性説空寂滅無所有於耳根中入正受於聲法中三昧起示現聲法不思議一切天人莫能知於聲法中入正受於耳起定念不亂觀耳無生無自性説空寂滅無所有法藏疏第四云就衆生世間自在中二初約自身後約他約自身中約十二處辨於中緣起無礙定等圓融一一皆有十事五對無礙之相第一對根境無礙既觀根入定還應從根出為顯此根即是境故從境出也以一心緣起無二而二故恆相對而根境兩分第二對二定無礙謂理二定也為分別境事應入境定變入於根中為觀根空寂應入根定變入境中以分別境事起即是觀根之智是故二定無礙唯是一心第三對二境無礙謂深廣也此所分別廣事無生無性深理故是故真俗雙融唯一法界恆以不礙二故寄俗於境寄真於根理實遍通第四對入出無礙謂以入定即是出故是故雖起定而念不亂也第五對體用無礙謂自他也謂雖現於境廣故人不知恆寂故雖起於定深故自心恆不散是故此上十義同為一聚法界緣起無礙相即故也又此中復有三重希有謂根入境中已為一希有復能境中更示無邊分別非天人所知為二希有從境出已示此分別已甚希有復於彼時定心不散更復希有何以如此者顯三昧純熟故今十二處中且取意略引初四處文可悉述義云然今取觀眼無自性義以為證耳言是故唯佛得稱為我等者如大經第二十三卷佛告高貴德王菩薩言大自在故名為大乘異自在者有八自在者八自在一者能示一身以為多身二者示一塵身滿於世界三者以身輕舉飛空無礙四者心自在故所作自在五者根自在故六根無礙六者心自在故得一切法七者説自在故無説聽念八者遍滿無見自在令見具明如彼故云我者謂自在義也疏又雙破凡夫二乘兩病等者此下第三復次以辨來意言如淨名呵阿那律云等者如淨名經上卷弟子品阿那律章云時維摩詰來謂我言唯阿那律天眼所見為作相耶無作相耶假使作相即與外道五通等若無作相即是無為不應有見疏主釋云第二述能呵之旨前定而開次假使下雙結二難若作方圓相而見即同外道以外道亦作方圓而見故若不作方圓而見無方圓便是無法不應有見今略引結二難文言阿那律者此云如意亦稱無貧又名不滅猶一義耳八萬劫前曾供養辟支佛所得善根于今不滅故名不滅果報稱心為如意即是白飯王長子佛之從弟天眼第一所以然者曾一時佛邊聽法睡眠佛呵之咄哉云何如螺唪乎那律慚愧不眠多日遂便失目問耆婆冶之耆婆云眠是眼食久時不眠眼便餓死不可復治那律因修得天眼也疏又説此品等者此下第四復次以辨來意也言法花明六根清淨者如彼經第六卷法師功德品云爾時佛告常精進菩薩摩訶薩若善男子善女人受持是法花經若讀若誦若解説若書寫迷人當得八百身功德千二百意功德莊嚴六根皆令清淨疏主釋云約位明者此五種法師是三寶位言六千功德者菩薩行善本出三業身三口四意三合為十一善為首餘九莊嚴是即十善互相莊嚴成百善也自行百善教他行百善讃歎法百善讃歎人行百善合寫四百善各有上中下三品故成千二百但眼鼻身三眼以助道用弱故唯得中下二品所以八百以餘三根勝故各得千二百即六根合故成六千然則五種法師一一具六千廣以明如疏言普賢觀經懺悔六根罪等者如彼經云爾時世尊而説偈言若有眼根惡業障眼不淨但當誦大乘思念第一義是名懺悔眼盡諸不善業也乃至如此等法六名為六情根一切業障海皆從妄想生若欲懺悔者端坐思實相衆罪如霜露慧日能消除是故應至心懺悔六情根今略引之凡有十四行偈具懺六根罪準文可悉法花疏云普賢觀經明懺悔六根罪故今得六根淨但懺悔有二法初對十方生身佛就事中懺悔六根罪故云從無始來六根所依三障今悉懺悔次對法身佛依實相懺悔觀六根因緣生本來寂滅具此二懺悔故六根精淨準此疏文今所引文對法身佛依實相懺悔文也問法花經云五種法師得六根清淨今經何故作二懺海故六根淨耶答觀身實相懺悔即是持經故不相違也言大集經云等者如彼經第二十一卷云爾時世尊見十方衆生悉來集會即説偈言若有説言眼見色乃至意能知諸法如是之人行顛倒流轉生死無量劫今略引之疏又有此品來等者此下第五第六二復次辨來意言初引毗曇論立者因緣品中立四緣偈是次引去來事立者去來品初問曰是也餘文易知疏偈為二上半列六體等者言行者緣也等者案行品疏云通言行者凡有四種一修習名行即萬行善法二造作名行通善惡三性三無常起作稱行通因果三聚三性等四行緣名行但心今當第四故康疏云眼能見色乃至意知法分別前境故名為行準之可悉言衆事分毗曇婆羅門問何法攝一切法耶等者述義云此論有十二卷宋時沙門求那落陀羅此云功德賢中天竺人之所譯也婆羅門問佛等者此論引佛經事如此佛為破外道實我而説十二入亦以執著於十二入故今觀空耳案毗曇章初卷十二入義云根塵二法苦樂所入稱之為入故雜心云苦樂所入處或云通苦樂處名入謂約根塵所生心心中苦樂受為義可知言答意當體受名等者案碩疏云然此四緣所計並是明五大四大等造根義但此名因多種今略明四對一者情欲謂情則在內欲在外所以言情者土意根當體是常餘五能生情因從果為稱故言情也所以言欲者明塵能生欲亦是因載果名故言欲故經噵六塵惡欲也二者根塵謂根則在內塵則根能生識故所以名根塵能塵染所以為塵也三者因緣六根生識義近即是因六塵生識生識義遠故是緣也四者依境六塵即是境六根即是依依根而生識故言依也準此疏文今須四對但因緣義闕之然今言六衰者是當境義述義云於六塵上生貪愛故今諸善因而滅之故云令善衰滅也今案大義記第九卷十八界義云同曰根者根是生立義亦是本義此六在身內同是生識本為根也言外道以神我能見者案康疏云外道謂神御六情為情之生見聞覺知皆是神事神雖能知要假眼等如人以鎌刈收五穀也言犢子亦明我能見者如婆沙論第五卷雜犍度智品之二云犢子部作是説人能知非智亦應人能見非智又第八卷云如犢子部説一眼見色非二眼一時見所以者何以相違故以捷疾故人謂兩眼一時見色一準此論文應言眼見今解以眼為門而我見道故不相違也言論人以識託眼根等者如成實論第四卷根無知品第四十八云問曰經中説以眼見色不應取相耳等亦爾故知眼能取色又眼等名根苦不能知何以名根又經中説我諸弟子於微細事能知如眼所見若眼不能見佛諸弟子則無所見是事不可是故諸根定能取塵又識分別是則根識有異答曰佛自説眼是門為見色是故眼非能見以眼為門識於中見故言眼見問曰亦説意是門為知法故可以意為門而非知乎答曰意亦以次第滅心為門是故意不能知意識能知準之可悉言然用識見等者如毗婆沙論第八卷雜犍度智品之四云當言一眼見色乃至廣説問曰何以作此論答曰為止併義者意故如尊者曇摩多羅説眼不見色識見色為止如是意故言眼見非識見準之可悉言毗曇人以根能見等者如雜心論第一卷界品云問云何見為眼見為識見為眼識相應慧見為和合見乃至答自分眼見色非彼眼識見非慧非和合不見障色故長行釋云自分眼見色是故餘識俱時則不見以餘識俱空眼現在前非自分故以是因故不俱得一切境界自分諸分不俱識住根故名自分無有二識俱行無第二次第緣故法魏疏云問云何見已下因言長理有一偈明自分眼是見識等非見為眼見是評家所存為眼識見者是曇摩多羅義為眼識相應慧是見者尊者瞿沙説和合者犢子所説也就偈答中有三初句立次兩句非他第四句釋非所以自分者是避通眼見色者方是正答中兩句正非第四一句釋非所以若識等見者既不障應見障外之色以不見故明知識等非見長行引釋中自分眼見色者論主通義眼雖是見性要識住根方始能見是故下結餘識俱時不見以餘識俱時空眼現前非自分故以是因故者通第二不俱取塵過以之言用即此因防得第二之過故言以是因故不俱得一切境界自分諸根不俱者此釋不俱取塵義以無自分根俱故識住根故名自分義無有二識俱行者釋自分根不俱尚無二識俱行何況有多無第二次第緣者復釋無二識也案康疏云毗婆沙論是薩婆多部此部以眼根能見非識見也謂別有淨色名為眼根然此眼根是不障礙有外色法識住其中名為自分眼見色也根既微細非肉眼見唯有天眼方能見之準之可悉言異部人云等者如法魏師雜心疏第一云為眼識相應慧是慧是見者尊者瞿沙説和合者犢子所説也準此疏文今云異部人者尊者瞿沙人也復有人云等者犢子部也然述義云異部人者毗婆闍娑提義也別記云育多提婆義也疏答曰無也第二論主破等者言問外人引經等者案康疏云問經説六情明言非一何以違教遂乃言無耶言答然計我與六情等者案康疏云此取經意不執經文何者凡計我與六情俱是妄謂雖然如來説六情者欲借於六情輕妄而止於我重妄而內外大小執教之流聞説六情終言實有六情故不解佛説六情之意也言故涅槃云等者如彼經第十七卷佛告迦葉菩薩言諸佛為第一義故説世諦亦令衆生得第一義若使衆生不得如是第一義者諸佛終不宣説世諦今取文與義引之法寶師云明説世諦意也欲令衆生得第一義故所以如來宣説世諦也疏主釋云前來得無得常無常等皆是如來善巧方便則是世諦今即卷歸皆第一義諦準之可悉言諍於六根者述義云或謂四心一時或謂四心前後也今謂不爾上所列七宗所計是應知也疏偈本即是釋長行等者言泛論四句等者述義云偈釋偈者以如諸法自性偈釋諸法不自生偈是也長行釋偈者易知長行釋長行者此論所無也偈釋長行者即是文也言正破見因義者述義云以眼與色名為見因也果者所成眼識等也言上有五家等者上有六家而外道與犢子同計我見故合為一家而名五家也言破意云汝自體是眼等者案康疏云己體者有二解一以根為眼體能見色不能見眼二以識為眼體眼能見色不能見識準此疏文今言自體者即眼是根若眼根自體是眼根者亦是眼根應見眼根識亦爾言又此難毗曇最切等者如雜心論第一卷界品云彼眼入者眼識所依四大所造淨色不可見有對耳鼻舌身亦如是疏云初言眼識所依者以果解因別於餘色二言四大造者將因以解果論宗不同犢子説根體是實攬大成根根外別有根體譬喻者説亦攬大成根是假名大外別有根體成實亦説攬大成根根是假實殊途合用異本大無別根體婆沙所存及此論宗四大造因果殊別淨色者出其根體異於五塵有對者異無作色耳鼻舌身亦如是者四義是同故云亦如是準此論文既云眼是四大所造淨色又云自分眼見色若爾者此自分眼即能見他者亦應自見己體也言彼救云等者如婆沙論四十八云復次有三義是色相有色可見有對有色不可見有對有色不可見無對準此論文五塵以極微成故名有對即對眼法故云可見也五根是天眼境非是肉眼境界故不可見亦極微成故云有對也無作假色唯意識所知故云不可見無對也如百論云等者如彼論下卷破塵品云內曰四大非眼見云何生現見修妬路地堅相水濕相火熱相風動相是四大非眼見者此所造應非現見疏主釋云此正破四大造色此論正破外道傍洗內執是故破內俱知造不知無所造既不知造無所造亦不達無所造而造故不達二諦即是破於佛法論主今示其造無所造因世諦悟第一義故有今破今引本論文也述義云性四大非眼見但以慧眼能見也事四大是眼見耳也淡海記亦同之言次難識見等者案碩疏云第三成實則用識見雖用識見要須有根之識方能見之準此疏文今云識見者成實師即顯彼論第四卷根無知品也言破人見等者外道及犢子部并云以神我而見今云人者即是我也言又數人明等者如雜心論第二卷行品云眼根十種極微共成四大四塵眼根身根具如上明也述義云別有眼微者指眼根故云微也言成論眼是假名等者如論第三卷非證品云佛斷此故説眼等根四大合成空無實法準之可悉疏問眼雖不自見者救意云燈能所俱是色等者言燈能所等者案影疏云燈自照燈照色入明是燈體亦色入攝眼色不然俱舍論第一卷分別界品之一云顯色有四謂青黃赤白餘色此是四色未異形色有八謂長等又云色入或二十謂青黃赤白長短方圓高下邪正雲煙塵霧影光明暗又婆沙第三十九云云何眼入答曰若眼已見色今見色當見色及餘彼分眼入已見色是過去今見色是現在當見色是未來及餘彼眼入云何色入答曰若色入已為眼所見今為眼所見當為眼所見準此等文燈以能照所照俱是色入所攝故自照照他眼則不爾故云此毗曇救也述義云眼是不可見以眼根是清淨色故云眼能見是眼入等也言依數人能燒是觸等者如雜心論第一卷界品云觸入者十一種謂四大及七種造色謂濕滑輕重冷飢渴也述義云火唯是觸塵故云爾也言智度論亦云等者述義引彼論第三十一卷釋初品中釋十八空故彼文云復次諸法別異性是亦不然何以故如火能燒造色能照二法和合故名為火若離是二法有火者應別有用而無別用以是故知火是假名亦無有實若實無火法云何言熱是火性復次熱性從衆緣生內有身根外有色觸和合而身識覺知有熱若未和合時則無熱性以是故知熱非火性慧影師云復次諸別性已下總性既空次破別性義也如能燒義是火大能照義屬造色有此二法成火義離此二法更無別有一火實用若爾者火則是假名無實若無實火云何言熱是火性火之與熱不一不異如是一異中求火火不可得火既尚無何得有性如是推之悉至實相實相之義聲聞亦得而大本經明極微色心中言如是塵相非諸二乘境界者今依經論釋者此據極微之塵實相為語故云爾耳復次熱性下明有性之法不從緣生火若實有熱性者則不假緣生既假內外因緣故知有熱未和合時熱性子無以是故知熱非火性也述義云如火能照能燒照是造色燒是炎是二法和合為火色具能無者火即赤也觸具能燒者能燒薪之用也今案彼論第三十二卷釋初品中四緣云復有人言火為最大所以者何除香味故又以水出處甚多而火能滅之大火之力能燒萬物能照諸暗以是故知火為最大準此論文今言色具能照者能照諸暗是所言暗者二十種色中一色故言觸具能燒者能燒萬物是四大及七觸是觸塵故今取意引此文準之可知疏答中為二上半明火不能成見法等者言明火不能成等者案碩疏云一者明喻不相似何故爾如火能燒薪即以薪為體汝眼能見色不以色為體那得此為喻耶故云不應舉合而救離也所言矚者猶觀也照也言又云觀汝此義等者案碩疏云四大之中火乃是一大熱觸但火無別體賴薪為體然火還燒所賴之薪即自是燒也眼雖是別根然不能獨立要假扶根色香方乃得立若爾眼還應見扶根之色香即是自見而今眼不能猶立要假扶根之色香方得立不見扶根之色火無別體託薪為體還燒所託之薪故知此乃是破眼不能自見何謂成眼不能自見耶所言非見之色者如壁外之色等也言如百論云等者如彼論上卷破神品云內曰若爾盲修妬路若神用眼見則神與眼異神與眼異則神無眼神無眼云何見色汝陶師喻者是亦不然所以者何離泥更無有瓶泥即為瓶而眼色異故疏主釋云內曰若爾盲者若神與眼一不應言神見眼不見若神與眼異神則無眼是故神盲若無眼不盲則盲不無眼若無限不盲則有眼有盲汝陶師喻者此破其譬説外云譬有三事一陶師二用泥三作瓶內合亦三一有神二用眼三見色疏親言同而實大異用泥作瓶離泥無瓶用眼見色離眼有色故非喻也今略引破譬説之文述義云情塵二品外所立義今取意引之者非也別記云離瓶無泥者是一體因果也而眼色異故者是別體因果也眼是因色是果者是外人義也疏復次見若未見時下等者言今第三就色破眼見等者案碩疏云明對色方見不對色則不見若爾眼則有見不見義那忽言眼是義而今眼有見不見義汝言眼是見義者則不然也準此疏文眼未對色不名為見則見在於色何名眼見言五者難云等者案碩疏云明眼有半見半不見見他即是半見不見自即是半不見就見他中復有見不見對色時則見不對色時則不見若爾眼則有見不見那忽言眼是見義而汝言眼是見義者是事則不然也言六者顛倒品云等者此論第四卷觀顛倒品明六塵空偈長行云色聲香味觸法未與心和合時空無所有如炎如夢如化如鏡像但誑惑於心無有定相疏主釋云未與心和合時空無所有者法之有無不假於心而今未合既無合豈有耶有二種意一從此想心謂有前境實非有也二以從妄心生前境故前境誑或於心此意是心生境境生心但原本從妄心生實無前境也今略引法説文言色等者六塵境中舉初一色等取五塵也言又何得因緣未合時無等者案碩疏云未對色時則不名見對色時方名見若爾見名為色何關屬眼乃是色見何關眼見耶彼云箇是眼見非關色見但未有色時眼無所見今難眼是見義未有色時故眼名不見時我亦眼是義有色故名見不可言眼是不見義有色故名見我亦不可言眼是見義未有色時故眼不見也言所以花嚴云等者如彼經第七卷賢首品云於眼根中入正受於色法中三昧起示現色法不思議一切天人莫能知於色法中入正受於眼起定念不亂觀眼無生無自性説空寂滅無所有法藏師云此中復有三重希有謂眼入境出已為一希有復能境中更示無遍分別非天人所知為二希有從境出已示此分別已甚希有復於彼時定心不亂更復希有何以如此者顯三昧純熟故今略引之言成論文云等者如彼論第五卷色入相品云眼根者但緣色眼識所依及同不依時皆名眼根今取意略引之別記云同性不依時者不依應時也疏復次二處俱無見法者依偈是第四明法無故人無等者言承第三偈生者所言承者文字集略市升反相承助人君為政也又時升反受也次也花苑示氷反繼也翊也言一是眼處色處等者案琳疏云一是眼處二是色處前偈假緣破眼明無見性而其家即謂緣會有見故復明二處俱無雖會何為有本云見處元康師云眼能見色詺眼為見準此疏文今云見處者猶眼處也言二者見處非見處等者所言非見處者即是色處亦可是未見處也故元康師云非見者即色也亦可未見也又解云無別非見之法唯求責見而成非見故云見處非見處也言同前緣尚不生等者如因緣品總破四緣之中第二偈長行云是故果不從緣生緣尚不生何況非緣疏主釋云上來二周責緣成非緣是故果不得從緣生何況非緣者顯偈不破非緣之意謂無別非緣但責外人果未生時不名緣故緣成非緣緣尚不生非緣豈生準此文意應云上來責外人立眼見而成非見見尚不見非見豈見也言三者是眼處人處等者此取長行意以為難也上來已責眼不能見外人云直是眼不能見者方能見者雖能見要須有眼故見論主破云汝言眼不能見者能見是則離眼有者而實不爾故明人亦不見若不用眼者能見則無因之人何不用耳見也疏見可見無故者依偈是第六明因無故果無等者言依成實義等者如成實論第二卷四諦品第十五云五陰者明識色為色陰依此生識能取前色是名識陰即時心生男女怨親等想名為想陰若分別知怨親中人生三種受是名受陰是三受中生三種煩惱是名行陰以此事起受身因緣名五受陰聰法師疏云一往約相生次第明五陰不明攝法盡不盡義想陰但取因成假男女法實上怨親好惡相待假不得取相續假也受陰取因成假上怨親中生三受也五陰中業領受未來果故云五受陰也言次第取假實境者案大義記第十卷五陰義初云心始造緣對實法境照識義顯又問現在故初心宜名識識後相應沒識為數是以識陰從別立次色生也想名取假相亦有通別謂一切是假名而凡夫緣皆著則諸心同名想故想義通但假中有階級開為假實而識初緣實得假所因故第二心方取假相既於實緣假宜名為想以從別制故次識也受名領取義復通別者謂心皆領前緣無非是受但假實二境但損益已而識想未具領於己好惡第三具領好惡苦樂明了此宜名受故受亦從別制次想生也行是起作義亦有通別謂五陰相生皆作成果但此通行中前四非善惡受後生心能成善惡則第四心能起作來果起作功顯此宜名行乃至廣説準此記文今言成實義等者是開善寺智藏師義也述義云取假實境者識取色塵等實境何者眼識所見即四微實中色謂青黃等餘三心皆收假境謂柱好惡願不欲等也成實義應云見可見無故想等三法無不應云識等四法無何者彼宗以識為能見故前破見可見時已破識故此應數人義以根見色故也言依毗曇義等者言眼色和合生於眼識者理實應言具空明根境作意唯眼根生識義近即是因色塵生識義遠故是緣既具因緣二義故云眼色所言眼者不壞眼根也色者青黃等五大色在可見境以眼識不見障外之色故也言眼識所以得生等者案琳法師疏云眼識所以得生者次由於觸準此疏文此文明識眼由觸而生故雜心論第一卷界品復次因觸故立十八界眼髑三因緣生謂眼色識如是乃至意器故食者故器謂眼界食謂色界食者謂識界此釋識之字也述義云次由觸者心數法中觸數是也言觸和合根塵者次釋觸字疏主釋云觸以觸對為義毗曇別有觸數能和合根塵及識使根識對塵故名為觸故婆沙論第十二卷云諸根已能為觸作所依但能未別苦樂未能避大蛇毒藥及諸不淨是名為觸言以觸等者釋受字疏主釋云受以領納為義謂領納遠順等緣等緣故婆沙論第十二卷云云何為受能分別苦樂避諸厄害不攝火觸一切物不生染著是時名受也言三受後次生愛者釋愛字疏主釋云愛以染著為義然三受通為愛作緣為苦受所逼故貪求於樂以樂受故為愛所使不苦不樂受亦能生愛故婆沙第十二云具上三受是時名愛今言依毗曇義等者是衆事分毗曇義故下文云衆事分正明此四法與今長行同也三十三字缺言大品亦明眼觸因緣生受等者如彼經第三卷末佛言如是須苦提菩薩行般若時知假名字已乃至不著眼觸因緣生受乃至意觸因緣生受若苦若樂若不苦不樂今略引之言四取者婆沙云等者如彼論第十二卷雜犍度人品云云何為取以貪境界故四方追求是時名取今略引之疏主釋云此則四方追求名為四取也以助業取果故名為取也言勝鬘經以四住地為四取等者如彼經云世尊又如取緣有漏業因而生三有如是無明住地緣無漏業因生三乘三種意生身今取意略引之疏主釋云又如等者是第一段前已廣明不盡煩惱今此更明不盡受生是故言又前明或體今明或用故言又也如者指示之辭指彼分段因之與果是故言如也取者是其愛之別稱愛心取著故名為取助業牽生因之為緣理實諸結皆名為緣愛力增強故偏説也緣謂緣助業為正主牽生苦樂二受故名有漏業準此衆文既云前明或體今明或用即或體者上所列四住地惑是也故云四住地為四取問何故名有漏業答煩惱是漏善惡之業從於漏三與漏相隨名有漏業問今明四住受生何須論業答由業受生方得為緣是以論云煩惱為緣有漏業為因因緣具足故得受生而言四住地者如勝鬘經云住地有四種何等為四謂見一處住地欲愛住地色受住地有愛住地疏主釋云能生名地令所生成立名住心迷不解名或八忍七智推求諦理名見緣一理總斷煩惱故云見一處住地合三界見總為一處即見諦惑也欲愛地者欲界地中一切煩惱除無明及見説為欲愛以此地中著外五欲故名欲愛然欲界亦愛自身但著欲情多故偏言之又簡上界所愛色身遍説欲愛也色愛地者色界地中一切煩惱除無明見説為色愛以此界中捨外五欲著己色身故名色愛然色界亦愛己心著色情多偏説色愛又簡無色愛著心故偏説色愛有愛者無色界中一切煩惱除無明見説為有愛若就皆下説之應名無色愛若隨所取應名心愛但今為破患故名有愛外道多取無色界以為涅槃今為破之故名有耳言今此中等者述義云上二説是總明今依毗曇細説故云別明四取也言依毗曇總攝百八煩惱等者如雜心論第五卷使品云欲取性三十四貪五恚五慢五無明五疑四纒十見取三十除戒取戒取性六戒取界種種分別有六説我取性三十八愛十慢十無馴十疑八色無色界有二纒睡及掉纒非界種分別前已説故此中不説乃至此百八煩惱取義故説取準此論文今言百八煩惱者欲取性三十四見取三十戒取六我語取三十八合為百八煩惱即見九十八使乃以十纒言九十八使者見惑有八十八修惑有十合九十八使也八十八者欲界四諦中苦諦下取十謂五鈍使五利使集諦下取七除初三見滅諦亦同道諦下取八除初二見合三十二也上二界各一諦中除嗔餘數同前上二界中各取二十八都合八十八也修惑十者欲界有四謂貪嗔癡慢上二界中除嗔各取三都合有十并前八十八并後十合九十八使也言十纒者一無慚二無悔三睡四悔五慳六嫉七調八眠九忿十覆此十種煩惱皆能擾縛行人故名纒也言三界有利鈍二使等者法門名義集云身見邊見戒取見見取邪見此五為利使為見諦煩惱能迷實理令不得見之貪嗔癡慢疑此五為鈍使為修道煩惱能障事中修道之行令謂不爾五見與疑準是見惑餘四通見修云何得言五見唯迷理之惑貪嗔等惑唯是迷事言欲界鈍使等者欲界四諦下各有五鈍使即四五二十見所斷惑修惑有四及以十纒合三十四煩惱名為欲取以能取外五欲故所以欲取也故世親佛性論第三卷云欲取者貪欲界六塵也言上二界等者色界四諦下貪慢無明各具足五合三十五通見修故疑即是四唯見惑故都合十九無色亦爾此三十八惑不取外五欲但取內法名我語取故佛性論云我論取者緣內身故一切內法名為我語貪著內法名我取疏主釋云緣內法者色無色界定緣內法成故名我語貪著此定名之為取言三界四見等者身邊見見取見邪見此云四見約此四見三界苦諦下各有四見即三四十二見也餘三諦下各有二見即見取見與邪見即十八見四諦都合三十見以此三十見為見取故佛性論云見取者於欲界中唯除戒取所餘四見名之為見貪著此見名為見取然論云欲界今云三界云何相違解云佛性論且舉初云欲界今依雜心論云三界以彼論云三十見取性故即是具説更可咨求也言三界戒取等者二界苦道二諦下各有戒取見即二三六見以此六見為戒取見故佛性論云戒取者於三界取世間邪正二道為離苦得樂是名為戒貪著此戒故名為戒取疏主釋云此四前二屬斷見但執現在謂無未來後二屬常見執有末來故又前二是在家人起後二出家人起又前出家在家鬪諍因後二在家出家修行因又前二欲取為所成見取為能成後二我語取為能成戒取為所成但取有二一者受取如因受生受二受資糧為貪此受故取四種資糧今所明是也具如寶崛中卷末言但取內法等者述義云上二界唯樂定心無樂外五欲於生死中實無有我而取有我但有言説實無有我故名我語取也言計非道等者外道計顯然二乘等不知別解脫戒遠為成佛之因而謂得外果之因就五戒十善準知之見取者決定義也言成論明四取其體等者如彼論第十卷難煩惱品第一百三十六云問曰四取欲取見取戒取我語取何者是答曰無我故但取是語名我語取若人有我見即生二邊是我若常若無常若定言無常即取五欲以無後世故深著現樂若定言常鈍根者即取持戒望後世樂小利根者作如是念若神是常即苦樂不變即無罪福故起邪見如是但因我語故生四取法師疏云答意無我中但取我語為真我故名我語取因我見生邊見因邊見生貪欲亦生邪見見取戒取故有四取準此論文但因我語故生四取故云其體則局也述義云總取邪執而為四取不開利鈍使等故云其體則局也言數云三根合知等者又婆沙第八卷雜犍度智品之四云問曰此六根幾到境界能知答曰到有二種一者取境界二者於境界無間若以取境界受之六根盡到若以無間言之則三到三不到三到者謂鼻舌身根三不到者謂眼耳意問曰若三是不到而能知者何故聞近聲而不見近色尊者和須密答曰彼界法自爾復有説者眼能取遠境界以極近故不見問曰耳亦是遠境界何以聞近聲答曰如以銅籌著安闍那藥置黑童上亦近故不見若聲到耳根極微上亦復不聞尊者佛陀婆説曰眼因明故能見近則冥奪於明是以不見如是耳因空故聞聲鼻因風故嗅香舌因水故知味身因地堅故覺觸意因所觀故能知法今略引之言成論總六根四句等者如彼論第四卷根塵合離品第三十九云問曰汝言識能知非根是事已成今為根塵合故識生為離故生耶答曰眼識不待到故知塵所以者何月等是物亦可得見月色不應離香而成又假空與明故得見色若眼到色則間無空明如眼箆觸眼則不得見當知眼識不到而知耳識二種或到故知或不到而知耳鳴以到故知雷聲則不到而知餘三識皆到根而知所以者何現此三根與塵和合故可得知意根無色故無到不到今取意略引之中論疏記卷第五本
