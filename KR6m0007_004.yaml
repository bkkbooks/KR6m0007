body:
  text: 中論疏記卷第三之本集衆異説不敢和會大安寺沙門安澄撰疏云不生亦不滅下等者碩法師云下第二辨青目注解八不也就此文為二第一標諦智章門即申歸敬第二長行注釋就初有三第一行偈標二諦中道第二半偈標二智中道第三半偈頂禮歸敬即是第一標二諦中道也此即青目取龍樹意解以青目取龍樹意解故非關別造論既言青目能取龍樹意解何故非是青目注論也琳法師云自下第二就本分別聖者龍樹造大無畏論有十萬偈於中抽出五百偈頌明中道今之論本所存只有四百四十四偈以減數因緣猶稱五百初有兩偈名為序分第二諸法不自生已下辨其正宗末後兩偈為流通分也元康師云下第二牒八不也文中有二前是偈文後長行解釋偈亦為二前偈標宗後偈歸敬今初標宗也言以去仁壽等者述義引傳云後周少帝闡在位一年隋楊堅令子楊光襲位即隋有二君合三十八年治之堅初年號開皇注二十年次年號仁壽注四年光年號大業經十四年今言去者於大業時著此疏故以後堅前故云去仁壽也淡海記云陳時於楊光而所伐以破國之日大師來至長安長安年號前名仁壽後呼大業又後時號貞觀故以後望前名為去仁壽也如有偈云後周終王少帝闡將諸太天享祀先庿掌客之臣楊堅有二美女與一男男是楊光也堅使此二女舉觴上帝帝感等二女好色即敕之曰納其弟女耳堅乃獻之仍納此女而棄先妃寵愛甚重經乎三年女啓帝曰欲見父焉乃詔莫過三日歸矣女退語父欲帝位平父曰若似朝花一日得耳女曰欲齎銛刀遂置靴裏而入宮中女以銛刀密頰帝頸乃出敕曰楊堅入宮因寵愛女而讓位於堅矣有人傳云一卷玄義云大隋仁壽二年四月奉命撰又下文云如疏初序準此玄文仁壽二年造此疏然有人云仁壽四年造此疏者可問也今撿嘉祥碑云仁壽二年令古淨名三論二疏百論序疏云大業四年今云仁壽三年有人解云唯此疏文初牒重牒相開序疏既云大業四年以去大業年中製作此疏也言江南學士智泰等者所言江南者有人傳云大唐十道圖之中江東江南黔中道此道內有會稽處此即吉藏師本生之所也別記云吳國在東南角故或云東或云南長安在西北角也此江從西南角至東北角也又長安西北在河此即黃河也從天竺阿耨達池流來河也有記云江東江左也今案唐圖芳州西方吐香國北有昆崘山是黃河上源從昆崙山東邊下黃河通出直向東流主臨洮郡向於東北方當於此處西名河西即河右是以向東而流下以至銀川郡向南方而流下彼處名河東是河左也然後更向東趣之北溟也又昆崙山南在岷山從此江上源從此山江流出直向東流下及至尋陽郡向南方而流其信安郡向東南流趣南海然會稽在信安郡之東今疏主居彼會稽故云江南後依楊光請赴長安所以云江左也言學士智泰者來至言皇朝者述義云隋大德真也為簡偽王故名為皇即楊光也朝即朝廷謂至光處也言請述所聞遂為其委釋者八不義復記云三論大師吉藏法師為大隋天子在長安日嚴道場撰作異家八不雖多不如此佳也今撿彼書之中觀論八不玄要六重明義尋本一得失二正宗不三淺深四絶道五同異六凡有八枚今疑若是依智泰所請為大隋楊光天子在京師日嚴寺撰辨正論第三云隋楊帝京師造日嚴寺也疏云大意第一等者言正觀之旨歸者述義云約明八不凡有二義一約境明八不二約智明八不故云正觀旨歸也言方等之心苻者所言方等者方廣之異名也言定佛法之偏正者有一卷記云有所得是偏也無所得是正也言八萬法藏者且舉圓數若具應言八萬四千法藏謂佛果地有三百五十德此等一一六度為有二千一百復以此等行對治四大六衰十患有二萬一千以此二萬一千行對治三毒等分之病故成八萬四千也所言若者如也遊者往也言十二部經者述義云契經應頌記別諷誦自説因緣譬喻大事本生方廣希法論議此十二部經表理之文為體性也故大經云知法知義知法者十二部經知義者十二部經所表之理也具明十二部經八萬法藏如記初卷也言白日者案瑜伽論第二卷云其日輪量五十一踰繕那當知月輪其量減一日輪以火頗胝所成月輪以水頗胝所成此二輪中月輪行速及與不定又彼日輪恆於二洲俱時作明復於二洲俱時作暗謂於一日中於一日出於一夜半於一日沒乃至廣説言余昔在江左等者顯疏主昔在吳國學文注年即是信也言者在江左者吳國在江東故云江左也鑽仰者有記云從在江南之時以來常愛樂八不年無間也多分學文時也言未栖河右等者顯後説法處即約解也言河右者黃河西也所言栖者玉篇致也招聲貌也呼來也照遙亦翺也今須致訓也言雖復東西阻隔者述義云左猶東也右猶西也阻者嶮也塞也言末始分乖者述義云此有二解一者依東有西柏依而不離故二者在東觀不二在西亦爾故云爾耳言阻隔者玉篇上謂險難也疑也邪也下説文隔塞也河之東西江之南北準大唐圖可悉言周旋南北等者所言南者楊州也北者長安也嘗者玉篇誠也徒者玉篇黨也空也使今須空訓也豈曰窮微等者如十二門論序云豈期能益耶庶以此心開自進路耳元康師云豈其能益耶者豈能益謂不能益也論語云豈其然乎謂不然也庶以此心開自進之路也者望以作序之心開自悟進向之道路非敢悟人也準此等文今云豈曰窮微者非謂窮微也題自心之路者表示自心進向之道路也題者表識者視之題為題字也疏云第二尋本等者言偈含五百者案序疏云四百四十六偈也或全大數也或翻者不盡今師即文撿文四百四十八故元康師云言五百者舉其大數他即文數之四百四十八偈初之兩偈文是重牒唯有四百四十六偈耳然琳法師云今之論本所存只有四百四十四偈以減數因緣猶稱五百者不知所以也言答領前序意等者述義云第一大意門云八不者蓋是正觀之旨歸等今指此文故云前序意也所言領者猶領解也淨名經云等者案彼經中卷佛道品維摩詰答普現色身菩薩問偈最初一行偈文所引全同故更不記疏主釋云實智內照為母而言度者窮智之原也方便外用為父方便有二一解空而不取證二實相涅槃深莫能信要唯方便誘引令物得悟前明順理之巧此辨適機之妙勝於實智故稱為父又實慧虛凝與陰同靜方便巧用動與陽齊故配父母也佛與菩薩並是導物之師由此而生也三藏解云菩薩如來通名導師以新學謂其未離受生應有父母今欲題其以法化生絶於是受身故益之以法也問大論第三十六云佛以般若為母般舟三昧為父今佛何故方便為父耶答疏主判云般舟翻為現前現前見佛是有行故屬方便名之為父既言屬方便故不相違疏問八不但是等者言如大品云等者如彼經第二卷佛告舍利弗言菩薩從初發意行六波羅蜜乃至坐道場於其中間帝為二乘作福田以有菩薩因緣故世間諸善法生乃至六度世間果報三乘聖道皆現於世又第十三卷諸天子白佛言以菩薩因緣故斷三惡便十善道及四禪剎利大性輪王六大乃至色究竟天須陀洹乃至諸佛出現於世佛言如是如是乃至廣説準之可悉今取意引之疏云問二慧云何由二諦而生等者下明識二諦發生二智言關內影法師中論序云等者舉偽秦長安曇影舊説此師製作中論疏二卷有本也注但在二卷名曰注中論也然述義云此師製述中論義疏凡有四卷流行於世者非也彼四卷疏無作者名疑淨秀師疏也今撿彼序云夫萬化非無宗九行之有時有大士厥號龍樹爰詫海宮逮無生忍意在傍宗載隆遺教故作論以折中其立言意也即無言不窮無法不盡然統要歸即會通二諦以真諦故無有俗諦故無無真故無有即雖無而有俗故無無即雖有而無雖有而無即不果於有雖無而有即不滯於無即斷滅見息不存於有即常著氷消寂此諸邊故名曰中今略引之述義云斯論雖無法不窮等者示論宗致以真諦故等者且約開門二諦示于顯道之義謂欲明中道正境先舉用二諦耳譬如有波必有水有水不必有波既言用故必明於體此非專欲言用義也而云以真諦故等者於非有假説有於非無假説無也言不著於有故等者結正境義也言斷無見者猶無邊執常著者猶有邊義言關內者長安之東方有關從此關至長安諸師皆初關內耳今謂不爾從長安京於西北角有玉門金城二關指此中間故云關內也疏云問云何真諦雖無而有等者問答以顯舊序意也言答此由是等淨名玄云詳此意者真故無有雖無而有即是不動真際建立諸法俗故無無雖有而無即是不壞假名而説實相以不壞假名而説實相雖曰假名宛然實相不動真際建立諸法雖曰真際宛然諸法以真際宛然諸法故不滯於無諸法宛然實相即不果於有不果於有故不常不滯於無故非斷即中道也述義云真故無有等者於非有假説有於非無假説無言真際者猶真諦空即非有義立諸法者謂假説有言假名者猶俗諦法即非無義説實相者言假無言不壞假名等者明有即是無無即是有義以真際宛然等者明即是故離邊之義不果於有等者結正境義如大經云非常非斷故名中道也準此玄文今云不壞假名等者引大品經第十三卷文以明有即是無無即是有義言不動真際等者引大品經第三十六卷文明即是故離邊之義也經二所文具引如初牒末也有人傳云經云諸法相今云實相所言相者體相也即實相是經云建立衆生於六度今云建立諸法所言六度者即是諸法也言真際者猶實際之別因也故大論第九十一云菩薩求無明體即時是明所謂諸法實相相若為實際也言不動者如淨名經上卷佛國品偈云能善分別諸法相於第一義而不動御製云言動者失也乖也準之可悉也言實相者本來寂滅之理離虛妄法為諸法性故曰實相所言實者非虛妄義相者體性也故無行經云實相無煩惱無衆生無佛乃至觀好惡音聲知非音聲性常入無文字實相之法門也疏云二諦生二慧等下明欲釋正觀先舉用之境智相生即以悟有宛然而無等是也故淨名玄云以了諸法實相故生漚和般若以悟實相諸法故生般若漚和準此玄文今云有者諸法無者實相也言漚和般若等者明即是義如境有無相即智之權實相即亦爾般若即漚和漚和即般若故淨名玄云漚和般若而宛然漚和般若漚和與宛然而般若故等者明即是故遠離二邊故玄之以漚和宛然般若故不著於有般若宛然漚和故不滯於無準此玄文今云常者有也斷者無也言不斷不常名為中道者話正觀義故玄云不果於有故常著氷消不滯於無故斷無見滅寂此諸邊故名中觀準此玄文今云正者此義也疏云然離二諦無別中道等者此示境智相應謂由中道正境發生不二正觀正觀證照正境境如智智如境相生證照不差失故言然離二諦等者約境明體用相即也即明正境也言離二慧等者約智以明體用相即也即明正智也言故以二諦等者正明境智生相生也故百論序疏云非正境無以發正觀非正觀無以照正境準之可悉疏云問既知二慧由二諦而發等者此正示父母也言一者實慧等者明約動靜以配父母也述義引遊方策云問曰何謂陰陽答陰陽者天地之氣寒氣為陰熱氣為陽陰氣陽氣主生陰陽之氣共五行故曰陰陽也今有三解一約天者日為陽月為陰二約人者男為陽女為陰三約地者山南為陽山北為陰餘義準知言虛凝者嚴慗之貌也言又凡夫等者第二義明約同體以分勝尚配當父母也故淨名玄照空之慧未能涉有復照空慧未巧但般若照空之慧即能涉有故轉名方便也言故羅什答王稚遠問明云等者此引大義章證成同體義如法華玄第四卷云人如什公答王稚遠問方便與智同是慧性但智淺而方便深了實相名實慧不證實際名方便準之可悉述義云秦王姚興之博士也姓王名稚遠翻大品時以此問羅什也準之可悉疏云問般若漚和等者下總定體用也言答智度論云等者如彼論第一百卷云般若中雖有方便方便中雖有般若而隨多受名般若與方便本體是一以所用小異故別説譬如金師以巧方便故以金作種種異物雖皆是金而各異名菩薩得是般若實相即欲滅度以方便故不取涅槃證是時作是念一切法性空涅槃亦空我今功德未具足不應取證以方便力過二地入菩薩位知甚深微妙法引導衆生是名方便今略引之流義云直照空有似存滯礙猶如金體照空即涉有用妙而無滯如金上巧物巧物時不失金金時未有巧方便時必有般若般若時未有方便其義例之故玄云般若與方便等者此即明權實一體約義分二金喻般若等者方便為用也有人傳云譬如主于巧譬漚和此即論文只譬如字至于有金巧二義方用也疏云問漚和云何巧耶等者下顯方便善巧所以也即明一照一巧義也言故羅什云等者注淨名經第四卷問疾品中羅什曰觀空不取涉有不著是名巧方便也今明六地以還未能無礙當其觀空則無所取著及其出觀淨國化人即生見取想心愛見拙於涉動妙於淨觀云空慧不取相雖是方便而從慧受名此中但取涉有不著為方便故無方便而有慧也七地以上其心常定動靜不異故言有方便慧也今取意略引之有人傳云準此注文以同巧故下文是疏主順同之言但觀空不證等者述義云夫論二智照空時即涉有有時即照空舉般若時方便所言舉方便時般若所言雖同一時隨義隱顯般若照空即隱巧顯照方便涉有即隱照顯巧所言照者雖復照空即能鑒空故玄云般若從實相境立名又當其體故顯照隱巧方便不從照俗境立名但取巧用故顯巧沒照故玄云雖復照空即能涉有此用既巧名為方便雖復照有即能鑒空此用巧此照雖巧但實智為體故隱其巧名與其實稱也言智度論釋譬喻品云等者如彼論第七十一云須菩提譬如有人年百二十歲年耆根弱又有風冷熱病若雜病須菩提乃至如向老人百二十歲乃至是人欲起行有兩健人各扶一腋語老人言莫有所難隨所欲至我等二人終不相捨如是須菩提若善男女為阿耨菩提有信忍淨心深心欲解捨精進為般若方便力所護乃至為一切種能護當知是人不中道墮二乘地能到是處所謂菩提論釋曰老病人者是有信等功德菩薩不斷六十二邪見故若老不斷百八等諸煩惱故名病從床起者從三界起我當依佛以邪見煩惱因緣故能成菩薩道二人者般若及方便般若滅諸邪見煩惱戲論將至畢竟空中方便將出畢竟空今略引之淨名玄釋云將入畢竟空即是照實相無諸戲論則謂無著及斷惑之功也方便將出畢竟空即是為般若所導又是方便不證照境起行之力述義云入者悟也謂修正觀悟性空故出者起也如經中言從三昧知知即是出謂從空觀而出緣俗有之境故空是實相謂無實相然言實者對俗浮虛以真空義為實也有一卷記云佛為衆生是故説教依教修行隨根上下而受生處常清淨故嚴土化人也別記云上求佛道故云嚴土下化衆生故云化人今撿論文無嚴士化人益是得意引淨名文以潤飾也所言將者玉篇助也牽也言淨名等經者如彼經中卷問疾品云何謂有方便慧解謂不以愛見心莊嚴佛土成就衆生於空無相無作法中以自調伏而不厭疲是名有方便慧解疏主釋曰嚴土化人隨有不著名方便入空自調伏稱之為慧如此修者能以空慧導有不著故名方便義成而在慧便解準之可悉言及釋僧肇大同此意者注淨名經第四卷釋僧肇云始行者自在先以方便積德然後修空慧者亦有無修空慧而後積德者各隨所宜其解不殊積德向菩提即嚴土化人之流也又云巧積衆德謂之方便直達法相謂之慧二行俱備然後為解耳若無方便而有慧未兔於縛若無慧而有方便亦未兔於縛準之可悉有人述有説云羅什心與智度論文同明二智各照一境也淨名經及僧肇大同此心雖然肇師正用二照二巧也疏云問直觀空為般若等者上來約一照一巧以明二智今約二照二巧以明二智言答以羅什意等者上所引注第四卷文意也彼文云觀空不取相雖是方便而從慧受名此中但取涉有不著為方便故言無方便而有慧也準之可悉言肇師正用此意等者如注經第四卷云釋僧肇曰巧積衆德謂之方便直達法謂之慧二行俱備後為解耳今略引之述義云所言巧者不證不著之義也今撿淨名玄云照空不證者凡有二義一者般若照若實相實相既無所依即般若亦無取證此般若之二不證空名為不證此方便力也涉有不著者亦有二義般若入空故言不著有二者方便為般若所道能涉有不著此般若力準此玄文照空不證者方便之力也涉有不著者般若之力也所言涉者蒼頡篇云入水間行曰涉也序疏云行山為踐行水為涉蓋是別論耳今通取行義為涉也問何等為直達法相耶答玄云直照空有名為般若行空不證涉有無著故名般若此之照巧更無二體以巧而照故名為實以照而巧故名方便準此玄文直達空有法相名為直達法相問若照空並名實者空有二境應俱得稱真答能照之智若名實智所照之境同稱實境實境實智之中有空智有智實境之中有真境俗境問既有真俗云何皆名實境答是如實智境故名實境從智受名又實是真俗非妄情之當體名實也問何故真俗二境名如實智境耶答般方便如實照境故云如實智此二智所照境故云如實智境問云何名為如實照境耶答於假有無如其道理實知是假不生性執故云如實照境也有人傳別記云直達法相者約二諦理也此照二諦義云實相也傳又記云正用此意者正用前問之心耳傳自意云至于漚和此肇師語所言巧積衆德即是照空不證等文意問般若照二諦境者二境應起一智答般若體非不能照諸法但用既照不煩般若照耳若用既照諸法而體復照者即一境二照既一境二照亦應二境一智生是生但明般若照實相漚和諸法也今諸此明二智答照一境耳非謂二照二巧門故不相違疏云問亦得直照空義等者此下明體一用多門也言般若直照等者由不見一切相而見實相故云直照所言照者猶照見也言一能照空等者實相既無所依即般若亦無依著故大品云菩薩於空不著故不證空所言證者猶證著也言次觀空等者以無纍著故能導方便令涉有無深著所以然者照空於空無著是般若之力故屬實慧也言三涉有復能無著等者如大品云菩薩以方便力故為衆生受五欲而無所染準之可悉言故用金為體等者如大論第一百卷云譬如金師以巧方便故以金作種種異物雖皆是金而各異名般若與方便本體是一以所用小異故別記述義云直照空有似存滯礙猶如金體照空即涉有用妙而無滯如金上巧物準之可悉疏云問若淨名經等者上來明以二智為法身父母竟自下會通異文言瓔珞等者今撿目録云宋沙門道嚴譯菩薩瓔珞本業經凡有二卷如彼經下卷佛母品云佛子二諦義者不一亦不二不常亦不斷不來亦不去不生亦不滅而二相即聖智無二無二故是諸佛菩薩智母十方無極剎土諸佛皆作是説今取意路引之皎法師云不一亦不二者顯彼初雙二諦離邊以有無常爾故不聖智照空故不二故第三不常亦不斷者顯第二門二諦離邊以法界不變故不斷第一無二故不常故第三不來亦不去者顯第三門二諦中道以因緣和合而無從來因緣破散而無所去故第四不生亦不滅者顯第四門二諦中道以不壞假名而非有生其用顯實相而非有滅故是謂別門八不義也而二相即聖智無二者前説四雙皆不相離故離諸邊而不墮中偏如不一即是不二乃至不滅即是不生如是相即遠離諸邊如是二諦相即不離所以二智隨境無二是故無二之二諦境能為無二之二智母以之故言無二故是諸佛菩薩智母然智母之義略有三種一者一切衆生本覺之姓始覺所依故名智母能與始覺而作本體乃至三者二諦中道非本非當能生聖智故名智母今此文中顯第三義十方如下第三總結正明智母竟在於前也言答若以二慧名為佛等者此示生母義言若言二慧生佛等者此示説母義準之可悉疏云得失門第三等者言問八不但是衆聖之得源者通示八不與得失作本言六趣者述義云約所得報名為六趣若約能得業名為六道也問經説有五道今云何言六趣紛然耶答智度論第十一卷云佛去久遠注法流傳五百年後多有異部或言五道或言六道摩訶衍法中法華經説有六趣衆生觀諸義旨應有六道復次分別善惡故有六道善有上中下故有三善道天人阿修羅惡有上中下故有三惡道地獄餓鬼畜生也述義云修羅攝於鬼道故云五道也法華疏云道安師之道行注胡音此云質詣其以多曲故為亦此名令其質直誠信詣即信也婆蘇傳云非天也正法念經云修羅有鬼有畜羅睺是師子種婆娑伽陀經云有鬼有畜有天準之可悉言紛然者猶亂也言又涅槃云等者彼經第七卷文今取意略引之如彼文云譬如雪山有一味藥乃至王既沒已其後是藥或酢或醎或甜或苦或辛或淡如是一味隨其流處有種種異是藥真味停留在山猶如滿月疏主釋云雪山譬衆生五陰身一味藥譬佛性中道佛性故念一智者所可藥故云味得此佛性能破煩惱病故言藥言王既沒已明佛去世後衆生薄福修行斷常生滅等因致令佛性成六種是藥真味停留在山者明衆生雖復行斷常得種種果而佛性終不失如滿月者譬佛性中道圓正準之可悉言中道佛性不生不滅等者案大經第二十七卷云善男子以是義故十二因緣不生不滅不斷不常非一非二不來不去非因非果乃至十二因緣其義甚深乃至廣説準之可悉疏云問云何失於八不等者下別示八不與失作本也言愛見煩惱者案序疏云生死根本唯愛與見起愛見二因感無常苦二果也疏主引法品云戲論有二一者愛論謂於一切有取著心二者見論於一切法作決定解也碩法師云貪瞋慢疑無明此五鈍使名為愛論身見邊見戒取見取邪見此五利使名為見論所言愛者以染著為義也見者決定為義也所言業者造作之義也即三種業所謂善不善不動業也不善之業感於三途善業感欲界人天不動業者感上二界具明如下言即有生老等者如稻等經彌勒菩薩答舍利弗言後陰始起故名為生住世衰變故名為者最後敗壞故名為死追感往事言聲哀戚名為憂名為惱疏主釋云此八通是內身之苦故稻芋經云邪見妄解名為無明以此邪解赴於三業故名為行善惡等業能受果報故名為識從染汚無記業生染汚無記識不動業生不動識從説生名色從名色生六入從六入生觸從觸生受從受生愛從愛生取從取生有從有生生從生有老死憂悲苦惱準此經文今云不悟八不等者即是無明也故淨名玄初卷云迷緣既不悟二不二亦不了不二二故無二慧則稱為無明故大品云諸法無所有如是有無所有是事不了名為無明故知爾也即是過去受生本也言愛者現在受生本也所言病者一乖變常百一病四大乖變四百四病故云病也若依十地經者死別離時愚人貪著心熱名憂發聲啼哭名悲五根相對為苦意根相對憂苦轉深為惱準之可悉疏云問得失八不凡有幾人等者下明得失八不之人言失人四者一鈍根起愛衆生等者此下別明失人言一鈍根起教衆生者凡夫也人是在家又是天魔也言二者利根起見外道者此出家外道亦可二乘人也言如智度論呵旃延云等者如彼論第四卷云問何以故未得佛道名為菩薩得佛道不名為菩薩答曰未得佛道心愛者求欲取阿耨菩提以是故名菩薩已成佛道更得佛種種異大功德故更有異名名為佛譬如王子未作王名為王子已作王不復名王子既為王雖是王子不名王子菩薩亦如是未得佛道名為菩薩已得佛道名為佛聲聞法中摩訶迦旃延尼子弟子輩説乃至摩訶衍人言是迦旃延尼子輩是生死人不謗不誦摩訶衍經非大菩薩不知諸法實相自以利根智慧於佛法中作論議諸結使智定根等於中作義尚處處有失何況欲作菩薩論議乃至汝言初阿僧祇劫中不知當作佛不依佛二阿僧祇劫中知當作佛不自稱説三大阿僧祇劫中知得作佛能為人説佛何處説是語何經中有是語若聲聞法三藏中説若摩訶衍中説迦旃延尼子弟子輩言雖佛口三藏中不説義理應爾阿毗曇毗婆沙菩薩品中如是説今取意略引之慧影師云摩訶衍人言已下即是大分第三論主廣破尼子等所説非義就中有二一總出其失謂雖得羅漢不脫變易雖斷煩惱報身未亡此報身猶屬分段生死故云是生死人也得諸法實相少故言不得如美中少鹽名無鹽美也當説於小乘中以諸戒使定智業與大見根等為八法聚釋猶有失何況乃欲解大乘義耶未得三藏意故旨失耳汝言初阿僧祇劫中下第三破未知是菩薩不是菩薩義汝言三阿僧祇劫中既未種佛相故不知是菩薩者汝第二僧祇劫時已得授記能上升虛空見十方佛爾時授記即是大相豈得不知是菩薩而取小相也三藏經摩訶衍經並無此言汝體何處得此義也準之可悉有人傳別記云亦三藏所無者言有極微也今謂不爾違大論故也有一卷記云大乘説十八不共法不如旃延所引故云是法非大乘中説也大乘中説十八不共法者三藏中所無故云亦三藏所無也言蓋是等者論云旃延尼子弟子輩言雖佛口三藏中不説義理應爾阿毗曇毗婆沙菩薩品中如是説是也有人云是疏主釋成論意者非也言如五百部等者大論第六十四卷信毀品文具明如上慧影師云般若雖言其無而不傷其有但以緣集假聚故名有説為非無無性故説為無名為非有不解此義故如刀傷心也準之可悉疏云四者即是小乘人回心等者上來已明愛見衆生回心學小乘有三失竟今次明小乘人回心學大乘亦有三失言於大乘中種種推斥等者方廣道人也故下文云方廣道人學大乘明一切法不生不滅畢竟空也有一卷記云地論師云般若是不真宗涅槃即是真宗此語大乘與小乘中所無故云爾又嵩法師云雙林滅是實同大品意然涅槃明常樂我淨此是權教故云爾言三者保執大乘等者言如法華論釋藥草喻品等者案彼論明七種對治之中第三雲雨譬言三者大乘人決定增上慢心起如是意無別聲聞辟支佛乘如是意倒取對治此故為説雲雨譬喻應知疏主解云大乘人者標人也一向決定者標病也起如是意釋病謂無別二乘人故稱為病也此人初聞一乘經謂唯有一乘無有餘乘遂有二失一失於一説三二失於緣成三如是倒取者實有二種二乘有而言無故言倒取為對治此故下第二由能對治雖地雨是一於草木成差隨草木成差雖理是一隨緣成三於緣成三也準此論文如字至于破菩薩病而用耳言以菩薩聞通理等者疏主釋成論意也藥草喻品疏云次依法華論明此品來意者火宅譬被凡夫病窮子譬破二乘病雲雨譬破菩薩病菩薩之人聞上來所説唯有一理便謂畢竟無復三乘方便此即得質失權存體忘用然識權方乃悟實達用乃鑑於體既不識權亦不悟實即權實俱喪體用並為治此病故明雖一地所生一雨所潤而諸草木各有差別雖至理無二而於緣有五故權實義故體用方顯言雖一地所生等者疏主解云雖一地所生一雨所潤者第七明能生是同譬也而諸草木各有差別者第八明所生差別譬今此兩譬論能生是同所生有異而是至理無二於緣得益不同所以論同異者為欲今昔二病稱歎二人破今昔二病者昔五乘人正執於教異不知理同受今一乘教執理同不知教異破此二人故明理雖同不生教異雖五乘教異而主常同故文云爾耳有人傳別記云此有二義一約體用理教言之所言一地及以一雨是體是理即是非大非小體也而諸草木是用是教二者約用而為言之何者一地一雨是大乘教即是本也而諸草木是小乘教即是末也所生所潤約所分別而為言之以小乘教從大乘內出故非是被緣而言教也即是大乘機大乘教大乘因果也而諸草木各有差別者小機小教小乘因果也亦可約大小乘即是各有受潤增長義故約大乘教而為言者受大機人故云受潤也修因得果義名增長以此義言但約大機受大乘教故云所生所潤也今謂不爾違疏文故不妨於緣成小者不妨大教於小緣而成少之語也言故去城逾遠岐路逾多者爾雅云道二達謂之岐言故法華經等者如彼經第二卷譬喻品火宅偈云鵄梟雕鷲烏鵲鳩鴒蚖蛇蝮蝎蜈蚣蚰蜒乃至處處皆有魑魅魍魎夜叉惡鬼食噉人肉疏主釋云若約攝法而為言者毒害雖多不出二種一者顯現有形之物謂怪鳥毒蟲也二者隱無形之物夜叉惡鬼為害之極唯有斯二有形蟲鳥譬三毒緣事煩惱無形鬼神譬迷理諸見害法身慧命唯有理事兩惑也若約次第者有形鳥獸譬在家起愛衆生無形鬼神譬出家起見外道若約同異者起三毒煩惱名為毒蟲若起諸見稻為惡鬼具此愛見使惑苦果煩惱身心故名火宅也若禪文者上有怪鳥譬上二界愛使下有毒蟲以譬瞋使愛唯在上不在下譬同諸鳥瞋唯在下不在上喻彼毒蟲重瞋如蚖蛇蝮蝎輕瞋如蜈蚣蚰蜒以處處皆有下上來第一譬在家凡夫起緣事之使即起愛之徒也自下第二譬出家外道起達理之使於中有二初明疑使夜叉惡鬼下第二明見便也述義云以貪等五喻毒蟲及禽獸雖然毒蟲多故今從多舉毒蟲以身見等五為見喻慧鬼也蟲者曇捷師云蟲今作蟲言方廣道人等者有傳有説云是人此乃五百部內人而盜大乘故云學大乘耳今謂不爾五百部執於定性有方廣道人執定性空此部即是大衆部中一説部是疏問如來出世正為何人等者言此二人中有無聞非法者如勝鬘經攝受正法章第三明康法之人誓云又如大地持四重擔荷等為四一者大海二者諸山三者草木四者衆生如是攝史正法善男子善女人建立大地堪能如荷擔四種重任踰彼大地何等為四謂離善知識無聞非法衆生以人天善根而成就之求聲聞人授聲聞乘求緣覺乘者授緣覺乘求大乘者授以大乘是名攝受正法善男子善女人建立大地堪能如荷擔四種重位也疏主釋云不近善友故云離善知識也雖有善友不相值遇親近義希故稱為難三乘人及人中善人能以善法利物為善知識不能聽受正法故曰無聞或都不聞正法或聞之甚希或可雖聞不解無惡不造不能繫念思惟如法修行故言非法授與福分善根令修福捨罪復生善處漸得入道故言而成就之有下乘根性復欣樂下法故名為求為説四諦欣厭觀法故授與聲聞乘問緣覺之人佛在世時為其説教可得是授出無佛世有授義以不答亦有二種授義一者諸佛菩薩以神通力起風動樹自而葉落令其思量故云授與二者以人為緣如彌猴仙人坐禪遂得緣覺亦如是授義準之可悉有一卷云有無聞非法之人昔有可聞人天教之機以人天乘而化度之有可聞三乘教之機以三乘教而化度之非謂現在為有五乘性而説五乘教以化度之疏云次明四人等者此下示得八不之人言如前所明等者疏初卷正名門中引涅槃經第二十七卷且明觀十二因緣今指彼文故云如前所明也言觀中道者述義云凡有三義一者以體中為所觀皆向於體而智力不同故有四種耳二者體用具足方是中道夫中以不偏為義三者二諦用中名為中道何者雖等觀二諦而二乘人不能究竟觀具明如記初卷也言三獸者有本作狩字言何得文云為聲聞人説十二生滅等者初牒長行文如彼文云先於聲聞法甲説十二因緣人為已習行有大心堪受深法者以大乘法説因緣相所謂不生不滅不一不異等畢竟空無所有元康師云先説十二因緣生緣其計無因邪因生即如增一阿含中説十二因緣生滅次又為已習行下第二明為諸菩薩説大乘經也久行大道久捨善根故云已習行也發大乘心故云有大心也以久習各已發大心所以堪受深法故云堪受深法也以大乘法下上來明教之緣此下明緣之教也先為外道計無因邪因生故説十二因緣和合生今為菩薩宜聞不生不滅故説因緣不生不滅也十二因緣前後相續不可言生不可言滅等既不生滅是故言空今引此文以為難問只本云阿得經云今本無經字也言如智度論釋大小二空等者如彼論第三十一卷云大空者聲聞法中法空為大空如誰阿鋡大空經説生因緣老死苦有人言是老死是人老死二俱邪見是人老死則衆生空是老死是法空摩訶衍經説十方十方相定是為大空問曰十方空何以名為大空答曰東方無邊故名為大亦一切處有故名為大遍一切色故名為大常有故名為大益也世聞故名為大令衆生不迷悶故名為大如是大方能破故名為大空餘空破因緣生法作法麁法易破故不名為大是方非因緣生法非作法微細法難破故名為大空慧影師云大空者已下論於二乘不得法空而言聲聞法中以法空為大者師言其實不得法空但其觀法故注云如羅他茂樹樹雖已臥灰炭等在時樹想猶生至灰炭都盡樹想乃滅爾時來得法空而所以除灰炭者只追樹想故説言法空為大耳今解若謂其觀法不得空者三何乃説法空法空為大而所以爾者有二意一者諸小聲聞不得法空唯大者得故云法空為大二者於盛聞中以法空難得故云法空為大不得言爾時但觀法故言法空為大人人讃歎法空故云是大如雜阿含大空經已下所以引此經來者欲明聲聞但以十二因緣等空為大空為大空義言誰老死等空為生空樂小空者爾時但得誰空故云爾小也老死等空為法空者屬大空人欲明此大空義故所以引來也摩訶衍經十方空者欲大乘中大空廣義此中以十方為大空若大本經乃以般若空為大空者此就世間法明大空義彼就出世間明之各有一意不相違也今取意引之言答玄義中已釋者如一卷玄義第六分別大小門云問小明一空大辨二空可有差別既同二空大小何異答略明四種一者小乘折法明空大乘本性空二者小乘但明三界內人法空大乘明三界內外人法並空三者小乘但明空未説不空大乘明空亦辨不空空者一切生死不空者大涅槃四者小乘名為但空住於空菩薩名不可得空空亦不可得也故知雖明二空空義有異故分大小準之可悉述義云一説部人折法之後方知是空而不知本來空如二乘與菩薩立因緣假法而見義有異故云一者小乘折法明空等故淨名玄云利根二乘設得法空蓋是折法明空菩薩法空自性空自相空即空為有即有為空故二乘折法明空菩薩明本來空也言智度論云二乘名俱空等者如彼論第三十七卷習相應品下云空相應有二種一但空二不可得空以但空墮二乘地以不可得空空亦不可得即無處可墮後有二種空一者無方便空墮二乘地二者有方便空即無所墮直至阿耨菩提今取意略引之述義云但空者人空之異名又但者住也出觀時著空故不可得空者知空亦復空故即不著空之言智度論又云等者如彼論第三十七卷云舍利弗欲以須陀洹同得解脫故與諸佛菩薩等而佛不聽譬如有人欲以毛孔之空與虛空等今取意略引之淨名玄二乘得小空如毛孔空菩薩得空廣遍知十方空問空有何大小耶答一乘不能別相一一知諸法空但總想知十二入空故名為小菩薩能引相知一切法相謂麁細大小淺深法然後知其是空故空廣大述義云如阿含云二乘不知赤鹽白鹽問他方知餘物亦爾又大品云菩薩名一切種智以別別知諸法故二乘名一切智唯總知諸法故是知二乘有小分方便智準就自行總相知因緣假法智而無他方便智也麁細等者若就教法小乘教麁大乘教細大小例之大乘所説之理大故能顯教法亦大小乘及此淺深亦例小乘法淺大乘法深若就事法四微是細柱等是麁廣明如名記第三卷也疏云正宗門第四等者約此第四門大有三段第一總明由八不正故三種中道正第二明三諦各具八不第三明結束今此文初也言問前言二諦等者上第二尋本門云答由八不則二諦正二諦正即二慧生今指此文故云前言八不等言答由八不故世諦成中道等者案中論玄義云諸法實相言亡慮絶未曾真俗故名之為體絶諸偏邪因之為正故云體正也體絶名言物無由悟雖非有無強説真俗故名為用此真與俗亦不偏邪目之為正何者假有不可言其定有假有不可言其定無此之假有遠離二邊故名為正俗有既爾真無亦然假無不可定無假無不可定有遠離二邊故名為正然像末鈍根多墮偏邪四依出世廷正佛法故明用正既識正教便悟正理即有體正準此玄文末世鈍根墮在八迷今由論主釋於八不廷正佛法故三諦正準之可悉疏云問論主何故等者言三者即世所行亦云有三種中道等者述義云齊梁之代學成實者所明如前卷應知又案法師云破彼有虛假理與真無相理雖就此明中終是二理不離斷常今云中道者中假無二中義豈同乎有人得云下料簡門云成云無生無滅此明真諦復有人云不生不滅明真諦義不斷不常明世諦義也後之有人義當於此處即世所行之義今撿均正十二卷章第二卷八不義云成實師解八不不同一云八不並是真諦中道亦是真諦也二云不生不滅是中道即是真諦不有不無中道餘六不是俗諦中道準之可悉言但考責三中皆不成中等者彼云實法滅故不常假名相續故不斷不常不斷名為中道今謂不爾不常猶是斷不斷猶是常何中之有也又彼云真諦四絶故非有不妨會真成聖故非無所以真諦中道所言非有非無即不生不滅也今謂不爾汝真諦四句絶故是無會真成聖故是有只是有無何有中道彼云俗即真故非有真即俗故非無即非真非俗中道今謂不爾非真猶是俗非俗猶是真還是二諦更無別中故云墮在偏邪也真如碩疏疏云問云何將八不釋成世諦中道等者此下第二明三諦各具八不於中有三第一辨世諦具八不第二辨真諦具八不第三辨非真非俗具八不今此第一明世諦具八不即成四別今即第一明不生不滅言一師語等者所言一師者興皇寺法朗師也言他有可有等者失四對中初二句所言有可與不由也得句亦二所謂無可之與由也言故以空有等者二諦假也道理只應舉世諦假然今欲示二假不離故具舉耳言因緣生不可定生等者正作世諦中是從世諦復假入世諦復中疏云問師云假生不生等者簡世諦所除之執有人傳云此舉二三方言世諦中以問耳今謂不爾此第二方言世諦中云假生不生假滅不滅此乃不假何言不性耶言答師云假生不生此有三意等者有人傳云此第二第三兩方言之意何者言若明二諦俱無生義等者第二方言意也即是舉世諦無生義可知真諦無生義故云爾耳言自有假生不生等者此第三方言階漸義故彼文云二者欲示階漸明義者世諸中不生不滅即是真諦之假非是破性明中乃明世諦假生雖生不起世諦假滅雖滅不失故生滅宛然未曾生滅故世諦中即是真諦之假也準此疏文今云不於似生者泯寂泯不之義也言是如上釋者指初牒文言三者明此假生即是不生等者第三方言相即義故後文云一者即世諦生是不生如色即是空故不生即是世諦準之可悉然此文大意明中假相即故云即世諦是不生所謂即者非即是即遠離四句故名為即謂世諦假生離邊之義即是中道也非謂二諦相即也言若安不生置於真諦等者別記云若定不生但置真諦者即是不知復假何者世諦具有生滅故名為復假也今葉玉篇安者止也定也疏問性實生滅等者答以生定生即生是常生示者有人傳云若者玉篇汝也如也比也今謂勿加比字述義云所言故者即也言答説云等者此即是論第四卷四諦品中引華首經之偈文然令為證中假無二諦故略引下半文琳法師云亦為是假名者追有明空空是彼名説也又真別絶相言行斯斷豈容有空於其間哉但假言以示無言故云亦為是假名也亦是中道義者無性故非有空空故非無遠離二邊名為中道此釋直明相特以破有無而未正明因緣本義今明萬法起也藉因託緣互相依持離有離無相依故非有恆持不是無離有無二邊乃名中道義也疏主之意如記初卷疏問若爾攝山大師等者述義云楊州之南有攝嶺山山內有止觀寺昔梁武帝初學成實毗曇聞高麗國道朗法師從北地來住攝山止觀寺善解三論妙達大乘道智寂等十師就山學之而傳訓授梁式因此遂改小從大後攝山麓造栖霞寺坐禪行道故云攝山大師也案均正玄義第十云道朗師德會稽山陰懸少時説法處諸法師請法師後來攝山攝山去楊州七十里止觀寺行道乃至廣説具如記初卷也疏問大師何故等者言四諦品云等者此論第四卷觀四諦品偈文所引全同具如初言長行釋云等者如波文云衆因緣生法我説即是空何以故衆緣具足和合而物生是物是屬衆緣故無自性故空空亦復空但為引導衆生故以假名説離有無二邊故名為中道是法無自性故不得言有亦無空故不得言無今為諸體用異具引偈文并長行文取意略引之今云以遠離二邊等者疏主釋云因緣是中道義即此因緣離於二邊故名為中道言為衆生故等者因緣是假義既無自性故不得言空空亦復空故不得言空為化衆生故以假名説故因緣是假義準之可悉言中道為體等者此疏主釋論意示體用別也只中與假無有二體然義不同故前後舉之也言若辨三中三假等者述義云於二諦處名之與合皆具中假故故三中三假也中假不相離義故云常通也此卷之末具明中假故云後當具説即體中具八不之處具明四種中假即是文也疏問何等是性實生滅等者言一者世間所説等者此順世外道計故流主云現緣外道謂四大和合能生外法男女交會能生衆生準之可悉言二者諸外道所計無因邪因等者疏主釋云無因外道謂萬法自然而有不從因生言邪因者一者一因外道謂自在天等只一因能生萬類之果二宿作外道謂萬法之果但由往業無有現緣三現緣外道上所引是也是諸外道計定有生亦名性實也言三者小乘之人等者疏主釋云從未來來現在從現在謝過去今撿此論第二卷末觀有性無品長行云如説三世者未來中有法相是法來至現在轉入過去不捨本相是則為常疏主釋曰此是薩婆多義準之可悉又大論第六卷云如鞞婆沙中説微塵至細不可破不可燒是則常有復有三世中法未來中出至現在從現在入過去無所失是別為常慧影師云汝毗婆沙中薩婆多家城微塵等常同外道義言四者有所得大乘等者有人傳云此處文而世諦破假今云何言第二方言世諦之處不破假耶解云淨名玄述義第五云為計性者故説俗諦假為計俗假者故説真諦假以此義故言漸捨等準此記文成實方廣俱是定性病故以世諦假破之也又縱破云二諦破假執但今奪破云世諦不性真諦不假總顯意云有所得假生滅猶墮性滅執有所得假無生猶墮假故假生滅執故云奪破也又下文云計實無生既是有所得猶是生義耳又云由來雖言世諦是三假令以無所得望之終是性義為今世諦所破今語以假故假執為諦所治者總謬傳以此真諦所治故又有所得學大乘人雖言有為諸法是假遂道決定有生可生此則生不由滅故便成自性故為世諦所治即是性執云何言假耶疏問世諦破此性實生滅等者言以如此等性畢竟空寂等者有一卷記云所執境法體永無故云畢竟空寂也述義云謂由性執心之所有若人若法皆有所得故五眼不見今案淨名玄云大品經舉我人為喻十六知見畢竟無所有故五眼不見今有所得性有人法五眼不見亦復如是所言五眼者案法華疏明五眼有二門一就應身論五眼佛託父母生身故有肉眼以在道樹下得於四眼以有遠見故有天眼照三乘根性故有法眼照於實相故有慧眼照佛境界故有佛眼以就法身論五眼者照五種境界故有五眼照障內境名為肉眼照障外境名為天眼餘三如上肉慧兩眼就體得名以肉為眼名為肉眼以慧為眼故名慧眼也法眼即從境立名以其見法名為法眼天眼佛眼得名不定天眼得名凡有三種一從人立稱又從義目諸佛菩薩名為淨天生在天中報得眼根徹見大千世界從彼淨天以立其名故名天眼二者就報得名始從四王上至非想通是天報生彼天中報得眼能遠照囑故名天眼三者從因受目如地持説一切禪定於三住中名為天住依此天住修得淨眼故云天眼佛眼得名凡有二種一從人得名佛是人名人有此眼故名佛眼二佛名覺即此覺知照故名為眼此之五眼若據法身以智為體智有五用故名五眼若就應身天肉既是報名即以色法為體餘三以智為體若依毗曇義天眼通亦以智為體準之可悉問法華經云見六道衆生今何故云不見耶答淨名經云有佛世尊得真天眼悉見諸佛國不二相不二相者見宛然而無所見雖無所見而無所不見故見不見不二法花明不見而見大品經明見無所見故不相違也問五眼與十眼相攝云何答十眼之中初眼一五眼中眼亦兼天眼見麁細近遠是天眼故第二天眼是前天眼第三慧眼諸根差別第五佛眼佛十力第六智眼分別了知一切種法第七明眼諸佛光明第八出生眼𣵀槃法第九無礙眼見一切法無礙此之六種是前法眼第四法眼是前慧眼見諸法實相第一義諦故第十普眼是前佛眼普見平等真法界故廣明如疏第四卷也言此性本來空寂等者述義云謂性執有之無處即永無之無也即是二諦之外本性空義今案淨名玄云有所無故稱無即是有所得五句皆畢竟空是諸佛菩薩所離故云無也此無是二諦外無二諦不攝準之可悉疏問此出何處等者言答涅槃經云第等者如彼經第三十五卷佛告迦葉言衆生佛性非有非無所以者何佛性雖有非如虛空雖無不同菟角是故佛性非有非無亦有亦無云何名有一切悉有是諸衆生不斷不滅猶如燈炎乃至得道是故名有云何名無一切衆生現在未有一切佛法常樂我淨是故名無有無合故即是中道是故佛説衆生佛性非有非無疏主釋云下第二約非有非無明中道也文云不斷不滅如燈炎者此引大品深奧品燈性喻非初炎燋炷不離初炎非後炎燋炷不離後炎而燋炷得菩提亦爾法寶師云善男子至非有非無第二就非有非無明中道也衆生佛性非有非無者立宗所以者何已下辨釋以可見故不同虛空之有以可生故不同菟角之無是故已下結非有非無也亦有亦無至非有非無第二就亦有亦無明中道也即是就佛性破有無執也今略引約亦有亦無明中道文準之可悉言又涅槃無生死不可為有等者二十八字缺疏問性空有幾種等者言一者計有空性等者述義云所言性者猶體性也如言有虛空也言此空性即是佛性等者有一卷記云因緣本性本來自空名為性空即此空性是乃佛性般若實相三異名也言二乘人等者四十八字缺疏問二諦俱不生等者言無性假兩生等者案淨名玄第六云世諦無實生故云不生真諦無他生故云不生言世諦不説性等者問淨名玄云世諦不説無生滅真諦不説生滅故云二諦俱不説今何故云世諦不説性生真諦不説假生耶答各舉一義故不相違言二諦絶假實兩生等者有所得假實皆是性實故因緣世諦絶此實生也無所得方是假乃為真諦所絶述義云如成實等他學大乘有所得人所有一切假實之言皆為性執何者五陰和合為人五陰為實以人為他乃至四塵和合為瓶瓫等假實亦爾是乃世諦絶以無所得因緣有無為假是乃真諦絶故方俱絶也言絶即是如等者若世諦絶實生滅名為世諦如真諦絶假生滅名為真諦如只問舉五事今答三事者性之與空乃是如義何者述義云如者空義空者無也世諦無實無生滅故名為如若有實生滅即為不如真諦亦爾無假生滅故為如若有假生滅即為不如大論三十二卷云若實是堅相者何以故膠臘等與火會時捨其自性有神通人入地如水又分散木石即失堅相又破地以為微塵以方破塵終歸於空亦失堅相如是推求地相即不可得其實皆空空則是地之實相是名為如準此為言如即是性如即是空故不別答也疏問何故初就不生不滅等者言答隨寄一門等者言萬化者如曇影中論疏序云夫萬化非無宗而宗之者無相述義云萬化者萬物之異名以因緣生俗法萬差即曰萬化化者生義即無而忽有之義言冀苟者玉篇下且也得也沫也上連苦也連草也孔安國曰苟城也元康師云冀者望也今二字並須後訓也疏問何以故知等者言答青目釋不生等者疏主釋云此文雖正是內迷今其明內外所立以此論正破內傍破外故僧佉大衆成實執因果一衛世上座毗曇計因異僧佉上座毗曇計因中有果衛世大衆成實執因中無果僧佉毗曇成實計自體生摩醯首羅論師毗曇成實計他生義足乾子外道數人成論計共生義眼水外道地論人計有因生盧呵外道琛法師計無因生故云內外論師九種因果也問疏第三卷述山中舊語云前周就第一義門釋後周就世諦門釋所以然者第一義為本世諦為末故明釋其本次釋其末何以知者復云世間現見故即知是世諦復既是世諦即知前是第一義諦準此疏文正破內外論師九種因果應明真諦中道今何故言明世諦中道耶答二周義含多意第二説云又二周釋八不同破一切有所得人顛倒定執同申佛二諦中道但初周總釋約為三根人作四對釋之後周別破一現事以解釋之既云同申佛二諦中道今且約世諦而為言之以因果皆是世諦故後此兩處各舉一義故不相違疏問何故不言不因不果等者如涅槃經第二十七卷佛告迦葉菩薩言譬如無明為因諸行為果行因識果彼無明體亦因亦因因識亦果亦果果佛性亦爾以此義故十二因緣不生不滅不常不斷非一非二不來不去非因非果疏主釋云譬如無明為因下第二譬説無明為因行為無明果行為識因識為行果行為識因今無明為此因作因故言因因行為無明果識復是此果之果故言果果佛性亦爾下合譬以此義故下第四明佛性無定定義十二因緣能生觀智既是觀智之根本不宜不正若其不正境即成生滅斷常之境智亦復然今簡此境是無生滅境智即是無生滅智故將十不以簡十二因緣故云不生不滅乃至非因非果即此因果常自不生不滅非因非果非是觀觀其故方如此不生不滅也問十二因緣是境界佛性那得亦非因非果答此是境界中道中道悟通於緣正今辨十二因緣中道故云不正不滅乃至非因非果問若爾為第五非因果何異答十二因緣非因非果非過去二因故非因非現在五果故非果現在三因未來雨果亦爾故云非因非果第五非因果者非境界觀智緣因故云非因非菩提涅槃緣果故云非果所以異也今取意引第四佛性無定定義文以為難問準之可悉述義云所言非者猶不之異名也發旨者十一字缺疏云問已説不生不滅等者下第二明不常不斷故重牒長行云問曰不生不滅已總破一切法何故復説六事疏主釋云第二次釋不常不斷故知明不常不斷也言不生不滅等者牃前也何故復説六事者問後此問大意以後六事難前不生不滅今明不生不滅已足而更説六事者八事雖足亦應更説若八事為足不更説者今明不生不滅亦不更説六也言答利根者聞初即悟等者約法為言無生已攝一切諸法所以利根聞一知十異不須説六所以然者以世諦無實生滅故無病不破了知因緣假名生滅故無正不顯所以不須更説六事而更説六者為人未悟宜轉勢演之所言轉勢者別記云意同而易語故云轉勢也故論云為成不生不滅義故言又根性不同等者論主破諸法生滅明無生滅外人聞此便不肯受論主破諸法斷常明不斷常外聞之即便生信所以然者彼謂諸法有因滅果生聞説不生不滅即破其因果成闡提邪見是故不受若聞因滅故不常果續故不斷不失因果是故生信即是僧佉衛世乃至若提子等外道并上九種論師及五百部立有果因義聞説不生不滅即謂無復因果是故不受畢竟空乃至不生不滅故若言因果相續不斷不常即不失因果所以生信也言如淨名三十餘菩薩説不二法門者如彼經中卷入不二法門品維摩詰語衆菩薩言諸仁者云何入不二法門會中法自在菩薩言生滅為二得無生法忍為入不二法門乃至最後文殊云於一切法無言無説為入不二法門文殊問維摩詰言當説不二法門時維摩詰默然無言準之可悉所言三十餘者初階有三十一菩薩并文殊淨名合三十三菩薩今且約初階故云三十餘菩薩也言又如曇無竭説六百萬億般若之門者如大品經第四十卷曇無竭菩薩告薩陀波崙菩薩言善男子諸法等故當知般若亦等乃至諸法不可思議故般若亦不可思議是時薩波崙菩薩即於座處得六百萬諸三昧門謂諸法等三昧等大論第一百卷云問曰薩陀波崙先已知諸法空相今種種總苦住立七歲見曇無竭得何等利益答曰薩陀波崙先見諸佛得諸三昧尊重般若生著相今曇無竭七歲從定起為説般若破其著心一切法性自空非般若令其空是故説諸法等故般若等諸法離相乃諸法不可思議故般若不可思議不令輕賤餘法實般若乃至薩陀波崙得是教化斷般若中著心即得諸法等諸三昧句句解説散亂心中俱有智慧不名三昧今從師皆已一心思惟名為三昧稱心不亂智慧變成三昧乃至今入攝心乎所聞諸法皆名三昧能破諸煩惱等及魔人民如水寒風未至未成為氷即無堅用若成凍水能有所蹈得如是等六百萬三昧門薩陀波崙得聞曇無竭所説法得諸法中大智慧明所謂種種諸法實相門諸法中平等平等是智慧入薩陀波崙禪定心中文為三昧今欲説三昧智慧今世後世果報故準之可悉淡海記云薩陀波崙菩薩以六百偈問曇無竭菩薩曇無竭菩薩以六百萬億偈者非也違大論故也新譯大般若經第四百卷云法涌告常啼菩薩言乃至即於座前得六十億三摩地門也疏問已知更説異門等者言涅槃如來性品等者如彼經第七卷如來性品佛讃迦葉菩薩言汝已成就深利智慧善為汝説入如來藏若言諸法皆無我是即斷見若言我住即是常見乃至當知如是遠離二邊而説真法今撿彼經第二十七卷師子吼品今有此文即是釋前因果中道凡有七文之中第一明衆生迷中道故成於二見文是也謂衆生迷中觀故成斷常之二見即成前生死本際凡有二種謂無明與愛窮生死之本不過癡愛今即窮生死之本即是斷常二見故爾以斷常二見釋成前癡愛也具明如疏第十六卷也述義云彼經如來性品與師子吼品廣明佛性義故於此令為一名而曰如來性品也言此論業品云等者如此論第三卷觀業品未申二諦中道明業離於斷常初偈長行云此論所説義離於斷常何以故業空寂滅自性離有何法可斷顛倒因緣故往來生死亦不常疏主釋云此論所説者總標離於斷常何以故釋離於斷常言業寂滅等者業本性畢竟空非是前有業滅之然後方方空故是斷若前有業滅無方空即是斷此釋偈初句云雖空而不斷言顛倒因緣等者明業雖畢竟空於顛倒者宛然而有往來六道亦非是常此釋第二句云雖有亦不常今略引釋上半總標離於斷常之文準之可悉言如百論云等者如彼論下卷破因有果品初云外曰諸法非不住有不失故無不生故修路有相諸法如泥團從團底從底腹從腹咽從咽口前後為因果種種果生時種種因不失若因中無果果即不生但因變為果是故有諸法疏主釋云立有三意一者上品末云諸法念念生滅無有住地僧佉今彈內此言故云非不住言有不失者第二僧佉自立義宗轉因為果而不失因蓋是僧佉二十五諦大宗無不生故者破衛世也注不釋非不住釋後二句開為四別言有相諸法等者第一釋有不失以彈內失若因中無果下斥於世師但因變為果防提婆及世師二家之難因既不失果云何生是故釋云因變為巢有果生而果體即是因體故有不失是故有諸法下第四證有情愛及一異等今略引經釋中釋有不失以彈內失之文也別記云因時有果果時有因衆生若樂萬物生滅道理皆然故云種種果生時種種因不失也智度第七十卷出僧佉義云從冥生竟乃至從大生根謂從細生麁根散歸大乃至從覺還真謂從麁歸細雖從細生麁從麁歸細而都無所失故云種種果生時種種因不失準之可悉又金七十論上卷注釋云隨因有果故者謂隨因種類果種亦如是譬如麥芽者必隨於麥種若因中無果者果必不似因是即從麥種豆等牙應成以無如此故故知因有果準此論文故知僧佉計因中有果言衛世師執因中無果等者如金七十論上卷云衛世師等執因中無果是義不然故知因中定有果準之可悉言佛法內薩婆多明三世有即是本有果性未來等者案大論第六卷云如鞞婆沙中説復有三世中法未來中出生現在從現在入過去無所失是則為常也道基師阿毗曇章第五卷三世義中云流轉生義是世義也故婆沙云去義是世世別不同乃有三種謂過去現在未來有為諸法已起已城名為過去已起未滅故曰現在未起未滅稱之未來譬如眼見色已滅説為過去見色未滅是説現在未見色者名為未來又云薩婆多宗三世皆有故誰心云一切世悉有不違其所應牟尼之所説聲聞僧無佛長行釋云有三世此薩婆多所立一切有乃至廣説準之可悉言僧祇部二世無義以本無今有已有還無等者二十四字缺言今明因緣因果不可言定有等者如大經第二十七卷云復次善男子生死本際凡有二種一者無明二者有愛是二中間即有生老病死之苦是名中道如是中道能破生死故名為中以是義故中道之法名為佛性乃至廣説疏主釋云今是初明因果中道此即窮於生死之本生死不用無明與愛有此二種故即有生死故二種為生死本今欲窮此生死之本欲明此二種無明即是現在生死之本愛即是未來生死之本言是二中間有生老病死者無明中間有現在生老死愛中間有未來生老死故云二中間有生老死言是名中道者過去前二因滅故不常現在五果續故不斷不常不斷故即是中道亦是現在三因滅故不常未來二果續故不斷不常不斷即名為中道故云具如涅槃師子吼品説也然有人傳云上所引文者非也疏云次明不一不異者世諦雖離性實生滅等者下第三明不一不異也言如僧佉與大衆部等者有無名疏云因果一者外道僧佉人義因果異者衛世人義佛法有二部佛云復一百六十年中一大衆部謂因果一故變種子為牙轉少為老故因果更無二體也二上座部無轉變義故種滅於前牙生於後少滅於前老生於復此因果異也問疏第三云上座明二世有即是因中有果大衆明二世無即是因中無果準此疏文應云大衆明因果異體上座明因果一體今何相違耶答述義云因果有二報因因果習因因果一念之善近以招人天之報義名為報因以善善相續遠至佛果義名為習因若約報因因果而立異體若約習因因果而立一體故不相違也又約上座部有本宗同義有末宗異義若約本宗同義而言一體若約末宗異義而言異體此亦義別故不相違有人傳有説云本立因中有果二世同有故云本宗同義也立因中無果二世有無故云末宗異義也今謂不爾見記第四謂苦集同是有為故云因果一滅道以是為無為別故云因果異報因因果因中無果習因因果因中有果各舉一義故不相違言答法品云等者如此論第三卷觀法品明菩薩得方便慧益偈上半文所引全同疏主釋云下明悟無生滅生滅即是世諦世諦雖有萬化不同因果是立信之根諸法之本故偏説之今此上半明因緣因果不一不異如捲指不同不可言一更無兩體不可為異即破僧佉衛世一異兩部亦除上座大衆一異二宗準疏文今云因果等者且如五指為因拳以果五指能生拳即所生何得言一五指名拳五指拳名五指拳何得言異故稱中道準之可悉有一卷記云衆因緣生法者是也此果法與因不一不異故云不即不異因也若約喻為言譬如有人向於山谷發呼音時彼呼音者因應音者果此呼音與應音者不得一異何者若呼未應時不得言一若呼應時者不得言異故云不一不異此約法相而為明之若約觀行人天因得人天果乃至作三途因墮三惡道故云不一不異也疏云次不來不出者惑病無窮等者下第四明不來不出也言如計衆生苦樂等者法寶師云第五得者是自在天因外道以迦羅鳩馱迦旃延為師計衆生罪福皆是自在所作既非人造當有何罪準之可悉言復有外道計苦樂之果等者如十二門論觀作者門云是裸形迦葉謂人是苦因有我者説好醜皆神所作神常情淨無有苦惱所知所解悉皆是神神作作好醜苦樂還受種種身元康師云下第二釋經意也文中廣破四作以明無此理故佛不答之此前出謂情明佛所以不答之意也謂人是苦因者又自造苦還自受也有我者説下此我還是人人我皆是宰主之名故下但破我作即無所破也言裸形者雜阿含經第十三卷云阿支迦葉阿翻為無支迦葉言衣今言裸形即無衣準之可悉言復有宿作外道等者法寶師云此須跋釼他計即此宿作外道以現苦行彼於宿業彼計唯過去能超業報但能斷業即苦果不生果不生故即得涅槃雖引此説尚懷猶預故今問佛是義云何準之可悉言復有外道等者如提婆涅槃論云尼乾子論師説初生一男一女此二和合能生一切有命無命等物準之可悉言又如毗曇計不有火性從於性火以成事火等者云云言成論明木無火性但假緣生等者云云疏問世諦因果等者言答因緣因果等者如大經第三十五卷佛告迦葉菩薩言我為衆生得聞解故説言佛性非內非外何以故衆生佛性非內六入非外六入內外合故名為中道疏主釋云此即第一約非內非外明中道上言非內非外此是雙非內外下云內外合故者此復明亦如是非內亦如是非外一切遺蕩故云非內非外合故故名中道準之可悉言所以然者論云等者如此第四卷四諦品華手經偈長行云衆因緣生法我説即是空何以故衆緣具足和合物生是物屬衆緣故無自性今取意略引之故云不內外也述義云此論四諦品云衆因緣生法我説即是空等及大論同必因緣和合生物一一不能生故就所生果明道也言淨名玄云法不屬自等者如彼經上卷弟子品目連章明所演之法有二十六句明法空處第十句文所引全同所以不記疏主釋云因緣之名其義不定因有種子親而能生為因水土疏而助發為緣因有本無果體藉因無之索有其分假緣而發故互具有無二義種受因緣兩名因近故難曉緣遠故易了今以所易釋所難也因親故言屬緣疏故言在也御製云因者由因也緣者緣起也緣既自空故不屬因也肇法師云前相相生因也現相助成緣也諸法要因緣相假然後成立若觀法不在緣即法不屬因也道生曰因謂先無其事而從彼生也緣謂索有其分而由彼起也因本以生義今也不能不生豈曰能生滅是即因不成因近故難曉緣遠故易了今以所易辨所難即難也因親故言屬緣疏故言在也言但以四對歷破衆計等所言歷者玉篇過也疏云次明真諦具八不等者第二明真諦具足八不明真諦中道中有四對即為四別此初約不生不滅明真諦中道言以空有等者對世諦假以明真諦假言不生不滅為真諦中道者正明真諦中道此從真諦復假入真諦復中故玄義初卷云假無不名無假不無不名不無從假無假不無入不無非不無此名真諦復假入真諦復中此乃橫作中耳疏問何以知二諦俱無生等者上云世諦不生不滅今言真諦不生不滅故發此問也言答瓔珞經佛母品云等者宋沙門釋道嚴所譯菩薩本業瓔珞經凡有二卷也秦姚興時沙門竺佛念所譯菩薩本業經二卷同本異譯今所引文道嚴所翻下卷文具引經文如記第二卷也曉法師彼經疏下卷云此下第二總明八不釋此文意略有二門一者通門二者別門言通門者謂如前説二諦四門各有此中四雙八不是義云何此初一雙不一不二總釋四門不一不二言之與義不異前故其第二雙不常不斷通釋四門不空不有有即為常無便斷故第三不來亦不去者重顯初雙不一不二空有不一故有不從空來空有不二故空不遣有去也第四不生亦不滅者重顯第二不常不斷不生故不有不滅故不無無是斷義有是常邊是故八不通於四門也若就別義釋此四雙次第示現彼前四門是義云何此中不一亦不二者顯彼初雙二諦離邊以有無常爾故不一聖智照空故不二第二不常亦不斷者顯第二門二諦離邊以法界不變故不斷第一無二故不常故第三不來亦不去者顯第三門二諦中道以因緣和合而無從來因緣破散而無所去故第四不生亦不滅者顯第四門二諦中道以不壞假名而非有生用顯實相而非有滅是謂別門八不義也準之可悉言此論明大小二人俱失二諦等者薩婆多五百部等小乘執諸法有非斥真空是故失於真諦方廣道人執邪無義撥除俗有是故失於世諦今為欲續此二種失仍牒八不也言排撥者上曇捷師云廣雅云排斥也下玉篇絶也棄也理也言接仍者上玉篇會也莊子知者接也司馬𭛚云接猶持也述義云接猶續也別記云接此二失者約就破病而為言之即執二諦也仍牒八不者約申二諦而為言之因緣二諦是也疏問但應直明二諦等者言大乘偏空病者如上得失門云保執大乘遂撥無小如法華論釋藥草喻品破菩薩病道理乃唯有大不妨於緣成小而菩薩撥無小故名失準之可悉今謂不爾此方廣道人偏空病也言又由來但明等者淨名玄云舊云二諦是二理四絶為真諦理三假為俗諦理二理則有佛無佛性相常住然迷之而成六道悟之而有三乘述義云江南成論師等既言是二理不可改轉即有無根深事如盤石因此決定有無故起二見準此等文今云一諦生者世諦三假假是有義故云生一諸無生者真諦四絶絶即空義故云無生準之可悉疏又明二諦俱無生等者言故五十二位賢聖皆就無生觀內分其階級等者曉法師瓔珞經疏上卷開説宗云謂開前因立四十一於中加果為四十二果無增減故立為一因有階降立四十一謂十住十行十回向十地無垢地四十二道名腎聖別門而言即有三句則三十唯賢非聖於凡夫法但斷非斷故二最後一唯聖非賢於凡夫法但斷非伏故三者十一亦賢亦聖於諸聖法惑伏惑斷故準此疏文今言五十二位者前四十二加十信故云五十二準之應云前四十唯賢非聖於凡夫法但伏非斷故等也言初信諸法本性無生等者法門名義集云十信心菩薩一信心信佛常住大乘歸宗不二決定無疑也二念心於六念處境念不念三精進心如念精進心而行勤修止觀四慧心進觀人法二種無我五定心解空處寂心心理靜六不退心止觀兩融心不退沒七回心善會平等回向於捨八護法心解理堅固受持不壞九戒心善護身口意三業齊淨十願心以三業之善正求菩提故曰願心以上十心此習種性外凡之位也我人捨本別習回心向大起十心也述義云信無生理故名信忍所言忍者解也定也言稍折伏生心令不起動念等者仁王經疏上卷教化品云伏忍上中下即是得其方便行若出其位習忍下性忍中道種忍上在三賢位習種姓名習忍性種姓名性忍道種姓名道種忍也法門名義集習種姓有十住菩薩一發心住始從凡地發無上道心歷奉衆聖廣多聞慧始入空界住空性住而由彼發心而得此住二治地住更起勝解淨治八萬四千法門離諸塵心地清顯也三修行住善觀諸法門對治也門慧照逾明解心步境終起種覺故曰修行住也四生貴住理勝解進生在真如法性理家種姓清淨故曰生貴住五方便具足住涉有入空資智相資善行無滯萬解齊進故曰方便具足住六正心住得般若真解安心上理故曰正心住七不退住空有不二得堅固真解故曰不退任八童真住從發心以來遠離二邊不起煩惱長養真諦契同無生得佛法分故曰童真住九法王子住即從法化生得佛法分故能治真宗令攝種立故曰法王子住十灌頂住觀達真宗理照逾淨解滿最上故曰灌頂住以上十住內凡下品三賢初位也性種姓有十行菩薩一歡喜行前觀解脫既滿今如解而行自行化人離於邪倒愛此深得之利故曰歡喜行二饒益行自利行轉深利他行彌廣故曰饒益行三無瞋恨行既善利他慈悲喜捨怨親平等憎愛無二故曰無瞋恨行四無盡行以無厭心度人不倦利行增進無休無息故曰無盡行五離癡亂行雖行有為以度衆生而無我人之相不為無明所惑心心不離念佛三昧故曰離癡亂行六善現行心常在定而現行慈悲化物同己故曰善現行七無著行行空不住於無行有不染於相靜亂俱遊無礙故曰無著行八尊重行常行於有無而有無所不動正以等行諸法一切皆如無可輕棄重法心成故曰尊重行九善法行既自善巧於法面以此法授人動成物軌故曰善法行十真實行行於真諦自利行成行於俗諦利他滿行真不棄於俗行俗不乖於真無偽曰真非虛稱實故曰真實行以上十行三賢位中品也道種姓有十回向菩薩亦名解行地一救護一切衆生離衆生相回向菩薩授無為衆生不令住空稱有為衆生不令著俗皆回邪側而向正道故以為名也二不壞回向回有為而向無為即有為所不礙回無為而向有為即無為所不不阻有無俱通即通即行成莫毀故曰不壞回向三等一切佛回向若行有為無為平等周通即興三世諸佛同行菩提故以為名四至一切處回向若能通行一切諸法即到一切諸法實際之分故以為名五無盡功德藏回向既至一切諸法實際故能依實而成行蘊積衆生利潤無盡所以為名六隨順平等善相回向即以無盡平等之善出生增益故以為名七隨順等觀一切衆生回向善生彌廣故能平等津道法界衆生所以為名八如相回向一切衆生皆如也一切法亦如也言如者不二不異也行如此道相無不融是故為名九無縛無著解回向衆生即如即本來無縛也如之衆生即如無可著也此道妙通即無所羈礙是以為名十法界無量回向既體達一切諸法皆是真如實相故其道博通非可限極故以為名以上十回向三賢之中內凡上自此已前三十心是地前三賢之位用三品伏忍除伏我相相心不起行善調順得名為賢未斷我相故名內凡夫若作無相觀行即猶有相間故在世間之位也述義云地前三十心伏無明故名為伏忍也曉法師瓔珞經疏上卷云於十千劫修習信心信心成就方得種姓故十住名習種姓十行位中久習成成在姓之行轉順種姓從行自性名性種姓十回向中得平等空成平等道故名道種姓通名種姓者種是種類義性是體性義是佛種類是佛體性諸佛種姓故名種姓若當法身名種姓者是持業釋從生衍德名種姓者依主釋餘三準之言以析伏生心不起動念等者明於順忍也述義云初地以上六地以還名為順忍既信無生理而心順此理故名順忍此以傍義而為言之言又生心動念等者明無生忍述義云七地以上佛果以還名無生忍既悟無生理諸煩惱不生名無生忍此亦傍義也今流主意七地為下八地為中九地為上也言生心動念等者明寂滅忍述義云從第十地乃至滅理故云寂滅忍明寂滅忍有二十地下品佛果上品此十地與金剛不異故合為下忍也法門名義集云一歡喜地始出凡規初登聖境塵心內融悅情外發故地論云初登聖處多生歡害故名歡喜地用聞思修慧為加行智斷凡夫我相無明證通滿功德擅波羅蜜為增上也二離垢地妙修中道藝除法垢故名離垢地以加行智斷於諸衆生起邪行無明盡證最勝功德戒度為增上也三明地隨聞思修照法顯現故名地以加行智斷也遲苦三慧忘失無明盡證勝流功德忍度為增上也自此已前三地總修大乘光定斷闡提不信習氣障方便生死果報三得大樂果四涅槃地定既內明發慧外照妄偽之法於茲寂滅故名涅槃地以加行智行智斷微細煩惱行生身見無明盡證無攝功德精進度為增上五難勝地得出世間智方便著功能度難度故名難勝地以行智斷於下乘般涅槃無明盡證無異功德禪度為增上六現前地大智現前名現前地以加行智斷麁行相無明盡證無染淨功德般若度為增上自此已前三地總修習福智生定斷外道著我習氣障因緣生死果報已得大淨果七遠行地照法見空於有不著照空見法於空不證乃超越有無出二乘世間道故名遠行地以加行智斷細行無明盡證無有功德方便度為增上八不動地報行純熟無相無間故名不動地以加行智斷於無相作功用心無明盡證不增減功德願度為增上九善慧地色難已窮心滯須盡無無礙力説法成就利他行故名善慧地以加行智斷利益衆生事不由功用無明盡證智自在依止功德力度為增上自此已前三地總修賢護定斷聲聞自利習氣障有有生死果報已得大乘我果十法雲地自以所得無邊善法普蒼生悲覆若雲法澤如雨能令善根開發道互滋義故地論云得大法身具足在故名法雲地以加行智斷於諸法中不得自在無明盡證業自在依止功德智度論為增上此之一地修首楞嚴定斷獨覺自愛障無有生死果報已得大常果十一等覺地構二具大二中安心平等照齊種智一相無二故名等覺地亦名無垢地斷煩惱垢習皆盡故亦名金剛心斷無明住地十二妙覺地圓覺內融窮鑒法性攝無始終窮微盡極故曰妙覺亦名佛地種智現前無上菩提金剛以後至極常果前等覺位中斷煩惱習氣除生死盡名無礙道今於此地菩提證涅槃果外之果名解脫道前來十二聖名為地者有二種義一能出佛果二能住持萬德故通喻為地具明彼別記云等覺妙覺有二種義一者約妙覺即有等覺義也謂得無等等三菩提等以此義者二地不異故仁王經云五十一位也二者等覺是因位妙覺是果位也初是無礙後即解脫無礙之時解惑相對解脫之時但是解耳故瓔珞經云五十二位也言無階級階級故有五十二位不同等者有一卷記云疏生立五十二位亦云一位然今云五十二位者依假有無悟解非有非無中道依於中道悟假有無即是義説也仁王經但言十信十解十行十回向不言假十信中十信即是依教而建立也然均正師立六十二位亦云一位謂知有無是假十信知非有非無是中十信即是義説法鼓經云地前之三十心與二種十信行名為福分初地以上所以名為智慧故知二種十信也此乃依教為建立也問二種釋俱依聖教若爾者立一種中信不立二種十信立二亦爾此乃信不具足闡提故大經云十二部中信六不信六故名信不具足答隨緣申教有傍有正故不闡提問若爾者二種釋中幾實幾權答以佛説教無不實故皆是實也若以隨緣而為言者皆是方便問若言皆實者二種相違若皆權者如來一代所説言教皆不究竟答為人故不相違故大經云一切諸法無有定相若有定性是生死是魔王相非佛法相準之可悉言如涅槃云等者如彼經第二十佛告師子吼菩薩言善男子是觀十二因緣智慧即阿耨菩提種子以是義故十二因緣名為佛性善男子譬如胡苽名為病熱能為熱病作因緣故十二因緣亦復如是疏主釋云善男子是觀十二因緣智慧等者法師於此略作四雙八句明只此十二因緣是因果境智凡聖種非種言因果者觀十二因緣智有成來成來是因成即是果言境智者十二是所觀為境此智不離於此心十二是智也迷故為凡悟名為聖此是因果境智凡聖無離凡作聖離境也智所言種者菩薩觀十二因緣為種子言非種者二我觀是也誓如胡苽等者作譬胡苽能為熱病作因緣名扯為熱病此苽熱能令發熱病也又十二因緣能發觀智故名為種子者也今取意略引證成因境啓智也故中論玄云所言中發觀者如涅槃經云十二因緣不生不滅能生觀智譬如胡苽能發熱病也言以了世諦故等者所言無生法忍者如大論第五十二云於無生滅諸法實相中信受通達無礙不退是名無生法忍準之可悉問述義云解無生之智名無生忍若爾時者智之與忍有何差別答大論五十二云初名無生忍後名無生智麁者名忍細者名智準此論文體雖無別義用不同也流問世諦破性生滅等者言所以經云等者如大品經第十三卷佛告天帝云須菩提不壞假名而説諸法相等也今略引之所言相者即是體相實相是也言論云因緣所生法等者如此論第四卷四諦品偈文今為證生即無生略引上半碩法師云因緣所生法者如因五指成一捧拳是所生五指為能生假五指成一捧故云內緣所生法也此之一句具有因果及以能所也我説即空者此是佛稱我故云我説也即是無者明所生之拳既由五指有即捧無自性故拳即是空準此疏文隨寄捲指萬義例之疏問何故破性生等者言此因緣假生等者謂因緣假生為佛境界故云為佛眼所見故法華疏云照佛境界故名佛眼只佛眼得名凡有二種一從人得名佛是人名人有此眼故名佛眼二佛名覺此覺知照故名為眼具明五眼如記第二言但因緣生即寂滅性等者別記云此有二義一者約寂滅義名真諦無生也約不偏義云真諦中道世所言不偏義者非但是無生亦非是不無生約具足義名不偏義也二者寂滅義云真諦也無生以為真諦中道何者對世諦不寂滅明真諦是寂滅者是真諦假耳即約非寂滅義故云無生也所言無生即是空也疏問舊何得云等者有人傳有云第二方言料簡之處云後意明漸捨義即世諦破性生滅辨中道真諦破假生滅辨中道準之可悉言答此據假病等者別記云此謂假病也言故二諦俱破性假等者中論玄明收取義凡有四句一破而不取若是諸部所説乖大小乘經自立義者即破而不取故智度論呵旃延弟子云三藏無此説摩訶衍中亦無此説蓋是諸論議師自作此説即是其本也二取而不破如文殊問經説十八及本二皆從大乘出無是亦無非我説未來記三亦破亦取破諸部能迷執情故取諸部所迷之教四不破不取就正道門未曾有破亦無所取也亦有四句一破而不取即是外道邪言障中逆觀於緣無益有損二取而不破外道偷窮如來遺餘善法今並收之如賊盜牛即其證也又外道各邪心推盡冥智與內如蟲食木偶得成字亦取而不破三亦收外道偷竊佛教不識旨歸今破其迷教之情收取所迷之教第四可悉準此玄文世諦所破也問外道小乘大乘執有諸法決定生性障世諦中道迷世諦觀解於機緣有損無益故破而不收真諦所除空假名與不空假名只聞假空不識説假表中道旨歸今彼其迷教之情收取所迷之假也言故但除其病等者淨名經中卷文殊問疾品中説化他調伏之中第三辨除物病文所引全同所以不記疏主釋云將欲尋物病原故前釋斷義菩薩自斷我及空等三病今欲斷衆生三病者實無三法可除但陰空謂病耳眼病見空花但治眼病無空花法可除故云不除法也又一義不除法者但破衆生執有等病不除因緣假名法也故涅槃云但斷所著不斷我見我見者即佛性也此二名有其義非無兩釋準之可悉疏問若因緣假生即是無生等者別記云於因緣上定執性生故云因緣性生也約法性有二義如約法界等者差別法界約用言之無差別者就體為言然此處也約用而言所言性者謂法體等也今諸不爾因緣性生即是法性此法性也猶是假義故云因緣示現答文也言答因緣性等者有人傳有説云法性涅槃般若一道一乘真如實際首楞嚴三昧師子吼三昧法界如來藏自性清淨心八識無住實際皆佛性異名解云為諸法體性故名法性理用圓寂故名涅槃無所知無所不知名般若善惡平等妙運不二名一道一乘如實不二故名不二盡原之實故名實際平等不二遍覆故名法界隱生死故名如來藏融諸法究竟清淨故名自性清淨心絶動靜故名三昧為衆生覺悟之性故名佛性此即一之平等大道上説諸名也平等大道無方無住故名無住實際也唯此説意今言如者即是真如所言等者即是外等舉真如佛性法性三名等取餘十一名也故大論初卷云如如法性實際世界悉檀故無第一義悉檀故有也亦可如者指事之如也言此猶是假義耳者有人傳有説云問真如理何為假耶答如中論云諸法復異故今謂不爾此約通因緣義名為假耳端問何人執假生等者言答有二種人一者不空假名二諦二者本假名二諦等者有人引均正玄義第三云成實師執兩家説二説不同師義辨為一家第十三周顒義為不空二諦此為一家也有人顯玄意云今依此義空假名與不空假名俱成實師軌只流主意與玄義小異今撿彼玄義第三卷云成實師執兩家説二諦不同廣州僧亮法師云法本自無因緣成諸稱之為俗法本性無名之為真終是二法兩體不相關即失假名義河涼顯亮法師云因緣即體不可得即空即體不得之因緣因不空此之二師十五家中初即第一名為假名空次是第十二名為不空假名又山門玄義第五云釋顯亮立不空假名義于法邃支道林立空假名義又大乘玄論第一卷末云次周顒明三宗二諦一不空假二空假三假空空假者開善寺用假空四重二諦中初重二諦雖空而宛然假雖假而宛然空空有無礙治城寺泰法師二諦搜玄論云不空假名者宗何園顯亮法師慧靜師弟子也準此等文今云不空假名者釋顯亮師義空假名者開善寺智藏師等義假名空者四重二諦中初重二諦也其明如下同異門也別記云所言為此二人等者不本假人之假執二空假名人明本望於此人不知假故作如是説耳約不知假義故云假執言不空假名二諦空假名二諦者一法並舉二諦耳何是世諦也言不空假人等者疏第三卷云又心不空假生大乘人但言空無性實性不空假生準此疏文所言不空假名二諦者有所得大乘二諦並釋顯亮師義應知也言汝云空無性實故是真諦者述義云所言故者猶故之故也疏問觀由來義等者如淨名玄第六云今且舉成論明三假義不墮失門何者彼明三假有為世諦三假空為真諦即三假而常四忘即四忘而常三假即三假而常四忘故有不自有即四忘而常三假空不自空故非性義述義云此成論師立宗云三假為俗假空為真以真俗不相離之相即故即假而常空故有不自有即空而常假空空不自空故非性義準此意文今云由來即是成實也言答淺深門自當具釋等者後第五淺深門云問他亦云有為世諦空為真諦與今何異答復初章語簡之乃至廣説謂以初章中假明之也四對為初章也不有有即不有不無無即不無非有非無假説有無是中假義又明四重二諦準之可悉疏二者空假名人等者有人傳有説云淨名玄第六云成實人云三假為世諦三假空為真諦此壞生説無生也又云空假人云四絶為真真非假者還是實也為今之世諦所離也準此玄文今云成實人者即是開善寺知藏師也疏問不生不滅等者言答以有空義為真諦等者如上釋世諦具八不之中第一不生不滅文云即一性實之執具於二義以性實是偏義故障於中道以自性義故障於假名能障一惑既具二義所障世諦中假亦然以有不自有故有是假名即此假有遠離二邊故稱中道故云如世諦不異也準此疏文一假故假之執具於二義以假執是偏故障於真諦中道以欣故欣義故障於真諦不假之假名能障一惑既具二義所障真諦中假亦爾以空不自空故空是假名即此假空遠離生滅二邊故稱中道也疏答余年二十二於紹隆寺等者所言紹隆寺述義云江南梁朝所有寺也言同所周者即二諦俱破性等者此初方言意何者有所得之徒所行無不墮此八計之中等是也述義云有所化緣稟二諦教成性有無故前破之無如此性故以兩非為中所言假者有無相由而有即不自義識而有而無之假時前性有無永斷此俗諦中破於性有真諦中破於性無也故淨名玄第五卷伏斷門云自有中伏假斷如求性有無不可得故名非有非無目之為中此但伏性有無猶未斷也次明假有假無即性有無始斷所以然者既識假有假無即知畢竟無有定性有無故名假斷準此等文真俗二諦相由而有故云俱是假也疏二者二諦俱破假等者此不相關三種方言疏云答彼真諦雖非假等者淨名玄述成實義云彼本立俗諦有三假三假可説真理是四忘四忘不可説故淨名杜言釋迦掩室所以真理雖無名為真假立名遂屬真攝準之可悉述義云以成論等義宗恆立俗諸三假真諦四忘故今舉失真諦宗耳言又中假師聞假作假解等者淡海記云善鐘寺融法師長于寺辨法師等也述義云禪衆融長于辨俱是詮法師學士而作中假解也有人傳有説云聞二諦之假作假解故云中假師聞假作假解也言師云中假師罪重等者佛藏經第三卷云過去苦岸薩和多將去拔難陀此四比丘有相説法墮於地獄又大品經第二十七佛告須菩提言譬如比丘於四重禁法若犯一事非沙門非釋子是著空名字菩薩心亦如是輕弄毀蔑餘人故罪重於比丘四禁且過五逆當知罪中重者無過於此應見大品信毀品説也淡海記云中假罪重者佛藏經云寧起四重五逆真起一念有相心故云重也疏三者世諦破假真諦破實等者此亦不關三種方言也言由來世諦等者述義云法假受假名假是為三假絶於四句名為四忘也有人傳有説云此正成實義也言真諦四絶則非假者此實不生也疏答世諦是假等者若準淨名玄應云三假為世諦四忘為真諦者世諦之有為待真空為不待耶此定兩關也所言假者此有義也言若待真者真諦非所待等者若言世諦之有待真諦之空者即世諦為能特真諦為所待只真諦也絶四句故是非所特世諦三假何是能待也言世諦既不待真等者若言世諦之有不待真空者亦不自待世諦既不相特便成自性云何是假耶疏四者世諦破實等者此第二方言之意也故初牒云世諦破性生滅以辨不生不滅明於中道真諦破假生滅以辨不生不滅明於中道故云如前釋之疏問世諦彼實而世諦是假等者淡海記云此問意云若言以世諦破實而世諦是假者真諦破假故真諦應非假若以異諸破假猶名假者亦應以世諦破性尚名性也言答真諦破假生滅等者述義云但被取於假生滅心而不破其法也雖言真諦破世諦假而不言被真諦假由此義故云不言破一切假也疏問既具有四句等者言若言世諦破實生等者問言爾者初言言世諦破性生真諦破性不生此乃不釋八不耶答初二諦俱無生義世諦破實性真諦破實不生者不型八不非謂餘義疏問叵有真諦等者曇捷師云所言叵者普可反字盡云叵不可也疏云次不常不斷等者下第二明不常不斷也言既聞真諦等者述義云天然者猶自然之異名也故慧達師云達猥生天元康師云天者自然也又云天者自在也又云天者自在義是縱任之稱也有一卷記云佛出世時名為有佛也佛滅度後時名為無佛也問由來亦云有佛無佛性常住與今何異答大異也何者他不依教諦常有真諦道理而四絶也今依教諦而明之若不爾者不言二諦也有人傳有説云由來者成實也疏云不一不異等者下第三明不一不異也言光宅謂真理等者有人傳有説云光宅寺法雲師也撿有傳云其光宅寺本是梁武帝父母之宅也因觀音像放光號為光宅寺也厥法雲法師者年登四歲便講六卷泥洹經其人生時感得紫雲年至四歲從官寺解脫和上奉敕請於內道場敕為出家御執剃刀親落髮下於三刀衆中著僧為剃之訖敕施法眼施名名為法雲師仍配住光宅寺乃至廣説述義云就能證智而有勝劣故云真理亦有淺深非謂所證而有差別所言果者猶是重也即是層級之重不如輕重之物也別記云於十地中有十重淺深真諦故云果隔真諦也大分諸大乘師等皆云因於智故真諦有淺深耳只成真師云真諦有淺深故智亦有淺深也言所以經云無色無形等者如大品經第六卷佛告須菩提言譬如佛光中日月光諸天光不現菩薩行般若時菩薩句義無所有亦如是何以故是阿耨菩提菩薩菩薩義是一切法皆不合不散無色無形無對一相所謂無相龍樹釋云如日月星宿真珠等諸天鬼神龍王光於佛光中即不現從大福德神他力生故菩薩句義亦如是入此般若智慧光中即不現因此譬喻教諸菩薩常學一切法不取相無所得故也今略引之有人傳云無青黃等故云無色無長短等故云無形也別記云約不異義故云一切就寂滅義故云無相也今案大論第十八卷經般若品云復次菩薩觀一切法不合不散無色無形無對無示説一相所謂無相如是等諸法一相云何謂無相觀種種相一切法攝入二法中所謂名色色無色可見不可見有對無對有漏無漏有為無為等二百法門如千難品中説今第八復次不破諸法明諸法從本已來不合不散唯是一如唯一無相就此以明總義也諸法非一故言不合也非二故言不散也就諸色中取對眼者名色對除四情者名對此等皆有狀貌故名形此等皆不可得故言無色無形無對也諸法皆無有實故不可示人故云無示也諸法無實皆不可為他説故云無説亦言語相盡故云無説也一相所謂無相者此有二釋一解云雖復百華異色同是一陰萬法雖同一如相故云一相一相此如相亦不可得故云無相也一解云諸法皆是一畢竟空相故云一相此畢竟空相亦無故云無相乃至廣説準之可悉疏云不來不出等者下第四明不來不出也別記云由來拆俗得真等者約就非於俗外之義而為言也言從真出俗等者約就本來而為言之此之來出皆約真諦也疏答智度論解集散品解無為法有集散云等者如彼論第三十四卷云問曰五衆法有集散與此相違故言不集不散如法性實際等無相違故云何言不集不散答曰行者得如法性等故為集失故名為散如虛空雖無集無散鑿戶牖名為集塞故名為散今略引之淡海記云空集散者成實師宗不立集散只明大虛故此集散寄就毗曇彼宗立有有為空故言不來不出真諦中道者別記云準上應云約不偏義名中道對世諦來出故云不來不出為假也下義準悉疏答通即例之但佛弟子等者別記云彼宗皆許假生假假斷假常但云不斷不常約世諦言不生不滅約真諦言然今隨彼一往不言而為言之所言諦者諦先王之名也隱避也忘也疏一異來出即可通二義者別記云世諦者假一異來出也真諦者假非一異來出也是故云通亦可真之與俗皆有一異及以來出故云通也疏云次二諦合具八不等者此下第三明非真非俗具八不於中又二第一總標體用二中第二隨標別釋初中又二初明合論用中具八不復明合明體中具八不初中又三第一顯經論明二諦差別第二正明具八不第三問答以顯各合差別今言就合明二諦為中等者第一明經論差別若準文起盡者應云欲顯合用以舉經論差別若準義道理者應云欲説合明體中以舉經論異説若準此判科文應云文中有二第一總標體用二合中第二隨標以辨體用合中各具八不初中又二初雙標體用二合中後別約合明體中以顯經論差別二判各有道理任意取捨也別記云約合明中言具八不耳不偏之義名為合中也言一者欲釋經説等者如大品經第三十一卷佛告須菩提言菩薩摩訶薩以世諦故示衆生若有若無非以第一義乃至衆生於五受衆生有差相故不知無所有為是衆生故示若有若無令知清淨無所有大論釋曰菩薩世諦為衆生説若有若無非第一義若有是實有無亦應有實若有不實無云何應實乃至衆生於亦五受衆中有所著為是衆生離有所得無所有故菩薩説無所有世俗法故分別諸法欲令衆生知是無所有也又仁王經上卷二諦品云大王若有為無即世諦也以三諦攝一切法空諦色諦心諦故説一切法不出三諦我人知見五受陰空乃至一切法空疏主釋云下第三明諸諦教門攝一切法皆歸於空文中有三言若有若無等者第一明世諦此意明凡夫定執有無故名世諦也言以三諦等者第二明三諦攝法三藏師云諸法本性為空體也凡夫色麁顯據色為端名為色諦二乘人修道無漏心名為心諦若義論生死涅槃各有三諦生死三者天人四大色是色諦八識心是心諦生死無涅槃是空諦三者真實色是色諦二真實心名心諦無生死四顛倒名空諦也教雖説三理非三也我人知見下第三明世諦還歸於空又教化品偈云二諦理窮一切盡疏主釋云能所並冥境智俱寂故云理窮一切盡今文意云爾故云攝法義周也準之可悉述義云就合門二諦開合明中故云攝法義周也疏二者單明二諦等者如菩薩本業瓔珞經下卷敬首菩薩白佛言二諦法性為一為二為有為無佛告敬首菩薩言有諦無諦中道第一義諦一切諸佛菩薩智母又云慧有三緣一照有諦二照無諦三照中道第一義諦曉法師疏下卷佛母品云別釋二諦即有四門一有無有門二二無二門三因緣門四假名門有無有門者謂分別性有理有事道理假有假有非空名為有諦事法實無實無是空名為無諦如經世諦有故不全無諦空故不有故真如即是中道第一義諦第二二無二門者前説二諦有無差別常爾不變名為世諦有無俱空平等一味是名故為第一義諦第三因緣門者諸佛已出三界諸行而起機緣還入六道如是感應因緣集會以知不無名為有諦雖不是無而不得有不得有故且謂之無雖謂之無而不存無有無俱無名為無諦此門二諦即是中道第一義諦所以然者有不生故即為無諦無亦空故即為有諦所以二諦即為中道第四假名門者三假集有名為世諦實相名為第一義諦具明如彼面言單明二諦者述義云就關門二諦言淡海記云約離門二諦辨合明中之文也言第三明非真非俗方是體中者有人傳有説云單明用中為一合論用中為二今非真俗名為第三非是先泯二歸不二句也又傳有説云指於先泯二歸不二句也非是單明用中合論用中之第三也顯在下釋泯二歸不二之句文處也又傳有説云與初釋同文勢理爾唯一不須明三諦二明三諦義故知爾也準之可悉疏云問云何但明二諦為中等者此下第二隨標別釋亦可第二隨標以辨體用合中各具八不於中又二第一明合論用中具足八不第二明合明體中具足八不初中又二初正明具八不後問答以顯各合差別初中有三第一明初四不第二明不一不異第三辨不來不出此文初也言彼云真故無有等者偽秦長安曇影法師中論疏序文今略引證成四不義所言彼者彼曇影師也所言真故無有等者述義云此就關門二諦而為言之言果者深也言即是不有不無等者疏主釋成序意也有人傳云影師之言至于不常不斷之文也所以然者初云舊二諦本文亦有同文者非也撿序文者顯然無疑具引序文如記第二也恐煩不記準可悉疏云不一不異者例上應云等者此下第二明不一不異言例上應云等者例上影師序文應云他疏若對破立者開善謂真俗一體等者如二諦章下卷云就明二諦一體家復有三説一云真諦為體此有二義一明空為理本明一切法皆以本為本有非是本為是故以真諦為體也二有為俗諦拆俗為悟真故真為體二云俗諦為為要由拆俗故得真若不拆俗即不得真良由前拆俗故得真所以俗為體也三云二諦互指為體前兩家並今明具二義明空為有本故真為俗體俗為真用拆俗得真故俗為真體真為俗用二諦互為體真俗互為用也此即是開善門宗有此釋開善本以真為體餘兩釋支流準此章文以真諦為俗體故云二諦一體也言龍光寺者述義云京師龍光寺釋慧珠也開善寺智藏師大學士此法師住彼寺江左敬法師故舉寺為名也此師宗立三假為俗諦體四忘為真諦名相為俗諦體無名名相為真諦體故二諦體異已而言龍光方案高僧傳第五卷道生傳云其年夏乘青園佛殿龍升于天光影西壁因改寺名號曰龍光又云又有釋慧生者亦上龍光寺也言所以天親釋大品明十種散等者如梁攝論第六卷云論曰十散動分別謂菩薩十種分別無有相散動增益散動損減散動一執散動異執散動通散動別散動如名取義散動如義起名散動釋曰菩薩分別不與般若波羅蜜相應悉名散動般若波羅密經説十種法對治此十種散動乃至無有相是散動因為對治此散動故經言是菩薩實有釋曰由説實有顯有菩薩以真如空為體也有相是散動因對治此故經言不見有菩薩釋曰不見有菩薩以分別依他為體也以有增益無所有此執即是散動對治此故經言何以故色由自性空釋曰由分別色性色性空也以無損減實有此執即是散動對治此故經言不由空空釋曰此色不由真如空故空也依他分別即是空此執即是散動對治此故經言是色本非色釋曰若依他性與真實性是一真實性是清淨境界依他性亦應如此也色與空異此執散動對治此故經言無色異空故色即是空空即是色釋曰若色與空異此空即不成色家法空不成色通相此義不祥譬如有為法與無常相不異若捉分別性説言色即是空空即是色何以故此分別色永無可有此永無所有即是空此空即是色無所有不如依他性於真實性不可説一由情淨不清淨境界故也執色有通相為性謂有礙此執散動對治故經言何以故舍利弗此但有名所謂色釋曰唯有名是色通相何以故若離名色實無體性也已執色有通相又分別色有生滅染淨等差別此執散動對治此故經言是自性無生無滅無染無淨釋曰此色無所有為通相若有生即有染若有滅即有淨由無此四義故色無別相也如名執義於義散動對治此故經言對假立名分別諸法釋曰名是虛假所作對諸名分別一切法也如義於名記舊執此執即是敬動對治此故經言由假立客名隨説諸法釋曰名不與法同相經言如如隨説如是如是生起執著釋曰隨假所立名説諸法計名與法不異經言如此一切名菩薩不見若不見不生執著釋曰為對治十種散動故説般若以此説為因無分別智生由無分別智滅諸分別惑具明如論
