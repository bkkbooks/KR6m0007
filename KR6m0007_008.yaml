body:
  text: 中論疏記卷第七之本集衆異説不敢和會大安寺沙門安澄撰疏第七卷末觀合品第十四疏所以有此品來者具於六義等者約此品由來文有二初有六復次次明來由後問答以顯品名目初中有六今此初復次言無待無絶者述義解云無有單空故名無待亦獨空亦無故名無絶也言故大品云等者案彼經第二卷習應品中佛告舍利弗言菩薩行般若時不作是念有法與法若合若不合若等若不等何以故是菩薩不見法與餘法若合若不合若等若不等如是習應是名與般若相應今略引之大論第三十七卷釋習應品下釋曰一切法無有法與法共合者何以故諸法無少分合故譬如二指有四方其一方合三方不合合合多故何以不名為不合乃至以是故言無有法與法合無合故亦無不合等者一切法一相故名等不等者各各別相菩薩不見等與不等何以故一切法無故自性空故無法無法故不可見不可見故無等不等等與合是習相應不合不等是不相應準之可悉疏二者上來等者此第二復次言上來有四種著等者案上行品末外人有四種著一者外人立有實人法論主即破二者外人立有虛空妄人法論主即破三者外人云無實無虛即是空便應有空論主即破四者外人云無有無空乃是大空論主即破準之可悉疏三者諸行等者此次二復次言諸行名五陰等者案此論行品初長行云諸行名五陰從諸行生是五陰名行琳法師釋五陰名行自有二義一者五陰從三行生從因受名故名為行以業行之因妄取不實還感五陰虛妄之果是以五陰名行故云從行生故名行準之可悉言行品破無性五陰等者案影疏云上品破無性五陰今遣緣合根塵上以後異明無彼還執異以難無今以異方明不合還使執異以救合故二品中俱有破異準之可悉言答顛倒衆生等者案疏云上品破虛妄五陰此品遣緣合根塵二乘凡夫謂有根塵和合遂生三毒煩惱既生便招業若今破根塵本自無合則煩惱不生煩惱既無業苦便息今復舉而觀之故次明也準之可悉疏五者上行品等者此後二復次言含識之流等者案琳疏云旨歸者然含識之流皆言萬像為果自他差別我所紛然起於惑業不得解脫今明萬法一如異義無從自他平等惑業不生準之可悉疏問誰計合耶等者此下第二問答以顯品名文中有二謂問與答答中有二初出四師計後正破執以顯品目言外道人等者案百論上卷破神品云外曰不然優樓迦弟子誦衛師經言知與神異是故神不墮無常中亦不墮無知何以故神知合故如有牛經曰譬如人與牛合故人名有牛如是神情意塵合故神有知生以神合知故神名有知疏主釋云衛世師稱為異異於僧佉勝於僧佉故名勝異也四合知生者欲顯神受知名準之可悉言毗曇人云等者案雜心論第二卷行品長行云觸者於依緣心和合生觸境界疏釋云能和三事使更相願樂光法師解觸謂根境識和合生能有觸對準之可悉言成論義等者案彼論第五卷無相應品第品十五云又經中因眼緣色眼識生三事和合故名觸若説心心數法一時生者則無三事和合若説一一生則有三事和合以是等緣故無相應準之可悉疏品開為二等者言此品稱説曰等者述義解云般若燈論云説者開演義故此直解曰説更言曰論然則論主得陀羅尼具妙辨才為解釋佛經意故唱説曰居於品初此説曰者論主應物施教之功若就因果是因因有權實是實實有凡聖即聖聖有大小即大然就淺深次第論之凡所有言皆佛説曰諸二智無所不遍所有之法皆是佛事而以體用本末之義法身是本能起用義故有説曰應化不爾又就應化有本末義應身能起種種化用故有説曰化身即無又彼化身三十二相八十種好種知功德具足成就故是極果如諸菩薩地前地上皆此因位故故未是極所以化身當有説曰菩薩即無有諸又菩薩隨分各有法身觀智並觀之義故有説曰而凡夫人無如此事故無説曰然説曰毗有五種一者佛説曰謂佛所説十二部經八萬法藏於是處無所不攝故二者菩薩説曰而佛滅後四依菩薩出世造論而為解釋佛經意故三者凡夫説曰謂世間雖有佛經菩薩論而末代衆生不能自悟故凡夫之人依準經論造玄疏等而隨自分申經論意令當時人有利益故四者所證之理能起能化三種説曰故就真理而言説曰五者由所化有能化由能化有所化所化無所不得有能化能化無處不得有所化如有鳥處得以張網不有鳥處不得張網諸佛菩薩以教起緣猶如慈母以乳起兒故就所化之緣言説曰也今此處言説曰者就本為論是佛曰而當論主自造此論為令開合今後之徒故知正是菩薩説曰然此説曰具有五義一者相起義謂菩薩造論而能説起佛經妙奧之義故二者相生義謂由菩薩論而能生化緣之解故三者相合義謂能稱經意而申明顯故四者相因義謂由能證智有所證理由所證理有能證智故五者相待義謂無所證理不得有能證智無能證智不得有所證理故又有二義一通理教名為説曰謂説中道理及二諦教故二但就教名為説曰謂但是音聲言説故於二義中後義為正準此義意應有二説曰言此品攝等者用論王説曰謂能化之説曰言又上品等者明所化之説曰故碩法師云今第一文言取意指前破者謂情雖不發言執根塵和合以冗論主而壞抱決言有根塵共合有覺知見聞之用故論主取彼謂情指上已破畢竟無所有也所言心下者述義云猶心內也提者舉也疏八偈為三等者言三法具故無合等者案碩疏云見即眼根所見即色塵見者即是人也眼在身中所見境在遠處假人又非色非心此三各在異方云何得合耶言問世間外道等者此文上下相違何者初云世間等但明異而合次言異不合何名破邪故更可尋求也言答此有二義一者等者案碩疏云今偈縱計三事有異亦不得合何者眼在身中所見境在近處假人又非色非心此三各在異方云何得合邪故偈云終無有合時也若遠遂得合者譬外之色與限相遠亦應得合眼應見障外色準之可悉言此中破不得合等者此第二義謂二義之中第一義破異而合第二義破異而不合也疏長行為五初釋偈本者言我或在內或在外者佛法學人等者案康疏云佛法中犢子部計我在身內如樹神依樹無約住處外道計我是常遍一切處今案廣百論第三卷云論曰一類外道執我周遍於一切處受苦樂故我無形質亦無動作不可隨身往來生死故知內我遍於一切一類外道作如是言我性如色隨所依身形量不定雖無形礙而有所依轉變隨身受諸苦樂雖依形質有卷有舒而我體性無生無滅修法師釋云言一類外道等者此是數論勝論二宗我執周遍無偈礙常住以身遍行一切處時由不出我境故恆與苦樂相應故知遍一切言一類外道等者此是露形尼乾子執我稱身量舒卷不定體亦實有常住共同是故我宗所立我性應如色心隨所依身形量不定此我體性雖無形礙而有所依之身轉變隨身領受苦樂準之可悉疏復次下第二開二關責之等者言又應水漬眼者玉篇漬似知反浸也漚於候反漸也久漬也言又數論云等者案婆沙第八卷云到有二種若以取境界言之六根盡到若以無間言之則三到謂鼻舌身根三不到謂眼耳意根成實論第四卷根塵合離品第三十九云眼識不待到故知塵所以者何月等遠物亦可得見又假空與明故得見若眼到色則間無空明如眼箆觸眼則不得見當知眼識不到而知言又大士眼等者案華嚴經第七卷賢首菩薩説偈中言於眼根中入正受於色法中三昧起示現色法不思識一切天人莫能知於色法中入正受於眼起定念不亂觀眼無生無自性説空寂滅無所有於耳根中入正受於聲法三昧起示現聲法不思議一切天人莫能知於聲法中入正受於耳起定念不亂觀耳無生無自性説空寂滅無所有法藏師解云約自身中約十二處辨於中緣起無礙定等圓融一一皆有十事五對無礙之相第一對根境無礙既觀根入定還應根為顯此根即是境故從境出也以心緣起無二而二故恆相則而根境兩分述義解云凡夫未入定時不用六識又見空時不見有菩薩入定時用六識形靜在而耳聞物空有並見準之可悉言又持法華等者案彼經第六卷法師功德品云復次常精進若善男女受持此經若讀若誦若解脫若書寫成就八百鼻功德以是清淨鼻根聞於三千大千世界上下內外種種諸香乃至三乘身香亦皆遙聞知其所在雖聞此香然於鼻根不壞不飾疏主釋云言遙聞香者舊釋任根常用即如數論等釋之今依經力故鼻能遙聞法花論云一根具六用而言鼻遙聞者是此智境勝用鼻根知故此意鼻根既具六用豈不能遙聞香耶蓋是菩薩無二而六權智巧用無六而六名實方便六而無六為方便實持經人既悟此經具足二慧故能爾也準之可悉問曰下第三外人救義等者案碩疏云所以作此救者論主上責若合而見合即是到到者色邊有眼與人此不可若未合而見即是不到不到而見應見遠方之色二關俱有過彼今救云但見聞之體必須具四法若四法不足即不得見聞故言和合和合由是不闕義耳何得聞和合便令根到塵塵到眼耶以此意救上破眼不無見與可見等也今看此文全是優樓迦人四合生知義一者神我二意根三眼根四色塵神我既御四種和合故知雖是外道義而今世學佛法人立義與此更無異一者假名行人二眼根三者色塵四者意根四種具足前惑心為意根後生為眼識故眼識藉此四緣生豈非四合生知義耶準之可悉疏答曰下第四破救等者言六情品中明三法無見等者案彼品文凡有八偈初一偈立次七偈破於中為二初有六偈正破眼情次有一偈類觀餘五六偈為六第一偈正破即舉不自見況破見他第二偈約三時門以破見他第三偈重約色破眼見第四偈明法無故無人即破色無見義第五偈明人無故法無第六偈明因無故果無準此疏文今言眼不能見者六偈之中初三偈意言色不能見者第四偈意即見不能有見非見亦不見若已破於見則為破見者是言人不能見者後二偈意言故云識等四法無者六情品末偈云見可見無故識等四法無四取等諸緣云何當有今略引偈第二句準之可悉言具破因果者約此偈文識等四法無者破無果也四取等諸緣者四取既無則不起三業三業無故未來兩果已觀見可見空則十二緣河竭佛性水生此偈即明破六情之大意也言此即具破因果者疏主解云所言因者眼色和合生於眼識乃至四取故眼識色為因識等為果準之可悉言又根品中等者取上六情品意案彼品文論主破眼情凡有六偈初三偈破眼見次一偈明法無故人無次一偈明人無故法無又云初三偈破三偈破眼見次半偈破人次一偈半破法準此此疏文今言見者眼根也見者者人也可見法者色塵也疏深與於可染下第二偈等者言由眼見色等者案康疏云眼見好色起貪見惡色起嗔見中色起癡耳聞鼻嗅莫不皆爾言今染等無合者染可染染者無合案康疏云染為心可染為境染者是人以眼見色心中染著故準之可悉疏復次異法當有合者第二破無有等異者言又合由異生等者案影疏云要以異故有合合故有異然合因異生故無合異因合有故無異無異則無合無合則無異亦以異故無合合故不異準之可悉言是以二品俱有破異者述義云六情品與合品是也淡海記亦同之今謂不爾違起盡故上文既云上品明以後異破性外還投異救性今以異明不合外還執救合故所以應言上行品與今合品名為二品也故行品疏云破救大意但破其異上以虛妄顯空而變著虛妄今以後異顯無復著於異以彼執異性故今明無異即無性準之可悉言故今求異不得等者述義解云眼與境異故合合故起貪貪故有業業故有苦而求異相不可得即三毒不生也問眼與境界何得言異乎生死涅槃推求亦爾今意佛具一切種智衆生不具一切種智故名平等何以故異而不成異故名平等耳疏問曰若有定異法有何咎第二偈等者言外云捲由指有等者案影疏云有定異法言眼色相因而異故可爾如天上月暗中瓶此則定異無相因故準此應言捲指相因而異故可爾捲柱此則定異無相因故名定異法也言若離五指異等者案康疏云舍從梁棟得則染棟為從異舍為異也苦離梁棟異別有舍為異準此應言捲從五指得則五指為從為捲為異若離五指從異而有捲異者亦應當捲異與瓶柱等而有異也言今離五指異等者案康疏云離梁棟從異無別有舍異何得言舍為異準此應言今離五指從異而無別有捲異當何物與瓶柱為異也疏長行為二第一前逈破外人立等者言逈破外人立義者逈者猶越也遠也言此意須翻取之者述義云有二義一者不異法在異相中時不可言異相法二者異相法在不異中時無有不異若無不異者何言異相法耶也疏復次下第三段明無異故無合等者言如指一方等者案大論第三十七卷釋習應品下云一切法無有法與法共合者何以故諸法少分合故譬如二指有四方其一方合三方不合不合多故何以不名為不合準之可悉觀有無品第十五疏此品來有近遠兩義等者約此品來由大文有二第一約近遠兩義以明來由第二問答以顯品目初中有二第一遠來由第二近來由初中又二初約上諸品意以明來由後破他説以明來由此文初也言六種云等者案彼品文云答曰若使無有有云何當有無有無既已無知有無者誰疏主釋云此破無凡有二種一者若有無異體無有可待即無有於無二者有無一體有有故有無若無有即無無今略引上半偈文言行品云等者案彼品云答云若有不空法即應有空法實無不空法云何得空法疏主釋言此偈直作相待破之若有不空可待之説空不空既無何有空耶如空內名內本不有何有空耶此亦略引偈上半文言略破散破者述義云破有處不破無破無處不破有故云略破散破也言廣破束破者述義云就破有而破無就破無而破有故名廣破以一切法不出有無故名束破也言諸見根者如因有無等者案法花經第一卷方便品比丘偈中云入邪見稠林若有若無等依止此諸見具足六十二疏主解言初句明一見謂總名外道諸見為一邪見邪見衆多譬如密林故云稠林也次句明二見智度論云愛多者著有故起有見見多者著無見又云四見多者著有邪見多者著無次二句明六十二見也大品經以我見為六十二本又以一異為本此經有無為本此三不違也由計有我故生諸見即我為本以有我故計我與陰一異故以一異為本我與陰一即陰滅我滅使起斷見我與陰異即陰滅我存故起常見斷常即有無故以有無為本有無謂邊見邊見為六十二見本我為邊見本準之可悉問經疏云有無即是斷常今何故云因有無成斷常答案此品疏末文云且約人作人因陰有即無自體若有人自體不假陰成陰雖斷滅即人存故是常瓶柱亦然故有是常然因果相續名為不斷今因遂滅無即果無所續故無即是斷故云有無即斷常也碩法師云若謂三世定有如從未來來現在現在入過去有法不可令無因此即生常見若推獲諸法定無無有因果罪福同草生滅同燈滅無復來續此即因無成斷見故云因有無成斷常各有義門故不違也言如佛呵迦葉等者案大經第三十五卷迦葉白言世尊若言五陰是佛性者云何説言衆生佛性非內非外佛言善男子何因緣故如是失意我先不説衆生佛性是中道耶迦葉言世尊我實不失意直以衆生於中道不能解故發此問也疏主釋云此是生善中第二辨中道佛性今此約非內非外明中道前迦葉難因前五陰是佛性言為難若五陰是佛性佛姓即應是內前師子吼章中明佛性中道耶云佛性非內非外耶佛答正呵止答前處明中道為佛性今那復作此問耶次迦葉佛亦為衆生多起二見不解中道所以問也述義解云我先不説等者就四諦教時而為言之言汝何故等者就涅槃教時而為言耳今謂不爾準疏可見疏又有此品來者有人言等者此下第二破他説以明來由言有人言等者此北土三論師説即是應琛法師説也言故作者品云等者案品文破人法見有二初問答以生起後正以偈破初中又二即問與答今此答文所引全同元康師云下明離斷常過也假名為有故非無無有決定故非有有則墮常無則墮斷既非有無則非斷常也無有決定如海所説者汝説定有定無墮斷常過今不如此準之可悉言無有非道等者述義云外道之道名非道也外道之義名非義也外道道與義無故名無見也疏次破合品等者此下第二明近來由言惑者云等者所言萬化者萬法之異名也化猶有義也言無無異相等者謂於無者無異相也於有法者有異也言又外難論主若言無異等者云云疏問云何是有無耶等者此下第二大段問答以顯品目凡有兩番問答此初番問答有二即問與答答中有二初就因果明有無後就人法明有無初中又二初就外道因果明有無後就內學因果明有無言曇無德等者述義云亦云曇摩崛此云法藏此部多同大衆部執言俱舍論出天親小乘義云等者述義解云如現在行十善因未來天報即有故云現在作因等也今案真諦所翻俱舍論二十六字快言迦葉鞞義作因便作等者案成實論第三卷過去業品第三十二云論者言迦葉鞞道人説未受報業過去世有餘過去無琳法師解云又迦葉鞞義作因雖謝而有感之能名之為有得果因滅號之為無也述義解云五百部中一師名為迦葉鞞也準此等文今言作因者業也業是造作義故疏若就人法明有無等者此下第二就人法明有無於中有二初約外道明有無後約內道明有無初中言三外道並計有人法等者僧佉衛世勒沙婆此三外道俱計有人法也言邪見外道等者六師外道中第一富蘭那迦葉故注維摩經第三卷須菩提章云羅什曰迦葉母姓也富蘭那字也此是邪見外道撥無萬法也肇法師曰其人起邪見謂一切法斷滅性空無君臣父母忠孝之道準之可悉言迦羅鳩馱應物起見等者案注維摩維第三卷弟子品須菩提章羅什曰迦羅鳩馱迦旃延者外道字也其人應物起見若人問言有耶答言有問言無耶答言無也肇法師云姓迦旃延字迦羅鳩馱其人謂諸法亦有相亦無相也準之可悉疏佛法內亦有三部等者此下第二約內道明有無於中有二初約人法明有無次約塵識明有無此文初也案淨名玄初卷云二佛滅度後五百論師諸部異宗亦不出四句之義如龍樹所引犢子計有我有法名為有見方廣執無我無法名為空見薩婆多謂無法有法即是亦有亦無訶梨言世諦有我有法故非無真諦無我無法故非有即二諦合明中道非有非無述義解云大論等處處所引犢子部言我法二種俱有體性立三聚法一有為聚二無為聚三非二聚前二聚法第三聚我又立王法藏如上所説言方廣者二十部中一説部是彼言一切我法唯有假名都無體故名為空見方廣方等是大乘異名彼部所言似於大乘故以為名依四阿含作如是説何者阿含就世俗言諸法無主色欲如幻既言欲界色界無主如幻故知空也薩婆多言有法無我如俱舍論前之八品分別諸法後之一品破我見也梵語訶梨跋摩此言師子鎧造成實論人名彼論論門品云有二門一世諦門二第一義諦門世諦故説有我第一義諦門故説無我故中道又一切有無品云方便説有方便説無若決定説有即墮常見若決定説無即墮斷見離此二邊名行聖中道準之可悉疏若就塵識論有無等者此下第二就塵識明論有無案淨名玄初卷云三明即世所行塵識四句一薩婆多部不得法空計有塵識二方廣道人學毗佛略執邪無之義明無識無塵三羅什未至之前有心無之説明有塵無識者計無塵有識如執唯識無有境界述義解云薩婆多義但空於人不空於五陰法何者人是假故空五陰法是實故不空然於五陰法中觀於人空以得道故為見有得道耳觀人空者如其義云內離人故空者於五陰內無有人故不自在故無我者自在是我之異名也而今言舊大乘義者古舊學大乘人也玄疏各舉一義也毗佛略者方廣之異名此小乘十二部中一也謂無塵識此邪無義似大乘耳大論初卷云方廣道人言一切法不生不滅空無所有譬如菟角龜毛常無即其證也言若心無義等者案二諦搜玄論云晉竺法溫為琛法師弟子也其製心無論曰夫有有形者也無無象者也然即有象不可謂無無形不可謂有是故有為實有色為真色經所謂色為無者但內其心不滯外色外色不存襟情之內非無如何豈謂廓然無形為無色乎將明心空必舉境以明之故知心空由照空境境空由心而顯境智相成猶函蓋相可也而解心無凡有三義一者色塵是可見法心是不可見法非如可見相故名心無耳非是心體無故名心無二者色法更不應空唯其上執著心是可空故名心無三者所證理空故能證智亦空若所證理雖空而能證智是有何能契耶當知理空心亦復空故名心無言若唯識論等者楞伽經中唯識論一卷亦名破色心論彼論初偈云唯識無境界以無塵妄見如人目翳見毛月等事又末偈言諸法心為本諸法心為勝離心無諸法唯心身口名心身口名者但有心識無身口業身口業者但有名字實是意業身口名説準之可悉疏問衆生何因緣故起有無見等者此下第二番問答文中有二謂問與答答中言智度論云等者案彼論第三十七卷釋習應品下云或有衆生謂一切皆空心著是空著是空故名為無見或有衆生謂一切六根所知法皆有是為有見愛多者著有見見多者著無見如是等衆生著有見無見是二種見虛妄非實破中道譬如人行陜道一邊大火二邊俱死著有著無二事俱失所以者何若法實定有則無因緣若從因緣和合生是法無自性今略引之慧影師解云愛惑多緣事生故曰著有見惑多緣理生故云著無也陜道者喻中道深水者喻無見大火喻有見也以衆生於此二見強故説為深水等也言又云四見多者著有等者案大論同卷次先文云一切世間著二見若有若無順生死流者多著有逆生死流者多著無我見多者著有邪見多者著無復次四見多者著有邪見多者著無二毒多者著有無明多者著無今略引之慧影疏解云凡夫多著有二乘小聖多著無明為明菩薩有無二見悉捨故先出他家所見等也復次四見下明就五利使分有無二見也二毒多者下次就鈍使明於二見也無明者此據邪見無明故云著無準之可悉疏初長行立等者案碩疏云今第一外人立有性義云有力用故者以力用證有性義如瓶有持水之力用布有作衣服之力用力用既殊則有性瓶有瓶性故泥遇緣成瓶縷有布性遇緣即成布故云是性衆緣合時即出若先無性者衆緣合時不應有果生以此證有性義準之可悉疏答中上半等者案碩疏言上半總非不然不然其上説言是性衆緣合時生今禪此説汝語自相違若自性不順衆緣若衆緣生即是無性而言有性從衆緣者不然也下半正破若言有性從衆緣即是作法若是起作之法即無定性何得謂有性耶準之可悉疏問曰下生第二偈受論主責等者案碩疏云問意正如數義未來有性須藉現在緣乃至今問云若諸法性從衆緣作此有何過邪準之可悉疏答中上半等者言明性非因緣所作等者案琳疏云明性不可作作則非性汝言有性而復云作言自相違性將安在然性雖是有要須緣發如木中火性要假人功攢𢷊方得火也準之可悉疏長行初以二義破自性等者言一就因成門破等者案琳疏云長行初以二義破自一舉因緣破文言諸法性衆緣作故二舉相待破文云亦因待成故無自性也言後亦引二義等者案碩疏云若爾者下此釋無他性義他於他是自故文云他性於他亦是自性也亦從衆緣生相待故者明他由自有即是從緣相待有亦無他性也準之可悉疏問曰下生破自他外有等者言自他外有者案碩疏云此偈通先四句計明非但自他不得生亦他非自非他俱無生義準此疏意四句之中第三第四云自他外有今疏主不爾準之可悉言意云諸法等者案琳疏云外云泥無自性不獨生瓶要藉衆緣緣亦無性亦不觸不能復藉淤泥雖無因緣自他之性但有瓶法有何過今疏主不爾準之可悉疏答中上半等者言以陰中人為自等者述義云並以五陰及人為自也準此記文應讀疏文陰與中人為自也疏長行云必有見者此見非是等者言必求有見者述義云此以邪推求有所見也謂此乃是深著等者案碩疏云虛妄尤重故云深著準之可悉疏佛能滅有無下第二引經勸捨有無等者答此是小乘經等者案碩疏云阿含經出佛化迦旃延事即名化迦旃延經如經中説比喻名城喻經也此人本在外道中此人利根種種推盡廣起諸見經歷多年不能得道後到佛所為説正見我令觀有無即得悟道準之可悉言大品經引先尼得信等者案彼經第四卷末須菩提言如是先尼梵志不取相住信行中用性空智入諸法相今取意略引之大論三十二卷解云問曰此中何因緣説先尼梵志答曰此經種種因緣説法空乃至無徴相可取人心疑怪不信是理難見以畢竟無相故以是故須菩徒引證小乘中尚有法空何況行大乘法者而不信法空又云先尼是那若婆羅門畼也乃至廣説影疏解云問曰下明論主自科經文也答曰下正釋科文之意以小證大義也此經是佛成道五十説之已明先尼得道而大本經始言成聖者當知非是實人始於後席得果乃至廣説言上半標有無是斷常者案碩疏云上半明因有無成斷常見者若謂三世定有如從未來來現在現在入過去有法不可令無因此即生常見故云定有則著常也次句明因無成斷見若推獲諸法定無無有因果罪福生同草生滅同燈滅無復來續此則因無成斷見故云定無則著斷準之可悉言下半勸捨等者案碩疏云明道理無有二見但迷心橫謂謬執有無即成二見故遠離正道故有智慧人不應起此見言纒垢者案法宗原云十纒者一無慚二無愧三嫉四慳五悔六眠七掉舉八惛沈九忿十覆纒縛有情故名為纒初二是大不善地法嫉慳忿覆是小惑地四惡作睡眠是不定中二掉舉惛沈是大煩惱地中二也六垢者一惱二害三恨四諂五誑六憍此六即以小惑地中六法為性準之可悉疏第二偈釋有是斷常所以等者言徴起無念等者述義云所言徴者猶趣也言成壞品等者案彼品云復次若有所受法即墮於斷常當知所受法若常若無常今略引偈上半文琳法師解云此衆舉斷常二見遮其受著上半明有所得人受著諸法序其能見之心下半所受之皆墮於斷常彰所計法如有見外道即是常見無見外道則斷見三世有部即是常見二世無部則為斷見又大乘學者而謂斷除二死滅於五住別計有常住果起諸此例並不離斷常二見準之可見觀縛解品第十六疏此一品生有遠近通別等者約此品由來有二義解釋第一遠來由第二近來由初中有二第一約內外大小所計以辨縛解第二問答以顯斷惑差別初中有二第一總約外道執以辨縛解第二別約內迷以辨縛解初中言一者云衆生縛解自然而有等者案大經第十九卷云今有大師名尼乾陀若提子一切知見清淨梵行為諸弟子説如是言無施無善無修無道一切衆生徑八萬劫於生死輪自然得脫有罪無罪悉亦如是又大論第七十卷云有人説衆生世世受苦樂盡自到邊譬如山上投縷丸縷盡自止受罪受福舍歸於盡精進懈怠無異肇法師淨名經注第七品須菩提章云那闍夜字也毗羅眤其母名也其人謂道不須求徑生死劫數苦盡自得如轉縷丸於高縷盡自止何假求也今案涅槃疏第十三卷云第六師計衆生經八萬劫於生死輪自然得脫若不經八萬劫衆生不得脫故什師為其作譬喻如以綖盡自然而住綖不盡則不住也此人名尼乾陀者此是出家外道之通名如今比丘與沙門等出家人之通名若提即其母名以母標子前是通名今舉別通別兩名準此等文今言一切衆生等者涅槃經文意也如轉縷丸等者智度論文意合別經論文也準之可悉言又有外道云要須修道斷惑方得解脫等者言如僧佉云等者案百論上卷破神品初云迦毗羅言從冥初生覺乃至神為主常舉相處中常住不壞不敗攝受諸根能知此二十五諦即得解脫不知是者不離生死今取意略引之疏主解云能知下上來明境此辨迷悟所以明迷悟者為欲自立破他自立者明從境生智斷生死得涅槃破他者論主明空無相無有人法無法故迷彼二十四諦無人故迷彼神諦是似外人謂得解脫言論主不離生死可悉疏毗曇人云等者此下第二約內迷以辨縛解文中有二初辨縛字次辨解字初中有三第一明毗曇執第二明成論人執第三明大乘執此文初也案阿毗曇章第二卷斷障義云使有二縛一者緣縛二相應縛依此宗中聖道生時唯斷緣使不斷相應所以然者一切衆生昔於緣愚今緣中得不愚時但斷緣使其相應便極相近故不斷相應故雜心云中得解脫大仙之所説下自斷云當知於緣中得解脫相應解脫一剎那故但生故一切衆生於緣中愚彼起不愚煩惱解脫準之可悉言一緣而不縛等者言無漏緣使者述義云俱舍論云亦能緣無漏謂二邪見二疑二無明除此六餘五部惑皆緣有漏有漏乖無漏故以有漏緣無漏而無漏不被縛故有緣而不縛又無漏心王心數相應而非縛然望大乘是縛也二邪見者謂撥無滅道二諦二疑者謂疑滅道若有若無二無明者相應無明反不共無明不共無明謂獨頭無明此二無明能暗惑於滅道二諦此就界上二界亦同合有十八也九上緣使者十一遍使之除身見邊見餘九是也除身邊二見者此二唯緣自界而不緣他界故此九上界緣使何者此九緣上界境不隨增故無失得得下者劣境即隨增故有失不緣也十一邊使者苦諦下七謂五見疑無明集諦下四謂邪見見取疑無明也言二縛而不縛等者述義云不善心王起時即貪嗔等不善心數俱起故心王與心數相縛然同時起故不相緣緣者緣女也生貪等故云煩惱與心法等也言故雜心云等者案彼論第九卷雜品長行云問心心法云何於緣轉答有緣説俱行若有緣法俱於緣中轉辨一事故問於何緣轉答謂於他相轉心心法緣他法非自性何以故無二決定不自行故亦不緣相應一行一緣故亦不緣共有同異一果故疏釋云無二決定者心無二定體故不自緣也述義解云心王不緣心王故名自緣心王不緣心數故名不緣相應心王心數俱在四相不緣故名不緣共有也言三亦緣亦縛等者述義云以有漏貪心緣苦諦境故云有漏緣使言四非緣非縛等者述義云二無為等也釋四句文諸記皆同之疏成實義云等者此下第二辨成實師執言以無同時心數等者案成實論第五卷苦諦聚立無數品云心意識體一而異名若法能緣是名為心問曰若爾則受想行等諸心數法亦名為心俱能緣故答曰受想行等皆心差別名乃至如經中説是人欲漏心得解脫有漏無明漏心得應品云無相應法所以者何無心數法故心與誰相應又受等諸想不得同時又因果不俱識是想等法因此法不應一時俱有故無相應又第十卷雜煩惱品云問曰諸煩惱何故名使答曰生死相續中常隨衆生相續增長故名為使問曰是使為心相應為不相應答曰心相應所以者何所説貪等使相是諸使相與喜相應若喜心不相應是事不然又貪名染著心不相應中無染著義故知諸使與心相應問曰不然諸使非心相應所以者何經中説小兒淫心無何況能淫欲亦為欲使所使故知諸使非心相應言破數人云等者案咸實論第十三不善根品云問曰是諸使為法中使衆生使耶答曰因法生衆生心隨衆生心則受諸受隨諸受貪等煩惱使故知因法生使而使衆生何以知之若衆生未斷此使則此使使若斷則不復使若法中使法常有故使應常使常不應斷又非衆生數亦應有使若然者若以使故壁等有使以人識故壁等亦應有識是事實無然則無學阿羅漢餘人使故問曰是使未斷則使斷則不使答曰二種使使一緣使二相應使是使若斷若不斷即是緣及相應何故説斷則不使若爾更應説第三使相以不可説故當知無也又使能緣異地而不使故知但衆生使非法中也問曰二種使使一緣使二相應使是衆生諸使非緣非相應云何當使答曰是事先答諸使因法生而使衆生如阿毗曇身中説欲界衆生幾使使等若不使衆生云何有如是問問曰若使衆生經中説樂受中貪使此則相違答曰是不盡語應言樂受中生貪而使衆生問曰是貪亦因色等生此中何故但説因樂受生答曰以憶想分別歡喜等故貪生非但從色等生疏釋云於中凡五番問答破緣縛相應縛就中有二初三番問答破緣縛後二番問答破相應縛數人義緣使者欲界貪緣縛五陰為欲界法相應使者貪起時二十一心數並起縛二十一心數不相離故名相應使故彼言使者使縛為義緣縛相應縛俱縛法不縛衆生故狹意今論主對破數義故言然明使義有二解一云境界喻國主貪等煩惱喻使人也衆生喻所使民也二解今所習貪等煩惱喻國主能使故名使衆生喻所使故涅槃經言煩惱喻鄉主衆生喻僮僕也因境界生前三心故云因法生衆生心也隨前三心則受三受故云隨衆心則受也隨三受生三煩惱故云隨諸受貪等煩惱使也又非衆生數下第二非衆生數亦應有使為然汝言貪緣縛一切法則非衆生數被使縛既被使縛故非衆生數有使也若所緣有使者人識壁則應有識而實不爾準之可悉疏大乘人云等者此下第三明大乘執言二種生死等者述義引大經第二十九卷云佛告師子吼菩薩解脫二種一者子斷二者斷子斷者名斷煩惱阿羅漢等已斷煩惱是故子結不能繫縛未斷果故名果繫縛準之可悉未詳執文言復有二障之説等者案曉法師二障義云言二障者一煩惱障亦名惑障二所知障亦名知障惑有異門名煩惱礙及與智礙煩惱障者貪嗔等惑煩勞為性遍起現行惱亂身心故名煩惱此是當體從初立名又復能感界內煩惱悶之報逼惱有情令離寂靜故名煩惱是為因中説果名也障以遮心為義亦用覆蔽為功遮止有情不出生死覆蔽理性不顯涅槃由是二義故名為障此從用而受名也所知障者盡所有性如所有性二所知所照故名所知法執等惑遮止智性不成現觀覆蔽境界不現觀心由是義故名所知障此從所蔽及用得名然人執等惑亦有障於少分境智而未遮於無上苦提亦不蔽於一切種境雖已斷此不得彼故是故不立所知障名法執等惑亦有少分感生死義而不蔽於二乘涅槃亦不止於分段生死雖不斷此而證離故不受煩惱障名與奪之意義在此乎或知之名如常所説廣説如彼準之可悉疏所言解者毗曇之人等者此下第明解字案攝論章第二卷凡夫伏惑義云依薩婆多凡夫離欲見修雙斷以不作四諦部別觀故修慧總相厭下欣上見修俱斷若依成實見修雙伏凡夫不見空不能雙斷以俱厭故見修雙伏今依大乘凡夫之人不作諦觀是故見惑一向不伏六行礙智厭下欣上事境界故但伏修惑六識貪嗔及與貪嗔鄰近憍慢此三煩惱相應無明反相應修惑廣明如彼準之可悉疏問毗曇何故明凡夫斷惑等者此下第二間答顯斷惑差別凡有三番問答此初問答言以毗曇有見得道等者案毗曇章第二卷障義云若依小乘論凡夫斷惑者未見四諦但可總觀有漏作世俗六行如斷欲界乃用色界未來禪心下觀欲界作苦行麁行障行為無礙道觀上初禪作滅行正行妙行為解脫道乃至斷無所有處欲用非想邊下觀無處有處作苦等三行為無礙道觀上非想作滅等行為解脫道非想一地凡夫不斷以凡夫斷惑不過三界故如闍樓蟲喻此是凡夫乃至廣説言成實見空等者案大義記第五卷四果義中云數有超果謂凡夫未嘗斷結入佛法見諦即十五心為初向第十六心為初果若曾斷欲界六品即十五心為第二向第十六心為第二果若曾斷九品十五心為第三向第十六心為第三果凡夫不能斷非想結故無超證第四果也論明凡夫不能斷結悉以次第證果但有出觀不出觀異耳又二聖行義云見諦之外諸結具在理皆未見若但觀苦不觀空即通厭不成我心不伏不見真理若但觀空不觀苦則無緣折境空觀不成諸結不伏是以遍觀諸理通厭衆結故惑伏解成即見真理而思惟資見諦苦等能通厭我慢以能通厭故所以用伏結無復方便空空無伏義又第十三卷見思義云問曰外道修禪伏結非觀理除正應如懺何義同斷下下除上上耶答曰修禪知見同斷習因故從麁次第乃至廣説準之可悉第二問答中言喻如雖脫鐵鎖等者三十九字缺第三問答中言如大品云等者案彼經第七卷末須菩提言五陰等一切法無縛無脫無所有故是名菩薩無縛無脫大莊嚴今略引之言涅槃云等者案彼經第三十一卷中師子吼菩薩言世尊如經中説若毗婆舍那能破煩惱何故復修奢摩他耶佛言毗婆舍那破煩惱者是義不然有智慧峙即無煩惱有煩惱時即無智慧譬如明時無暗暗時無明若言智慧能破煩惱為到故不到故破若不到破者凡夫衆生即應能破若到故破者初念應破若初念不後亦不破若初到便破是即不到云何能破復次毗婆舍那破煩惱者為獨能破為伴故破若獨能破菩薩何故修八正道若伴故破即獨不能破若獨不能伴亦不能如一盲人不能見色雖伴衆盲亦不能見今取意略引之疏主釋云明修道斷惑第一師子吼難若直者難意似如云毗婆舍那能破煩惱者只毗婆舍那破是足復不須修奢摩陀耶今望答意即不然正是破其智慧能破煩惱毗婆舍那即是智慧人皆言智慧是能破煩惱是所破見有能破所破故師子吼接此意問如來破斥也佛言下第二答答中十段破此見今前作有無不並破前牒總非何以故破有智慧時無煩惱有煩惱時無智慧智慧煩惱終不得並故不得有破次譬説破若言智慧能破煩惱為到故破下復是一門若不到破凡夫應破者論中亦有此破今且並見諦之解不觀見諦惑能破見諦惑思惟之解不見思惟惑應破思惟惑今經中破云凡夫衆生即應能破者本言智慧不到故破今何得以衆生為難今明此同取無智慧到惑邊為難凡夫亦無智慧到惑邊聖人亦爾故凡夫應能破也若到破初念應破者明若到破者初念則到則不應須復念古來有河園隆法師用實法斷惑復三大法師並不用明實法一念與惑俱滅何能破惑但假名破惑假名相續道中斷而復著後破初不能復亦不破若初到使破是則不到初念使破惑者即是不與惑並若然終不到惑也具如涅槃疏第十七卷也述義解云毗婆舍那此翻為觀謂二乘之人智二乘人見苦空無常無我之理故名觀也又大經同卷云善男子慧有二種一者世間一者出世間復有三種一者般若二者毗婆舍那三者闍那般若者名一切衆生毗婆舍那者一切聖人闍那者諸佛菩薩又般若者名為別相毗婆舍那者名為總相闍那者名為破相此有二解一者無淺深中作淺深説何者翻般若無定或翻為慧或翻智慧以慧翻時配於衆生如一切衆生皆有慧數即通大地之中慧數也毗婆舍那此云見即觀之異名也明見理故配於二乘闍那此云智通達決了故配諸佛菩薩二者就總別疏此品近生等者此下第二明近來由案琳疏云生死羇繫目之為縛涅槃無纍稱之為解又煩惱纒束以之為縛智慧免羇號之為解今明此二世諦故有據理則空故云觀縛解品準之可悉疏品開為二等者言大品云等者案彼經第二十六卷云復次須菩提菩薩摩訶薩行六度時當作是念雖生死長衆生性多爾時應如是正憶念生死邊如虛空衆生性邊亦如虛空是中實無生死往來亦無解脫者大論釋曰生死無邊如虛空衆生性無邊亦如虛空以是事故生退沒心佛教是菩薩正憶念生死雖長是事皆空如虛空如夢中所見非實長遠不應生厭心衆生雖多亦無定實衆生度亦不難今略引之言正憶念者述義解云大論中明六種法師功德謂受持讀誦書寫解脫正憶念今謂不爾準經可悉疏問云生死非都無根本等者言楞伽等者案入楞伽經第二卷佛告大慧菩薩言彼諸外道墮於二見不知唯心妄想分別增長自心界如身資生器世間等唯是心分別不得分別菟角離於有無不得分別一切諸法離於有無又第三卷云大慧應當善觀二無我相何者人無我智謂離我我所陰界入聚故何者法無我智謂如實分別陰界入相依不實相分別得名愚癡凡夫妄想分別以為有故非證實者見以為有今取意略引之疏答曰下第二正作常無常破等者言然往來之本等者案琳疏云諸行往來者行是五陰往來即轉也往來之本不出人法此二若實要隨斷常之則天人居在定作何有往來斷則六道各盡一形誰復往來準之可悉言莎提比丘等者成實論第一卷立論品末有此人計今略引之引文如上總法師疏解云莎提執義生死中無我若心非常誰修因得果故知生死心常準之可悉疏問曰經説有涅槃下生第二章次破解本等者言解本者案碩疏云言解根者涅槃名解脫由滅五陰與衆生方得涅槃諸五陰五陰與衆生為解脫根本準之可悉言華嚴云等者案六十經第十五卷十回向品第五回向中云菩薩不著意業及業果報不壞因果不取有法不壞有法生死非雜亂涅槃非寂靜今略引之法藏師疏第七卷釋云就第五無量功德藏回向中菩薩摩訶薩下明入實成離妄益有十對初對離能回之妄次不妄耶佛等三對明離所向之妄次不取業等二對明離回向業果初對離總報業果後對離不報業果上來離有次不壞等明離無以即空而不礙存故是故不壞又性自即真故不待壞也次不取有等明有無雙離以不取有是遣有執不壞有是遣無執次生死非離等明離背向相以法離生死相故非雜亂亦離涅槃相故非寂靜今謂文意只如此然古德有多釋遠法師云泛釋有二一就破相解生死體空故非雜亂涅槃亦如故非寂靜二寂用解生死體寂故非雜亂何者是體近説空是深説則不空如來藏是大般涅槃能建大義妙用繁興無所不為故非寂靜然依後義此二佛境佛所行道名境界道生死涅槃法無定相故曰無法諸聖同依故名同止術法師云以緣就實生死非雜亂以實從緣涅槃非寂靜準之可悉疏若可縛前縛下第二偈次破他縛等者言涅槃經云等案彼經第二十九卷中佛告師子孔菩薩言如説名色繫縛衆生名色若滅即無衆生離名色已無別衆生離衆生已無別名色亦名名色繫縛衆生亦名衆生繫縛名色今色今取意略引之疏主釋云此中文則破莊嚴假有別體義也有煩惱故名繫縛無煩惱故名解脫法寶師解云此辨縛體也名色之與衆生更無別體故説相縛則説與煩惱離合此説全體有無即是果縛也述義云名者四陰四陰微細非眼識境故色者色陰也言智度論亦云等者案彼論第十二卷檀婆羅蜜之餘云復次是名色用和合假名為人為諸結所繫縛得無漏智慧抓解此諸結是時名人得解脫如繩結繩解繩即是結結無異法世界中説繩解繩名色亦如是名色二法和合假名為人是結使與名色不異但名為名結名色解受罪福亦如是雖無一法為人空名色故受罪福果而人得名譬如車載物一一推之畢無車實然車受戴物之名人受罪福亦如是名色受罪福而人受其名受苦樂亦如是今取意略引之慧影師解云下復破假我四陰名名色陰名色但有名色和合強呼為人何家有人如薩波車多名為蛇蓋低羅波夷名為食油等義但強呼之涅槃無名強名涅槃人亦如是但有名色強喚為人實無人也假人尚無況有神人言有繫縛者其義亦然實無有人何所繫縛爾時但有名色二法此之二法有煩惱時説為繫縛若得無漏慧解時斷此煩惱名得解脫以此斷用名智慧抓解諸結也如繩結時亦是繩繩解時亦是繩更無異繩名色亦爾有煩惱時名名色縛無煩惱時名名色解亦是名色無異名色別有衆生有縛解也故大本中問云若言名色繫縛衆生衆生繫縛名色者諸阿羅漢名色應有繫縛佛答言斷有二種一者子斷二果斷準之可悉疏長行云若離五陰前有衆生等者言問毗曇人云等者述義解云彼宗云但行陰起煩惱餘三心怯弱不能起煩惱也言答云等者述義解云清淨五陰者不起染者之心故名清淨也又陰垢時者能起染心故名垢也疏復次亦無有解第二次破解等者言如有為解脫等者述義解云就小乘言前三果是有為解脫羅漢是無為解脫就大乘言金剛以還是有為解脫金剛道後是無為解脫準之可悉言如計我見等者案法華疏第六卷末云三計我見人即是外道謂保執有我不信寂滅準之可悉而言我見者於五取陰隨觀為我或為我所也有人解云隨於所立故云我見亦云身疏主釋云五陰名身於中起見名為身見有人解云以隨所迷故云身見以不知五陰合假故準可悉大義記第十三卷十使義云因疑起見決定盡境相謂之見義然五見有通別言身見通別者論云五陰名身於中起見名為身見見皆從陰起悉應名身見但衆生執陰用以當我故計我名身見是以此見兩稱謂身見我見受身名餘見不立也述義解云道壞障方有萬德圓滿曰方便淨涅槃二就本始其體涅槃出於三世非先有染後時顯淨故曰性淨如佛果中修生功德斷結無為本無而今除障𭒉淨曰方便淨三就體用如來功德總分為二一自在德金剛道後證報佛時塵沙功德生現成就一起無盡常恆寂靜故曰性淨二現前德後時隨宜正起作用遂緣現前用用恆寂方便乃至廣説準之可悉疏問曰下第二破無為解脫等者言如言本有涅槃等者案淨名玄第四卷正二道門中云地論人真修般若則本自有之緣修般若則修習始起性淨涅槃方便淨涅槃亦爾述義解云言真修者亦言真照般若非境非智智即佛性佛性即空以自性清淨心為體言緣修者亦言緣修般若境智冥會轉無常作常等證實已緣名為性淨方便修生方便修顯為方便淨故十地經云淨相解脫遠離諸趣名方便淨自體本空自性常寂非先有染後時離者説為性淨準之可悉今案十地論第二卷云彼智已顯方便壞涅槃復示性淨涅槃乃至廣説菀法師疏解云彼智者彼前微智顯方便壞示性淨者不同相涅槃從其方便壞障而得名方便壞也同相涅槃者體性清淨故曰性淨準此論文今言方便淨者方便壞涅槃即不同涅槃相也性淨者同相涅槃也述義解云性淨即名同相謂寂滅無相之理滅以方便淨名不同相謂有餘無餘之而滅何者一切衆生本有理滅平等不異名曰同相已今當證各別非一名不同相又體涅槃一味而無能所知相猶如虛空名為同相證用心行差別衆多為不同相而言性淨方便淨者有通別義就通義言以體涅槃名為性淨以用涅槃為方便淨就別義言即有三解一就隱顯謂無二智在道前時雖為惑隱而其自性湛然清淨故名性淨此即性淨一切衆生有而未要須方便修德除障顯證得故曰方便淨何者法身之體與煩惱染如白寶在泥中恆有不染義曰本來清淨涅槃雖不染而有疏答曰下正破無為涅槃等者言南方云等者案淨名玄第四云有人言修空無相會理圓通心意識滅煩惱清淨此無為般若則是實相若有心行境未免生死則菩薩六度得十地差別名有為般若此南方尚禪師義碩法師云明慶寺尚禪師用即空是佛也準之可悉言攝論師云般若是正體智是無為等者言涅槃云等者案彼經第三卷佛告迦葉菩薩言如求是常不變易法此常法稱要是如來非是餘法迦葉應當如是知如來身今略引之疏主釋云下第四結明內法是常外法無常酬其問彼前問云佛亦説常外道亦説常何異者今外道説此是虛妄謬説也迦葉應當下正結常宗也法寶師解云此常法稱下結使彼常名唯在佛非餘也言智度論云等者案彼論第十一卷檀度中有人言從初發意乃至道樹下於其中間所有智慧是名般若波羅蜜成佛時轉名薩婆若影疏解云第四解從初發心至金剛不問有漏無漏智慧皆名般若也淨名玄第五卷云大品以般若為因薩婆若為果因果更無有二般若之因變名薩婆多果如什公云薩婆若則老般若也述義解云梵語薩婆若或云薩云若或薩藝然皆訛也正言薩伐若此云一切智然論第十九卷云是般若在佛心中變名為一切種智此以二智體同故言爾名一切智是正義也佛智照盡二諦之境故為一切菩薩隨分雖照未盡故唯為慧今案玄第五攝智門云一切智為空智一切種智為有智又云一切種智為空智一切智為有智以種種性則實相理為諸法根本故名為種一切智智一切法為有智準之可悉今言變者猶轉之異名也言入無餘時無此二受等者案琳疏云外云捨此二受法得涅槃以之為解故言不受諸法也今明受因不受而生不受因受而起但知受體自無豈有不受也若見不受異於受而受於無受者當知未免於受故云還為受所縛也準之可悉觀業品第十七疏此品為五人故來等者約此品由來大文有二第一明來由第二問答以辨品目初中有二第一明為人故來第二明通別此文初也案淨名玄初卷云如龍樹所引犢子計有我有法名為有見方廣執無我無法名為空見薩婆多謂無我有法即是亦有亦無訶梨云世諦有我有法故非無真諦無我無法故非有準此文意今言有我部等者犢子部無我部等者薩婆多部第三是成實義第五中言如云初地等者案述義引大經第二十七卷末云佛告師子孔菩薩言成就十法雖見佛性而不明了一者多欲二者知足三寂靜四者精進五者正念六者正定七者正慧八者解脫九者讃歎解脫十者為大涅槃教化衆生乃至慧眼見故不得明了佛眼見故故得明了今取意略引之解云言初地猶有法我者就法執有俱生分別就我執亦同之也分別法我二執麁故易斷初見道時即能略滅生俱法我二執細故難斷後修道時方能除滅故云初地有法我執有法我執者就法執也計陰為寶名為法執我者自體義也今案經文凡有六番問答中第四番云爾時師子吼菩薩言世尊若一切衆生悉有佛性如金剛力士者以何義故一切衆生不能得見佛言善男子譬如色法雖有青黃赤白之異長短質像盲者不見雖復不見亦不得言無何以故盲雖不見有目見故佛性亦爾一切衆生雖不能見十住菩薩見少分故如來全見十住菩薩所見佛性如夜見色如來所見如晝見色十住菩薩十分之中得見一分諸佛世尊見於佛性如觀掌中阿摩勒果乃至佛性者一切衆生悉有三種破煩惱故無後得見疏主釋云三種破煩惱者即是見諦道思惟道無學道三次云方便道無礙道解脫道為三招提云六地以來斷正使七地斷習氣八地斷無知斷煩惱不出此三準之可悉言亦言住十住等者案同卷第六番問答中云善男子如汝所問十住菩薩以何眼故雖見佛性而不明了諸佛世尊以何眼故見於佛性而得明了善男子慧眼見故不得明了佛眼見故故得明了為菩提行故則不了了若無行故則得了了住十住故雖見不了不住不去故得了了乃至廣説今略引之疏主釋云今言慧眼不了了佛眼見了了者此就因果判在因名二慧在果名二智因名二智果名二身因是慧眼果名智眼因中則晦果地則明因中晦故見則不了了果地則明故見則了了準之可悉疏又此品來意有通有別等者此下第二約通別以明來由文中有二第一約通明之第二約別辨之初中有二第一以四復次明來由第二明為邪見外道等亂此品初中有四今此初文也言故下偈云等者案此品下偈文云雖空而不斷雖有亦不常業果報不失是名佛所説今略引上半偈文碩法師解云此偈明隨情説世諦不斷不常一偈為三意今上半明世諦假名業行不斷不常以破斷常二見雖空不斷者正破其斷病其謂諸法若空便無業果是故今明雖畢竟空非是斷也雖有不常者其謂既不是斷便應是常故復明雖説是有而非是常此宣彈破其斷常二見問既言其空何故不斷既言其有何故不常耶答空是有空故雖空不斷有是空有故雖有不常也又雖是不空不住之辭空不住空故空不斷有不住有故有不常也業果報不矢此一句是第二意彈外人執汝自貪著顛倒言業果不失是有耳實相之道何曾有汝所見耶是名佛所説此一句第三意引佛説為證親以佛説業行不常不斷畢竟空非我強作此難相破故結云是佛説也言長行釋云等者釋此偈長行云此説義離於斷常何以故業畢竟空寂滅相自性離有何法可斷何法可悉失顛倒因緣故往來生死亦不常何以故若法從顛倒起則是虛妄無實無實故非常復次貪著顛倒不知實相故言業不失此是佛所説今略引之碩法師解云長行釋偈還為三意今初釋上半偈前解雖空不斷義恣外人謂有此業但空空之使成斷滅為此明業本來畢竟空復有何法可滅之爾斷耶顛倒因緣故下釋雖有不常畢竟空但於倒者為有顛倒有何所有故非常也復次貪著下斷偈第二意引佛説為證準之可悉疏二者諸大乘經等者此下第二復次言如涅槃師子吼云等者案彼經第二十一卷師子吼品佛告師子孔菩薩言善男子一切業有輕有重輕重二業復各有二一者決定二者不定或有重業可得作輕或有輕業可得作重非一切人唯有愚智是故當知非一切業悉定得果雖不定得果亦非不得善男子一切衆生凡有二種一者智人二者愚癡有智之人以智慧力能令地獄極重之人業現世輕受愚癡之人現世輕業地獄重受乃至智者善根深固難動是故能令重業為輕愚癡之人不善深厚能令輕業而作重業以是義故一切諸業不名決定今取意略引之疏主釋云若小教輕業得輕報重業得重報亦大乘教或有重業輕受業重受等無定二乘不知也法寶師解云善男子至二者不定者明所作之業輕重不同定不定異輕重不同由心不等定不定異由治有無或有重業至可得作重者此明輕重二業皆可輕也非一切人至亦非不得者示正義也定與不定由愚智故善男子至地獄重受者明愚智二人轉業相也智者善根至不名決定者明不定相也由智故輕重令輕由愚故轉輕成重輕重隨緣故成不定也義解云愚人即以輕為重者謂有造五逆人欲懺悔滅此罪即有斷常過故名以輕為重懺悔欲斷此罪為斷謂實有罪為常如小鐵丸沈於水也無而成有者有淨行人謂我持戒他不持戒而發取捨斷常之心此是戒取所攝故云爾也智者能轉重為輕者雖作重罪觀空滅之如大鐵鉢浮於水也謂造殺生必具衆緣緣所生故即殺無性若無自何得言殺故無造者無受報者但可墮地獄業者暫痛頭腹等止耳轉有令無者所有逆罪以觀空力令無有也衆記亦同準之可悉言普賢觀云等者案彼經佛説偈末云一切業障海皆從妄想生若欲懺悔者端坐思實想衆罪如霜露慧日能消除今略引之述義解云端坐者端猶正也準之可悉疏三者內外大小雖立諸業義並不成等者此下第三復次言如須跋陀羅等者案大經第三十卷末梵志須跋陀羅言一切衆生受苦樂報皆由往日本業因緣何以故我見衆坐習行諸惡多饒財寶身得自在又見修善貧窮多之不得自在今略引之疏主釋云彼義明一切衆生苦樂果報皆由往業此義參於佛法則難分別而今異者彼一向全由往業失於現在因緣故為邪義此中文意正迷悟多本苦樂之報由往業往業作此苦事故現在得苦果此即是迷今欲盡於苦果者現在終苦行受苦亦盡自然得解脫此即是悟本故舉為問也述義解云此所計與佛法有同義何者命根是衆坐正果報由過去業得故同梵志言衆生果報皆由往業五根者別報不由過去業得故此義異也言尼乾子云等者案注淨名經弟子品須菩提章羅什解曰其人起見謂罪福苦樂盡由前世要當必償今雖行道不能中斷準之可悉又大經第三十卷初納衣梵志言衆生善身及不善身獲得解脫皆是自性不從因緣述義解云此依尼乾子宗如此言也由不善業所得惡報以修道因緣而不斷此計與佛法亦有同異義何者定業不可免故羅漢果人猶以宿業受惡報苦此同義也不定業可轉滅是異義也言下偈云等者此品下此偈所引全同碩法師解云此明世諦第一義不生不滅故論初云深求不常不斷即入無生無滅義所以知此偈明第一義諦者長行釋云第一義中諸業不生以此為證也上半明不生下半明不滅以為屬因緣無自性故本來不生本因性故本既不生則今亦無滅準之可悉疏四者又為一切有所得等者此下第四復次文中有二明為有所得説此品次明為外道小乘説此品初中有二初直明來由後問答釋顯此文初也言故淨名呵優婆離等者案淨名經弟子品優婆離章云優婆離白佛昔二比丘犯律行以為耻來問我言願解疑悔得免斯咎我即為其如法解説時維摩詰來謂我言唯優婆離無重增此二比丘罪當直除滅勿擾其心所以者何彼罪性不在內不在外不在中間疏主釋云不堪為三初明被呵之由次述能呵之旨後明時衆得答初文有二初明比丘犯罪事別出經有二比丘林間修道一比丘疲勞仰臥眠熟忽有女人以女形置一比丘而比丘不淨流出眠覺始覺而向同伴述之彼比丘云伺求而彼女忽來比丘便往逐之女人怖走遂墮坑死故云犯律行也第二明彼離依律篇聚定罪輕重未得為其説詳過之法故云如法解説也次時維摩詰下第二明能呵之旨文中有二初明彼離錯教比丘見有身心對著也復言有罪可起心生疑悔而欲滅之二對著也而彼離定其罪相則對著彌厚對著彌厚則罪轉增三著也今前誡之故云無重增此二比丘罪也當除置滅下第二明淨名善治有三此初標也彼離有失一者不説實相於理成迂二不應大機於緣而曲今對此二事還明兩法一説實相稱乎理實名直除滅二應大機故不擾其心也所以者何下第二釋善治有四門此初罪空夫罪之生由因緣有求其實性不在三受不在三受則見罪空以見罪空便悟理實悟理實則發生正觀正觀既生則煩惱斯滅煩惱尚滅罪豈存哉不在內者不在我心也若在我心不應待外緣也不在外者不在他身也若在於他不應由我起也不在兩間者合自他求罪爾得也又識為內塵為外根為兩間而罪不在三處又罪因為內罪緣為外內外兩間也今略引之述義解云佛在世時有二比丘山中坐禪一女人來犯眠比丘比丘驚悟而追去之其女墮穴而死比丘悔犯二波羅夷將欲懺悔而懷耻悔之心不敢問優婆離優婆離依五篇七聚之法判也淨名呵云汝欲懺悔滅罪故是斷見欲成懺悔解故是常見何於二罪增斷常二見但以正觀可懺悔也疏問如此人有何過耶等者此下第二問答釋顯凡有二番問答言答因緣品緣緣章長行云實法可信隨宜所説不可為實今取意略引之琳法師解云如為真實究竟之談理宜可信隨宜之教對機而已不可為實故云二實法等也準之可悉疏又説此品者為邪見外道等者此下第二明為空見外道小乘説此品言如六師等言等者案大經第十八卷云月稱大臣白言今有大醫名富蘭那一切智見得自在定畢竟修集清淨梵行常為無量無邊衆生演説無上涅槃之道為諸弟子説如是法無有黑業無黑業報無有白業無白業報無黑白業無黑白業報無有上業及以下業今取意略引之即是六師之中第一師計也肇法師注淨名云姓迦果字富蘭那其人起邪見謂一切法滅斷性空無君臣父子忠孝之道什注云其人起邪見謂一切法無所有如虛空不生滅也而言黑業等者經文自釋云諸不善業一向名黑染汚性故果報亦黑不可意故二界善名白不雜惡故果報亦白是可意故欲界人天善名亦黑亦白作業時雜果報亦雜故諸無漏業名為不黑不染汚故亦名不白以不受三界善報故具名如上準之可悉言故下偈云等者案此品末破現見事凡有三偈舉喻次偈合喻後偈合也今此略引初偈文碩法師解云此中所以舉佛神通變化者餘人神通但能化作一化人不能復更作化人及化作餘事若佛能重化佛化作一化人此化人復能作變化轉覺重虛不實故舉化佛不舉餘人神通變化又為餘人作化化主滅後不能留化佛在後化物唯能爾餘人化作者化主語化人便默化人語時化主便默佛化則化主與所化人俱語俱默然此中欲顯煩惱業果及作者皆如幻化非有準此可悉述義解云世尊謂衆緣所生罪福等業神通謂方便業雖而示因果如所現奇特事故復變化等者由善惡之業所得果報也疏次近生者縛解品明無縛解等者此下第二明近來由言又業有二種等者疏主釋云煩惱是漏善惡之業從於漏生與漏相隨名有漏業三乘聖人無漏之解名無漏業疏問業有幾種等者此下第二大段問答以顯品目凡有三番初番明業數次番明業體後番明煩惱與業差別此文初也言約身即有身口意者案琳疏云成論人明三業並以心為體身口但是業具而非業也開善師解云所受七尺當分有體者身也唇舌牙齒能吐言辭者口也神慮之法能思慮者意也業名造義動此三所造故云三業也言就界有罪福不動者琳法師解云罪業是三途繫福業是欲界人天繫無動業是色無色界繫無漏業是三界不繫也聰法師云感三途報業名為苦報業感從人至第三禪報業名為樂報業感第四禪至無色界報業名為不苦不樂報業亦名不動業第四禪以上三災所不動感不動報故名為不動業議曰約善業有定散初師約散善故云欲界人天為善業上二界為不動業後師約定散合論故云第四禪以上為不動業開合不同故不相違也言就報即有現生後者開善師云今身起而未滅名為現在更受第二身是復生曰生報又捨第二身雖得第三身避第二之生名實次於生後故從第三至無量身悉名後也若今身起業即今身受名現報業今身造業第二身受名生報業今身起第三身受謂後報業也酬應是報義造作曰業體者謂利疾心於佛衆聖及父母境起善惡業即受現報若於此境起善惡心不利而重即得生報若業亦利亦重即得後報也現報惡業者如溺人變九色鹿也現報善業者如救蟻沙彌也生報惡業者如五逆業也生報善業者如不顧蟲氷比丘也後報惡業者如謗般若生生墮地獄也後報善業者如轉輪王及菩薩也乃至廣説言約垢淨即有黑白雜等者成論第八卷四業品云黑黑報業者隨以何業生苦惱處如阿鼻地獄及餘苦惱無善報處若畜生餓鬼中少分與此相違名第二業隨以何業生無苦惱處如上二界及欲界人天少分黑白雜名第三業隨以何業生苦惱不苦惱處若地獄畜生餓鬼人天少分第四業名無漏能盡三有聰法師解云黑者穢惡為義而云黑黑者有三者惡業是二世所呵何者今世作因時諸佛一切聖人所呵後世受報時閻羅王所呵此約因言二者二世苦惱何者今世作因時極因苦後受極重苦約果言三者因果俱黑故云黑黑業若作此業者生全苦無樂捨處即如地獄等謂三途中全苦無樂也何故造此業者生全苦處以有四事故一者惡心不絶相助故二者邪見心所作業故三者起於重境惡故四者損他劇故言白白業者生全樂無苦處業故云自業所言白者淨妙為義而云白白者準上可思造此業者生全樂無苦處如欲界人天等此處亦有苦然今從多故云爾何故造此業者生全樂以有四義故一者善心恆相接故二者正見所作善故三者起於重境善業故四者慈悲利益多衆生善業故云雜業者生苦樂雜受處業如小地獄畜生餓鬼少分及欲界人天少分此有三解一解云此雜業明生受二業人天中樂有生受二業苦者受業報三途中苦有生受業報樂者受報業二業也又以十七無漏業斷黑白雜業故名非白非黑何者見道中有四謂四諦法忍此四法忍相應為無漏業斷三途黑業修道中有九斷欲界修惑有九無礙九解脫此中八無礙斷三途黑業以第九無無礙斷雜業或以四無漏業斷白業就色界四禪各有九無礙九解脫即取初禪乃至四禪第九無礙為無漏業就無色界四空準之成論者上二界皆為白業故薩婆多義色界為白業以無色界無身口故業不顯故不為業也然身在欲界具造三業在色界中但造白業也此生修善業即得報如末利夫人及未熊折臂人等其類非一此為現報以第二所得為生報以第三生以後所得為後報也疏問云何為業體等者此下第二番問答也言毗曇取善惡色聲為身口業體等者案雜心論第三卷業品云是業相今當説身業當知二謂作及無作口業亦如是意業當知思長行釋云身業二種作性及無作性作者身動身方便身作無作者身動滅已與餘識俱彼性隨生如善受戒穢行無記心現在前善戒隨生如惡戒人惡無記心現在前惡戒隨生意業當知思者意業是思自性疏解云業者謂身口意五形積聚名自自有造作名曰身業人五面門稱之為口藉口表宣名曰口業心識思量名意差別業故稱意業業雖有三得名有二身口二業從所依得名意之一業以相應受稱故婆沙云相應得名意業或説得名有三所以者何口業有二名若言語業即當體立名以語即業故若言口業者以所依立稱以口非業故業體性者部別有三説則四部別三者一僧祇部唯心心數法是善惡業非身口色法故婆沙解報曰云僧祇説曰唯心數法能感報非餘二譬喻就中有一説云唯思是業餘非是業故婆沙云唯思是報因受是報果二説唯意是業非身口也此之説意明身口作業之具故説身業然身口是無記故非業體若依薩婆多部及此論宗身口二業以色為體意業思為性身作可見有對口作不可見有對無作俱不可見無對然此偈明五業何業五身業有作無作口業有作無作意業非作無作以思為性偈中初二句明身業第三句明口業第四句明意業碩法師解云數人身口即是業身業以色為體口業以聲為體也不以意為意業意是心王心王邊同時思數為意業體準之可悉述義解云思即識之思量也不為思量時但意耳非是業也為思量時名業如此心王心數同時共起而俱思量故云以思為意業體也言成實云等者案彼論第七卷集諦聚業相品第九十五言業有三種身業口業意業身業者身所作名身業是業三種奪命等不善起仰禮拜等善斷草無記又云身能作業之具身於餘處生時所集罪福名為業是故身非業也又云隨心力故身餘處生時能集業是故集名為業善不善非直是身口業亦爾非直音聲語言以心力隨音聲語言所集善惡是名口業意業亦如是若決定心我殺是衆生爾時集罪福亦如是或意即意業或從意生業若決定意殺衆生是不善意亦是意業是業能集罪勝身口業若未決定心是意即與業異也大義記第十二卷三業義云三業者身口意業也所稟七尺當分有體者身也唇舌牙齒能吐音辭者口也神慮之法能思慮者意也業名造作義動此三所造故云三業也檢此三名有其通別其口意二法唯別無通身有通別通者五陰之體都有身名也別者唯七尺形段色陰為身也然則三各論名體業義有離合離者謂現有起作動此到彼唯身口是業意無也若體是善惡能造業報唯意是業身口非也其義伊邪以身口是色有方處法故現有起作從此到彼意非形方故無此彼造也然意是法本於理有乖會故意有善惡能造來果身口色可割截性非善惡故無能造業報之功乃至廣説準此記文今以動身口之心為善惡招報業體色教終歸非善惡故云三業以心為體等也述義云問意與心何異故名以心為體答積聚義為心思量義為意也準之可悉疏問意地三煩惱等者此下第三番問答言毗曇三煩惱起等者案雜心論第四卷業品二云問幾不善業道一時與思俱轉答不善業道起一與思俱轉二三乃至八當知次第增長行釋曰此身自性三不善業道彼一一與思俱轉謂殺生偷盜邪淫乃至如是八不善業道與思俱轉疏解云此偈明不善業道與思俱多少此問意思但取身口意思及起者但令身口業與思俱在現在則名一時俱轉也一一思俱轉者十不善中一一業成現在前則與思俱轉也述義云意地三煩惱者貪嗔邪見邪見此是愚癡所攝故名貪嗔癡也俱舍論云十業道中後三煩惱是道非業何者先以貪心故欲於善室貪後念起思數思量於室方起作業自餘亦爾故三煩惱但是引道而非業也言成實師破此義立正義等者案成實論第六卷苦諦聚中思品云願求名思意即是思知法句中説惡心所作所説皆受苦果善心亦爾故知意即是思若意非是思何者為意業意業名意行緣中是故思即是意雖總相説意行名思而思多在善不善中説是思有衆多分若人為他衆生求善惡爾時名思若求未得事爾時名求若求後身爾時名願故知一思以種種名説準之可悉言成實者云等者述義解云就一念善有二因一者有報因義二者有習因義報因者近受人天之報故習因者善善相續遠至佛果故言開善云等者案聰法師成實論章第二云義本舊解有漏不善心即業即煩惱報因名業習因為煩惱但約教化衆生分二種異以前輕者為煩惱後重者為業大有二義一者前能生扶能𨳝後所生扶所閏二者重者報因力獨習因義少役樂業輕者報因緣習因義多役屬煩惱準之可悉述義解云不善心亦見煩惱等者未結時為煩惱已結時為業故未結者既以對治道之善可除滅故煩惱而非業未結為殺之心也若招生之義等者唯嗔而止不起心結怨是煩惱又意當起心結怨是為業設一念內有十剎那初九剎那為輕第十剎那為重重者感生故為業輕者不爾故但名煩惱又修惑九品之中初二三等為輕第九為重也言莊嚴光宅云等者案成論同卷云第二小莊嚴師四義不善心大制屬煩惱三義不善心大對屬業若作決定心我殺是衆生爾時集罪福名為意業第四光宅云直起三毒未決有所作但名煩惱因此煩惱作決定心欲有造作是為意業若遂動身口即屬七拔準之可悉述義解云就感果不感果故分決不決十種者十不善也言次建初師云等者述義解云建初者寺名也此寺有二法師同名慧逈但顔色殊一白一黑黑者名烏逈法師白者名白逈法師今此一師舉是烏逈法師義也未詳出處疏長行有四等者言如法句云等者案大經第三十一卷云如法句偈云非空非海中非入山石間無有地方二所脫之不受業準之可悉述義引出曜經云昔有梵志兄弟四人皆得五通自知七日必死共議避死第一兄曰吾入大海上下平等正處中間第二弟曰吾入須彌還令其表無便際限第三弟曰吾在虛空隱形無迹第四弟曰吾隱大帝猥陋衆中各適所議七日皆死佛以天眼見之即説偈言非空非海中非入山石間無有地方處脫之不受死今略引之言故佛十力中業力最深者案大經第三十一卷佛告師子吼菩薩言善男子佛十力中最深善男子有諸衆生於業緣中心輕不信為度彼故作如是説準之可悉法寶師解云善男子至業力最深第二歎力深也將欲答難故先歎深也有諸衆生作如是説者明説意也汝所引經證業定者以有衆生心輕不信業能招感我欲度彼不信心故作如是説其實不定智者修道轉不受故也言釋迦受作九罪等者案西晉天竺居士竺難提所譯大寶積經第一百八卷大乘方便會第三十八之三云善男子我先於説示現衆生十業因緣或是菩薩或是如來於此十中示現方便唯有智者能知是義善男子不應生念謂苦薩當有微細之罪若菩薩成就如是微細不善之法坐於道場成阿耨菩提者無有是處何以故善男子如來成就一切善法斷一切不善法無有生死業報習氣若有遺餘不斷滅者無有是處何況有障礙業障善男子若有衆生謂無業報不信業報為是衆生示現業報因緣如來實無業報我是法王尚受業報況餘衆生而不受耶為彼衆生作如是示現是故如來示現業報乃至善男子如來為一切衆生故而作是方便示現佉違羅刺善男子爾時佉違羅刺刺如來足善男子佛神力故令刺入足何以故如來金剛之身無能壞者善男子昔舍衛城中有二十人皆是最後邊身彼二十人更有怨家二十人各各思惟我當為作親友而至其舍奪其命根不向人説如來爾峙為謂伏是四十人故於大衆中告目連言今此地中出佉違羅刺欲刺吾右足未至足之間即從地出長一肘當出之時目連白佛我今當取此刺擲著他方世界佛告目連非汝所能此佉違羅刺今在此地汝不能拔爾時目連以大神力前拔此刺于時三千大千世界皆大震動一切世界隨刺而舉不能動刺乃至一毛爾時如來以神通力上四天王乃至梵天彼佉違羅刺亦隨佛法還至閻浮提本所坐處刺亦遂還至此地中竪向如來爾時如來即以右手捉佉違羅刺右手安地右腳踰之爾時三千大千世界皆大振動乃至我過去世入大海中持鑽刺人斷其命根以此業緣得如是報又為五百比丘而從耆城藥王索優鉢羅花嗅之令下為未來無福比丘來入城中乞食空鉢而出又為未來諸比丘等示現旃遮婆羅門女以木杵繫腹誹謗如來為化不知解衆生故又示現孫陀利女命根將盡必為他殺唯佛知之為令多衆生生清淨心增益善根如來七日不入舍衛大城又為示現五百馬於先世中已學菩薩乘已曾供養過去諸佛故如來毗蘭若聚落三月之中食馬麥又為示現八千天子於過去世敬聞迦葉比丘説七覺法如來十五日説戒時告長老迦葉我今背痛汝今説七覺之法又為斷見三千天子及好殺者釋種破時如來自言我頭痛又如來能以神力擲此婆羅門置餘世界乃至不能出於罵詈之聲見佛世界生於捨心婆羅隨婆羅門以五百種罵詈佛如來聞已能忍乃至提婆達多放大醉象欲害如來亦於耆闍崛山推下大石俱是如來方便示現非業報罪亘於一卷具説諸緣彼今略録之準之可悉述義引大論第九卷末云問曰若佛神力無量成德魏魏何故受九罪報一者梵志女孫陀利謗五百阿羅漢亦被謗二者旃遮婆羅門女繫木杆作腹謗佛三者提婆造多推山壓佛傷足大指四者迸木刺腳五者毗樓離王興兵殺諸釋子佛時頭痛六者受阿耆達多婆羅門請而食馬麥七者冷風動故背痛八者六年苦行九者入婆羅門聚落乞食不得空鉢而還復有冬至前後八夜寒風破竹索三衣御寒又復患熱阿難在後扇佛答曰佛得道時一切不善法盡斷一切善法皆成就云何今實有不善法報可受但憐愍未來世衆生故現方便受此諸罪言迸木者亦云木鏘亦云丸珠羅應知皆是刺名也別記云方便一乘經云迦多羅一尺二寸也堅木也言仲尼厄於陳蔡者案莊子第二十卷云孔子圍於陳蔡之間七日不火食淡海記云仲尼與十弟子去於陳國説禮義時衆人不受即成蔡蘭處時飢可死之爾時有一人其形被鎧子路走出打即成死大魚此魚食時臣諌曰不義食之孔子曰是時不以助身故云賢聖定業不得脫也又論語第五卷子罕篇子畏於匡曰文王既沒文不在茲乎鄭玄曰匡人誤圍夫子以為陽虎陽虎嘗暴於匡人夫子弟子剋䫑時又與虎俱行後為夫子御至匡匡人相與識剋夫子容貌與虎相似故匡人以兵而圍之準之可悉疏如經説下第三等者言一下品業等者案康疏云然惡有三品上中下上品惡業生地獄中品惡業生畜生下品惡業生餓鬼善亦三品上業生天中業生人下業生阿修羅無動業亦有三業所謂三乘道果唯今疏主以惡為下善為中不動為上開合不同所以不違疏初一業者即一善業等者言於善業中但明慈業等者案碩疏云言一業者謂一慈善業也問何故外人偏明善業耶答慈心最重行慈必得果報故迦葉行慈三昧施者能獲現報故遍行之所以經云慈是佛菩薩之根本也論主既是菩薩必有大慈不應破慈善之業故舉慈業以立義準之可悉言此明慈業之用等者案康疏釋上半云有離合二釋離釋者降伏心謂滅三毒滅三毒者止惡也利益他謂行六度行六度者行善也合釋者降心利他通是一意所謂行善也準此疏意初是當離釋又降伏心等者是當合釋而言行善者行六度行也止惡者滅三毒也即三毒名為惡也言以有慈故等者案康疏釋是名為慈善亦有離合二釋離釋者慈謂降伏心也善謂利他也合釋者此二無別慈與善也琳法師云慈是思中之妙通前心作故舉顯之言今明得果者案康疏云此業能生現在未來果報故名為種明業有如此功能何得言無也準之可悉案般若燈論第十卷觀業品云慈者謂心心即名法亦是種子種子者亦名因為誰因耶謂果之因是何等果謂是未來現在之果云何名心為種子耶謂能起身口業故名為種子準之可悉疏大聖説二業下第二一偈明二業等者而言大聖者案般若燈論第十卷觀業品長行云釋曰云何名大仙聲聞辟支佛諸菩薩等亦名為聖佛於其中最尊上故名為大仙已到一切諸波羅蜜善根彼岸故名為大仙準之可悉疏次以二偈明七業等者言有人言等者案碩疏云但解七業不同今略出兩解一云一者身業二者口業三者作業四者無作業四也善不善中隨取一足前四為五業也從用無作業中亦有善從用惡從用亦隨取一足五成六及意地思業合有七業也第二釋云身業中有作無作二口業中亦有作無作二即為四也善有從用無作惡亦有從用無作此二無作并前四為六及恩合為七業也一往與此文相似此解所用準之可悉言二釋云等者案影疏云又下偈辨本末二相及恩為七此七是曇無德部中一段法數其猶善惡等三黑白等四也要取體相別者為數如身業屬色口業屬聲是名為二作時眼耳無作時心相亦差別故名為四説善不善在欲陰中無記非七數也此四有從作生有從用生作生由內用生由外是名為六罪福同善惡亦非此數思非六所攝善不善等通此七中釋中以作無作善不善用生罪福及思為七亦復可爾但偈中言如此四事小妨不見此經何由可了準之可悉但述義云影師云此青目釋也者此言可誤何者影師從用罪福為六第七名思論文既爾所以謬也今謂不爾準文可見言又釋云等者述義解云如脫衣服施他人等名事在前受者每服施者得福德等名從用善造井橋等亦爾問身口所作即身口業何別取作而為業耶答實爾然以屈申之形有限所對義故取為作業耳今所釋者等者身中作無作口中作無作為四從用中身無作口無位為六第七名思也從用中身中無作者如人運衣與人人若受用時生作無作無作屬於施主作屬前人也從用中口無作者如法師講説學士覆述之時起作無作無作屬本師作屬弟子也從他而生目之為外者謂從用無作也言此句總明身口二業者案碩疏云四業附身口而有故云身業及口業也琳法師云此直彰身口是所依非七數也言別明身口二業等者案碩疏云身作者有舉下屈申等為作如受戒等時擎舉合掌禮拜等名身業善作若揮刀舞刃殺害等名身不善作也如誦習經典稱歎善事等名口業善作若口誦惡言論説非法等名口不善作也言無作者作息已常隨逐生如云睡眠悶等爾時常生也琳法師如身業動轉旋繞恭敬名作作已其福續生任運恆起名無作口業亦爾如歌詠讃歎者彰在口名作作也善業任運常名口無作也言無記雖有作等者述義解云工巧無記等謂不當善惡今案般若燈論第十卷觀業品云云何名無記謂違法非法名為無記無記者有四種業一者報生二者威儀三者工巧四者變化又無記者不記善不善故名為無記又無記者不起善不善果亦名無記準之可悉外業亦有作無作者有人造寺有此寺故他人來敬禮由此本作人得從用無作今來敬禮人得作福是故云有作無作也言身從用者如身運衣與他等者述義解云此有二意一以衣物等施他人時生福名作善此稱入內善二所施衣物等即事在故名事在善此攝入外善問事在善非從用善何攝從用答依事在善生從用善故得攝入也言第七名思即是意業者案碩疏云問思數是業者為獨起故能造作為當有伴共起耶釋云數義思不獨生必與諸心數同時共起但思於諸數中造作用強故名為業如十人共起其中一人於造作義強者偏受其名準之可悉言其猶善惡等者述義云善惡加無記為三也黑黑白白亦白亦黑非白非黑為四如前所明之疏答曰業住至受報下第三論王破等者言薩婆多云現在善惡業等者案琳疏云薩婆多云現在起善惡業入於過去為得所得繫屬行者後若果起此得即斷此只不離斷常起而即謝為斷在過去不滅為常所言得者光法師解云得謂得彼有情數法擇非擇滅也述義解云數人義云善惡之業以得得而得待果起方滅故名得得屬於行人行人行善惡業故此得者就三聚中非色非心聚攝就三性中皆通也謂僧祇曇無德譬喻明等者案琳疏云僧祇等云現在業謝過去體雖是無而有於有義是故得果此亦不免斷常也謝入過去為斷有於有義還復是常準之可悉言次迦葉鞞雙用兩家義等者案成實論第三卷過去業品第三十二初云論者言迦葉鞞道人説未受報業過去世有餘過去無準之可悉案琳疏云次迦葉鞞雙用兩家義彼云現業謝過未得果以來具業常在此同薩婆多隨在常過果起謝業同僧祇斷義也次成實師莊嚴等者述義解去因相應不達背故云若與果報等也言引論文云等者述義解云此成實論文過天所作善業雖受現在報身而存附著現在身心若作惡業受於苦報而不散失亦不妨其苦果如身在欲界修色界諸禪成論中云欲界有電光定而散亂地故定不久如電光也四禪四空八定中第八極定者定力微劣故不得起無漏七定得起無漏故名七依定也所言曾者曇師云曾音嘗也是也又音增人性也言次開善云等者案大義記第十二卷轉業義中云論主即法成就無別得繩又唯成就過去現在不成就未來也其義何耶謂過去遠近無在且促百劫時法以示相貌如百劫之初起一念貪從此一念生後念心善惡無記悉無所在但使後念實由前生如是轉起相續乃至今日故相續道中得云百劫初心言論文云昔起貪心初續至今等者今猶在以起貪心尚在而其間未受報復無相違道得云今心昔起貪貪今猶在即今心能成就昔貪是所成就以昔起貪心來至今今心不異昔得云本貪實有我也而無未來貪相續至現在是故不得云成就未來法乃至廣説準之可悉所言我有者述義云人有生死報身今謂不爾違本文故而云論文云等者無彼記文明言論文準之可悉見也言攝論師云等者述義云問小乘得繩與大乘種子何異答就三聚言得繩是非色非心聚種子是心聚就三性言得繩皆通種子體雖三性而固是無記與本識同故又得繩凡聖所知種子凡聖所不知又得繩若生上地而捨下地種子雖生上地而不捨下地之種子合四異也疏問曰下第二破業相續義等者案康疏云是曇無德部救前義也亦可別是薩婆多部立以雜心論中盛明相續義故亦可是彌沙塞部立亦可通是諸部立何以知之如毗婆沙論第二卷云復有説者相續有三種一者時相續二者生相續三者相似相績或謂無二相續但有似相續若但立一相續即是彌沙塞部立若通立三相續即通是諸部立準之可悉疏是善業業因緣果報者下第二別出十善業能果報等者言智使論云等者案彼論第三十六卷末釋摩訶衍品云問曰尸羅即總一切戒法譬如大海總攝衆流所謂不領須不過中食不杖加衆生等是事十善中不攝何以但説十善答曰乃至十善為舊戒餘律儀為客又次下文云復有二種戒有佛時或有或無十善有佛無佛常有今二復次文取意略引之慧影師解云此中一意復作客舊解引佛出為證客舊之義述義解云輪王出現八萬歲時以十善化之佛未出前有十善故名舊善也一往就釋迦言耳餘善者出世善即布施等也言優婆塞戒經云等者案邁法師圖記云優婆塞戒經六卷沙門曇摩懺亦云曇無懺此云法豐中印度人以北涼沮渠玄始元年歲次壬子至姑藏三年歲次甲寅起譯至十年辛酉焉今案彼經第六卷佛告善皇言如是十事三名為業不名為道身口七事亦業亦道是十善道自作他作自他共作從是而得善惡二果今略引之言智度論云等者案彼論第八卷釋又光末云問曰後三業道非業前七業道亦業云何言十善業道今略引之慧影師疏解云後三業道非業者就七善十惡為語凡論行殺盜淫等事者要須先意地起心方得造作義事猶意地三種通生前七業故言後三是業道也不善既爾義善亦然意地微隱造作義晦故言非業前之七種造作義彰是故名業復能通暢意地三思故言業道也此意地三種思若以名字數者其即在後故言後三若相生次第為論者要須意地起心始能行於七事此三復須在前故成實論云前行後三中後行前七中廣説如彼準之可悉言今須會之等者慧影師云經論一倍翻此義云何師解云經意以身口等非是正業但是業具故名業後三言業者此唯據意地三思不取煩惱及諸業具等也此之三思正能得於來果是故名業是不自通是故非道論意前之七惡亦以意三為根本七善亦以意三為根本今唯以三善根為根本名但取其根本能通生業義故名業道而非業者此但據根本能生七業義為言各取一義故作如此不同也述義解云經正取意等者此就論人為言故意為業耳論人非謂立思為業故非道者由此意更無意起故然貪嗔癡是意業但意不自通故是業而非道者但是意業耳然此意業於起業上更不起業故不名道也七亦業亦道者身口七業亦當體是業亦意業道而有更通暢業義故名道也論云三是道非業者貪嗔癡有二義謂三根義與導義三根義者三毒本無業體能起業故導義者起業體上更起業故雖三毒非業但是起業之根故名是道而非業也言論師明四句等者案大論名教云業道長短應作四句分別一者是業而非道二者是道而非業三者亦業亦道四者非業非道是業非道者如善惡直能起造作名之為業不能自暢不名為道是道非業者思有三善根能暢前思故名為道非是思量作性故名為非業亦業亦道者身口七拔能運動造作故名為量復能通暢前思故名為道但案琳疏云成論師明四句乃至二道而非業如智度論明三煩惱也今案毗曇章第二卷十惡業義中云昔來法師約十業道作四句分別一業而非道謂意思是二道非業謂後三業道三亦業亦道謂前身口七支四非業非道思前三根也準此章文今疏主意唯取意地三思名之為業此之三思正能得於來果是故名業思不自通故云非道故經云如是十事三名為業不名為道身口七事亦業亦道也此即第一句意也第二句意前之七惡亦以意三煩惱為根本今但取捨本能發通生業義故云道而非業等也述義解云二道而非業者能起思故為道然思為業意非為業故名非業此數人義三亦業亦道道者合取意與身口身口當體是業能暢思故名道四非業道等者身口色聲由意而在但是業具非業又身口是業更不通暢但意能通暢故名非道也言毗曇師亦四句等者述義解云毗曇所云思者業也無更有思等者於思處有思而無暢思故非道但思有暢於身口故名道又暢思為道者暢思於身口七支此於身口七支更能起業故名道也思前三不善根者謂未起業貪嗔癡將作業前方便之三煩惱是也若與思共起三毒即是業也未詳其人今案毗曇章第二卷十惡義中云今依此案十業道體唯有兩句前之七業亦業道後之三道而非業故俱舍云貪等三種是業家道故説業道發故意故依彼起故前七亦業亦道能顯本意故彼種類故若對餘門亦有四句一業而非道謂三業門中思業并無記身口是也二道而非業十業道中後三道也三亦業亦道前七業道四非業非道十一色中除色聲無作業取餘根塵等乃至廣説準此章文今云毗曇師者道基師也所言暢者玉篇敕亮反鄭玄曰充也廣雅曰長也達也漢書音義曰通也此亦暢字在日部也言論主答曰等者案大論第八卷問答云答曰少是多故通名業道後三雖非業能起業又復為業故生是故總名業道今略引之疏云以少從多通名業道又此之十種悉各有造作義故名業前七有通暢意三義故云道意三有通生前七義故名道有造作義故名業準之可悉疏所謂不失法如券等者言世人出責等者所言責者玉篇滓革反求也字不當此文作責字才忍切説文會禮也財責也應當是字也有本作債字然篇無此字但作債字此見反假也言故地經云等者案十地論第七卷金剛藏菩薩言諸佛子是菩薩作是念三界虛妄但是一心作論曰一切三界唯心輪故今取意路引之言答真諦三藏出正量部明等者案碩疏云今極十八部記中是正量部義正量是佛滅後三百年中於犢子部中出其人明不失非色非心非是非惡體是無記準此疏文今於此中引真諦三藏所造十八部論記文故云爾也述義解云不失法持善惡業而待果報起故名功用常待善惡之報起方滅故名大期滅如梨耶識持二種生死之種子故名功用常此二種生死種子滅時梨耶自滅名大期滅也案琳疏云此是正量部義其人本是律學佛滅度後三百年中從犢子部出立有不矢法能持善惡二業令果報不失準之可悉言善業如他負財等者案康疏云佛陀提婆部及譬喻成實論俱立成就云人為能成就衆生為所成就得果為成就薩婆多部立有得繩人知財主作善惡業如負財物別有得繩令業得果正量部云人如財主善業如他負己財惡業如已負他財別有不失法持業令業得果如券持債準此疏又初説當正量部義後説當薩婆多義可悉疏此性則無記者第二釋二章門等者言得繩等者光法師云得謂得彼有情數法擇非擇滅也述義解云此之得繩數約三聚者是非色非心聚若三性中皆通也言攝論師梨耶不失是大乘等者案五重遊意云攝大乘論者以九識者六識名毗婆伽識翻為分別事識以六識為本第七名阿陀那識翻為無解識亦名執識以執相煩惱為體第八阿梨耶識翻為無沒識亦本識以無明煩惱為體此上八識就妄用辨體第九阿摩羅識翻為無垢識亦名淨識以清淨真如為體準之可悉言又梨耶體等者案梁攝論第五卷相貌章末云論曰有受相者果報已就善惡種子識釋曰此本識者有善惡種子果報若皆就用種子盡但有本識在説此本識為有受相準之可悉言劵部如薩婆多人亦有四種謂假名衆生如財主等者三十三字缺言無券部者佛陀提婆譬喻成實等但明三種等者案成實論第七卷不相應行品第九十四云得者諸法成就為衆生故有得衆生成就現世五陰名為又過去世善不善業未受果報成就是法如經中説是人成就善法成就不善法準之可悉言今明善惡業自感報等者述義解云言無記不感報者但不感善惡果報而感無記果報也言答婆沙云述義解云不能感生者謂不能感第二生報也言故不作業感報者得繩不作業而感果者也四相亦爾者四相不感果報亦同之言如智度論引集法絶諸羅漢説偈等者案彼論第二卷云復次欲令佛法久住世間故迦葉等諸阿羅漠問阿難佛初何處説法説何等法阿難答如是我聞一時佛在波羅奈國仙人鹿林中為五比丘説是苦聖諦我本不從他聞法中正憶念得眼智明覺此義具如集法經中説乃至諸阿羅漢已過度老病死汝心念説七言偈言已度凡夫恩愛河老病死券已裂破見身篋中四大蛇今入無餘滅涅槃今略引之影疏解云今此中釋乃取小乘結集義也言正量得是無記等者案碩疏云正量解是無記者彼意謂業由作意而起故業是善惡俱得繩任運隨業而起非關作意造所以但是無記也述義解云此不失法為得更無得繩也言數人明券等者案影疏云以之持業而非其業如金石賈殊券無貴賤故名無記也述義解云詺得繩為券耳問若爾得繩通三性何言無記答實爾然彼意言所喻之得雖通三性而能喻之券但無記耳言若解法説者以得繩為法也法宗原云得謂彼有情數法擇非擇滅也言衆生為能成就者述義解云能成就善惡法故也言故婆沙云佛陀提婆説曰若衆生不離是法等者言不離是法者述義解云即善惡法也言有人言曇無德部辨心為能成就等者述義解云前就衆生五陰身今但就衆生之心識故云心為能成就也言又依正量部義等者案慈恩部執論疏云正量部者權衡刊定名之為量量無邪謬故言正也此部所立甚探法義刊定無邪目稱正量從所立法以彰部名也言明了論是覺護法師造等者述義解云明了論者凡有一卷正量部律師佛陀多羅此云覺護那含果人之所作也真諦三藏譯今檢彼題論下注云正量部佛陀多羅多造也言論云正量部有二種等者案彼論第卷云有餘師説相離一分無失一分定聚一分名相出離棄捨涅槃至得如此等名修習類法所餘皆名自性法若人解自性法及修習類法此人於律明了不看他面又云如阿毗達磨中説由了別性由滅次第等差別如文言罪為善惡無記或有覆無記或自性無記為欲界色界無色界攝欲界攝為有流無流有流為心法非心法非心法為與心相應不相應相應為隨心不隨心有隨不隨若觀心生生是隨心餘非隨心與心俱起亦爾為有色無色非色非無色為有教無教或有教或無教有緣緣無緣緣無緣緣為業非業業與業相應不相應隨業與業俱業俱起亦爾為先業果報應修不應修不應修應知不應知應知可證不可證可證可由智不可由智不可由身可滅不可滅可滅由見及修如判羅刺非羅亦爾由了別性界滅次第今略引之疏分別有四種者第二繫不繫門等者述義解云分別有四種者二義一者不失法是無記分別無記有四種也二者此不失法所繫三物有四種也二者正量部有二義一至得二不失法至得者通持三界內外繫爾繫法不失法者但持三界內繫法耳今唯就不失法所持也言依論義等者述義解云六道衆生與三乘賢聖合四人也曇無德同之言有人言四種等者述義解云此明數人義言報生者現在五陰果報無記心也威儀者行住坐臥心是無記也工巧者巧作物時心亦是無記也變化者虛空中示十八變化亦是無記謂羅漢示變化時始即是記而感示變化時無分別故是無記也言正量部自有四無記等者述義解云言根本無記等者心不當善惡故亦無記心王與心數也有覆等者以身邊二見覆聖道故名有覆計有我身亦斷亦常此是無記何者不起善惡之心而計斷常故然不順聖道故名煩惱也上界煩惱奢摩他所覆而不現起分別善惡故禪定所覆故名有覆無記分別善惡之事故名無記然違聖道故名煩惱也無覆等者白淨無記即果報無記非煩惱故名白淨又有煩惱而蔽自心故名有覆既無煩惱故名白淨謂無漏五陰如羅漢識想受三心是無漏而分別弱故是無記也言今依青目等案長行云是不失法欲界繫色界繫無色界繫及不繫述義解云大分不失法所持三界雖是繫法而不失法非是繫法又三界繫法雖有善惡無記合名惡法亦名有漏若不繫者是無漏是善準之可悉言所以通四種者正量部云等述義解云此非正量部正義此部立不失法就為無為者是有為以大期滅故就漏無漏者是有漏以不繫無漏故就三性者是無記也三界有漏得不失法是有漏無記就三界故為三無記出世無漏得不失法是無漏無記如前三無記為四種也今案彼義解云持三界繫法三無記與持不繫法至得無記合名四種也今案十六字缺言例如薩婆多明二無為等者述義解云虛空無為與非數滅無為也言成論明識想受意等者別記解云羅漢識想受三心者是無漏而無漏以分別弱故是無記也言若不失法通繫不繫等者述義解云若不失法通漏無漏即應通斷不斷故可名見諦斷何故唯言思惟斷見諦不斷乎正量部義不失法但是繫不通不繫不繫是至得若言不失法通不繫即違論文故名便通斷不斷也言攝論梨耶等者所言長觀者委曲觀察也今以不失法持三界繫業以至得持不繫法具如上明也疏見諦所不斷但思惟所斷者第三等者言攝論依大乘義判見思等者案梁攝論第八卷二智差別章初云論曰若菩薩如此入初地已得見道得通達入唯識釋曰此下顯見道為修道依止由先成立見道故修道得成若苦薩於願樂地中具修諸方便得入初地所以得入初地由得見道故見道即無分別智所以得無分別智由通達真如及俗諦故又云論曰云何菩薩修習觀行入於修道如佛廣説所安立法相於菩薩十地釋云於菩薩十地即修慧境小乘亦有十地故以菩薩標之地地皆有十相故言十地乃至廣説攝論章第四卷云初所證者於其真實正見道中但證真如不緣俗境故此論云於法界中現見相應説名見道不説俗諦又下論云見先未見勝法界故名為見道準之可悉言梨耶至金剛心等者案梁攝論第二卷説種子六義處云隨逐至治際者治謂金剛心道阿梨耶識於此時功德則盡故名際言金剛者述義解云金剛是能破義何者金剛擬無不破謂一切沙礫瓦石諸毒鬼等第十地金剛喻定亦爾摧滅一切煩惱及外道魔怨又金剛者清淨義無闕無染故定亦復爾於入定時無此穢惡又金剛者難得義俱輪王得下賤之人難得此定亦爾但第十地菩薩所得二乘凡夫及下地菩薩不得又金剛者最勝義一切寶中勝故此定亦爾勝諸定故又金剛者難測義世人不得計其價故此定亦爾除第十地自餘之不得知也又金剛者是珠之名毗婆沙云從金非出金從金出金剛故如金中精名曰金剛又大論云帝釋手執金剛與修羅碎鬪落閻浮提變成如意珠梵語跋闍羅此云金剛此金剛寶一切諸物不能摧破如聖天言誰恐食金剛執杖防衆蠹謂等覺菩薩在金剛座於一剎那修心觀時無明等惑皆不現前故云至金剛治際時所言治際者第十地之終言本識都盡者述義解云就梨耶有三相謂自相因相果相此三義中自相轉作大圓鏡智故非云都盡今就餘二相故云都盡以梨耶果相是生死報故云都盡也因相準之言俱為二惑等者述義云共二惑之所緣縛也縛無記故名緣縛無記也言曇無德人都不斷業等者言數人得繩等者述義解云一斷謂見修二斷及不斷者取無記邊以得繩通三性故亦就無漏也見修二惑之得繩者斷無漏之得繩者不斷也言明了論云等者十七字缺言而不失法等者述義解云所言治道起時者就道諦解而為言之也言故羅漢之人等者案琳疏云所以四果聖人猶受三界果報者良以見諦不斷不失法故遍繫三界不繫業準之可悉言答無記是苦集攝等者述義解云但此五陰無記報上前滅後生義名苦集攝也就三界中欲界具有三界上二界但有善與無記上界煩惱但是無記就成論者云上界煩惱皆是不善也疏以是不失法等者言以見諦不斷等者案琳疏云以見諦不斷但思惟重慮斷此不失法無記義成能持生界令不失果故名不失法也案康疏云持諸須陀洹不失不失令得果報準此等文今言能持業者能持諸須陀果業之不失法令得三界果報故云令不失果也疏若見諦所斷等者言破異門者述義解云以正量部之正義斥破他人之異釋也言影師云等者案彼疏云至相似此立相中見諦所斷都無無記一向得報此法若在見諦便應得報體是無記得無記報名至相似則壞諸業準此疏文今言若為者為猶在也言又釋業至相似等者案碩疏云此是正量部執己義以破薩婆多部説薩婆多部説明見諦煩惱得繩還為見諦解斷今正量部難薩婆多説若言得繩通三性為見諦斷此即得繩今為與業相似何故爾明不善業為見道斷今得繩亦為見諦斷故與業相似也而言業至相似者至即是得繩俱舍論詺得繩為至得準之可悉疏一界初受身等者言今釋二業等者述義解云輕重二業得報也今案碩疏云自在衆生具有三界業隨其重者前受不可一時並受三界身故言一界準之可悉疏或言受報已等者言一者對上業果不俱等者述義解云如有人過去作可受百年報業此至第生遇邪緣而先受三十年報死今存七十年報至第三生受盡時業力謝滅也所言養者猶是遂也今案碩疏云如今感得人身而往業雖謝過而此業勢用猶在成就樂行人未失故言受報等準之可悉若度果已滅等者言得上果等者述義解云如初果人得第二果時捨初果并向故乃至第三第四亦爾捨果與向此名二滅此之二滅但是無漏又云度是取捨義二滅者滅見惑證無為滅諦與得第二果時滅修惑九品證無為滅諦也凡夫但就一生耳疏死已而滅等者言上明三果學人等者案碩疏云若是學人度果時此有漏業滅若是凡夫及無學人死已此業乃滅如須陀洹人得須陀洹果時無量生死業並滅也度者云得度果猶是得果可得聖果時有漏生死業滅也言凡夫死時業滅者明由業得此報身此身未謝滅時業勢用猶在即是前因養果義亦報身滅時此業勢用乃滅故言死已滅也羅漢亦爾案康疏云凡夫未曾得果無果可度阿羅漢已度果訖不復受度故滅同凡夫準之可悉中論疏記卷第七之本
