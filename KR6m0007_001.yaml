body:
  text: 中論疏記卷第一之本集衆異説不敢和會大安寺沙門安澄撰詳夫正觀玄宗唯有遊心之路離相之旨非言何以詮乎故今將入疏文略開三門教起因緣故解釋題目故隨文判釋故第一教起因緣故者大聖法王以佛眼觀見彼世間愚癡衆生起有無等諸戲論網邪見綢林之所壞風生死牢獄之所繫閉所以起第一悲發勇猛慧於無量億那由他劫棄捨身命無厭惓心能修一切福慧萬行鑽般若境界海斷衆多煩惱網而於諸法無分別心得一切法真實甘露隨逐衆生性時處等盡未來際攝受利益不共二乘及諸外道爰龍樹堤婆如自所證於聖所説塵沙法中顯示實義拔濟群冥其殘學者雖修正法以迷謬故皆成不善是以欲令學徒開示如來如實道理悟解大道案妙阿含思察籌量造中百論然自天地開闢以來人民𢤱悷不信因果剛強難化出離無期所以四聖銜命現於震旦漸以誘喻甫有寶應菩薩名為伏儀創始八卦吉祥菩薩號為女媧變化萬物摩訶迦葉號曰老子顯揚道德儒童菩薩號曰孔子教修孝義人民之性以此調柔堪應隨佛修行正法所以至於漢朝法音發顯及于齊梁彌復興盛大小乘之類修習空有之音隨稟流布各辨一部所有之義但是法寶中一支耳未若此論苞含大小談羅理教是故大師吉藏欲弘大法製作此疏凡有七意一助佛揚化令法久住解釋佛經令物信悟大乘光明令不絶故二小乘舊師不信大者破執而令信受中道法故三學諸權論者破其謬僻為説大道令彼捨權歸了義教勤修學故四釋無依無得廣大之義令諸學徒易悟入故五釋大乘中衆生皆有佛性之義令諸行者知決定有勤修習故六明諦智之義令諸學徒用此通釋大乘諸經作佛事故七彰施教之由令遍了知如來漸次法門權實相故教起之由略明如此委如餘處恐煩不述疏曰中論疏卷第一此下第二解釋題目於中有二初辨法名後明人目初中又二謂所釋與能釋所言中論者即此舉所釋論名疏主釋中論之字略有五意一斯論定佛法之偏正判得失之根源是以龍樹菩薩表中論名二斯文論中實之理從所詮理實得名故業品云此論所明義鄰於斷常故云中論三龍樹所作凡有三論一無畏之廣次十二之略今此折中之論故稱中論四斯論先無緣起後略餘勢但有正文以文表義故稱中論五龍樹大士是中道之人即所製作從人立名故稱中論準此疏文中人之所造論故稱中論即依主釋又中即論故稱中論即持業釋而言中者玄音論云所言中者不得有邊所以云中何者若無中者何得名邊此以中遣邊又無中與邊是妙中何者中與邊相對是病故又中義者正義以二諦為體故又是假義以涅槃佛性真如實際法身等皆是假義故又無常義以淨名經云不生不滅是無常義故何者無常之言無於常也若有常者不得無常既無有常何有無常所以無常者猶是中也又是苦義何者三界皆苦無有樂也若無樂者何得有苦故苦之言即是中也又是空義何者若有知畢竟空之意者不名畢竟空既無知畢竟空之情故云畢竟空所言論者盡言為論此即盡一異等邪言故云盡言為論又主客交言而盡語言故云盡言為論而言盡者若有言時而云盡若無言而寂坐時云盡二義俱得今檢玄義云且依名釋義者中以實為義故涅槃經云我昔本無中實道義是故現在有無量類惱論序云以中為名者照其實也照謂顯也立於中名為欲顯諸法實故言照其實也又以正為義故華嚴經云正法性遠離一切語言道一切趣非趣悉皆寂滅相此之正法即是中道離偏曰中對邪言正故不遷論云正觀論曰也然今云中者非多非一隨義對緣得説一多一道清淨更無二道一道即是一中道也若約二諦即得二中以世諦不偏故名為中真諦亦爾若約三諦亦得三中亦得四中一對偏中對大小學人斷常邊病是故説之二盡偏中大小學人有於斷常即不成中偏病若盡即名為中三絶待中本對偏病是故有中偏病既除中亦不立非中非偏為出處衆生強名為中四成假中有無為假非有非無為中由非有無説於有無如此之中有成於假問睿師云中論影師云中觀論云何相違答述義云然此論有廣略二本雖廣不增雖略不減略有二義一舉中而説兼悟觀所言悟者即是觀義二每品各有觀字故更不舉之廣亦有二一或聞中悟或聞觀悟二舉中明而不悟解聞觀悟了今疏主云但論有廣略二本但云中論名之為略加於觀字即是廣本然此廣略皆有其義所言略者謂理教所詮之理名之為中分三種中道謂世諦真諦非真非俗中道能詮之教是名為論於是二中無教不收無理不攝所言廣本具有三者中謂諸佛菩薩所行之道觀謂諸佛菩薩能觀之心諸佛菩薩觀辨於心宣之於口名為經論要具此三義乃圓足廣明如餘問中論之字是誰置耶答述義云且有二義一本論師安置論名何者如諸經中佛立名字論主準之論中標名如因緣品云真實微妙法即是中之異名後人取之安在論首也二翻譯者見者論所説義目中論名今案智度論第十九卷云中論中亦説涅槃不異世間世間不異涅槃涅槃際世間際無有異故十二門論觀作者門説如中論説中論序疏云是以龍樹菩薩表中論名準此等文故知本論師安置論名亦可釋論師安之故初牃長行云龍樹菩薩為是等故造此中論又無著菩薩名順中論清辨菩薩名般若燈論準此等文此釋論師安之明知非翻譯家安之但有人略尋文旨云譯者具安三字然睿師略觀字者甚非三藏既具置三字者何睿法師輒削觀字亦違序疏以云論有廣略二本故所言疏第一卷者第二明能釋之法然云疏者開演解釋之義謂疏主欲開演解釋正觀一論之旨歸撰集攝嶺興皇之善言制作此疏即是中論之疏依主釋也曇攝師云疏者所據反廣雅曰識也按書疏記識也所居反按疏猶布也文字辨嫌云第者大埿反𧀆草第子也第者大戻反次也基法師云第者次也居也一者極也首也此疏有十卷此卷居初故道第一焉疏曰胡吉藏撰此下第二明人目夫道不孤運弘之由人故先雖明所弘之法而未辨能弘之人所以今次明弘道之人然惟正觀之旨良登涅槃之梯橙不二之言乃度苦海之船筏但物機未熟蘊法寶於流沙之西正化時隆扇淳風於震旦之界既乎摩騰向漢教音始著羅什涉秦法義光闡自是以來遂得家家營建出世之業人人修集菩提之因故知傳法之德其利博哉誰樂道者不勤修習然則佛涅槃後像法之中有應真大士厥號吉藏誕生震旦獨步一人斯乃四依菩薩之一士也俗姓安氏是安息國太子世高苗裔母憑氏即楊州金陵里女也祖世避仇移居南海因遂家于交廣之間後遷金陵仍納金陵里女母夢有神人乘雲而至因此降祥俄而載誕自年十三夙涉文德更表貞淳聰睿絶倫智辨有殊仍以宿殖早厭塵俗梁代之初年十三出家真諦三藏問其所懷可為吉藏因遂名也仍止興皇寺堅守戒珠威儀無缺如如為家無貪為榮遂依朗法師受業一聞將盡再覽無遺衆咸驚異乃令覆述具竭所聞不漏一言爰我聞芳聲從茲發𮭻焉年二十一受具坐夏學律五篇七聚之宗亦一遍斯得乎欣然遂志修菩薩道持戒如護浮囊行施不吝金玉凡有升堂莫非人椛隋開皇年中京遊鏡水止嘉祥精舍七八年間恆事敷演遠方聽衆八百餘人十九年從王入京停日嚴寺大唐膺運紹隆正法武德元年居實際寺二年敕請住會昌寺三年敕置大德十人廷維釋教法師自少迄長經歷三代常轉法輪未曾止息凡講法華經三百餘遍大涅槃華嚴大智度論淨名金光明仁王金剛般若勝鬘法華論等三論等各數十遍并著文玄並博於世常勤修業行願睹彌勒春秋七十有五即武德六年五月遷神於實際寺東房今溫國寺是也所言胡者述義云胡者是姓取父本國之號即為姓也其胡族颯末建國輔相之子有人傳此意云自天竺東從大唐西在二百餘國總名胡族別名颯末建國今案嘉祥碑文并續高僧第十一卷中吉藏傳云安息國人太子苗裔準此等文非颯末建國人加以述義云相傳如此更檢別傳今既有別傳宜不可用述義説今謂胡者通名何者釋道安五失三不易云譯胡為秦有五失本一胡語盡倒而使從秦一失本乃至廣説又法華勝鬘注云胡本胡音又法琳傳名佛為胡神準此等文所言胡者通於天竺今云胡者指安息國故云胡耳自唐以西總名胡故言安息國者有人傳云北天竺之界此昆昆崙山東方蔥嶺山西方颯末建國在南海交廣之處案十住毗婆娑論第十一卷云或欲使度苦故而殺如西方安息國等又義淨三藏云在安息國故云安息香大唐圖云北天竺之西南有恆河水從此去西北有安息國也準此等文是西天竺之別因也淨名玄初卷序云金陵沙門釋吉藏者舉母之國以為名也故續高僧傳第十一卷吉藏傳云唐京師延興寺釋吉藏俗姓安本安息人也祖世避仇移居南海因遂家于交廣之間後遷金陵而生藏焉勝鬘寶崛云慧日道場沙門吉藏者舉後住處故傳下文云開皇歲末隋煬帝入慧日寺王又於京師置日嚴寺又辨正論第三云隋煬帝楊州造慧日道場京師造日嚴寺準此論傳故知舉後住處唯述義云日嚴精舍亦言慧日道場何者才舉日光內外奕映若有見者發心捨俗故言日嚴大師妙慧轉大法輪若有聞者趣向大道故言慧日者恐謬傳焉又云大師生于梁末長於陳代及乎隋滅以隋開皇十八年至于長安長安陳朝相去三千三百里此亦與傳碑相違何者傳云武德六年五月春秋七十有五奄然而化碑云法師自少迄長經歷三代即陳至大店并七十一歲只傳碑亦違何者傳既云真諦三藏名為吉藏即知生梁代又云生年七十五歲碑云七十一歲述義云大師年七十八處於房宇端坐而卒猶如入定形色不變古舊如此相傳久矣有人解云從梁代迄唐武德六年合九十歲如此異説出生之年進退不同故年數不定言吉藏者傳云年在孩童父引之見於真諦仍乞詺之諦問其所懷可為吉藏因遂名也準此傳文真諦三藏名為吉藏也述義云言吉藏者舉大師之諱字雖無立名所以而義準解之吉即不二之法以此為藏貯畜法寶布施群生故仍名之準此記文今云吉藏者中道正觀之法名之為吉以此為藏貯畜法財施與庶品故云吉藏焉有人傳云吉者善也藏者攝持之義也言撰者淨名玄序云因撰所聞著茲玄論述義解云始從天竺迄於此土製論之體凡有二義夫申自義宗而所製之名為作也如龍樹造中觀論釋道安作本無論等撰集經論之説而所述之名為撰也如分別明造般若燈論大朗法師作華嚴義疏等今惟疏主簡集經論之要義并採諸家之善言而加於妙思製于此疏故云撰玉篇撰者助變反數也具也定也今須後訓故述義云撰者簡定之義簡自才智定所明義然簡糸綿等名練簡金銀等名錬簡所知法名撰漢書定律令撰二百章鄭玄曰撰猶治擇之名也問疏主住世七十餘歲經歷三代常轉法輪何年製此論疏耶答出處不同碑云仁壽二年令出淨名三論疏百論序疏云大業四年疏曰中觀論觀因緣品第一此下第三入文解釋此疏一部十卷大分為二第一總料簡第二解釋本文初中又二第一總標第二別列總標之中今所舉文諸本不同有本無此九字今本有之如此文例非一碩法師疏云既稱中觀論觀因緣品第一者只精識中觀故了因緣只由善識因緣故解中觀所以大師云解中觀即是正釋因緣何故爾若不識中觀亦不解因緣若不識因緣亦不解中觀故今只為識中觀故解因緣只為識因緣故解中觀所以言中觀論觀因緣品第一中觀即是一部之通名因緣是品之別稱品之言類此品最居前故言第一問中觀論三字皆名中觀論耶答何者中既不生不滅觀論亦爾中即所照不生不滅觀即能照不生不滅所論不生不滅既是中能論不生不滅亦是中故云皆中也中即義相觀觀即心行觀論即名字觀言義相觀者觀既有其名必應有義如真俗是名非真俗是義又真俗是名真以真實為義俗以浮虛為義言心行觀者心如此行也言名字觀者知一切法但名字不內不外非住不住故悟名字即解脫故云皆觀也皆論者論即能論能論既是取中論觀亦是也疏曰將欲釋文大明二義初釋因緣品名二論開合釋因緣品名略為五門一通別門二正名門三釋名門四破申門五同異門疏云將欲釋文等者述義云通舉一部之文故云釋文也言大者總也夫也曇捷師法華字釋曰將者子陵反論語云故夫從從將聖也爾雅云將者大也送也廣雅曰將者里也欲也子高反三蒼云將主也爾雅曰將資也今須欲訓也言二論開合者述義云講此論衆師或科文而説名之為開或不科而説是名為合也今案下明論分齊處云偽秦長安曇影師不開章段北土法師開之章段準之應悉然有人云論於開合者不尋下文又或本云論章開合甚會下文云第二明論章開合不可異執也疏云釋因緣品名略為五門者此下第二別列於中又二第一別釋因緣品名第二通一部以料簡之初中又三謂標列釋結此文第一總標也述義云然見有本無名之字應是落脫何者以上既言釋因緣品名故若直言釋因緣品者應是通釋一品之文若言爾者標釋相違故為不可也所言為者猶在字也今案掌珍論上卷云自亦許為靖邁師云為猶有字也準之可悉疏云一通別門等者此下第二列也述義云中觀論三字母品存故云通觀因緣品者只一章目故云別然釋因緣品有通有別一對中觀論之通而存別故二就別之中亦有通別三就因緣品相對因緣名之為通十二四緣即是別也通別因緣之中正觀通因緣以通必兼別故以如此事説正故云正名門準此文今云正者傍正之正然有人傳云破邪因緣顯正因緣故云正名門者非也違疏下文故如因是種子故親緣是水土故疏此名釋名門也如破執因緣申所知空之因緣此名破申門也約此論十二門論以明同異故云同異門謂二論同明觀因緣故云同也文有開合廣略不同故云異也疏云問何因緣故等者此下第三隨列別釋文中有五今此第一約通別以釋之於中又二即問與答問中言標題者玉篇上剖衝字堯怖交三反擊也損也栔壯也花苑云表幟之所處也長木也下玉篇達雞反顯也來識者視也疏云答略明四義等者此下第二答也於中有四復次第一約理教以明通別第二約藥病以明通別第三約標釋二門以明通別第四約中觀發顯以明通別今是第一約理教相待以明通別所言所顯之理等者通所謂理是能顯之教等者別即是教也而云中名唯一者述義云有人言一中道理名唯有一也今明不爾每品首以存中字故云中名唯一也淡海記同之也疏云二者所申之理等者第二約藥病相對以明通別言所申之理等者通所謂藥是所破之病等者別即是病也問所顯之理與所申之理有何差別答述義云有同有異所言同者以二諦教顯不二理時病無不破以正觀智破執病時理無不顯故所言異者破病之義非顯道義顯道之義非破病義故淡海記亦同問此二理為是體中為當用中答述義云傍舉體用二中而以正義舉體中也淡海記同之疏云三者題中觀論等者第三約標釋二章門以明通別也言題中觀論等者通也觀因緣品等者別也所言標章門者有人傳云依下疏文云開章門者應言標於章門釋於章門言不生不滅乃至不來不去者所言乃至者疏主釋云窮到之辭也具明八不如疏下文言觀辨於心論宣於口者次下疏云以觀辨於心論宣於口六種品疏云觀照於內言彰於外故名為論即是化身有疏云今此論即是所顯之理理即是不二中道不二之觀辨心不二之言宣口故言中觀論也準此疏文今云觀者不二之觀論者言論即不二之言準之可悉言如下偈云等者指此論第四卷四諦品偈文所引全同所以不記疏主顯數條意且約中假義而為釋之即第三條意言因緣所生法者牃也諦也我説即是空者明第一義諦也亦為是假名者釋上二諦並皆是假既云衆緣所生法我説即是空此是有宛然而空故空不自空名為假空空宛然而有有不自有名為假有亦是中道義者説空有假名為表中道明假有不住有故有非有假空不住空故空非空非空非有即是中道餘條意不當此疏故且不引碩法師云我説即是空者既是華手經文所以我者佛我也述義并淡海記異説煩多不要故不記唯撿疏下文云華首經文也有人傳云此經有十卷撿上下文都無此文元康師疏云此經未盡度來今撿大論第六卷云因緣生法是名空相亦名假名亦名中道準此論文應言無五言偈文可言長行文彼經長行中有四句文故指經文處如疏第十卷記言答觀正因緣等者所言正因緣者述義云佛説如幻如化假生假滅無生無滅等也假生假滅即世俗諦無生無滅是勝義諦由此二諦以顯不二中道由此中道成無二智由無二智而發二智以此二智説法斷疑故云論耳所言邪因緣者述義云有三種邪因緣一諸外道云從微塵世性生諸法等故大論釋無盡品云邪因緣者微塵世性等是也二衆小乘云從六因四緣生諸法等三有所得大乘云從本識種子生諸法等如此等輩聞諸法性作決定解不識如來本意故云邪因緣也言是故偈言等者此論主歸敬偈文所言顯正者疏主解云歎佛智能説三種中道因緣即顯正也所言破邪者能説八不因緣滅八不戲論八不戲論者二乘人也是二乘回小入大也亦可破菩薩有所得生滅心令菩薩悟入於大即知八不因緣破三乘人戲論令三乘人皆悟入大乘此即破邪也總顯大意云能説佛説如幻如化假生假滅無生無滅正因緣以破外道小乘有所得大乘戲論邪因緣也問智度論第五云因緣生法滅諸戲論佛能説是我今當禮案此論云因緣生法滅諸戲論佛能説是今何故云佛智能説三種中道因緣善滅諸外道等不八戲論耶答二論互舉一義謂彼論明顯道義此論顯破病義故言云不異者正觀等者疏王釋云撿有所得邪因緣不可得故名觀因緣此是所破義準此疏文所言邪因緣者有所得邪因緣言撿者玉篇冀斂反糾也同瞼也掇也局也碩法師疏云若也通論只是破破只是觀何故爾良由欲觀故所以須破洗良由欲破故所以須觀察準之可知言觀名據申正等者疏主釋云照達假名正因緣故名觀因緣此明所申義顯在十二門疏上卷碩法師云若也別論觀言觀察破言破洗中論申正破傍正欲中教故須觀教之得失所以中論宜受觀名百論破正申傍正欲破自樹外道所以百論宜受破名準之可悉言如云觀身實相觀佛亦然不可言破身實相破佛亦然等者引例結成觀破異也所言觀身實相觀佛亦然者案淨名疏下卷見阿閦佛品佛問維摩詰言汝欲見如來為以何等觀如來乎維摩詰云如自觀身實相觀佛亦然疏主釋云此章正明法身絶四句也謂佛身絶四句衆生實相亦絶四句是以實相即是法身總顯意云謂佛與身異則是二見非見佛也得無二觀乃名見佛也述義云淨名自觀此身不生不滅實相以為觀佛若能如自觀身實相觀佛亦然不復異相以無乖為得見也有人傳云如觀自即是實相觀佛即是實相亦然故淨名玄述義第二卷云觀佛亦然者觀我身即是佛也又肇公注曰淨名自觀身實相以為觀如來相重牒云以觀己身具三身亦觀十方諸佛如此等文皆同意也今謂不爾淨名玄第七卷云三者初之二會正辨法身後集則明佛性何以知之觀身實相觀佛亦然法身者既即是身中實相故知實相而佛性既言身中實相何得言身即實相耶言問應以論等者此問意云若觀名據申正者此即應是以論顯正因緣何故題稱觀因緣耶言答即此柳名等者此答意疏主釋云觀辨於心論宣於口故詺論為觀此是吐論主觀心以示於物故名論也言答示諸佛菩薩等者此答意云論主不欲直口言説諸法是空若口説空者此是口為説空行在有中今示諸佛菩薩如行而説顯論從於觀生欲令衆生觀悟因緣空如説而行因論發觀故立觀名也疏云四者標中觀論等者第四約發顯以明通別述義云中發觀者通也以中通於一切故觀發中者別以觀但觀因緣之智故疏主釋云中發觀者如涅槃經云十二因緣不生不滅能生觀智譬如胡䓯能發勢病何以故能為熱病作因緣故十二因緣亦復如是觀發中者衆生本謂因緣生滅不知是中以正觀檢其生滅不得方悟因緣是中此即因觀發中顯在中玄論義也碩法師遊意云中發觀者此由中道發生正觀也觀發中者由論主觀解發顯中道也疏云正名門第二等者第二明正名門也於中有二謂問與答答中有二即總與別別中又二第一明從破三種因緣受名第二問答料簡得名傍正初中有三第一明從破四緣受名第二明從觀通因緣受名第三明從觀十二因緣得名約破四緣得名之中言以四緣攝生義盡者如下阿毗曇救偈云四緣生諸法更無第五緣又雜阿毗曇心論第二卷行品偈云心及諸心法是從四緣生二正受從二謂餘説於二長行釋云心及諸心法是從四緣生者心心法從四緣生前開道故生是彼次第緣境界是彼緣緣除自己餘一切法是彼增上緣餘因隨其所應説因緣二正受從三者無想正受滅盡正受從三緣生二心正受前心心法是彼次第緣自地前生善法及彼共起四相是彼因緣增上緣如前説謂餘説於二者除無想定滅盡定餘心不相應行及色此諸法二緣生謂因緣增上緣準此論文心心數法具從四緣生二無心定從三緣生除所緣緣也非色非心并諸色法從二緣生即因緣增上緣故云四緣攝生義盡也問若色法者從二緣而生者何故疏第三釋緣緣處云凡釋緣緣有五心境合目唯目色法唯名心法耶答論示一途義疏顯再往義故不相違若依大乘義者因緣但約種子所生之色心法次第緣不異前緣緣與增上緣通約有為三聚法并佛果智及真如無為法也述義云未來心為因現在法為緣生心法故生心聚種于為因水土為緣而生牙故生色聚欲行滅盡定之心為因得滅盡定故生不相應聚以不障礙分為增上緣故因緣生三聚前心滅而後心起故生心聚欲行滅盡定之心為因其心滅而得滅盡定故生不相應聚故次第緣生二聚也未來心為因萬法為緣而起心法故緣緣唯生心聚此明不爾論下長行云因緣名一切有為法次第緣除二世羅漢末後心心數法餘二世心心數法緣緣增上線一切法無康明云若色若心皆是有為有為相因而起故云因緣本以心心數法相續生為次第而羅漢後心將入涅槃更不與後心作緣無有後果故非次第緣也若有為若無為心緣此法皆能與心為緣故名緣緣皆能令他增勝故名增上緣也準此疏章心心數法從三緣而生謂因緣次第緣增上緣諸色法者亦從三緣而生謂因緣緣緣增上緣餘一切法皆增上緣故知不爾問雜心論注釋與此論注釋俱是青目菩薩所造亦所立義俱毗曇義今何故二論相違耶答二論影略互顯亦可二論不違而元康師誤傳何者疏第三卷末云依毗曇心者心法從四緣生色法與非色非心法從二緣生除緣緣及次第緣也故知爾也有人自問云一者從下破四緣受名者違下明十義之中初義云四緣通有為無為不正明內法過患菩薩不欲度於四緣河故不就四緣以明觀行文自答云總談論意因緣有三四緣通因緣十二因緣初文約此總義云云隨破四緣受名下文約傍正也正以通因緣受名也約別因緣亦有傍正也正以十二因緣受名不就四緣受名然非無傍受名也今明此問答不爾既云總談論意因緣有三何以十二因緣離四緣耶又云正用通因緣以通必攝別豈非四緣是別因緣耶故不應作此問答也疏云二者因緣義總等者第二明約通因緣得名也所言因緣義總者淡海記云如生死與涅槃並是般若義等亦是一切法正一切法邪等所言生死涅槃者述義云生死有二種一分段生死謂色形軀別壽命長短故二變易生死無色形軀別但以色心念念相傳前變後易故涅槃亦有二一體涅槃亦名實相涅槃即無二智故肇論云涅槃大道不可以有無得之二用涅槃亦名修成涅槃是權實二智故淨名玄云觀智圓滿即是菩提菩提無纍即是涅槃然則於菩提上離患纍義説為涅槃就用涅槃亦有二種一總涅槃凡果位所有萬德是二別涅槃即萬德中無纍之義具明如肇論述義第四卷也言九十六術者有人傳云百論疏上卷云外道雖有九十六種而略舉三師二天準此疏文應言佛未出世之前人皆兼為九十六種也辨正論第五卷云九十五種之苗裔富𮒼那等也第八卷天監三年四月十一日梁武皇帝捨道詔文云大經中説道有九十六種唯一佛道是於正道其餘九十五種皆是外道朕捨外道以事如來若有公卿能入此誓者各可發菩提心老子周公孔子等雖是如來弟子而為化既邪止是世間之善不能隔凡成聖公卿百官侯王宗室宜反偽就真捨邪入聖等準此論文唯九十五種是邪道也梁武帝發菩提心序文亦同曉法師金光明經疏云九十六種之中九十五種即是外道一唯佛道範法師無垢稱經疏云九十六種外道者五種各有十五弟子也第五師之弟子若提婆更成師亦有十五弟子也此人有師資二義故為九十六若明人數唯有九十五也有人解云大覺師四分律鈔枇第十二卷二衣總別篇第十七云案多論云外道六師一一各有十五弟子師資合計九十六也準先所引百論疏并辨正論六師各有十五弟子者可謬何者六師及十八一切智人皆佛時為弟子故以五師等皆是佛前劫初及住劫故撿智度論第七十八卷云諸梵天等九十六種道不能及故實際為深涅槃經列八十天與十仙外道六師外道智度論説十八一切智人百論列三師二天假令合計百十九種今十八一切智人中除中六師即六明外道故除百論二天是八十天中二天故如此開合故成九十六種文林義列九十六術然九十六種外道約人而數之九十六術者約行相而為名之有人如此異文和會云九十六種外道有二種一佛未出世之前九十六種智度論等所明是也二佛出世之後九十六種外道範法師等所存是也言建首者有人傳云二字合訓初也言非因緣義者述義云因緣與非因緣皆為因緣然於外道云非因緣耳疏云三者此品觀十二因緣等者第三約觀十二因緣以明得名於中有二初引三證釋成從觀十二得名後引十義釋成不從破四緣以得名初中又二初總明觀十二因緣故云觀因緣品後問答顯得名於中又二即問與答中又二謂總標與別釋於別釋中又有三初引論主偈并青目釋次引長行所引大品經文後引十二因緣邪見二品文初中言一者論主偈云等者述義云以顯相言之論主列八不而為一偈故云論主耳然以細相言之八不是瓔珞經所説良是經偈也今謂不生亦不滅等一偈是瓔珞偈今所引之文是論主歸敬偈故碩法師云今以一文據八不與歸敬是論主真言故釋論第五卷道不生不滅不斷不常不一不異不來不出佛能説是我今當體既道佛能説是我今當禮豈非論主自標準此疏文故知論主偈也言故青目釋云等者案初牒長行云先於聲聞法中説十二因緣又為已習有大心堪受勝法者以大乘法説因緣相謂一切法不生不滅不一不異等畢竟空無所有元康師明云指增一阿含經中所説十二生滅義故云先於聲聞等也久行大道久種善根故云已習行也發大乘心故云有大心也以久習行已發大心所以堪受深法也今取意略引之言青目者梁時僧祐律師作薩婆多傳云婆秀槃蛇漢言青目善通深論造三法度釋中百論及法勝毗曇元康師破云婆秀槃陀只是婆藪般豆梵音輕重故此不同婆藪槃豆則是菩薩賓羅伽乃是外道兩説不同未知就是多恐祐律師錯有人解云外道名賓頭羅伽今菩薩名賓羅伽準之可悉疏云二者論引大品經云等者第二引大品以釋成也言大品經云等者案彼經第二十九卷無盡品須菩提白佛言世尊是般若波羅蜜不可盡佛言虛空不可盡故般若波羅蜜不可盡乃至須菩提是十二因緣空是獨菩薩法能除諸邊顛倒坐道場時應如是觀當得一切種智疏主釋云言不可盡者凡有三義一十二因緣如虛空虛空即是實相由觀實相發生正觀故有三世諸佛三世諸佛觀於實相發生正觀以實相不可盡故二實相若是有無四句此則有盡極處以實相絶有無四句無盡極處故名不盡三二乘滅十二因緣即是盡義菩薩知本自不生今亦無滅故言不盡即是佛性故坐道場時即見佛性也言道場者所言道者謂無上正遍知佛果道也所言場者凡有二義一者即指佛果衆德用之為場故此經文以佛地衆德用為場二者既用果為道以因為場因能感果如起道之處名為道場故萬善之因是逮覺之所由菩提之根本修心之間地弘道之淨場但因有二種一者六度等行二者四諦等境皆能生道故名道場此之境行為真道場也菩提樹下起道之魔名為道場謂應迹道場顯在淨名疏第四卷菩薩品光嚴童子章也元康師明言道場者得道之處名為道場即菩提樹下是也今在天竺摩竭提國大智度論第四十二卷云土在金輪上金輪在金剛上從金剛際出如蓮華臺直上持菩薩坐處令不陷沒今取意略引之有傳云十二因緣如虛空不可盡者消文應言觀十二因緣者猶如虛空而不可盡有人云十二因緣者如也虛空也不可盡者不爾也今謂疏有三説若依初説者應如所言但依第二説者後説亦無妨難也疏云三者後小乘兩品等者第三引十二因緣邪見兩品以釋成也言外人問云前已聞等者案此論第四卷觀十二因緣品初云問曰汝以摩訶衍説第一義道我今欲聞説聲聞法入第一義道元康師明總以二乘為小道通名聲聞有義説聲聞有二種一緣覺聲聞二聲聞聲聞今説聲聞者是緣覺聲聞也琳法師明問曰汝已等者結前我今欲聞等者生後也言論主還舉十二因緣答云等者十二因緣品次文云答曰衆生癡所覆為後起三行以起是行故隨行墮六趣乃至以是事滅故是事則不生但是苦陰聚如是而正滅令九行偈疏主釋云初七行三句明十二相生智者所不為下一行一句明十二還滅初明順觀後明迷觀故云小乘從十二生滅門入第一義言則知大乘等者準小乘從生滅門第一義則顯大乘從無生滅門入第一義也述義云此論未後辨小乘觀行有於二品即十二因緣品邪見品也小乘人知十二因緣是生滅故空大乘人知十二因緣即無生滅故空以知空義云入第一義也疏云問何故從觀十二立名等者第二引十義釋成不從破四緣以得名於中有二即問與答答中又二初總標十義後別以十義釋成即為十別今云一者十二因緣等者第一約菩薩度不度以釋成也所言十二因緣正明內法過患等者疏主釋云衆生回流生死有十二因緣生死深曠回流不息悉能漂汲六道衆生是故十二名為河也顯在十二門論疏也述義云十二因緣正明煩惱業事故云內法過患也今案成實論大義記第十一卷十二因緣義云十二因緣不山三聚謂色心不相應行也無明唯心不雜餘法故知一切諸有皆心為本心迷則生死雲集心解則天窮悉斷行體有二謂心及無作識唯心聚名色或備三聚或唯心色六入有兩謂色心也觸受愛取並唯心也有同前行具心無作也生應例識而名通三聚老死時長義亦通三也然則十二數中六唯心功謂無明識觸受愛取也三枝各備三聚謂名色及生與老死也行有兩具同是心及無作以色非善惡無造來果故也六入備兩謂色與心以不相應行不為識根故準之可悉言四緣通有為無為者論云因緣名一切有為法次第緣除二世羅漢末後心心數法餘二世心心數法緣緣增上緣一切法疏主釋云因緣者依名釋義亦有二種一者種子親而能生為因水上疏而助發為緣二者本無牙體辨之令有故稱為因有可生之義假緣助發故目之為緣故牙具有無二義種受四緣兩名故曰因緣也次第緣者以前滅為緣後生為次第次第是後果以先滅心與後生次第果作緣故名次第緣也緣緣者解緣緣有五一云心是能緣境是所緣心境合説故名緣緣雖有餘釋不離心境也又云常住佛智亦緣境而非生滅故緣緣門廣也又云凡夫六識緣於六塵聖人真俗兩慧緣一切境並是緣緣義也又云增上緣通有為無為而果但是有為準此疏文緣緣增上緣通於為無為因緣通三聚次第緣但心法也述義云約總相故云四緣通為無為若約別相者不爾總顯意云以世人多迷內法故菩薩欲度十二緣河小迷四緣故不欲度於四緣也疏云二者十二因緣等者第二約通於得失苞含大小以釋成也述義云菩薩知十二因緣不生不滅所以得外道不知十二因緣而謂從世性等生是故為失故云通失菩薩得人法二空故名為大二乘用得人空故名為小故苞含大小言如不達因緣等者顯失得於因緣等者顯得也於中有菩薩聲聞也言無因執計者有人傳云無因之執計也此外道執於無因故也言苞含該羅者玉篇苞博交反蔗也叢也稹也本也茷也豐也苞裹之苞為包字補殽反包裹也説文象人懷任也含戶耽反銜也哺也寬也該古來反備也減也減猶皆也讃也浮也包也説文以兼備之該為胲字也羅力多反鳥罟為羅説文以維罔鳥也被也綺屬也方言羅謂之離離謂之羅郭璞曰行列物也術者時橘反皆也道也所由也藝也疏云三者經云三獸何度十二緣河等者此第三引大經第二十七卷文以釋成也如彼經云佛告師子吼菩薩復次善男子衆生起見凡有二種一者常見二者斷見如是二見不名中道善男子無常無斷乃名中道無常無斷即是觀照十二因緣智如是觀智是名佛性如是之人雖觀因緣猶亦不得名為佛性佛性雖常以諸衆生無明覆故不能得見又未能度十二緣河猶如菟馬何以故不見佛性故遠法師明下偏就因緣觀行辨中於中有二初對凡夫以明中道次對二乘以顯中道初中言衆生起見下舉邊顯中次無常無斷下明中異邊言百無常無斷乃名中道者正辨中義即是觀照十二因緣智者出其中體如是觀智是名佛性者結中為性次二乘之人下對二乘以顯中道於中有二初明小非中後明凡夫二乘不見初中言二乘之人等者明二乘但能見因緣相不及其實故非中道非中道故不名佛性是中亦應明佛菩薩觀行是中義不異前故略不論次佛性雖常下明凡夫二乘不見於中又二初明凡夫不見佛性雖常下文是次又未能度下明二乘不見於中又二初標二乘不見謂二乘觀法未能及實故如菟馬不得水底次何以故下釋以凡夫二乘不見佛性故能觀智不名中道今取意略引之述義云三獸者菟馬象也同度等者就三乘人所觀之境即是用中而非三乘通教亦可有體中義以菩薩觀體中故淨名玄述義云如有傳云象菟二人共度大海即此海中黃金甚多象徹踰底截流而度黃金著腳出岸而行腳底黃金隨步墮落於地貧人拾取能破貧之菟浮而度不知有何等物彼何利人也涅槃無名論云經曰三獸度河述義第五云三獸謂菟馬象禮記祭宗厝之禮菟曰明視説文曰小獸也又曰馬者武也怒也周禮六尺以上為馬世本相土作乘馬宗忠曰黃事臣也山海經曰禱過之山多象郭璞曰獸之最大者也爾雅南方之美者有山犀象馬説文曰南越大獸也三獸喻於三乘二義一以身形細中麁別二以度河浮中沈異今就後義十二因緣猶如河津三乘俱觀十二因緣而二乘觀十二因緣是生滅法菩薩即觀十二因緣本來不生今亦無滅然則三獸喻能觀人河喻所觀因緣法也問觀十二因緣智慧凡有四種聲聞緣覺菩薩佛今何故唯云喻於三獸耶答元康師肇論疏上卷云開佛及菩薩故有四種合佛及菩薩則有三種然此三人同觀因緣性空故得成三乘道果也準之可悉問二乘同斷見修煩惱等證無學何故馬喻緣覺菟喻聲聞耶答統略下卷釋化城喻品云合譬中説二涅槃聲聞小涅槃緣覺中涅槃也大乘同性經云緣覺有十地十地中有習氣薄地以利根故名中涅槃聲聞不斷習氣故名小涅槃也言徹者玉篇直列反道也達也通也明也列也今須達訓也謂至達也今案優婆塞戒經第一卷三種菩提品云善男子如恆河水三獸俱度菟馬香象菟不至底浮水而度馬或至底或不至底象即盡底恆河水者即是十二因緣河也聲聞度時猶如彼菟緣覺度時猶如彼馬如來度時猶如香象是故如來得名為佛準之可悉此經一部十卷北涼曇無懺三藏所譯疏云四者經云凡夫順十二因緣故流轉生死等者第四引大集維摩二經文以釋成也言凡夫順等者案大集經第九卷云佛告海慧菩薩一切衆生順生死流大乘之法逆生死流述義云十二因緣於雜染清淨皆有順逆次第謂無明緣行等是名雜染順次第無明滅即行滅等名為清淨順次第也老死老死集老死滅老死趣滅行等歷觀四諦此名雜染逆次第此約初習位加行法而為言之由誰無故老死無由誰滅故老死滅即知無作緣故老死無無常緣生故老死滅等是名清淨逆次第此就斷滅已重觀察而為言之從無明而起者無因緣故不具四諦從老死盡而起者觀易成故如大論云菩薩為衆生故從果觀十二因緣無量義云中於處處演説甚深十二因緣為求辟支佛人而無量衆生發菩薩心或住聲聞準此應知有通別義今取意引之言故非凡夫行等者如維摩經中卷文殊問疾品維摩詰言若住不調伏心是愚人法若住調伏心是聲聞法在於生死不為汚行住於涅槃不永滅度是菩薩行非凡夫行非賢聖行是菩薩行疏主明云若住不調伏心下明非調不調者謂若能調不調兩捨心無所依得正觀者始是調心法也肇法師注曰不調之稱出自愚人調伏之名出自聲聞大乘行者本無名相欲言不調別同愚人欲言調伏則同聲聞二者俱離乃應菩薩處中之行也在於生死下注曰欲言在生死生死不能汚欲言住涅槃而不復滅度是以虛中道而行者非在生死非住涅槃也羅什注曰凡夫行者有三種善不善無動行無動行者色無色界行也上二界壽命劫數長久外道以為有常不動義也佛亦因世取名而名之故云非凡夫行也行三脫而不證故云非賢聖行也疏主云凡聖兩忘也準之可悉所言體者體悟也悉也觀也解也疏云五者此論引大品云等者此第五引初牃長行所引大品經無盡品文以釋成也具引文如前言即具三種般若等者如智度論第卷云説智及智處皆名為般若疏主釋云智處者實相境從所生名般若智者所生觀照説者能詮此一般若從所詮受名也般若反云智慧勿用破判班音但用鉢音切音也淨名玄第四云又立三般若皆就般若道中開之一實相般若能生般若故名般若二觀照般若當體名為般若三文字般若能詮般若以所詮為稱亦名般若述義第四云三般若中實相實非般若所以名般若者凡有三義是般若之體是般若之因是般若之本故名般若如論云菩薩應如是思惟何者般若波羅蜜體相諸法實相是即自問言實相無所分別何故名般若即釋言因觀實相而得般若此因中説果即説譬喻如人食布言觀照者能觀達於理源體是般若故名般若文字所以名般若者以能詮於般若亦以能生般若般若之因故名般若如大品云當書持般若讀誦般若論云欲得大智慧當學小智慧方方便門小智慧方便門者謂般若經卷書持讀誦而言實相者本宗義述義云本來寂滅之理離虛妄法為諸法性故曰實相實者非虛妄義相者體性無行經云實相無煩惱無衆生無佛乃至觀好惡音聲知非音聲性常入無文字實相之法門中論云諸法實相者心行語言斷無生無滅寂滅如涅槃述義云實相般若且有二種一體實相即中道境二用實相是二諦境今明若約通義可然今此疏意且約別義而為言之故疏文云以照因緣有本來畢竟空名為漚和般若照畢竟空於衆生宛然而有名般若漚和準此疏文不取俗諦境為實相般若又云若就體用而為言之有總有別言總者從實相境發觀照智由智説教故實相般若為體觀照文字為用此約本來而説體用言別者三種般若各具體用謂中道第一義諦為體實相有諦無諦為用實相無二智者為體觀照權實二智為用觀照音聲言説為體文字招印屈曲為用文字通別準前子細問答具如別抄言問觀因緣但是般若等者此問意云十二因緣不生不滅但具三種般若亦是具足三種漚和耶言漚和者梵語存略若具應言漚和拘舍羅此云善巧方便也言三種方便者境界方便觀照方便文字方便淨名玄云問般若道既開三方便道亦有三不答亦有三謂境智文字述義第四云方便道中亦有三種境界方便觀智方便文字方便而由文字能詮般若能詮方便故通二道然方便照俗境以俗境能生方便義為境界方便以照俗境義當體得名為觀智方便以文字能詮方便義為文字方便具明如別抄疏述義云問因緣等者即十二因緣不生不滅義舉所照境意取能照智而有二義一者照真諦為般若照俗境為漚和二者照真俗為漚和照中道為般若隨處宜用也言以因緣能生權實二智者等如本業瓔珞經下卷云佛子二諦義者不一亦不二乃至不生亦不滅而二相即聖智無二無二故是諸佛菩薩智母準此經文今云法身者智法身也言父母者生父母也言漚和者上玉篇於侯反漸也柔也漬也或作傴字郁禹反逼曲也言宛然者玉篇云宛於阮切屈草自覆也爾雅曰宛中宛丘注云中央隆高又於原切懸名切三云於阮反上貌也宋云宛宛然疏云六者大涅槃經明五種佛性等者此第六引大經第二十七卷以釋成也如彼經云佛告師子吼菩薩善男子佛性者有因有因因有果有果果有因者即十二因緣有因因者即是智慧有果者即是阿耨菩提有果果者即是無上大般涅槃乃至十二因緣不生不滅不斷不常非一非二不來不去非因非果疏主釋云十二因緣名境界因所以則因者能生觀者為觀智作因故名為因二者十二因緣乃至能令人得成佛果此根本能生於佛故名因因觀智為因因者為菩提作因故是因復因境界因生復是一因故因因菩提名果者是觀智果故名果涅槃果果者從菩提果生果故云果果然觀智從十二因緣生觀智應是果而此中意明開因果故因門中有因果總為因果門中有因果名為果故因緣與觀智雖是因果同是因門故為因與因因菩提涅槃稱果與果果因中即有境智十二因緣是境界因觀智則是所生之智果中有智斷菩提即是智涅槃即是斷此是一途言涅槃具三德豈只是斷問涅槃遊意云涅槃有總別四句一總是別非如哀歎品所明涅槃二別是總非如師子吼品所辨涅槃今何涅槃具三耶答遊意顯一途意今約再往而為言之具明如涅槃疏第十六卷也言蓋是諸佛之祕藏等者述義云夫佛性者唯佛與佛乃證知十住菩薩不能證知何況餘人故云諸佛之祕藏也萬流之宗極者如般若無知論初云夫般若虛玄蓋是三乘之宗極也過義第二云次明諸乘所依此有三義一者三乘之人各有般若皆因般若而得成道如十六心無漏見道斷俗證果即以般若為所宗重亦為至極然有淺深不同故成大小之差二者諸三乘人隨分同修於體般若三者般若乃是一乘之法雖一乘法數過塵沙而般若道以為最勝故大論云因中名般若果中名薩般若即知因乘以般若為主果乘以薩般若為主而以會三乘之因義名曰宗極何者於一佛乘分別説三三即以一為宗極也準此論文今云萬流者五乘衆生也五乘之人各有佛性皆因佛性而得成佛即以佛性為所宗重亦為至極準釋悉之所言蓋者述義云舉自謙辭孝經云蓋天子之孝也安國注曰蓋者稱事較之辭也劉㶣釋曰事較梗概大略之言以天子孝有多途此才舉生大略故言蓋蓋者語之發端不定之辭然則將以為是未敢為定故曰蓋也薀者玉篇於粉反淵奧也藏也屈積也蓄也崇也盛也饒也最也或作蘊字玉篇紆文反此亦薀字也言十二因緣不生不滅等疏主釋云不生不滅可具三義一無性實生滅故云不生不滅此世諦門無生滅也二因緣生滅即不生滅此真諦門無生滅也三以世諦有故為生真諦無故稱滅非真非俗即是理實名不生滅準之可悉而有人傳云略舉真諦境故云不生不滅若具應言生滅不生滅非不生滅違淨名經疏言境界佛性者十二因緣能生觀智以是觀智之境界故名為境界也即此十二能令衆生得成佛果以此根本能生於佛以佛之性故名佛性所言佛者覺也三覺圓滿故覺也性者因也種子也故地持云界界因種子名之差別亦曰緣因以能生觀智之前緣故具明如別抄言由十二因緣等者或本不同有本直云發生正觀即觀智佛性無由十二下九字今本具在俱無妨難而云發生正觀者如重牃攝法門云能發無生滅觀即觀智佛智佛性又云生於觀智謂觀般若準之可悉而言正觀者以菩薩觀不生不滅異於二乘生滅邪觀故云正觀故涅槃經云二乘邪曲見也所言觀智者觀察照見故云觀決斷照了故云智也言斯觀明了等者觀智明了名菩提果性故淨名玄云變因為果也所言菩提者此云正遍知道有人傳云菩提具足權實無二三智故云三菩提者大妄語也未識梵漢故致此迷耳言正觀既彰等者所言涅槃者此云寂滅也此以菩提離患義名為涅槃有人傳云以菩提智所證之理為涅槃果果性者不爾涅槃疏明亦因亦果處云觀智菩提以數義同故合為一句一從一因而生還照一因故二同俱智故三俱有因果義故若以菩提智所證之理為涅槃果果性者觀智菩提俱從涅槃果性而起還從涅槃果性是義不爾言然十二因緣等者如淨名玄第五云此之五性更無二體十二因緣能生之義則名為境所發之義便名觀智觀智明了故稱菩提菩提無纍則是果果然十二因緣本性清淨末曾因果亦非境智故名非因非果然此五性既無二體但轉境為智變因為果如此因果未曾因果故五性一體又云涅槃經就十二因緣辨境智義欲明一切衆生皆有佛性衆生即是十二因緣十二因緣能生別境所生則智更無二體重牒云一十二因緣準此等文今言一法者十二因緣事法也故涅槃經第十五并疏第十二云一因緣者十二因緣是一有為法故有人傳云指正性云一法舉十二因緣事取下理故此亦無妨而有人傳云十二因緣者此一科一聚法故云一法者非也無所出處故而言轉者述義云為境之法練磨成智也有人傳云五義轉也有人解云於一十二因緣法上以義展轉具於五義紛紜如之具如別抄也言命初者上玉篇靡竟反教令也道也信也計也使命也告也名也性也性者空也疏云七者涅槃經云諸行無常等者此第七引大經第十四卷文以釋成也如彼經云佛告迦葉菩薩我過去世佛日未出作婆羅門住於雪山修菩薩行周求大乘經典不得帝釋變身作羅剎像形甚可畏其聲清雅宣過去佛所説半偈諸行無常是生滅法此苦行者聞生歡喜白羅剎言善哉大士汝於何處而得如是半如意珠乃至令得具足羅剎即説生滅滅已寂滅為樂疏主釋云此偈上半即無生滅生滅下半生滅無生滅義若但有生滅無無生滅則但有生滅義猶未足亦不成生滅故稱為半若但有無生滅無有生滅義亦未足又無生滅義亦不成故復呼為半若生滅義方具足故名全如意珠然此偈但就心觀行作之即顯然可解此心本性不生不滅以顛倒故無生滅於衆生滅生滅故言諸行無常是生滅法今以正觀求此生滅不可得則生滅心便息故云生滅減已也因緣生即寂滅性故假生滅便息以有生滅是故無常以生滅滅已所以為常以無常故苦則知常名為樂故言寂滅為樂也具明如重牒攝法門也言若住十二因緣等者若住十二因緣即有生滅是故無常以無常故苦以無常苦故不自在名無我以無常苦無我故為智人所惡故稱不淨故云無有常樂故淨也言此論觀彼等者今此中論觀彼十二本自不生今亦無滅生滅既滅所以為常常故即樂既有常樂則自在為我諸佛菩薩之所欣樂名之為故云則具常樂我淨也因緣大宗具八行觀以具八行觀故便除八倒以識無生滅生滅故於生死中不起常等四倒以識生滅無生滅則悟涅槃不起無常等四倒也述義云此經文中唯有半語而無全語前既以上半偈名半珠故義準以偈具足各全如意珠也言雪山者有人解云在北天竺之北香山之南也疏云八者此論雖無法不窮等者此第八引偽秦長安曇影法師序文以釋成也故彼論序云即無言不窮無法不盡然統其要歸即會通二諦也謂二諦具八不論始終明八不即知二諦為此論宗即是所申二諦也言因緣宛然等者疏主釋云十二因緣本性空寂名為真諦猶如幻夢往還六道名為世諦具如去來品疏疏云九者欲釋中觀論三字等者此第九約論題目以釋成也言十二因緣不生不滅等者疏主釋云不生不滅凡有三義一者無生實生滅故云不生不滅此世諦門無生滅也二者因緣生滅即無生滅此真諦門無生滅也三以世諦有故為生真諦無故稱滅非真非俗即是理真名不生滅具如淨名疏第三卷弟子品也言發生三觀者由世諦境發生權智由真諦境發生實智由中道境生無二智也疏云十者大明物病不出二種等者此第十約執病以釋成也言執性者性執也迷假者假執也於所執中重名性執也輕名假執也言是故論云等者如十二門論觀因緣門初偈云衆緣所生法是則無自性若無自性者云何有是法經主釋云此偈就破病解釋諸法為衆緣所成即無自性若有自性不假衆緣故上半破一切外道令一切外道藉因緣知外瓶內身悉皆是空故從因緣門以入空也下半破內道義內學之人乃不言衆緣和合別有實瓶而有無性假瓶是故今若無有自性云何有是法故亦無假瓶令內學人從因緣門悟假瓶空更有衆釋具如彼疏今且引一準之可悉疏云破洗迷執等者如百論序云其為論也言而無當破而無執儻然靡據而事不失真蕭焉無寄而理自玄會返本之道著乎茲矣疏主釋云蕭焉無寄猶是不住之異名以無所住與理玄會諸與理冥會也言蕭焉者如肇論序云蕭焉外物元康師云蕭條然在物之外也述義云蕭焉猶澄渟也馬融曰不譁喧也疏云答關內中論序云等者疏主釋云其實既宣下第三立名利益初明理教次敘得益言其既宣者理顯也其言既明者教明了也於菩薩行下辨得益也以理顯言明故因教悟理則因成果立也朗然懸解者借莊周之言以顯因成果立之義故莊子內篇養生主章云適來夫子時也適去夫子順也安時而處順哀樂不入能郭注曰有繼為懸無繼為也謂是帝之懸解也其可敘二義一者菩薩因成道場照顯則永離生死欣戚如哀樂之不入二者有繫曰懸無繫曰解有繫者謂斷常諸邊稱之為繫諸見既寂故目為解莊子疏云帝者天也天者自然也懸解者解脫也謂天然之解脫也言若精鑒斯意等者如世説云時人目夏侯泰初朗朗如日月入懷故云如白日朗其胸襟也言精者精妙也廣雅云鑒鏡也言胸襟者如肇論序云良猶襟情元康師云襟是胸襟也情是情性也述義云且如於衣服而襟是要之於人身而神情是宗也言甘露流其四禮者如此論序云流甘露於枯悴元康師云甘露謂天露也準之可悉言關內者有人傳云四畿之內名為關內也長安也即京都也長安之東方有關山從此關至長安諸師名關舊即睿師影師等也今安唐圖云從崑崙山流出一河名為黃河此河以東有金城關此關東北有五涼郡彼有於一處名姑臧一處名西涼州今山三藏始至姑臧睿師等於彼所受業彼之姑臧是關之內故彼師等名為關內也疏云問三種釋因緣等者此一番問答第二問答料簡得名傍正也言三種者四緣通因緣十二因緣也言十二門亦然者約十二門論因緣門亦可有三種釋因緣正用通因緣以通必攝別故云十二門亦然也疏云釋名門第三等者此大段第三釋名門也於中有二謂問與答答中有四第一依下論文釋因緣名第二約依名釋義釋因緣名第三依經論釋因緣名第四和會異義今云依下偈云等者第一依下論文釋因緣名也言下偈者四諦品偈文具明如上言略明因緣凡有三義等者取四諦品長行文意而為言之言一者因緣是空義等者如彼長行初云衆因緣生法我説即是空何以故衆緣具足和合而物生是物屬衆緣故無自性無自性故空疏主釋云此長行約三是釋偈本一者因緣所生法是畢竟空所以然者若有自性即不從因緣既從因緣生即是無自性所以是空故云因緣即是空義言二者因緣是假義等者如論云空亦復空但為引導衆生故以假名説疏主釋云因緣生法亦是假名所以然者因緣本自不有今亦不空非空非有不知何以目之故假名説有亦假名説空故云因緣是假義言三者因緣等者如論云離有無二邊故名為中道疏主釋云因緣生法亦是中道因緣生法無有自性是故為空所以非有既其非有亦復非空非空非有故名中道故云蓋是論文自有三義釋之準之可知疏云四者依名釋義等者此第二約依名釋義釋因緣名也言一者種子等者疏主釋云因緣之名具義不定自有種子親而能生名之為因水土人功疏而助發是故名緣言二者本無等者疏主釋云自有本無果體藉因辨之素有其分假緣而發故牙具有無二義種受因緣兩名因親緣疏故云因緣具如淨名疏述義云四者且有二釋一者上既云三故次云四耳二者疏主二遍製作論疏其一疏云四者事便故云爾而云復次者應好也談海記云言四者書此大誤也二者可好何者依下偈釋因緣義已竟今更欲出依名釋義故云二者耳言本無牙體等者述義云穀種之內雖本無牙體而種自能為因辨牙令生故云因也雖本無牙體而牙有可生之義故假穀種之緣即以種為緣故牙具本無今有二義種受生因助緣兩名也牙有可生之義與本無體之義故云牙具有無也以牙體本無而辨之能生義名因種內有牙可生義既有可生之義非當親生唯助發耳以助發義故名為緣故云種受因緣兩名也此唯就種而為言之言三者毗曇人云等者如雜心論第二卷末偈云所謂因緣者當知餘因説釋論云除所作因餘因説因緣述義云六因之中合五因為因緣準之可悉疏云又經有三説等者此第三依經論釋因緣名也述義云諸本唯云經有三説此良應脫落論之字以文既舉經論文故今文云又經論有三説是也談海記云經猶古也孝經序云經者常也是也今明經之字非名佛説亦論名經故論序云於經通之理盡也元康師云詺此論為經也如春秋本文為經後釋為傳也付法藏云提婆造百論經智度論云迦旃延造發智經故目論為經也故雖論字無亦無妨也言六因如雜心説者如雜阿毗曇心論第二卷行品偈云所作共自分一切相應報從是六種因轉生有為法長行釋云謂所作因共有因自分因一切遍因相應因報因此六因攝一切因此六因生一切有為行元康師明云所作因者從果受名因是能作果是所作即是所作果之因故云所作因也共有因者通從因果受名因之與果一時共有故云共有因也自分因者亦從果受名如後念善是前念善種類故云自分此與自分果作因故云自分因也一切遍因者用十一遍使煩惱及同時共有法為體所言十一遍使煩惱者苦諦下有七使所謂五見及疑無明集諦下有四使所謂邪見見取疑無明也此十一使名為遍者有二種義一遍迷苦集理故名為遍二遍縛有漏法故名為遍也相應因者通從因果受名因果更互相應故云相應因也報因者從果受名報是報之義此為報果之作因故云報因具明如下四緣中也述義云薩婆多宗雜阿毗曇心論十一卷西域人伊葉波羅完云自在之所譯彼論中具明六因言十因地持明者如彼論第三卷方便處力種姓品第八云云何是佛所説不顛倒因有十種不顛倒因當知攝一切因一切煩惱一切清淨一切無記等云何為十一者隨説因二者以有因三者種殖因四者攝因五者生因六者長因七者自種因八者共事因九者相違因十者不相違因彼一切法名名已想想已説此諸法名想言説是名隨説因以有事故有所作是名以有因以有乎故有所作乃至以有飢渴故有求飮食如是此無量無數名以有因種諸種子名種殖因水土潤澤是名攝因種子於牙是名生因牙莖相續乃至成就是名長因種種種子各各自生是名自種因以上六因總説共事因障礙於生名相違因不障礙者名相違因乃至廣説今略引之言四緣經論皆備等者述義云經即大品菩薩善戒經等論是大論真諦三藏所譯俱舍論等也今案俱舍論第五卷分別根品之四云偈曰説緣有四種釋曰何處説於經中説經云有四緣類一因緣類二次第緣類三緣緣類四增上緣類此中類者是緣自性此中因緣者偈曰因緣是五因釋曰除一隨造因所餘五因説名因緣偈曰心心法非後已生次第緣釋曰除阿羅漢最後心心法已生餘心心法名次第緣云何名次第緣此法等無間緣故名次第緣是故色非次第緣生不等故何以故從欲界色後時次第欲界色界無教色生彼時欲界色無流色生後時二種色生是色現前亂過因生次第緣無過亂緣生義乃至緣緣相云何偈曰緣緣一切法釋曰一切法即五聚此中如理應知緣緣相譬如眼識及相應法以色為緣緣耳識聲鼻識香舌識味身識觸意識一切法亦爾若法是此法緣緣此法無時非此法緣緣若非所緣亦是緣緣體相一故譬如薪非所燒亦名薪體相一故心及心法由入定初剎那於如自所緣境定為由依止定為不定爾定若生必與依止相應未生及已過與依止相應離餘師説若過去亦依止所立偈曰隨造增上緣釋曰隨造因即是增上緣故增上緣即是緣緣何以故一切法是緣緣故此二緣何者廣俱有法為緣緣無有是處有是處得為增上緣故增上緣廣由緣義廣故名增上緣此於一切有為法離自性皆是增上緣乃至廣説言十緣如舍利弗毗畠敘之者述義云秦姚氏世沙門佛陀耶舍秦云覺賢三藏釋舍利弗阿毗雲有二十二卷也案云應師一切經音義云姚弘始十六年曇摩崛多耶舍翻二十二卷二十二品如彼論第一卷緒分遍品云十緣謂因緣無間緣境界緣依緣業緣報緣智緣異緣相續緣增上緣乃至因謂生義如母子無間謂補處義如代坐境界謂的義如箭射的依謂物義如舍宅業謂作義如便作報謂津漏義如樹生果起謂生義如種牙異謂不相離義如眷屬相續謂增長義如長財增上謂自在義如人王乃至廣説言三因緣兩説如十二因緣者如法華經第三卷化城喻品云爾時大通智勝如來受十方諸梵天王及十六王子請乃至及廣説十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱疏主釋云且無明望行體末有而為無明所辨親起為因行起望無明我非都無但假藉汝起故無明是緣故無明亦因亦緣顯四諦品準此疏文言我者行汝者無明謂望行於無明行體未有而為無明所辨此無明生行之親義為因此行起時若望無明行非都無但假藉無明而起即此無明助發於行故無明為緣故無明具因緣二義餘準可悉述義云無明為行作因緣緣譬如穀種之內本無牙體穀種辨之令有故穀種為牙作因穀種之內雖無牙體有可生之義假穀種緣而牙發生故毅種為緣如是無明之內本無行體而為無明所辨無明親義為因行有可生之義假藉無明而起故無明疏義為緣問若爾者最後老死為誰作因緣耶答且有二一者約有始終十二因緣而為言之為憂悲苦惱作因作緣二者約無始終十二因緣而為言之與後起無明作因作緣也自餘經論亦明十二因緣準之可悉疏云此皆適化不同等者此第四和會異義也言適者玉篇尸赤反止也歸也女子出嫁也節也得也往也曇捷師法華字釋云失亦反廣雅云適悟也按稱會本心故曰適也疏云破申門第四等者此第四大段破申門於中有二番問答即為二別初一番問答明所破人後一番問答顯論主對緣初中又二即問與答答中為三初列四種異執次隨列解釋後引證結成於列異執中言摧折者玉篇上在回反阻也折擠也想也子雷反至也擠者子詣反墜也滅摧也下止烈反斷也萬物死也棄敗也截也剋也曲也下也排呵者上曇捷師云肥乖反廣雅云排斥也下玉篇詐多反責也所言外道者至妙虛通目之為道心遊道外故云外道也言毗曇者名無比法無漏慧根會理隔凡其功冠絶故曰無比也言成實者成是能成之文實謂所成之理佛滅度後九百年內呵梨跋磨此云師子鎧之所造也二百二品十六卷文四諦建章五聚明義也具明如中論玄義疏云總談外道等者此第二隨標別釋即為四別初明外道第二明毗雲第三明成實第四明大執今此第一明外道於中又二初總標二計後別列二計於邪因中凡有三種如文言一者即一因外道等如大經第十九卷云迦羅鳩馱迦旃延計一切衆生悉是自在天之所作自在天喜衆生安樂自在天瞋衆生苦腦一切衆生若罪若福乃是自在之所為作此六師中第五師疏主釋云迦旃延姓也迦羅鳩馱是其母名也其人計亦有亦無應物起見他問有耶答言有他問無耶答言無也又十二門論觀作者門引自在經説自在天欲作萬物行諸苦行即生諸腹行蟲復行苦行生諸飛鳥復行苦行生諸人天準之可悉言二者宿作外道等者如大經第四十卷須跋答佛言瞿曇有諸沙門婆羅門等作如是言一切衆生受苦樂報皆從往日本業因緣是故若有持戒精進受身心苦能壞本業本業既盡衆苦盡滅即得涅槃乃至何以故瞿曇我見衆生習行諸惡多饒財寶身得自在又見修善貧窮多之不得自在寶法師云此須跋舉宿作外道計以咨問佛彼計唯過去因能招業報但能行善則苦果不生苦果不生故即得涅槃然述義云須跋言者舉末取本也今案梁攝論第二卷云論曰或執宿作釋曰路柯耶胝柯説世間一切因唯有宿作現在功力不能感果故現在非因如世間二人同事一主俱有功力一被禮遇一則不爾故知唯宿作不關現在功力準之可悉也言三者現緣外道等者如提婆論尼揵子論師説初生一男一女此二和合能生一切有命無命等物順世外道云一切諸法地水火風皆以為體今合二外道為現緣外道也疏云二者無因外道等者如大經第十九卷吉得大臣白阿闍世王言如刺頭利誰之所造飛鳥色異復誰所作水性閏清火性熱等一切萬物自生自死誰之所造此六師之中第二末伽梨字也俱舍梨子從母立名其人計一切法自然為宗也玄義云無因據其因無自然明乎果有約義不同猶是一執故云無因外道謂自然而有等也疏云所言毗曇因緣等者此第二明毗曇宗也述義云所言二世者現在與未來除於過去謂於現在因上有未來之果性故云二世有即因果一義以因中有果故問疏第三卷云佛法內根本二部一大衆部謂因果一故變種子為牙轉少為老二上座部明無轉變義故種滅於前牙生於後少滅於前老生於後即是因果異義毗曇同上座部義成實同大衆部執準此文意毗曇立因果異義成實立因果一義所言異者因中無果義一者因中有果義何故今故今違耶答各示一義故不相違何者毗曇云木中有火性此因中有果義即約自分因果而為言之然木中有火性而非謂木是火此因中無果義即約餘因果又成實云苦集此一物以此苦果即為未來作集因故苦集是一物此因中有果義即約習因因果而為言之若約報因因果者云因果異即因果異故不相違也疏云所言成實因緣者雖不明因中本有果性等者此第三明成實宗也所言成實者如宗法師成實論章第一云成者顯立為義顯者謂出顯立者明住立昔隱今顯顯而久住故論偈言知佛法第一者是顯義也欲令法久住者是立義也四實之理名為佛法佛自已成但邪言為塞而不行於世無用詺之為壞而今此論言符正旨理更新顯於世有用稱之為成也實是真實對俗得名也言雖不明等者述義云如成實宗云以過去善惡業能生一切苦樂報故名生因依於六根而起六識故依因一念之善有於二義近以招人天之報故名報四以善善相續遠至佛果義故名智因是名三因也以因緣為生因以緣緣與增上緣為依因以次第緣為習因故云四緣也此宗立現在因中無未來果故云二世無即因果一義問疏第三卷云毗曇立三世法體恆有成實立過未無等今何故約現未立二世無耶答有人解云此即總別異耳而大意不相違今謂不爾違大義記故何者彼云問今論無二世云何無耶答過去時中無現在未來未來時中無過去現在現在時中亦無去來此三世互相無義非二世無義也二世無者是形今現時二世體自無具如第十一卷三世義然則非但違疏下文亦乖彼宗也今案成實論大義記第十一卷四緣義中云四緣者因緣次第緣緣緣增上緣以心生之所由莫不皆從此四由藉是緣義故同謂為緣也因緣者以因為緣也次第緣者能生後次第心也緣緣者謂一切諸法可為心境者是前緣義也用此緣作由藉故重云緣緣也增上緣者顯勝之義曰增上也如根與塵共生一識而根能標識塵無此用故諸根為增上緣也三因者生因習因依因也生名起成亦云本無今無此是果稱也因以感果為義則善惡業也今以果因因謂生因也習因者修習義取其同類還相生因果共名也論云如習貪欲貪欲增長也依者依託義心識為依四大等為因此亦果目因謂色為依因也疏云所言大乘因緣者如成實大乘等者此第四明大乘宗於中有二初明成實大乘宗後明地論大乘宗此文初也言成實大乘者如宗法師成實義章第一卷云真諦三藏部執論義疏云多門分別部成實論之粗宗謂佛滅度後二百年中從僧祇部出多門部但僧祇部於佛所説深義不能通達佛先為聲聞説麁淺法為菩薩説甚深法故聲聞弟子不能通達甚深法漸漸捨之有阿羅漢名悅差反云祀婆柯羅反云皮衣此在雪山坐禪不見佛涅槃時至二百年中從雪山出至央掘多羅國尋覓同行僧祇部唯知淺義不知深理彼阿羅漢驚怪此事更集僧祇部具足誦出淺義及深義深義中有大乘時僧祇部有弘所説別成一部名多門部以所聞多先所習故名多門即是悅差婆柯羅弟子成實論即從此部出故參涉大乘意也準此疏文此成實論參涉大乘意故云成實大乘也述義云成實之人述大乘義故云成實大乘又成實宗有説大乘義之處故云成實大乘也言世諦三假者案大義記第八卷二諦義中因成假相續假相待假此謂三假解云於三假中相待一假是即體假餘二種假即是用假又五陰之內分折推求而知無人故聲聞人觀因成假緣覺之人鄙於聲聞從師修學憚於菩薩久劫修行以獨入山見於水流觀於木凋悟解無常故觀相續待於生死而有涅槃生死涅槃無有自性自性無故其體是空所以菩薩觀相待假唯他宗云以相待故云有法體今云以相待故云無法體也文義聚章第二卷假名義中云一因生假亦名緣生假謂從因生果別體相應故云因生也生託緣集故名緣生也二因成假亦名緣成謂法有總別別為總因總為別果攬彼別因而成總果果假因成名因成假又攬別緣而成總果是故亦名緣成假也三相待假者長短等事相形相待以各別故名相待緣也四相續假者有為遷流藉前生後前後兩邊名之為相接對名續所言假者前後兩邊遞以相望相假成續故云相續也今案大乘玄論初卷云常途所明凡有三種假名一者因成假以四微成柱五陰成人故言因成二者相續假前念不滅續成後念前念接連故言相續假三者相待假如君臣父母大小名字不定皆相隨待故言相待假若入道所捉三乘不同聲聞用因成假緣覺用相續菩薩用相待成論三藏為宗多明因成以入道所以然者凡有二義一者因成是世諦體續待為用若體己空用即自遣二者因成多重數觀行自淺至深初捉五根以空衆生次捉四大四微以折法所以多捉因成若是續待二假即無此重故不用疏云如舊地論師等辨四宗義等者此第二明地論大乘定也述義云是取他宗以為自宗故為所破即光律師等彼云魏時道辨法師明無相虛宗泯然一相言婉環中文班曉然聰睿之徒可以無惑但餘迷情昧輒設助宣略標四宗述明真俗一因緣宗二諦諸法無有自性因緣起作以為俗諦理本寂滅以為真諦但凡夫妄情計有定性空此妄情故云色即是空後人詺毗曇宗二假名宗萬法雖殊相假而有皆無其實但有名用故名為俗此假名法體性寂滅名之為真凡假藉緣其體寂滅故云色即是空後人詺成實宗三不真宗一切諸法無有實體似同幻夢業力機關興鼓成立名之為俗俗法幻夢虛誑不實本來寂滅以為真諦幻夢色體無名無相故云色即是空後人詺三論宗四者真宗世法夢幻義非孤起託於真理離真無妄妄由真起是故經云生死者依如來藏然有二義一者世諦妄想故空理非是真二者其體真實寂滅是故名空理是真妙具明如肇論述義初卷也今案灌頂法師法華玄第十卷云佛陀三藏學士光統所辨四宗判教四宗此同也疏云如此等類等者此第三引證結成於中有三初標迷執如服甘露下正引證此論破洗下總結也於引證中言如服甘露反成毒藥者如涅槃經第七卷佛説偈曰或有服甘露傷命而早夭或有服甘露壽命得長存或有服毒生有緣服毒死無礙智甘露所謂大乘典如是大乘典亦名雜毒藥疏主釋云此中正歎大乘為甘露愚智兩人致成甘毒今言或服甘露等者此正是無方便服甘露成毒藥稟方等夭法身慧命也或有服甘露壽命得長存者此是有方便稟大乘即能長法身慧命或有服毒生下此亦明愚智二人愚服毒則死智人服毒則生然甘露更非兩物智者服愚人之毒此毒為智人甘露此甘露成愚人之毒準之可悉具明疏第八卷也言亦如入水求珠謬持瓦礫者如大經第二卷云譬如春時有諸人等在大池浴乘船遊戲失琉璃寶沒深水中是時諸人悉共入水求覓是寶競捉瓦石草木沙礫各各自謂得琉璃珠歡喜持出乃知非真是時寶珠猶在水中以珠力故水皆澄清於是大乘乃見寶珠故在水下猶如仰觀虛空月形是時衆中有一智人以方便力安徐入水即便得珠疏主釋云譬如春時者孟仲季三春正取仲春華草開敷之時為譬正是衆生放逸之時也在大池浴者即生死大池浴明衆生在於生死之中也乘船遊戲者乘於愛慢之船乘愛慢故在生死中更相愛著故是遊戲也失琉璃寶者衆生本來清淨應得而不得故義言其失也沒深水中者深水則譬四流之水也是時諸人者即是始終稟教之人始自五人爰至今大衆悉共入水謂於昔教下四流水中求覓是寶正明其行因競捉瓦石者譬其得果四智究竟餘無餘二涅槃自謂為極故云得琉璃珠也歡喜持者正明其保執前解也出乃知非真者今教出興乃知昔果非真也是時寶珠猶在水中者明此佛性復在衆生四流之下以珠力故水皆澄清者衆生當有會得之義故是水皆澄清也於是大衆乃見寶珠者此譬信見信衆生有佛性猶如仰觀者既是信見知性猶遠故言如仰觀虛空月形遠也月性圓滿譬中道佛性圓正也是時衆中有一下此譬證見猶如文殊等了了見佛性也案徐入水者遠離斷常二邊行正中道故云安也言瓦礫者曇捷師云礫者力的反通俗文云地多沙土謂礫之説文云小石也疏云問龍樹菩薩對緣云何等者此第二明論主所破緣於中有二即問與答答中又三標列結也列中言一者犢子云等者如大論初卷云是佛法中亦有犢子比丘説如四大和合有眼法如是五衆和合有人法慧影疏第一卷解云犢子執云亦不可説五衆是人亦不可説離五衆有人云此家執言實有人雖言有人仍此人都不可説故屬第五不可説法藏中攝五法藏者謂三世為三法藏無為法藏不可説法藏等也此家立此五法藏義以攝一切法悉在此五法藏中故云爾也此阿毗曇論不來他家經論但出其所執之意耳此是佛法中執見非外道也玄義云佛滅度後三百年從薩婆多部出一部名可住子弟子部即是舊犢子部也此婆羅門之一姓乃以為號也述義云由五陰合而成人體此即非是五陰之法人之道理以為法也言法者猶體也所言四大者此事四大謂堅義為地潤義為水濡溫義火動轉義風也淡海記云以四大種造眼等及一切色故云四大因緣別有眼法能造四大雖是無記而所造色通於三性謂所造色具有報色及以善惡并無作色故通三性能造四大只是報法所以無記也問能造無記所造云何通於三性耶答能造四大雖是無記而不得言所造無記如筆寫書不筆即書所以所造眼等雖通三性能造四大但是無記言二者毗曇因緣等者如大論初卷云説一切有道人輩言一切種一切時一切法門中求不可得譬如菟角龜毛常無復次十八界十二入五衆實有自性而人此中不攝疏解云此是十誦律師主薩婆多所計言三世是有故云一切有謂一切種者即是種智此家云於一切種種智慧中求人不可得一切時節中一切種種法門中求人並不可得耶譬如菟角柏然常無執一向無人故復成病也復次界入等下別歷陰界入等成人法中云求亦不可得故今為欲言陰界入等是實有法但無有人上來有此義是故別為一復次也述義云此薩婆多部此部宗計三世是有亦三無為有故云説一切有部也言三者成實等者淡海記云光宅寺法雲師云無假體假用唯有假名莊嚴寺慧旻法師云有假體假用假名開善寺智藏師云無有假體而有假用及以假名也而今云有人法者約就總相而為言之今案大義記第八卷二諦義云所以有皆假者謂大地雖廣而無體能持因色香等故能勝載既由他無自體非假云何次色香等法復因細色等成故麁細雖異賴他是一及人因五陰陰復有因如是相續相待備在假實釋也其假皆無者三假同無也既假有矣復言無者如合四微為地是因成假而地是一也微四也即四不是一四無一也離四無別一一自無也雖離四無別一即四不是一故實有此四可假之以為一似如定有有假不以假故無但推四復是假四皆即自無四法尚自無有何假為一故知以假故諸有皆無也空假名義照然有微也既因成假實空是無法體則相續相待不待言自無也言四者方廣等者如大論初卷云更有佛法中方廣道人言一切諸法不生不滅空無所有譬如菟通龜毛常無疏云此是方廣部中所執道人故云方廣道人此人雖學大乘而失大乘旨執之太過執言一切法無問假實生之與法悉皆常無如菟角無佛法中義以從緣故言諸法無從緣起故言諸法有緣起之有即是從緣無性之無即法談無非除明無一切諸法空義亦爾以此義故有不妨無無不妨有雖言有無亦復不妨非有非無雖非有無不妨有無彼一向執柏爾言無是故成病也述義云此二十部中是一説部彼部執言一切我法唯有假名都無體性名為空見方廣方等猶是大乘之異名也彼宗所言似於大乘故以為名依四阿含作如是説謂四阿含就世諦言諸法無主色欲如幻既言欲界及以色界如幻無主故知空也疏云如此四人等者第三總結也疏云同異門第五等者此第五大段明二論同異也於此中有二番問答即為二別初番問答明二論開合不同後番問答明開合所以也初中又二即問與答答中又二初明二論同謂破邪因緣申正因緣等是謂此中論與十二門同顯正道俱息戲論其理不殊也後明二論異謂合彼十二門論三門為此中論因緣一品開中論因緣一品為十二門論三門謂因緣門因門緣門故云離合為異也十二門論有七十論偈此論無有而彼論廣彼論衆緣所生法偈先有則不生偈廣略衆緣中偈合有四偈無有餘偈故此論廣而彼論略故云文有廣略以此論凡有十八偈彼論但有五偈故言此論因緣一品等者攝彼十二門論因緣門因門緣門於此中論因緣一品故云攝彼三門也謂開此中論因緣一品以三偈攝十二門論三門也言亦合彼三門等者合彼十二門論因緣門因門緣門以為中論因緣一品也如因緣門等者此釋成亦合彼論三門為此論一品之文言如諸法自性等者如論主自釋八不釋章門偈云如諸法自性不在於緣中以無自性故他性亦復無疏主釋云借於緣自互兩斥之若有自性則不假緣若必假緣則無自性若無自性云何互還從互自體生此解於偈好也此約對緣假破言為言之準此疏文今云如者猶若也今略引上半文耳言第二觀有果無果門等者此品下云若果非有生亦復非無生亦非有無生何得言有緣偈文是疏主釋云上三句總非下一句結破所以總非者先偈已破有無今不須破之直非之又因緣之法名為甚深即是中道豈得言定有定無彼今乃計於有無不計因緣此之有無乃因緣宗障故但非之言第三觀緣門等者此品下云路廣因緣中求果不可得因緣中若無云何從緣出偈文是疏主釋云此一偈第三結破也上半結下半呵責以前三偈總破為略後四偈別破為廣以廣略就緣中求果不可得當知緣中無果以緣中無果非緣亦無若二俱是無則應俱不生果是以結破也述義云廣略因緣中乃至果不從緣生四偈依疏文明知四偈皆是結破四緣又唯言結破四緣偈非謂四偈之前後有人傳云今檢疏文不爾也唯略因緣中偈非謂四偈故疏第三卷末云就初文又三初三偈總破四緣次四偈別破四緣後一偈綿破四緣又云廣略因緣中下此一偈第三結破四緣也今述義所釋者古三論師心耳非是今意也疏云問何故離此一品等者此後番問答明開合所以即釋成以此論因緣一品攝於彼三門之文於中有二即問與答答中又二初明十二門論大意後明中論大意如文可見也疏云第二明論章開合等者上來以五門釋因緣品名今第二大段明論章開合於中有二初通明天竺之與震旦數經講論方軌後別明震旦講論賢哲初中言天竺者亦名身毒亦名賢豆正名印度是月名月有千名斯一稱良以彼土聖賢相繼開悟群生照臨如月因以名也本名因陀羅婆他那此云主處謂天帝所護故言震旦者梵語此云漢國亦名摩訶支那此云大唐也淡海記云震旦者彼音此云聚集亦八卦之中震是東卦旦者日初出處也故云震旦也出辨正論第卷也有人傳云震旦者或本云振旦也俱無失也然先吉也有云自雪山以去胡音也今案玉篇振者諸胤反震者之刃反毛詩有震旦業故震字當也振字借音也如龍樹菩薩釋大品九十章經初六十六品説般若道從無盡品下二十四品説方便道此天竺直解釋也天親菩薩釋涅槃經造涅槃論云從初如是至流通灑地名不思議神通變事分純陀哀歎二品名成就種性道執分從三告以下訖大衆聞品名正法實義分五行十功德分方便修成分師子孔品名離諸放逸入證分迦葉品名慈光善巧住持分憍陳如品名顯相分此名天竺科章門也什肇生等注維摩法華經等就文道解釋此名震且直釋也安融瑤等科章門解釋此名震旦科章門也科者玉篇云口和切程也局也自也廣韻云若禾切程也條也本也品也又科斷也又苦臥切疏云如曇影制疏明此論文有四卷等者此下第二明偏約震旦列講論賢哲於中有三初列偽秦長安曇影法師説次列北土三論師説後列興皇舊説初列影師説如彼疏上卷初序云時有大士厥名龍樹爰託海宮逮無生忍意在傍宗載隆遺教故作論以折中其立言意識也則無言不窮無法不盡然統其要歸即會通二諦乃至寂此諸邊故名曰中問答拆微所以為論又以空門為經目所空為品名所空非一不可為經目空門無二不可為品目故隨所空法有二十七品統之空門以一中為名也乃至大明標極略為經體然後遂名窮名隨數遣數散其所封使歸此一理從始暨終更無異統今取意引之今案高僧傳第五卷云釋曇影或云北人不知何許縣性靈龍靖不甚交遊而安貧志學乃至能講正法華經及光讃般若每法輪一轉輒道俗千數後人關中姚興大加禮接及什至長安影德從之乃至什曰深得吾意什後出妙法華經特加深思乃著法華義疏已有四卷并注中論也乃至以晉義熙中卒春秋七十矣所言領者猶攝也言製者玉篇之世反裁也作也疏云二者北土三論師明等者此第二列北土琛法師説述義引高僧傳第五卷云釋僧道京兆人十歲出家博學轉多氣幹雄勇神機秀發乃著三論成實論義疏及空有二諦論等也出有人説云此莊法師義故高僧傳第五云荊州上明有釋僧莊者亦善涅槃及數論等宗是也但此師述僧道義耳莊法師所造中論文句上卷云自始訖終大為三段第一標八不明二諦中道以為論宗謂標宗分第二從破四緣以下立品明宗破邪顯正辨於大小二乘觀行謂釋宗分第三一偈稱歎佛德以稽首禮謂結宗分所以分為三段者佛去世後像末鈍根雖尋聖曲各執成見是以論主將欲造論破邪顯正故先立宗大明標極若先不唱玄宗而後問答即無所寄是故先標於其宗旨宗旨既明然後廣引衆經破其所執顯示中道破見既周即推功大聖顯非己能也因緣是二十七品之初標宗正是為一論之首以初攝初故論宗寄在因緣之首也邪見是諸品之末推功稱歎歸造論之終以後攝後故舵功尼在邪見之末也今檢琛法師疏第一卷云然此論大判文別有三初有四偈標論大宗四緣以下正明立品解釋末後一偈明歸功稽首所以先標宗者然佛去世後像法衆生各執異執有無並起是以聖者龍樹先開中道以為論宗若不先唱此宗即不明問答言無所寄是故第一先標大宗然宗本雖彰若不廣引衆經遣其執情者中道不顯是故第二明立品解釋但標宗解釋為論已周唯須切推大聖顯非我能是故第三明歸功稽首若就品而科則有二十七分但因緣在諸品之初標宗正是建於論首以初攝初是故標宗則落在因緣品攝邪見是諸品之末歸功復是造論之終以後攝後是故歸功即攝布邪見品廣明如彼準此疏文今云北土三論師者琛法師也言以初攝初等者述義云以因緣品攝初四偈又以初四偈攝因緣品何此論最初應在標宗品次阿毗曇立四緣偈初應在因緣品而文小故以五百偈初四偈攝二十七品初因緣品故云四偈標宗在於初品也今謂初釋非也違本文故今須後釋也言以後攝後者述義云以最後一偈攝最後邪見品又以最後邪見品攝最後一偈也是非準前也疏云師云夫適化無方等者此第三列興皇舊説也於中不更取章段直隨離以解釋言師云等者述義引興皇寺石志序云陳大興十三年歲次在辛丑九月丁未朔二十六日王宇法師遷神於寺僧房春秋七十有五其月二十八日甲戌定于江垂縣羅落里攝山之西嶺門人交住若罷市之悲幽杖離群絶分河之歎法師俗姓周氏條州沛郡沛縣人言適化無方等者宗本義云適化衆生謂之漚和元康師云適往也菩薩往入生死教化衆生令悟性空此是善權方便之智準此論文今云適者尸赤反女子出嫁也即當往訓也述義云適於物機而化度之是為方便稱會訓也言陶誘者上玉篇徒高反驅馳貌也鬱甫發反陶也養也又在缶部即陶字徒勞反陶作瓦器也廣雅陶化也今並為陶字也今須化訓也曇捷師云誘者由久反三蒼云進也字林云誘𧧷也玉篇餘手反芳字也導也教也引也勸動也言考其聖心等者述義云原夫三世如來四依大士出世之大意者為息衆生執見愚惑之病雖復宣説恆沙經教而統大意唯為開示中道實相三諦道理大論序云無執不破無義不攝巧用無非甘露掘服皆成毒藥然則息患者無執不破謂破病義開道者無義不攝謂顯道義具明如名記第二卷也擁者玉篇作壅字今壅字紆恭紆勇二反鄭玄曰壅謂隄防止水也野王案壅猶塞也障也今作拜字者非也疏云具如法華玄義等者如法華玄第一卷講經緣起中云講經之始起竺法護護公既親譯經理應敷闡自護公之後釋安竺汰之流唯講舊本而已及羅什至長安翻新法華竟道融講之開為九轍時人呼為九轍法師九轍之文今所未見講新法華始于融也自融已後曇影道生之流染翰著述者非復一焉次乎齊代有清信優婆塞㔁糾與十許名僧依傍安林一遠之例什肇融恆之流撰録衆師之長稱為注法華具明如彼恐煩略著也疏云但末世鈍根等者言末世者佛滅度後五百以後也言鈍根者慧根闍鈍也亦可信等五根亦可二十二根具明如疏下文言起盡者述義云始終也隨所明義每章有始終也言相與者肇論述義云王逸曰與猶舉也國語曰汝曲與焉賈繞曰與猶預也禮記曰與為人後者不入鄭玄曰與猶寄也傍義皆須正用後訓謂相依寄也疏曰答大聖三達圓明等者碩法師云經有三段一序二正三流通故天雨四華地動六種堂閣處空其林反白時衆既覩瑞相故前詳後集未説經前有此事故名為序説序説既彰正經宜顯故名為正説非欲止益當時方欲廣宣末代譬如一燈燃百千燈冥者皆明明終不絶故歡喜奉行即是流通説而今未造論時前無雨花動地時衆覩瑞相故前詳後集故無序説既無序説亦無正説既無歡喜奉行故無流通説而言大聖者如此論云聖人有三種一者外道五神通二者阿羅漢辟支佛三者得神通大菩薩佛於三種中最上故云大聖也述義云梵云阿梨耶此反云聖聖者正也擾亂邪僻邪見離此三邪故名為正心與境冥智與神會契理神通於事無擁是故曰聖也白虎通曰聖者通也道無不通聞聲知情故大戴禮曰孔子所謂聖人智通乎大道應反不窮能測萬物之情性者也言三達者亦名三明亦名三通亦名三戈就當相者發智應境然未發智名未來達既發智當知境時名現在達既已謝去名過去達約隨境者知三世境名為三達此二異也就當相言但是無常是故名狹約從境言通常無常所以名廣若就六通過去達者是宿命通現在達者即漏盡通未來達者天眼通也若就因果三達果位三明因位也所言鑒者猶是照也言二世者現在未來也言通別兩序者如是等六名為通序雨華動地名為別序此且約法華經而為言之餘經準之謂如是等六通諸經故名為通序雨華動地唯有是經名為別序也言智猶未逮者玉篇逮者達載反及也與也達迹也今須初訓也問弟子造論但當時解紛惑不敢傳通後世故不立流通智猶未逮故不立通別兩序者何故無畏在耶答有人解云無畏廣故隨分有之此論略故望佛故云無耳金案碩法師疏云論亦有三章然不如經中之名目但就論中三章無定有時明第一辨論緣起即明序立論意第二破邪顯正即明論體第三餘勢結論旨歸有時明初有二十五品破失大乘觀辨大乘人法空次有兩品破失小乘觀明小乘人法空後有兩偈明致敬結論旨歸準此疏文不立序通非謂無緣起餘勢也疏云答無畏廣本等者碩法師云此論有正説元序及流通所以然者明此論從無畏中抄出五百偈故唯有正説序及流通皆屬彼論故闕此二條也準之可悉疏云二者因事表理等者疏主釋云以文表義此論先無緣起後略餘勢但有正文以文表理故稱中論準此疏文言初後者緣起餘勢也碩法師疏問此論品初既標歸敬何故非序答雖辨歸敬是後人安故非論序今明此解意欲道歸敬應是序但是後人安故便非序此釋極成離見所以然者凡有兩條不可一明歸敬何必是序二明歸敬何必是後人安若言歸敬為序者論後文道瞿曇大聖主憐愍説是法為離諸見故我今稽首禮此中亦應為序而今後文雖明頂禮不名序雖辨歸敬那忽稱序箇明一義不可二者歸敬何必是後人安所以然者無文證無傳説那知歸敬是後人安耶今以一文據八不與歸敬是論主真言故釋論第五卷道不生不滅不斷不常不一不異不來不出佛能説是我稽首禮既道佛能説是我稽首禮此中八不敬歸豈非論主自標但不稱為論序問此論釋經正既稱為論正此論釋經序亦應名論序答不然今明此正論通解經三段是故不得名論序灘苦此論通解經三段通名正説者亦應此論通序三段通名序論答如此義亦應得通序經之旨即為序論通正解經之旨即名正論謙流通經之旨即名為流通諭但不可的制為三耳具明如彼疏第二卷恐煩且略耳疏云自攝嶺相承等者有疏云山門初講之日直為二段前二十五破大乘迷明大乘觀行第二後兩品破小乘迷明小乘觀行晚復開為三兩章如前第三兩偈雙結大小觀行推功還佛也述義云高麗國遼東城大朗法師遠去燉煌郡曇慶師所受學三論齊未梁始來入攝嶺山也大朗法師得業弟子陳攝山止觀寺僧詮師如此次第得業弟子興皇寺法朗師法朗師得業弟子延興寺吉藏師吉藏師得業弟子碩旻邃等然處處云山中者高麗國大朗師山門者止觀寺詮法師或言一師或言大師或直言師者興皇寺法朗師今謂不爾二諦章下卷云山中法師之師本遼東人從北地學三論遠習什師之義來入南吳住鐘山草堂寺值隱士周顒周顒因就受學周顒晚作三宗論明二諦以中道為體大品疏第一卷云止觀師六年在山中不講餘經唯講大品準此章疏文山中者詮法師亦可山中者法朗師故玄義第一卷云山中興皇和上迎攝山大師言涅槃疏第十一云山中師請止觀師講涅槃不聽準此等文山中者通二師山門者道朗師然門有三解一云初住山門故二云一師之門故三云釋法度上足弟子故所以高僧傳云齊琅瑘攝山釋法度有四弟子第一名僧朗華嚴三論最吉本遼東人也凡攝山有多處一處名栖霞精舍也館成寺一處名山茨精舍一處云有四弟子僧都繼踵先師復綱山寺能講華嚴三論等十二卷章云栖霞大朗師止觀詮法師與皇法朗師等也承者文字集略市升反相承助人君為政也時升反受也次也華苑示水反繼也今次受訓之也疏云初二十五品破大乘迷失等者碩法師疏云初有二十五品被失大乘觀辨大乘人法空次有兩品破失小乘觀明小乘人法空復有兩他明致敬結論旨歸準此疏文今言迷失者迷大乘之人法空以失大乘人法空之觀行也小乘迷執確之可悉疏云所以有三段者正道等者碩法師疏云明赴大小根緣説大小乘教但稟大則封大聞小便執小故初二十五品破大失乘觀明大乘人法空次有兩品被失小乘觀明小乘人法空為欲推功有在故第三兩偈明致敬結論旨歸而言佛在世時等者依雙卷泥洹經者七十九歲在世故彼經佛言自我為聖師年七十九所應作者亦已究竟疏主釋云釋迦文佛若道俗合論則年八十若論佛壽但為五十故智度論云十九出家三十成道言佛滅度後者周書異記云穆王五十一年壬申之歲二月十五日佛年七十九方始滅度具明佛性佛滅如下也赴者玉篇返賦反告也至也䞯也奔也洞明者上玉篇達貢反説文疾流也野王案深邃貌也道洞之洞為回字又音徒薰反敬也回者徒棟反野王案回猶通達也雙化者上玉篇作雙字所江反野王案兩偶也方言飛鳥曰雙也説文隹二牧也疏云二者為學大乘等者如十二門論觀因緣門初云問曰解摩訶衍者有何義利答曰摩訶衍者是十方三世諸佛甚深法藏為大功德利根者説末世衆生薄福鈍根雖尋經文不能通達我愍此等欲念開悟疏主釋云末世衆生下第二明造論利益又開三別此初明下利衆生於中又二第一明衆生稟教起迷第二明論主破迷造論前有四句言末世者明起迷時也佛法滅分三時一正法五百年二像法一千年三末法一萬年今言末世者非是第三時也但正法為本故以像法為末末是徴末之義優是似未故是一義若分像末亦得分三言衆生者第二明迷教之人言薄福鈍根者第三明迷教所由以不久修福慧故名薄福鈍根又明有所德視慧亦是薄福鈍根雖尋經文不能通了者第四正明起迷謂大乘人學無所得大成有所得大但就大乘中又有二失一棄本尋末二求本多迷也於中有二一但二不但凡有二種一緣但不但謂佛教是因緣不但義而稟佛因緣不但教故成有所得但也二教但不但謂佛起但不但緣説但不但二教也故大品云為新學人説生滅者如化不生不滅不如化此即但生滅是化故名但也末世不識緣教但不但故云雖尋經文不能通了我愍此等下第二明論主被述作論申經天魔為愛火所燒外道為諸見所害執小拒大謗法毀人造無間業偏執大乘撥無罪福亦現世斷善後入無間並可哀愍也欲令開悟者為此鈍根人就大乘中略解十二事開悟然衆生同菩薩不須造論若衆生實異菩薩亦不須造論正吾同菩薩於緣成異故造論具明如彼也疏云即此論云聞大乘法等者如此論初牒長行云佛滅度後五百歲像法中人根轉鈍深著諸法求十二因緣五陰十二入十八界等決定相不知佛意但著文字聞大乘法中説畢竟空不知何因緣故空即生見疑若都畢竟空云何分別有罪福報應等如是即無世諦第一義諦取是空相而起貪著於畢竟空中生種種過龍樹菩薩為是等故造此中論疏主釋云下第二序龍構造論意分為四別今言聞大乘法下第三明迷教中第二次明迷大就文為四言聞大乘法説畢竟空者第一明聞教也小乘法巾不説畢竟空唯大乘法有畢竟空故云爾言不知何因緣故空者第二明不識教意也謂稟教之流間因緣有即失畢竟空聞畢竟空即失因緣有故不知説空意也即生見疑下第三正辨起迷就文為二言即生見凝者初列見疑二章謂偏執一理故名為見猶預二途故稱為疑也若都畢竟空下釋疑謂學大乘人謂畢竟空為實故畢竟空而疑罪福是以空疑有也如是則無下釋見既是學大乘人則信大乘明畢竟空是盡理之説無有罪福既無罪福則無世諦因世諦故有第一義諦既無世諦亦無第一義亦執法有乖於假有失之世諦尚失世諦何況真諦故云遂失二諦也準之可悉疏云又三世十方佛赴大緣而説大教等者言四緣者疏主釋云且依一判如小乘見道前具煩惱性是一依須陀洹斯陀含是二依阿那含第三依阿羅漢是第四依約大乘望十回向是一依初地七地是二依八九二地是三依十地是四依也具明如序疏述義云然四依有本迹言迹四依者約小乘判是言見道前等者七方便位也言本四依者地前三十心為初依初地至六地為二依七八九地為三依第十地為四依此約定慧等不等義判之六地以還定慧末等故屬二依七他定慧等故屬三依序疏約功用無功用判之七地以還是有功用故故屬二依八地以上無功用故屬三體又肇論述義云如世親等初依菩薩如龍樹等二依菩薩如馬鳴等三依菩薩如提婆四依菩薩故玄奘傳云慈氏告唱緣阿羅漢曰彼堤婆者曠劫修行賢劫之中當繼佛位故知是第十他菩薩此就本論四依今謂不爾若就本者龍樹亦是往古如來摩訶衍論云妙雲相如來故也賢劫經云聖天佛者是提婆菩薩故亦往古如來約此義不判明依若約師位者龍樹上羅睺羅下提婆中故何以知之付法藏經云總明婆羅門造鬼名論示龍樹龍樹一讀而知次示提婆提婆再讀而知後示羅睺羅羅睺羅三讀而知知故知爾也疏云二者為小緣而申大教等者所言品初破毗曇四緣者如因緣品以七偈約總別破阿毗曇所立四緣等也言品初者猶初品也言燃可燃品等者如此論第二卷燃可燃品末後云若人説我相如犢部衆説不得言色即是我不得言離色是我我在第五不可説藏中疏主釋云執我四句所言五法藏者三世為三無為是四第五名不可説藏不可説藏者不可説有為無為舉犢子部攝一切有我也論又云如薩婆多部衆説諸法各各相是善不善等乃至如是等人不得諸法寂滅相以佛語作種種戲論疏主釋曰此部計一切法有故名説一切有部一切有者明三世是有及三無為亦有故名一切有部準之可悉言障隔者玉篇上之讓之揚二反隔也纍也塞也下説文古文隔字也隔塞也疏云又三世十方佛為二緣而説大乘等者疏主釋云始自華嚴之會終竟法華之前集為直往菩薩説菩薩行今法華會欲為回小入大菩薩説菩薩行故説是法華經故踊出品云是諸衆生始見我身聞我所説即便信受入於佛慧既稱始見我身即是寂滅道場見盧舍那身聞我所説聞華嚴之教故知自爾以來為追往之人説菩薩行又云除前修習學小乘者如是等人我今亦令得聞是經入於佛慧既云除前修習等則知自爾以前未為二乘説菩薩行亦云如是等人等以知今為回小之人説菩薩行具明如法華遊意恐煩且略疏云三為九十六種外道等者言説魔處有文者如此論第二卷本住品長行云問曰有論師言出入息眴懸反壽命思惟苦樂憎愛動發等是神相若無有神云何有出入息等相疏主釋曰即是優樓佉義故知破外道也準之可悉也疏云又三世佛就大乘中破外道等者言涅槃六師者彼經第十九卷列六師外道一名當蘭那二名末伽梨狗舍離子三名那闍耶毗羅低子四名阿耆多翅舍欽婆羅五名迦緣鳩馱迦旃延六名尼乾陀若提子疏主釋曰富蘭那者從母得名其人計斷謂無君臣父母因果之義此是撥無萬法邪見外道言拘舍離子者從母立名未伽梨者是字其人計衆生苦樂不由因得自然而有以計一切法自然為宗言毗羅低者從母立名那闍耶者是字其人計道不須修經八萬劫自然而有如轉縷丸高山縷盡則止阿耆多者是字欽婆羅麁弊衣名其人計身苦樂二分現愛苦盡樂法身出迦旃延姓也迦羅鳩馱是其母名其人計亦有亦無應物起見他問有耶答云有他問無耶答云無若提子從母作名尼乾陀是出家總名其人計業決定得報今雖修道不能中斷此六師外道佛未出世時王天下也具明如百論疏上卷并維摩經疏第三卷也言及十仙之類者如涅槃經第三十九并第四十卷列十仙外道一名闍提首耶二名婆吒三名先尼四名迦葉五名富那六名淨作七名犢子八名納衣九名弘廣十名須跋疏主釋曰初二人立邪涅槃破佛正涅槃故在前論義次先尼復論我我即是斷常之本迦葉此復論斷常二見即是六十二見之根本也富那廣出十四種根本故次迦葉後論義第六人還論十四種離與六十二見彼疑與富那同富那前論已得悟淨作梵志猶未悟故今更請佛解釋非強作離也上六仙人即是論惑第七犢子論善惡業也第八納本梵志論因果以前惑業並是未未知煩惱與身何者在前故今説此因果根本煩惱為因何者在前身為果此之根本何者在後也上來諸師以言論義今弘廣心論義直問佛能知我心念不第十須跋論等乃至廣説如涅槃疏二十卷也今佛涅槃經中破六師及十仙外道令外道悟入大乘也疏云三為大乘菩薩申於小乘等者言如法華藥草喻品有此菩薩者如法花論云三者大乘人一向決定增上慢心起如是意無別聲聞辟支佛乘如是倒倒取對治此故為説雲雨譬喻疏主釋曰大乘人者表人也一向決定表病也起如是意釋病也謂無別二乘人故稱為病此人初聞一乘經謂唯有佛乘無有餘乘遂有二失一失於緣説三二失於緣成三如是倒取者實有二種二乘有而言無故言倒取為對治此故下上來明所治此下第二出能治雖地雨是一於草木成差雖理是一隨緣成差於緣成三也藥草喻品疏云依法華論明此品來意者雲雨譬被菩薩病菩薩之人聞上來所説唯有一乘便謂畢竟無復三乘方便此即得實失權存體忘用然識權方乃悟實達用乃鑒於體既不識權亦不悟實即權實俱喪體用並亡為治此病故明雖一地所生一雨所潤而諸草木各有差別雖其理無二而於緣有五故權實義成體用方顯此經既稱數菩薩法佛所護念故令大士離凡夫二乘病及菩薩病始是教菩薩法佛所護念準之可悉疏云二十五品破大申大等者言佛知見者疏主釋云問云何名佛知見答此是般若佛性之異名正法涅槃之別目未曾因果亦非權實百是不能是百非不能非不知何以目之強名佛知見也所以歎美為佛知見者為對二乘無知見故所以明無二乘知見唯佛知見者唯佛知見是實道自非佛知見者皆非實也欲顯實道故明實知見也以無照而無不照故名為知知之分明猶如眼見故稱為見又知謂一切智即如來總相智也見謂一切種智謂別相智也此云二智攝佛智議故略明知見人知即是盡智二種生死五住煩惱悉皆清淨故名為盡智見者即是無生智因果患纍畢竟不生故名見也又明衆生佛性名佛知見佛性亦名一乘涅槃經云究竟畢竟者一切衆生所得一乘一乘者名為佛性以是義故我説一切衆生悉有佛性一切衆生悉有一乘準之可悉疏云十方三世佛出世大意等者言故四依如佛者如大絶第五卷云佛告迦葉菩薩心四種人能護正法乃至出現於世能多利益為世間依安樂人天猶如如來名人中勝為歸依處也言亦即是佛也者如大經第七卷云如上所説四人出世護持者應當證知而為依比何以故是人善解如來微密深奧藏故能知如來常住不變若言如來無常變易無有是處如是四人即名如來何以故是人能解如來密語及能説故法經云解既同佛亦即是佛也準之可悉淡海記云實行菩薩猶如佛也權行菩薩即是佛也且如地前菩薩八相成道化度衆生通於權實也流云四無明都不識大小等者所言無明者如淨名玄初卷云達緣既不悟二不二亦不了不二二故無二志則稻為無明故大品云諸法無所有如是有如是有無所有是事不知名為無明準此玄文機緣既悟大小則具二慧既不知大小故無二慧故稱無明也中論疏記卷第一之本之本建長大年七月七日於光明山往生院書寫畢朗以書寫之功廣令流布三論之教法願以緒緣之力普令利益六道之衆生云云沙門智舜春秋五十六寫本記云保元二年五月十六日已時於東大寺東南院書寫畢三論末學乘珍之又云應保二年三月十二日愚點了定多謬失歟後覽人正之云云
