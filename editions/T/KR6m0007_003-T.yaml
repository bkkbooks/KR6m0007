body:
  text: 中論疏記卷第二之末大安寺沙門安澄撰疏云先於聲聞法中下等者碩法師云下第二明赴兩根縁起説大小乘法就文爲二第一爲小心説小教第二爲大行説大法今即是弟一爲小心説小教元康師云先於聲聞法中説十二因縁者先説十二因縁生破其所計無因邪因生即如増一阿含中説十二因縁生滅也疏問前云等者碩法師云問先既言令知佛法故即應説佛法今那道先聲聞法中説十二因縁乃明聲聞法前後二文似如相反也言答凡有二意等者碩法師答此兩義一者明此聲聞義通何故爾以佛道聲令一切聞故曰聲聞既言以佛道聲令一切聞何故非佛法故斷如是諸邪見令知佛法耳二者如問尋佛本意欲開大道不説小乘故釋論云譬如須彌山王不爲小風所動佛亦如是不爲小事因縁所以出世是爲大事因縁所以出世謂開佛之知見塵訶衍正道爲衆生著小者多不堪聞大教故不稱佛之本懷便欲取於滅度故經道衆生諸根鈍著樂癡所肯我寧不説法疾入於涅槃但爲梵王慇懃致請故佛於三七日思惟曲巧就情施三乘方便前明小次辨大何故爾正道未即可階所以施三乘差別令得藉斯悟道故前於聲聞法中説十二因縁准之可悉言依此義即具三輪等者有人解云然三種法輪文證者如法華疏第四卷方便品云知第一寂滅者根本法輪以方便力故者枝末法輪雖示種種道其實爲佛乘者攝末歸本法輪又化城喩品疏云如五百由旬等者三世諸佛有三種法輪一根本法輪謂一乘教二枝末法輪於一説三三攝末歸本謂攝入一私案云方便品約一代取三種法輪化城喩品約三世顯三輪不挾華嚴也疏聲聞有四種如法華論説等者如彼論云言聲聞授記者聲聞有四種一者決定聲聞二者増上慢聲聞三者退菩提心聲聞四者應化聲聞今取引之言一決定聲聞等者此本乘聲聞故疏主釋云一本乘聲聞始即發聲聞心終證聲聞果言二退菩提心等者此非本乘聲聞故疏主云二非本乘聲聞開爲二人一本是縁覺發縁覺心行縁覺行中間値佛因縁得轉名聲聞即通業是也二本是菩薩退取聲聞即身子之流今是第二人問身子何故退大取小耶答身子本是小乘也得燸頂次捨小乘大六十劫行菩薩道後値乞眼故還捨大取小故優婆塞經云舍利弗於六十劫行菩薩道因施眼故大行難成退求小果也述義云以有二事故大行一者久習放逸煩惱因縁故二者久殖愚癡之業親近有所得惡知識故如合利弗行菩薩道時修布施從來求者施與不逆有婆羅門乞眼童子即桃與之雖於汝身有用面於我掌無用以脚踐壞因此退之即十信中六心以下退爲二乘瓔路本業經云淨日天子法財王及舍利弗不能入七位者正此十信發心位耳而基法師引優婆塞經云十六劫者誤寫字焉言三増上慢等者此明於小乘内自復有失也實未得小乘道果語得小乘道果故故名爲失也問此三世中何世失耶答且今於現在世値釋迎佛修習小乘末得小果謂小果復謂此果以爲究竟不受大法故是現在失又有二種増上慢一者未得小究竟謂得小究竟是小乘増上慢二者保此妄情復不進求大乘謂大乘増上慢此人已得小果但小果望大乘非究竟但有大中増上慢無小中慢亦釋出家二衆同有増上優所以然者出家二衆專心道果多獲禪足故得四禪時謂得四果名増上慢有人言慢中之増慢中之上名増上慢今明増上是増勝之法未得増勝之法謂得増勝之法恃此自高名増上慢問與邪慢何異答眞諦三藏云都未得聖法而恃怙邪法以起慢名爲邪慢若得少許法如得四禪等謂是究竟名増上慢言四應化聲聞聖者如攝大乘論云諸大菩薩及佛等化示聲聞皆引實行悉向大乘故富樓那等即其類也此有二義一讃揚大乘二引諸小行謂欲顯菩薩道高二乘行劣令菩薩進求大道不退取小乘亦令小乘人深自鄙劣捨小求大具明如法華疏并淨名玄也疏所以名聲聞法者此欲明聲聞菩薩兩藏相對等者如淨名玄第七云二藏兼有三雙一聲聞藏菩薩藏此從人立名二大乘藏小乘藏從法爲稱三半字滿字就義爲日此三猶一義耳問説何法名聲聞藏答説二乘法皆名聲聞藏問既説二乘法應名二乘藏云何名聲聞藏答以立二藏意但取大小相對以小義爲聲聞藏以大義爲菩薩藏案大義記初卷三三藏義云三藏者聲聞學法也釋迦之教凡有三種一是大乘名方等等經二是小乘名三藏經依准此文聲聞學法名聲聞藏菩薩學法名菩薩藏所言藏者蘊畜苞容也道基師云通名藏者苞含蘊積攝藏諸義名之爲藏故攝論云此三及二云何名藏由能攝故此攝何法一切應知義准之可悉疏問小乘等者此間意何故唯云聲聞藏菩薩藏非謂縁覺藏佛藏耶言答立二藏名者此是立教名也等者如玄云答凡有二義一者立菩薩藏大小相對菩薩藏中具有佛法即是佛藏二者示菩薩禀佛數偏立菩薩藏聲聞藏中亦有縁覺示聲聞禀教偏名聲聞藏人從多爲論聲聞因果二時皆禀教縁覺因人藉教果人自然悟道是以但名聲聞藏不名縁覺藏又云縁覺亦是小乘故云聲聞藏故地持云説聲聞縁覺法名聲聞藏問聲聞藏非但説二乘法亦説菩薩法云何屬聲聞藏答小乘法説於菩薩屬聲聞藏若以大乘説菩薩法即屬菩薩藏小乘法中明菩薩從凡得聖教即未圓理不具足故名聲聞藏大乘法中明菩薩教圓理滿名菩薩藏又小乘法中多明二乘法少説菩薩法如大論云三藏中廣爲聲聞説種種法不説菩薩行其中本末經爲彌勒授記亦不説菩薩行故知明菩薩法少以少從多名聲聞藏不名菩薩藏具明如淨名玄第七卷也疏法華經言等者如彼經第一卷序品文殊師利答成就中云爾時日月燈明佛演説正法初中後善乃至爲求聲聞者説應四諦法度生老病死究竟涅槃爲求辟支佛者説應十二因縁法爲諸菩薩説應六波羅蜜令得阿耨多菩提成一切智疏主釋云爲求聲聞者第二明三乘教古佛之縁有不堪受一故於一説三依毘曇宗三乘行行乃異而同見四諦以成三乘果依成實宗三家同見一滅諦以成三乘果言縁覺觀因縁者此是因時習觀悟道遠縁耳依大乘三乘同觀實相故正觀論云得實相者有三種但根有利鈍見空淺深故開三也今文云説應四諦法者機教相稱故言涅槃經云十二縁河等者此涅槃經第二十七卷文具引經文如記第一卷今取意略引之問淨名玄第四卷云若爾涅槃經中説三乘人同觀中中應是三爾通教耶准此玄文彼涅槃經是三乘別教然今云何言是通教耶答今云通教者十二因縁是三乘人之所通觀故云通教照涅槃經是通三乘法之教故云通教若不爾者法華經是獨聲聞法謂彼約能觀智言別今約所觀境言通各擧一義故不相違也言又十二因縁等者案碩疏云若使順觀十二因縁即成苦集若使逆觀十二因縁即成滅道故四諦不乖十二因縁十二因縁不乖四諦也述義解云四諦是名略體廣十二因縁是名廣體略何者十二因縁唯是世間法四諦之中苦集是世間法滅道是出世間法故然以十二之還滅義即是滅道故名十二即四諦也疏問乃知教等者所言乃猶止也而也爲者有也在也言答夫論設教等者尋問意有二今答亦有二初答所以就通而不取別也次言若説四諦等者答所以辨因縁而不辨四諦而言經云衆生病有三種等者案大經第二十五卷徳王品云佛告高貴徳王菩薩言譬如良醫先觀病根謂風熱水有風病者授之蘇油熱病之人授之名密水病之人授之薑湯諸佛菩薩亦復如是知諸凡夫病有三種一者貪欲二者嗔恚三者愚癡貪欲病者教觀骨相嗔恚病者觀慈悲相愚癡病者觀十二因縁相今略引之疏問經云等者案大論初卷云問曰佛經中説十二因縁甚深如佛告阿難是因縁法甚深難見難解難覺細心巧慧人乃能解愚癡人於淺近法猶尚難解何況甚深因縁人云何言愚癡人應觀因縁法答曰愚癡人者非謂如牛羊等是人欲求實相邪心觀故生種種邪見也准此論文今此一番問之與答取大論文路引之也述義解云經者涅槃經故彼經第二十七卷云佛告師子孔菩薩言十二因縁不生不滅乃至非因非果故常恒不變以是義故我經中説十二因縁其義甚深無知無見不可思惟准之可悉所言世智辨聰者案法宗原云八難者一者地獄二者傍生三者餓鬼四北倶盧五無想天六世智辨聰七佛前後八盲聾瘖瘂也不能入聖及離染故名之爲難也於八難中世智辨聰以大地法中邪慧爲性自餘七難皆以異熱無記五陰爲性准此今言世智辨聰者八難中一也言答智度論釋等者案彼説第十八卷云復次能如是因縁法者不見有一法定自在無因縁而生一切法不自在出屬因縁生有人雖見一切法從因縁生謂爲邪因縁生邪因縁者微塵世性等是故不見無因縁生今取意略引之疏問云何等者言上來諸計凡有五句等者案有疏云就此文中凡有五句言有如是謬者第一句明九十六種所計凡有異佛法者皆是謬望前即總結八計皆謬也墮於無因邪因者第二句明一切外道所計雖復無量出無因邪因以無因邪因攝外道所計盡也斷常者第三句亦束一切外道有異佛法者皆墮斷常無有離斷常故也邪見者第四句一切外道凡乖佛道者皆不正爲邪見也種種説我我所者第五句此之一句外計復准此疏文今言以不識因縁等者爲破第一句邪謬故説因縁也言過去二因等者爲破第二句無因邪因故説因縁於中有二初爲被天因説因縁謂從過去無明行業二因有現在識名色六入觸受五果從現在愛取有三因生老死兩果故非無因而破外道自外然生執是明有因生果破彼無因問何故過去無明爲本現在以愛爲本答婆沙云無明有四事一通縁漏無漏二通縁爲無爲三是遍使不遍使四通縁自界他界是故在前愛但縁有漏但縁有爲但不遍使但自界縁所以在後愛雖不通四事生未來苦爲勝故説爲未來本問無明與愛同是煩惱何故名字不同答過去煩惱已謝用相既隱故但從無他受稱名爲無明現在用相顯目之爲愛也案問法師章云十二因縁二世流轉是大乘義三世流轉是小乘義此説不爾十二因縁經説十二因縁二世流轉者是小乘義從阿含中出非大乘教何以知之此小乘經者且有三義一經縁序同阿含經中諸比丘等在於一處論陰等義如來即至衆中爲説陰等此因縁經序亦同二所爲從衆是諸比丘非菩薩故三此絶所明十二入支義雖説二世生滅輪轉不説因縁甚深實相若定判無明行是能引識名色六入觸受是所引愛取有爲能生生老死爲所生十二因在過去兩果在現在者即有無未來世過若十因在現在兩果在未來者即有無過去失爲離此二邊愚夫故過去立二支顯不常未來立二支顯不斷現在立八支顯中道今乃以正爲邪用邪爲正是失中之失也准之可悉言此十二因縁等者第二爲破邪因説因縁謂此十二因縁即正觀之方便説故非是邪因縁破彼計自在天生等之邪因也言十二相生等者爲破第三句斷常等説因縁也案琳疏云正以二自謝往即過去非常兩果當續即未來不斷但説過去已謝即知現在三因非常明未來當續即知現在五果不斷故論云但説過未巳知現在也又復二因雖謝能生現果三因今續當報必續正以因能生果豈容有斷果爲因生可爲生此則破前斷常二見准之可悉言若見十二等者爲破第四句邪見故説因縁也言故四諦品云等者案此論第四卷觀四諦品末偈云是故經中説若見因縁法即爲能見佛見苦集滅道今略引之疏主解云偈中略明見因縁有二種利益一者見人即是見佛次明見法即見四諦故長行云見因縁即見法身者因縁即是寂滅性寂滅性即絶四句超百非故如來以寂滅爲法身見四諦者見寂滅因縁即見苦集見因縁寂滅即見滅道故涅槃經云見縁起爲見法見法爲見佛見佛見佛性是今論所引准之可悉言但有十二不同等者此破第五句説因縁也彼計有我故即是有我所今以十二支推我不得故無我既無我亦無我所也琳法師云十二因縁爲三道謂煩惱業苦更相因縁不得自在即滅我我所二見謂過去無明現在愛取名煩惱過去行現在世有名爲業道現在五果未來兩果名爲苦道准之可悉疏云又爲已習行有大心者下等者碩法師云下第二爲大行説大法若使了前後爲小乘説十二内縁亦不須説大乘十二因縁何故爾明教本爲縁縁病既除教藥亦廢但爲小縁對執住小作生滅解故今爲對小乘生滅辨大乘不生滅就文爲二第一明稱教之縁第二明稱縁之教初中文有三句只是一意文有三句者一是已習行二是有大心三是堪受深法只是一意者由已習行故有大心由有大心故堪受深法是故交結相成也琳法師云下第二引小歸大中有二初正明説大第二如般若已下引經爲證前中復二初觀機大小明堪與不堪第二正明對機授法也元康師云下第二明爲諸菩薩説大乘經也文亦有二先辨縁教後辨教縁也言答前明邪感正應等者疏疑云以外道邪爲感佛爲應若爾邪感即是能感義若此邪能感者五逆四重等亦應感佛解云例邪見既感五逆四重亦感也問五逆四重等此是障佛云何能感耶答惡有二種一有可轉義二無可轉義若有可轉義即感若無可轉義故感約善亦爾今此中約可轉惡故惡能感佛故大論云罪將滅福將生爾時見佛聞法即是此義言故望法華經意等者如彼經第五卷涌出品云爾時世尊於菩薩大衆中而作是言乃至是諸衆生世世已來常受我化亦於過去諸佛供尊重種諸善根此諸衆生始見我身聞我所説即便信受入如來慧除前修習學小乘者如是之人我今亦令得聞是經入於佛慧疏主釋云下答所化問就文爲兩初明直往菩薩易可化度始見我身聞我所説者即華嚴之會諸菩薩等聞説華嚴即入佛慧除前修習學小乘者明迴小入大之人大機未熟從華嚴之會竟靈山之前未得顯教大乘故簡除之如是之人下第二明迴小入大菩薩大機熱今化得之故名易度亦稻入於佛慧故知法華即是華嚴不應謂華嚴理深法華義淺然直往之人初見佛身即得領悟故佛無疲勞迴小之人經四十餘年方便得入道應有疲勞但今取始終皆得悟入道總名易化無疲勞也今取意引之疏云已習行者等者碩法師云此有二義二者久殖善根已修正道但爲中忘斯事今將根發故堪聞大乘二者既修學小乘已久今時大根將發故須爲説大阿須爾時因小得大佛説小欲令悟大所以先爲説小今次説大也琳法師云初中牒前捨外歸小故稱已習行也元康師云久行大道久殖善根故云已習行也言故法華云等者彼經第一卷方便品比丘偈中第二明昔説大乘教意偈文所引之文全同故不更記疏主釋云有佛子心淨者第一歎菩薩現在早有堪聞之徳即顯聲聞聽有堪聞之義離凡夫二乘有所得心稱淨也柔軟者有無所得信心順從諸佛不違大乘如涅牛皮易可屈折利根者信爲其始慧爲其終略擧五根之初後也又是大乘法海信爲能入智爲能度故擧此二也無量諸佛所下第二歎菩薩早習大因値佛既多修行亦積即顯聲聞修大乘因晩也言柔軟者曇攝師字釋云上如周反下柔變反通俗文云鐡爽曰柔物柔曰軟也又木曲直柔廣雅三柔軟弱也准之可悉疏云有大心者等者碩法師云如般若經明菩薩有大心不可壞如金剛能爲畢竟衆作上首既道有大心不可壞如金剛箇即是菩提心菩提心者名爲佛心能了初後不二佛菩薩平等即是大心有大心故堪受深法耳琳法師云簡異定性聲聞不堪受大若機縁不定終會一乘故云堪受深法者元康師云發大乘心故云云有大心也准之可悉疏云堪受深法者等者琳法師云久殖大根現起大欲如斯之人方能堪受大乘深法也此彰根欲相應即能受法也言雖發大心等者此顯法器不足之人何者或過去有根而現欲不生或現雖有欲而過去無根或根大而欲小或樂廣而機狹如此等人現在雖發大心不堪受深也言言故大品如化品云等者如彼經第三十九卷須菩提言世間法是化出世法謂四念處乃至十八不共法并諸法果及賢聖人亦是不化佛告須菩提一切法皆是化若法有生滅相者皆是變化若法無生無滅謂不誑相涅槃是非變化爲新發意菩薩分別生滅者如化不生滅者不如化若新發意菩薩聞一切畢竟性空乃至涅槃亦如化心即驚怖今取意略引之疏云以大乘法説因縁相下等者碩法師云下第二明稱縁之教就文爲二第一正明爲大行説大乘法第二擧佛言爲證也言以大乘法説因縁相者標所謂一切法下釋謂以大乘法説因縁相其相若爲所謂一切法不生不滅等今明大乘無別不生不滅只前生滅者不生不滅即是大乘不生不滅也琳法師云下第二對機授法言大乘法者汎論有三一謂心性眞如不生不滅稱曰性乘即自性住佛性二依性起行會於本實名曰隨乘稱爲引出佛性三本性圓顯名爲法身方便行滿成應化二身名曰果乘亦爲至得果佛性性是所乘行爲能乘性是能運行爲所運能所相依終至極果號爲大乘但説因縁不生不滅等唯是性乘若據依性起行終成至果即備有三種也説因縁相者前爲小乘人説因縁直明因果生滅三世所今爲大乘人辨因縁實相始從無明終至老死不生不滅畢竟空寂以爲大乘深法也元康師云下第二辨縁教也先爲外道計無因邪因生故説十二因縁生今爲菩薩宜聞不生不滅故説因縁不生不滅也言大乘者大集經經第十卷實女品中佛答須菩提云具乘廣大故名大乘乃至廣説所語等者十二因縁先後相續不可言生滅等既不生滅是故言空也言故大品經云等者如彼經第二十六卷云菩薩行六度時見衆生有三乘當作是類我作佛時令我國土衆生無二乘之名純是一大乘乃至復次須菩提菩薩摩訶薩行六度時當作是念雖生死道長衆生性多爾時應如是正憶念生死邊如是虛空衆生性邊亦如虚空是中實無生死往來亦無解脱者大論釋云生死無邊如虚空衆生性無邊亦如虚空以是事故生退沒心佛教是菩薩正億念生死雖長是事皆空如虚如夢中所見非實長遠不應生厭心衆生雖多亦無定實衆生度亦不難今略引之言畢竟本無所有者碩法師云結成八不也若使他人所釋世諦不空眞諦即空生死不空涅槃即空此非畢竟空今下絶生死上怡涅槃皆畢竟空無所有此即了達十二因縁之深底言答涅槃經云等者如彼經第二十三卷云如彼駛河能漂香象煩惱駛河亦復如是能漂聲聞縁覺唯佛菩薩能得底故故名極深乃至所言底者名爲空相今略引之碩法師云有是凡夫順觀十二因縁欣生滅若是聲聞逆觀十二因縁欣滅生此如菟馬度河不能得底菩薩不爾觀十二因縁不生不滅不一不異等畢竟空無所有故能得底耳述義云既以二乘喩菟馬故宜以菩薩喩香象也疏云如般若中説下等者碩法師云下第二擧佛言爲證無盡品説也琳法師云下第二引經證成如大品般若無盡品中佛説癡空不可盡乃至老死空不可盡也言道場者即是菩薩初欲了悟即詺此爲道場也元康師云下此即般若經文但有廣路之異耳有疏云如般若下此文證前二義一者證是大乘非小乘二者證是了義非不了義也言引大品無盡品者大品經第二十九卷有此無盡品次當第六十七亦云不可盡品也其引經文如記第一卷也言問此論等者玄談云先依四部大經華嚴大品涅槃大集四部小經維摩思益佛藏無行方入文門准此文也只引八部大乘經此趣引耳非只八部通申一代聖教故也言答智度論云等者如彼論第一卷云問曰佛以何因縁故説摩訶般若波羅蜜經答曰佛於三藏中廣引種種諸喩爲聲聞説法不説菩薩道唯中阿含本未經中佛説彌勒菩薩汝當來世當得作佛號字彌勒亦不説種種菩薩行佛今欲爲彌勒等廣説諸菩薩行是故説摩訶般若波羅蜜經今取意略引之慧影師云答曰下第二明論主既欲釋此經宗致就中有三意言佛於三藏等者第一明小法不説大義何者果不孤成必由其本本者是何謂六波羅蜜是法身之本業行所以創言也三藏各有十萬偈三百二十萬言合有三十萬偈九百六十萬言爲三藏經體周稱藏者以蘊積爲義明小不説大蘊積大義故名爲藏言唯中阿含下第二明説當果不説因義四阿含中増一阿含者即是短阿含其中明事短但一一事増故云増一若其中明事長者名長阿含經明諸事故名雜阿含明事處中故言中何含而中阿含中多明本末於此本末經中説授記事故云阿合本末經也言佛今欲爲下第三結答今案成佛經疏云中阿含第十三卷云佛在波羅奈鹿園中時阿那後説本事云以一鉢食施辟支佛故我七反生天爲天王七反生人爲人中王於是佛告諸比丘阿那律説過去事我亦因未來事説法仍説未來人壽八萬歳時此閻浮提極大富樂時有輪王名螺捨界修道得羅漢果時世當有佛出名曰彌勒如我無異時阿逸多在中白佛我於未來可得成佛名曰彌勒耶准之可悉言即般若是大乘之始等者經遠義中云又佛成道五年説十萬偈般若備明二空七年爲大菩薩説般若明色心皆空准此文也今云大乘之始正對小乘者約般若之名通故云大乘始非謂大品般若正對小乘之大乘始故大論云般若非一時一會之説也言般若明於二道等者如大論一百卷云菩薩道有二種一者般若波羅蜜道二者方便道先屬累者爲説般若波羅蜜體竟今以説今衆生得是方便竟屬累有人解云但龍樹菩薩對八十九品經而造論故應言六十五品明般若道二十四品明方便道然今疏主對九十章經而製疏故云六十六品明般若道彼無盡品已去二十四向明方便道而二本不同者第十四富樓那品開爲二品謂樂説品辨才品新譯大般若經合云六到彼岸品也述義云言般若者鑒虚照實之慧言方便者清淨巧用之智先言般若非無方便爲顯般若而止方便後言方便非無般若爲成方便而止般若二道既彰因果萬行無不統攝也言蓋是三世諸佛等者案淨名經下卷觀佛道品智度菩薩母方便以爲父一切衆道師無不由是生疏主解云實智内照爲母方便有二一解空而不取證二別物令得悟故稱爲父也佛與菩薩竝是導物之師由此而生准之可悉言故智度論云等者如彼論第四十八卷云譬如王來必爲營從雖不説從者當知必有摩訶衍亦如是菩薩所行爲求佛道隨縁説法如是無世無量經皆名摩訶衍此諸經中般若波羅蜜最大故諸餘明道法無般若和合即不能至佛今略引之言昔江南大令般若師等者述義云即任僧正大令法師是也言山中大師者述義云昔高麗國大朗法師宋末齊始往燉煌郡曇慶法師所學三論而遊化諸方乃至度江住岡山寺弘大案義乃入攝嶺停止觀寺行道坐禪今謂可是止觀寺僧詮師故大品疏第一卷云攝山止觀寺師六年内常住山中也二諦章下卷云山中法師之師本遼東域人從北地學三論遠習什師之義來入南呉住鐘山草堂寺亦可興皇寺法朗師名山中師故涅槃疏第十二云山中法師請止觀師講涅槃不聽師立以無所得爲經宗也疏云觀十二因縁如虚空不可盡等者琳法師明彰菩薩所行之道也然因縁之法離生離滅空無分別故云如空諸佛齊證出生衆徳恒性無滅稱爲不盡也言一者十二因縁等者述義云十二因縁喩如虚空無邊際故名如虚空十二因縁如虚空故十二名實相也有人解云然十二因縁有三一凡夫所觀是有生滅二二乘所觀是還滅三菩薩所觀從得無生忍乃至坐道場菩薩所觀是故説十二因縁如虚空不可盡以觀是因縁不墮斷常而得中道囑累品釋論云諸法實相有種種名或名空乃至或名無上菩提此中説諸法實相名空行如一切聲聞弟子中須菩提空行最勝如是佛菩薩空行勝出二乘以智慧分別利鈍入有淺深故名皆得諸法實相今以此文推此疏所引是指畢竟空及二空行而云十二因縁空即實相更無他釋也言故無盡品云等者如彼經第二十九卷屬累品云佛告阿難過去諸佛皆學般若波羅蜜得度彼般若波羅蜜故不盡未來世諸佛亦學是般若波羅蜜故得度是般若波羅蜜故不盡現在十方諸佛皆學般若波羅蜜得度般若波羅蜜故不盡今取意略引之述義云然此引文雖在彼經屬累品而明不可盡語勢近故擧無盡品耳有人解云今此疏所引雖實是屬累品文而先品略擧後品問答廣釋先品是故二品同意今取同意義故云無盡品耳言二者實相等者碩法師云假名説虚空有取虚空不得故虚空非是有無取虚空不得故虚空非是無十二因縁亦如是准之可悉言三者二乘等者琳法師云又凡夫無知隨而受生二乘少悟滅而取寂今明諸佛菩薩如法性而解不斷不隨不斷故不同二乘所誼涅槃不隨故不同凡夫流轉生死所以常行生死涅槃而不著者良以悟因縁實相不可盡也今云坐道場者然其菩薩久行大法心無分別契理圓極乃至擧足下足毎遊斯旨稱坐道場也疏云佛滅度後等者碩法師云下就此長行本開爲二第一明佛出世説經之意此文已竟今罷第二明菩薩出世造論之意就文爲二第一明佛滅度後迷教失旨之縁第二明菩薩爲此迷縁所以造論申教就初後復四佛滅度後下第一明迷教之時節次人根鈍第二辨迷教之意次深著諸法下第三辨正迷大小乘教次即生見疑下第四辨迷大小乘教故生見疑兩使也琳法師云下第二彰佛感盡化終感應歸眞衆生鈍根迷教起執文中有三第一明時節次人根轉鈍下第二彰迷教所以次深著諸法下第三正明起執也元康師云下第二明龍樹出世縁經造論文亦有二初明教縁次龍樹菩薩下後辨縁教初中可有三釋一者總明小乘執有不信空故通爲一段二者開爲二段初明毘曇論師執有次開大乘法下後辨方廣道人執空亦可先明小乘人先執有後明小乘人反執空執也三者分爲三段初明聞小乘教執有疑空次明聞大乘教執空疑有後雙結空有兩失也言解佛滅不同等者今先定佛生年并成道滅度年月然後頭部執不同述義云如釋迦佛初生月日諸説不同因果經云四月八日明星出時降神母胎乃至十月滿足於二月八日日初出時無憂樹下從右脇生費長房三寶録曰周第十五莊王九年癸已四月八日降神摩耶之胎至於十年甲午二月八日右脇而生已上二説彼意全同西域傳云吠舍佉月後半八日誕靈此文亦應二月八日出胎而彼記云當三月八日也灌佛經云十方諸佛皆用四月八日夜半明星出時生等然以四月八日爲大乘義宜應須之二月八日爲小乘義因果經等是小乘故又佛入滅之日四解一者二月十五日中夜涅槃如大經云二月十五日臨涅槃時二者三月十五日涅槃西城傳云佛以生年八十吠合佉月後半十五日入涅槃當此三月十五日也天竺俗法從此間正月十六日至二月十五日乃爲制恒羅月此是正月從此間二月十六日至三月十五日爲吠舍佉月此是二月以此義故大經中云二月十五日此依天竺二月十五日若依大唐即是三月十五日也三者四月八日涅槃兩卷泥洹經云佛以四月八日生乃至八日滅度灌佛經云十方諸佛皆用四月八日夜半明星出時般泥洹四者大毘婆沙云佛於迦栗底迦月白半八日夜半而般涅槃此有二解一云此是大唐八月八日於十二月中第八月名故一云此天竺月次第月即當大唐九月八日西域傳曰説一切有部即佛以迦剌底迦月後半八日入般涅槃當此九月八日然以二月十五日爲大乘義餘皆小乘説耳法寶師倶舍疏第一卷云定成道日者依長阿含經第四云八日如來生出家成菩提取滅度次下文云二月如來生出家成菩提八月取涅槃灌佛經云佛告諸人天十方諸佛皆用四月八日夜半時生出家成道而涅槃諸經八日皆同説月有異唯二四別不言餘月准上二説雖有異成道月同所以得知略有三理一以立正異故婆羅門國以建子立正此方先時以建寅立正建子四月即建寅二月故存梵本者而言四月依此方者即云二月根本同故轉法輪日諸説不同諸經中錯二月爲四月者由建正不同故錯八月爲二月四月者以迦栗底迦是建八月卯星之名二月又是建卯地之月星他雖別卯名同也若知迦栗底是酉地之卯翻爲八月若謂迦栗底迦震地之卯翻爲二月四月由此轉法輪日有二四八月不同般涅槃日有八四月之異詳多理教度五比丘爲定故知定是八月八日轉法輪也涅槃疏第一卷云小亮師解俗有四時佛法唯有三時於三時中夏即大勢冬即過寒唯有春時暄暖調和暄凉中適是故正取春時二月涅槃也若依經判者二月名春腸之月百獸孚乳衆生多起常想爲破衆生常樂想故故二月涅槃又明此時百卉萠芽開發即明衆生善根増長故取此時也若依月藏天子經云今年二月十五日唱告至來年二月十五日方入涅槃故犢子梵志七日後方寄消息也又云佛亦如是五十年在世而今一旦便欲入滅也又出眞諦三藏記云住八十年教化聲聞住壽一劫教化菩薩又出舊説云佛昔初成道不欲説法而欲涅槃乃至於是梵王稽首請佛即受請轉于法輪五十年在世今者已後唱滅也第三卷從鹿薗至𬳥林以前五十年中病無常也又法華疏第五卷云如釋迦文佛壽若道俗合輪總有八十歳若論佛壽但爲五十唯此等文佛周照王瑕二十一年癸寅四月八日降神摩耶之胎至於二十二年甲寅四月八日日初出時無憂樹下從右脇生周穆王滿二年癸未之歳四月八日佛年三十成道以同年八月八日爲五比丘説法穆王五十三年壬申之歳二月十五日夜半入涅槃初後總合七十九歳故雙卷泥洹經云佛言自我爲聖師七十九所應作亦已究竟又智度論第三卷世尊以偈答言我年始十九出家學佛道我出家已來已過五十歳惠影師云我二十九出家者此字錯十九當是巳過五十歳者從出家來至十九入涅槃不滿六十正是其義又涅槃疏第三卷云如來有三時學一者是未出家時藥羊車詣師所求學書時名爲學二者出家六年就阿羅等二外道學八禪定第三時即是捨至樹下六年苦行也信解品疏云如來成道八十滅度其中五十年説法此經次隣涅槃故壽量品云於伽耶成道至今四十餘年諸師竝云四十九年説法華經今明若説法華必是四十九年即佛非十九出家三十成道何以知之若十九出家三十成道即出家已後經十二年而經及釋論云踰城之夜生羅睺羅若爾故知十二年耶又經皆言六年苦行若十二年者其間復何所爲耶以推之非十九出家處而四十成道若必十九出家者即二十五成道壽量品應云五十餘年不應言四十餘年也今依釋論引經云我年二十九出家若爾即三十五成道而壽量品云四十餘年即會其文也若言經教不同適縁而見者斯即時節不定也既隣次涅槃如臨終義也言一百一十六年等者案眞諦三藏所譯部執論云佛世尊減譬如朗月隱頞悉多山過百年復更十六年有大國名波宅利弗多羅王名阿輸柯閻浮提有大白蓋覆一天下如是時中大衆破散分成兩部一大衆部二上座弟子部也中論玄云如來二月十五日入涅槃諸聖弟子四月十五日於王舍城耆闍崛山中結集三藏爾時即有二部名字一上座部謂迦葉爲上座所領惟五百二大衆部界外萬餘大衆婆師波羅漢此出涙云爲主但有名字未有異執百十六年外有舶主兒名摩訶提婆端正聰明作三逆罪後入佛法凡有二事一者取諸大乘經内三藏中釋之諸阿羅漢集法藏時已簡除此義而大衆部用此義上座部不用之由爾起諍遂成二部面大衆部執生死涅槃皆是假名上座部言生死涅槃皆是眞實准之可悉疏宋代二師等者言𮝌城竺僧弼作丈六即眞論云等者案彼論云問且若皆即眞何故見異答曰或者不同心水各各異天各受其所異者故不知滿異之即同理故宜然復何怪哉夫水以既異故受者百品其實一矣焉無有二也但萬物各信其所受故不知其一耳何以言之譬月麗天宮而萬江倶受清濁不同故所受各異感應不同亦若是也問曰聖人以無心爲宗身一爲未宗既妙則與物絶故化以接麁爲之不難何如眞化未若其於一也答曰爲不難而易故聖人無爲如此雖功高理妙而玄應普因然則縁盡則應潜非水竭則像隱像隱故而不見者不可謂之無也而好異之人徒見其竭不知其像隱徒覩其化滅不知其即眞可不哀哉可不哀哉然則像因水見像則謂之生水竭像隱謂之滅細而求之無生無滅餘信久矣乃至廣説今取意略引之而言彭城竺僧弼者案高僧傳第五卷云釋僧弼本呉人性度虚簡儀止方直少與龍光曇幹同遊長安從習受學愛日借力竭有深思什加賞特深使頒預參譯後遊歴名邦備瞻風化時有請弼爲寺主乃至止彭城寺宋元嘉十九年卒春秋七十有八矣廣讃如彼也述義云宋文帝時人也言如月在高天等者華嚴經第三十七卷中普賢菩薩言佛子設有日出照明世間諸淨水器影無不現若水器破日影不現佛法如來智群圓滿淨日一念出現悉能照明一切世界一切法外衆生心垢淨心水器影無不顯常現在前乃至其實如來不生不滅永無滅度准之可悉言彭城嵩法師等者案高僧傳第五卷道温傳末立時中興復有僧嵩義學顯譽昔明數論末年僻執謂佛不應常住臨終之日舌本先簡也述義引有傳云宋中興寺釋僧嵩本性趙河北人也而今言彭城者是後所住處也疏主解云古有嵩法師云佛無常何故如此大品先來此土涅槃後出來故彼法師依大品等言論辨道理無過此經故佛是無常是其道理無可言佛常之義何以故爾青黄境無常智云何常後至涅槃經其經盛明佛常而其法師言無有道理佛常此經乃是方便之説非佛之正意如此之故舌皆爛壞而此法師深懷恐怖於涅槃經懺悔後時還舌故此法師後時亦説佛常而説佛常者不同或人作九達通謂佛已達九世境界也嵩法師作懸鏡高堂譬通佛智常成論師等如此而已也述義云大品廣明般若而不明常涅槃宗明常住故順自所執起信毀也難云若言佛智疑然境自有生滅者知青已後知黄之時前知青之用爲有爲癡若言有者即是倒智若言無者即是無常通此難作九世義云佛智常照九世之境只境自有生滅也玉篇彭者補康反也竺者丁梏反修也泉也概也弼者字書令弼也雙者所願反言問佛爲等者有人解云應法者大乘玄第五卷感應義中云應者赴接之義衆生有善致彼佛前垂形赴接也別記云丈六相好色此云應法也言答自古爰等者述義云晋代名古梁代名今也爰者反也方言爰志也猶思慕義也有人解云疏主作疏以前皆從宋也以弼宋故名古今有阿難耶也言開善藏師等者開善寺智藏師也此師用無別應法之義也言故經云等者如大經第十五卷佛告迦葉菩薩言我於爾時爲欲降伏護財倶故即入慈定釼手捐之即於五指出五師子是象見已其心怖畏擧身投地敬禮我足我於爾時手五指頭實無師子乃是修慈善根力故令其調伏今略引之法寶師云下廣引八種事證慈善根力利益不虚此文第一調伏惡象殺害心故證慈不虚也言莊嚴是法師云等者莊嚴寺僧旻師此師用別有應法之義也言如經云等者如大經第二卷純陀答文殊師利言如金翅鳥上昇虚空無量由旬下觀大海悉見水性魚鼈黿鼉龜龍之屬及見己影如於明鏡見諸色像凡夫小智不能等籌量如是所見我與仁者亦復如是不能籌量如來智慧今取意略引之疏主釋云舊釋此譬譬上能知下今謂譬下不能知上也法華疏第一卷云迦樓羅者此云金翅鳥以其翅頭有金色故以爲名海龍王經翻爲鳳凰也卵生金翅鳥能食卵生龍餘三生鳥各食餘三生龍也大乘玄云第五卷云虚空是法身佛金翅鳥是報身佛及是己影是化身佛也法費師云此第三金翅鳥喩也如金翅鳥至見諸色像是擧金翅鳥所見也金翅鳥者喩佛也上昇虚空無量由旬者喩在居密嚴五也下觀大海喩三界生死海也悉見水性下喩見三界衆生也黿魚似鼈而大鼉徒多似蛟大也及見己影者喩見反示化身在三界也如於明鏡見諸色像者喩佛離有無也凡夫小智下喩純陀文殊不測佛智觀衆生及化佛也我與仁者下合也音義云鼈蒲結反似龜也又云小龜也大龜也又云甲肉竝厚也黿禍安反似鼈而大也足似犬足也甲肉竝薄鼉堂多反似蛟而大也大者長一丈有鱗釆皮可以爲鼓也又云似蚸蜴守宮蚸蜴守宮者倭言波良阿加也亦云井守也蚸赤反又作柝字蜴藥反龜非此國龜在呉地也又云木龜也言招提琰公等者述義云招提寺琰法師雙用二義善於成實論義也有人解云即是招提寺慧琰法師也琰呼餘冉反別記云此師本是優婆塞爲學問僧等干食又來至漢地書二邊見度人在也言今明正爲異論粉綸等者上座部等云實滅大衆部等云不實滅開善云無別應法之起莊嚴別有應法之起招提用二故云爾耳所言紛綸者玉篇上孚云反亂也王逸曰紛盛貌也力旬反經理也言不同舊記等者不同開善等三大法師之所説也所言舊者常也本也言問由佛滅度等者述義云不知此問起之所由何者上既言不應滅不滅誰言滅耶而就爲縁示滅示滅故云爾耳言答智度論云等者如彼論第二十二卷云菩薩從初發意深入佛法大作佛事得一切種智時身出光明照無量世界一一光明變化作無量身度十方無量衆生涅槃後八萬四千法聚舍利化度衆生又第十八卷云復次二乘無慈悲心乃至無有三世度衆生心所謂菩薩時作佛時滅度時今取意略引之言華嚴云等者如彼經第三十七卷普賢菩薩言佛子但如來欲令衆生歡喜故出現於世欲令衆生憂悲感慕故示現涅槃其實如來無有出世亦無涅槃何以故如來常住如法界故爲化衆生不現涅槃今取意略引之疏云後五百歳等者琳法師云此第一明時節前五百爲正法取後五百爲像法也元康師云外國語倒應云五百歳後也碩法師云好體應言佛滅度後五百餘年而今倒悟故云佛滅度後後五百歳耳此第一正辨迷教之時節起自何時迷教即是佛滅度後後五百歳像法中也言一者倶舍論引經云等者述義云眞諦三藏所譯倶舍論有二十二卷也別記云所言經者涅槃經也今撿倶舍論第十三卷分別業品之四云復次今世尊昔在菩薩位中事幾諸佛於初阿僧祇事七十五千佛於第二阿僧祇事七十六千佛於第三阿僧祇事七十七千佛一一阿僧祇最後時佛世尊出由逆時應知次第乃至偈曰先釋迦釋曰佛有世尊號釋迦牟尼昔已出世於世尊所今佛世尊求修菩薩行初發菩提願願我成佛皆同如此相昔修世尊如今末世時生乃至世尊正法住唯一千年内新譯論第十八卷分別業品六云謂我世尊昔菩薩位最初逢一佛號釋迦牟尼邃對其前發弘誓願願我當作佛一如今世尊彼佛亦於末劫出世正法亦住千年故今如來一一同彼光法師第十卷云若依大智度論正法五百年此文千年豈不相違解云依善見律尼故減五百年以行八敬故還得五百年彼論約初減時故言五百此論據後故説一千今略但之言所以然者釋迦過去等者疏主大論第三卷末文釋顯倶舍論意如彼論云釋迦文佛先世作瓦師名大光明爾時有佛名釋迦文佛弟子名舍利弗目伽連阿難佛與弟子倶到瓦師舍一宿爾時瓦師布施草坐燈明石蜜漿三事供養佛及比丘僧便發願言我於當來老病死惱五惡之世作佛如今佛名釋迦文我弟子名字亦如今佛弟子名以佛願故得字阿難乃至廣説准之可悉言二者摩耶經云等者如摩訶摩耶經摩訶摩耶問佛正法幾時當滅阿難答言佛涅槃後摩訶迦葉結集法藏及以正法付優婆𪴃多善説法多人乃至五百歳已八部衆生發菩提心於此便就滅盡六百歳巳邪見競興而滅佛法乃至千五百歳彼此相致於是佛法而滅盡也今取意略引之疏云下第二明住持法藏明阿難迦葉共結集即隱迹也次百二十歳付優婆𪴃多此云大護次二百歳付尸羅難陀次三百歳付青蓮華眼比丘次四百歳付牛口比丘次五百歳付寶天比丘正法盡此次六百年付馬鳴比丘次七百年付龍樹菩薩次主八百年有二人滅法也言三者眞諦三藏引毘婆沙云七佛法住世久近不同等者案靖邁圖記第二卷云沙門婆羅末陀此言眞諦亦曰枸那羅陀此曰親依西印度優禪尼國人景行澄明器字肅風神爽拔悠然自遠群藏廣部罔不厝懷藝術異解偏索諳練歴遊諸國隨機利現或鋪坐具跏趺水中若舟而濟岸接對使而座具無濕或以荷𧂐水乘之而度如斯其例甚多乃至廣讚也言七佛皆住世外近不同等者所言七佛者案基師法華疏云七佛者即過去七佛前劫有三謂毘鉢尸佛尸棄佛毘涅縛浮佛賢劫有四謂迦涅迦村陀佛迦路迦牟尼佛迦葉波佛釋迦牟尼佛准此疏文今且擧賢劫四佛也宣律師注戒本云毘婆尸佛此賢劫前九十一劫出與于世百年中常説此偈後方説廣尸棄佛是賢劫前三十四劫出與于世八十年中常説此偈自後説廣毘葉羅佛是佛出世與前同劫人壽七萬歳七年前説此偈略後方説廣𤘽樓孫佛是佛賢劫初興人壽六萬歳六十年前常説略偈後方廣也𤘽那含牟尼佛此賢劫中爲第二佛人壽四萬歳四十一年前説此略偈後方廣説也迦葉佛此爲賢劫第三佛也人壽二萬歳二十年前説此略偈自後方廣説也釋迦牟尼佛此佛略教即是毘尼之正宗乃至廣説也疏問損五百年等者言逈者玉篇胡𤈍反爾雅云逈遠也假也轉相訓耳述義云逈者猶滅也言三釋云尼修八敬等者述義云一百歳比丘見新受戒比丘應一心謙禮足一比丘尼應從比丘僧乞受具戒三若比丘尼犯僧殘應從二部僧乞半月摩那埵法四無比丘住處不得安居五比丘尼安居竟應從二部僧中自恣求見聞疑罪六比丘尼應從僧請半月教戒法七比丘尼語比丘言聽問修多羅毘尼阿毘曇聽者應問不聽者不得問八比丘尼不得説比丘尼見聞疑罪具明如善見論等也而言出十誦律者十二字缺言四者大集經明六種堅固等者述義云北涼時曇無讖譯大方等大集經有三十卷亦有六十卷今所引經後本是也如彼經月藏分第九卷初佛告月藏菩薩言於我滅後五百年中諸比丘等猶於我法解脱堅固次五百年禪定三昧得住堅固次五百年讀誦多聞得住堅固次五百年多造塔寺得住堅固次五百年鬪淨言訟損滅堅固從是以後雖剃鬢髮身著袈裟而破禁戒行不如法假名比丘今取意引而爲六種准例可知言五者善見毘婆沙第二十卷云等者述義云齊時沙門僧伽跋陀羅齊云衆賢西域人譯善見律毘婆沙十八卷後人開爲二十卷今案彼論第十八卷比丘尼健度云何以如來不聽女人出家爲敬法故若度女人出家正法得五百歳住猶世尊制比丘尼八敬正法還得千年法師曰千年已佛法爲都滅也答曰不都滅盡於千年中得三達智復千年中得受盡羅漢元三達智復千年中得阿那含復千年中得斯陀含復千年中得須陀洹學法復得五千歳於五千歳得道復五千年學而不得道萬歳後經書父字滅盡但現剃頭有袈裟法服而已今略引之今此律論但有十八卷准之可悉言六外國祇洹精舍銘等者元康師云古涅槃經後記云外國祇洹精舍銘云正法千年像法千年末法萬年天竺朝夕衆中宣唱此語云佛法若干年已過餘若干年在佛法欲滅老死至近宜須精進也述義云銘者猶碑文之流故文選抄云説選集云篇數者都合十八三十八首其中賦五十六首詩四百二十首乃至銘五首哀三百首等也言古涅槃經者有疏云布法師北他得盡歸云正法一千年乃至天竺禮佛皆作是言也何以知之曇無讖翻涅槃經竟後題如此也有人云北涼時京兆人法豐釋智猛譯般涅槃經凡有二十卷是云古涅槃經也有人解云佛正法等者銘文也天竺等者疏主加増也而言後載之者玉篇載子載反事也行也成也辭也爲也物終更生也始也則也曇攝師云再音也字林載乘也三蒼云措於車也乘子算經云數極於載也謂地不能載也今須乘訓也淡海記云銘者初造寺時銘碑置寺也而出在古涅槃經後者後時安置壽命經後流行於世也疏後五百歳等者言此是五百歳後者案碩疏云好體應云佛滅度後五百餘年百今倒語故云佛滅度後後五百歳也准之可悉言智度論等者案彼論第六十四卷有於此文亦云泥梨品今取意略引之具如記初卷也疏像法中等者言初五百爲正法等者案碩疏云叡師序云龍樹是五百三十年出世即是興像法之初此中又云佛滅度後後五百歳像法中故知正法只有五百年間何故名爲正法像法耶答禀正道能正悟即名正錺像行即稱像末行即言末也准之可悉疏問佛二月十五日涅槃等者案中論玄云如來二月十五日入涅槃聖弟子四月十五日於王舍城耆闇崛山結集三藏爾時即有二部名字一上座部謂迦葉爲上座迦葉上陳如一夏爲佛以法付屬迦葉名上座部迦葉所領也但有五百人依智度論即有千人二大衆部即界外大衆乃有萬數婆師波此云涙出羅漢爲主常悲苦衆生而涙墮也即五比丘中之一人也而年大迦葉教授界外大衆所以有二衆者迦葉有五百羅漢前入界内結集三藏後多人來結集三藏迦葉竝不許之有二因縁一者五百皆聰明人故二者已羯磨竟故依智度論阿闍世王但設千人食故餘人來不得從是以來至佛滅後百十六年但有二部名字末有異執也釋曰言佛二月十五日涅槃者案周書異記云穆王五十三年壬申年二月十五日生年七十九歳入無餘涅槃故大經云二月十五日臨涅槃故云二月十五日涅槃也言婆師波者案最勝王經云波濕波也𠘑法師云婆濕波此云氣息即五比丘中第三故故云五比丘之一人也言所以有二乘等者爾時迦葉得千人皆阿羅漢具徳聰慧倶到王舍城耆闍崛山中安居三月初十五日説戒之時迦葉入定以天眼觀誰未漏盡應遂出者唯有阿難一人不盡餘皆已盡清淨無垢迦葉起定引出阿難云汝勿來也便目閉門阿難入定漏盡具徳即以神力從鑰孔中入禮拜僧足於此衆中富樓那此云滿慈子結集阿毘達摩藏鄔婆離此云近執集毘尼藏阿難比云歡喜集修多羅藏往者界内常耆至多共爲一徒名上座部昔時界外年少極多界外門人共爲一朋名大衆部恐界内人多難可和合所以兩處弘宣時雖兩處結集無人異諍法無異説故云未有異執也言至一百一十六年分成二部等者案玄義云百一十六年外有舶主兒名摩訶提婆此云大天端正聰明作逆罪後入佛法凡有二事一者取諸大乘經内三藏中釋之二者目作伽陀安置或後布薩誦戒竟亦誦此偈因爾起諍遂成二部釋曰昔末土羅國有一商主少聘妻室生一男子顏容端正字曰大天持寶遠適他國展轉貿易經久不還其子長大染穢於母後聞父還心既怖懼與母設計遂殺其父事漸彰露便語其母逃隱波吒釐城彼後逢本所供養無學比丘復恐事彰遂設方計殺彼無學後見母與餘人交通便憤恚言我爲此故造二重罪移流他國跉跰不安今復捨我更好他人如是偈穢誰堪容忍於是方便復殺其母故云造三逆罪也由被不斷善根力故深生憂悔𮄎處不安自惟重罪何縁當滅亦欲探華嚴般若等諸大乘經雜三藏説彼後傳聞沙門釋子有滅罪法遂往鷄園僧伽藍所於其門外見一比丘徐歩經行誦伽陀曰若人造重罪修善以滅除彼能照世間如月出雲翳時彼聞已歡喜知歸佛定當罪滅因即往詣一比丘所請求度出家時彼比丘既見固請不審撿問遂度出家還字大教授教誠大天聰慧出家未久便能誦持三藏文義言辭清巧善能化導波吒釐城無不歸仰乃至十五日夜布灑他時次當大天昇座説戒彼便自誦所造伽陀云餘人染汚衣無明疑他度聖道言所顯是諸佛正教爾時衆中多聞持戒修定者等諸阿羅漢聞彼所説無不驚訶於是竟夜鬪諍紛綸遂除彼義而大衆部用此義上座部不用之各隨見異遂分二部故云遂成二部言三百年有二十部等者如玄義云至二百年中大衆部又出三部一一説部二出世説部三灰山住部又出一部名多聞部更出一部名多聞分別部二百年滿有一外道名大天身自出家上座部言和上無戒及破戒闍梨大衆有戒得戒薩波多部用此解之餘部不用因此諍論遂不容大天徒衆因爾別住山間於此山間執義又別故有支提山部及北山住部於中前五因内執起後二因外道故成七部若本末并數成八部次上座部二百年已來無異部至三百年初迦旃延子去便分成兩部一上座弟子部二薩婆多部次薩波多部出一部名可住子弟子部也次三百年中從可住子弟子部復出四部一法尚部二賢乘部三正量弟子部以上三部從人立名也四名密林部從住處作名也次三百年從薩婆多部復出一部名正地部三百年中從正地部復出一部名法護部三百年中從薩波多部又出一部名善藏部又出一部名説度部若本末合計有十二部釋曰一説部者從所立爲名此部説世出世法皆無實體但有假名即是説意謂諸法唯一假名無體可得既乖本旨可以別分名一説部故云從所立爲名也文殊問經云執一語言部名雖相似然注解云所執與僧祇同故云一説此釋非也出世説部者此亦從所立爲名此部説世間之法從顛倒起復生業從業果世間之法既顛倒生顛倒不實故世間法但有假名都無實體出世之法非顛倒起道及道果皆是實有唯此是實世間皆似既乖本旨所以別分名出世説部此隨梵語故云爾耳若從此方應云説出世部然文殊問經注云可稱解者此猶非也言灰山住部者此山有石堪以作灰此部住其山中修道所以從住處以爲名也大乘玄義云崛居部亦同意也若從律正以爲名者應言鷄胤部上古有仙貪欲所過遂染一鷄後所生族因名鷄胤婆羅門中仙人種姓也此部唯弘毘曇爲實經律爲權教故言多聞部者當時律主廣學三藏深悟佛言具多聞徳從徳爲名名多聞部言多聞分別部者從所爲立名謂至二百年大迦旃延從阿耨達池出更分別前多聞部中義時人有信其所説者故云多聞分別部大乘玄義云施設論部意亦同也若從所立應名説假部世出世法中皆有小似非一向似故不同一説部非一切實故不同出世説部所以爲名也文殊問經略無此部也言支提山部者佛得道及轉法輪處大衆處名支提此處有山名支提山宗輪論云制多山此云靈廟山即安置聖靈之廟處此山多有制多故云制多山此乃梵本輕重不同耳言北山住部者支提山北稱曰北山既與大天不和因此別住即支提山北之一山也有人傳云如世人捨多死人處云屍多林此山亦爾置多聖靈之廟處故云支提山也部執論并文殊問經加東山住略無西山住部慈恩云此竝譯家謬今撿經迹中云八名阿波羅部九名欝陀羅部問大乘玄義云九部今云八部云何相違耶答二十二字缺言上座弟子部者從所製爲名大乘玄從住處名雪山部上座弟子本弘經教至迦旃延大興毘曇上座弟子見棄本弘未四過宣令遣其改宗遂守宗不改移住雪山故云雪山住部言薩波多者梵語此云説一切有一切有二一有爲二無爲有爲三世無爲離世其體皆有名一切有從所立爲名也言可住子弟子部者女人是可住仙人之女也羅漢即可住女之男此阿羅漢之弟子故云可住子弟子部從母爲姓從性立名大乘玄云犢子部從遠襲立名謂上古有仙居山靜處食欲起不知所之近有母牛因染生子自後仙種皆言犢子即婆羅門姓也言法尚部者亦云法上部即律住名有法可上名爲法上或有法出世衆人之上名爲法上所言尚者借音耳大乘玄云達磨欝多部也言賢乘者大乘玄云跋陀耶尼部此云賢冑部言賢者部言之名冑者苗裔之義是賢羅漢之苗裔故云賢冑從所襲部主爲名也言正量弟子部者權衡刊定名之爲量量無邪謬故言正也甚深法義刊定邪正自稱正量有大正量羅漢有刊定徳故云正量今此部主是彼弟子從所襲立名大乘玄云三稱底部者梵語輕重新人云摩帝部此云正量也言密林部者從所住立名近山林木蓊欝繁密部主居此名密林部大乘玄云六城部也言正地部者從本爲名此部之主本是國師匡正土境拾而弘法故正地亦云化地部化地上之人度故故云化地捨國出家弘宣佛法從本爲名然文殊問經云大不可棄非也大玄云彌沙塞部者從梵本立名也此云化地也言法護部者部主之名亦云法藏部義意大同法護法藏二義皆得此師護正法如藏之覆護也大乘玄曇無徳部者梵語存若具足應言曇摩屈多迦部此云法藏故玄憚師云曇無徳秦言法藏此是人名即四分律主也善藏部者梵語蘇婆利師部時云善歳今云善藏同意謂此師少歳性賢藏徳嘉其少藏賢行故以立名大乘玄云迦葉唯部從姓立名此部教主飮光苗裔又此部主身有金光能飮餘光故言飮光言説度部者從所立爲名此部主立五陰從此世度至後世得治道乃滅大乘玄云修多羅論部謂唯經藏爲正餘二皆成經耳今云三百年有二十部者具有二十部當至三百年中故云爾然實百十六年外依大天事起上座大衆二異執至二百年中從大衆部又出三部如是展轉成二十異部只大衆部中凡多聖少所以二百年内猶乖諍諸部先起上座部翻之疏答叡師作喩疑論云等者元康師喩疑論云五百年先得道者多不得者少以多言之故曰正法五百年後道者少不得者多亦以多言故名像法以其似正而非是正故云像法也而言叡師者案高僧傳第五卷云釋慧叡冀州人少出家乃至入關從什公𧫎禀後適京師止于烏衣寺乃至宋元嘉中卒春秋八十有五矣述義云盈路者滿世也言次慧義法師雜門論云等者述義云宋祇洹寺釋慧義者會通雜門論是也高僧傳第五曰釋慧義姓梁北地人也少出家風格秀擧志業強正備通經義乃至宋元嘉二十一年終於烏衣寺春秋七十三矣言以此釋望乃至無所得觀者蓋是等者碑云唐武徳三年春秋七十一乃遷神於寺東房續高僧傳第十一卷云春秋七十有五即武徳六年五月奄然而化有人解云當今疏主唐武徳六年癸未生卒今至延暦二十年合爲七十八歳又大業十餘年假令二百餘歳許故知五百餘年入六百院第四之五百疏主出世故云時節理數爾也言答叡師成實論序述羅什語云等者口口五十五字缺言匡山慧遠法師云接九百年之運等者案高僧傳第四卷云釋慧遠本姓賈氏雁門樓煩人也弱而好書年十三博綜六經尤善莊老致年二十二沙門釋道安聞講般若豁然而悟乃歎曰儒道九流皆糠粃耳便與弟慧特投簪落飾委命受業既入乎道勵然不群年二十四就講説遠乃於精舍無量壽像前建齋立誓共期西方乃令㔁遺民著其文曰惟歳在攝提秋七月代辰朔二十八日乙未法師釋慧遠貞感幽奧霜懷特發乃延命同志息止貞信之士百有二十三人集於盧山之陰般若臺精舍阿彌陀像前率以香華敬廌而誓焉以晋義熈十二年八月初動散至六日困篤乃命律師令披卷尋文得飮與不卷未半而終春秋八十三矣言接九百之運者慧影師云龍樹一身假服仙藥乃三百餘年住持佛法至八百年後始付提婆准之可悉言具如玄義中釋者中論玄義破外道毘曇成實大乘意明人正處具引楞伽經摩耶經明論主出世破邪顯正云七百年出世今引此文也疏問經中何故正法時少等者摩耶經云正法五百年像法千年今且引此經文以爲難問言問法華云等者如彼經第二卷譬喩品舍利弗記當果中第八住持果文云舍利弗是華光佛滅度之後正法住世三十二小劫像法住世亦三十二小劫疏主釋云下第八明住持果大論佛法凡有四時一佛在世時二佛雖去世法義未改謂正法時三佛去世久道訛替像法時四轉復微末謂末法時今但擧三攝末屬像今云卅二小劫者但論時節大小非三災之小劫也今取意引以爲問難也言答舍利弗等者如法華經第二卷身子國土果文云國名離垢其土平正清淨嚴飾安穩豐樂天人熾盛瑠璃爲地有八交道黄金爲繩以界其側其傍各有七寶行樹常有華菓疏主釋云下第二明國土果然未曾淨穢由衆生心淨穢故有淨穢耳身子昔日無凡夫穢心今悟一乘復離二乘之垢既離凡聖垢故得佛之時土名離垢然心亦不曾垢淨約迷故稱垢約悟故稱淨即是標土名亦總明土體次其土平正下出土體離高下故稱平非小大邪故名正無穢惡名清淨有衆寶爲嚴飾也次安穩量樂下明人物也離刀兵劫故爲安穏離飢餓劫故爲豐樂離疾疫劫故爲熾盛也瑠璃爲地者別明地莊嚴也有八交道者別明道莊嚴也准此疏文身子既離凡夫二乘心垢穢故於淨土中得菩提果今取意引以答釋之疏云人根轉鈍下等者碩法師云下第二辨迷教之意何意迷教只鈍根薄福若佛在世時人根爽利識信堅明但佛滅度後人根轉鈍識信不明所以迷教也琳法師云下第二彰迷教所以信知萬法無生究竟寂滅稱之爲利若封名著法隨文起著目之爲鈍也言答正是慧根鈍者有疏云二十二根中正是信首五根鈍也述義云就明人根而有傍正正言慧根傍二十二根以慧根鈍故流轉生死男女二根之所纒縛故大毘婆沙云縁縛不斷故不清淨不清淨故愛於未來男女二根故名轉鈍反此名利也言亦得云信等五根倶鈍者述義云信勤念定慧此爲善本出生善法故名根也大乘光師云増上名根前二以大善地法中信勤爲性後三大地法中念定慧爲性也成法師云於因果法心得澄清故稱爲信捨惡修善熾然不斷謂爲精進録心住境名之爲念心住不亂故名爲足觀照分別謂爲慧也通稱根者出生増上名之爲根也言二十二根者述義云眼等五根信等五根并五受根謂苦樂憂喜捨命根意根男女二根及三無漏根謂未知欲知根已知根具知根言眼等五根者眼耳鼻舌身此五能生五識故名五根亦名五依爲五識之所依故亦名五情能生情識果故也雜阿毘曇心論第一卷云眼識所依四大所造淨色不可見有對餘亦如是差別者隨識所依也言五愛根者寶崛下卷云五受根者憂喜苦樂捨也若五根後所生受名苦樂意根後所生受名憂喜不憂不善名之爲捨通從六根後生也明此諸受能生煩惱故名受根三受是根名諸受根衆生若命未盡受根常在隨在何受念念不住一一受根隨有幾念或多或小同類異類受受相續不得斷絶四受心強不得命終命終之時要在捨根一報盡時捨受滅盡故名爲沒也准此疏文以此五受爲諸煩惱出生増上故名爲根言命根者謂壽命増上故名命根言意根者出生意識増上之義名爲意根言男女二根者身根一分也言三無漏根者從未來知理而欲知故名未知欲知根從信根立以上乃至第十五心道北忍此未知欲知根位也既已得知眞理故名已知根第十五心以上乃至羅漢金剛心此已知根位也知理更無可知名具知根無學果地名具知根位也此二十二根若漏無漏而爲分別三無漏根唯是無漏十是有漏謂男女二根眼等五根命根憂根苦根九根通二信等五根意根樂捨善根若約三界繋不繋者三無漏根唯是不繋餘十九根欲界通繋色界十五眼等五根信等五根意根命根樂喜捨根若約三性而爲分別信等五根三無漏根唯是善性一根善惡即是憂根五根通三意根苦根樂喜捨根八唯無記眼等五根男女二根及以命根若約三斷而爲分別四根唯是見諦所斷意根樂根喜根捨根通見修斷即是憂根九根即是唯修道斷眼等五根男女二根命根苦根見修道斷及以非斷信等五根唯不所斷三無漏根若約三界受生分別欲界受生胎生卵生濕生初得身根及以命根欲界化生初受生時若無形者初受生時唯具六根謂眼等五根及以命根也若一形化生者初受生時一形與六根合故具七根謂眼等五根命根身根若二形者二形與六根合故具足八根若色界化生者初受生時唯約六根謂眼等五根及以命根若無色界化生者初受生時唯得命根不擧捨意二根者一切化生死生之時唯具二根故更不擧也若約死時者無色界人最後死時滅於三根謂意命捨根色界死時滅於八眼謂眼等五根意命捨根欲界頓死二形化生捨於十根謂眼等五根命意捨根命意捨根及以二形也一形化生捨於九根除之一形無形化生唯捨八根無身根故若以染心漸漸死者滅於四相謂身意根及命捨根若發善心漸漸死者發信等五根故増上五根謂信等五根若約證果而爲分別初後二果依九根得謂信等五根意捨二根未知已知依此九根證得初果信等五根意根喜根已知具知此九根證羅漢果若次第行以世俗道依於八根得第二果謂信等五根意根捨根及已知根依於七根得第三果意捨二根信等五根若超越行依於九根得第三果信等五根捨意二根未知已知此二十二法通名根者以能生他名之爲義以前生後故名爲根也如此諸門分別具如倶舍論第二卷也言佛在世時等者琳法師云以佛在世時亦有鈍根而判位爲利正法中亦有利根而位判爲鈍今像法衆生乃是鈍中之鈍故云轉也故無行經云信一切法畢竟無生從本以來常自爾故名爲信根也有疏云眞諦三藏云佛在世利爲正佛滅度鈍爲像約此判像正亦有此義但於滅後有近遠像正前五百爲正後五百爲像前五百已是鈍像法中復鈍故云轉鈍也疏云深著諸法下等者碩法師云下第三辨正迷大小乘教就文爲二第一信小乘故失旨第二不信大乘故迷教今初第一信小乘故失旨擧類如般若信毀品此人雖能信般若而此信即是毀故稱信毀今亦然此人雖能信小乘而此信即是失故失旨也取相有所得心貪深諸法故云深著諸法也琳法師云第三正明起執也言佛在世時等者如來在世投機布教言雖在近意存深旨衆生利根聞皆悟道佛滅度後人根轉鈍迷小謬大斷常交執迷小迷有名爲常見迷大唯空即爲斷見故今論主雙申兩教明有無不實倶治斷常也言所合深著等者元康師云正法之末已著像法之中更著故云深著也問何不言著人但言著法耶答人空易得故不言著人法空難得故但言著法又此云法者通詺人法以爲法也言理者玉篇莫階反𮏏也藏也疏云求五陰十二入十八界等者琳法師云求十二因縁者迷小也其聖意爲無因邪因縁斷常等邪見故説十二縁又爲垢重計我不同或迷於色或愚於心或色心倶迷佛爲破病故開合色心建立假名而明無我不欲存法是但群生不達聖説之意隨名求實故求因縁定相乃至但著文字也元康師云此是昔曰小乘教中所説法也説此等法無爲破我我執既破此法亦亡鈍根不了執爲定有故求其相也十二因縁者即因爲縁也五陰十二入十八界者如雜心第一卷心界品偈云積聚是陰義輸門義説入種姓義説界是三種差別也釋論云十一種無量色等總説色陰譬如軍衆其類各異名之爲軍衆色亦爾雖有十一同一色相名爲色陰餘陰亦爾輸門義説入者通苦樂故種姓義説界者譬如一山多有諸性謂金銀等如是一身中種種姓各異故説十八界問何故但言陰界入耶答毘婆沙論第四卷云略説五陰十二入十八界三藏要義唯此論文陰界入是小乘義要是故言之碩法師云積聚十一色乃至積聚衆識故積聚陰義内有六根外有六塵筒即是門中間有六識明此六識從六根出入六塵從六塵入六根故輸門是入義明十八界性別不同故性別是界義決定相者可解不知佛意但著文字者明佛説陰入界等教爲有即是文字意欲表理求決定相言是有不識表於不有故不知佛意何故不知佛意耶爲但著文字也言一者同失等者佛説陰界入之法爲有欲破外道神我故云有法無人既無人既即無法爲諸小乘不達説無我之意取相有所得心貪深諸法與聖説之意乖如此等執諸部皆同故云同失言二者異執等者如雜心論第一卷界品云十種諸色入及無作假色是分別色陰牟尼之所説釋論云十種色入者五根五塵無作假色者如業品説准此論文今言色有十一者法救論師義故彼論初云敬禮尊勝法所説我頂受我達摩多羅説彼未曾説玄義云千年之間有達摩多羅以婆沙太博四卷極略更撰三百五十偈足四卷合六百偈名爲雜心也言或言色有十四色者有疏云成論義過義云五根五塵竝四大也今案大義記第十二卷十四種色義云十四種色者謂四大五根五塵形礙是色義也四種名大者謂地水火風遍到故名大謂前遍身内外有一切處名遍則諸根無其義故四大獨得稱大也五種名根者眼耳鼻舌身也五種名塵者色聲香味觸乃至廣説准此説文今言或言等者開善寺智藏師也今撿涅槃經第三十四卷佛告迦葉菩薩云善男子我又一時爲跋波比丘説跋波若比丘觀色若三世若近遠若麁細如是等色非我我所若有比丘如是觀已能斷色愛跋波又言云何名色我言四大名色四陰名名我諸弟子聞是説已不解我意唱言如來決定説言色是四大善男子我復説言譬如因鏡則有像現色亦如是因四大造所諸麁細澁滑青黄赤白長短方圓耶角輕重寒熱飢渇烟空塵霧是名造色猶如嚮像我諸諸子聞是説已不解我意唱言如來説有四大即有造色或有四大無有造色疏主釋云此下一雙諍論有造色無造色義跋波比丘即五比丘中第四人也言有造色者薩婆多等計有造色彼明有十一種色中十色是所造一種是能造言一種者即是一觸色觸中復有十一種觸四觸是能造七觸是所造七觸者以是輕重澁滑飢渇冷此是所造除四大堅濕煗動是能造不造色根本有佛陀提婆後呵梨跋摩不明造色破數八徴倶等而經中復明有造色者諸論師解云若是外色者不造内色各成爲造四大成五根五根成色陰等如此各造不如前家若大判者前即明造色後即明無造色也此文中具破二家義謂青黄等此復破論人彼明青黄色爲識心所得非是對眼也准此經文初是薩婆多義後即根本佛陀提婆此云覺天後呵利跋摩此云師子鎧義也言或有無作色等者如大經次文云善男子往昔一時菩提王子作如是言若有比丘護持禁戒若發惡心當知是時失比丘戒我時語言菩提王子戒有七種從於身口有無作色以是無作色因縁故其心雖在惡無記中不名失戒猶名持戒以何因縁名無作色非異色因非異色因果善男子我諸弟子聞是説已不解我意唱言佛説有無作色善男子我於餘經作如是言戒者即是遮止惡法若不作惡是名持戒我諸弟子聞是説已不解我意唱言如來決定宣説無無作色疏主釋云此下一雙諍論有無作色無無作色若是薩婆多明有無作而無作是色無作色從身口二方便善生即是受戒時身禮敬口言能持等生故無作有色故論偈云十色謂色入亦無作假色是分別色陰牟尼之所説若僧祇部人明無有無作故非是色明此戒直是制惡法若不作惡即是持威無別無作也若是呵梨所明有無作而是非色非心法問此法爲攝屬色耶答彼明此戒是非色非心而從心生故屬心是行陰攝故云離思無報因離受無報果皆從心生而是非色非心也若是今文所明前言有無作色者薩婆多人是用也佛答有無作色故雖在惡無記中猶不破戒故睡眠悶等是時常生也非異色因者此無作色前念色爲因不爲異色作因也非異色因果明無作色果不爲異色因作果還爲前無作色因作果故云非異色因作果也我於餘經下此即破薩婆多然後是破僧祇不得佛意故云無無作色准此經文初即薩婆多義後是大衆部義然述義云無無作色者成實義非也言菩提王子是摩伽陀國附庸國王子也言或言四心一時等者有疏云數云四心竝起心王心數論云四心前後起無心數述義云數人義四年并一時生何者識是心王受想行是心數即爲臣豈不得同時耶成論義不許四心竝起何者必前心滅而後心生但前三心滅已至行心中前三心成就耳言或言別有心數等者如涅槃經第三十四云善男子我於經中作如是説聖人色陰乃至識陰皆是無明因縁所出一切凡夫亦復如是從無明生愛當知是受即是無明乃至受者即十二支善男子我諸弟子聞是記已不解我意唱言如來説無心數善男子我於經作如是説從眼色惡欲等四即生眼識言惡欲者即是無明欲性求時即名爲愛愛因縁取取名爲業業因縁識識縁名色名色縁六入六入縁觸觸縁想受愛信精進定慧如是等法因觸而生然非是觸善男子我諸弟子聞是説已不解我意唱言如來説有心數疏主釋云此下一雙諍論有心數無心數若薩婆多等即明有心數横論五品心皆有心數故彼偈云欲善二十二不共有二十無記有十二悔眠倶即増此即是有心數若是根本佛陀提婆人呵梨等明無心數故言譬如狹道乃至不受二人竝行況復多人經中明心王心數者必前起者爲王復起者爲數亦得此是心之差馳之名也今明經不噵此經只一時竝起有王有數何時噵前後耶今前即破論人無心數義從無明生愛愛不異無明只轉無明以爲愛故無別心數餘下類然我於經中説從眼色惡欲四法此明有心數從眼色明惡欲等即生眼識此即是心數竝也准此經文初義即是薩婆多也後宗佛陀提婆及呵梨等也言三者佛教所無等者述義云佛經不説有極微色而諸部小乘言有此色也等又言因中有果無果等也今謂不爾原佛意説三科者爲破外道神我故説三科既爲神我而説三科我去法不留心無所依便得解脱然彼分別三科決定相不知佛意但著三科之名字故云佛數所無也鑿者曇捷師云上尺專反字林云穿通也下但説反説文文鑿穿木也疏云十二因縁等者述義云十二因縁不關三科法門故今欲釋此別牒擧耳言外道計無因邪因等者原佛説十二因縁之意者非是佛有十二因縁破外道所計無因邪因此十二因縁還是外道所有十二因縁今借汝所有十二因縁以後汝所計無因邪因故云借妄止妄也只外道重倒不可頓除故以十二輕倒而毀無因邪因重例此乃以榍出榍義重倒若去輕倒亦除即得解脱而爲鈍根解此意謂決定言有十二生即是具足有無兩縛既言無我而言有法故具二縛言又既決定等者如大經第三十四云善男子我經中説云何名爲十二因縁從無明生行乃至從生即有憂悲苦惱善男子我諸弟子聞是説巳不解我意唱言如來説十二因縁定是有爲又一時告喩比丘而作是言十二因縁有佛無佛性相常住乃至善男子我諸弟子聞是説巳不解我意唱言言如來説十二因縁定是無爲疏主釋云此下一雙諍論十二因縁是有爲是無爲諸部中計若是育多提婆人計十二因縁是有爲若是毘婆闍婆提部人計因縁是無爲出毘婆沙經中云十二因縁有佛無佛性相常住故是無爲也若是數論兩家計皆同育多提婆計是有爲成論主自分判是有爲但論師輒判通爲無爲若取其因果相生輪轉義即是有爲若有佛無佛性相常住即是無爲此竝不得佛意若執有爲即失無爲執於無爲即失有爲若雙用即雙不得佛意准之可悉言毘婆闍提者述義云諸部皆執十二因縁是有爲法唯薩婆多部内有別人名略婆闍波提執十二因縁即是無爲法何者以法由是所生來故因縁是無爲然生於法故是無常也言涅槃云等者如後經第三十五卷佛音迦葉菩薩言如是諍論是佛境界若人於是生疑心者猶能摧壞無量煩惱若於是中生決定者是名執著乃至如是執著不名爲善爲是誰耶斷善根者若有聰明能善分別遠離善友不聽正法不善思惟不如法住如是之人能善根今取意略引之疏主釋云下第三結也言是佛境界者此是佛説故云是佛境界非二乘所知也言若人於是生疑心等者彼前作定執今又生疑即能動其定執故能破煩惱又疑爲解本若疑心値善知識即得決了得於正見言於是中等者數論等皆作定執即是執著初執著後即能斷善根也問佛爲説教而諸部等發生諍論若説諍論耶答具有二意言諸數者即被前縁言諍論者令衆生諍論問何故令縁諍論耶答縁有二種若是福徳利根即能悟解不生諍論若鈍根者即生諍訟問何故爾耶答要因諍訟得無諍訟以能生道徹因縁故也而言能斷善根者案法寶師涅槃疏第十四云夫斷善人須是聰明利根善分別者具四因縁成斷善業一遠離善友二不聰正法三不善思惟四不如法住具此四事方能斷善也然善有二一方便善二生得善今斷方便善但生得生准之可悉流問小乘具迷人法等者言外道執我者案淨名玄云天竺外道九十六種略而言之不出四句僧佉計神與陰一世師執神與陰異勒娑婆明亦一亦異名提子云非一非異述義云我者神我以統御義爲人如衆生命者等以自在主宰義爲我僧佉所以青陰我一者能分別義爲神所依之義因義爲陰義雖有異而體是一也世師主體義倶異勒婆娑令用上二人之義若提子意亦一故非異亦異故非一也疏又就小乘中等者言一計人法倶有等者淨名玄云犢子計有我有法名爲有見述義云犢子部言我法二種倶有體性亦外道異者未入空無我觀是故有我入觀之因即知我空也言二逆法不計人等者述義云蕗婆多言有法無我如倶舍論前之八品分別諸法後之一品破我見故知爾也言三倶不執人法等者如成實論第二卷論門品云以世諦故説有我第一義門故説無我人一切有無品云方便説有方便説無若決定説有即墮常見若決定説無即墮斷見離此二邊名行聖中道准此論文故知不執人法也言如智度論云等者彼論第六十四卷文取意略引如記初卷也疏問小乘中三部等者言答望文殊問經等者如彼經等者如彼經下卷分別部品文殊師利白佛言世尊佛入涅槃後末來弟子云何諸部分別云何根本佛告文殊未來我弟子有二十部能令法住竝得四果三藏平等無下中上譬如海水味無有異根本二部從大乘出從般若波羅蜜出二部者一摩訶僧祇二體毘履乃至佛説此偈摩訶僧祇部分別説有七體毘履十一是謂二十部十八及本二悉從大乘出無是亦無非我説未來起今略引之述義解云大經等云如五盲人觸象觸鼻者言象如犁柄觸牙者言如杵觸耳者言如簸觸足者言如臼觸尾者言如箒此五盲人雖皆觸象而失象體故曰無是然非離象而別有者故曰無非今二十部各別異義非是佛意故曰無是非佛語外故曰無非無異相中而明異相者就佛所説而以我説未來起言非實異執分別成十八部言本二者一體毘履此云上座二摩訶僧祇此云大衆言十八者從上座部出十一部從大衆部出十一部從大衆部出七部具明如上言及大集云雖有五部不同不妨法界大涅槃等者三十六字缺所言三部者淡海記云犢子部薩婆多部成實論也言但今望大乘實相言亡慮絶等者中論玄義云於小乘内自分三品一者倶不得二空如犢子部云四大和合有於眼法五陰和合別有人法此下根人也二者薩衞之流但得人空不得法空爲次根人也三者譬喩訶梨跋摩之流具得二空爲上根人也約空義淺深即毘曇是小乘之劣成實爲小内之勝故云玄義中説也焉疏云聞大乘法中説畢竟空下等者碩法師云下第二明不解大乘故迷教琳法師云第二次明迷大文中有三今此第一明迷教也元康師云下第二問聞大乘教執空疑有也言故前序云等者如雲影師此論疏序云是故如來始逮眞覺應物接麁啓之以有後爲大乘乃説空法化適當時取悟不二流至末葉像教中人根庸淺道淺不明遂廢旨守筌存指忘月觀空教便謂罪福倶聞説相即謂之爲眞是使有無災興生滅造諍斷常諸邊紛然競起今略引之述義云影師作此諸序而前制序在疏初故即爲前序何者叡師序中無此文故以影師序爲正也言採此文作者求五陰與聞大乘法名爲此文也准此等文今云聞説有則等者序云聞説相即謂之爲眞准之可悉言採者玉篇木部在此字千代反字書採槲也有人解云採者猶取也疏云不知何因縁故空下等者琳法師云此是迷教也言故行品云等者此論第三卷行品末論主破重空偈文疏主釋云上半序佛説空意明佛説單空及與重空爲離諸見佛説單空及十八空爲離有見説於重空不及以獨空爲破空見下半明佛不化者以著單空不可以單空化之重空十八空獨空准之可悉言説空離見者衆生計有人法故起愛見諸佛説人法皆空即無起愛見二處言不化者向於有起愛見今於空復起愛見乃至於絶四句復起愛見是以不化也乃此以不可化門而化外人也言如智度論初卷云等者如彼論第一卷明説經因縁有二十復次之中第十六復次云第一義悉旦是眞實故名第一餘者不應實答曰不然是四悉旦各各有實如如法性實際世界悉旦故無第一義悉旦故有人等亦如是世界悉旦故有第一義悉旦故無所以者何五衆因縁有故有人等譬如乳色香味觸因縁有故有若乳實無乳因縁亦應無今因縁實有故乳亦應有非如第二頭第三手無因縁而有假名如是等相名爲世界悉旦今略引答文足慧影師問答料簡成上實義就世界法中既有成人成乳等法何故不得實有假名人正可無有眞實人何妨假有眞實也述義云言人等者等取柱瓶乃至萬物如此諸法俗諦故有眞諦故無言如實際者只就用中如此空義眞諦故有俗諦故無有人解云此本於明空而言耳故涅槃經十種二諦中第二本於二諦世人知俗出世人知眞佛説及問者是第一教隨順衆生故説二也今案大乘玄論第一卷云大論云如瓶衣等法世界悉旦則有第一義悉旦則無如實際等於第一義悉旦則有世界悉旦則無此名字互有互無故知二種倶絶倶不絶准此玄文瓶人等之名世界悉旦即有第一義悉旦即無如法性名第一義悉旦則有世界悉旦即無也今案淨名玄爲證世諦説眞諦不説等四句引此論文唯此玄文眞諦説畢竟空世諦不説畢竟空世諦説假有眞諦不説假有然方廣道人聞説第一義諦畢竟空謬取佛意謂世諦亦畢竟空故不知經説畢竟空之因縁今引論主誠文令知説畢竟空之因縁也言故四諦品云等者此論第四卷觀四諦品中引華首經偈文碩法師云下第三章雙證得失上一往明有是失空爲得故釋其所以我言空者此是因縁空故此空爲得耳汝言有是自性有故有是失也文有兩偈爲二今此一偈明因縁空有離斷常過約此多釋今且述一言因縁所生法者如因五指成拳拳是所生五指爲能生假五指成一拳故云衆縁所生法也此一句具有因果能所也我説即是空者此文引佛華首經偈此是佛稱我故云我説也即是無者明所生之拳既由五指有即拳無自性故十二門論云衆縁所生法是即無自性若無自性者云何有是法以無自性故即無拳故劵即是空也亦爲是假名者前明衆縁生法是空此空不自空空是有空故空是假名衆縁之有是空有故有不自有有亦是假名故云亦爲是假名也亦是中道義者明假有豈有有之可有假空豈有空之可空故空有即不空不有名中道義也言長行釋云等者如上所引偈長行云衆因縁生法我説即是空何以故衆縁具足和合而物生是物是屬衆縁故無自性無自性故空空亦復空但爲引導衆生故以假名説離有無二邊故名爲中道是法無自性故不得言有亦無空故不得言無今略引之言四者了因縁有宛然即畢竟空等者如仁王經上卷觀空品云即有即空疏主釋云集起故即有自體空故即空言即是不壞假名等者如大品經第十三卷佛語帝釋云五陰但假名須菩提不壞假名而説諸法相所以者何諸法相無壞不壞相故須菩提所説亦無懷不壞今略引之有人解云所言相者即是體相也即實相是也言不動眞際等者如大品經第三十六卷佛告須菩提言菩薩行般若時不壞實際法立衆生相實際中乃至以方便力建立衆生於布施建立己説布施先後際定相等今取意引之述義云諸佛世尊炳然妙智遊畢竟空凝然不反然由大悲本願力故乘種種化濟度衆生雖復應物説法斷疑而於眞際不動不轉如大經云而是涅槃實非是有隨世俗故説涅槃有然則諸法皆眞絶心言路爲化衆生大悲力故無所有中巧説諸法故云建立諸法非離眞際別説諸法只不眞空云不動眞際諸法立處所言立處者假立諸法之名體也今撿智度論第十一卷云諸法實相名爲實際今云眞際者實際之異目也所言動者乖也失也具明如重牒記疏云即生見疑下等者碩法師云下第四辨迷大小乘故生見疑兩使也琳法師云下第二起執此初列見疑二章若依起惑次第先疑後見今據説次第故云見疑也元康師云既生空見即執空疑有不信因果也言如涅槃經云等者彼經第七卷世尊答迦葉菩薩説偈文今略引初一行具如記初卷疏主釋云此中正歎大乘爲甘露愚智兩人致成甘毒今言或服甘露等者此正是無方便服甘露成毒藥受方等夭法身慧命或服甘露壽命得長存者此是有方便受大乘即能長法身慧命准之可悉言傷夭者玉篇上舒揚反玉逸曰傷害也廣雅傷毀也下猗驕烏老二反屈也殘也折也言偏軌一理等者碩法師問云疑是猶豫不了疑決成見好體應通疑見耶忽道見疑答此明於有生見聞空生疑故云見疑耳琳法師云此説次第耳若約起感次第實如所疑也今疏主意亦爾故云迷教之意必先疑後見也信行音義云猶預者上翼周反下以庶反説文隴西謂犬子爲猶猶性多預在人前故不決定者皆謂之猶預也疏云若都畢竟空下等者琳法師云下釋二章門也元康師云若都畢竟空者此是見也云何分別有罪福者此見疑也如是即無下第三雙結空有兩失也今疏主不爾准之可見言然空有具得二疑等者碩法師云此中一者於有生見聞空生疑何故爾執有來久故於有已生見忽聞説空是故生疑二者於有生見聞空生疑即雙疑空有若都空那有若都有那空猶預不定是故雙疑空有生見疑者若都畢竟空云何分別有罪福報應等即生見疑即是於有生見聞空生疑又即是於空生見聞有生疑故云雙疑空有准此疏意雙疑空有只今論文有以空疑有故琳法師云一者以空疑有法若實空應無罪福二者以有疑空然既罪福不無云何復言畢竟空也今此文正以空疑有故云若空云何有罪福等也今云學大乘人者方廣道人此學毘佛略執邪無義具明如記初卷也疏云如是即無世諦第一義諦下等者碩法師云即是疑決故成見向者疑疑決故成見若爾故知定空審定是有定非世諦虚妄故非有眞諦眞實故是有有此空故道如是則無世諦此屬上句第一義諦屬下文取是空相而起貪著明撥有爲非取空是也琳法師云下釋見章門此人初聞二説雖復壞疑久推不已妄爲決判若都畢竟空即壞於二諦然既二諦不無當知小乘據俗論有大乘望眞説空文中反釋故云如是即無世諦第一義諦也言既是學大乘人等者如大論第四十四卷云若名字因縁和合無即世俗語言衆事都滅世諦無故第一義諦亦無二諦無故諸法錯亂述義云此處但言如是則無世諦第一義諦然從既無罪福以下具明者此大師述大論明二諦相失之義故云作此牽文出大智度論准此記文疏主引大論文以明生見義也取言牽者曇捷師云苦田反字林云牽引也言故智度論云等者彼論第六十四卷信毀品文言五百部者六百年初有五百羅漢是旃延弟子於北天竺造毘婆沙論謂北天竺罽賓國集五百羅漢共脇尊者造大毘婆沙論此云廣解於西凉州譯出凡有百卷値兵火燒之唯六十卷現存止解三揵度也准此文今云五百部者薩婆多部枝流也具引論文如記初卷也疏云取是空相而起貪著下等者琳法師云下第三結通其人空有定執便謂俗有眞無二諦修別聞大乘人説萬法空遂則謗云是眞諦邪見人故云種種過也又復外人定執有無斷常見故復因斷常遍生諸感故云種種過也元康師云下結空見過謂執空疑有不信罪福故云取是空相等也疏云於畢竟空生種種過等者碩法師云即是結也明畢竟空者何曾空何曾有而復計空計有即是種種過人云或謂有此空或謂無此空有此空即常見無此空即斷見也元康師云下結有見過謂執有疑空不信無明相也疏云龍樹菩薩爲是等故下等者碩法師云下第二辨菩薩爲此迷縁造中論也琳法師云下大文第二結答前問明造論所由也言問非有非無是愚癡論等者如中論玄義引釋論云有四種門一毘曇門二空門三毘勒門四非空有門不得般若方便學毘曇門則墮有見學於空門即墮空見學毘勒門則墮亦有亦空學非空非有門則墮愚癡論准之可悉今案大論第十五卷忍度餘云問曰佛法常空相中非有非無空以除有空空遮無是爲非有非無何以言愚癡論答曰佛法實相不受不著汝非有非無受著故是愚癡論若二言非有非無是則可説可破是生心處是諍論處佛法則不然雖因縁故説非有非無不生著不生著則不可破不可壞准之可悉中論疏記卷第二之末寫本云寛喜二年庚寅五月八日於廣隆寺北僧坊書寫畢三論宗沙門阿耨坊覺嚴云云于時正應元年十二月十七日書寫了同日終夜自校合之畢所望只爲興隆佛法利益衆生也金陵末資玄空坊藏海
