body:
  text: 中論疏記卷第二之本集衆異説不敢和會大安寺沙門安澄撰疏第一卷末流云能説是因縁善滅諸戲論下第二明教用等者此下第二明二智中道也述義云以此三智能起教用故權實二智名爲教用故云第三明教用也言即是辨二智中道者述義云上就諦門廣辨中道今略就智辨於中道也辨中以諦爲正宗故百論文中無辨二智中道之義然師以義准欲明二諦本是佛智所説故兼明二智中道也有人解云佛智能説八不是教起用此即智用名爲教用也語遠是智用近是教用今從近義故云弟二明教用也疏云故摩耶經云等者如彼經文云摩訶摩耶問阿雖言佛滅度後何人持法阿難答曰一百年已優婆崛多説法教化乃至六百年已一九十六種邪見競興破滅佛法馬鳴比丘摧此外道七百年已有比丘名曰龍樹善説法要燈正法炬滅邪見幢今略引之疏主釋云然正法炬者即是建五正法之義謂顯正義此歎外用也滅邪見幢者即是防護正法之義謂防邪義此難内徳具明如涅槃疏第七卷初准此疏文燃正法炬者證爲顯三種中道也滅邪見幢者證凧爲減諸戲論也疏云楞伽云等者如入楞伽經第八卷大慧菩薩白佛言佛滅度後是法何人受持佛以偈答曰於我滅度後南天竺大國有大徳比丘名龍樹菩薩住初歡喜地爲人説大乘能破有無見往生安養國今略引之疏主解云釋此語不同舊云龍樹是初地人關内姚道安學智度論云此是龍樹引衆生令入初地而實是十地人也廣如序疏准之可悉疏云既是佛智能説等者述義云既以佛智能説八不故明於熊説之二智山疏云二智證方便等者述義云釋名凡有四句一者一名一義謂一名即一方便名一實名一義謂方便善巧之義實是如實之義二者一名無量義謂一是無量一豈不是無量乎此即無量而一一兩無量華嚴云一中解無量無量中解一展轉生非實智者無所畏且就四義解之一隨名釋如方便以善巧爲義等二因縁釋如方便以實爲義實以方便爲義等由無礙故三顯道釋如方便以不方便爲義等四無方釋如方便以一切法爲義等三者一義一名謂以正道爲一義以方便爲一名然正道未曾名與無名爲一道故立乎一名立一名者爲顯一道故以云爾四者一義無量名謂爲顯一道立無量名既爲一道立無量名其無量名豈不顯一道乎如就方便實釋名歴一切法例爾智以決斷爲義若能決了諸法是善惡是因果乃至有爲無爲常無常等如此決了名爲智故慧以鑒達爲義若能玄鑒此等諸法體相皆空無有決定通達無相名爲慧故如以黄金作環玔等種種巧物巧物勝金般若之巧名方便方便勝般若其義亦爾具如名記第四卷也有人隅云所言非實非方便等者此以無二智照不二境故百論序疏云非正境無以發正智非正智無以照正境問此境智既是體中與第五正性何異答通者同故無量壽經疏云以通言者以正因生正果與今正境正智發澱等同之就別言者彼此異也此正境正智不及彼正性此約通門可爲言之彼佛性門約就別義是故異也正性非以正因性於正果准知正境正智非發照也謂此正境正智之非境智義是配正性也問體中之外有何物正性耶答若約通義及總義者體中佛性般若一乘涅槃法身眞如皆是同也皆指華嚴正法爲本也然五種佛性約總之別亦通之別而建立之是故正性非是境智之所發照今此體中發照相對是故境界觀智二性之所相攝具如經疏及遊意也問師文中何指理智以爲正因佛性耶答涅槃疏中指智爲正因佛性此約主義而爲言之非取照義以爲智也餘十部許經論疏中指理以爲正因佛性此約根本體義而爲言之非取境義以爲理也具如寶崛也所言泯然無際者述義云寂靜故泯然也無際者無間也玉篇泯者彌忍爾賓二反亂也滅也盡也邃曰泯也際者子例反交會之間也接也相接續也會也合也方也流云彼經正明等者述義云彼涅槃經正明因果等義何者境界與觀智爲縁因菩提與涅槃爲縁果合成四性加第五正性而成五性故云明五性義也言就論主等者既明二智故二智明了即是菩堤於菩提上無累之義爲果果性故云亦得具五性也疏云謂能説八不因縁等者碩法師云善滅者簡無聲聞若聲聞斷煩惱修智慧煩惱即本有今無智慧即本無今有本無今有即是生本有今無即是滅箇即有生有滅不名善滅今佛不爾智慧本自不生煩惱本目不滅智慧非本無今有煩惱非本有今無即是不生不滅故稱善滅諸戲論准此疏文能説不生不滅等八不因縁滅二乘生滅等戲論也琳法師云善滅諸戲論者文有二意一明因縁生法性恒寂滅但有心將會者悉不相應稱滅戲論故智度論云因縁生法滅諸戲論佛能説是我今當禮二彰佛智窮源契理究竟宣示未聞同已所詮亦云善滅何者但二乘之人執法有性斷除生死別求涅槃情懷取捨非爲善滅故淨名云法無戲論若言我當見若斷集證滅修道是即戲論非求法也佛即窮理盡性巧談諸法從因縁生畢竟空寂即是涅槃非謂除法始方滅累稱爲善滅蓋由法性自爾佛便依起説若理不然則聖無此力也故肇師言聖得理成理爲神御斯言當也道二乘存心取法妄執有無言不合理通云戲論若能忘當息慮冥心至理者方爲善滅也准此疏文此論與大論各擧一義也有人解云不八戲論者應言説八計之能不而滅所不之八戲論也又論迹云外道成八非不論主是八不以八非不故成虚妄以八不故是中實也疏云又觀法品等者如此論第三卷觀法品長行末云戲論有二種一者愛論三者見論碩法師云五鈍煩惱名愛論貪瞋慢疑無明五利便名見論身見邊見戒取見取邪見疏云又利根者起見論等者有人解云出涅槃法華淨名智論等中也疏云師又約漸捨葬等者言一者佛有誡勸二門等者案十二卷章第二云此則第一善惡相對惡是墮墜乖理無有出功故十惡爲戲論也義是清昇扶理有出之義故十善非是戲論准此章文今言惡是十惡善則十善也碩法師云諸佛出世誡諸惡莫作勸諸善奉行也能説是因縁即是因縁即是勸善也善滅諸戲論即是誡惡此明佛初出世減惡修善謂惡是戲論善是不戲論也言府墜者玉篇上附倶夫禹二反胕腫也説文俛病也厨也又作俯字弗武反下首也下面也説文此俗順字也順低頭也下説文古文地字也墮落之墜爲隊字在阜部隧馳愧反爾雅隧落也失也文字辨嫌直類反隨也言符理者上玉篇輔倶反似草木實房柎字在木部符信爲符字在竹部也符附簾虞反符合也清昇者玉篇上且盈反潔徹無瑕穢也澄也下舒承反毛詩如日之昇傳曰昇出也疏云二者善有二門等者十二卷章云此即第二有相無相對是分別爲戲論也無相即無分別爲非戲論亦云漏無漏相對謂有漏之善但得三有果報不能出生死止是不動不出故名戲論無漏之善破裂生死故不名戲論也碩法師云有相有所得善是戲論無相無所得善是不戲論也疏云三者得無得二等者章云是第三一異相對謂上雖言有相是戲論無相非戲論若見有相異無相者是戲論也見相無相不異乃名非戲論乃至善之與惡生死涅槃凡聖解惑萬義竝類也有人解云此二不二及非二不二相對也言如云明與無明等者此涅槃經第七卷文今略引之解云謂推求此明之與無明盤相畢竟不可得何所論異而謂之異即是愚人也言諸有二等者此大品經第三十九卷文今略引之解云以無菩提因故云無道無涅槃果故云無果所言道者是因義也言智者了雖等者此亦大經第七卷次下文也解云了悟明興無明不二即是智人也碩法師云有所得無所得二是戲論有所得無所得不二是不戲論准之可悉疏云第四明二與不二中者有人解云此第四二不二非二非不二及台忘慮絶相對此依華嚴經文也碩法師云二不二竝是戲論非二非不二是不戲論也疏云第五若有戲論等者有人解云此第五戲不戲及無戲不戲相對此亦依華嚴經文也碩法師云若見戲論不戲論竝是戲論若不見戲論不戲論竝是不戲論若能善滅箇是佛能説八不因縁故能善滅如此戲論也准之可悉疏云答戲論破慧眼等者案中論第四卷觀如來品未偈云如來過戲論而人生戲論戲論破慧眼是皆不見佛今略引下半偈文長行釋云戲論名憶念取相分別彼此言佛滅不滅等是人爲戲論覆慧眼故不能見如來法身元康師釋云戲論破慧眼是皆不見佛者慈眼見法身法身離四句戲論是四句故有戲論則破慧眼無慧眼故不能見佛也思益經云若有於法生見則於其人佛不出世也戲論名億念取相分別此彼言佛滅不滅等者此戲論是言如來城後有無亦有亦無非有非無等四句今云滅不滅等者滅是無不滅是有等即亦有亦無非有非無雖包四句意在第四句也是人爲戲論覆慧眼故不見如來法身者此以法性眞理名爲法身也准之可悉述義引大品經第三十二卷云佛告須菩提非所有非無所有無諸戲論是名得道觀五陰若常無常若苦與樂若我非我若寂滅若非寂滅是爲戲論若聖諦應見集聖諦應斷滅聖諦應證道聖諦應修是爲戲論乃至當得一切種智當斷煩惱習是爲戲論照了達義名之爲眼無量壽論云肉眼清徹靡不分明天眼通達無道無礙法眼觀察究竟諸道慧眼見知能度彼岸佛眼具足覺了法性廣明五眼如大品等也疏主解云慧眼就體得名謂以慧爲眼故名慧即以智爲體若約境者照於実相故有慧眼也疏云我稽首禮佛者此第三等者琳法師云我謂青目也首謂頭首三業虔敬歸依致禮名稽首禮故小論言起善心轉愛果擧體敬禮也准此師意可見今旨謂波師初牒二偈是釋論師所以云爾今疏主意初牒二偈是本論師然則應言我者龍樹菩薩首謂頭首謂三業虔敬歸依致禮名稽首禮所以疏云論主致敬也言推功與佛者玉篇惟出准他雷反往來也去也進也擧也用也鋼也與述義云與猶寄也案云推功歸佛是也疏云又稽首者欲請等者案碩疏云二者請威靈加護明佛説聖教能淨生滅息斷常縁今謂生滅成斷成所以述正教使正教不開故今是申佛正教所以謂請威靈加護故須歸敬謂無生二諦其趣離明唯佛能宣凡佛弟子造論申經者無不承於佛力若不歸依者請佛威神加護證説無由故須頂禮也有人解云加護者加神力而助護也亦可加慈悲護念也疏云又龍樹未悟無生等者案傳云龍樹菩薩者出南天竺梵志種乃至出家受戒九十日中誦通三藏更求異經都無所得乃至周遊諸國更求深經於閻浮提中遍求不得外道論師沙門義宗咸皆摧伏外道弟子白彼師言師爲一切智今爲佛弟子弟子之道諮禀不足將未足一事非一切智人也辭窮情屈即起邪慢心自念言世界法中律塗甚多佛經雖妙以理推之一猶故未盡未盡之中可摧而演之以悟後學於理無違於事無失斯有何咎思惟是事已即欲行之立師教戒更造法服令附佛法而有少異欲以陰衆人情示不受學擇日選時當與諸弟子受新戒著新衣獨居靜室水精塔中大龍菩薩見其如此惜而愍之即接之入海於宮殿中發七寶函以諸方等深奧經典無量妙法授之龍樹受誦九十日中通粥解多其心深入體得實利乃至龍樹既得諸經一相深入無生二忍具足龍樹還送出於南天竺大弘佛教摧破外道摩明魔訶衍制作諸論乃至去世以後過五百歳南天竺諸國爲其立廟敬奉如佛其母樹下生之因字周那周那樹名也以龍成其道故以龍配字號曰龍樹廣歎如傳又付法藏經第四云捨欲出家九十日中誦閻浮提所有經論摧伏一切諸師自謂一切智人依諸弟子請告曰欲自樹爲佛獨處水精塔中大龍菩薩神力接海官示法藏九十日間誦倍閻浮深入無生二忍具足龍王送出因以傳世華嚴傳云依智論大乘經多是文殊結集佛既涅槃諸聖隨隱邪興無大乘器故攝華嚴等大乘教法置龍宮六百餘年龍樹入海誦之傳世依文殊般涅槃經佛滅後四百五十年文殊在世智度論云諸龍王特千佛經藏出法華硫智度論百卷云大品十萬偈諸龍王宮阿須羅宮諸天宮中有子萬偈命長識強故能持何況大菩薩所知般若等有人解云大龍菩薩者經下文云龍王送出私穎沙竭羅龍王沙竭羅龍王者慈思云鹹海名也疏主云本國名亦可海名也華嚴云得一念中轉自龍形示現無量衆生身也言二無生者大論解無生品云衆生無生諸法無生悟二種無生故名無生法忍薄法圖賛云既悟無生二忍也准此等文海宮者沙竭羅龍王宮也無生忍者人法二無生忍也自樹者自立也疏云又論主因佛悟無生等者碩法師云三者念報佛恩明佛能説八不正教滅戲論我今禀佛正教發生智慧所以能滅戯論其功重大故須歸敬准之可悉疏云又禮佛者欲令後人等者有人解云天魔者是第六天魔王也淨名經云魔王多是住不思議解脱菩薩也法門名義集云威力自在與佛淨故稱爲魔王修上上品十善即生其中也言調達者提婆達多天竺音緩切也斛飯王子此反云天熱諸天逆知造三逆罪故心熱也亦云天授從天乞得天與授故未來作天王佛非過去天王佛不須三衣鉢等是未來佛也攝論云是大賞伽羅菩薩也小乘經云墮無間獄後成辟支佛法華經云成佛也是違方便也言小乘人等者智度論第六十八卷又四卷信毀品文亦名泥梨品具引文如記第十一卷也疏云答九十六種術等者琳法師云説法之人汎論有五一諸天説二化人説三聲聞説四菩薩説五諸佛説此五種人中唯佛一人能窮法性巧説深理故云第一故云諸佛正法名爲第一硫云問曰何故造此論下第二明等者述義云先應問言佛何故説八不又龍樹何故標八不存論之首應答言佛説無生教而破衆生生滅之心令悟無生以衆生不堪故佛説四諦生滅法然像末衆生封執生迷故龍樹説無生教破生滅見故標八不在説之首也有人破述義問意云此釋非也尋其意者以答文明佛説八不故也破云若爾即違下以五義釋不問佛説經之所以也有人解云此文既云自下長行青目所釋明知疏主意前二偈是本論師偈也河西亦同般若燈論初偈歸敬重牒本偈但山門及琳法師并元康師竝以初牒偈爲注人預表以重牒二偈爲龍樹初偈也疏云因上生者上云等者碩法師云一者從上生上來標八不竟即道能説是因縁善滅諸戯論既能説八不因縁善滅斷常戲論即是顯於中道此事已足復何須造論耶疏云一者佛經無量等者碩法師云佛智慧大海窮廣極深於一念中説無量修多羅藏縁尋讀此尚不能解汝今更復造論轉足煩多故不須道論准之可悉所言屏者曇捷師云谷領反字林云屋蔽也又匿也玉篇俾領反藏也除也退也故去也又薄經反屏風謂荷葉障風也疏云二者佛言巧智深等者碩法師云佛在世時爽利聞説即解佛去後世人眼轉鈍雖復聞説終不能解故不須造論若便造論汝智應勝佛汝智既不勝佛豈得造耶疏云三者如成實論云等者如彼論第二卷立論品云問曰不應造論論佛語所以者何若佛自論可名爲論若佛不論餘不能論所以者何一切智人意趣難解何所爲故而説是事若不得佛意妄有所説即爲自傷乃至以此等故不應造論今略引之疏云正問之中有三一總標不聽造論所以者何下第二釋若佛自論可名爲論若佛不論餘不能論所以者何下第三傳釋就中有四一明佛意難解爲難若不得佛意下第二明謬取即爲失爲難乃至廣説准此疏文今言問曰不應等者第一總標不聽造論言所以然者一切智人等者第三傳釋有四中第一明佛意難解爲難言若佛自輪等者第二大段釋文次小例也唯之可悉疏云四者諸佛等者碩法師云佛有三達洞達三世根縁過去已度現在正爲説未來流此教法與作得度因縁此事已足何須造論也預杜者上玉篇餘據反忩也佚也厭也叙也早也預也先辨也今須後訓也下玉篇徒敷反杜塞也歮也根也元康師云閉塞義也迷逆者玉篇上莫鷄反誤也或也下魚戟反迎也奉事也却也亂也述義云逆者兼也疏云五者馬鴫等已造論竟等者有人解云此菩薩造起信論及莊嚴佛法論數萬偈等也古傳云桑岐曷國人付法藏經云華氏國人次月氏國人也摩訶衍論云六時出現作玄理論本原論等多論又云過去作佛金剛正智經云大光明佛大莊嚴三昧經云遍照達莊嚴佛甚深道場經云日月是明佛言馬鳴者摩訶衍論記云昔見白馬而鳴故隨過去行事故云馬鳴也今案法藏師起信疏云馬鳴菩薩造者馬鳴之名依諸傳記略有三釋一以此菩薩初生之時感動諸馬悲鳴不息故立此名也二此菩薩善能撫琴以宣法音諸馬聞已咸悉悲鳴故立此名也三此菩薩善能説法能令諸馬鳴垂涙不食七日因此爲名也疏云六者汝已造大無畏論等者如傳云龍樹菩薩廣明摩訶衍優婆提舍論十萬偈又作莊嚴佛通論五千偈大慈方便論五十偈中論五百偈令摩訶衍教大行於天竺又造無畏十萬偈中論出其中准之可悉疏云七者凡造論者多有過失等者琳法師云凡造論者多起貢高少同和意増長鬪諍賢聖不許假令内雖調善外觀多過汝今何故優造斯論耶疏云八者龍樹出世等者如涅槃經第五卷云佛告迦葉菩薩有四種人能護正法乃至出現於世能多利益爲世間依安樂人天猶如如來名人中勝爲歸依處准此經文今論主也四依一數故云出世如佛准之可悉淡海記云實行菩薩猶如佛也言敢遮者上疏主釋云果敢決定義也下玉篇之蛇反遏也遏者於葛反絶也止也萠逆止也逮也遮也徼止也疏云答曰下第二論文等者述義云有疏云在文既長今懸答之問曰何故造此論即含九問意故名論文既長今如次第答之故名懸答也又即下文合有九問下答文長今直懸答令意易見有人解云此説不爾論中問文但有五字不可云長亦不謂問文長但云論文既長又答文九者是疏文也非是論文所以不可云論文也但尋疏文而釋耳不可依信今明論答文長一枚及部故取意懸答也疏云答第一問云等者琳法師云佛雖善説中道能滅斷常但衆生障厚去聖時遠惑網自縈未窮聖意我今造論肋佛揚化以濟群生准之可悉問上云群生不窮大悲無限非止益當時欲遠傳遐代故有流通於今何故云但化當時耶答上通約經三假而爲言之今約所屬機縁而爲言之故不相違可悉疏云答第二問云等者碩法師云語言彌廣轉足煩多語言略申教不盡今明佛於一念中雖復説無量法但末代根縁不了故萬造論衆經要意無過八不所以申教而盡鈍根不解故須造論也言浩博者玉篇上胡道反猶饒也流也下文字辨嫌作博字布莫反廣也言據者玉篇七活反罣也以三指而取也持也言故下文云等者此重牒長行初問答之中文所引之文全同於此疏主樺曰在法雖多略説八事即病無不破教無不申言如佛直説無生等者如智度論第五十三卷釋無生品云論者言無生觀有二種門一者柔順忍觀二者無生忍觀前説無生是柔順忍觀不畢竟淨漸習柔順忍觀得無生忍即畢竟淨乃至廣説准之可悉疏云答第三問云等者碩法師云佛實有三達洞照三世根縁留此教門化於末代但後時學者迷教失旨故我爲此衆生須造論乃是師資相順非謂顯我智解勝佛也旨是故經云等者如賢愚經卷云舍衞城老女無縁故佛不得度即掩自眼不欲見佛又此觀佛三昧經文遺羅睺羅令度也今案智度論第十一卷云佛與阿難入舍衞城乞食時一貧者母立道頭阿難白此人可愍佛應當度佛言無縁阿難白佛近見相好光明發起作因縁佛近迴身背佛四邊四向背佛仰面佛上來低頭向下佛地涌出兩手覆眼不肯覩佛佛言欲作何因縁而無度因縁不得見佛准之可悉言如阿難度須跋事者如大經第四十卷末佛告阿難言汝五百世中作須跋子其人愛心習猶未盡以是因縁信受汝語乃至須跋言善哉阿難及聞佛説實相得阿羅漢果此引例成前賢愚經心也疏云答第四門等者言故成實論等者如彼論第一卷立論品末云又佛法深妙解者造論不解即止乃至又應造論所以者何若經造論義即易解法即久住又佛聽造論如經中説佛語此丘隨所造論應善受特乃至廣説今略引之准之可悉言如智度論云我今如刀等者疏云答第五問等者言如經云等者述義云摩訶摩耶經佛説偈云我於諸衆生應度縁今畢乃至諸佛雖滅度法僧寶常住所言得度因縁者即佛教法及舍利形像井弘法者爲後代人所依如佛是也今撿遺教經云汝等比丘勿像悲惱若我住世一劫會亦當滅會而不離終不可得自利利人人法皆具足若我久住更無利益應可度者若天上人間皆悉已度其未度者皆亦已作得度因縁自今以後我諸弟子展轉行之則是如來法身常在而不滅也今取意略引之疏云答第八問云等者琳法師云我今造論爲衆生開佛知見引物令悟非爲自恃己長妄談彼短也言如有目人等者三十三字缺疏云解有五義等者言第一明雖復答其説經等者二十字缺言二者先序佛説經等者三十字缺言三者論主等者案注法華經化城喩品云白日收光明月接耀晝夜之所爲也如來𢒷采菩薩舒暉利鈍之所感也而言白日明月者如倶舍論云有情業力共引風起運持日等令不停墜日徑五十一由旬下面頗胝迦寶火珠所成能熱能照月徑唯五十由旬下面頗胝迦寶水珠所成能冷能照以月宮殿行近日輪光所侵照餘邊發影自覆日輪令於爾時見不圓滿又雜寶藏經云難徳主問日之在上其體是一何以夏時極熱冬時極寒夏即日長冬即日短郡伽斯答言須彌山有上下道日於夏時行於上道路遠行遲照于金山是故長而景熱日於冬時行於下道路近行速照大海水是故短而極寒准之可悉言潜者似簾反藏也隱也詫也探也密也沈也今須初二訓也接者續也字在木部也釋迦現滅故云如來𢒷彩也𢒷者側立反聚也𣫍也藏也今須後訓也彩者影也光也龍樹出與故云菩薩舒暉也三四者前序等者述義云如法華經第二卷譬喩品舍利弗領解云眞是佛豫從佛口生從法化生得佛法分今謂不爾如勝鬘經一諦章末云正見者是佛眞子從佛口生從正法生從法化生得法餘財疏主釋云從佛口生者是聞慧也教出佛口依之生解名從佛口生也從正法生者是思慧也思從理起名正法生也從法化生者是修慧也行徳先無今時忽起名爲化生得法餘財者是法資也地上得理是爲正財今得教資説爲餘財具如疏下卷准此疏文如來二諦教出於佛口依此二諦教生於二智故云從佛口生餘准可悉言故自小之大者之猶至也疏云答有二義等者言一者欲擧小對大如法華等者如彼經第二卷譬喩品云昔於波羅捺博四諦法輪分別説諸法五衆之生滅今復轉最妙無上大法輪是法甚深奥少有能信者疏主釋云初偈明昔小爲麁後偈歎今教爲妙即對昔小歎今大也何者衆經竝是擧小對大歎故知諸大乘經顯道無二不得作五時四宗之釋也言五衆生滅者對治悉旦耳説五衆不生滅者第一義悉旦若悟第一義悉旦即生實觀生實觀即是妙慧妙慧即是妙法妙法即是一乘是故説五衆不生不滅也問何以知之此經明五衆不生滅耶答前文既明昔教説五衆是生滅即知今教明五衆不生滅故方便品云諸法從本來常自寂滅相具如疏第五卷言大品見第二法輪轉者如彼經第十九卷云爾時諸天子虚空中立發大音聲踊躍歡喜以分陀利等四華而散佛上如是言我等於關浮提見第二法輪轉是中無量百千天子得無生法忍今略引之述義問云初説法時令人得道名轉法輪何以今言第二法輪若以佛説皆是法輪何限第二答初説法名定實一法輪由初轉乃至法盡通名爲轉此諸天子見此會多人而得道故讃言第二轉然初轉時八萬諸天得無生忍陳如一人得初道果今無量諸天得無生忍故今轉法輪似如初轉問既言見第二法輪豈非第二時教耶答不爾諸大乘經歎今教爲妙竝擧昔小而對歎之若不爾者法華涅槃亦應第二時教竝指波羅捺故問若爾者深密所會般若爲是何耶答經迹義初云如來成道第五年中説十萬偈般若備明二空至第七年爲大菩薩而説般若色心皆空也眞諦三藏云佛成道後第七年在舍衞國照慧江邊説法空般若爲第二法輪准此等文深密所會非大品般若也言涅槃十三卷等者如彼經第十四卷佛告文殊師利言善男子是諸大衆諸佛世尊語有二種一者求小乘二者求大乘我於昔日波羅捺城爲諸聲聞轉于法輪今始於此𤘽尸那城爲諸菩薩轉大法輪也法寶師云遠若是一法重宣説者可名爲更今昔全別何得言更自下辨其文有八初明佛語異爲聲聞説世語爲菩薩説出世語二明所求異昔爲求小今爲求大三明根性異四明精進異五明得益異六明請主異七明説法異八明遠近異今約第二而爲言之疏云答有五義等者所言如部雖二十略明五部者言二十部者如經迹義中云至一百餘年分爲二部一者摩訶僧祇部此言大衆部二者多鞸羅部此言上坐部從大衆部分爲九部一名大衆部二名一説部三名出世部四名崛居部五名多聞部六名施設論部七名枝提部八名阿波羅部九名欝他羅部三百年中上坐部因諍論事分爲十一部一名薩波多部二名雪山部三名犢子部四名達摩欝多部五名跋陀耶尼部六彌底部七名六城部八名彌沙塞部九名曇無徳部十名迦葉唯部十一名修多羅論部言五部者一薩波多部二曇無徳部三僧祇部四彌沙塞部五迦葉唯部具釋名義并會相違如下疏云問下文等者此初牒長行明説教意之中破邪顯正意竝説小乘教意文指此文故云下故彼文云佛欲斷如是等諸邪見令知佛法故先於聲聞法中説十二因縁相等准之可悉疏云答後説因縁生等者述義云一者被外道生等者非是以佛所説爲倒唯於佛説十二因縁更起執心故爲例耳故云輕倒奪重倒言二者欲顯外道等者約迷大小乘而爲言之言三者顯外道等者約大乘二諦而爲言耳今案論文言一者破外道生等者先於聲聞法中説十二因縁等文是言二者欲顯外道等者又爲已習行等文是但二者之中言一迷大乘本自無生者配又爲等文二迷小乘因縁生義者配佛滅度後等文言三顯外道等者聞大乘法等文是故云後説因縁生凡有三義等也言榍者先結反限也字也如成實論第十六卷三慧品云如以細榍能出麁榍如是以色界道能斷欲界今取此文也疏云問三論列彼二天等者如百論上卷捨罪福品初外曰種種説世尊相有人言韋紐天秦言遍勝天名世尊有人言魔醯首羅天秦云大自在天名世尊如十二門論觀作者門云復次若他作苦者即爲是自在天作如此邪見問故佛亦不答元康師云下第二破自在他也若准此下文即外謂一切萬物皆自在天作准之可悉問十二門論唯在自在天今何故云三論列二天耶答總相云二天以小從多故疏云答此中所列等者言十二門論所列是佛滅後等者有人解云出小乘人計之中在此文故言又此中所列等者碩法師云中論明二天爲出計生義百論明二天爲簡世尊准此疏文所言法者生義也人者世尊也言十二門論所例等者如彼觀作者門云復次若他作苦者即爲是自在天作如此邪見問故佛亦不答而實不從自在天作何以故相相違故如牛子還是牛若萬物從自在天生者皆應似自在是其子故復次若自在作者衆生者不應以苦與子是故不應言自在天作苦疏主釋云下第二寄小乘人破自在天他人二初總牒外義釋佛不答所以而實不從下第二別破自在天作於中有二初作父子不相似破復次若有下作傷慈破然實是大乘人破而寄小乘人破者一示外邪不足破小乘尚破況大乘耶二欲分大小異小乘破麁邪見破作者明麁無作門大乘破細作明細無作門三示大乘人精解大乘巧破外道小乘不能爾乃至七示小乘人但解佛顯教不解密教密教者明因縁苦即畢竟空令此人畢竟空盡成佛故又云苦即是果但苦爲大患之本物競求離面不識苦非但不能離苦而於苦中更復造苦是以遍破苦也具破人法二種四作具明如彼也疏云答十二門説等者如彼論觀作者門引自在經説云自在天欲作萬物行諸苦行即生諸腹行蟲復行苦行生諸飛鳥復行苦行生諸人天若行苦行初生毒蟲次生飛鳥後生人天當知衆生從業因縁生不從苦行有疏主釋云不能無障礙破也謂人天非物因物非天果是邪心所盡故名邪因邪果何者人類生人物類生物人類生人即還似人物類生物物還似物蓋是相生之道也而謂一天之因産萬類之果豈不謬故述義云地獄餓鬼是人攝阿修羅者畜生攝故以大分云生六道也元康師云重破自在作此有礙不從破准之可悉言此天面有三因等者述義云此出外道經故云他經有人解云此四阿含經文故云他經也大論第二卷云摩醯首羅秦言大自在八臂三眼騎白牛注法華經云摩醯首羅者帝釋師也有人云第四禪梵天王也今謂欲界大自在天也醯者呼爰反碩法師云外國摩醯首羅此間翻爲大自在天若小乘教中不説有此天若大乘教中方説有此天此天四本之下四禪之上故是色界之中間此天有八臂三眼騎白牛持鈴執貝案行國土世人事此皆謂萬物從此而生及憂喜苦樂故道自在天瞋衆生受苦自在天喜衆生受樂故道萬物從此天而生亦是此天自謂萬物從我而生也元康師云此天形長大萬八千由句壽命萬八千劫身有八臂面有三目騎白牛執白佛有大威力能傾覆世界或謂能造萬物爲造化之主也智度論云過淨居天有菩薩淨居天名摩醯首羅即此天也琳法師云此天住色界頂時現神變動此世界謂能造有命無命一切之物擧世珍之以爲化本故云從生也自餘形體壽命數力威儀全同元康師説故不重記也准此衆釋引法華疏者非也言涅槃經明等者案彼經第十九卷有六惡臣爲阿闍世王説外道六師事云迦羅鳩馱迦旃延云一切衆生悉是自在天之所化自在天喜衆生安樂自在天瞋腿衆生苦惱一切衆生若罪若福乃是自在之所爲作今取意引之迦羅鳩馱者是其母名無垢稱經慈恩疏第三卷須菩提章云五犎迦衍那迦衍那是姓犎者是形頂上有犎猶如牛頭故以爲名古傳云迦羅鳩馱迦旃延此是事大自在天之者諸説大自在天能生諸法也戴載下今裁反事也成也爲也獻也客也即也言也中也設也禮也所也處也覆也物終更失也車所戴之物也髑髏者大般若信行音義云上徒不及頭骨也下力侯反髑亦髑也疏云韋紐天等者言影師云等者僞秦長安曇影法師製此論疏凡有二卷今案彼上卷云大自在天云此天在色際時現神變動此世界故擧代珍之遂名化本韋紐天云此天處在欲界之極性多惡害侵惱衆生時人威畏亦如尊事今略引之疏云答劫初之時等者案大論第八卷云復次劫盡燒時一切皆空衆生福徳因縁力故十方風至風風相次能特大水水上有一千頭人二千手足名爲韋紐是人齊中出千葉金色妙寶蓮華其光大明如萬日倶照華中有人結跏趺坐此人復有無量光明名曰梵天王此梵王心念生八子八子生天地人民是梵天王於諸婬瞋已盡無餘乃至廣説碩法師解云亦言韋紐亦言韋糅榛亦言毘履紬此間翻爲遍淨亦言流下問亦名遍結既稱遍淨復言是欲外之上乃無的解相傳釋云義推可是第三禪明此天世界初欲成下生有一千頭二千手足齊中有天蓮華蓮華中生八子從八梵生人物世間事此天以爲祖父故道從韋紐天生所言紐者如九反紐者女忍反今初字好與有本云糅而配合也糅者切韻女故反雜也去聲也言上有人者天人故琳法師云水上有人蓮華者金色妙寶蓮華也光音天子等者琳法師云他方世界光音諸天也應生此土者有八天子一時化生有人傳云光昔天子者第二神有極光淨天之人也即是第三天也所言戟者居逆反字林云有枝兵器也周禮長六尺也鴼戟也亦三尺三廉戟也問約自在天生具有三寶今何不明耶答碩法師云有人解云師即有二天即無今明亦有故釋論中解婆伽婆文傍明兩天道有行此諸師法者亦攝此天爲一切智有行諸師法者即是僧法者即是法亦攝此天一切智即是佛只此文亦是有言即是行法之人名之爲僧從韋紐天生即是所事之主名之爲佛明此天生説即是法准此疏文上已明三寶今且存略實有三寶也疏問智度論等者案彼論第三卷云摩醯首羅騎金翅鳥鳩摩羅天秦言童子天八臂三眼騎白牛韋紐天秦言遍悶天四臂捉貝持輪是天擎鷄持鈴捉赤幡騎孔雀皆是天大將今引此文以爲雖問也言以其是初禪梵王等者案涅槃疏第四卷云童子者大論云四歳以上二十以還名鳩摩羅伽地此云童眞也今此童子亦可是童眞地菩薩也又法華疏初卷引阿含經云尸棄是初社梵王亦名鳩摩羅伽此云童子天此人顏如童子故以名焉乃至云此爲娑婆三千世界主者四種梵王中約上上品而爲言之若九地菩薩作梵王者領二千世界此約上品而爲言之智度論長阿含經梵王爲千世界主者約中品而爲言之經云爲一四天下王者約下品而爲言之問尸棄是大千之王在何處中間禪住耶爲億中間今在中央住例如佛大千中央間住也光宅云是第二禪梵王也有人云第三禪梵王也今依阿含經云初禪梵王也言亦名邪羅延天等者案百論疏上卷云別有提婆論云韋紐名那羅延天等云云今案彼論云第十五外道摩醯首羅論師作如是説果是那羅延所作梵天是因摩醯首羅一體三分所謂梵天那羅延摩醯首羅地是依處地主是摩醯首羅天於三界中所有一切命非命物皆是摩醯首天生摩醯首羅身者虚空是頭地是身水是尿山是糞一切衆生是腹中蟲風是命火是暖罪福是業是八種是摩醯首羅身自在天是生滅因一切從自在天生從自在天滅名爲涅槃是故摩醯首羅論師説自在天常生一切物是涅槃因也第四外道韋陀論師説從那羅延天齊中生大蓮華從蓮華生梵天祖公彼梵天作一切命無命物准此論文百論疏約第四外道説韋紐名別羅延天故元康師説此説與韋紐相似今此疏文約第十五外道説鳩摩羅伽天亦名那縁延天亦可百論疏約眞應兩身義故云韋紐天亦名那羅延天此疏約彼外道三身義鳩摩羅伽天亦名那羅延天也智度論提婆論相違准之而言那羅延者法華疏解云郡羅延者此翻爲力故倶舍論第十九卷分別慧品二云人道中百香象力歒一白象王力百白象王力歒一摩訶諾那力百摩訶諾那力敵一鉢央建提力百鉢央建提力歒一婆良加力百婆郎加力歒一遮㝹羅力百遮㝹羅力歒那羅延力註法中云那羅延者文身幻術等也文身者以彩畫身使斑也而今翻爲生本者二流互擧准之可悉流和合生者凡有四義等者言一者其人等者此當現縁外道計元康師云此許似正而非正何者凡和合生須假衆縁外假四大父母内由過去業行内外和合乃有衆生外家直云父母和合或謂四大和合使有衆生不立業因故云邪見碩法師云如地水火風故有牙生人輪等和合故有瓶生也有疏問見一不見一即應亦邪亦非邪答邪強故爲邪也言三者諸法從平等因生者十六字缺言四者堤婆論中等者案彼論第十三尼犍子論師説初生一男一女此二和合能生一切有命無命等物後時離散還沒彼處名涅槃因有疏云初劫有男女二人和合生萬物經云從士夫生即是其人准此等文今云外道者尼犍子外道也疏主釋云尼犍陀者是出家總名若提子者從母作名其人計業決定得報今雖修道不能中斷准之可悉案靖邁師翻經道記云彼外道涅槃論開元録云破外道小乘涅槃論六紙沙門菩提流支此云覺希北印度人遍通三藏乃至從魏永平元年歳次戊子至天平元年歳次甲寅凡十八部五十一卷論譯問計和合生外道若是誰家義耶答碩法師云取其義也即是迦毘羅人義故幻於求那諦中曰三洗和合生神分善法准此師意迦毘羅義問爲當自和合故生爲當心法和合變生耶答碩法師云有法和合變生故如毘曇別有更樂觸和合心數和合根塵若是迦毘羅人別有二十一法所謂一異合離數量好醜憎愛苦樂愚智勤情以此二十一法和合諸法然後得生准之可悉疏從時年者智度論時有二種等者言一者時體等者如彼論第一卷末一更有人雖天地好測一切物非時所作然時不變因是實有時法細故不可見不可知以華菓等故可知有時往年今年久近遲疾見此相雖不見時可知有時何以故見果知有因故以是故有時法時法不壞於常慧影師云已下此明更有異執言諸萬物等非時所作但時既常故以時爲生因華菓等爲了因時既常常法微細不可見故以華菓等來不證取了出時當知有時是常法是第三家執也碩法師云但外道解時有二種一師云時是常何故爾四時三世即是常有故名不變因所以計時是常信言二者別有時體等者如大論初卷末云有人言一切天地好醜皆以時爲因如時經中説時來衆生熟時至即摧從時能覺悟人是故時爲因世界如車輪時變如轉輪人亦如車輪或上而或下慧影師流云此下第二師執彼人許云微塵世性時方虚空涅槃等是常乃至一切萬物由之而生故云以時爲因言時來衆生熟者由夏時來故所以熱春時凉若使然者那無實有時云時來衆生寒冷等悉得言凉時衆生寒之與冷等皆得今者據熱時爲語故云熱耳言語時能覺悟人者即是令人知寒熱等事也或上或下者明或復生天或墮地獄須臾即當須臾即貧猶若車輪上下廻轉也碩法師云次一師云時是無常何故爾所以釋論中時來衆生熱時去即催促時能覺悟人是故時爲因所以計時是無常何故有此計生即見前家之過萬物何時從和合生若言水七等和合故有牙生冬時水土等和合郡無得牙出而今冬時水土等和合無牙出春時水土等和合有牙生故知是從時生也言催促者玉篇上且廻反相檮也偍也下且是反迫也近也或作徒字思紫反遷也移也避也元康師作摧促字玉篇上在廻反阻也猶壞也又提婆論云時論師説時熱一切物時作一切物時散一切物准之可悉言開善謂三相是時等者有人隅云開善寺智藏師云能相是實法所相是假名所以自所相之外別有能則之時是故遠法師云開善義有不相應法謂衆生與業時等也與外道別有春秋時爲萬物生滅因大意全同也今案彼師成論大義記第十一卷三相義序云三相者謂生住滅體貌各殊爲相也有爲法體本無今有則謂之生已有還無則謂之滅有一時在名曰住也釋此三相凡有兩家一云體實一時義有前後謂擧體本無今有爲生擧生體應還無不至後時爲滅有此一時爲住也二云體實前後假説一時故一念實有六十刹那初二十刹那爲生相是本無今有後二十刹那爲滅相是已有還無中二十刹那爲住相論云相續故住總此三想假名一念也然則前釋以體爲所相義爲能相後釋假名一念是所相三相是能相也又云數明三相別有其醴是不相應行此論所辨即法是相若色初起名色魚生化滅亦爾若心若無作皆即體爲相也是則三相録有爲法盡非無爲也又云問曰數家別有相法經中亦爾故文言生不自生由生生故生論主凡人何得語無別法也又何處論文言無別法答曰論有不相應品悉破數家諸不相應文無別生也但所引經不足據理何者總不曾言要有加法直有生有生生以前後説三相亦得有重生單生耳准之可悉碩法師云開善所明三相爲時故生能生法住能住法滅能滅法既言生能生法等即是計時生義也疏從世性生者即是冥初等者案大論第七十卷云得禪者宿命智力乃見八萬劫事過是已往不復能知但見身始中陰識而自思惟此識不應無因無縁各應有因縁宿命智力所不能知但憶想分別有法名世性非五情所知極微細故慧影師解云此明得禪之人得五通能見八萬劫事過已不知即起邊邪之見當知三界見諦得禪人不能斷又既言有梵王等起於邪見當知見惑上界有之諸總論皆云見通三界也過是已往不復能知下明外得禪人極知八萬劫事過即冥然不知故謂此八萬劫之初爲世間之性一切世間從此性中出故云世性又提婆論去僧化論師説二十五語自性因生諸衆生從性生大從大生意從意生智從智生五分從五分生五知根從五知根生五業根從五業根生力大所言自性即世性也是涅槃因也曇影師云世性生亦名冥初以通力所極謂冥昧之中識神初立故名冥初一切世間以爲本性故曰世性也碩法師云世性只是冥諦之異名外道修八禪地定各五神通却知過去八萬劫事逆知未來八萬劫事過是冥然不知細爲冥諦計從其然之處生長世間萬物即是世間種性故言從世性生准之可悉言成實師辨無明流來等者疏主釋云成實大乘義云無明識窟流入三界准之心悉言地論者執等者疏主雖云地論師云生死無始違眞起安此妄與我同年眞既無始妄亦復然准之可悉疏從變生者變有四種等者言一者神通變等者案琳流云一神通變能以大海爲蘇落大地成金珍穢土爲淨土淨土爲穢土此背聖人神通力不思議變曇影師云或神通變如變水爲蘇變石成金准之可悉言二自性變等者案琳疏云二者物自性變明有爲之法其性無常念念變異理無住時如初生嬰兒俄爾老邁有爲法爾非人作也言三逢縁變等者案琳疏云三者遇縁變如水性雖冷得火成湯寒因縁即復爲氷如是等類皆爲外縁變准之可悉言四者外道謂別有變法等者案提婆論云本生案荼論師説木無日月年辰虚空及地唯有大水時大安荼生如鷄子周匝金色時就彼爲二段一段在上作天一段在下作地彼二中間生梵天名一切衆生祖公作一切有命無命物也琳法師云外道不達謂別有變法能變萬物人天六道莫不由之故云從變生也言如阿毘曇等者如倶舍論第三卷分別根品二公復次云何不許非衆生有同分如舍利穀麥豆波那姿菴羅鐡金等自性類等故新譯論第五卷云又何因不許有無情同分諸穀麥豆金鐡菴羅半娜娑等亦有自類互相似故光法師疏第四卷云此下第一述經部五難之中第三非情同分難穀等無情亦互相似何不於彼立同分耶菴羅是菓名形似木苽始終形色相似生熱應知半娜婆亦是菓名形如冬苽其昧甘美其樹極大正理救云不應如是責有大過失故汝亦許有人天等趣胎卵等生何不亦許菴羅等趣緑豆等生又云由彼草等無有展轉業因用樂欲互相似故於彼不説別有同分倶舍師破云趣謂五趣生謂四生無情非彼可非趣生體相似應有同分又破樂欲等同故別須立同分緑豆等亦同何不立同分准此論文今云種類者猶是同分謂如阿毘曇中經部師難薩婆多師若有情有種類者非情亦應有種類所言同分者論云同分有情等疏云向分牒章有情等正釋有體類等名同簡異經部彼計同分體是假故分是別義雖復類同而體各別簡異勝論有句義等彼執一物貫多法故即分名同故名同分持業釋也有情簡異非情擧所依法也等簡不等正顯値依同分體也又解身形等同故名爲同顯所生果分是目義故名爲分顯能生因同之分故名爲同分依主釋也故正理十二云此中身形業用樂欲展轉相似故名爲同分是因義有別實物此是因因故名同分准之可悉述義云薩姿多宗説不相應法有十四之中衆生種類此一法也新譯書云衆兩者此有二種一無差別二有差別無差別者謂諸有情有情同分一切有情各等有故有差別者謂諸有情界地趣生種姓男女及苾芻等各別一類有情各等有故也言若執虎變成人等者述義云昔虎并七子今變成大施主昔七寶鹿王今變成釋迦文佛如此之執猶此例也名記第四云一者人度行不度發心菩薩五陰假者相續至佛故經中言昔時鹿王我身是也此謂人度萬福田行至金剛心因中行不至佛地故行不度也今檢金光明經第八卷捨身品云爾時虎者今瞿夷是時虎七子今五比丘及舍利弗目揵連是別記云琳法師光法師等竝作經疏同執如此也又涅槃經智度論云昔七質鹿已今變成釋迦等如此等事如來誠言只琳法師等作有所得分別而説故成所破耳問變之異化有何異耶答碩法師云變即有本如腐草變爲螢雁變爲鳩也化即本無而忽有也言然將外道難數論亦難等者述義云設使外道立難難數人所論者不谷通釋也有人解云亦可以外道及法難於數人亦被難也中之難字宜著上下也今案倶舍論第三卷分別根品二云若爾鞞世師外道由此執得顯成何以故此執即是鞞世師悉且彼立六句義中此執是同異句義由此法於不同物中生趣同智説名同智新論第五云又應顯成勝論所執彼宗執有總同句義於一切法總同言智由此發生彼復執有同異句義於同異品類同異言智由此發生光法師疏第四云此即第五應同勝論難汝説一切有部執於法上別有同分又應顯成勝論所執彼宗執有總同句義通一切法故名總同於一切法上總同言總同智由此總句同義發生彼復執有同異句義於衆多異品類中同類相望名同異類相望名異同即遍在同法異即遍在異法於衆多異品類法上同異言同異智由此同異句義發生又解汝説無差別同分應顯成勝論總同句義有差別何分應顯成勝論同異句義准之可悉疏云從自然生者外道等者言若如莊周等者莊子内篇逍遙遊第一齊物説第二大宗師第六外篇繕性第十六山木第二十田子方第二十一并六處毎卷明自然義且今外篇天運第十四云鵠不日浴而白烏不日黔而黒皆是自然述義云姓莊名周楚人也周所言論而如此明之言二者外道等者提婆論云無因論師説一切物自然生無因無縁如棘刺針無人作者孔雀等色皆無人作自然而有言故經云等者如涅槃經第四十卷納衣梵志言瞿曇一切衆生其性各異是故名爲一切自性瞿曇如龜陸生自能入水犢子生已能自飲乳魚見鈎餌自然答食毒蛇生巳自然食土如是等事誰有教者如刺生已自然頭尖飛鳥毛羽自然色別世間衆生亦復如是有利有鈍乃至一切法中各有自性今略引之言成實者謂等者有人解云所言元品惑者別記云於四縁中但増上總及以縁縁也有心必有縁境也爲起心之不礙之分爲増上縁也十住斷結經云衆生從虚空界來是眞諦空也即有二義一約法明空義二但約空明空義即此處本也成實論要取經意而爲言之今案宗法師章第三卷云舊曰流來之初始於元品至恒沙最重未起取相已來憙名無明住地是界外惑乃至廣説准之可悉問此中自然與莊子自然若爲異耶答碩法師云異若此中自然無因而有故是自然若莊子自然因自然果乃至自然萬物可有准此流意二所自然別也疏云微塵生者外道至妙之色等者言外道計等者如提婆論云毘世師論師説地水火風虚空微塵功徳業勝等十法常故和合而生一切世間知天知物從二微塵次第生一切法也碩法師云外人謂隣虚微塵圓而且常聚即成世間人物散即還歸隣虚准之可悉言數論師云等者述義云數即數人即毘曇薩婆多部宗彼宗云以能依所依爲假實而不言皆假也論是成實即經部宗彼宗云以能依所依爲假實而言皆假今案碩法師疏云若是毘曇亦計微塵是常但許不同外道凝然恒圓故是常毘曇雖亦爲三相所遷但不可壞滅故是常彼謂隣虚微塵圓而且常聚即成世間人物散即還歸隣虚汝今亦爾謂隣虚徴塵即是極微色亦名極細色故是細色成麁色麁色壞時還歸細色此處何異也准此疏文今云數論師者毘雲薩婆多師也言羅什云等者羅什所作大義章下卷文述義云什初來漢地時廬山遠法師遣使問什師云極微有耶無耶什答如文是故極微非有非無如大論第三十六卷釋習應品中云復次若微塵有形無形二倶有過若無形云何是色若有形即與虚空作分亦有十方分若有十方分即不名微塵佛法中色有遠近麁細也外道與佛法人明極微異外道言常佛法數論同言無常又佛法中有異何者數人云四微是四大造成論云四大是四徴所造故四微有三因一者報因衆生業報所感得故二者共有因以有四相故三者所作因依令他不障礙故數人云能造四大是性四大以堅濕軟動故問此四大以諸爲耶答互爲因果一大三因三大一果也疏云有如是謬下第二總結過患等者言二者爲欲攝法等者然邪既有九十六種各計多端今若具列何猶可盡所以今明雖復九十六種各計多端大略爲言不出八計故云總攝衆邪謂此八計中初二家計天所説後六家計人所説人之與天該羅衆異又自然一計執無因自餘七計執有因有因無因具收萬執也疏有如是謬者疏主解云上來諸計凡有五句今此第一句謂不識因縁故有如是謬若識因縁不名爲誰也碩法師云結能迷例之中凡有四句即是初句謂失道之縁邪見推畫無而謂有所以成謬也言然有此身等者案成實論第十卷身見品初云五陰中我心名爲身見實無我故説縁五陰五陰名身於中生見名爲身見於無我中而取我相故名爲見也述義解云此身以顛倒業因之所引起故云已是顛倒於此身上起斷常等見故云更復起邪准之可悉疏堕於無門邪因者疏主解云此第二句也碩法師云此第二句可有二義一者八家計中七家謂有因故生即是邪見一家謂自然故生即是無因二者都無汝所計之因故道無因而汝謂有四者出自妄情推畫故道邪因也案云第一釋當疏第三説第二釋當疏第一説也而言若就正義等者有人解云若就正義等者是悟也於彼邪心等者是迷也故云迷悟合名也若准此釋應讀論文於無因而邪爲因斷常也言二者即邪因之計等者案元康師疏引三法度論云不正因者有三種謂衆生與法及倶衆生者謂梵天等造虚空虚空造風風造水地山岳草木等也法者時化氣化自然化也倶者兼此二種是名不正因也若准此釋應讀論文無因邪因止須留斷常也言三者前六等者案琳疏云自然而生墮在無因自餘七計雖立有因而非是正故墮邪因也若准此釋應讀論文無因邪因之斷常也有人解云無因邪因即是斷常斷常即是邪見竝持業釋也述義云初之兩釋除自然一計也疏斷常者疏主解云此第三句也言有因是有等者此中有三義以釋斷常今是第一義謂有因是有改名常見無因無物稱之爲斷此約因明斷常也案碩疏云因論斷常者如因能生果即是斷因不能生果即是常故云斷常等也案云此師約因生果不生果而論斷常然今疏主約因有無而辨斷常各示一義故不相違也言又從因生果等者是第二叢也案碩疏云果論斷常者如果從因生即是斷果不從因生即是常故云斷常等也案云此師意有爲之果從因生故本無今有既言本無今有必已有還無即是成斷自然常果不從因生是故常也有人云有因必當歸盡故成斷見無因自然而有即是常見此約果明斷常也言三者邪因是常等者是第三義也案碩疏云隣虚微塵圓而且常聚即成世間人物散即還歸隣虚准此疏文邪因者極微是故云常所言果者人物故云無常也疏邪見者疏主解云時第四句也碩法師云斷常等邪見者是等第三句出自妄想推獲非關正觀方便故云斷常等邪見也又云只爲虚妄横計即離常無常等求之不得其實故名邪見也琳法師云所執乖理故云邪見也元康師云斷常等邪見者第二列十四難具數如彼也言邪見有二種等者案大義記第十三卷十類惱義中云邪見通別者諸見違正理無不皆邪但一切無見多所傷害故一切無名邪見餘見亦不受也又成實論第十卷邪見品云若實有皆而生無心是名邪見如言無四諦三寶等經中説邪見謂無施無祠無燒無善無惡無善惡業報無今世後世無父母無衆生受生世間無阿羅漢正行乃至又無力無勇及此果等名爲邪見取要言之所有倒心皆名邪見如無常常想苦爲樂想不淨淨想無我我想非勝勝想勝非勝想淨道非淨想非淨道淨想無中有想有中無想如是等諸顛倒心謂阿毘曇中五見梵網經中六十二見皆名邪見也流解云明邪見體有二初明別邪見次取要言之下明通邪見謂撥無一切法故云別邪見也是不當一切道理邪心推畫是云通邪見乃至廣説而言撥無因果者論云無善無惡無善惡報疏云無善無惡是無善惡報因也無善惡報者是無善惡報果也又論云無力無勇及此果等疏云無力者是無善惡習四相資力也無此果者是無習因相資習果准此論文今無因果者撥無善惡習報因果也言答身見者計有於我者案成論第十卷身見品云五陰中我心名爲身見實無我故説縁五陰五陰名身於中生見名爲身見於無我中而取我相故名爲見乃至廣説疏解云五陰中我心名爲身見者有二解一云會身見我見二名二解今所習標我見體也説縁五陰者無離五陰縁假名我要帯五陰縁假名我故言説縁五陰也實無我故下第二種名義就中有二一明身見名計五陰身生見故名爲身見也於無我中下第二明我見名於無我中計我故名爲我見也明身見我見二名有三解一舊解云身見我見竝從境得名計五陰身計假名我故從境得名二白焉解云身見名同舊解我見名者從心所作我境得名三解云今所習身見名從境得名如舊解我見名從心功用得名執有我相故從心用得名准之可悉有人解云身見者且云我見謂墮所立故云我見而墮所迷故云身見以不知五陰假合故也言邊見者執我斷常者案成論第十卷邊見品云若説諸法或斷或常是名邊見有論師言若人説我若斷或常是名邊見非一切法所以者何現見外物有生滅故經中説有見名常無見名斷乃至廣説疏解云一標斷常二見體有論師言第二出他論師解經中説下第三論主引經會通前二解若通而爲論一切萬法但一世都盡後世永無生邪見名爲斷見如前解若別而爲論計有情物是常是斷者如他論解何者無情物現見一世盡不復更生故非此斷見故論主不非他論師解引經會通二解准之可悉疏主解云由起我見故推我一異一即身滅神滅名爲斷見異即身減我存名爲常見故云邊見者執我斷常也言見取是正諸見者案成論第十卷二取品初云於非實事中生決定心但是事實餘皆妄語是名見取及光説非勝法中定生勝想亦名見取乃至廣説疏解云就明見取體中有二一明從起見取即是正諸見從五見起故云從起見取也但是事實餘皆妄語者是五見人所見所説皆是實佛與弟子所見所説皆是虚事妄語也及先説下第二明獨頭見取即是非勝勝想也勝非勝想者非見取屬邪見攝取者引取向己義是正諸見見取非勝勝想見取我計法是勝妙法引取向己故成取義勝非勝想者無引取向己義故不成取義故非見取也疏主解云見取有二一取前見爲第一故名見取此足上見取也二生死中無樂淨計樂淨是獨頭見取准之可悉言戒取謂外道爲道者案論次下文云若人捨智以洗浴等戒望得清淨爲戒收疏解云此明戒取體也又論云又戒取因縁唐受諸苦謂受寒熱即灰土木刺蕀等上投淵起火自墜高等後世亦受劇苦果報如經中説持牛戒若成則還爲牛若不能成則墮地獄乃至廣説也疏主解云戒取亦二一以鷄狗等戒爲正道是獨頭戒取也二以邪見爲道此足上戒取也准之可悉言邪見撥無等者案嵩法師成論疏第十一卷邪見品云明通邪見一處解云通一見取就見取中離出四見四見不攝屬見取攝莊嚴解云言通邪見就通邪見離出四見四見不攝屬邪見攝今用莊嚴解也就通邪見中無常常想者是邊見也苦爲樂想不淨淨想非勝勝想無中有想者是見取也無我我想是我見也非淨道淨想者是戒取也有中無想者是別邪見也勝非勝想淨道非淨想者通邪見也准之可悉述義解云所言此無因邪因等者理實應云非五見所攝然五見中邪見名同於通邪見故但云四耳問成實論以邪見爲第三今疏何故在第五耶答有人解云約邪見有通別彼論約別故在第三今約通故在第五所以不違也言又數論師云等者述義解云如自在之類是已起立果故云苦諦下戒取也爲令悟人無如此因故云無因然邪心謂有故名邪因此迷悟合論也其立有因而事相達故名通邪見也案道基師阿毘曇章第二卷下使義中云凡論戒取起在苦道如論苦諦非因見因一切外道不見因故非因執因此事云何農夫種殖秋收果實彼作是言此皆戸利夜天思陀夜天舍摩夜天恩天所與也外道又言若生男女此等皆是波難陀天難陀婆天之所與也又復外道若富貴者生男女時彼作是言此等皆是彼毘紐天摩醯首天之所與也問非因見因亦名謗因云何非邪見也答曰尊者和須蜜説若謗無因是名邪見彼不言無因乃執非因故非邪見也道下戒取乃報邪見爲道起見因縁可以意知又云邪見起因有其二義一總起因縁一切邪見實有謗無有謂四諦問曰四眞諦法有佛無佛苦集常染滅道常淨以何事故彼諸外道謗無四諦婆沙記云由計有我故謗言無彼作是説我無有苦是則謗苦我無有因是則謗集我無滅故是則謗滅若無其滅別無對治是則謗道二別起因縁隨其四諦義有其四苦集滅道諦下邪見因縁略説有五一有苦無苦見二有因無因見三常無常見四樂有苦見五淨不淨乃至有四無因見者問曰法從因生彼諸外道以何事故謗言無因也答曰外道之人謗言無因者彼以見無苦故是亦無因内外所有諸物有種種相而作是言諸後穿河諸復積山誰畫禽獸此皆無因彼有因無見是名邪見乃至廣説准之可悉有人言非因計因等者二十七字缺疏説種種我我所者疏主解云是第五句也碩法師云此第四句也元廉師云此第三列二十身見也言外道有二迷等者述義解云法者軌則義如陰界等諸法能爲軌則成慧解故准此文意外道不知諸法無生横計從自在天生等故云迷法無生言迷人無生者述義云人者神我異名以統御義爲人如衆生命者等准之可悉言墜即陰離陰者如淨名玄初卷云僧佉計神與陰一世師執神與陰異述義云僧佉所以言一者能分別義爲神所依之義因義爲陰義雖有異而體是一也世師云異者義體倶兵准此等文今言即者一義即僧佉義異者離義即衞世師義問何者我我所答碩法師云神我宰主即是能御之人名之爲我也所御之法名爲我所疏主釋云若計色爲我餘受等即屬我所也問但我我所何稱種種説耶答碩法師云或計十六知見即是十六我或計二十五我或計二十我我既多種我所非一故言種種説我我所也疏主釋云略説即一我見依我我所分即成二見三界分即三見依地分即有九見欲界地乃至非想故成九乃至分別所起處凡有九百三十六我見也具如百論疏中卷也問一如是計我是誰所計耶答二十五我外道所計二十我犢子計我十六知見問且二十身見幾是我見幾是我所見答疏主云五是我見十五是我所見如計色是我色異我色屬我我在色中一陰皆四故云二十身見也問頗有一時總計五陰爲我不答婆沙二釋一云無也若計色爲我餘受等則屬我所也二云亦有總計五陰爲我如計内入爲我即計外入爲我所計外入爲我即計内入爲所也今依疏主意應讀論文有如是謬也墮於無因邪因與斷常等及邪見也種種説我我所也疏云不知正法者等者碩法師云下第二明所迷之正法何故成四句顛倒只爲不知正法若知正法只前四句即是正法也若准此疏文應云何故成五句顛倒但依不知正法若知正法唯前五句即是正法也疏云佛欲斷如是等下等者碩法師云上來第一明邪見失道衆生已竟今第二明佛爲此衆生所以興世就文爲兩今第一明佛爲縁説教之意也元康師云下第二明縁教也琳法師云下第二明對縁起縁於中又二初破外歸小説於半教治彼八迷又爲已下第二引小歸大同起一乘説其滿教初牒前超執之流明教所被人故云佛欲斷如是等諸邪見也言即是辨應義者大乘玄第五卷感應義云感應者乃是佛法之大宗衆經之綱要言感者牽召義應者赴接義衆生有善彼佛垂形赴接理無乖越謂之感應凡夫感而不應諸佛應而非感菩薩亦應亦感也言故法華云等者如彼經第一卷方便品比丘偈中云入邪見稠林若有若無等依止此諸見具足六十二深著虚妄法堅受不可捨我慢自矜高諂曲心不實於千萬億劫不聞佛名字亦不聞正法如是人難度疏主釋云下第二明起見就文亦二初明見因次於千萬億劫下明見所得果初中又二初明從愛起見次深著虚妄法下第二明從見更起於愛初中有三句言入邪見稠林者此第一句明一見總詺外道諸見爲一邪見邪見衆多猶如密林故云稠林言若有若無等者第二句明二見愛多者著有故起有見見多者著無故起無見言依止此諸是等者第三句明六十二見言六十二見者大品佛母品開十四難爲六十二見十四難者神及世間常無常等四邊天邊等四宛後如去不如去等四合爲十二及身與神一身興神異合爲十四一陰具常不常等四句故成二十邊無邊亦約五陰故成二十如去不如去亦二十合爲六十一異爲本爲六十二亦可二十計我約三世故成六十斷常爲本合六十二亦可一陰上計有無二種五陰即成十見三世爲三十凡夫三十見聖人五陰亦具三十見合有六十計涅槃有無即爲二見合成六十二見然涅槃也非三世攝故但爲二言深著虚妄法下次明從見更生於愛於中又二初明從見生愛次有一句明從正使生於纒垢初中言虚妄法者謂諸見也深著此見故名愛亦可以此見爲好即是於見上更生見謂見取是也言我慢自矜高者時此諸見擧代自高即顯諸外道佛初出世不受一乘之道故言諂曲心不實者上來明從正使生正使今明從正使生於纒垢諂即六垢之一也雜心云從見生諂垢以起見必是利根人方能諂曲鈍根不能也次於千萬億劫下第二明見所得果以愛爲愛生之本故下招六趣見乖於正理故上隔三尊是以二文明愛見果異也如是人難度者總此愛見衆生難可以一乘法度之問此叙何處愛見衆生答佛初出世有此愛見衆生故迷不得説佛乘也言故智度論云等者如彼論第八卷云今十方諸佛常説經法罪業聾盲故不聞法聲雖復聖人有大慈心不能令皆聞皆見若罪欲滅福將生者是時乃得見佛聞法今略引之言將滅者猶欲滅也故玉篇云將者子羊反欲也助也願也言稠者直流反直也多也疏云江南廣明有三種感等者言一未來感佛者案大乘玄第五卷感應義明感體云問三世善何感耶答有人言未來善感又言現在善感亦言過去善感又言惡感有人善感有人善惡共感今明二世善感過去現在爲正感未來爲傍感故經云過去久修善根及今念佛得見如來准此玄文今言未來感佛等者以未來善根感得如來即次上所引大論意是故云如上也而云江南等者楊州衆師廣明有三種感也所言感者是進義應以感爲義威應相由是因縁也言過去感佛引法華云等者如彼經第三卷化城喩品東南方五百萬億諸梵天王三業供養偈有四行半之中最後半行文彼文云我等宿福慶今得値世尊准之可悉言三現在感佛如勝鬘云等者如彼經云即生此念時佛於空中現普放淨光明顯示無比身疏主釋云此第四明如來智應就文有三言即生此念時者謂應時也謂佛應與心念同時若聲嚮之相應亦云要須念力成就如來應念現身但示起速無差故云爾言佛於空中現者第二明應處也若約事釋者男女有隔既應後宮不宜到地若約理而言法身無爲而無所不爲即寂而動亦可示起感無方來無處所卓爾現空亦可會勝鬘上歎上歎云我聞佛音聲世所未曾有世間之人不知感逝空即應今既知感逝空即應故是世間所無也普放淨光明顯示無比身者第三明應義凡有二句一者普放光明謂佛有四圖大光及頂後圓光此竝常光今更現非常之光謂於支節毛孔擧體放光故名爲普故且可一先遍滿虚空通徹内宮故稱爲普又欲明感者使見無感者不覩非是光有偏私故名爲普所言淨者一光禮皎潔而能除衆生垢闇言顯示無比身者第二明現無比身謂佛常身丈六已自莊嚴今復爲光所照相好明了故云顯示天下無類故云無比亦可所以顯示無比身者欲起勝鬘願求之心復欲發其不虚之歎故具明如寶崛上卷然今且擧應時與應處二句文也有人解云此文大意勝鬘父母附信送書勝鬘悟解現在感佛臨降也言答此華龍樹舊義等者龍樹是七百年時出世造智度論已説此義然成實者於九百年間
