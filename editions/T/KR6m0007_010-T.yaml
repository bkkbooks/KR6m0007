body:
  text: 中論疏記卷第八之本集衆異説不敢和會大安寺沙門安澄撰疏第九卷如來品第二十二疏大乘觀行凡有二門等者約此品由來大文有二初明來由後明品目初中有二初約世出世次辨來由後約出世一章以辨來由初中有四第一明世出世難易次又自上已來下第二明以無出世亦無世間次又大小學人下第三明世出世等無有二相便入實滅迷次又惑者下第明因世悟出世如文可悉而言涅槃經云等者案彼經第七卷具有此文今略引之寶疏解云俗相有異眞體無二愚者知俗異智者知眞一也述義解云明者解也無明者煩惱也今疏主解云今明求此明無明體相畢竟不可得何所論其異若了明無明不二即是智人若見明無明二則是愚人准之可悉言因世間悟出世間者述義明云問二十一品爲破世間之中今因何世間令悟出世間答二十一品所破此是横謂世間今因如幻化世間令悟出世間耳問令悟出世間何故破出世間耶答外人謂世間有生滅出世間無生滅故求其横謂世間令悟即是出世間然以彼謂異於世間有出世間之出世間故名破出世間也判世出世四義一義一者十信爲世間三十心爲出世此就未伏無明與伏無明二者初地至六地爲世間七地已上爲出世此就不竝觀義與竝觀義三者七地以還爲世間八地以上爲出世此就功用與無功用四者十地以還爲世間金剛道後爲出世間准之可悉疏就一章凡有四品等者此下第二約出世一章以明來由於中凡有三復次此即第一復次有五第一約世出世以明廣略互現次又顯執出世間下第二明破世間即破出世次又世爲出世本下第三約本末辨之次又如來下第四約人法解惑以論之次又破如來下第五約人法以明之如文可悉言前世間中直以廣略爲二者述義解云上二十一品中七品辨大乘行爲略十四品辨大乘行爲廣故以廣略爲二也准之可悉疏又四品次第等者此下第二復次於中有二初明諸佛出世爲破煩惱説四諦教宗歸一滅次又如來下第三明能離所離所觀所證四義如文可悉案琳疏云雖有四品合而言之但唯人法如來是人餘三是法也但以人爲法將開導之原所以先明如來大覺既興累無不遣破染成淨次觀顛倒然解生惑滅必假勝境方成次觀四諦四諦平等即是寂滅涅槃所以後觀涅槃准之可悉疏又前破如來等者此下第三復次於中有四第一明世出世互破人法次二者下第二明以有人故必應有法次三近從成壞品生下第三明通從上品而生次四者下第四明的從上一偈而生如文可悉言世間法中等者就二十一品破世間人法初七品破法次作者品下破人然破法之中非無人破人之中亦非無法互有傍正故也言世間是生滅等者案碩疏云造而爲論外人謂世間虚空可得是無出世如來不可無也若無如來即邪見故復擧而破之准之可悉言又内壞結等者案碩疏云外人云如來内壞外壞魔軍故菩提樹下得成佛道便有成有壞何倶言無成壞耶述義解云内壞結賊者謂起心惑又有漏五陰身也外破魔軍者謂煩惱魔也又有漏四取也亦可魔者四魔也軍者十軍也疏所言如來者等者此下第二明品名目於中有三初明如來名義次釋如來不同下第二明外人情計即爲所治次問若具破一切佛下第三明論旨歸此文初也於中有二初明觀如來之所以次據法而言下第二正明如來名義如文可悉言據法而言等者案大論第二卷釋初品中婆伽婆第三云云何名多陀阿伽陀如法相解如法相説如諸佛安隱道成佛如是來更不去後有中是故名多陀阿伽陀影疏解云此正明義合三號如來如去如住等義准之可悉疏釋如來不同等者此下第二明外人情計此中有三第一明外道所計次小乘略有三説下第二明小乘計次地論不眞宗下第三明大乘計此文初也言故論云等者案此品破他之中第二縦破偈長行云我有種種名或名衆生人天如來等康疏解云我名無量略擧四種如大論説我衆生等十六名字准之可悉疏小乘略有三説等者此下第二明小乘執於中有二初通明三師所執次成論師立五時教佛下第二別明成論學人所執此文初也有三師所立即爲三別文處易知言犢子部云等者此初師計所言人法者猶是人體也言成實師明等者此第二師執於中三説言假別有體等者是莊嚴義言無體無用者是光宅義言無體有用者開善義此三師竝是成實宗大師也言阿毘曇等者此第三師執案雜心論第十一卷擇品云若修諸相好方便彼起業從是轉増進説名爲菩薩長行釋曰度三阿僧祇劫於百劫中種相好業乃至廣説彼論疏解云此偈明決定菩薩相凡有二決定一者菩提心決定謂從初阿僧祇劫至第三阿僧祇劫決定成佛不退作二乘是二者趣到決定謂從百劫之初造相報業始得決定到佛是也述義解云三十四心者斷三界見惑十六心與斷九地修惑九無礙九解脱合爲三十四心此中前三十三心爲因位第三十四心爲果位問二乘斷見修與佛斷見修何異答異何者二乘但斷染汚無知耳佛斷染汚無知不染汚無知故異也染汚無知者見修之中無明是也不染汚無知者不知草木幾塵所成之心餘物准之言在無漏心等者案琳疏云毘曇人明二種如來一有漏五陰爲生身如來二無漏五陰爲法身如來故三僧祇行有漏行百劫修相好業後三十四心成佛佛在無漏心不爲縁縛若出在有漏心則爲縁縛也准之可悉疏成論師立五時教佛等者此下第二別明成論學人所執案灌頂玄第十卷云莊嚴旻師判四時教謂十二年前明三藏見有得道名相教十二年後明見空得道名無相教於無相後常住之前指法花會三歸一萬善悉向菩提名同歸教最後雙林明一切衆生佛性闡提作佛名常住教也開善光宅用五時教四時不異前更約無相之後同歸之前指淨名思益諸方等經爲褒貶抑揚教准此師意今言成論師者開善寺智藏師光宅寺法雲師所言五時者三藏大品淨名法華涅槃也案法華御製法師品疏云高原譬初教及第二般若教乾土譬八十年果施功不已者譬聞淨名教濕土譬淨名教七百阿僧祇果少近泥譬今日法花經至法花方知壽量果准之可悉釋第五時佛之中言一云如來體是世諦所攝等者二十五字缺言二釋既云等者案碩疏云二者計空是佛如明慶寺尚禪師用即空是佛用大品中空無來無去無來無去即是佛也疏主解云此南方尚禪師義也言故大品云等者案彼經第二十三卷大如品末云爾時須菩提語諸天子汝等言須菩提眞佛子隨佛生云何爲隨佛生諸天子如相故須菩提隨佛生何以故如來如相不來不去須菩提如相亦不來不去是故須菩提隨佛生今略引之言次北土智度論師云等者案淨名玄第四卷末云有人言佛有三種一者法身佛二者報身佛三者化身佛實相則是法身佛實相可軌名之爲法此法有體故名爲身而實相非佛能生佛故所以名佛二者報佛則修行會實相理實相既常報佛亦常以法常故諸佛亦常三化佛則應物之用此北土論師釋也言四云佛果靈智非二諦攝等者此應莊嚴義故碩法師云佛出二諦外不同俗諦浮僞之有不同眞諦虚𭐋之空也疏地論不眞宗等者此下第三明大乘執案北地論師作四宗一因縁宗謂數家義二假名宗是成論義三不眞宗指三論義四眞宗謂唯識義又法花玄第三云爰至北土述還影五教製於四宗也述義解云光律師所立彼師取他宗爲自宗故以爲所破今灌頂玄十卷云六者佛馱三藏學士光統所辨四宗判教此即南方所立何爲指此師耶然未詳彼名也言眞宗明於三佛等者述義解云不住道者謂權智也又言以大悲故不住涅槃經云不動眞際建立諸法由空觀故不著生死經云不壞假名而説實相故云不住道爲因故有化佛也言助道爲因等者謂十地六度萬行因就三智者加行智也證道爲因者謂正因也證於眞如正體無分別智也疏問若具破一切佛等者此下第三問答申論旨歸以遣惑情文中有二謂問與答答中有三初別破空有四句次又論破十二種佛下第二據通則破十四種佛次又有異三論師云下第三破異師説以顯論旨歸此文初也有三初正破四句佛以顯論旨次又大小乘人下第二破有佛之見次又有所得人下第三破邪正二見初中言外人計佛等者案碩疏云外道小乘大乘衆計雖多不出四句一計有是如來如外道小乘人言有佛是一切知人不可無也二者計空是佛如明慶寺尚禪師三計亦空亦有以佛是世諦故言亦有即眞邊故言亦空如開善解四計佛出二諦外不同俗諦浮僞之有不同眞諦虚𭐋之空故非空非有如莊嚴解佛果二諦外下文具破如此四句准之可悉次中言故淨名呵善吉云等者案淨名經上卷弟子品須菩提章内外平等門中有此文而云乃可取食者此疏主加引之言此明善吉等者疏主解云善吉自謂見佛聞法而言不見聞者其言似反其理實順若有佛可見即是有見故不見佛若有法可聞即是有聞故非聞法今明無佛可見乃名見佛無法可聞始是聞法蓋是斥三乘之有是故説無既知佛非有則識佛非無如是五句無所受始是法身如斯而悟名見佛也後中言故淨名呵云等者案彼經次文云外道六師乃至是汝之師因其出家彼之所墮汝亦隨墮乃可取食今略引之疏主解云彼外道六師者聲聞人謂以見佛聞法即事佛爲師已爲弟子異於外道故次泯之釋迦出世正値六師也言是汝之師等者此令善吉事外道爲師因其出家現世受其邪法故墮邪見後世同其果報故墮惡道也言乃可取食者若不同六師則見邪正相異便無等觀故不能受食若知六師即是法身以同六師是同法身便得等觀乃可受食問云何六師即是法身答四句求六師不得六師身即是實實即是法身故云觀身實相觀佛亦然又同六師即體邪即正故是正見人若不同六師則謂邪正爲二名邪見人故同六師也言七佛者案四分戒本初偈云毘婆尸式棄毘舍拘留孫拘那含牟尼迦葉釋迦文賓律師疏解云過現七佛同説一毘婆尸二式棄三毘舍四拘留孫五拘那含牟尼六迦葉七釋迦文乃至廣説准之可悉言故下偈云等者案此品最末偈云如來所有性即是世間性如來無有性世間亦無性今略引上半偈文碩疏解云此一偈略示如來體性前偈既言佛過戲論恐外人云若爾世間便與佛異世間虚妄不無如來出過世間故終應是有故今齊世出世法無毫釐差別世間既無性如來亦爾如來無性世間亦爾准之可悉疏又論破十二種佛等者此下第二通破十四種佛此中有二初明列十四種佛破此故以名品次問十四種佛下第二問答明十四種佛被破之所以如文可悉而言論破十二種佛等者案此品文云空則不可説非空不可説共不共叵説但以假名説寂滅柑中無常無常等四寂滅相中無邊無邊等四疏主解云初偈破空等四句是佛後偈破常邊等八句是佛准之可悉疏又有異三論師云等者此下第三破異師説以顯旨歸文中有二初列異師二説是應北土三論師即𤬉法師等次今明不然下第二破謬執以顯正義如文可悉疏大分爲二等者言佛於九道中尊等者案康疏云爲世所尊故曰世尊更無與等故曰唯有體如而來故曰如來如法相知故稱正窮一切種謂之遍無礙謂之知於法自在故名爲王無法不知名一切智問法性無量無邊佛智能盡知不答十住論中論主自釋言所知法無量無邊佛智亦無量無邊以無量無邊智知無量無邊法如函大蓋亦大問大品經中佛言一切智是二乘智一切種智是佛智今何故云佛是一切智人耶答下不兼上上得兼下故知佛亦名一切智准之可悉疏所以有此五章者等者此文中總明此如來一品五章即爲五別第一明破有是佛章次外人既聞有非是佛下第二明破空是佛章次外云若空有下第三明料簡空有倶非佛所以章次自上以來破病既周下第五明呵責外人章次三問破病下第五明略示佛相章如文可悉疏初偈五求破等者言五求破者述義解云論文云爲五陰是如來爲離五陰有如來爲如來中有五陰爲五陰中有如來爲如來有五陰准之可悉言楞伽經有法身品等者入楞伽經第六卷此品文云佛告大惠菩薩如來法身於五陰中非一非異如來法身五陰一者即是無常以五陰是所作法故如來法身五陰異者即二法不同體相如牛二角乃至法身之相於五陰中不可説一不可説異今略引之疏長行爲五等者言一者陰既生滅等者案琳疏云若與陰一則同陰盡則無積習之功智照之用准之可悉言如五陰品説等者案此論第一卷觀五陰品最後偈長行云若實無常則無業報眼耳等諸法念念滅亦無有分別准之可悉康疏解云答家反難云汝難我云若也是常則無業報眼等諸法不能分別故知無常者我還難汝若也無常亦無報眼等諸法亦不能分別何得是無常乎而言眼耳等諸法者眼耳等六根法也亦可眼耳等是根諸法是塵根塵無常念念不住能所皆然若爲分別耶雖有二説今取初説也言涅槃經云等者案彼經第二十二卷中佛告徳王菩薩云何非常以有知故常法無知猶如虚空如來有知是故非常今略引之疏主解云瞿師羅長者大富而無兒息請祷神明後生一女兒身長三尺此兒不久忽然死已長者愛念失於本心如來觀其道根應熟化作此身長者見大歓喜得悟佛因復本身爲説法即得初果也如來非常身有分故即是丈六之身分限故也此就身業也次明有起即是意業有言説即是口業今略引意業文法華玄第九卷云又非常故不同虚空下云常法無知如來有知是故非常念念滅不同有爲故如來身非有爲非無爲也准之可悉疏問曰下第二不自不他門破等者言即是犢子計等者案大論第一卷具有此人計今略引之述義解云此部宗立人法倶有而言五陰和合別有我法者我者是人法者即體謂五陰和合別有人體也四大和合別有眼法者同毘曇義以四大造根等五根及一切色而能造之色是無記所造之色通三性何者四大品是報法故爲無記所造之色有報色及善無作與惡無作色故通三性准之可悉言又是成實等者莊嚴云假有別體有用有名開善云無體有用今取此二師説故云二師等也疏答中有三偈等者言倶舍論出犢子義等者案眞諦所翻論第二十二卷破説我品中有此文今略引之具引如燃可燃品記也言無佛者爲釋疑故來等者所言無佛者此文標釋相違亦檢論文亦無此文若有異本然今本云若法非我者即應此文若爾此文應云無我者爲釋疑故來也下釋處云我故也言故常云等者述義解云人者神我之異名以統御義爲人如衆生命者等也玉篇孔子云仁者人也鄭玄曰人謂施以恩義准之可悉疏若不因五陰下第三前後破等者言答本住品等者案此論第二卷觀本住品初長行具有此文今略引之案琳疏云此是衞世師外道雖復離身計我及微相還用陰等爲相准之可悉言二者小乘人謂等者所言五分法身者述義解云戒身者佛盡無生智無學正見智共生身口無漏戒也又以道共戒爲體以色十一中無作爲性依第四禪起也定身者佛盡無生智無學正見智共生無漏三三昧與無漏道相應而起以心所中定數爲體依第四禪起也慧身者謂無漏正見也解脱身者正見智共相應起解脱數新譯書云無漏勝解此有爲徳亦是智徳也解脱知見身者謂盡無生起於解脱身中起故名解脱知見此無爲徳亦此斷徳也疏今實不受陰下第二偈奪破等者言破初家義等者案琳疏云下一偈奪上半奪本言今者今於本也明本既不受陰更無如來法者夫明有法不出色心本地既無五陰則無色心將何物爲有故云更無如來法也准之可悉言故肇師云等者案肇法師註淨名經序具有此文疏主解云原肇公論本迹之意者正欲解不思議此經既名不思議約何物法辨不思議中有本有迹故開本迹二門雖有本迹而同是不恩議故明不思議耳述義解云本者理之與智迹者教之與形准之可悉疏問曰下第二章偈破空等四句等者言如江南尚禪師者案碩疏云如明慶寺尚禪師用即空是佛准之可悉言開善義佛具空有二句等者所言金剛者案開善師金剛心義云金剛三昧者是學地之終極以其照隣佛慧萬惑因此而忘故借以金剛喩其解用世有金剛眞實堅而且利以其堅故所不能傷以其利故能摧壞萬像譬窮學之心以其照一切境故能斷諸惑以思壞遣相故惑所不能又此是慮法故受心名是定中能有故名三昧准之可悉所言至忘彌存者言四句不可説者案康疏云不可言有空不可言無空不可言亦有亦無空不可言非有非無空也即如大虚空誠是無物今以四句微責義亦不成何者太虚若有有何形質太虚若無無所容受亦有亦無是則相違非有非無復成戲論世間大虚當離四句至於理也豈復可論故曰空則不可説也准之可悉言如涅槃無名等者案大經第二十三卷徳王品云如抵羅婆夷名爲食油實不食油強爲立名名爲食油善男子是大涅槃亦復如是無有因縁強爲立名准之可悉言涅槃經生生等六句等者案彼經第二十一卷徳王品云佛言善男子不生生不可説生生亦不可説生不生亦不可説不生不生亦不可説生亦不可説不生亦不可説有因縁故亦可得説云何不生生不可説不生名爲生云何可説何以故以其生故云何生生不可説生生故生生生故不生亦不可説云何生不生不可説生則名爲生生不自在故不可説云何不生不生不可説不生者名爲涅槃涅槃不生故不可説何以故以修道得故生亦不可説以生無故云何不生不可説以有得故云何有因縁故亦可得説十因縁法爲生作因以是義故亦可得説今取意略引之疏主解云第五通難之中有七句彈其難初標七句次云何不生生下第二釋七句於中有二初有六句正彈其四句六句義即是彈其生義彈其説義彈有六句第二有一句彈其無六義彈無説義也十因縁法爲生作因者十二因縁中生是第十一老死第十二今不取生老死但取過去二因現在五果現在三因此十因縁爲生作因准之可悉述義解云今合六句爲四句不可説而證以常等四句不得取佛也第七爲一句可説而證但以假名説之也十法者即大經云十二因縁法謂六因四縁是也言空違於有等者案碩疏云明空與有相違是相違害法爲汝執有假名説空以違完汝有耳實無此空也准之可悉疏如是正觀思惟下生第二偈等者言攝論云等者案梁攝論第十二卷釋論云譬如虚空有四種徳一無染二無礙三無分別四無邊根本智亦爾一切世間八法七流等所不能染由是彼對治故故説無染於一切境如理如量無障無着故説無礙於一切法一味眞如空遍滿故故説無分別離一切諸邊中道不可量故故説無邊譬如色於空中顯現空不可分別色可分別後得智亦爾因不可分別此智可分別謂此是能分別此是所分別若佛果是無分別智所顯離則別衆生云何得作衆生利益事如理不倒今略引之疏如是性空下第二明等者言般若實際品等者案大品經第三十七卷實際品餘初有此文所引全同所以不引言又諸法性等者述義解云冥寂者絶智曰冥絶境曰寂斯乃廓然寂靜之義又云冥者泯然能所無間故云冥也支道琳師以泯爲冥也叡師亦以泯然爲冥今意亦爾心泯成中智泯無相准之可悉言答大品云等者案彼第三十七卷實際品餘佛言第一義相者無作無爲無生無相無説是名第一義亦名性空亦名諸佛道今略引之言問成實論二世有無品云等者案彼論第二卷二世無品第二十二中云又汝言則無佛者佛寂滅相雖現於世不稱有無況滅度耶今取意略引之聰法師疏解云第十七事破第十九事無佛難就中有二此初約本明有無言佛寂滅相等者解者不同一云佛應身即空即空故寂滅相寂滅相不稱有無況滅度二彌沙塞部解云約應身爲論佛身非業煩惱所造不得言有三十二相八十種好現顯故不得言無故言佛寂滅故不稱有無三解約本爲論佛法性身非有非無故言寂滅相應身雖現於世隨本不稱有無今同第三解准此論文今應云二世無品不應言二世有無以彼論無二世有無品故但有一切有無品然彼品中無此文故又言不攝有無者准論應言不稱有無也言又智度論第十五卷忍度餘有此文今略引之影疏解云本爲破有病故所以説無爲破無病所以説有爲破非有爲病故説非無爲破非無病故説非有若聞説諸法不可説是常不可説是無常故剬執言諸法定是非有常非無常者此還是着故爲癡論此是縛論非爲解論何意如此本爲破有破無故説非有非無有無既無何得別有非有非無無法在故爲癡論此是無知論故云癡論一云癡論者見前三句有過遂計有一法不同前三不得言説爲唖論亦名愚癡論准之可悉言大品云等者案彼經第三十六卷佛告須菩提言若法性外更有法者應壞法性法性外法不可得是故不壞何以故須菩提佛及佛弟子知法性外法不可得不可得故不説法性外有法今略引之言又楞伽等者案入楞伽經第六卷佛告大慧菩薩言不生不滅者即如來異名譬如釋提桓因帝釋王等雖説百千名號而不知是如來異名乃至有知實際者有知涅槃者有知法界者有知法性者准之可悉言淨名云等者案彼經下卷見阿閦佛品中有此文今略引之具明如記初卷言是故經云等者此諸法無行經文案目録云佛説諸法無行經一部二卷三十二紙也今案彼經下卷文殊自擧本章過去久劫有佛名師子音王滅度已後有二菩薩比丘一名善根但説諸法實相清淨二名勝意持戒清淨行頭陀法乃至善根爲勝意徒一心説偈婬欲即是道等七十餘行偈大論第六卷末又有此事影疏解云若能解婬欲無婬欲者婬欲實相即是於道恚癡亦爾此明實相義明婬欲實相即是道義也而今言貪欲者染者品云貪欲有種種名愛着染婬欲貪欲准之可悉觀顛倒品第二十三疏問四品破出世間等者約此品由來大文有二初問答以明來由次問云何爲顛倒下第二明品名目初有三番問答此初番問答有二問與答如文言前破世間等者案康疏云前雖破世間亦破出世縛解品是也後破出世間顛倒品是也准之可悉言三者又顯等者案碩疏云今品非但破外道邪見亦佛法中計涅槃如是常亦破若言不破者那有破如來涅槃耶故此品破常即是破汝所見出世間法也准之可悉言四者二乘之人等者案大乘玄八倒義中云外道起生死計有常樂我淨佛初説四諦破四倒説生死中但有苦無常無我不淨無有常樂我淨比丘聞此非但生死苦無常無我不淨佛果亦苦無常無我不淨起後四倒故涅槃經云但生死苦無常無我不淨佛果是常樂我淨了破其佛果苦無常無我不淨若外凡夫起八倒者是見諦煩惱若學人起者是修道煩惱若羅漢起者是界外煩惱也外凡人不起前四倒八内凡位不復起之後四倒者八内凡位乃至羅漢起准之可悉疏問染者品等者此下第二番問答有二即問與答答中有二初明煩惱難破故須多破次又前破染下第二約愛見二使以顯二品差別如文可悉也疏問何故等者此下第三番問答有二即問與答答中有二初約自行化他以明來由次二若接下第二明近接上偈文起之如文可悉疏問云何爲顛倒等者此下第二問答以明品目文中有二第一明外人情計即爲所治次問云何破顛倒下第二申論旨歸正明品目初中又二即問與答答中有二初明通倒後辨別倒此文初也言故大品云等者案彼經第二十八卷末須菩提言衆生顛倒因縁故造作身口意業隨欲本業報受六道身又第三十八卷末佛告須菩提言凡夫人不入聖法不知諸法無性相顛倒愚癡故起種種業因縁是諸衆生隨業得身若地獄身乃至天身今略引之疏別而爲言等者此下第二明倒文中有二初列顛數次三倒者下隨列別釋文中有四第一明三倒第三明十二倒第四明八倒初中又二初擧邪顯正次問答以辨三倒生斷差別擧邪之中凡有三異執文處易知言想心見者述義解云想謂心數法中想數也心謂心王也見謂心數法中慧數也言毘曇云等者案雑阿毘曇心論第八卷修多羅品長行云如是説者此義不然何以故顛倒是見性故想心爲見所亂故説想心顛倒受等雖爲見所亂非世所傳故不説今略引之述義解云想但於長短方圓能想像耳未起決定心故非倒體也心但想心之爲想像境上總爲縁耳不分別此青黄等故非倒體也見者於前二境分明起決定執故爲倒體花嚴十藏品云先起想次起心後起見體僻爲心倒者四心之中識心是也言毘婆闍婆提人言等者案雜心論第八卷修多羅品長行云毘婆闍婆提欲令有十二顛倒所謂無常常想倒見倒心倒餘亦如是彼八種見道斷無常無我六此二各心想見故也若有樂見倒不淨淨見倒四見道修道斷苦及不淨想倒心倒樂淨見一向見諦斷樂淨想心見道修道斷以見諦者見道斷而想心不盡也今取意略引之言成實師有二釋等者言今龍樹意等者疏主解云一切心了別是心倒一切心想像皆是想倒一切心決了名見倒可悉疏問三倒等者此下第二問答以明三倒生斷差別文中有二即問與答如文言智度論釋隨喜品明等者案彼論第六十一卷釋隨喜廻向品第三十九云間曰見爲諸顛倒本如得初道人然起想心顛倒無見顛倒以見諦斷故答曰是顛倒生時異斷時異生時想在前次是心後是見斷時先斷見見諦所斷故顛倒體皆是見相見諦所斷想心顛倒者學人未離欲憶念忘故取淨相起結使還得正念即時滅如經中譬喩如渧水墮大熱鐵上即時消滅小錯故假名顛倒非實顛倒是故説凡夫人三種顛倒學人二種顛倒今取意略引之影疏解云問曰下婆沙釋云三倒之中唯見爲倒性唯從見倒生四顛倒此意以見違理故説爲倒性心想二倒但縁事起是愛分故非正是倒也答曰下若大乘諸義皆言從顛倒生心倒從心倒生見倒從見倒生四顛倒此是從愛生見故斷見之時四倒永滅若小乘中乃言從遍使坐諸煩惱者即是從見生愛此中既扶大乘義故云生時異斷時異也師釋云言從見生愛者是及起相生從愛生見者據住處相生耳准之可悉疏四倒者此下第二明四倒文中有二初總明四種顛倒即是前四倒次問答釋成凡有三番問答文處易知言四倒者謂於生死中等者案婆沙第四卷末云有四倒所謂常樂我淨爲相似法所覆故不知無常爲適意威儀法所覆故不知苦爲皮膚所覆故不知不淨爲所作事覆故不知無我言同四倒等者此初番問答案婆沙次文云問曰此四倒性是何答曰是慧性准之可悉言問五見等者此第二番問答樂婆沙次文云問曰若是慧者此五見幾是倒幾是非倒答曰二見半是倒二見半非倒二見半是倒者身見見取及邊見所攝常見二見半非倒者邪見戒取及邊見所攝斷見言我見中等者案婆沙同卷説無常見常處云問曰邊見是何義答曰取於斷邊取於常邊是邊見義復次起我見者猶是邊僻下賤世所呵責況復於我計有斷常復有説者此見行邊處故有二種義名行邊處一行常邊二行斷邊以是等義故名邊見今疏主引此文加増釋成上文述義解云獨頭足上者於無物處取有物心是名獨頭見取由前心而起後心以定執故名足上見取也又婆沙第四説淨見不淨處云問曰此中但説我見何以不説我所見答曰我是見顛倒性我所見非倒性復有説者我見是根本若説我見當知亦説我所見准之可悉言問何故爾耶等者此即第三番問答案婆沙第四卷末文云已説自體所以今當説以何等故名爲倒答曰倒有所増故名倒此四倒唯見苦斷所以者何縁苦生故還見苦斷復次此倒縁果生還以見果慧斷復次身見見苦所斷性是倒若斷身見亦斷復次苦麁若於麁苦有錯謬者賢聖所呵如人晝日錯謬人之所呵三諦微細若於微細有錯謬者不深呵責如於夜中有脱失者則世人不深呵責准之可悉但初三如次相當然後二前後相當也述義解云迷理惑者謂見諦惑迷事惑者修道惑也果上起等者數人云四倒迷於苦集理故但由苦集起耳成論云淨倒起苦集上何者苦集是不淨物謬計淨故常樂二倒依苦集道二諦無常苦謬計常及樂故我倒通於四諦起何者四諦下皆無我爲計我故今就數人義而爲言之言婆沙又云等者案同卷次上文云問曰以何等故二見半是倒二見半非耶答曰以三事故名倒一轉行二増益三性倒邪見斷見雖轉行性倒而非増益所以者何是壞物性故戒取雖轉行雖増益性非是倒所以者何有少相似法故亦説有色界道能離欲界欲有無色界道能離色界欲此是倒自體是我是物是相是分是性又案第五十四卷智犍度他心智品下云先作是説以三事故是顛倒一以猛利二以妄取三以一向性顛倒須陀洹愛染雖是猛利及以妄取而非一向性顛倒今古引此二文准之可悉述義解云言同性倒者於假我上起實我故此是我倒又昨日色相似今日色故計有我此是常倒世間之中實無樂淨而沐浴時謂淨計五欲爲樂此皆妄取也猛利性者通起也言倶舍三義立倒等者案彼論第十四卷分別惑品一云餘師説其取云何以我所爲倒彼見我於是處自在故於是處起我所見是故此見皆是身見由二門起若汝計我是第一執我所是第二若我與帶物稱我此二文應成別執云何不立餘惑爲顛倒由以三因成立顛倒義故云何爲三偈曰顛倒故決定度増益故釋曰此二見半一向顛倒故於境界決定度故増益義故斷見邪見不能増益非有門起故戒執取非一向倒隨分量清淨爲境界故所餘諸惑不能決度是故不立爲顛倒若爾於經中説於無常執常是名想倒心倒見倒此中云何唯見爲倒偈曰想心隨見故釋曰由隨樂見倒與見倒相應想及心亦説爲倒云何不説受等爲倒由世間成故於世間説此人顛倒心此義明了不説世間顛倒受如此顛倒於須陀洹人一切皆滅由諸見見諦所滅故所餘相應法亦同滅今略引之疏次明十二倒等者此下第三明十二顛言上座部及毘婆闍婆提明四倒等者案雜心論第八卷修多羅品云毘婆闍婆提欲令有十二顛倒所謂無常常想倒見倒心倒餘亦如是彼八種見道斷無常無我六苦有樂見倒不淨淨見倒四見道修道斷苦及不淨想倒心倒今取意引之無常無我各有想心見故云六也樂淨見一向見諦斷樂淨想心見道修道斷以見諦者見斷而想不盡也又婆沙第五十四卷智犍度他心智品下文如次下所引言倶舍論更出一師云等者案彼論第十四卷分別惑品有此文如次上所引言數人云等者案雜心論第八卷修多羅品長行云謂彼四顛倒當知見苦斷者一切四顛倒不遠尋根本故苦處起故見苦斷又婆沙第四以五義明名倒所以次上所引又倶舍論第十四卷分別惑品云是前所説有常倒我倒爲唯是名倒爲更有餘顛倒有四謂於無常常顛倒於苦樂顛倒於不淨淨顛倒於無我我顛倒今引此文准之可悉言問初二果人等者案婆沙論第五十四卷智犍度他心智品下云問曰須陀洹斯陀含起愛染叫爲是樂想淨想爲是苦想不淨想若起樂想淨想者云何不是顛倒耶若是苦想不淨想者去何起染愛耶答曰應作是説起樂想淨想問曰若然者云何不是顛倒耶答曰先作是説以三事故是顛倒一以猛利二以妄取三以一向性顛倒須陀洹愛染雖是猛利及以妄取而非一向性倒復次或有於諦計樂計淨或有於境界計樂計淨於境界計樂計淨者須陀洹未斷復有説者須陀洹起愛染時計苦計不淨問曰若然者云何愛染耶答曰從無始已來學習此法身心生熱爲制伏此心故起此染愛猶如自喜婆羅門指觸糞穢詣鍛師所以火淨之時鍛師語言可以灰土浣草而以淨之婆羅門言如此等物不能淨於我指必當以火淨之是時鍛師燒鉗作火色以鉗其指時婆羅門爲熱所苦逼便振其指以指著口中婆羅門審指不淨但爲苦痛所逼而著口中彼亦如是今略引之言鍛師譬者玉篇鍛都亂反揺也推也小冶也言十二倒者毘婆闍婆提云等者案婆沙第五十四卷云此四顛倒須陀洹幾斷幾不斷問曰何故造此論答始如毘婆闍婆提説有十二顛倒謂無常有常想顛倒心顛倒見顛倒苦有樂想見心顛倒無我我想心見顛倒不淨之想心見顛倒八是見道斷四是修道斷者無常常想見苦有樂想見無我我想見不淨淨想見四是修道斷者無常計常心苦計樂心無我計我心不淨計淨心倒同見道斷者苦比忍現在前畢竟斷諸修道斷者金剛喩定現在前時畢竟斷今略引之言若依雜心等者案彼論第八卷修多羅品云顛倒是見性故具引如上准此論文今言見心者想心見中唯見之所起名爲顛倒非謂見與心之所起准之可悉疏所言八倒等者此下第四明八倒言雜心師等者言成論師云前後八倒皆是見惑等者十八字缺言常謂無常等者述義解云就後四倒中而爲言之言復有説云後四倒屬無明攝等者言問昔外道凡夫等者案婆沙第四卷云無常有常見者無常名一切有爲法而外道言常者見色相似相續諸心法憶本所作能誦持諸論是故計常苦作樂見者五受陰是實苦彼諸外道言是樂者以少時樂故如人極時息爲樂等不淨見淨者不淨名爲一切有漏法彼諸外道見淨者愚於所行以少時淨故如治爪等疏主解云八倒者前倒常樂我淨外道起四倒謂常倒樂倒我倒淨倒佛破四倒故説無常苦無我不淨比丘佛果上更起苦無常無我不淨更起後四倒謂無常倒苦倒無我倒不淨倒前後合論故有八倒准之可悉言答亦具有也等者疏主解云只就今具得有八倒今且就初倒作倒後即可知如來實非是苦彼謂如來是苦此於樂中生於苦倒以計如來是苦故自謂此解爲是既謂此解爲是即生歡喜故復是顛是即具二倒謂若説如來是無常名大罪苦此是佛名其爲罪苦若言如來是常即是我見我見無量罪是故説如來無常謂此解爲稱心故歡喜樂也無常常想法師云此約令昔語無常者名不修空不修苦故壽命短促者此語難解今明言不修空者空無十相十相者五塵三相男女等今涅槃修空空無此十相故是常若不修空者有此十相故即無常也無我我相者二乘不修空故壽命短促故無我佛法修空有我故壽命得長廣説如四倒品疏也言凡夫之人具足八倒者述義解云生死計常樂我淨亦計二乘涅槃是無常苦無我不淨應知言答此品等者案碩疏云然顛倒有通別通論一切有得皆是顛倒也若別則唯三倒四倒名倒耳問三倒四倒八倒何者通何者別也釋云三倒即通四倒八倒即別如一常倒具有三倒謂想心見故三倒通四倒即常樂我淨八倒更足苦無常無我不淨復成十六倒何者只見生死是苦無常等見涅槃常樂我淨等向已自是倒何故爾諸法實相中豈有生死是無常涅槃是常見有此八已自是倒而復横謂生死中作常樂我淨計涅槃苦無常無我不淨復是倒上更起倒故二八成十六倒准之可悉言凡夫八行者生死是無常苦無我不淨涅槃是常樂我淨此爲八行望於實相中八行皆是倒故名破八行也隨分爲言無常等四是行非倒也今案大乘玄第三八倒義云三修者一常無常二苦樂三我無我常者凝然也無常者遷流樂者怡愈苦者逼惱我者性實無我不自在通稱修習業也若具足而應是四修離即八修謂淨不淨所以除淨不淨者不淨觀是遠方便因中除不淨觀故果中除淨觀准此玄文今言行者猶是修也然有經云生死是苦空無常無我不淨者就生死之無我分爲二義如成論云知無我者名之爲空知法體空名爲無我依淨名意知無有我名爲無我知無法體名之爲空文云衆生是道場知法無我故諸法是道場知法體空故然則一無我上分空義故爲五空與無我合故爲四准之可悉疏問云何破等者此下第二問答申論旨歸文中有二即問與答答中有三初明不知本性空寂而令知之次又内外大小下第二明外謂顛倒生滅而令識不生滅次又外人下第三明破二見令悟不二如文可悉疏開此品者異釋云云等者言開此品者等者琳法師云此品二十四偈分之爲二初一偈外人總立下二十三偈展轉破之康師云前有十二偈破顛倒所起之煩惱後有十二偈破煩惱所因之顛倒碩法師云品開三段初十二行破煩惱次九行破顛倒第三二行雙破二種涅槃准之可悉言又淨名經云等者案彼經上卷弟子品須菩提章有此文今取意略引之疏主解云此第二就解惑平等門呵善吉所謂理唯二徹一斷三毒二者與倶倶謂凡夫也斷即二乘今聞不斷不倶理出意外茫然不解大士體三毒本自不有故不與倶今亦不無稱爲不斷乃至廣説准之可悉言普賢觀經云等者言故無行經云等者案彼經下卷文殊自擧過去事處之偈文今取意略引具明如上也言又天魔等者此他化自在天魔也言故火宅中等者案法華經第二卷譬喩品火宅偈初具有明毒蟲惡鬼事具引文明如上言又依法花意等者案法華經第二卷譬喩品火宅偈明迷悟不同有四種人以爲次第初明在家起愛衆生不知生死亦不知出如經有五百人止住其中下明五鈍使是第二明出家外道知厭惡老病迷於出路而不知出處如經處處皆有魑魅魍魎下明五利使是以上二人顯總譬中第三明二乘之人知厭知出但是曲出故於佛道迴稽留之住半不更進求如經是時長者下頌三車救譬是第四明菩薩之人知厭知出名爲直出故乘是寶車直至道場如經爾時諸子下頌等賜大車譬是准之可悉言從憶想分別者等者案碩疏云憶是心倒心能憶境也想即想倒分別者即見倒見能推獲分別也餘二師亦同之准此等文今言三毒因者想心見三倒也何者以衆生内邪三倒故外見淨色即生貪見不淨色即生恚見中庸色即生癡也言故淨名云等者案彼經中卷觀衆生品中説兩捨行處有此文今取意略引之言貪欲者前世貪愛也受身雖具藉衆結𨳝業𨳝生愛爲其主故偏説欲貪言顛倒者法本非有倒想爲有既以爲有然後明其美惡此則或心内傳爲倒然後妄分別外事也憶想分別者虚妄分別也無住者非有則絶四句亡百非言斷慮窮即是諸法實體爲一切法本而此實相更無有本然今檢經文次亂何者經云貪欲本分別分別本顛倒顛倒本無住故述義解云今此言顛倒者虚妄分別也想分別者顛倒想故不相違也疏答中五偈等者言經中明煩惱等者案碩疏云今第一作無性破無性故無法汝引經言三毒等從縁生故應必有今明只爲從縁生故知其決定不有何者三毒等煩惱本無自性乃因淨不淨故生復無自性因前世業前世業亦無自性如是推求卒終不實既其無實則無所有准之可悉所言經中明等者第一偈長行經説因淨不淨等是也疏第二偈以人例法破等者言大品多擧等者案彼經第三卷中佛告須菩提言譬如説我名和合故有是我名不生不滅但以世俗名字故説般若波羅蜜菩薩菩薩字亦如是皆和合故有亦不生不滅但以世俗名字故今取意略引之言龍樹云等者案大論第一卷云佛弟子等雖知無我墮俗法説我非實我今取意引之言上半擧我以無者案碩疏云以之言與也起惑之主即是我人准之可悉疏若謂雖無我下生第四偈五求破等者言答攝論師等者案彼論第二卷釋中云於世間中離分別依他二法更無餘法阿梨耶識是依他性餘一切法是分別性此二法攝一切法皆盡三界唯有識故准之可悉言若身見與五陰一等者案影疏云若與陰一即應爲五亦是色聲及善無漏等若異即同無爲非陰所攝准之可悉言下半有二種五求等者案康疏云煩惱於垢心五求亦不得者雜心云煩惱者九結十纒從此煩惱更生害恨誑高是煩惱之垢故云垢心煩惱於垢心中五求不得也前以我爲能有五陰是所有於五陰中五種求我不可得今以煩惱是能生垢心是所生故於垢心中五種求煩惱亦不可得然此五求不出一異影師作一異互求釋云若結即垢心應在識陰垢心即結應攝行陰若結非垢心應離心別有垢心異結則可與善倶起若准此釋則垢心是心王煩惱是心數不得以害恨等爲垢心准之可悉言即釋淨名經明等者案彼經上卷弟子品優婆離章維摩詰言唯優婆離無重増此二比丘罪當直除滅勿擾其心也所以者何彼罪性不在内不在外不在中間如佛所説心垢故衆生垢心淨故衆生淨心不在内不在外不在中間如其心然罪垢亦然今取意引之疏主解云如佛所説下第二次辨心空夫罪由心起則心是罪根然心本尚空罪未寧有故逆尋其本也凡有三句初引佛誠言夫心有垢染則衆生受果衆生受果便是垢累衆生垢義既爾淨義亦然也心亦不在下第二句明心空也心若在内應不由外境心若在外内應無心即非二處豈在兩間也如其心然罪垢亦然此第三句以本類末也夫罪之生由因縁有求其實性不在三處不在三處則見罪空以見罪空便悟理實悟理實則發心正觀正觀既生則煩惱斯滅煩滅尚滅罪豈在哉准之可悉言又即大乘人皆執經中云三界一心作或云一貪心作等者二十字缺疏問曰下第三救等者言此救來意有二等者案康疏云問前言從淨不淨生貪恚癡今何故言從六塵生耶答此義無別但言有出沒因見六塵有淨穢等故生三毒前但擧六塵家淨穢今擧淨穢之六塵准之可悉疏答曰下第四破等者言還破外救中等者述義解云由六塵起淨不淨倒由淨不淨倒生三毒此爲三事應知言一莊周明境無定等者案莊子内篇齊物章云毛嬙麗姫人之所美也魚見之深入烏見之高飛麋鹿見之決驟四者熟知天下之正色耶郭象注曰此略擧四者以明天下所好之不同不同也而非之即無以知所同之如是矣成法師解曰毛嬙越王之嬖妾麗姫晋獻寵嬪此二人者姝姸冠世人謂之美也然魚見怖與深入鳥見驚而高飛麋鹿走而不顧擧此四者誰知宇内定是美色耶故知凡鄙愚迷妄生憎愛以理觀察孰是孰非哉決卒疾貌也麋似鹿而尾長薦䒫草也准之可悉言二譬喩部明等者案雜心論第四卷使品長行云譬喩者説結成人不成事不成境界不定有欲無欲故有時於彼起欲起嗔起慢起嫉起悲起捨准之可悉言三攝論明境亦空等者案彼論第六卷説十種散動中異執散處長行云若投分別性説言色即是空空即是色何以故此分別色永無所有此永無所有即是有即是空此空即是色無所有不如依他性於眞實性不可説一由清淨不清淨境界故今取意略引之言法之有無等者案影疏云未與心合夫法之有無何假心合若未合時無合豈有耶此將明倒由心生不在諸境如魚深鳥翔安住准之可悉言及楞伽經有二種意一者從此想心謂有前境等者案入楞伽經第二卷佛告大慧菩薩言彼諸外道墮於二見不知唯心妄想分別増長自心界如身資生器世間等唯是心分別不得分別免角離於有無不得分別一切諸法離於有無又第三卷有文具明縛解品記也今略引之疏問曰經説下第二次破顛倒等者言二者此中所立等者案碩疏云他解若金剛心還是無常苦空金剛心後是常樂我淨若於金剛心已還作無常苦解則非顛倒若於後心佛地作常樂我淨觀亦非顛若於佛地作無常解則是倒若凡夫外道於生死謬計常樂我淨亦是始終合擧則成八倒八不倒今此文中略擧四倒四不倒也准之可悉言昔倒不倒等者述義解云昔於生死起常等四倒即無常等非倒故此倒不倒今皆成倒合爲八倒也今佛果上起無常等四倒即常樂等非倒故倒非倒今皆成倒亦爲八倒生死涅槃合十六倒也言又計生死常無常等者前四倒各有四句後四倒各有四句合三十二倒一一句中皆有想心見數之九十六倒也疏答曰下九偈三門等者言可著是常無常境等者案碩疏曰著即是前境可愛之境可行人意故生著故云可著也著者即是起貪著之人也著即是受心領納前可愛境果也所用著法即是隨用何根中取境名爲所用著法准之可悉疏有倒不生倒下第二三時門破等者言又前是奪破等者案碩疏云所以須作此破者爲上來性空門及寂滅但是逈奪破直明諸法性空寂滅都無如此倒與不倒故今縦開縦汝言有者不出三時故次以三時責也准之可悉言一師明生滅無生滅二種煩惱等者述義解云所言客煩惱者直於理中無生滅横計生滅故名客耳非望奪爲客也言如大品云等者案彼經第一卷末云佛告舍利弗行般若時不見菩薩字不見般若亦不見我行般若亦不見我不行般若乃至菩薩行般若時不見一切名字今略引之疏如是顛倒滅下自上以來等者言則十二因縁河傾等者案涅槃經第三十二卷師子吼品中云佛言善男子如恒河邊有七種人乃至廣説即是生死河七人又第三十六卷迦葉品中佛言如恒河中有七衆生乃至廣説即是涅槃河七人疏主解云生死深曠迴流不息悉能漂沒六道衆生故名爲河佛性亦爾深而無底曠而無邊大乘賢聖皆在其中故名爲河准此等文今十二因縁河即生死河佛性河即是涅槃也言問若爾經云等者案大品經第三十一卷有此文今略引之中論觀四諦品第二十四疏所以有此品來等者約此品由來大文有二初明來由次但四諦有二種下第二明品名目初中有三第一約二十七品次第以辨來由次二者外云下第二約如來説法前後以明來由次三近從下第三約次上前品生以明來由此文初也言苦集二諦等者案琳疏云所言四諦謂苦集滅道三相所切爲苦相續感後爲集因果盡寂名滅三學能通爲道四諦當相實而作虚目之爲諦然苦集兩數是生因因生果滅道二諦通有二種若望本寂涅槃性與法身是了因因果若據方便涅槃始起二身是生因因果又苦集二諦名染因染稱爲世間滅道二諦是淨因果名爲出世染淨雖殊而因果倶實故云四諦准之可悉疏二者外云等者此下第二約如來説法前後以辨來由言故初教轉四諦法輪等者案法華經第一卷方便品比丘偈中云思惟是事已即趣波羅捺諸法寂滅相不可以言宣以方便力故爲五比丘説是名轉法輪便有涅槃音及以阿羅漢法僧差別名疏主解云若據自他而言佛初成道目轉法輪謂初自轉也今爲他説法即他轉之初然轉法輪具四義一輪二轉三方四降敵言輪者以生滅觀爲體即可軌名法輪轉爲轉也轉者婆沙云佛在菩提樹下轉自身法輪謂自得無漏行四諦境於鹿蘭爲他人轉法輪謂陳如等有應發之慧須佛言教爲其扣發名爲他轉但自轉之義就初成道此義即短從爾已後皆屬他傳故他轉時長言方者義轉必有方所即是轉境義若爾小乘生滅觀照四諦境故輪於四方轉所以然者小乘以苦集爲相生滅道爲還滅境既生滅觀亦復然故生滅境發生滅觀生滅觀照生滅境所以言生滅之輪四方轉也降敵者即辨輪用小乘於四諦方轉降四諦下怨具明如法花玄第八卷也案大經第三卷初迦葉菩薩問言云何諸調御心喜説眞諦至第七卷中爲答此問佛説四諦准之可悉言是迷悟之本等者案碩疏云而兩品所以相隨者是以迷四諦故成四倒只以悟四倒便成四諦也所言迷故成四倒等者明生死實是苦無常横計常樂我淨即是迷苦諦具足求四倒既不識苦豈復知集即失集諦既不解苦知集即無有道既無無漏道將何物斷惑得滅諦耶故迷四諦故有四倒也若了四即識四諦何者識若識苦無常無我即除常等四倒即識苦識苦即了集既解苦集理即生無漏道即有道諦既有道即能斷惑得成故有滅諦所以除倒即了諦故兩品相隨准之可悉疏三近從顛倒品生等者此下第三約次上品生以明來由案碩疏云前外人擧四倒救義此意甚遠何者四倒即是能障而四諦即是所障既有能障之倒即應有所障之諦既有四諦能了此四諦即名爲智慧智慧義既成則前如來後涅槃如此眞法皆成出世間法既成則前世間亦成論主上得此意故即破四倒四倒既不存豈有四諦是故乃至一切世法皆無然四倒爲能障四諦爲所障既無能障之四倒豈有所障之四諦但外人今翻擧四諦還證有四倒故此品來也准之可悉疏但四諦有二種等者此下第二明品名目第一出外人情計即爲所治次今言破四諦下第二申論旨歸初中有二第一總標量無量四諦次釋有量四諦下第二正出計情此文初也疏主解云有量無量者二乘智力有限量佛智無限量亦名作無作擧小乘諦望後更有大乘觀諦可以修作名爲有作以有作觀智詺所觀諦故名有作諦擧大乘觀諦望後更無餘觀可作名曰無作以無作觀智詺所觀諦名無作諦亦名邊無邊亦名爲無爲准之可悉述義解云有量者三界見修煩惱并斷智等有限故言三界苦果等者案碩疏云但四諦有二種一有量二無量若三界内苦爲苦爲諦三界内業煩惱爲集若滅三界内苦集爲滅洽三界内苦集爲道諦此是有量四諦也若三界内外一切苦集爲苦集諦滅三界内外一切苦集爲滅若道能治三界内外一切苦集爲道諦如此即是無量四聖諦准之可悉疏釋有量四諦等者此下第二正出計情文中有二第一約有量四諦以出計情次無量四諦下第二約無量四諦以出計初中又二初正出計情次問答解釋此文初也言毘婆沙云等者案彼論第三十八卷智楗度八道品云問曰諦體性是何答曰阿毘曇者作如是説五取陰是苦諦有漏因是集諦數滅是滅諦學無學法是道諦譬喩者作如是説名色是苦諦煩惱業是集諦煩惱業盡是滅諦定慧是道諦毘婆闍婆提作如是説八苦相是苦是苦諦餘有漏法是苦非苦諦生後有愛是集是集諦餘愛餘有漏法是集非集諦生後有愛盡是滅諦餘愛餘有漏法盡是滅非滅覺入道支是道是道諦餘學法一切無學法是道非道諦今略引之惠其師阿毘曇章第五卷四諦義解云依此論宗諸説之中毘曇以爲善也述義解云有漏因者愛取有也名色是苦諦者現在五果中第二名色也結業是集諦者現在愛取有也止及觀者梵云奢摩他此云止也亦言定也梵音毘婆舍那此云觀也亦言慧住於一境推求曰定於諸法中悟達曰慧以此無漏定慧爲道諦也當來有愛者當果令有之愛感當來有愛者羅漢滅現在三因故不感未來苦果凡夫以愛等感當來果故餘愛者雖起貪心若不用者名餘愛也八正道者正語正業正命此配戒學離瞋癡起口業者正語離瞋癡身業者正業離貪起身口業者正命故正念正定此配定學求定初心守於一境者正念求定之心終不動念者正定故正見正思惟此配慧學於法遍達而明悟者正見推求諸法之前方便者正思惟故正精進者通三學也疏問四諦攝法盡不者此下第二問答解釋文中有二初問答解釋次數論解下第二明成實薩婆多所解不同初中凡有三番問答即爲三別初問答明攝法次問答明單名諦所以次問明名聖諦之所由此文初也有二即問與答如文案婆沙論第四十八卷云已説體性何故名諦諦是何義答曰實義乃至不異義是諦義問曰若爾虚空非數滅何故不立諦耶答曰若法有因有果故立諦虚空非數滅無因果故不立議復次虚空非數滅無漏故非苦集諦無記故非滅諦無爲故非道諦乃至復次若法能生厭離隨喜者立諦此法不能生厭離隨喜故不立諦准之可悉述義解云數人義於虚空非數滅者不起邪見正見故四諦不攝若以四諦之外無法相從而攝於滅諦也疏問曰何名諦等者此下第二番問答案雜心論第八卷修多羅品長行云問何故説名諦答此二因縁故有二因縁説諦謂自性不虚及見彼得不顛倒覺虚空非數縁成雖自性不虚無記故無漏故不説諦准之可悉疏問云何名聖諦等者此下第三番問答案雜心論第八卷云問聖諦有何義聖於此諸諦起眞實覺及顯示他故説聖諦言又昔有凡夫等者案婆沙第四十八卷云尊者僧迦婆修説曰佛在世時凡夫聖人共論此事凡夫人作如是説諸行是常樂我常聖人作如是説諸行是無常苦空無我凡夫人言我所説是實聖人亦言我所説是實以是事故共詣佛所佛作是言聖説是實所以者何聖諦是聖人所知見法是故名聖諦准之可悉疏數論解有量而義不同等者此下第二明成實與薩婆多解有量四諦不同文中有四初明苦諦次數集下第二明集諦次成論即此能生下第三明滅諦次數明一切無漏行下第四明道諦如文言數明苦通三聚者案婆沙第四十八卷云云何苦聖諦佛經説生等八苦略説五取陰是苦准此論文約五取陰中色陰是色聚行陰之中有不相應法此非色非心聚識想受三陰是心聚故云通三聚言論但是心等者案聰法師成實論章第一卷云唯據心神不通三聚又云若從因名而果不定或是有漏或是無漏言數但有漏者案婆沙第四十八卷云如是等諸苦是有漏取陰所攝是故略而言之五取陰苦准之可悉言數集通三聚者案婆沙第四十八卷云云何苦集聖諦佛經説生復有愛及喜心倶愛處處喜愛是名苦集聖諦准之可悉言論但取業煩惱者案成論章第一云集諦業煩惱爲體業爲因煩惱爲縁也言數因集有縁等者案婆沙第四十八卷云問曰見集諦時見集四行謂因集有縁何故但説集諦不説因有縁諦答曰應説而不説者當知是説有餘也聰法師解云四卷毘曇云成相似果故因故引相續故習一切生死窮可得故有不相似事相續故縁雜心云種等法故因等起故集相故有相成就故縁准之可悉述義解云有事苦集有理苦集今所定者是理苦集後念應前念者爲果前念生後念者爲因也言成論即此能生等者案成實論第九卷嗔恚品云問曰瞋云何生答曰從不適意苦惱事生乃至或從屠獵蛇中來故瞋恚生乃至廣説述義解云彼不説理苦集故一期報中前滅後生皆爲報也言數但取煩惱滅等者案婆沙論第四十八卷云云何苦滅聖諦答曰佛經説復有愛及喜心倶愛處處喜愛已啫已捨盡無餘是名苦滅聖諦集亦應説而下説者是有餘説又説苦已説集乃至廣説言論明無漏滅等者案成論章第一云空解具三義一照不失理二智上無彼惑漏三能滅無諸漏伏結故名無漏言數明方便道永伏等者述義解云四善根位伏諸結者此非數滅非滅諦攝此位未起眞無漏解故名伏也言成論明五方便中等者述義解云四念處爲一并四善根爲五方便也言數明一切無漏行等者案婆沙第四十八卷云云何苦滅道聖諦答曰佛經説八正道是也述義解云從苦忍以上諸無漏智取爲道諦四善根位相似無漏不爲道諦故名不取相似也言論明眞似等者案成論章第四卷云五方便爲相似道苦忍以上爲眞但空解有三義一解二忘三善合爲道體照空曰解無一存曰忘言照空者照無所照方名照空亦云不只忘是照也述義解云苦忍眞無漏方便相似無漏皆爲道諦也言數明無被導法義者述義解云數義但入觀時起無漏心出觀之時若佛若羅漢不起無漏心唯縁有漏境故有縁縛義也言論明有被導等者案成論章第一卷云被導四心有一義無被或漏也述義解云非但入觀時起無漏心亦出觀時被入觀時無漏心而發無漏心不爲縁經也疏次無量四諦等者此下第二明無量四諦案寶窟下云權名有作亦名有量實名無作亦名無量也言作無作從立名擧小乘諦望後更有大乘觀諦可以修作名爲有作以有作觀智詺所觀諦故名有作諦擧大乘觀諦望後更無餘觀可作名曰無作以無作觀智諦所觀諦名無作亦云二乘智力有限量佛智無限量故云有量無量乃至廣説述義引涅槃疏云於不極處作四諦而説故名有作極處説故名無作此就界内外判今案灌頂法華玄第三初云有師解勝鬘無邊聖諦對二乘有餘彰佛究竟二乘是作聖諦作者有量四聖諦也無作四諦者無量四聖諦也作無作就有量無量就法二乘觀諦得法不入更有所作故名有作得法不盡則有限量乃至今明無量者迷中重故從事得名無作者此下第二中論旨歸文中有三初破二人懷四諦義次又顯此二人下第二破二人不解佛大小乘義次問何故就此品下第三明外人執空有故倶破四諦此初文也有二初明大小乘人倶壞四諦次又有二人下第二明單小乘人壞四諦義初中又二初明迷執次所以然者下釋成如文可悉疏又顯此二人等者此下第二破二人不解佛大小乘義文中有二初破迷大小故出諦次又觀諦始末下第二迷二諦故不識大小初中又二初明不識大小迷二諦次既迷大小下第二明論主破迷顯道初中又二初總明大小二人不解大小乘義次小乘人下別明不解大小如文約論主破又二初明論主具智悲徳破外人迷執顯示中假道理次又破此大小下第二明破大小迷執令識道未曾大小約迷二明論王破執中因縁空有二諦初中又二初擧外人執次初執有難下難外人迷有四初明外人執空有難論主故迷二諦次亦是初執下明外人執大小難論主故不識大小次又初已來下第三明外人執自性空有故不識因縁空有次又顯外人下第四明外人執空有故不成問答如文疏又顯外人等者此下第三明外人執空有故倶破四諦凡有三番問答如文言大品云等者案彼經第三十七卷成就衆生品云佛告舍利弗菩薩摩訶薩住二諦中爲衆生説法世諦第一義諦舍利弗二諦中衆生雖不可得菩薩摩訶薩行般若以方便力故爲衆生説法今略引之言論釋云等者案大論第九十一卷云不但説空不但説有爲愛著衆生故説空爲取相著空衆生故説有有無中二處不染等今略引之疏品開爲二等者言長行可有二義等者案碩疏云已破顛倒故通達四諦境生智斷惑得四沙門果豈得二云都空耶元康師解云破四倒是四諦之因四果是四諦之果因果既有四諦不無准之可悉言前半行牒論主執空者案康疏云然此牒前有通有別通者若一切法空句是世諦初以來品品皆明法空若也是空則無生滅既無生滅何有三寶四諦耶此是住家意也別者無生亦無滅句是也論牒標八不今牒八不中不生不滅兩句不生不滅即是空義故云若空無生無滅乃至廣説准之可悉言以無生故等者案琳疏云以無生故便無苦柴以苦是可生集是能生故也以無滅故則無滅道以道是能滅滅識是所滅准此疏文今言滅至眞諦者滅諦也言初偈明無四行者案康疏云行者智也以能行境故名爲行也言後偈辨無向果者案康疏云此偈明涅槃四果也上半明失四果法四果者謂須陀洹等四也下半明涅槃得向人也得者得於果向者向於果若無所得所向之法何有能得能向之人耶准之可悉言又初一偈等者案碩疏云初三偈過論主無四諦次兩偈論主無三寶在文分別明又下説論主還外人之過處云第一還無四諦三寶之過第二還無因果罪福之過初中爲二第一還無四諦過第二還無三寶過初中有三第一還無四諦境第二還無四諦智第三還無賢聖過准此疏文今應云就偈爲二第一過論主無四諦三寶出法第二過論主無因果罪福世間法初又有二第一過無四諦第二過無三寶初中有三初一偈無四諦境次一偈無四諦智第三一偈半明無僧寶也次無三寶中又二初則明無三寶次半行總結無三也疏空法壞因果下第二等者言一者上來等者言鹿園者案法華疏云波羅捺此云鹿林昔有王以林施鹿故云鹿林婆沙云仙人園昔有仙人在此處住因以爲名今謂波羅捺是其通處鹿園是其別處三世諸佛常在此説法乃至廣説言林者泥洹經云堅因林此表示如來眞身堅因不可破壞等西域記云在河西岸其形類懈而皮青白葉甚完閏四樹特高即是如來涅槃之處也言今明無佛等者佛初成道爲提謂長者等五百價人説三歸五戒十善等世間因果道理即提謂經兩卷云不或目銀也言二者上明等者所言世間仁義禮智等者此間五常教也案孝經注云道者扶持萬物使各終其性命者也是以總而言之一謂之道別而名之則謂之孝悌仁義禮忠信爲之也准之可悉疏答中三十四偈等者言初明不知三法等者案康疏云山門云不知空者我所説空是則色空如大品經云色即是空空即是色色不異空空不異色汝不知此謂空異有執有難空是故生惱也空因縁者爲破有病是故説空有病若亡藥亦遣如行品云大聖説空法爲離諸見故若復見有空諸佛所化汝不知此謂有定空是故坐惱也空義者空以不空爲義如涅槃經云又解脱者名空汝不知此謂空定是空是故生惱也言佛爲治有病等者案此論第二卷行品末偈云大聖説空法爲離諸見故若復見有空諸佛所不化今取此偈意疏主釋云外人向於有起愛佛爲治此病故説空今復於空起見乃至於絶四句亦復起見故云不化此不化即化故非永捨廣説如彼言故因縁品云等者此略引初牒長行末文言故下云等者此品釋因縁所生法等偈長行文今略引之疏諸佛依二諦下第二等者言諸佛依二諦中等者大品經第三十七卷文略引之見文如品初也言外人著空失於世諦等者案二諦章上卷云乘往二人併失二諦薩衞既不知諸法性空者亦不識諸法性空者亦不識諸法於顛倒有既失第一義即出世諦次方廣明諸法空失於世諦既世諦即失眞諦又云中論具破二失若大乘學二諦失二諦若小乘不識二諦失即是前方廣薩衞然方廣未知何學若小乘學則推畫起邪明有分既無諸分亦無於有起邪見聞大乘説畢竟空不知何因縁故空若都畢竟空云何分別有罪福報應等者有罪福則不應空推畫空便起見也既起空見即不識世諦既不識世諦即不識眞諦又此空是邪見空故二諦皆失准此章文今言外人者方廣道人也言如因縁品中等者疏第一卷末説佛滅度後下文廣説疏三偈即開爲三別等者言初偈明論主識佛依二諦説法等者約釋此偈大分爲二初釋上半次釋下半初中有三初明依二諦所由次明於諦後明於得失此文初也有二初明賓主得失後明能所倶實各有問答如文今案二諦章上卷云問諸佛何意依二諦説法耶解云欲明十方諸佛所説皆實故依二諦説法何者諦是實義有於凡實於聖實是二皆實諸佛依此二實説法是故諸佛所説皆實也外道不爾問何故二諦説法説法皆實耶解云諸腎聖如實悟諸佛法性空如來依如實悟而説故諸佛所説亦實此依眞諦説法是實世人於瓶衣等是實諸佛隨俗説瓶衣故所説亦實准之可悉疏問云何是二於諦等者此下第二明於諦教諦文中有二初一番問答雙明於諦教諦後二番問答別明教諦如文言所依即是二於諦等者案二諦章上卷云於諦從兩情解爲名但此義有兩種一者得失判二於諦有於凡實名爲世諦空於聖實名爲眞諦此有謂情有爲失此空眞解空爲得此就謂情眞解判二諦二就兩謂判二於諦如色未曾空有凡謂色有於凡是實名諦聖謂色空於聖是實名諦此之有無皆是謂情故竝是失既凡謂有聖謂空此之空有悉須洗破無如此有無始得明因縁空有既識非空有空有即悟空有非空有也前之空有竝是所治之病故皆失也以如此義名教諦以如此義名於諦准之可悉述義解云所依即是二於諦者權實二智所依二諦又凡夫有與聖人空所依二諦又瓶衣等爲俗諦諸佛知本性空爲眞諦而此所依二諦又言得失二諦又言迷悟二諦也所言於者爲瓶衣爲凡夫實瓶衣空爲聖人實故也言百論引棗捺等者案彼論下卷破空品末云内曰不然相待故如大修妬路俗諦於世人爲實於聖人爲不實譬如一捺於棗爲大於瓜爲小此二皆實若於棗言小於瓜言大者是則妄語如是隨俗故無過今略引注釋文疏主解云如捺於瓜棗大小皆實問捺定譬何物答正譬俗也如捺望瓜實小形棗實大形棗實大譬俗於凡是諦望瓜實小譬俗於聖非諦准之可悉言智度論等者案彼論第二十六卷釋十八不共法三十四云復次有人信等諸根未成就故先求有所得然後能捨爲是人故佛説求諸善法捨諸惡法有人信等諸根成就故於諸法不求有所得但求遠離生死道爲是人故佛説諸法空無所有此二皆實如無名指亦長亦短觀中指則短觀小指則長長短皆實有説無説亦如是説有或時是世俗或時是第一義既無或時是世俗或時是第一義佛説是有我無我皆是實今略引譬説文惠影疏解云如無名指已下就五指中若大名爲大指小者名爲小指中者名爲長指其次小指者既無此等名故名爲無名指此明相形雖復不定皆有實義所以將此喩來者欲明空有二法對遣爲論相形盡有實義既相形故説皆實准之可悉言能依即是教諦等者案章上卷云爲凡夫衆生説法不爲聖人説法明衆生迷有無未悟有無故爲衆生説有説無令衆生從有入無捨凡取聖若是聖人已悟故不愛教何須爲説又云爲凡説二諦爲聖説二諦明凡夫迷我無我故爲説我無我令離之則悟中道聖人解我無我但聞我無我令解之此不就利益判直明凡不解聖解而言説法者法品長行云爲凡説我無我爲聖亦爾此爲凡聖兩人名説二諦涅槃經但説世諦大論唯説眞諦准之可悉言誠諦之言者章云教諦者如來誠諦之言依凡有説有有不住有有表不有依聖無説無無不住無表不無此則有無二表非有非無不二二不不二不二二即是理教二不二即是教理教理應教理表理謂教二不二因縁是爲得也疏問二於諦等者此下第三單明於諦此中有三初約情智判得失次問已下約兩懷判次又三句下通約凡聖判如文言答一往二於等者案章上卷云有於凡是實有空於空是實空此空有於凡聖各實是故爲失准之可悉文有廣略大意不違也又案章中卷初云佛直説二於諦有三句一皆得二皆失三亦得亦失言亦得亦失者即是前二於諦諸法凡是有此有爲失諸賢聖眞知諸法性空此空爲得示其空有令識得失令其捨有學空改凡成聖也二皆失者二皆是於故二皆是失於凡有有既失於聖空空亦失何者諸法未曾空有於凡謂有於聖謂空如一色未曾有無有見之人謂色有空觀之人謂色空一色於空有兩縁成空有故此空有竝失也兩皆得者只知於二即不二此下五句皆淨於縁二豈是二准之可悉語殊而旨同也言如涅槃云等者案彼經第十七卷具有此文今略引之疏下半明二諦名等者此下解釋下半偈也案章中卷云諦以審實爲義俗於凡實眞於聖實故諦以實爲義即是中百二論意又云俗於凡是諦於聖則非諦故亦諦亦非諦也又眞唯是諦不得是非諦俗亦諦亦非諦者聖得望聖聖得望凡云但望凡不得望聖故眞但諦不得非諦俗亦諦亦非諦言聖得望聖聖得望凡者聖人了達聖境故得望聖問何者是聖境解云諸法性空聖人還了達聖空爲實故空於聖名諦聖人復了達凡夫顛倒虚妄有非實故有於聖非諦也凡但望凡不得望聖者凡但知凡顛倒境此境於凡是實故俗於凡是諦凡是諦凡不能知聖諸法性空故眞不得是非諦具明如彼准之可悉疏第二偈得失等者言外人不識等者案十二門論觀性門長行云若人不知二諦則不知自利利他共利如是若知世諦則知眞諦知眞諦則知世諦准之可悉疏主解云若人不知下明不知二諦故失三利此爲識小乘人也若知世諦下明知二諦則得三利讃大乘人也亦令捨小而學大也悟世諦第一義諦生方便般若爲自利悟第一義諦世諦生般若方便爲利他具生二慧爲共利又自悟二諦生二慧爲自利依二諦爲他説法令他得二慧爲他利自他倶悟爲共利也言故淨名云等者案彼經中卷觀佛道品維摩詰所説偈文所引全同疏主解云實智内照爲母也方便外用爲父方便有二而今辨適機三妙勝於實智故稱爲父也又章上巻云問此二種二智何異耶解云初則就眞俗判二智何者了世諦第一義諦名方便實智了第一義諦世諦名實方便智了二諦判二智也後就自他内外判二智何者内自悟二諦名實智外爲他説二諦名方便智此則就内外自悟化他以判二智也廣説如彼也疏若謂一切法不生下第三明二諦相資等者言若望百論等者案彼破空品末外曰俗諦無不實故疏主解云外道總明懸智二諦義有相違眞有三義可得是諦一者空是眞實故名實相可得是諦二者空於聖人爲實此亦是諦三既名爲眞眞故是諦俗有三義不應名諦一者有是虚妄不應名諦二於凡爲實不足稱實三名中無眞不得稱諦故云爾俗若是諦便入於眞又若二種倶則二倶應眞准之可悉言故涅繋經云等者案彼經第十七卷有此文今略引之言若依百論答等者案彼論下卷破空品末内曰棗捺喩文是具引如上然今引注釋文也言不敢信人漫語者所言漫語者玉篇漫漫不可分別也王逸曰漫漫長也疏不能正觀空下第三明等者案碩疏云擧譬蟻外上半法下半譬説然觀空本爲求道而有利鈍兩人若利根人觀空得道増長法身慧今若鈍根人觀空則住空謂無罪福墮斷滅見中反自傷害何者空是治煩惱業若有方便即養法身慧命汝今起空見非但不能得道翻成自損法身方便墮墮三有故成實云寧起身見不惡取空不以是見墮三惡道世也下半即擧譬譬如爲利故捉毒蛇以不能善捉故非但不得反爲所害觀空亦爾無方便故非但得道反墮惡道也此中有兩譬一不善呪術譬不善呪術爲鬼所害二捉毒蛇譬言不善根故蛇爲所害也准之可悉言故經云等者案入楞伽經第五卷有此文如上所説引亦可成實論文述義解云爲二乘之空見也問惡取空善取空云何答離有取空故名惡取空即有取空故名善取空也不以是見等者是自見者無記性故不墮惡趣又不惡取空者猶離有見也離有取空人者有性墮於邪見空時墮於斷見若即有取空者不墮二見之中准之可悉疏世尊知是法下第四等者言如法華云等者案彼經方便品説第三思惟處直出所思惟事凡有三事今此半行明佛慧微妙謂非愚非智絶觀絶縁故稱微妙也言大品亦云等者案彼經第二十三卷末佛告諸天子言色如相乃至種智如相一如無二無別以是義故佛初成道時心云黙然不樂説法今略引之述義解云今言我者宜以義詺佛爲我也言亦法華云等者此亦第三思惟中後二思惟疏主解云上半明衆生鈍根言衆生諸根鈍者明慧根鈍也著樂癡所盲者非直鈍根復有二失一者著樂所謂愛也二者愚癡謂無明也下半明不可以妙慧授鈍根也准之可悉疏汝謂我著空下第二等者言第二一行等者有本云第二一行明空義爲得略出有過第三三行釋有過案琳疏云初偈明無失第二偈明成徳第三三偈總出彼過准此疏文今言第三略出有過亦無妨也言答前偈空亦復空等者案碩疏云由空故有有如由長故有短我既有空空故有有是則空有倶成空有二既成非空非有不二亦成是則理教是足汝但有有而無空以無空故亦無有無空有故一切法不成准之可悉有本云答前偈空亦復空則是非空非有今明非空非有空有得成此亦無妨也疏汝今自有過下第三等者言譬説云等者案碩疏云有二意一云其自倒乘馬而謂他人乘馬倒此則其自有過而反謂他人有過也二云此人自乘馬而忘其所乘馬如人與百匹騎乘共行而其數唯見九十九匹此人遂自忘其所乘者便謂百人中一人無馬今亦爾汝報諸法性有則常無有造罪作福汝自有此過而翻他人無因果罪福如人乘馬自忘所乘也准之可悉疏一者就破病漸捨等者言衆因縁生法等者案十二門疏云外道執諸法有自性如僧佉五塵和合別有瓶性體與塵爲一世師爲異勒沙婆亦一亦異若提子非一非異外瓶既爾内總亦爾今明瓶爲衆縁所成無自性若有性不假衆縁也薩衞犢子等准之可悉言我説即是空等者疏云内學之人乃不言衆縁和合別有實瓶與有無性假瓶是故今明若無有自性云何有是法故亦無假瓶令内學人從因縁門悟瓶空准之可悉言成論師明等者疏云成實師云離無自性之法而世諦有於三假是故今明若無自性即無有法令悟此三假即是四絶准之可悉言彼即謂若爾等者案大乘玄初卷云開善明二諦一體用即是龍光明二諦各體用不相離即衆師雖多不出此二准之可悉疏次直依因縁正義等者言經説因縁等者涅槃云一切衆生悉有佛性疏主解云因名佛性果名佛性也若約五種佛性者前四名縁一後因然總云佛性故故皆作因名等也大品絶説四縁約此四縁合五因名因縁開所作因以爲三縁此中雖具因縁總名四縁故云皆作縁名也涅槃經説十二縁約此十二各具因縁義故云爾言無明望行等者且如望行於無明具有無兩義謂無明内有行可生之義此即有義雖然行體未有此即無義若無明辨成行體未有者即是因義以親生行故若生可生之義者此即縁義以助疎成行故所以無明具因縁兩義約餘亦爾言各起望無明等者上明行無義明有義述義解云我謂行也行體非都無矣汝謂無明即行依無明起矣言數人六因四縁等者雜阿毘曇心論第二卷行品并明六因四縁又婆沙第十卷雜犍度智品中説六因差別具明如餘文記也言成論三因四縁等者十二字缺疏第二偈上半攝法等者言答是花首經等者案康疏云有人云此兩偈定花手經文今尋彼經不見此偈或可經本來未盡也入大乘論云問空異十二因縁耶答曰不異如尊者龍樹所説言十二因縁空我今欲解説假名因縁法此即是中道彼論雖有一偈興此兩偈意同應是翻譯之家隨時廣略若准彼論此偈是論是論主自説非佛説也有人解云檢智度論此偈四言又彼經無五言偈但有四言又是長行散在非是一處也今案彼經第八衆雜品第二十七末偈云我常修行空空空及大空雖行是空法而不著於空若法及所得二倶不在空大名爲眞空世界所不測今應引此文亦可第六卷求法品云若人不隨名亦不分別我知但假名是人得寂滅又云如是展轉生空無決定子於法無正但著假名字准之可悉疏長行云汝上所説下此生第二段還有等者言初又二等者上外人難論主處硫云後論主還外人過亦作此別之令案碩疏云今還推此二過歸外人即成二別第一推還其無四諦三寶之過第二推還其無因果罪福之過初中有二第一推遠其無四諦過第二推還其無三寶過初中又三第一推還無四諦境第二推還無四諦智第三推還無賢聖過初中有三第一總還柄明無四諦第二別明無四諦第三結明無四也准之可悉言問論主説空空可無有生滅故無有生滅故無四諦耶答外人執諸法定性義諸法既有性定則未生定未生不可使之生故無生已生既定生不可令滅故無滅也又一意譬如定無無不可令有者有既定有亦不可令無故無生滅也准之可悉疏若不從縁生下第二等者此文應云下第二四偈別無四諦則釋前章門第一偈明無苦諦第二偈明無集諦第三偈明無滅諦第四偈明無道諦此初明無苦諦然今文顯故不更言可悉言數人正以無常刀切有漏五陰等者言成論師明等者案聰法師成論章第二卷云第三通別三苦通別釋有兩家一云何苦通二苦別而行苦通釋義不同一治城秀治師解一切心遍無常所動行縁領境境逼於心心境相向生苦爲通行苦二雲見師釋偏取心向境是通行苦義苦苦與壞苦皆就苦受合縁爲苦苦離縁生爲壞苦故言二苦別二一家舊一解三苦皆有通別通三苦者三受擧體爲縁所逼即是苦苦滅相毀壞即是壞苦三相遷役即是行苦別三苦者不善果苦受是別苦苦因中説果名樂受爲壞苦後心覺前心行縁不停心患此生苦爲別行苦也准之可悉言如前苦品引倶舍論釋之等者案疏第六卷觀品引眞諦所翻倶舍論第十六卷云言苦受生時苦住時苦滅時樂以苦受生住二時皆苦故與苦苦之名樂受生時樂住樂唯果報壞時苦是故樂受名爲壞苦捨受生住壞三時苦義竝皆不彰但爲無常所遷是故捨受稱爲行苦准之可悉所言捨受者聰法師云背苦樂故詺以爲捨捨是功能立稱不苦不樂體爲名准之可悉疏苦若有定性下等者此文可落案碩疏云第二偈明無集諦唯此疏文可言苦若有定性下破無集諦也康疏解云第二偈釋失集諦過也定則自有不應從生也下半明既不從生則無有集也准之可悉次文應云苦若有定性下破無滅諦也言成論師云等者述義解去有餘滅假實二心也無餘滅空心者無餘涅槃時滅無漏智以灰身滅智故今案聰法師成論章第四卷論云滅三種心名爲滅諦又云一明三心滅論言爲心滅滅諦謂假名心法心空心一等四執執異我心名假名或執實五陰心名實法或縁泥洹心名爲空心二或是所治空心爲能治所治是因患能治是果患故對擧三心以明滅諦准之可悉次文苦若有定性下破無道諦也康疏解云第四釋失道諦過也修道斷苦良爲無定如其有定則道不可修也准之可悉疏若無有苦諦下第三總結無四諦等者案碩疏云此一偈結破無四諦上半結破無道諦道諦是能至滅諦是所至今既無滅諦所至故無能至道諦也准之可悉疏若苦定有性下第二等者言無三寶等者此文應言就無三寶中即爲一別初明無僧寶次一行偈明二寶初中又二初別明無僧寶次無八聖故下還外人結無僧寶初中又三初明無四行次及四果下第二還外人無四果次若無有四果下第三還外人無八賢聖若如上分此無四諦智從及四果下始是無僧寶若爾者從若如上分至智由何如此第二説文也准之可悉問汝本有等者案碩疏云所以無者汝義凡定是凡不見定是不見前來是凡是凡既不見定不見今不應得見理生智也述義解云若從本不見四諦而今迴邪入正見四諦理者本不見四諦故四諦理無是故名亦本不境今境也康疏解云而言見者此是行也所見之苦先來不可見今亦不應見也准之可悉言二若乘前破等者案碩疏云二者智由境生無境則無智先來四諦境無故則無智也准之可悉疏問曰下第二別明等者言大乘論第四卷迦旃延云等者案彼論第四卷釋初品菩薩第五云問曰菩薩何以故以相嚴身答曰有人言阿耨菩提住是身中若身相若不端嚴阿耨菩提不住此身中譬如人欲娶豪貴家女其女遣使語彼人言若欲娶我者當先莊嚴房室必令嚴飾後我當到汝舍阿耨菩提亦復如是遣智慧使未來世中到菩薩所言若欲得我先修相好以自莊嚴然後我當住汝身中若不爾者我不住也以是故菩薩修相嚴身爲得菩提故今略引之言若爾經云等者案大品經第三十九卷中有此文即是須菩提語具引文解如記初卷今略引之言問經言等者述義解云法華等諸經中明釋迦所行事如此也言故夜半等者案大論初卷云復次苦薩厭老病死於夜半踰城出家年苦行現破魔軍成無上道准之可悉言故云五菩提耳等者案大論第十五卷云問曰是五種菩提答曰一者柔順忍一者無生忍及三種菩提於三中過二而住第三復有五種菩提一者發心於生死中發心爲菩提故此因中説果就十信位二者伏心斷諸煩惱降伏其心行波羅蜜就三寶位三者明心觀諸法相分別籌量得諸法實相畢竟清淨謂般若相就初六地四者出到於般若中得方便力故見十方佛得無生忍出三界到薩般若就七地以上五者無上道場斷煩惱習阿耨菩提准之可悉疏雖復勤精進下第二破因果等者言明汝謂等者案碩疏云此取意破彼意謂乃前是凡夫後時修因得佛果但凡時未有佛佛時無復凡成聖故也寧得破我無因果耶今取此意而破之汝義執有定性凡時定有凡定無佛雖復勤精進終不成佛以無是定無故也如鐵中定無金難復終日人工終不出金准此疏文薩婆多云一切衆生無有性得佛性但有修得佛性此部未知大乘性得佛性故言問小乘人亦云等者案世親佛性論第一卷破小乘執品云若依毘曇薩婆多等諸部説者則一切衆生無有性得佛性但有修得佛性分別衆生凡有二種一定無佛性永不得涅槃是一闡提犯重禁者二不定若修時即得下解云所立中一切衆生等者總明性有無也彼不明空故無性得言修得性亦不同大乘非有非無等也彼部言本無今有有已還無故又此部未知大乘性得佛性故言但有修得佛性言分別衆生等者此下別明修得性有無也初無性可知次不定中賢善共位以上人者疏云謂凡夫及四念上若不斷善作逆犯重稱爲賢善此有通作三業聖人故曰共位准此論文今言汝謂等者指薩婆多等故云汝也言凡夫等者共位以上不定有無之人也述義解云此毘婆沙論言如法華玄引之言十家釋於佛性者述義解云一師云地雖有十家釋佛性未有用中道爲佛性者雖復衆師釋涅槃亦無有總別釋涅槃者也如義章中眞神爲佛性及以心爲佛性等應知也言當現爲異者案百論序疏云北土略論當現二常廣論滅不滅等略論二常者一云定現常一云定當常廣論滅不滅等者一云聞熏習滅一云定不滅等如此皆言有當也准之可悉疏若無有空者下論主答中第三等者言如般若經等者案大品經第二十卷中須菩提言世尊諸菩薩般若爲大事故起所謂示是道是非道又第二十二卷中佛告須菩提言如是深般若爲大事起故乃至所有聲聞辟支佛法若菩薩法若佛法一切皆在般若中般若能成辨其事今引初文也故肇師云等者述義解云釋僧肇注淨名經云法身者虚空身衆生而無不生無形而無不形乃至在天而天在人而人豈復近而遠求法身乎准之可悉言涅槃云等者案彼經第三卷末佛告迦葉菩薩言如來身者是常住身不可壞身金剛之身非雜即是法身今略引之言涅槃經見縁起等者案彼經第二十七卷有此文今略引之具引如上也中論疏記卷第八之本
