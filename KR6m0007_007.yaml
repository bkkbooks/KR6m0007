body:
  text: 中論疏記卷第五末五陰品第四疏上來已觀等者約此由來大文有二初明品來意後辨品名目初中又二初明通來意後明別來意初中又二此初明根性非一受悟不同故云宣歷觀行也疏二者諸方等經等者此下第二約釋諸經以辨來由文中有二初總明來意後問答以辨來意此文初也謂諸方等經具説陰入界相上六情品已破界入見可見即無十二入識等法無即無十八界今次觀五陰也外人歷法生迷隨迷而破也言經歷諸空義者述義云周歷諸法以明空義故云歷法空也疏問經何故等者此下第二問答以辨來意又中有二即問與答答中言大集經等者如彼經第二十卷末云爾時世尊四大弟子入王舍城次第乞食時舍利弗從東門入中路值遇五百魔子執持刀杖語舍利弗汝若歌舞善哉善哉如其不吉當斷汝命舍利弗言我今當歌汝等當舞即説偈言我今不求陰界入無量世中誑惑故若有求於如是法是人終不得解脫魔子聞已心得調伏發菩提心捨離魔業目連富樓那須菩提列之今略引舍利弗準之可悉別記云諸魔子者謂第六天魔王等也此有權行有實行故淨名經下卷云凡作魔王者住不思議解脫之菩薩也舍利弗歌者通大小觀行亦皆得之又依佛神力而為歌者唯是大乘之觀行也言又如大品明菩薩習應般若命初即云等如彼經第二卷云舍利弗白佛言菩薩云何習應般若與般若相應佛告舍利弗苦薩摩訶薩習應色空是名與般若相應習應受想行識空是名與般若相應大論第三十六卷釋云隨般若修習行觀不息是名為習譬如弟子隨順師教不達師意是名相應如般若相苦薩亦隨是相以智慧觀能得能成就不增不減是名相應今略引之別記云言習應般若者若通而言體用境智之般若時得之雖然此處但取中道正因佛性以為般若故下勸學品云欲得聲聞人為令學般若故云爾耳非是因此般若得小乘果故上根聲聞説大品時回小入大也中根聲聞於法花會回小入大下根聲聞至涅槃教方得悟入也疏問大小乘經論等者此下第二問答以辨別來意文中有二即問與答問中言偈云此眼等六情等者如六情品最初外人偈云眼耳及鼻舌身意等六情此眼等六情行色等六塵疏主釋云此偈上半明六情下半明六塵緣者行也準此疏文今略引下半明六塵之文亦可上半列六情體下半明六情用準此説意今所引又具十二入也言後偈云識等四法無者第六明因無故果無偈云見可見無故識等四法無者四取等諸緣云何當得有今略引破無果第二句文所言四法者識觸受愛也然今云無六識者論云識字通六識故即從十二入中意入而開出七心界故云十八界也答中又二初通明四品相生次二者下別明四品接次相生也疏陰入開合等者此下第二釋名目文中有二初明陰入界開合後正辨名義初中又二初正明開合後問答釋顯初中又三此初明陰入開合言毗曇等者如雜心論第一卷界品云問云何分別説陰答十種謂色入及無作假色是分別色陰牟尼之所説陰等十種謂色入者眼色耳聲鼻香舌味身髑無作假色者如業品説是諸色一一説色陰疏云此一偈以十入及法入少分分別色陰十種謂色入者五根五塵為十及無作假色者若依婆沙為心慰喻者意故説有無作色不令得一入界故言及雖色陰為十一少分故言是分別色陰取定於佛故言牟尼之所説一一説色陰者此明十一種皆是色陰非總成一陰故云以為色陰也言意入即識陰者如次文云所名為識陰此即是意入於十八界亦復説七種長行釋云謂識陰即是意入十八纍中説七心界疏云次明識陰問曰解色陰意應論愛想與行何以超解識者答曰陰中色識極略界入使廣除三陰中是廣界入即略後廣是解義次第所以無明準之可悉言法入除無為等者如次文云餘則有三陰無作三無為是則説法入亦復説法界長行釋云餘三陰者愛陰想陰行陰無作三無為者虛空數滅非數滅此七法説入亦説法界疏云第三明餘三陰此三陰及無作三無為合有七法總為法入界也問以何等故受想別立陰餘心法立一行陰答輪轉於生死當知二淨根是故別受想建立二種陰問五陰一切是行何故説一行陰答五陰雖是行而一受行名有為法多故説行陰非餘具明如彼述義云少分無作者別解脫戒等也除無為者五陰是積聚義無為非起動法除之餘即行陰者法入含多法故除色法界想受而餘心數法十四相應此為行陰也疏陰與界開合等者此下第二明陰界開合言十八界等者如雜心論初卷云問所説十八界為種有十八名有十八答界種説十七或説十二境界依者依分別十八界長行釋云十八界或十七種或十二種若取意界則失六識若取六識則失意界譬如別取樹則失林若取林則失樹指權等譬亦如是問若然者云何説十八界答境界依者依分別十八種三事故説十八界依故依者故境界故依謂六依眼界乃至意界依者謂六識界眼識界乃至意識界境界者謂六外界若言阿羅漢最後心不生後識非意界者此則不然以餘緣故後識不續如地無種次論文云問界入陰何差別答界説一切法故即十二入除三無為法餘則説五陰長行釋云一切法説十八界以不離依故依者故緣故被一切法即説十二入七心界為意入此即義差別陰三無為餘法説五陰積聚勢故準之可悉言七心界者述義云意根與六識是名七心界也疏界入開合等者此下第三界入開合也如雜心論初卷云輸門義説入者通苦樂故種性義説界者如一山多有諸性金性銀性等如是一身中種種性各異故説十八界疏云輸門義説入者如城中衆生得所輸長養於身六依六緣長養心法亦餘通苦樂故者六依六緣是苦樂所入門名通也言種性義説界者一切智人見衆生根欲性以故三説不同恃性憍逸者張王等性安性妄性生慢為説界性義是界義準之可悉言二門相似者述義云入門與界門也其名雖異法體不異故名相似也案碩疏云六情為論五色根但取其對塵義意根即是心五陰為言五色根則具十一種色是色陰心通四陰是故六情為廣若以五陰望十二入十八界等五陰法體為狹十二入十八界等法體為廣所以然者明十二入十八界名雖有少多體更無廣狹何故爾就入為語除十一入餘有法入此法入則通四種一者色即是無教假色二者心數三者非色非心四者三無為法法入既爾法界亦然是故體無廣狹望於五陰但是有為三聚非色非心屬行陰攝故也故是狹入界通無為故是廣也疏問何故偏取想受等者此下第二問答顯釋文中有二初正問答顯受二數以為二陰之所以復述大小乘異説此文初也有二即問與答然此問答取雜心意故彼論第一卷界品云問以何等故受想別立陰餘心數法立一行陰答輪轉於生死當知二諍根是故別受想建立二穗陰長行釋云二事故衆生輪轉生死謂樂愛貪及顛倒想樂愛貪故行愛顛倒想計著故行見二諍根者習欲愛貪欲縛從愛生見欲縛從想生愛修諸禪想修無色復次心法或根或非根法是愛非根法是想是隨義説疏云此偈明別立想受之意問意數法三十六何故想受二數別立二陰自餘心數總立行陰耶答中上半釋別立所以七半結成輪轉於生死者若依婆沙十種解釋此論所取偈中有二一由此二數輪轉愛苦二為兩諍根本長行有四初二因偈第三是修定之緣第四根異二事故衆生輪轉生死者釋偈初句此明由愛想二數故所以輪轉生死謂樂愛貪者由樂受生貪及顛倒想者明想生心顛既倒生便發業愛報故愛生死世也二諍根者釋第二句者欲愛貪欲縛者明在家之人深習受欲為貪使所縛不得出離此貪便從愛生見欲縛者明出家外道為諸見所使行於行苦此從想生受諸禪者為樂受故修習諸禪想體無色者為破色想修無色定此是第三體定之緣或根非根者是第四根非根是故婆沙云所有心數法若根性若非根若説受當知已説非根性是故根性立一陰非根性立一陰準此論文今云一者想能生等者四義之中初由二數輪轉受苦即是此想受二數由於生死愛苦之本故別立一陰言二者想修等者第三修定之緣謂為破色想故修四無色定為樂受故修習四禪也述義云無色界中滅觀心法無發受義故云想修無色於色界中有樂受義故云修諸禪也別記云此約分麁細次第而為言之何者無色界者無色故細也色界之中有色故麁所以細心修無色麁心修有此約小乘而為言之若約大乘者無色界中亦有於色以色有麁細故疏成實明十四種色等者此下第二述大小乘異計文中有二初述小乘異計後述大乘異計此文初也言成實明十四種色等者如彼論第三卷色相品云色陰者謂四大及四大所因成法亦因四大所成法總者為色四大者地水火風因色香味觸故成四大因此四大成眼等根此等相髑故有聲準此論文因四微故成四大因四大故成眼等根故云十四種色今案大義記第十二卷云十四種色者謂四大五根五塵也形礙是色義乃至廣説具引如上也言毗曇以四大是實法等者如雜心論初卷云觸入者十一種謂四大及七種造色又第十二卷論品云戒者四大所造彼果故四大者觸界所攝身識境界準此論文五識得實境故今四大是身識境故云實法也言成實觸是實法等者案大義記第十二卷云論云假名故有遍到故名大當知假名無體又云五塵名中唯色與觸兩名通五一云五塵體皆是觸同發身識二云雖同名觸非身識觸但體有形段棠觸有礙皆觸耳乃至廣説準之可悉述義云不屬觸塵而別立故云離之也言曇摩多羅部等者述義云是五百部中之一人也而云但明十種色等者數人立有無作假色論人立有無作法此非色非心今曇摩多羅部言都無有故云俱異數論也何故云非色非心者從心起故云非色非慮知法故云非心也今案涅槃疏云若僧祇部人明無有無作故非是色明此戒直是制思法若不作惡即是持戒無別無作準此疏文今云曇摩多羅部者即是大衆部律主名也疏次大乘有三釋等者此下第二述大乘異説凡有三説初説中云故涅槃經云等者如彼經第三十八卷憍陳如品云佛告憍陳如色是無常因滅是識獲得解脫常住之色今略引之疏主釋云今此初即是五門觀也初言色是無常因滅是色獲得常色者昔對外道耶常故説無常今日復説常常則在於如來涅槃此則是逼引明生死無常故是逼如來涅槃是常故是引又昔直説無常此語監今明生死是無常涅槃是常今捨無常獲得於常也若是對外道前明無常後明常此常無常二鳥則前後飛若是生死無常涅槃常此則高下飛鳥也又明為一緣故説常無常昔為此緣説無常緣問此無常謂定住無常終不能得於常今明捨於無常獲得於常何得言無常定住無常耶又即是釋疑人聞者説無常令復説常即謂言語翻覆前説無常令説於常耶今説明如來有二種身若是德身則是無常法身則是常不乖反也次説中云而輕云有等者即第一説所引大經文也第三説中云故地經云有等者如十地論第二卷云菩薩生如是心即時過凡夫地入菩薩地乃至過一切世間道入出世間道住在菩薩正處入三世真如法中畢究竟阿耨菩提今略引意也又華嚴十地品中第八地云若到於第八菩薩智慧地爾時過意界住於智業中今指此文故云地經也疏通稱陰等者此下大文第二釋名義文中有二初正釋名義後問答解釋此文初也言謂陰蓋為義等者如仁王經上卷教化品云色蓋心名識蓋想蓋受蓋行蓋蓋陰覆為用身名積聚疏主釋云蓋者陰覆為用依成實十四種色為色陰陰蓋衆生不能得出離生死也言如雀在瓶等者七女經文列七女人説今是第七女人所説事如玄義云經曰如雀在瓶中羅穀覆其口穀穿雀飛去形壞而神走準此玄文今言物者羅穀也上集略云斜文繒羅列亦同也下玉篇細練也紗穀也所言雀者集略依人小鳥也言通稱者述義云此非對別名之為通今言通者總也凡也今案碩疏云論人明陰以陰蓋為義蓋行人不離生死故準此疏文今言謂陰蓋為義等者依成實人以辨陰名也故大義記第十卷五陰義初云陰者蓋也言又云陰者蔭也等者案康疏云鞞婆沙論云陰名殺成故十四卷鞞婆沙論第二十六字缺述義云陰者蔭也者是文未詳何者若以蓋義釋陰何言其義主殺亦前已明蓋義云何重明耶是故陰者蘊也是可好耳今謂不爾前依成實宗約陰蓋義以釋陰名今依鞞婆沙約陰殺義以辨陰名也言是故經中等者如涅槃經第二十三卷德王品云佛告高貴德王菩薩言善男子譬如有王以四毒蛇盛之一篋令人膽養餧祀臥起居洗其身若令一蛇生嗔恚者我當準法戮之都市爾時其人聞王切令心生惶怖捨篋逃走王時復遣五旃陀羅拔刀隨後其回顧見後五人遂疾捨去是時五人以惡方便藏所持刀密遣一人詐為親善而語之言汝可還來其人不信投聚落欲自陰匿既入聚中窺看諸舍都不見人執持瓦器悉空無物既不見人求物不得即便坐地聞空中聲咄哉男子此聚空曠無有居民今夜當有六大賊來汝設過者命將不全汝當云何而得免之疏主釋云就初方便中有六譬言譬如有王下第一為觀察四大作四毒蛇譬王譬之佛四蛇譬四大篋譬之身以四大成此一身令人膽等食此譬佛為衆生説法四大令人調適若令一蛇者若一大不調則起諸病當準法戮之都市者是顯𤆞之處此譬衆生若不將護四大即失法身慧命也爾時其人聞王切令下譬聞佛説法四大過患則使觀察四大空無所有不生不滅求撿不可得故言逃走也王時復遣五旃陀羅下第二五旃陀羅譬即是五陰拔刀隨之者刀譬惡法此五陰有過患故如刀亦譬五陰中有苦此苦能切逼衆生故言如刀其人回顧者向觀四大竟今次觀五陰故言回顧即是觀察見其過患也以惡方便藏所持刀者此譬五陰中有虛妄樂覆於有苦令人不覺故言藏刀密遣一人下第三詐觀善譬即是譬愛其人不信下第四為六根作譬瓦器此重口癭今明但舉此器悉空無物譬六根空無所有也既不見人下第五為外六塵作譬今五譬中略引第二五旃陀羅譬釋成五陰也言羅什後翻等者案康疏云陰蓋陰殺是為舊翻非為新譯什法師以此為非改之為衆法花經云五衆之生滅者是也大論之中皆名為衆故睿師序云其事數之名之舊義不同者皆是法師以義正之陰為衆入為受持為性解脫為背捨除入為勝處覺意為菩提直行為正道諸如此比改之甚衆梵音失者正之以天竺音謬者定之以字義不可及者即而書之斯實匠者之功也但以名數久定改難行故後譯諸經還依舊義故翻此論名為五陰然今言以此五法等者以五法和聚義稱五故婆沙第三十九卷使揵度十門品云聚義是陰義謂諸所有色過去未來現在若內若外盡聚為色陰乃至識道基師毗曇章初卷云盡以衆多聚義是色陰義受想行識亦復如是言又此五法等者一一陰法各有衆多故云衆也故婆沙第三十九卷云積義是陰義者如種種雜物合為一積如是種種諸色合為色陰乃至識陰亦爾法華疏引雜心論初卷云積聚是陰義羅什意準此疏文可見此疏也疏問者云何觀五陰等者此下第二問答顯釋於中凡有七番問答此即第一番問答文中有二即問與答答中言如涅槃經云等者如經第二十三卷德王品云何菩薩觀於五陰如旃陀羅旃陀羅者常能令人恩受別離怨憎集會五陰亦爾令人貪近不善之法遠離一切純善之法復次善男子如旃陀羅種種器杖以自莊嚴能害於人五陰亦爾以諸煩惱牢自莊嚴害諸癡人令墮諸有又如旃陀羅有過之人得便害之五陰亦爾有諸結過常能害人又如旃陀羅無慈愍心怨親俱害五陰亦爾善惡俱害又如旃陀羅惱一切人五陰亦爾以謗煩惱常惱一切生死衆生又如旃陀羅常懷害心五陰亦爾常懷諸結惱害之心如人無足刀杖侍從當知必為旃陀羅人之所殺害衆生亦爾無有戒足及以慧刀善友侍者為五陰之所賊害是故菩薩觀於五陰如旃陀羅復次善男子菩薩摩訶薩觀察五陰過旃陀羅何以故衆生為五旃陀羅之所殺者不墮地獄為陰殺者則墮地獄以是義故菩薩觀陰過旃陀羅作是觀已而作願言我寧終身近旃陀羅不能暫時近於五陰乃至廣説今取意略引之言如大品云等者如彼經第五卷云須菩提言舍利弗以是故菩薩摩訶薩行般若波羅蜜行不受不行亦不受行不行亦不受不行非不行亦不受不受亦不受何以故一切法性無所有不隨諸法行不受諸法相故是名菩薩摩訶薩諸法無所受三昧廣大之用不與聲聞辟支佛共今略引之疏問五句不受等者此下第二番問答文中有二即問與答問中言五句不受等者淡海記云所言五句者五陰為五句非是五受三昧之五也今謂不爾此問意問五不受三昧也答中言是故經云等者如法華三昧經云變無盡欲室令人歸古鄉古鄉名無為號字清淨室佛答婆羅門言般若郡本際縣超入城絶句里甘露樹下止言鄉猶縣之異也別記云絶句為里者謂解四句之理也里與鄉同意也疏問云何得爾等者此下第三番問答文中有二即問與答答中言故大品云諸法若生等者三十三字缺疏問若觀五陰畢竟空等者此下第四問答文中有二即問與答答中故寶積歎云等者如淨名經上卷佛國亦長者子寶積稱歎偈云法王法力超群生常以法財施一切能善分別諸法相於第一義而不動已於諸法得自在是故稽首此法王疏主釋云第三重歎本德凡有五歎此即第一法王歎文中有三即標釋結言法王等者標法王謂俗王以俗力勝民故能澤及一國法王以法力超衆故能導濟無疆言能善等者釋法王也法乃至無窮而不離二諦故就二諦以釋法王善分別俗而不違真稱為不動言已於等者結法王也俗王則自在於民法王則自在於法以法無定相隨物辨之而順理應機故稱自在又即上説俗不動真談真不乖俗即是自在也此句歎説所以稽首今略引法王歎中第二釋句文御製云所言動者乖也失也與今疏主第二釋同也疏問毗曇亦知等者此下第五番問答文中有二即問與答問意云雜心論第七卷智品長行云名則十六行者謂無常苦空非我因集有緣滅止妙出道正迹乘衆緣所持故無常逼迫故苦我所見對治故空我見對治故非我種子法故因等超故集相續故有成就故緣諸陰盡故滅三火息故止離內惱故妙離外惱故出趣向故道巧使故正等趣故迹至究竟故乘復次非究竟故無常重擔故苦內離人故空不自在故非我準此論文今言離陰我者我所見也即陰我者我見也述義云無離陰我者即人空也無即陰我是我是自體義若爾即陰無自體也疏問成實論知五陰所成假名人空等者此下第六番問答文中有二即問與答問中言知五陰所成假名人空者如彼論第三卷無我第三十四云無我無我所無衆生無人但是空言復明實法亦空者論第十卷身品云又經中説若知諸法無自體性即能入空故知五陰亦空準此等文既明人法二空與大乘所明有何異耶答中言如法華云等者如彼經第一卷方便品比丘偈正簡大小二涅槃文謂對小乘非真滅故明因果兩患本來寂滅即是大涅槃滅也注經云諸法以色不離空空不異色為相在緣不有離緣不無其性常爾未嘗不寂滅故云諸法等也行此道也必種妙果故云佛子等也言大經云等者如彼經第七卷迦葉菩薩言若無殺者應當無有不善之業佛告迦葉實有殺生何以故善男子衆生佛性住五陰中若壞五陰名曰殺生若有殺生即墮惡趣乃至妄想之想無有真實出世我相名為佛性如是計我是名取善疏主釋云答作善業文中有二即問與答問從前各不可斷佛性難生然無殺有二種一者邪見言無殺既見一切空空故言無殺二者常見言無殺若是常者即不可殺今難言無殺正是就常義明不可殺就常邊為難也佛告下第二答此還是成答彼正作無殺難是故今作有殺答言衆生佛性等者若他家以衆生為正因者著是難今明佛性住五陰中者五陰不生不滅即是佛性若害五陰者此自害於有生滅於其自害佛性不生不滅終不可害如今五陰生滅五陰可害五陰中具有不生不滅即不可害既害五陰即名殺生是故即墮六趣今略引之第七番問答顯然尋文可見疏品有九偈為二等者言小乘五百部等者大論第六十四卷信毀品文取意略引之言大士聞之等者如大論第卷譬如震雷小鳥皆怖孔雀大鳥聞之舞踊也畢竟空法亦復如是小人聞之驚疑怖畏大士聽受歡喜踊躍準之可悉言法花云等者如彼經第三卷藥草喻品偈云復有住禪得通力聞諸法空心大歡喜放無數光度諸衆生是名大樹而得增長疏主釋云此二行合大樹增長所言空者即上究竟涅槃常寂滅相終歸於空蓋是明大涅槃果位之法故大樹因人聞之歡喜即八地已去為大樹位也注經云前誦其説法度人今詠其放光化物同是陽現行權濟世理曠之言耳三乘之譬所以再出者前直喻其所體之分令復顯有增長之義也今略引之別記云所言禪者八禪等也如此之人亦聞諸法空也疏標章門為二等者言若就義者如外道云等者如百論上卷破神品初云迦毗羅言從冥初生覺生我心從我心生五微塵從五微塵生五大從五大生十一根金七十論上卷云五唯者一聲二觸三色四味五香物唯體唯能五唯生五大者聲唯生空大觸唯生風大色唯生火大味唯生水大香唯生地大言十一根者一耳二皮三眼四舌五鼻六舌七手八足九男女十大小二遺十一心根此中初五為五知根次五名五作業根乃至廣説也述義云僧佉義云從冥初生覺從覺生我執於此我執具色等五塵此五塵合生地大餘大亦爾此五大合生五根餘根亦爾此十一根生色身也十一根者眼等五根及五業根心平等根也今謂不爾五塵合生五大五大合生五根者此衛世義故今此所引是僧佉執不可違金七十論并智度論也言數人四大造五根者雜心論第一卷文具引如前言成實論四微等者彼論第四卷苦聚色論中色相品文具引如上謂四大及四大所因成法亦因四大所成法總名為色四大者地水火風因色香色觸故成四大今取意引之述義云五陰成色陰者實成五陰與言色者於義可顯也今謂不爾五陰者通心王心數及色不相應今此五根準是色法何成五陰耶亦違成實論文故也言數論同明等者如成實論第七卷不相應行品第九十四云問曰有人言過去善不善身口業成就如出家人成就過去戒律儀是事云何答曰是皆成就所以者何經中説若人為罪福即是己所有二事常追其身猶影隨形又經中説罪福不捨謂能得果若不成就罪福業者不應得果也則失諸業又雜心論第二卷行品云不善善有漏三世之所攝以彼有報故説名為報因長行釋云若善有漏及不善隨三世行於生死中生生相續果報生謂善愛果不善不受果有業一入果報生謂命根準此等文成實薩婆多二宗同明以過去善惡業以生現在愛非愛果報身準之可悉案康疏云因果二種一者相生因果如從五戒得人身等二者相成因果如四大成身等準此疏文前是約相成以論因果今言數論同等者約相生以辨因果也言色本無體等者案影疏云若離於色因者將明色本無體因緣故生以過去行業為因今世四大為緣色生會中如以形相為因水鏡為緣像現於中離此更無自體安在青目以縷布為言直逐易見處耳今取此文以為𨳝飾也言又四諦品云等者如此論第四卷觀四諦品云答曰若謂從罪福而生果報者果從罪福生云何言不空長行釋云若離罪福無善惡果云何言果不空若爾離作作者則無罪福汝先説諸法不空是事不然疏主釋云此偈直明因果不相離則是由因有果果無自性是故果空由果有因因亦空也今略引之下半偈文證因果空也言此釋經云等者如大品經第卷色即是空空即是色色不異空空不異色受想行識亦復如是準色可悉疏長行云除縷則無布等者言而成者多報一邊等者案碩疏云即今人多言除縷可無布除布則有縷此如離泥瓶離瓶有泥是則離因無果離果有因今明不爾汝緣成由於果見瓶故方詺泥為因那得離果有因亦爾也言今問汝既有等者述義云所言離縷之布者舉未有之布應爾難耳以等相因義也言異縷之布等者亦舉未有之布而為難之何者未織之縷是雖復織終不成布也言今因布有縷者論主義言不因布有縷者外人義也可知之也疏問者若離色因有色下等者言若望數論報因因果等者二十七字缺言若望毗曇等者如雜心論初卷云彼眼入者眼識所依四大所造淨色下可見有對餘四根亦如是準此論文今云色為所造者眼等五根名為色所造也言成實四塵是實法等者如成實論聰法師疏第三卷法聚品云論云色法者色聲香味觸解云十四種法皆是色法但五塵有體然四大五根為體故言五塵準此疏文五陰之中色陰具有十四法謂五塵五根及以四大雖然五根與四大即假有故唯取有體五塵以為色陰故彼論第三卷四大假名品云四大假名故有準之可悉疏問曰下第二救義外道中識常等者言解云識是神異名等者二十七字缺言有解云外道亦明識是常等者二十七字缺言如僧佉云等者如金七十論上卷云大者或名覺或名為想或名遍滿或名為智或名為慧是大即於智故大得智名大論第七十卷云於世性中初生覺覺即是中陰識疏主釋云覺者中陰識即是覺諦以中陰識微弱異於木石之性故稱為覺準此等文今言覺者二十五諦中第二大是即中陰識也言成論文云等者如彼論第二卷立論品第十三末云又佛為種種可度衆生説世間等諸論義門如莎提比丘等不能解故其心迷亂莎提説生死往來常是一識佛知是等種種説法若無論義云何可解以是等緣故應造論聰法師疏第八云莎提執生死中無我若心非常誰修因得果故知生死心常也今略引之疏答曰下第三破救等者言有因無因者因名所以等者今案百論下卷破常品云內曰若強以為常無常同修妬路汝有因故説常耶無因故説常耶若常法有因因因則無常若無因説常者亦可説無常疏主釋云三者為有所以故説常為無所以漫噵常耶此二俱破於常若有所以則是有因汝言無因法常今既有因則無常若無所以漫説常者既是漫説則是無常準之可悉疏問者有二種因者第四重救總明因義有二等者如百論下卷次文云外曰了因故無過修妬路有二種因一作因二了因是則無常我虛空等常法以了因故説常非無因故説常亦非有因故説無常是故非強為常疏主釋云救上無常同之難也因有二種一者生因二者了因常法無有生因是故為常以有了因非強説常但了因有二一別二總虛空以滅色為因時以花實為因方以日合為因微塵以麁果為因涅槃以無纍為因因此五法知有五常故以五法為五常因此是別了因也總了因有二一以言説顯示前法令人得知故以言説為常了因二因無常法相對故知有常故以無常法為常了因準之可知疏答曰下第五破救六種品破無虛空等者言此論無有破方文但邪見品末等者如此論第四卷邪見品末云一切法空故世間常等見何處於何時何起是諸見長行釋云上以聲聞法破諸見今此大乘法中説諸法從本以來畢竟空性如是空性法中無人無法不應生邪見正見處名土地時名日月歲數誰名為人是名諸見體若有常無常等決定見者應當有人生此見破我故無人生是見應有所處色法現見尚可破何況時方若有諸見者應有定實碩法師釋云此偈三意第一明上來雖二十七品廣破今結撮略破略破不出四種一所執之見即是世間常無常見二起見之人三起見處四起時節此四是體故今略破之此四既空則一切法淨偈云何處即起見處所隨是何方所時節時節為在何年何月為春秋冬夏也誰是起見人諸見即所起見一切法空故此四事不得二釋如彼準此疏文何處者隨何方所故云炎及也所言炎者燒也熱貌也重也述義云雜也猶窈窈也疏復次現見事尚可破等者言答外道計塵等者如百論下卷破塵品云外曰微塵無分故不盡破修妬路微塵無分故一切現見有何過疏主釋云破色三番自上以來二番已畢今第三破微塵是可見救意云瓶由五塵成見一不見四故瓶非現見色為三分見一不見二故色非現見今微塵異斯二種下為五塵成故異瓶無有見一不見四過微塵無十方分無有見此不見彼過故不塵隨上二種破中以其體圓不見而已見則都見以有此塵為色瓶本本既可見末亦可見又諸外道計有鄰虛微塵為萬化之本萬化若滅還歸本塵準此論文今云外道者通是諸外道所言塵者鄰虛故云如百論破塵品也言內道明等者如彼論次文云內曰微塵非現見修妬路汝經言微塵非現見是故不能成現見法若微塵亦現見與色同破疏主釋云初破微塵非現見正破外道經外道經説塵不可見次若微塵下破內義內道計鄰虛塵為天眼見謂數人及莊嚴明微塵無十方分是準此疏文今云內道者薩婆多及莊嚴寺齊法師也疏問曰若離色有色因等者言問曰等者述義云應言第二偈何者以二偈為釋章門之中是第二偈故也言下半傳破者所言傳者猶重也言長行言指破緣品中等者述義云若謂緣無果者此舉非緣次破之偈若爾以破四緣為第一舉非緣次破為第二耳今撿論文云觀因緣品末偈云若謂緣無果而從緣中出是果何不從非緣中而出今略引初句也而言長行言指破緣品中等者應言長行言破緣品中者是指結破四緣中第二若謂緣無果偈也果可撿正本也然案淨義寺疏云長行云破緣品中説者即是總結破四緣中第二偈若謂緣無果而從緣中出也準此疏文指字即無也疏問若二處俱不然下此生無因破也等者言外人既聞等者述義云即上因中有果無果是為二門也言外道計鄰虛塵等者如大論第七十卷云有人説世間初邊名微塵微塵常法不可破不可燒不可爛不可壞以微細故但待罪福因緣和故有身若天若地獄等以無父母故罪福因緣盡則散壞慧也影師疏釋云次明計微塵是常外道此亦是得禪外道既見如劫初盡成等七日現時從金剛際起火至初禪燒一切物盡為遊塵已次有兩來水起至二禪此遊塵等在水上赤色洞然外道見之謂為大安荼則天地洞然清濁不分外書家云渾輪之時清濁不分為天地之始者正此時也而云道生一一生二二生三者以道為本正在此渾輪之始名為道從此道復生元氣呼之為一從此元氣洞然之後見有成劫風起澄清為諸天宮殿濁者為地水漸漸至下故則説言元氣為一從元氣之後清濁分明成於天地故言一生二從此二儀立已則有人物等故云二生三分三才為五行爾時則遍生一切萬物故生始終邊見等此但論佛法一小世界中一成一敗之事萬不論一何盡生極以前過去有無算之劫成敗始終其何由可知也見並是極微成即今云地山川等事故説言是世間初邊計之為常也此塵若在內則為身故但待業緣會則為人身也若天已下明天與地獄樂以但化生無父母故無橫尸在地聚散化去只是微塵等也準此論文此云外道者優樓迦計若通而言一切外道皆通言之準之可悉言阿毗曇云等者如雜阿毗曇心論第二卷行品云七微成阿耨七耨成銅塵水莵羊毛塵當從知七起長行釋云七極微成一阿耨彼是最細色天眼能見及菩薩轉輪王見七阿耨為銅上塵七銅上塵為水上塵為莵毫上塵七莵毫上塵為一羊毛上塵又云少色者謂一極微若真實行智分拆色相色之至細極於一微故説一微為色分齊今略引偈初句述義云分拆諸色至一極微為色極小即鄰虛塵此微即極故名極微極者色中折至究竟微者唯是慧眼所行梵語阿菟此云極眼見色中最微細也但是天眼輪王眼菩薩眼所見今言阿耨塵當是微也別説云七微者極微也淡海記云阿耨塵此云無礙塵言與外道異等者案雜心論第二卷末云問以何等故此諸法説行答多法生一法一亦能生多緣行所作是行應當知長行釋云無有法自力生一法以多法力故生多法亦以一法力故生如是一切有為法是故説緣行所作行是行應當知緣彼行故有所作故説緣行行所作故作彼行故説作行疏解云此釋名字多法生一法者心王假諸數而生衆多數法生心王一法也一亦能生多故數亦假心王而生心王亦即諸法也緣行所作行者明一切有為法有二種心法非心法心法者名緣行亦名所作行非心法但名所作行心法歷然名緣行四相所遷名為所作行一法以多力故生者是共有相扶生也緣彼行故者心法藉緣前境也有所作故為相所作有同時共有能相生也此亦二句釋心法之行所作故者法體為相所作也彼行故者復能共有生共相此二句釋非心法行有緣非行者心王緣數法扶持故也有所作故者心王有所成辨故行所作故次用數作頭數亦由心王故也作彼行故者數法復得作像貌長短等行也述義云是報因生者數人云四大成色陰故是報因而山河等非報因但是增上緣成論云山河等皆是由報因而應也言成論師二解等者案三相品疏云開善云以十方拆一塵十方中一復有十方如是拆拆不窮以剎那拆一念剎那中復有剎那是亦拆無窮則破一切智以佛不見其邊底故也莊嚴云拆拆則盡窮至鄰虛色時至剎那但開善立無窮義莊嚴立有窮義準此疏文今言成論師二解者開善寺智藏師莊嚴寺旻法師也述義云此同上有無二門破之者即上因中有果無果是也言兩家同是等者即前成論師二解以為兩家數人不明心無因義何者足無始義故言微塵以心為因者二義一者是心所變故二者以業感得微塵故也淡海記云兩家等者指於成實中兩師不同以為兩家則有方分無方分為異也毗曇人不明心無因義何者是無始義故是知成實也餘同述義別記云數明生死無始故也成論明説空而起故云兩家等也疏答曰下直總呵等者言以佛法無有等者述義云問數論者云無因而有法如言極微是無因等豈非此佛法耶答此諸論義師自推折言之非聖典也言又上已云等者此品次上第二偈長行初云無因而有法世間所無有今略引之言定有十一及與十四等者數人云色有十一論人云色有十四可悉疏復次相似不相似者此第三似不似門破等者言外人云今實見殺生短壽等者言種羊角等者如成實論第三卷非彼證品第四十云問曰亦見有物從異因生如倒種牛毛則有蒲生種角葦生答曰我不言無從異因生但説似因中亦生故言從色等生色等不但從四大生是故不得定言色等從四大生今準問意可見也言答見身望頭足等者述義云頭足是因總身為果此因果不得言相似不得言不相似也言又似不似等者案琳疏云似則為一不似則為異也夫存因果定有不一常異既非一異因果豈成準之可悉言頭足與身等者如百論上卷破一品云內曰若足與身不異何故足不為頭修妬路若頭足分等與身不異者足應是頭是二與身不異故如因陀羅釋迦不異故因陀羅即是釋迦疏主釋云破上總別體一義異也初牒一體何故下破一體也足與身既一頭與身亦一身既一頭足使一則失別相總別既一失別則失總還墮一切無也準之可悉言若頭足與身異等者如百論次文云內曰若爾無身修妬路若足與頭異頭與之分等異如是但有諸分更無有分名之為身疏主釋云縱其頭足異義則但見諸分無別總身也總觀文前後可有六句一以別從總總一別則一得總而失別一二以總從別則總成別得別失總三別不從總別與總異四總不從別總與別異五欲令總別體一而不相從則墮亦一亦異六變並之汝總別一體而總一別不一亦應別一總不一令六義之中是第一義準之可悉疏受陰及總陰下第二倒破四陰等者言又上既以三門等者述義云相離不相離門有因無因門似不似門此云上三門也言色心相依者別記云謂依因色也言一依成論取境次第等者如彼論第二卷四諦品第十五云五陰者眼識色為色依此生識能取前色是名識即時心生男女怨親等想名為想陰若分別知怨親中人生三種受是名受陰是三受中生三種煩惱是名行陰以此事起受身因緣名五受陰也聰法師疏釋云就中有三一標眼色下第二釋約品苦諦聚中廣説也想陰但取因成假男女實法上怨親好惡相待假不得取相續假也受陰取因成假上怨親中生三受以此事起下第三結受身因緣五陰中業領受未來果故云五受陰今取意略引之今案大義記第十卷五陰義中云總論世諦不過假實然於衆生俱有損益何者如習業青則青於我好若習憎惡則青於我惡若想未知好惡要至第三方緣者則識緣實青想取青為瓶受領瓶屬好行染貪受乃至廣説準之可悉言依毗曇有二種次第等者如雜阿毗曇心論第一卷界品長行云問何故前説色陰乃至識陰答是五陰次第麁細隨説彼五陰中色陰最麁五識依故六識境界故是故前説受陰雖非色行麁故如色説如我首足等痛受隨轉如是乃至識陰最細是故後説復次從不知本際已來男為女色染著處故是故前説樂受貪故起色欲想顛倒故起樂受貪煩惱故起想顛倒依意故起煩惱也法魏師疏釋云答是五陰下第一麁細次第若依婆沙有三一順文義二順受説三麁細論主但取第三故彼文言五陰中色陰麁故此前説所以者何五識依故六識境界故是故前説五根是五識依意識境界五塵是五識及意識境界此依識俱是意識境界受陰雖非色行麁故如色説者婆沙云問曰如受非色不住方所云何施設有麁細耶答曰以所行故如我手足等痛受隨轉想轉細於受次受説想行轉細於想次想説行識最細故在後説之復次從不知本際下是第二生染汚次第色生染最強是故前説樂受貪故起色欲者所以色陰後説受陰者因樂受故起貪染著於色是故色復次受陰想顛倒故起樂受貪者所以受陰後次説想陰者前色實是不淨妄作淨想起於樂受是故受陰後次説想陰煩惱者所以行陰後次説識陰者一切煩惱何以得生由有意根故所以得起是故行陰後次説識陰也彼論具有四門一麁細二生染二生善四逆説今取意略引初二門但此四中初三始時觀行故先麁後細後一終時觀行故先細後麁準之可悉疏今造論者欲歎義空義而説偈下等者言如毗曇等者如雜毗曇心論第七卷智品云內離人故空不自在故非我具引如上大義記第五卷解云內離人故空去離陰我不不自在故無我去即即陰我準之可悉言成實二聖行義云等者如彼論第十六卷聖行品第一百九十二云有二行空行無我行於五陰不見衆生是名空行見五陰亦無是無我行何以知之經中説見色無體性見受想行識無體性又經中説因無性得解脫故知色性非真實有受想行識非真實有又經中説五陰皆空如幻不可説幻為真實幻若真實有不名為幻不可言無但以無實能為誑惑又此行者觀一切空故知五陰非真實有如破一相故不見壁等一法五陰亦爾無一實法也聰法師疏釋云此略辨二行體文中有二一標二行章於五陰中下第二釋二行章門就中有二一釋空行於五陰中不見衆生者是見假名空是名空行於五陰中者是以五陰拆假人得假名空因五陰得假名空故言於五陰中見五陰亦無下第二釋無我行就中有一標無我行體何以知之下第二四序解釋一事明見五陰無真實體性故得無我智又經中説下第二事明因無性得解脫即是體即離二惑又經中説五陰下第三事見五陰皆空得無我行亦不可言無者是不可世諦皆無故不同方廣都無無有真實故名為幻又此行下第四事見一切實法空故得無我行破一相故不見壁等一法者有二解一云破一假法倒餘一切假故不見壁等一法二解今所習假名法是一非二破假名一義不見假名壁等一法舉假名空例實法空今略引空行體及無我行行標句文大義記第五卷二聖行義初云二聖行者空行無我行也假名空謂之實實法空為無我也稱為聖行者聖是正名行是法求義也以空理真當能使涉求心正故以理自心曰空行無我行乃至廣説準之可悉言又此論二十七品大明三解脫門等者所言三解脫門者疏主釋云五解脫門者有二種義一者當體立者即此三時離種繫縛故名解脫如空離有縛無相離相縛無作離作縛也二者無餘涅槃名真解脫此三通至解脫從果立名而言門者依前義當體虛通稱之為門依後義通至涅槃為涅樂之門若三解脫門但是無漏三三昧門通漏無漏也述義云大乘云知一切法空為空解脫門知一切法無相為無相解脫門於空無相中無所願求為無作解脫門小乘云知苦下空無我名空知滅下四名無相知餘十名無作應知言從因緣品等者此説未必然也何者此論前二十五品皆明有見何品之中而不明空若皆明空則皆是解脫門何但前來諸品獨明空解脫門耶又前偈文云其餘一切法皆同於色陰何所不盡而獨明空乎準三相品破諸法相何得通以三品名為破相為無相解脫門耶作者品初雖別生起然彼文云上來品品中破一切法皆無有餘汝看心染故而復已後方明無作解脫門耶既不然故不用耳今謂不然準前可悉言故經中或時歎空等者如大品經第卷云設有一法出過涅槃者我亦説如幻夢大涅槃室如不室也言或時歎有等者如玄義初卷云問涅槃經明室者二十五有不空者大般涅槃以空為世諦以妙有不空為身第一義諦耶答此對三修比丘昔日灰身滅智得無餘涅槃今日妙有不空非是判於二諦準此玄文今言歎有等者對昔灰斷歎今日涅槃以為妙有也如涅槃云汝今勿謂等者如彼經第三卷佛告諸比丘言汝於戒律有所疑者今恣汝問我當解説令汝心喜我已修學一切諸法本性空寂了了通達汝等比丘莫謂如來唯修諸法本性空寂疏主釋云如來命問有二初正勸次許答第一佛告等者勸問問前已於哀歎品勸問竟今何故復勸問解云前勸問則是通勸若空若不空等今勸是別勸問於戒律問何故命比丘答若利根聞已得悟但諸比丘寂是查澤難悟故如來偏勸猶如七子之中一子愚癡父母之心非不平等然為癡者心則偏重我當解説下第二許答令汝心喜者令汝疑除得解故心喜我已修學下釋有能答之德修學一切諸法本性空寂者問曰問答應順分別法相何得言修法本性空寂解云此如中論問答要須依空若有人問難離空而欲答此則不成答還問於彼疑問答要須依故故修諸法本性寂也次意欲轉關前且告諸比丘明諸法空寂次則轉關明汝等勿謂如來唯修諸法本性空寂一切併轉今所明空者則二十五有不空者大般涅槃今明二諦亦異大品中以有為俗空為真今則以空為俗有為真二諦既爾二智例然當時不但言如來修空今略引之言此是隔節破者以無所得空然超有所得空破有所得有故名隔節文俗破性真破假互明中者此非隔節今以畢竟空破有所得性異義過越故名隔節也別記云以空對破有以有對空此是一節以空有對非空有此是一節今以非空有對有病故名為隔節也言如涅槃十對歎無所得等者如彼經第十七卷佛言善男子菩薩摩訶薩實無所得者名四無礙善男子以何義故無所得者名四無礙若有得者則名為礙有障礙者名四顛倒善男子菩薩摩訶薩無四顛故故得無礙是故菩薩名無所得復次善男子無所得者則名為慧菩薩得是慧故名無所得有所得者名為無明菩薩永斷無明闕故名無所得復次無所得者名大涅槃菩薩安住如是法中不見一切諸法性相名無所得有所得者名二十五有菩薩永斷二十五有得大涅槃名無所得復次無所得者名為大乘菩薩不住諸法故得大乘名無所得者名二乘道菩薩永斷二乘道故名無所得復次無所得者名方等經菩薩讀誦如是經故得大涅槃名無所得有所得者名十一部經菩薩不修純説方等大乘經典名無所得復次無所得者名為虛空世間無物名為虛空菩薩得是虛空三昧無所見故名無所得有所得者名生死輪一切凡夫輪回生死故有所見菩薩永斷一切生死名無所得復次無所得者名常樂我淨菩薩見佛性故得常樂我淨名無所得有所得者名無常無樂無我無淨菩薩斷是無常等故名無所得復次無所得者名第一義空菩薩觀第一義空悉無所見名無所得有所得者名為五見菩薩永斷是五見故得第一義空名無所得復次無所得者名阿耨菩提得阿耨菩提時悉無所見名無所得有所得者名二乘菩提菩薩永斷二乘菩提名無所得善男子汝之所得亦無所得我之所説亦無所得若説有得是魔眷屬非我弟子疏主釋云中有十對辨得無得義初就四倒無四倒辨得無得有四倒者是有所得故無四無礙無四倒者是無所得故有四無礙也問此四倒為是昔日四倒解云非是昔倒亦非今倒今言倒者此如哀歎品説無常謂常常謂無常是名倒下三皆然也等二對就愚智明得無得第三對就因果明得無得生死二十五有果是有得斷如此生死得涅槃果名無得第四對就大小判得無得上就涅槃明得無得今復簡大小大是無得小是有得然一家自有大小俱是無得非小是有得大是無得義此中是一途也第五對以方等對十一部方等即是十二部廣經自是大小九部如法花所明大乘九部如金剛身品自有大乘十二部小乘十二部小乘中自有廣經此中所明者正是大乘十二部也第六對即有輪回無輪回也第七就常無常對此文即譬菩薩具得常樂我淨也第八以第一義空對五見五見謂身見邊見見取戒取邪見也戒取者若見有此戒持戒有所求乃至外道修戒求道等皆屬戒取攝也第九就二菩提相對何者是小乘菩提謂盡智無生智此約是小乘菩提若是七覺分是能取菩提也第十以問答皆是無所得入復謂迦葉能問如來好答今復謂識此是無所得問無所得答也今略約第一對而為言之而今約在四無礙復明無所得者此明由無所得故能有四無礙若有所得即無無礙既有所得即有所礙有所礙故豈得名四無礙以無所得故所以能得四無礙也準之可悉疏答從無常因生等者言瓶從四微戒等者述義云此數人義所言四微者色香味觸也言地持論明等者述義云彼明三種無常一分段無常二念念無常三不成實無常謂非拆法法即空故瓶是本來虛假無實故名無常不得成實成無常故今案彼論第八卷方便處菩提分法品云何菩薩觀一切行無常菩薩觀一切行言説自性常不可得若復不知真實無言説事故有生有滅若彼觀無言説自性一切行無常觀過去行無生無滅彼亦無因亦無自性可得是故亦無因亦無自性觀現在行無生無滅彼因不得而與果故自性可得是故觀彼自性而無因觀未來行無生無滅彼因可得而不與果故無自性是故觀因而無自性如是見三世分段諸行相續轉時一一行剎那有三有為有為相於剎那後有四有為相彼前諸行相自性壞次未曾行相自性起名為生起已未壞名為住顧念前滅行相自性彼起異異名為老是故生剎那後即彼起行相自性壞名為滅若觀起自性行相即彼自性生住老相無餘自性是故剎那後如此行此相自性滅如是諸生等行相如實觀此四有為相略説二種有性及無性如來以以起故立一有為相以自性故立第二有為相諸行住老故立第三有為相彼菩薩觀有為行分齊非生住老壞一切時別有事起何以故諸行分齊起時更無別生住老壞諸行分齊住老壞時亦無別生老壞一念頃名為一剎那菩薩如實觀者不別有生等事可得若有得者離色等諸行應別有生如色等行自性起彼亦應起若然若應有二生行生及生生若有行生及生生者或一或異若一而謂別有生者彼空無義若別有生者此事不然若異者彼行生非相生所為行生相生所為者此事不然如生住老亦如是若壞有法自性者彼應生滅若壞生時一切行應即滅如入滅盡正受以少方便心心數法滅若壞滅時彼一切行應生以壞無有故言壞有生滅者此事不然彼善男子善女人一切時常有自性有不應有厭離離欲解脫異心應爾以此事故菩薩於一切諸行無常如實知二十八字缺言依成論人答者由取想煩惱等者二十六字缺言今更却責等者述義云一數人瓶從四微成義二地持論明三成論人義也言如由四微等者所言如者若也言乃至責取相亦然者案淨義等疏云數人云所以無常者為四相所遷故若瓶為四相遷故無常者四相何故無常耶答王由小四相是故大相無常總問八相何故無常若依成論答有為之法何故無常由取相煩惱與感得故無常更責取相煩惱復何故無常耶準此疏文初云如由等者難數人義次難地論人義後難成論人義故云乃至也言如智度論責毗曇等者如彼論第三十二卷釋四緣第三十五云復次諸法所因因於四緣四緣復何所因若有因則無窮若無窮則無始若無始則無因若然者一切法皆應無因若有始始則無所因若無所因而有則不待因緣若然者一切諸法亦不待因緣而有慧影師硫云明破執四緣相義也今取意略取之疏若欲説其過下釋第二偈等者言以僧佉人明等者如百論下卷破因有果品云外曰諸法非不住有不失故無不生故修妬路有相諸法如泥團從團底腹從腹咽從咽口前後為因果種種果生時種種因不失若因中無果果則不生但因變為果是故有諸法今略引注釋文也言百論破因有果品外人云等者如彼品云外曰無失有何修妬路若常故無失泥團不應變為瓶無無常有何過疏主釋云二十五諦有性不失是彼大宗故不以為過注云泥團不變為瓶者上以不變並不失外道滯並改宗例又解變有二種一失滅名變二轉變稱變今言不變者無失滅之變故文云無無常驗知爾也今取意略引之言又外道二十五諦等者如大論第七十卷佛母品之餘云得禪者宿命智力乃見八萬劫事過是已往不復能知但見身始中陰識而自思惟此識不應無因無緣必應有因緣宿命智所不能知但憶想分別有性名世性非五情所智極微細故於世性中初生覺覺即是中陰識從覺生我從我生五種微塵所謂色聲香味觸從聲微塵生虛空大從聲觸生風大從色聲觸生火大從色味觸生水大從色聲觸味香生地大從空生耳根從風生身根從火生眼根從水生舌根從地生鼻根如是等漸漸從細至麁世性者從世性已來至麁從麁轉細還至世性譬如泥丸中俱有瓶甕等性以泥為瓶破為甕如是轉變都無所失世性亦如是轉變為麁世性是常法無所從來以是僧佉經廣説世性疏主釋云從冥生覺乃至從大生根謂從細生麁根散掃大乃至從覺還冥謂從麁掃細雖從麁掃細從細生麁而都無所失準之可悉言二義俱成者述義云我立瓶常故不失業報亦見瓶常此二義成也六種品第五疏第五卷疏所以有此品來等者約此品由來大文有二初有無復次辨來由次問答以顯五陰與六種差別辨品名義初中九復次即為九段此即第一復次案琳疏云辨來意者俱隨衆生種種異説或作五陰之號或標六種之稱原其聖意為破男女定相不欲立其定有而外人不達即謂定有六種前已破其迷五今復除其惑六故次明之言或作五陰之名者如大經第三十八卷云捨無常也獲得常色受想行識亦復如是又第二十三卷云觀察五陰如旃陀羅言或標六種之稱如大品經第卷云地種地種法地種如地種性地種相無所從來亦無所去亦無所住水火風空識種亦復如是準之可悉所言六種者元康師云地水火風空識也而言種者可有二義一是種生義以此六法能成衆生五陰身名為種二是種類義以此六法種類不同故名為種般若燈論云六界品即是種類義正法念處經第三并婆沙論亦云六界也影師云四大團空有識處之結而成身衆生所由故名曰種此即生義也準之可悉疏二者諸方等經等者此下第二復次言或觀五陰等者案康疏云經説五陰本俱假名求其實體畢竟空寂即如大品經云色即是空空即是色色不異空空不異色受想行識亦復如是又云菩薩行般若時知色相知色生滅知如云何知色相知色畢竟空相也云何知色生滅知色生時無所從來去無所至云何知色如是色如不生不滅不來不去受想行識亦復如是又大經第二十三卷云所言陰者其義何謂能令衆生生死相續不離重擔分散聚合三世所攝求其實義了不可得以是諸義故名為陰既言無實何得不空準此等文今云或者大經文也言或檢六種等者案康疏云經説六種成衆生身意明是假既言假有當知實空大品經云地種地種法地種如地種性地種相無所從來亦無所去亦無所住水火風空識亦復如是既無來去豈不是空乎今論主破其有執明六種性空故云觀六種品準之可悉疏三者生死之身等者此下第三復次述義云所言凡有二種者四大為有分空大為空分謂四大團空所言空也即腹內之空等也言非有非無等者如大經第二十六卷佛告高貴德王菩薩云諸佛菩薩顯示中道何以故雖説諸法非有非無而不次定所以者何因眼色明心念識即得生是識不在眼中乃至令中亦非中間非有非無從緣生故名之為有無自性故名之為無是故如來説言諸法非有非無準之可悉疏四者經云等者此下第四復次言經云諸法甚深等者述義云如大品經第二十卷中須菩提言色甚深故般若甚深受想行識乃至一切種智甚深故般若甚深今略引之言百論云等者如彼論上卷捨罪福品云如佛説諸比丘若有人言我不用空無相無作欲得若知若見無增上慢者是人空言無實今取意略引之言上以明空門等者述義云言上以明空門者上立者故論主破有明空解脫門此從因緣至五陰也今次説無相門者今立相故論主破相明無相門此即次第也言若因空門等者如大論第二十卷釋三三昧云是三解脫門摩訶衍中是一法以行因緣故説有三種觀諸法空是名空於空中不可取相是時空轉名無相無相中不應有所作為三界生是時無相轉名無作譬如城有三門一人身不得一時從三門入若入門從一門諸法實相是涅槃城城有三門空無相無作若人入空門不得是空亦不取相是人直入事辨故不須三門若入是空門取相得是空於是人不名為門道塞更塞若除空相是時從無相門入若於無相相心著生戲論是時除取無相相入無作門慧影師釋是三解脫門下明此三慧體不曾異但隨時受名若小乘三種為緣諦不同故三智各別今大乘三三昧唯同緣諸法實相同是實智但隨時受名不同如論説若從無作門入者即具空無相二義若使無相門入者則具空無作二義若從空門入者則具無相無作二義此約三種人根不同故説二門非是一人一時併從三門入也準之可悉言又一切法有二等者所言故經中明自性空自相空者如大品經初卷云復次舍利弗菩薩摩訶薩欲住內空外空內外空空大空第一義空有為空無為空畢竟空無始空散空性空自相空諸法空不可得空無法空有法空無法有法空當學般若波羅蜜慧影師釋云十八空者蓋是涅槃之梯橙解脫之初門悟理之大掃遣相之根本將欲解釋故以品題品因也復次舍利弗下次舉行十八空勸學般若論其空也體未曾有二但隨於對法有十八名此是經文準此疏文今言經者即大品經也言自性空自相空者大論第三十一卷釋云復次性名自有不待因緣若待因緣則是作法不名為性諸法中皆無性何以故一切有為法皆從因緣生則是作法若不從因緣和合則是無法如是一切諸法性不可得故名為性空疏釋云明諸法體本性自空非如菴羅果淡令異物淡古涌性酢能障酢異物修空三昧強使令空但諸法本性空故修空三昧時只見於本空耳又論云自相空者有人言性相小有差別性言其體相言可識如釋子受持禁戒是其性剃髮割截染衣是其相梵志自受其法是其性頂有周羅執三奇杖是其相如火熱是其性煙是其相近為性遠為相乃至是諸相皆空名為相空如説一切有為法皆是無常相疏釋云自空者但得相空不得法體云自體空者則法體皆空故名自相空準之可悉言所以明性相空等者如大論第三十一卷云性空有二種一者於十二入中無我無我所二者十二入相自空無我無我所是聲聞中説摩訶衍法説十二入我我所無故空十二入性無故空疏云正明分別大小乘性空異義若小乘但就十二入中求我我所性不可得故明性空若大乘中據十二入及我我所皆性自是空以三乘同得性空但得有深淺不同若小乘中明十二入等中但無我我所故空若大乘中言此等皆從本已來我我所等性自是無故空所以小乘言無我我所故空大乘中云我我所無故空如言無水故瓶空瓶空故無水小乘言性自者據我我所性自爾不論諸法若大乘則論一切諸法皆性自爾故云偏舉性相空等也有本云論辨性相空亦意同之也準之可悉言又即令小乘人等者所言可釋法華經者述義云以此意可釋法華經第一卷方便品末偈云諸法從本來常自寂滅相佛子行道已來世得成佛之文也言又智度論云等者如彼論第二十卷云復次應度者有三種愛多者見多者愛見等者見多者為説空解脫門見一切諸法從因緣生無有自性無有自性故空空故諸見滅愛多者為説無作解脫門見一切法無常若從因緣生見已心厭離愛即得入道愛見等者為説無相解脫門聞是男女等相無故斷愛一異等相無故斷見今略引之疏釋云見多者多執著故為説空門愛多者多造作種種罪業故為説無作門愛見等者為説無相門無男女相故除愛除一異等相故斷見耳述義云見是決定義作亦決定義故言於諸法中無可作解令息其見也愛是愛著義故言諸法亦空令見之也愛見等人於諸法無可愛著故言無相令不起愛見也言愛即毒蟲等者此取火宅偈意以顯大論意疏主釋云毒害雖多不出二種一者顯現有形之物謂怪鳥毒蟲二者幽隱無形之物夜又惡鬼為害之極唯有斯二有形蟲鳥譬三毒緣事煩惱無形鬼神譬迷理諸見害法身慧命唯有理事兩惑也又云起三毒煩惱名曰毒蟲若起論見稱為惡鬼具此愛見便惑苦果燒惱身心故名火災也所言蟲者二十八字缺疏五者成實云等者此下第五復次今案成實論第十二卷八解脫品云等三解脫中外色壞故不見內外色是名色空如波羅延經中説壞裂色相斷滅諸欲內外無可見我聰法師云第三解脫何故空虛空者以四大圍空成衆生因四大明虛空成衆生既四大空故所因虛空自然故空虛空準此疏文今云成實者學成實論之師即聰法師是也大論第二十卷云復次四大變造色圍虛空故名為身是中內外入因緣和合生識種身得是種和合作種種事言語坐起去來於空六種和合中強名為男強名為女慧影師疏云此約三藏教辨無相解脫門但以六大因緣合故強名男女等身肉等是地大其中濕等是水大其中熱是火大喘息等是風大有盛愛等是空大了別是識大身屬造色如是求其人及男女等相實不可得也曇影師云四大圍空有識處之結而為身此為衆生本性故名曰種也準之可悉疏六者自上以來等者此下第六復次言故名龍樹為空論比丘者三十九字缺言又如大涅槃經勸發菩提心等者如彼經第十二卷佛告文殊師利言我念往昔於閻浮提作大國王名曰仙預敬重大乘方等經典時世無佛事婆羅門通十二年即作是言師等今應發阿耨菩提心婆羅門言大王菩提之性是無所有大乘經典亦復如是大王云何乃令人物同於虛空我聞誹謗方等即時斷其命根今取意略引之法寶師疏釋云婆羅門聞勸生謗菩薩為護法故不墮地獄者是護法勢力也而言諸婆羅門者準重文應有五百婆羅門也疏七者從去來等者此下第七復次言故十八空等者大品經初卷文具如上引而言為無為空後者如大論第三十一卷釋初品中釋十八空云有為空無為空者有為法名因緣和合生所謂五衆十二入十八界等無為法名無因緣常不生不滅如虛空今有為法二因緣故空一者無我無我所及常相不變異不可得故空二者有為法有為法相空不生不滅無所有故疏釋云有為空無為空者已下為此二空是於一對故所以舉解釋有為法名因緣和合生已下此中正列有為法體即是衆界入等若有為法相者是四相等若衆界入等空是有為法空若四相等空是有為相空也無為法名無因緣已下今此中全據下從因緣無為法不論從因緣者從因緣者合屬有為法空有為法空中亦合有此二種有為義也二因緣故空已下一就生空辨二就法空明也又論云畢寬空者以有為無為空破諸法無有遺餘是名畢竟空如漏盡阿羅漢名畢竟清淨阿那含乃至離無所有處欲不名畢竟清淨此亦如是內空外空內外空十方空第一義空有為空無為空更無有餘不空法是名畢竟空疏釋云畢竟空者已下明以此二空破諸法空究竟畢竟無有遺餘故名畢竟空準之可悉疏八者上五陰品末等者此下第八復次如上品最後偈云若有人問者離空而欲答是則不成答俱同於彼疑若人有難問離空説其過是不成難問俱同於彼疑疏主釋云初偈明答不成答故不能申正後偈明問不成問故不能破邪準之可悉疏九者諸大乘經等者此下第九復次言大品云般若等者如彼經第十三卷須菩提言譬如虛空量不可得色亦如是量不可得色無量故般若無量受想行識乃至一切種智無量故般若無量何以故一切種智量不可量譬如虛空量不可得今略引之又虛處有此喻也言涅槃云佛性等者如彼經第三十七卷初云迦葉菩薩言如佛所説衆生佛性猶如虛空乃至善男子如世間中無量礙處名為虛空如來得菩提已於一切法無有量礙故言佛性猶如虛空今略引之疏主釋云此第四約譬明佛性即是約虛空為譬亦是明正性也前問若為如虛空佛答虛空非三世佛性亦爾三世相待故有佛性既非一世即非二世也此中取虛空為譬者取其常為譬不如外道取常遍譬準之可悉言金光明法身等者如八卷經第一卷佛告虛空藏菩薩言法身者非是行法無有異異是自本故猶如虛空是故説常今略引之勝莊師云非是行法者謂無為故無有異異者離生滅變異也興法師云如如法身非是行法無有異相如如智法身是根本故理智廣大冥合無相猶如虛空是故説常準之可悉言若將常遍等者如百論下卷破常品云外曰定有虛空法常亦遍亦無分一切處一切時信有故修妬路世人信一切處有虛空是故遍信過去未來現在一切時有虛空是故常疏釋云此明空體言常者簡異毗曇有為虛空遍者簡異餘不遍常也無分者空體是一不可分為多分簡異計有多虛空者也然是計虛空者通四外道也言若取毗曇虛空是有法等者如毗婆沙論第三十九卷云問曰何以知有虛空耶尊者和須蜜答曰佛説故知有虛空問曰聞他説故知有虛空非已現起知答曰亦已現智知若無虛空者則無容受物處以有容受處知有虛空以有礙無礙處故知有虛空乃至尊者佛陀提婆説曰虛空不可知非可知法故所以者何空非色非無色非彼非此所言虛空者是世俗假名分別耳問曰虛空何所作答曰虛空無為無所作與種種虛空界作近威勢緣然虛空實有體相準之可悉言若將成論虛空是無法等者如彼論第十三卷無邊虛空品云問曰若虛空非色為是何法答曰虛空名無法但無色處名為虛空準之可悉疏問六種五陰等者此下第二間答以顯六種與五陰差別辨品名義文中凡有三番此即初番問答文中有二即問與答答中言五陰合色等者案淨義等疏云又五陰合色離心離心有四合色為一六種即合心離色離色即有四大合心唯説一識種準之可悉言又依毗曇義等者如婆沙論第三十九卷云問曰陰取陰有何差別答曰名即差別此是陰此是取陰復次陰是有漏無漏取陰是有漏也述義云五陰通漏無漏者習無漏定而得定心是為識陰次起無作色是為色陰雖心數多而取想受二即為二陰四相中為行陰故通無漏也言六種但是有漏者如婆沙論第三十九卷云云何識界答曰五識身及有漏意識問曰何故界中不説無漏意識答曰若法能令有增長者立界無漏識與此相違故不立界乃至復次此六界是無始法無漏識非無始法復次緣此界故而入母胎不緣無漏識而入母胎也述義云識是初託母胎之識心也含有心王心數空者母腹內空四大者母身血肉等是也言若依成實等者如成論第三卷何謂為五答曰色陰識陰想受行陰色者謂四大及四大所因成法亦因四大所成法總名為色四大者地水火風因色香味髑故成四大又十六卷無邊虛空品云問曰經中説因六種故衆生受具答曰色礙於色是色得異色無故得增長以此義故説因六種衆生受身準之可悉疏問數論明六種等者此下第二番問答上問答通明陰種差別此下二番問答偏明六種名義文中有二即問與答答中言毗曇四大有二種等者如辨阿毗曇心論第十卷雜品云問地地界何差別答地謂色形處堅相説地界餘二亦二種風即風或異長行釋云地謂形色處者色形處是地色入所攝眼識識此世間名地界説堅相者堅相是地界觸入攝身識識此則第一義餘二亦二種者水及火亦二種色形處是水濕潤是水界色形處是火熅熱是火界餘如前説風即風或異者有説風即風種以非世間立名故有説此亦世間立名故有風塵無風塵如是此疏云此一偈明四大假實相以非世間立名者非世假名是世俗中施設法性實觸入攝準之可悉述義云實法四大謂四觸者即是能造四大謂性四大以有堅濕軟動性故地堅觸等餘三大準知此屬觸塵也形相等等者如一地大四大所造然直言地不言具四大故名形相四大共集處性唯以言地故曰假名四大集故言毗曇識種但是有漏者如婆沙第三十九卷云若法能令有增長者立界無漏識與此相違故不立界具引如上言成論即通漏無漏者述義云論人云識是心也何故心不通無漏耶今案三十三字缺言毗曇明虛空有二等者如雜毗曇心論第九卷雜品云問三無為有何相答煩惱斷離擊是名為數滅無諸障礙相是説為虛空長行釋云謂不障礙種種色以有去來等故説虛疏釋云依此宗虛空有二種一有為虛空如六界中説二無為虛空如此中説此二虛空皆悉有體不同譬喻所説但有其名而無實體又論同卷云問世尊説六界此云何答所謂四大種及諸有識亦色中間相此界説其本長行釋云四大五識身及無漏意識亦色中間謂眼所受是空界數是名六界婆沙論第三十九卷云問曰虛空虛空界有何差別答曰虛空非色虛空界是色虛空不可見無對無為虛空界可見有對有為準之可悉言成實論明等者如彼論第十三卷無邊虛空品云問曰虛空是色入性云何緣此能過色相答曰此定緣無為虛空故能過色乃至問曰若虛空非色為是何法答曰虛空名無法但無色處名為虛空也聰法師疏釋云初問意數人義眼鼻井門等虛空是有為虛空是色法故問虛空色入性云何緣此過色相數人何故眼鼻井門等虛空為有為法者彼意無為虛空者無有分際遍一切處井門等虛空故能過色相今略引二番問答也前毗曇所説二種虛空準聰疏意可悉疏問云何觀此六種等者此下第三番問答文中有二即問與答答中言下云是故知虛空等者此品第七類餘五種偈文如彼文云是故知虛空非有亦非無非相非可相餘五同虛空碩法師云破虛空是有故道虛空非有破虛空是無故道非無破虛空無能相故道非相破虛空非可相故道非可相準之可悉言故文殊十禮經云等者述義云此既言諸佛如虛空相或者便謂虛空有相若爾諸佛亦應有相是故釋云虛空亦無相離諸因果故今案二十六字缺疏答中八偈等者言呵則責其無而謂有者述義云畢竟空中無一空相而計差謂有故云其無而謂有也言相可相相待破者述義云相是標相也可相是體相也又就能所如柱等是標相柱外空是體相等者述義云非無標相故名無相直就虛空辨其無相故名無相與無體一也疏答曰下破無相有空等者言有二法攝一切法等者案琳疏云一切無有者三有為三無為攝一切法故云一切處準此疏文今云有為法者三有為法即色心有相應法也亦可三世所攝有為為法也亦可生住滅也言無為法者三無為法即是虛空數滅非數滅也言何者虛空等者案琳疏云汝虛空是三無為中一豈得云無相非無為也準此疏文今云豈得非為無為者猶是不得言非有為無為耶也述義亦同言又約毗曇等者有為空者有為虛空界也無為空者無為虛空即是大虛又衆生身內及門向等空是云有為虛空以有分齊故鳥飛所不及處是云無為虛空以無分齊故具明如上疏下半屬第二一偈等者言下半屬第二等者述義云上破有中有五偈為四之中第二也言一者取意救於上半等者案琳疏云彼明虛空是常後滅於色與空作標相非謂體相即是救前意準此疏文此云先雖無相後相成相者後滅於色與虛空作標相非謂體相來而相之言以有相故等者以有標相故則有虛空法也言若先無相等者案琳疏云空若本無相後相來相者本始既殊相豈能相如云真諦無名若以名詺去真遠矣言如常云真諦無名等者案大義記第八卷二諦義云俗是假名無定名而非絶名真諦是假名而絶名者俗法依名而緣猶得俗用真諦若依名而緣乖真彌遠故須一切妄豈非絶名乎準此記文今云常等是開善師也言第二意云等者案琳疏云若所相先無相即為無法相何所相如柱以圓為相若無圓相則無有柱何所相也準此疏文今云即無有法者即是無法故碩法師云虛空若無則無法無法何所相耶準之可悉疏有相無相中下等者言第二偏破等者問上云仍生第三偈今何故第二偏破解云上云第三者就偈次故云第三今就科文次故云第二又有本云第三偈偏破能相亦準之知疏長行釋上半為四等者述義有二解一云應言釋上半為三而言四者是錯亂也離有相下釋下半為二初正釋次舉偈結一云應言釋長行為四不可安置上半之文也二義俱得不敢改之今案諸疏初釋初釋當元康疏故彼疏云如有下釋上半中自有三段第一釋無相次有相中下第二釋有相次復次下第三重釋無相離有相下釋下半也後釋當琳法師疏故彼疏云長行有四初釋前偈下半明無相中相不住第二有相中下釋後偈上半有相門第三復次下釋無相門第四離有相下釋偈下半餘處不住也言為成前偈故者述義云上云上半至第二偈方釋之然細應尋也疏相法無有故者此第四偈等者言第四偈者述義云若就科文是為第三而就偈數名第四也言此亦明體相可相等者述義云所言體相可相者且有二義一云體相是大虛空可相是小分空即是柱無處空應知大空故名可相二云體相是空可相是柱為空所相故師云就法體辨之自論其體名為體相若對相義名為可相也然謂蓋是字應誤焉疏文既言今此一偈能所合破故名交絡故知能相所相誤作體相可相偈意甚難善應審決勿守節也言下半乘上半等者述義云此文錯亂云下半乘上半破可相仍破相如論文自顯也疏是故今無相等者言第五結攝破者若就科文應云第四今就偈數故云第五也言一切法不出等者述義云體相即大空可相即小分空以柱無處空可知大虛空故名可相等標相即柱可相即大空初就大空小空後就大空與有又云體相即空可相即柱為空所相故標相即柱可相即空並就空之與有也言語小異終意無異也疏問若無有有應當有無等者言上破毗曇外道有者毗曇立為虛空無為虛空並實有體出雜心第九卷四外道立常遍故有虛空出百論下卷破常品上來破執有虛空故云上破也言今破成論等者如彼第十三卷無邊虛空品云虛空名無法但無處名為虛空故云成論文明等也言故涅槃云等者如彼經第七卷如來性品佛讃迦葉菩薩言汝已成就深利智慧善為汝説入如來藏若言諸法皆無有我是則斷見若言我住即是常見若言一切行無常者即是斷見諸行常者復是常見修一切法常者墮於斷見修一切法斷者墮於常見如步屈蟲要因前腳得移後足修斷常者亦復如是要依斷常今取意略引之疏主釋云此破斷常以明中道言今修者只是觀察因修觀察此常見常有過則執於斷故言修常者墮斷見修斷亦然準之可悉言如開善義明虛空是二諦所攝虛空是世諦等者述義云開善意言既稱虛空即及名言故是世諦耳今案大義記第八卷二諦義云夫法無不總義無不該者真俗之理也故五陰通束諸有界入則有無悉收既以陰界等為俗總何法不盡乎是以上通涅槃下遍涅槃下遍生死虛空斷滅無非名相故上言俗有真無者謂名相為有耳名相為有故空等俗諦乃至廣説準之可悉疏答曰下然破無凡有二種等者言如成實論云等者如彼論第十二卷八解脫品釋第三解脫云外色亦壞故不見內外色是名色空如波羅延經中説壞裂色相斷滅諸欲內外無有見乘聰法師疏釋云第三解脫何故空虛空者以四大圍空者以四大圍空成衆生因四大明虛空成衆生既四大空故所因虛空自然亦空準之可悉言故云法無有無之相等者此涅槃無名論妙存章文今略引之述義云第三明平等相有三謂標釋結也今云法無至之知此即標也所證不二之境無因緣有無之相以中道理為方物之執則之義故曰法能證正觀之智無因緣有無之知以無二智為群心之至靈義故曰聖也影公曰至人以無心之妙慧契無相之虛宗內外並濱緣觀俱寂然則境無境相智無智相境智一味平等平等次聖無至涅槃第二釋章門至人如此證理之時智相絶內境相絶外也心是內法即能取相以正觀離有無之智取相之心由是滅矣數是外法即所取相以中道絶有無之相故虛妄之數由是息矣既遣內外之取相故境智一味此者內智彼者外境萬物正觀同一體也言浩然大均者取第九演明契會義之處文換泊爾無朕謂真正觀無所不遍義曰浩然為一切法作本義言大均也言乃曰涅槃者境智平等離能所相融會無二一相無相泊爾寂靜無境智之別朕曰實相涅槃大道也具如第四也疏是故知虛空下第二類破虛空等者有人言此是解正虛空義等者三十七字缺言是以衆經等者八卷金光明經初卷以虛空喻法身大品經第十三卷以虛空喻般若涅槃經第三十七卷以虛空喻佛性故云衆經也言故肇公云等者如般若無知論答隱士疏云何則言非有者言其非是有非謂是非有言非無者言其非是無非謂是非無述義云此明離相義非取相之有故言非有即遣有相遂不得是無故曰非謂是非有亦非取相之無故言非無即遣無相遂不得是有故曰非謂是非無而是非有之言不當有無肇公維摩注云如來言説未嘗有心故其所説法未嘗有相何即如來去常故説無常非謂是無常乃至去相故言寂滅非謂是寂滅具如遣有無二相類遣俱非等相耳掌珍論云此非有言是遮詮義汝執此言表彰為勝我説此言遮心為勝此非有言唯遮有性功能斯盡無有勢力更詮餘義乃至為避所餘妄執過失乃至一切心之所行悉皆遮止所行若滅心正隨又解云此明中道義言非有等者解有三義一者橫義有二種意一云非有者無也謂為治有故説無二云或者捨有執無故説言為除有明無耳二者竪義亦二意一云非有者是偏中謂為治有故説偏中二云或者非有謂有故説言為治日明非有有既無何有非有也三合離義為治定性有無明非有非無此非有非無屬所治病以或非有非無是謂有故説言為治定性有無明非有非無定性有無既無何在非有非無也言非記無記者述義云大小乘皆言虛是無記故言可不留心者猶是可不遊耶言問何故等者案大論第十五卷云問曰佛法常空相中非有非無空以除有空空遮無是為非有非無何以言愚癡論若言非有非無是則可説可破是生心處是諍論佛法則不然雖因緣故説非有非無不生著不生著則不可破不可壞梁攝論第十二卷釋依慧學差別勝相第八云諸菩薩不分別一切法乃至不分別無上菩提何以故諸法無言説中強立言説故名戲論言説有四種即是四謗若説有即增益謗若説無即損減謗若説亦有亦無即相違謗若説非有非無即戲論謗菩薩無分別智不可以言説顯示故稱無戲論無分別何以故出過世間智故略引之準之可悉疏餘五同虛空者等者言如經云等者如大品經第六卷佛告須菩提云是一切法不合不散無色無形無對一相所謂無相也慧影大論疏云諸法非一故言不合也非二故言不散也就諸色中聚對眼者名色對餘四情者名對此等皆有狀貌故名形此等皆不可得故云無色無形無對也一相所謂無相者此有二解一解云雖復百花異同是一陰萬法雖殊同一如相故云一相一相此如相亦不可得故云無相也一解云諸法皆是一畢竟空相故云一相此畢竟空相亦無故云無相今略引之述義云上既言虛空非有非無即是無色無形之異名也言一就本末等者若準論文應云一就難易二約本末也諸疏皆然也硫答曰淺智見諸法等者言故花嚴云等者如彼經第五卷文殊所説偈中有此言今略引上半偈文言有人言智者體悟生滅不二等者三十二字缺言有人言此是智者跨節悟等者二十七字缺所言跨者渡也即超渡義也言如百論云等者如彼論下卷破因有果品末云內曰緣故不斷壞故不常修妬路汝不知耶從穀子牙等相續故不斷穀子等因壞故不常如是諸佛説十二分因緣生法離因中有果無果故不著斷常行中道入涅槃也今取意略引之言大智度論云等者如彼論第三十一卷釋十八空云復諸法合集故各有名字凡夫人隨逐名字生顛倒染著佛為説法當觀其實果遂名字有無皆空如迦旃延經説觀集諦則無無見觀滅諦則無有見如是種種因緣是名散空今取意略引之慧影師疏云迦旃延經者離有無經也染染者品第六疏所以有此品等者約此品由來大文有二初明來由後辨品義初中有二即標與釋釋中有八即為八段今言一者上來諸品等者第一復次言故十地經云等者如十地論第七卷金剛藏菩薩言諸佛子乃至經曰是菩薩作是念三界虛妄但是一念作論曰但是一念作者一切三界唯心轉故今略引之案大論第二十九卷云菩薩作是念三界所有皆心所作何以故隨心所念悉皆得見慧影師疏云明心造天堂心作地獄二十五有三界果報皆由心作心若造惡即為地獄心若作善即是天堂心不起惑即成於聖心若解脫即得涅槃準之可悉疏二者生死患纍等者此下第二復次言生死患纍等者案碩疏云三者明貪是染之別稱何因緣有六種五陰六情等良由三毒故有是故三毒為因六情為果若汝破無六種等果耶有三毒之因而今現有三毒之因故知有六種等果今正欲破此貪染之因故有染者生準之可悉言涅槃明十二因緣等者如彼經第二十七卷佛告師子吼菩薩言善男子佛性者十二因緣不生不滅不斷不常非一非二不來不去非因非果準之可悉述義云引大經明無因以證此品觀無因也言大品觀十二因緣等者如彼經第二十九卷無盡品佛品佛告須菩提言是十二因緣空是獨菩薩法能除諸邊顛倒坐道場時應如是觀當得一切種智準之可悉述義云意趣亦同何者觀十二因緣不生不滅乃至不因不果即是實相般若能知之心為觀照為衆生説為文字此亦取無因之處為證也言得上諸品等者述義云若得上諸品意即顯佛性等也言若見十二因緣等者疏主釋云二河者凡有五種相對一者緣河對佛性此是二用相對二者生死河對涅槃此是得失兩果相對三者衆生河對佛此是得失兩人相對四者善法河對惡法此明乘扶兩法相對五者煩惱河對智慧此就迷悟解惑相對而釋迦教中具有河之與海多借河名舍那教中具有河海多借海喻此同取其深廣無邊流注不沈淨等義若是師子吼品明生死河中有七種人欲度生竭即生死河也迦葉品中明七種人求涅槃即涅槃河又云衆生壽命入如來壽海中即衆生佛河又云雖有龜魚並不離於河大論云舍利弗不能度布施即河善法又云如來海衆生海智慧海即善法惡法等也問何故師子吼品是生死河迦葉品是涅槃河耶答師子吼品明七種人同欲度生死有度不度者欲斷煩惱有斷者故是生死河迦葉品明七人同欲求涅槃有得不得者欲見佛有見不見者故是涅槃河也唯總而論即有二河一生死二涅槃河今一往難了故成五對十河也準此於是舉十河之中初緣性河具如三論略章二河義也言問智度論等者如彼論第二十七卷云見多者從因觀愛多者從果觀慧影師疏云所以經中恆作二種明觀十二因緣者為衆生雖諸煩惱無邊以惑大分之不過見愛為此二人故恆説此二説也疏主釋云利根出家外道起見鈍根在家衆生起愛準之可悉言答智度論云等者如彼論第二十七卷云復次菩薩摩訶大悲愍衆生故多求度脫衆生老病死苦不求分別種種戲論譬如長者有一子愛之甚重其子得痛但求良藥能老病者不求分別諸藥名字取之時節和合分數以是故諸菩薩從果觀十二因緣不從因緣不從因觀慧影師云疏長者喻菩薩子喻衆生也從果觀十二因緣下若從無明行觀名從因觀今菩薩唯為衆生生老病生憐愍心欲救拔之故云從果觀也今取意引之問此論為鈍根説法應是淺答雖為鈍根而了悟曰悟大也疏三者自上已來等者此下第三復次案碩疏云第二明前破六情五陰及與六種此但破法不破人縱使破人只是傍破若使破法師是正破今此染法染者即是雙破人法為欲雙淨人法故有此品生準之可悉疏四者的從上品末生等者此下第四復次言上云淺智等者略引偈上半文碩法師云呵責其是殘智故見有異無汝道見有見無便言定有定無淺智如此深智不然準之可悉言長行云見諸法生時等者如彼文云諸法生時謂之為有取相言有見法滅時謂之為斷取相言無碩法師云愚者見法生時取相言有則起於有見見法淺滅時取相言無則起於無見見既爾則聞亦然聞法生時思惟言有則起於有見聞法滅時思惟言無則起無見準之可悉疏五者欲破一切內外等者此下第五復次言淨名經云等者如彼經上卷弟子品善吉章維摩詰云若須菩提不斷淫怒癡亦不與俱乃至雖成就一切法而離諸法相乃可取食疏主釋云若須菩提等者此第二就解惑平等門呵善吉所謂理唯二徹一斷三毒二者與俱俱謂凡夫斷即二乘令聞不斷不俱理出意外故茫然不解大士體三毒本自不有故不與俱今亦無滅稱之不斷又若有三毒可斷可俱本性無三何所俱斷又三毒屬又可論俱斷竟自無人誰俱斷耶又三毒屬心可論俱斷求屬無從即斷俱義也雖成就等者總結也善吉其既是人人必成就於法謂不捨上來所明一切惡法而復具足善法故雖成就一切法也而實未曾善惡故云離諸法相也乃可取食若能備如上説則得平等觀使是福田故取食也言明斷不斷等者述義云煩惱是所斷智是能斷若爾言智是前煩惱是後耶若爾智已有故不應言斷煩惱是智也問若煩惱與智雖是一時而以智斷煩惱者亦應智與煩惱是一時故以煩惱斷智若煩惱與智非前後非一時者可謂非煩惱非智非斷即違以智斷惑之宗又以智斷惑者智見惑故斷不見故斷若見故者二物可並如大經云以明破暗無有是處若不見者何能斷之問若如此破如何會通大品經云一念相應慧斷無量煩惱及習氣答有二義了悟煩惱本自不生今亦不滅故言斷耳又淨名經云為增上慢説斷煩惱得菩提為無增上慢説煩惱即是菩提也然經中説斷與不斷只以不斷為正由求斷惑不可得故言故涅槃云是諸外道等者如彼經第二十三卷云復次善男子一切凡夫雖善護身心猶故生於三種惡覺以是因緣雖斷煩惱得生非想非想猶故還墮三惡道中善男子譬如有人度大海垂至彼岸沒水而死凡夫之人亦復如是垂盡三有還墮三塗何以故無善覺所謂六念處凡夫之人善心羸劣不善熾盛善心羸劣故慧心薄少慧薄故增長諸漏法寶師疏釋云復次至三惡道中第四明受漏之中凡夫不知增長諸漏文中有法喻合此文法也言受漏者受非是漏由受三覺稽留生死故名受漏亦是三漏因故名之為漏而言一切凡夫等者漏體未除也以是因緣下明退惡趣也善男子譬如等者喻也凡夫之人等者合也何以故等者釋也由無善覺慧心為少謂諸漏故雖生非想終必退還今取意略引之述義云所言垂盡者垂猶將也言釋凡夫有二師等者述義云外道雖以有漏世俗智伏迷事修惑一分而不伏迷理見惑然毗曇云明外道離欲見修雙斷成實明見修雙伏然依大乘凡夫不作諦觀故見惑一分不伏以六行等智欣厭事故唯伏修惑一分謂伏六識貪嗔憍慢此三相應無明及與隨惑也言數家明凡夫斷惑者案大義記第五卷四果義云數論雖俱明四果而義不同何數有超果謂凡夫未嘗斷結入佛法見諦斷十五心為初向第十六心為初果若曾斷欲界六品即十五心為第二向第十六心為第二果若曾斷九品十五心為第三向第十六心為第三果凡夫不能斷非想結故無超證第四果也論明凡夫不能斷結悉次第證果但有出觀不出觀果耳乃至廣説又成實第十一卷斷過品云又三解脫門皆緣泥洹以此解脫門斷煩惱無餘方便故知但無為緣道能斷煩惱乃至廣説聰法師疏釋云是真諦觀能斷煩惱準之可悉述義云外道有六行等智觀於上止妙出觀於下苦麁障以觀有止妙出故云見有得道也言三者二乘之人等者疏主釋云若依三藏十信伏見諦十解斷見諦十解伏思惟十行斷思惟從十行第七心者伏無明及四住習從初地已去斷無明四住習今此大意四住二乘所斷無明佛地斷盡準此疏文二乘之人斷三界見滅得須陀洹果斷三界修惑得後三果而未除三界見修二惑習氣及變易生死緣無明住準之可悉言四者大乘人等者疏主釋云八十八使為見一處住貪瞋慢無間四使為欲受往地體受慢無明三使為色有二住地體若以愛見二法為體者三界見為見一處住地體三界愛為三愛住地體不了生法二空及如來藏為無明住地體能生名地令所生成立名地此之五法惱亂身心故云煩惱也伏斷五住準前可知疏六者又如諸部者此下第六第七復次第七復次之中言如無行經云等者如諸法無行經下卷文殊師利自舉本事云過去久遠劫有佛名師子音王滅度已後有二菩薩比丘一名喜根但説諸法實根清淨二名勝意持戒情淨行頭陀法乃至喜根為勝意徒一心説偈淫欲即是道又大論第六卷末説文殊本緣處具在是事慧影釋云釋偈中義若能淫欲無姥欲者淫欲實相即是於道於慧癡等亦爾此明實相義明淫欲實相即是道義也説時當廣出其意了道實相即是淫欲實相故言一也故華嚴云生死非雜亂涅槃非寂靜疏主釋云貪欲即是道者求貪欲四句內外畢竟無欲從貪欲本來自性清淨即是實相如此了悟便名般若述義云今言道者即彼涅槃道是所證涅槃是能證即是實相謂體實相準之可悉言涅槃經云等者如彼經第六卷佛告高貴德王菩薩云善男子有因緣故心共貪生共貪但滅有共貪生不共貪滅有不共貪生共貪但滅有不共貪生不共貪滅善男子若有凡夫未斷貪心修習貪心如是之人心共貪生共貪俱滅何以故不斷貪故聲聞弟子有因緣故生於貪心畏貪心故修白骨觀彼聲聞人未證四果有因緣故生於貪心證四果時貪心得滅菩薩得不動地時心共貪生不共貪滅是名心共貪生不共貪滅若苦薩斷貪心已為衆生故示現有貪以示現故能令無量無邊衆生咨受善法具足成就是名不共貪生共貪但滅謂阿羅漢緣覺諸佛除不動地其餘菩薩是名不共貪生不共貪滅以是義故諸佛菩薩不決定説心性本淨性本不淨疏王釋云共貪生共貪滅者凡夫貪心即生復貪息癡生心逐貪滅心逐癡生也如欲界衆生成就初禪味禪之貪若火定起時即得此定貪現前也心共貪生不共滅者即是聲聞弟子有因緣故起貪畏於貪過修白骨觀正觀心現前貪滅自滅是名心共貪生不共貪滅也菩薩得不動地時心共貪生不共貪滅者要須得不動地時乃能斷貪不肉貪滅若未得此地則非不能共貪滅也法寶師云聲聞弟子先起後伏也未證果者先起後斷也菩薩得不退後斷也近云不動地者謂性地以上遠云八地前七地中有受佛心八地捨故述義云合有四句今引第二句也初句就凡夫人何者貪心上起癡心此癡心共貪心生貪心癡心俱生滅故次句就修白骨觀人貪女色心不起故得觀行此觀行心不共貪心滅故第三句就諸菩薩衆無貪心故無心共生而隨凡夫示生滅故名共滅耳第四句就佛及二乘無學也別説亦同淡海説云攝論師云心共貪生約無礙道也不共貪滅就解脫道也而今所明心共貪生謂生死縛時也不共貪滅謂了無生死所縛也又云共貪生約窮子時也不共貪滅約長者子時也有記亦同言又法花呼斷結等者如彼經第二卷信解品云爾時窮子先取其價尋與除糞乃至爾時窮子雖欣此過猶故自謂客作賤人疏主釋云爾時窮子先取其價尋與除糞第三領上得益貧賤之人其心局小恐不得力而徒勞之弊先取其價然後乃作二乘小心畏不得果故前期涅槃之然後修行斷結此譬即鄙之深也爾時窮子雖欣此遇下大章第四明稟教得益蒙上加價慰喻稱歎三事故云欣此過也未識大乘為容作尚守小分為賤人今取意略引之言論主憐愍等者所言長者者疏主釋云世之長者凡有三種一有德長者二乘高長者三巨富長者有德長者略明三藏一者有智二者有德者三者清潔無瑕以具此三義故居物之宗稱為者如來亦爾一則照理周窮謂之般若如長者有智二衆德斯備所謂法身如長者有德三萬纍永盡所謂解脫如長者無瑕三德既圓居在物表稱為世尊也當年長者以德重年高為物所敬佛亦如是一備衆德二壽命無量以具此二義為物所尊此據法身為譬以法身壽不可盡二者借老人以譬應身老人生途已窮餘命無幾譬如來此身最後無復餘生故釋論云我生胎分已盡是最末復身我以得解脫當復度衆生三取廢化來久作譬昔為菩薩教化諸違教經於劫數菩薩廢化已久故名為老故解品云自念老朽無有子息也巨富長者世之財寶能離苦得樂法寶亦能離生死苦得大涅槃樂福慧具足為財富出用無窮名無量言憐愍者下玉篇屑隕反傷也愛也亂也今須愛訓也言問大品云等如彼經第三十八卷中佛言須菩提菩薩法亦是佛法數知一切種是得一切種智斷一切煩惱習當得是法以一念相應慧知一切法已得菩提又第三十一卷末佛言能具足是佛道因緣已以一念相應慧得一切種智爾時一切煩惱習永盡以不生故今略引第三十一卷文述義云此就對治斷何者以解斷惑名對治斷從初發心至第十地以習果解斷習因惑亦以無礙伏以解脫斷今金剛心唯以習因解明伏斷亦以無礙明伏斷準之可悉言又云菩薩等者如大品經第三十八卷差別品佛告須菩提言若菩薩摩訶薩無礙道中行是名菩薩解脫道中無一切時蔽是為佛智斷五習或為無礙隨已脫五住為解脫道今取意略引之述義云無礙道者亦名無間道正斷惑時解脫道者斷惑已時此菩薩者唯就金剛最後心無明最極微細是故惑盡於金剛心此就等覺佛者妙覺報佛智起道凡有二義就正斷門無礙是斷解脫不斷是在無纍中故就證斷門無礙是伏解脫是斷由因證果不起一切纍故無礙解脫是即二念前是無礙後念是解脫準之可悉言又如地論云善薩等者二十七字缺言大乘經論明斷者以了惑不生等者述義云於一切有無等四句之處推求煩惱從緣生故無自性空以諸煩惱畢竟無從即心無依以心無所依即諸煩惱寂故名斷耳如此了悟畢竟空時諸惑寂滅之義名之為斷準之可悉言大品又云等者彼經第三十七卷佛告舍利弗文今略引之論解曰若衆生及諸法先有今無諸佛聖有過罪過罪所謂令衆生入無餘涅槃永滅色等一切法入空中皆無所有以斷滅衆生及一切法故有過罪述義解云所有諸法非有非無從因緣故假名有無若如外人作定報言諸法先有後無等者諸佛即有謗法之罪若爾外人言有惑斷起謗法罪何言斷乎言又二十六卷最後云等者案道證般若集云大品經在王舍城耆闍崛山中大比丘大數五千人尼及士五百菩薩無量三十卷或四十卷或二十七卷八十九品後秦弘年鳩摩羅什長安逍遙園譯述義云今就二十七卷經經文云佛告須菩提諸法先有今無耶準之可悉疏八者遍釋等者此下第八復次言如普賢觀云等者案邁法師翻經圖記云觀普賢菩薩行法經一卷開元録云或無行法字亦云普賢經下注云出深功德經中十六紙今案彼經云二十五字缺言無緣大悲者由無相理而起悲故名無緣大悲而言無緣者有人解云若依護法宗緣空無自性理與起悲故名無緣悲若依清辨宗由無彼此分而所起悲名無緣大悲今案大論第二十卷云無緣是慈但諸佛有何以故諸心不住有為無為性中不依止三世知諸緣不實顛倒虛誑故心無所緣佛以衆生不知諸法實相往來五道心著諸法分別取相以是諸法實相智慧令衆生得之是名無緣疏主釋云無緣大悲者非是不不緣衆生但緣衆生欲與樂而緣也所緣與無所與故名無緣也言三障者一煩惱障為召生死果之緣二者業障為召生死果之因三者報障即是分段變易之身也若就三點離報障為法身離煩惱障名為般若離業障為解脫準之可悉疏染染者不同等者此下第二釋品名義文中有二初直敘異計後問答解釋此文初也有三世間所謂三外道迷計三內學異報今言一世間人等者第一世間所謂案碩疏云物情所謂今現見世間有染人染法淨人淨法何故爾若無染深那有智慧煩惱人繫縛解脫而有智慧即淨人有煩惱即染人有縛即是煩惱有智慧即是解脫故知應有淨人淨法及染人染法準之可悉疏外道亦明三毒等者此下第二辨外道迷計言如僧佉覺諦等者所言覺諦者如大論第七十卷云得禪者宿命智力乃見八萬劫事過是已法不復能知但見身始中陰識而自思惟此識不應無因無緣必應有因緣宿命智但憶想分別有法名世性非五情所知極微細故於世性中初生覺覺即是中陰識異於木石之性故名為覺金七十論上卷云決智名為大者何名為決智謂是物為礙是物名人如此知覺者疏主釋云奮云覺有二種一始二淨淨中有四一者福德殺生祀天二者智慧謂二十五諦智三者不差謂四禪定四者自在謂三神通不淨覺中亦有四種謂罪癡差欲不自在也言黑染麁者如大經第三十九卷闍提首那言是二十一法根本有三一者染名愛二者麁名嗔三者黑名無明準之可悉云衛世師求那諦中等者疏主釋云求那此言依諦有二十法謂異合離數量好醜八也次有苦樂憎愛愚智勤惰亦八也次有五塵即色聲香味觸也五塵依五大生諦中八依神意二生諦餘八通依準之可悉疏婆沙雜心等者此下第三明內學異執言雜心出內學三部等者如雜阿毗曇心論第四卷使品長行云彼婆蹉部説人成結成事成阿毗曇者説人不成結成譬喻者説結成人不成事不成境界不定有欲無欲故有時於彼起欲起嗔起慢起嫉起厭起悲起捨準之可悉言無預之人者預餘據反安也樂也舍須樂訓也適漠者述義云猶是非也且好惡之異名也言唯識論及攝大乘明等者所言唯識論者述義云魏時婆羅門瞿曇般若流支此云智希中印度人之所譯唯有一卷今案彼論云楞伽經中唯識論一名破色心論天親菩薩造唯識無境界以無塵妄見如人目有翳見月等事凡有二十三行偈長行釋云問曰此初偈者明何等義答曰復有義如大乘經中説三界唯心唯是心者但有內心無色香等外諸境界此云何知如十地經説三界虛妄但是一心作故心意與識及了別等如是四法義一名異此依相應心説非依不相應心説有二種何等為二一者相應心二者不相應心相應心者所謂一切煩惱結使愛想行等諸心相應以是故言義一名異不相應心者所謂第一義諦常住不變自性清淨心故言三界虛妄但是一心作是以偈者唯識無境界以無塵妄見者明畢竟無色等外境但有內心妄生分別能見色等外識境界準之可悉言攝大乘等者如梁攝論第五卷差別章云論曰如此諸説成立唯識云何諸塵現前顯現知其非有如佛世尊説若菩薩無四法相應能尋能入一切識無塵釋曰四法是智菩薩若與四智相應在方便中能尋理得正解能入理故知一切唯誠無塵又釋應知勝相第二云識所變異雖有內外事相不內實唯一識無有塵等別體故皆以識名準之可悉言莊嚴師等者述義云事成是定然簡人成耳言斥同兩家之義者述義云謂犢子與薩婆多名為兩家也斥猶別也疏問既稱等者此下第二問答解釋凡有五番問答此即第一番問答文中有二即問與答答中言僧祇及地論云心性本淨等者述義云彼論第十卷解菩薩如實知衆生諸心云以自性清淨心故準作此言未詳其人言成實師云心有得佛之理等者三十字缺言薩婆多云本有不淨心及以淨心等者婆沙第三十二卷云煩惱未斷現在前者或有染汚心次第起煩惱現在前或有不染汚心次第起煩惱現在前準此論文今云不淨心者染汚心也淨心者不染汚心故雜心論初卷云染汚名惡色不染汚名好色言如貪心等者此相應縛義如以三毒勢心王縛於心數心數縛於心王各令不自在故此云相應縛然今此所且舉三毒之中一貪心也言復有前後染義等者此所緣縛義謂心王心數於所緣境不得自在故云緣縛又解心王與心數相應心心相應縛故名相應縛以心取境以境縛心故名縛縛又解貪心緣三世境縛三世境所言縛者即染差義如我心差女境也而言前後者但約於境言前後耳非謂就心名為前後也述義云緣縛者緣有漏境能發緣縛譬如月見緣無漏境不能發緣譬如日見此是損緣故也言成實師明等者案大義記第十卷五陰義云苦集之體辨緣中果報性善惡於報中更辨作用而心之作用在強分別是以識想有苦樂善惡在行又云識了實法想取假名受領損益已皆始得緣故雖想受分別分別尚弱而第四行心以好惡為好惡故分別力強作能作來果又云識想受心是一向無記乃至廣説準之可悉如成實論第五卷非想應第六十七云凡夫識造解時四法必次第生識次生想想次生受受次生思及憂喜等也從生貪瞋癡故説即生準之可悉述義云此但是前後相染者但就於心言前後也疏問勝鬘經云等者此下第二番問答文中有二即問與答問中言勝鬘經云自性清淨心等者如彼經云勝鬘白佛言此自性清淨如來藏而客應煩惱上煩惱所染不思議如來境界何以故剎那善心非煩惱云何不觸法而能得染心世尊然有煩惱染心自性清淨心而有染者難可了知今略引佛答文以為問難疏云釋云此自性清淨下第二解釋就文為三第一略釋第二何以故下廣釋第三唯佛世尊下仰推於佛初文中一牒淨心二客塵煩惱顯隨隨緣隱覆此自性清淨者牒第五如來藏牒第一但牒始終餘略不牒而客塵煩惱凡言而者返前述後之辭也客塵煩惱者是性成煩惱望推本性淨心之舊故説為客又無始無明自心分別所作無有真實故名為客坌汚稱塵上煩惱者現起煩惱也淨心為此二煩惱所染也不思議者性淨而染明下情不及也如來境界者辨唯上智能知也何以故下第二釋也何以故者問也何以淨心而染是不思議佛境界故耶剎那善心下對問釋也就文為二一者舉現近法無染以況遠細二從自性清淨下正明細心不染染義就初又二第一明染無所染二從世尊然有煩惱下明不染染義就文又二一正明無染二從煩惱不觸心下舉不觸釋成無染剎那善心非煩惱所染者此借麁顯細也善心是淨不善心是垢善心之中無貪瞋癡是為淨中無垢無有染義也剎那不善心亦非煩惱所染者不善心者是三毒心也當起三毒時善心也謝不善心既是煩惱是則唯垢無淨唯能染無所染亦無染義心不觸煩惱下第二舉不觸釋成無染善不善通名為心此二種心並不觸煩惱有善心時則無煩惱一切無相觸如指端不自髑煩惱不觸心者善不善心家二種煩惱並不觸有煩惱時無有善心故煩惱不觸善心煩惱即是不善心一體之法亦無相觸故煩惱不觸不善心也云何不觸法而能得染心者此結無相染義善不善心竟無相觸近義云何得有相染耶世尊然有煩惱有煩惱染心者上來求煩惱染心義不可得即是染無所染而於衆生宛然有煩惱有煩惱染心此是無染而染問云何是不染而染答前心是淨後心是垢垢心起時障於淨心故名為染自性清淨心而有染者難可了知者上來舉麁今是況細三界麁心染義尚難可了知自性清淨心而為所染豈易可知雖本性情淨而於衆生成顛倒不淨故名客塵煩惱所染雖為客塵煩惱所染而常本性清淨故實無所染難可了知廣如寶崛下卷末也疏問煩惱為是心等者此下第三番問答文中有二即問與答今案雜心論第五卷使品末云問彼便為心相應為不相此何所疑二師異説故毗婆闍婆提欲令不相應育多提婆欲令相應於此有疑答相應何者謂使煩惱心障礙不違淨妙善心可得非不相應使長行釋曰使有二事故惱心緣及相應若使心不相應者不應於緣中惱心以彼無緣故一切心不相應法無緣亦不相應非相應法故為使所惱如所説貪欲惱心故心不解脫以此説故知使心相應障礙者若使心不相應有道生時不應障礙不違心相續故以障礙故非不相應不違淨者若使心不相應不應與善心相違與善心一時俱生不應作過作過故是故非不相應復次妙善心可得功德相達故名使若使心不相應者彼常行故善心應無生處善心生故當知非不相應彼論疏釋云自下一偈第四明使相應門毗婆闍婆提説使罪色非心不與心相應纒是心法與心相應育多提婆説是心法與心相應謂使煩惱者自下以四義釋相應一煩惱心二障礙三不違淨四妙善可得以四義故知相應障礙聖道通不得當知煩惱與心相應不違淨者若使不相應者則不違清淨之心應與俱生而不並生故知使是心法妙善心可得者煩惱與善心相違故名使是不相應者常在前善心則無生處如妙善可得明知使者是心法廣釋如彼又案成實論第十卷辨煩惱品末云問曰是使為心相應為不相應答曰心相應所以者何所説貪等使相是諸使相與喜相應若喜心不相應是事不然是喜若在樂受中名為貪使又貪名染著心不相應中無染著義故知諸使與心相應準此等文今言數者雜心論師又言論者成實論師言毗婆闍婆提等者案婆娑論第三十二卷使犍度一行品云毗婆闍婆提復作是説使是纒種子使不與心相應纒與心相應使能生種若現在前名退阿羅漢諸使已斷故不能生纒準之可悉言如雜心使品末説者如前所引雜阿毗曇論第五卷文也疏問文具破三毒等者此下第四番問答文中有二即問與答答中言三毒俱纍等者案淨義等疏云通而為論一切煩惱勞纍衆生並名為染別而為論貪愛一使名之為染令知觀此故云觀染者品言又染是三毒等者案碩疏云三毒之中貪為居首若列三毒名道貪瞋癡是故從初作名也言又生死本際等者述義云無明是前分本者為已起現在五果之本由無明有故已起不可治者無明是有為法念念生滅故初念盛起時不可治亦過去謝滅故進厭不可言也愛是後分本者為未來兩果之本由愛可生未來兩果故念案大經第二十七卷師子吼品云復次善男子生死本際凡有二種一者無明二者有愛是二中間則有生死病死之苦是名中道如是中道能破生死故名為中以是義故中道之法名為佛性準此文今言又生死等者大經第二十七卷文略引之次言無明等者疏主釋成也言不起三因等者別記云不起三毒之因即免三途之果今謂不爾所言三因者現在三因即愛取有二果者未來兩果即生老死也疏問三毒之中等者此下第五番問答文中有二謂問與答答中言貪雖是染等者案琳疏云開貪為二上界名愛準此疏意是染而染之名通三界彼貪之名但詺欲界上二界愛故今欲遍治三界惑斷故前破染也疏貪欲有種種名下等者言如見一色等者案影疏云三毒是萬有之本而貪在其首若破貪本則滯有自喪初名愛如見一色念想始生曰愛心遂連囑曰著纒綿深固曰染狂心發動曰淫方便欲以為己物是名曰貪前三尚輕故無不在後二遂重故唯欲界準此疏文愛著染三尚輕無處不在故通三界淫貪二種遂重故但在欲界也言連囑者屬字亦作囑字元康師云喻者屬也爾雅云屬著也纒綿者綿綿長而不絶貌也疏以此三毒因緣故下第三總結三業有三種等者言大品經云等者案彼經第三十八卷佛言須菩提衆生不知是諸法自相空作業因緣若善若惡若無動罪業因緣故墮三塗道中福業因緣故在人天中生無動業因緣故色無色界中生言成實及禪經明福業從欲界等者案成實論第八卷三愛報業品云問曰經中佛説三種業樂報苦報不苦不樂報業何者是耶答曰善業得樂報不善業得苦報不苦業得不苦不樂報是業不必定愛若愛則受樂報非苦餘二亦爾問曰是諸業亦得色報何故但説受耶答曰於諸報中受為最勝受是實報色等名為具報乃至問曰從欲界至三禪中得愛不苦不樂報耶答曰得愛問曰是何業報答曰是下善業報上善業則受樂報問曰若爾何故第四禪及無色定中説耶答彼是自地所以者何彼中但有是報更無異受以寂滅故言大品總相明義等此疏主會釋經論相違案硯疏云以此三毒因緣起三業若自成論不便彼家只三毒為意業只應道以三毒因緣起二業那道三業耶若毗曇則為便明三毒起時別思數為意業體因思數暢身口即是三業有時道非是身口意三業是三界之三業故文道因三業起三界也明此三毒起業能感欲界三塗即是罪業明三毒能起業感欲界人天從三禪以上即是福業明此三毒能起業感第四禪與四空等即是無動業也吾謂若依數義四空等即是禪定業感那道三毒今明若無貪愛則不能潤生故猶有貪癡等也準之可悉疏文曰下第二破等者言又即是明斷煩惱法等者言無礙道者亦名無間道正斷惑時解脫道者斷惑已時故大品經差別品云若菩薩摩訶薩無間道中行是名菩薩解脫道中無一切暗蔽是為佛述義釋云此菩薩者唯就金剛最後心人無始無明最極微細是故一切惑盡於金剛心此就等覺佛者妙覺報佛智起任無纍中言暗蔽者所有一切微細無明然二道凡有二義就正斷門無礙是斷解脫不斷是在無纍中故就證斷門無礙是伏解脫是斷由因證果不起一切纍故無礙解脫是即二念前念是無礙後念是解脫準此等文今言求煩惱不得等者前念正觀於一切處求解惑無從則知心無所依心無所依則衆纍清淨故名為斷即是無礙道後念妙覺報佛智起在無纍中為解脫道此乃據正斷門以判二道也但説中言破斷煩惱法者明無斷道理解惑無從故後説中言斷煩惱法等者正明斷惑那二説相違初説意為有惑可斷無惑可斷如此推求畢竟斷後説意如此了悟則是斷也故二説不相違可悉疏若離於染法等者言答莊嚴云等者述義云前三心非木石而廣知故名人又為成人作法故名人故云前三心成人至行心時能起染故云而未起染也疏若有若無染下第二破染法亦應有一行半偈等者準上破染者應云若離於染者先自有染法因是染欲法應生於染者若無有染法云何有染者案琳疏云然者無自體要由染生若染居先便可因之生者故云若有此是與門但染不自有要因者生是為染不居先因誰生者故云若無染準此疏文然者無自體等者釋縱門一偈但染不自有等者擇奪門半偈故云若有者初一行雙縱也若無者半行俱奪也言開善云等者述義云前三心但是為成人作法未有人名故言無人此取前法後人義也又染是因前三心亦是因故云並是前染後人此不前三心為染也疏長行前釋一行半等者述義云要當先染者釋上偈上半也然後起染等者釋下半偈也若先無染者等者釋次偈初句也則無下釋者釋次偈等二句也然言從要當等方牒偈本等者案影疏云從要當已下方順偈意準此疏文今言牒者恐書寫之誤也言偈本前無人等者會釋偈與長行相違即重釋初假誤作前有前無以責外人案碩疏云偈與長行小異偈中縱許汝若先有染者染者可能起染今前無染者文誰起染今長行則道縱許前若有染者亦不能起染何故爾染者前已染竟那能起染耶偈與長行各顯一義準之可悉疏問曰若染法染者先後下第二一時門破然此三偈如涅槃納衣梵志難等者言三偈者上來破前後一時三偈也言納衣梵志難等者案大經第三十卷云納衣梵志復作是言作善不善未來還得善不善身是義不然如瞿曇説因煩惱故獲得是身若如是者身為在前若煩惱在前誰之所住在何處若身在前何言因煩惱得若一時是亦不可乃至佛言善男子一切衆生身及煩惱俱無前後一時而有雖一時有要因煩惱而得有身終不因身有煩惱也今取意加言矣疏主釋云納衣梵志論義此人論因果即是論根本前煩惱與等此並是未來無煩惱與身何者在前故今論此因果根本煩為因何者在前身為果此之根本何者在後就文為二第一納衣難第二佛答今難中為二前難正義次立邪義若就納衣作章名前破邪義彼謂佛義為邪也欲立正義自謂自義正也今初破邪前牒邪義總非如瞿曇説下正破前更牒定開若煩惱在前下正難若煩惱在前未有身時誰起此煩惱煩惱為屬誰為在何處煩惱不客在草木無情處在有情處爾時未有身何有煩惱耶此則違理屈若身在前亦不可本因煩惱故有身既無煩惱何得有身此則無因而有果汝自言因煩惱有身今既無有身者即是違言屈若一時亦非因果義佛言善男子衆生身及煩惱下答第三難明身及煩惱一時而有言一時者借一時破前後此無性如幻夢故雖一時有下此復是破一時義故下雖字雖者則是不定故要因煩惱而得有身不得因身有煩惱既因煩惱有身即是前後故雖一字是以一家因若離因緣則不得言何故爾汝前後定前後一時定意不著他難今明因緣者一時是前後一時也述義云外人立一前後一時同梵志難論主破之亦同佛答言煩惱與身一時而有者借一時破前後要因煩惱而有於身者借前後破一時問若爾何故但言要因煩惱而有於身不言要因於身而有煩惱答二義一者外道云我身有神我由此神我有種種法故若言因身有煩惱者即同外道之見二世間人言厭惡此身而不言無此身故若爾由煩惱有此身故欲教斷煩惱不受此身故云爾言開善云等者案涅槃疏第二十卷云若是開善云此正難流來義無明初一念識託空起時爾時即有同時煩惱共起今言身者只名此識為身佛既言因煩惱有身者今問身為在前煩惱為前也述義論因果者生死法起立義為果無明是煩惱煩惱因門攝故為因又無明初念一時中互有因果煩惱與心相應無明者煩惱也由煩惱有心煩惱者因心者果也由心有煩惱心者因煩惱者果也又由煩惱有心者生死報因報果果心有煩惱有出世習因習果又云無明初念空而起故生滅生滅法故有因果名義論因果也言莊嚴云等者案涅槃疏云若是莊嚴解明不難流來義但就即身為難只此身為煩惱在前為身在前述義云就過去二因與現在識支因為同時因果此師用無始義故就此同時因果釋要因煩惱而得有身文也言他問涅槃經作此説等者言前云經雖説等者述義云上未顯有此文但三相品有然以義言五陰六情等名字此佛如幻説故指此應言今謂不爾此品初長行外引小乘經説以立義論主合曰經雖説有三毒名字求實不可得言心小乘經中説有三毒名字大乘經中求實不可得故云前云耳言問人法一時等者案涅槃疏云開善解云此是流來義無明初一念即有同時煩惱故言一時若是莊嚴明煩惱潤識義要前煩惱潤識方受生此是前後義準之可悉述義云無明初念人法一時者慮知法故為人煩惱法故為法色識一時成人者五陰之中舉初後二陰耳五根五識是一時也疏長行破一時有三過等者述義云煩惱常等者煩惱得有涅槃未盡身智故名有餘滅外智得無餘涅槃既人是身智故不得之今案俱舍論云自身染法是自性斷他身染法及一切色不染汚法是緣縛斷即此二斷所證擇滅無為是涅槃體於有學位未名涅槃至無學位即此擇滅名有餘涅槃至身智盡時名無餘涅槃準之可悉疏復次今當以一異法破下上前後一時等者述義曰前後為異一時為又前後為一時為異何者欲釋一時中各有兩體亦是異義故也疏離伴應有合者正難一合也伴有親疏等者案康疏云山門云伴有二種一親二疏人是法體法是人伴此則是親因六根塵而得起染此則是疏今言疏伴若人法是一而自合者此則不藉根塵故云離伴應有合既藉根塵方得合當知非一若人法是異而能合者此亦不藉根塵故云離伴亦應合既藉根塵方得合者當知不異準此疏文今言伴有親疏等者山門所説也言又依毗曇等者案雜心論第二卷行品初云先當説心心法猶由伴生若彼心起時是心必有俱諸心法等聚及不相應行長行釋云諸行展轉因生彼心依若那生彼心法等聚生疏釋云此偈意明心法心起時一切五品心數諸心法等聚者謂十心聚等也及不相應行者謂無作色生住異滅四相等也準之可悉言下半破異有合等者案琳疏云下半縱中有二過一者異染有人不須染伴異人有染不須人體即是離而自合也二者近異相須而遂合者遠亦應合也所言須者得之須也言問一異俱稱離伴等者案碩疏云問此兩種離若為異耶答異上離則明無汝既一法自合染者無染法時染者應自合下離則明既相異而論合亦應相離而論合準之可悉述義云答一明離伴等者上半意言若染法染人一而合者但人可合亦染可含以一義同故名獨合下半意言若染法染人異而合者人法相望各得異名若爾人與法各可有合故名此是名言離伴各自合等者染離染者即無其伴染者亦離染無其伴而染人雖而有合者既言其異即無相伴故云離伴各自合人法二伴相離而去故云有二伴而相離也言常解等者古舊人所解如此然未彼人也言人是染餘者所言餘者猶是伴餘之餘也疏問曰一不合可爾者此生等者言衛世師四合知生等者案百論上卷破神品云外曰不然憂樓迦弟子誦衛師經言知與神異是故神不隨無常中亦不隨無知何以故神知合故如有牛注釋云譬如人與牛合人名有牛如神情意塵合故神有知生以神合知故神名有知疏主釋云優樓迦謂佛寶也弟子謂僧寶誦衛世師經謂法寶也言知與神異者立己宗也衛世師稱為勝異異於僧於名勝異其人立神知異者見一宗有過也四合知生者欲顯神受知名也準此論文今言四合知生者神情意塵此名為四也述義云根塵意神此四和合生知又根塵光明我以此四法合故得生覺也別記云四大和合生心平等根也言又外道染是無常等者案百論疏上卷云苦樂憎愛愚智勤惰此八以依神意二主諦準此疏文今言染者愛愚人者神也言心者神是主諦所攝故常染是依諦所攝故無常故云求那諦正爾也言求那者此云依諦也凡有二十一法也言又成實師云等者述義云約真諦境故云境無淺深也疏何事者若染不能自有等者案琳疏云何事者染不自有要藉者生則人有起染之事者不自成要由染成則染有成人之事今人與染異名自有竟則人無起染之事染無成人之事準之可悉言又人染異義已成等者案碩疏云染者染法若不修然異可得因染者起染染法能染此染者如此合則成有用今染法染者既修然異何須染者起染法染法染此染者方論合是故雖合無用何事只是何用言又異則水火等者案影疏云何事異則水火何相與事可知疏異相無有成下等者言此兩偈可有二意等者案影疏云異相無成稱列上來失宗之咎應以或人先知異無成立人法相依為欲成合品初五偈為竟無成眼見異合為復説若依文次第以破前後為無成立一時為欲合次三偈為竟無成見異合為復説準之可悉疏異相不成故者此等以下空白
