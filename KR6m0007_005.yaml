body:
  text: 中論疏記卷第三之末大安寺沙門安澄撰疏云不來不出等者此下第三明不來不出也別記云田猶去也者約過去滅義而為言之言例上應知者上明世諦不來不出之處云感病無窮不可備舉世諦中道無量亦不可具明今更以二門顯其大要即病無不破中無不顯惑者雖聞上六不而終謂決定有既決定有果若非外來必從內出故次明不來不出也明真諦八不之處云由來拆俗得真故名為來從真出俗目之為出今破此來出故明不來不出準之可悉疏云問各明二諦中道已竟等者此下第二問答以顯各合二中差別也言大朗法師教周顒等者如二諦章下卷云山中法師之師本遼東人從北地學三論遠習什師之義來入南吳住鍾山草堂寺值隱士周顒周顒因就受學周顒晚作三宗論明二諦以中道為體有智琳法師請周顒著三宗論周顒云弟子若出此論恐于衆人琳曰貧道昔年小時曾聞此義玄音中絶四十餘戴檀越若出此論勝國城妻子目頭布施於是始出此論也述義云震旦國鍾山隱士姓周名顒所謂天下無雙者也淡海記云道朗師之檀越名周顒也所言顒者玉篇妄謂反味前也疏云次泯二諦以歸不二等者此下第二辨合明體具八不於中為二初總顯體用差別後別辨八不初中言若作體用等者所言上三種者世諦中真諦中合論用中只是離合以為三中物體唯用中也言今次明體中者即是收用歸體者收上三種用歸今體中然有人云第二方言不明體中者蓋不見此文焉若言非是第二方言辨餘方言體中者上三種用亦不應第二方言若言爾者第二方言明何義耶故知謬傳也只言初牒不明體中之文至于此處方明體中者亦應許耳彼亦失總標一二復次之意故亦不應理若言答文云八不言得意色若有生滅無生滅猶是生滅義非生滅非不生滅乃是無生滅義故二諦雖泯生無生猶是釋八不義也既言故二諦雖泯生無生所言泯者猶泯破義故世諦破性生滅真諦破假生滅是假生滅不性生滅故得無生滅之稱者此救甚精實難通釋只作此釋上下相違既言若有生滅無生滅猶是生滅非生滅非無生滅方是無生滅然云何言無生者真諦所除假執不性生滅故云無生滅耶今謂若有生滅等者是有義即世諦假也非生滅等者是空義即真諦假也所以約二諦雖泯生無生假而猶是釋八不義故云二諦雖泯生無生等所言泯者猶是泯寂泯歸之義非是泯破也言故大品經云等者彼經第三十九卷佛答須菩提問文略引之具如記初卷述義云所言無道者無菩提因以金剛以還名為道故無果者無涅槃果故慧達云至極之果唯有涅槃也言涅槃經云等者彼經第七卷佛告迦葉菩薩今文略引之疏主釋云若言無明因緣諸行凡夫分別從來正著此破數論豈不言明無明異乃至若見明無明異即是愚人具如彼疏第九卷也述義云明者解也無明者煩惱也言亦真之與俗等者疏主準經作之也言今明諸佛菩薩等者佛藏思益等文述義云言無名相者謂無因緣名相言強名相者假於因緣名相所言強者施設之義以無名相不滯於無名相恆名相義故言強名相説問強説之言為約體耶為約用耶答約體而論問約用亦有以不若言有者與體何異若言無者何故大品善達品云一切諸法強名答大品之意約因緣法何者一切法無自性而假有以假義名強耳大品既言一切法故知是通於體用因體為用因用為體所以強説之言約體用之然佛藏經但約體言強名大品通於體用言強名也問何故佛經如此不同答悟緣非一故説教不同如大經云如來世尊有大方便無常説常常説無常説樂為苦説苦為苦又云不繫之船隨風東西上下不定準之可悉疏云以空有為世諦等者此下第二別明八不即成四別今此第一辨不生不滅也只此文難見何者上明真諦具八不之處云以空有為世諦有空為真諦以空有為世諦世諦即是假生假滅對世諦假生明真諦假不生對世諦假滅明真諦假不滅不生不滅為真諦中道今何故言以空有為世諦世諦即是生有空為真諦真諦名為滅等耶有人傳有説云世諦破性生滅明假生滅真諦破假生滅明不生不滅也生滅為有有即生不生滅為空空即是滅故云真諦為滅也又真諦為滅者是寂滅義也如言生滅滅已寂滅為樂也又如云諸法從本來常自寂滅相也問此體中何具八不答世諦以八不破性八謬真諦以八不破假八計稟教之流聞此二諦便作二解故泯二諦以明中道世諦為生真諦為滅不生不滅即非真非俗中道從前二諦超越一節也非此破病也準之可悉疏云不常不斷者亦得例上等者此下第二辨不常不斷也言亦得例上者上云既聞真諦不生不滅由來便謂有真諦天然絶四句之理有佛無佛性相常住是故云常而真諦絶於四句此即為斷今破此斷常故云不常不斷準之可悉言世諦有法虛假必歸磨滅等者此文易見也疏云不一不異等者此下第三辨不一不異也上云惑者既聞不生不滅不常不斷便謂真諦理無差別故名為一真理亦有淺深故纍隔真諦故名為異準之可悉言若為成上等者所言惑者者開善寺智藏師光宅寺法雲師準之可見疏云不來不出等者此下第四辨不來不出也言以來是不來相來等者如淨名經中卷文殊問疾品維摩詰言善來文殊師利不來相而來不見相而見文殊師利言如是居士若來巳更不來若去已更不去所以者何來者無所從來去者無所至所可見者更不可見疏主釋云維摩詰言下第三淨名慰問言不來相而來者此文非但近是賓主交言以相慰問遠貫一經該通衆教故前以此言標其篇首所以標此言者為時衆謂文殊從菴園來及與淨名相見故今明文殊來是不來而來見是不見而見異凡夫二乘人也以能不來而來不見而見故為善之極矣文殊師利言下第四文殊酬答成淨名之意也若來已等者此明三時無來義也來已即來事已謝故無來也又言去已等者菴園望方丈即見文殊有去方丈望菴園即見文殊有來故明去來義也來者無所從來此明菴園空也去者無所至此明方丈空也來去既爾見義亦爾述義云淨名言善來文殊汝以不來相而來故我亦以不見相而見唯從佛所至方丈故名去就方丈見時是來者非也違疏文故也只得疏意應云以文殊來不來相而來故來無所從來去亦不去相而去故去無所去又疏述有人説言真諦無來世諦有來故云不來相來也今疏主意以世諦來是不來相面來故來無所從來真諦去是不去相而去故去無所去也疏云答論云以此八事等者如此論初卷重牒長行云答曰諸法雖無量略説八事則為總破一切法今略引之元康師云此第二答也此之八法總攝諸法若破八法無法不破也有疏解云諸法雖無量者然其所問明諸法實無量衆生亦無量如來教亦無量既有八萬四千煩惱法門故云爾耳略説八事者破申有廣略今略非廣也即為總破一切法者釋伏難難云病無量教無量説八事為盡不解云略破破蓋申亦復然若使如此即總破一切法盡名之為論謂破一字盡言一字者所謂道也衆生失道故迷今破道迷即破一切迷申道即申一切準之可悉言則衆生心唯行此八事中等者謂衆生雖無量彼心唯行生滅斷常一異來出之中也言逈悟無生者別記云逈猶玄也今案玉篇云逈胡垧反遠也遐也傳相訓取也疏云次結束之等者此下大段第二結束以辨中假也言四種中假者述義云一世諦中假二真諦中假三合論中假四合明中假假義唯於非有非無假説有無有無體始立故是體假又非有非無是體假者就體中無以假説義也淡海記云四種中者二諦各中為二單約二諦説之分明中即為三假復加體也四種假者二諦各假為二單約二諦而為言之合説假義即為三以此三假望於體中為四也別記云四種中假者一世諦假即假生滅二真諦假假不生滅三合假即約二諦假合而言之但離合義異耳四體假非體之理強為體義稱為假耳所言假者即強名義也有人博有説云四假之離邊義以為四中也今撿疏文云非真俗為體假真俗為用假真俗為用中非真俗為體中也問若立體假者不可泯假為體中答均正玄義初卷云一家云亦得言體用中假亦不得爾言得者如八不義中記言不得者以體明不二故不論假而名為中用論二二用無窮故是假也今疏主意撿文自知疏云二者體用等者別記云所言此義始正者是中道義也亦無所得義也疏云答一往目之等者所言為欲釋論文中假故一往立於體用者有人傳有説云四諦品云因緣所生法我説即是空亦為是假名亦是中道義是也言復為對由來等者開善云真諦為體此有二義一明空為理本明一切法皆以空為本有非是本為是故以真諦為體也二有為俗諦拆俗本為悟真故真為體故二諦為一體也龍光云三假為俗諦體四忘為真諦體名相為世諦體無名相為真諦體故二諦異體今為對此等師故明真俗是用非真俗方是體也言師又云直稱體用等者有人傳有説云所言師者興皇師也只語勢至于縱迹此師語耳所以然者下疏主釋顯興皇師意也所言蹤迹者玉篇上屣字屣所掎所解二反廗履也行貌也下子亦反道不安也往來貌也言如體用一事既爾等者述義云色等六塵者眼等六根之所緣對故云六根所對也行住坐臥依此四儀行説法等事名之為動入觀攝念名之為靜故云四儀動靜也言無復下心者述義云下猶置也言師又云凡有所説等者有人傳云此興皇師語言不得復守言等者疏主釋顯也言如雹摧草等者如法華玄第二卷引大論文云如霜雹草死草死而雹消若能遠離二邊乃稱妙悟述義云雹者枯雕之義白虎通曰雹之言合陰氣專清凝合為雹也有人云雹滿角反雨氷也言又師云等者有人傳云此亦興皇師語言言不動觀念等者流主釋成所言動者乖也失也言師又云等者亦爾言即知下疏主辨之亦可從初至于無依還是依是興皇師語言翼逈悟之賓等者如睿師序云是以龍樹大士拆之以中道使惑趣之徒望玄指而一變括之以即化令玄悟之賓喪咨詢於朝徹元康師云玄悟之賓者謂學道之人也言望玄指而一變者以指指月令人得見以言言理令人得解今以中論文言譬之於指也論語云齊一變至於魯今借此語為用也疏主釋云令玄悟之賓等者此寄斥震旦莊周以呵天竺外道良以此土無別外道而用老莊以為至極是以斥也玄指者即是斯論獲斯論重玄之言因改二乘之軌逈有得菩薩因歸不二故名一變若守二乘不歸一道封執偏大未悟平等並是守指忘月不名一變今改小入大逈有得而悟無得如因指得月故稱為變也述義云説法之人名之為主聽法之緣是名為賓故云逈悟之賓也不生名為玄悟也一向了悟故云一變也別記云玄指者理也教也疏云昔山中學士名慧靜法師云等者撿文可見言而遂捨偏著中等者疏主釋顯也所言安者止也定也安置也言師云此是足戴耳者百喻經擔死人譬云昔有一人養牛為業依山放牛乃住山中同養牛者多如村邑時有一人急死一兒謂衆人言我此兒死不能遠棄君等可以家及牛等移往他處更作住止衆人責曰一生之間一家有餘何為多家又一兒死故令多人移志如此言耶其人答曰一兒獨偏那可擔去便殺一見即對擔去衆人責曰汝大愚癡合譬云諸比丘等煩惱自近犯一戒時知識師友密教化之懺悔除罪進福犯戒者恥妄語云不犯已犯不悔又加妄語重增兩罪不異向人殺兒足擔也準此經文今云足載者猶足擔也述義云足子俞反左傳云言以足志文以足言杜預注曰足猶成也暴便壁也子欲反止也滿也得也戴者子戴反事也行也成也辭也為也言也物終更生也戴始也則也並出玉篇今解戴者猶擔也即是成擔義耳也言可謂下疏主語耳也言而經論意等者如淨名玄述義初卷引有論云佛告頞鞸汝行乞食若見非常之人莫廣説法時舍利弗值於林下問曰汝是誰人答曰沙門一切有為法因緣空無主息心達本原故名為沙門又問汝師是誰答曰我師天中天三界無極尊神通遊十方相好身丈六時其外道發心悔過初得果也中本起經云一切諸法本因緣空天主息心達本源故號為沙門也此就德行彰其名也寶梁經上卷摩訶迦葉白佛云何為沙門佛告迦葉所謂沙門者寂滅故調伏故乃至利衰毀譽稱譏苦樂堅心不動如地故於諸形相心無染著心行成就如虛空故若能成就如是行法是名沙門故云經論意在等也言沙門者諸出家人之總名也或曰桑門正言室羅摩那拏此曰勤勞謂以修道至誡多勞亦云息惡泛論惡者是不善性今兼無記息謂令不起義也言又息之等者有人傳云此是莊子文只彼文云息之又息之也今此文初云又者此疏主意即復次之異名今撿涅槃無名論第七演云書不云乎為學者日益為道者日損為道者為於無為者也為於無為而曰日損此豈頓得之惡損之又損之以至于無損耳老子德經曰為學日益為道日損損之又損之以至於無為無為而無不為河上公曰謂政教禮樂之學也日益者情欲文飾日以益多也道謂自然之道日損者情欲文飾日以消損也損情欲又損之所以漸去之也當悟如嬰兒無所告為也情欲斷絶德與道合即無所不施無所不為也大隱釋曰學謂時俗經衍之學修為即果欲日以增益道謂出俗自然之道修為即情纍日以消損也述義云修甚深正觀道者遊心於中道理寂靜無為既遊心於中道而見疑等萬纍念念消損如此之事何頓得耶必經地地漸次消損損之更損至於佛果都損盡已更無可損損者斷之異名修正觀者見諸類惱本來不生今亦無滅乃是正道如此之人不起惑染是名損之乃至廣説準此等文今云無息者無損無為之異名也只有人云莊子者恐謬傳也言所言不破中暇等者有人傳云上云問師何故立於中假復以何義破中假也今牒此問故云所言不破中假者也所言體者觀也悉也解也言而今言破等者別記云約所立性所立假而為言之所言為者由也被也有也今須由訓也所言道者約本來空義故云是道也言用道為非道者為猶成也言二者又須如性即是修等者上答文應答且有四義一者上以釋竟今當重説等故今云二者也所言知性即假者此約分別心故云性即假也亦得言約所立境彼所立境是永無故亦攝世諦義也何者理外若心若境皆是世諦理內心境皆是真諦也今謂不爾違次文故何者一切凡夫妄想顛倒故思因緣假以為性實諸佛望性所謂之性常是因緣所言謂者意也猶意思也觀者望也現百論疏也言故云一切世諦等者涅槃經第七卷佛告迦葉菩薩言今略引之疏主釋云前來如此廣説得無得常無常皆是如來善巧方便即是世諦今即卷歸皆是第一義諦然準中論遊意引華嚴經第五卷文殊偈云一切有無法了達非有無準此應云一切權實法了達非權實若準此言一切性實法若於如來即是假法唯之可悉言三者體道之人等者有人傳有説云知之字至于出自兩緣方用也所言兩緣者別記云約迷悟而言之本有亦爾也言四者尋教之流等者文意易見疏云明淺深門第五此下第五門於中有二第一約四重二諦以顯自他差別第二約四重二諦以釋八不初中又二第一正約四重二諦以顯自他異第二明須作四重二諦之意初中又二初正列四重二諦後問答以示理教即顯第四重二諦約第一列四重二諦即成二別一作初章中暇辭以示差別即初重二諦二約後三重二諦以示差別初中有四番問答即為四別今此初也又二謂問與答言問他亦云等者案大義記第八卷二諦義云辨有無者謂俗有真無也俗雖名有非是實性但衆緣相類虛假曰俗俗既虛假撿之無體即此之無是假無謂無為真真俗二理悉當但稱諦也準此記文今言他者開善寺智藏師也言答須初章語等者言初章者述義云為人無生正觀之初故名初章故華嚴經第二十四卷解脫月菩薩請説十地偈中言譬如諸文字皆攝在初章諸佛功德起十地為根本然釋初章凡有四義一者初章即是有無所以有無名初章者夫諸佛説有無之教表非有非無之理必依有無以為初故是名為初也章者表也二章猶明也若他有無各守自性不得現示非有無理所以非明今明有無即是因緣即得顯理故云明也三者有無即是諸佛出世初説言説即成於章句故名為初章所言章者教之異名也四者章猶句有無即是四句中初故云章也問既言初章亦得後章以不答均正玄義初卷云不住之初即貫前後也故大品經初明以不住法住般若中終訖乎無所得故關中舊影云初章之義只是不住無得之語其意包含準此師意亦得後章也言他云有有可有等者有人傳云此處但有三句失三句者一者他有有可有即有無可無二者故有不由無即無不由有三者有是自有無是自無也得三句者一者今無有可有則無無可無二者無有可有由無故有等三者由無故有有不自有等也次言有不自有故非有等者明中假義亦是明有無義也疏云問非有非無假説有無等者此下第二番問答言答非也者淡海記云師云非有非無是中實中所以非中假義故云答非也今謂不爾即是欲明立假宗文非明中文故云非也非謂非有非無以為中實中也言得意密取等者別記云此約用內而為言之所言密者猶是但也今撿切韻第五卷云亡筆反祕密也疏云問初章等者此下第三番問答言問初章等者別記云此問大意若通言者初章即具中假若別言者但是假耳但是用中故發此問也此約體問言答若總詺等者別記云初章中假總名一章何者此中假也一切初學人之章門故云初章此約通義名為一章也只疏主意從學中假而為言之但約利鈍以為異耳均正之意初學假也後學中也疏云而師分之一往異等者述義云此有四對言他有有可有等者第一性假一對言他有有可有不由無故有等者第二由不由一對言他不由無故有等者第三自不自一對言他有是自有等者第四二不二一對也淡海記云言四對者可不可由不由自不自故不故是也亦可相由不相由自不自二不二性假是有人判云初説當於文次後説不當也此四句出第二方言也彼云有不有由不由自不自假不假此當初説也言此四節語等者別記云一相由二不自三假四不二也疏云問初章中假等者此下第四番問答言初章是伏等者別記云此約用中而為言之何者依於初章以顯用中及體中故又有四句一者中伏假斷謂雖説中未能解故但是伏耳當説假時方能解故所以云斷餘三亦爾此云中假者一往約世諦中假而為言之言伏斷者但約現起惑而言耳非謂成就惑也成就惑者但於菩薩位而伏斷故也言初明假有無等者有人傳有説云所言初明假有無者初章也別而言之但是假耳只是用中也次明假有無等者中假也非有非無假説有無從有無入非有非無也言故初章中假等者別記云初章之假與中假之假俱是一假只約動有無執義邊名初章假也若約有無不失義邊名中假之假也但是初章之內假耳此初章內若善言時具三諦故也言若守初章中假等者述義云禪衆融長于辨俱是詮法學士而作中假解兩來為假兩去為中故興皇大師以為中假師亦所破云兩來不成假兩去不成中也均正玄義初卷云非有非無即兩去即是斷而有而無兩來只是常此是斷常二見何謂中假也故一家舊云兩去不名中兩來亦不成假也別記云言若守初章中假者只約用言是中假師者著中假人也言師又云初章等者師語也謂動性有無等疏主釋成也言中假即破等者亦是師語言明假説有無等者疏主釋成亦可從初訖乎假為釋疑皆是師語次明假説下疏主釋成雖有二説後釋好也任意取捨也疏云二者他但以有為世諦等者此下第二約後三重二諦以顯自他異法花玄第四卷末云攝嶺相承有三種二諦一以有為世諦空為為真諦二以空有皆俗非空有為真三者二不二為俗非二不二為真今準十二門論疏若空若有皆是因緣如因空故有因有故空空由有成有由空成故此空有並名俗諦也由空故有有無自性是即非有由有故空空無自性是即非空非有名真諦今從空有二悟入非空非有不二即以二為不二門故云二者他但等也此即第二重二諦也言三者等者二不二皆是因緣由不二故二由二故不二故二不二並是因緣名為世諦由不二故有二二無自性是即非二由二有不二不二無自性故非不二非二非不二名為真諦故從二不二門入非二不二理也言四者等者二不二非二非不二並是悉名世諦因緣無自性即無二不二亦無非二不二言斷慮窮乃名真諦也所言三種二諦者別記云約合門二諦而為言之疏云問以前三皆是世諦等者此下第二問答以示理教也言答自有二諦為教等者淨名玄云以有無為教略有五義一對理明二諦是教以至理無二故非有非無今説有説無故有無為教準之可悉言轉側適緣等者述義云所言轉側者猶轉勢之別目也側者趣也別記云隨順機欲而回趣也今案玉篇側俎棘反旁也反側者諂諌之人也不反正直也傾也傾口營反易霞也不正也伏也聊也側也疏云問何故作四重二諦等者此下第二問答辨須作四重二諦之意於中有二即問與答答中有四第一約順機得道義釋之第二約經説不同義辨四重二諦第三約曉喻淺學義辨四重二諦第四縱漸次化物義辨四重二諦今此文初也故法華玄第四云一者謂各各為人悉檀自有聞初得道或有聞後受悟是以根性不同二諦非二也別記云此中云三根者但約轉節而為言之不論第四合門二諦也疏云又為釋經論等者此下第二約經説不同義以辨四重二諦也故法華玄云三者為釋佛教不同經辨二諦雖多不出三也乃至廣説也言如大品云等者如彼經第三十七卷成就衆生品佛告舍利弗言菩薩摩訶薩住二諦中為衆生説法世諦第一義諦舍利弗二諦中衆生雖不可得菩薩摩訶薩行般若中以方便力故為衆生説法大論釋曰不但説空不但説有為愛著衆生故説空為取相著空衆生故説有有無中二處不染今略引之言大品又云若有若無等者如彼經第三十一卷佛告須菩提言菩薩摩訶薩以世諦故示衆生若有若無非以第一義乃至衆生於五受陰中有著相故不知無所有大論釋曰菩薩世諦故為衆生説若有若無非第一義若有是實有無亦應有實若有不實無云何應實乃至衆生於五受陰中有所著為是衆生難所有無所有故菩薩説無所有世俗法故分別諸法欲令衆生知是無所有今略引之言華嚴云等者如彼經第三十四卷云爾時普賢菩薩欲明諸菩薩行諸佛菩提乃至欲明菩薩清淨法身出妙音聲覺悟衆生起菩提心故以偈頌曰一切衆歡喜除滅諸陰蓋乃至無二智慧中出生人師子不著不二法知無一二故今略引之言華嚴又云等者如彼經第八卷十住品中法會菩薩承佛神力普觀十方及諸界以偈頌曰世間所有世諦法名字談論語言道悉欲明達世諦義菩薩因此初發心一切諸法語言斷無有自性如虛空悉欲明達真諦義菩薩因此初發心今取意引之法藏師疏第五云頌初住有四十六頌今此二頌求所知二諦法發心以是説法主故名法慧準之可悉初發心所言發心者是發悟義也從初發心乃至十地皆是發心也有人傳有説云此四經文中第四經文為合門二諦證文先三經若就利根人悟者為合門二諦若就鈍根人未悟者為開門三諦又仁王經云有諦無諦中道第一義諦此開門二諦大品云若有若無世諦故説非第一義者是合門二諦今謂不爾開門二前攝法不盡唯教非理合門二諦攝法義周通理教故準之可悉疏云又為對由來等者此下第三為曉喻淺學辨立四重二諦故法華玄云第六即世學者明三假為世諦三假空為真諦唯有此義但初門意耳是故引之明三假空有皆俗非空有為真諦彼即云我自有二諦復有非真俗為中道是故今云二諦興中道亦是俗諦耳非二不二乃為真也述義云即世學者成論人也準之可悉疏云又為破四病故説四門等者此下第四約漸次化物義辨四重二諦也故法華玄云四者欲漸引衆生示階級方便無始巳來有此邪心及以外物等謂是實有是故諸佛出世而為説之此是世俗實耳非聖實也若諸法本性空乃名真諦故中論云凡夫顛倒為有於是人是實名為諦諸賢聖真知顛倒性空於聖人是實名為諦也而衆生便謂有非實諦空是真實即捨有取空是故説云空之與有此是二邊皆是俗諦非空非有中道之法乃為真諦或者雖捨二邊復滯中道是故第三次明遠離二邊不著中道乃是真諦二邊中道皆世俗耳述義云諸賢聖者唯就二乘而為言之只法華玄凡有六義然此闕無第二依諦説法義與第五道凡接聖義言空有出兩情者別記云約迷悟故云兩情也疏云開此四重二諦等者此下第二約四重二諦以釋八不於中有四番問答初二番問答正釋八不次一問答引證釋成後一問答舉舊説和會初二問答如文可解第二問答中言智度論釋無生法忍云等者如彼論第二十七卷釋初品大慈大悲第三十五末云問曰何等是阿鞞跋致地答曰若菩薩能觀一切法不生不滅不不生不不滅不共非不共如是觀諸法於三界得脫不以空不以非空一心信忍十方諸佛所用實相智慧無能壞無動能者是名無生忍法無生法忍即是阿鞞拔致地慧影疏第十二卷云以下次出其位地若論正位即是七他明七地菩薩得無生忍觀一切法本來無生亦復無滅此無生無滅亦不可得故云不不生不不滅也不共已下明空有雙觀萬法參差不一故云不共同是一如莫二故云非不共又解諸法因緣相生是故名共因緣即空故名不共緣起及空皆不可得故言不共非不共又色心各異名不共境智俱冥名為共反覆作之悉得也於實相中無所疑惑故云一心信忍也今略引答文也述義云如彼論第六卷云諸法不生不滅非不生非不滅亦不生滅非不生滅亦非不生滅非非不生滅已得解脫空非空是等悉捨滅諸戲論言語道斷深入佛法心通無礙不動不退名無生忍今取意略引之言不共者亦不生滅等非不共者亦非不生滅等如文應知已得解脫者於邪見得離故非空者於空不取故言非也淨名玄述義云如彼論第八十六云菩薩住柔順忍中學無生無滅亦非無生非無滅離有見無見有無見非心非無見等滅諸戲論得無生忍今取意略引之解曰不共等者凡有二義一者生滅為生不生不滅為滅如此生滅曰共非此生滅故曰不共非此不共曰非不共二者生滅合説故曰共非此共曰不共非不共者同前猶如二諦合説為合明中然則不生不滅是為異諦非不生非不滅是為中道故知不共是真諦非不共是中道問何故生滅合為生耶答只生為生故對單生言復生耳亦欲示一法含多義不生不滅以為滅者非俗諸生滅故名不生滅而對俗諦有法之生真諦無法即名滅耳案云論文雖三初文為正後二取意準之可悉疏云問攝山大師等者此下第四問答舉舊説以和會也言攝山大師者指道朗師是根本故也言答須深得此意等者淨名玄云二者望緣聖人體道未曾有無今説有無此為教物故有無為教準之可悉言二者拔由來二諦之見等者玄云三為拔見舊義執有無是理由來既久別二見根深難可頓拔攝嶺大師對緣斥病欲拔二見之根令捨有無兩執故説有無能通不二理非是究竟不應住有無中故有無為教述義云對緣斥病等者由來有無二執之人名緣也非是究竟者所謂有無言畫石二見者述義云言畫石者雕石為碑久遠不失二見亦爾左傳畫為九州畫者令也正也説文畫界也又去畫石者猶堅著也如刻石作文難失執見亦爾故大經云譬如畫石其文常住畫水速滅勢不久住也言睿公云等者此引中論序破迷作論之中明大悲內引文所引全同所以不引即是慈悲也又是知病識藥也道是涅槃俗即生死夷之訓平言二際者生死涅槃之實際也泯之言滅二際不泯謂破一道清淨也菩薩之憂者既見凡迷六道紛然聖惑三乘異徑為此興無緣大悲故稱憂也元康師云此下明菩薩作論本為於此也二際者有無也老子云視之不見名曰夷也述義云道俗者二諦以執二而不知不二故名不夷也言大師無生等者疏主準菩薩無生解內充為物造論明攝嶺大師亦內充無生解外扇大慈風破淺學見也言慈風者春風也謂扇無生正觀春風使淺學之徒捨見得益也言若得意者境之與教等者淨名玄云因緣有無可兩望論之發智即境能明不有不無不二理即是教也此據佛不説自有境教也就説義明境智者佛照有無有無名境佛説有無有無是教也述義云教有二種謂言説教與表理教言説教者神口所吐微妙音聲表理教者有即表於非有之義言説教者有佛時有無佛時無表理教者有佛無佛常自有之準此玄文今云以真俗通理等者表理教即有佛無佛常自有之言如來説二諦等者神口所吐微妙音聲即有佛時有無佛時無也問他亦云照有無有無是境説有無有無亦是教與今何異答異何者定性有無不得顯理故非教因緣有無能顯於理於是教也以假有無生二慧故是境以性有無起斷常二見故非境疏云同異門第六等者此下第六門約此門中大文有二初列衆師後辨得失初中又三第一列三家義第二列七宗義第三引三宗論初中又二初總標三家義後別列三家義初中言什師未至長安等者述義云從龜茲國未至震旦界時也言什公者具存胡音應言鳩摩羅耆婆此云童壽外國立名多以父母為本什父名鳩摩羅炎此翻為童母名耆婆此翻為壽是故兼取為名傳云鳩摩羅什此云童壽天竺人也世為國相鳩摩羅炎哲有懿節將副祖位乃辭出家東度蔥嶺龜茲國王帛純敬慕其德自迎請為國師矣王妹才悟明敏體有赤黶法生智子諸國娉之皆不行焉王乃見炎逼以妻之炎納生什更産一男名曰弗沙提婆至什年七歲時父卒即什與母俱為出家母仍樂禪法專精匪懈學得初果什從師受經日誦千偈能通毗曇又符書云什初誕生圓光一尋獨出閻浮幼而鐫悟辨慧如神七歲入道即誦毗曇無幽不暢也什者會數之名亦聚集也言公者玉篇云公古紅切方平也正也通也廣韻云三公論道又公者無私也共也官也亦姓也後別列三家義中第一列本無義第二列即色義第三列心無義初中又二初約本無義而為言之後約本無異義而為言之初中又二初正列本無義後引證成初中言一者釋道安等者述義云釋道安本無論云如來興世以本無弘教故方等衆經皆明五陰本無本無之論山來尚矣謂無在元化之前空為衆形之始夫人之所滯滯在未有若託心本無即異想便息準之可悉高僧傳第三云晉長安五級寺釋道安姓衛氏常山扶柳人七歲讀書再覽能誦至年十二出家神性聰敏而形容甚陋不為師之所重驅役田舍至于三年曾無怨色至年二十五復還兼部住受都寺徒衆數百常宣法化既至住長安五重寺僧衆數千大弘法化後至符堅建元二十一年二月八日忽告衆云吾當去矣是日濟畢無疾而化春秋七十有二焉廣讃如傳也別記云真諦者為俗諦之本故云無在元化之前也疏云睿公云等者此下第二引證釋成也如肇論述義第四卷引睿法師淨名經序云自慧風東扇諸肆流詠已來格義迂而乖本六家偏而不正即中百二論文未及此又無通鑒誰與正之前匠輟慞遐慨決言於彌勒者良在於此然即什公未翻四論之前玄義多謬於理猶疑故欲待見彌勒決耳別記云格義者約正言也乖本者已成邊義也六家者空假名不空假名等也偏而不即者未依正義述義云格義迂等者無得之義還成有得之義言六家者梁釋寶唱作續法論云宋釋曇濟作六家七宗論論有六家分成七宗一本無宗二本無異宗三即色宗四心無宗五識含宗六幻化宗七緣會宗今此言六家者於七宗中除本無異宗也有人傳云此言不明今應云於七宗中除本無宗名為六家也一深法師本無二關內即色餘皆同前也格迂者玉篇上柯額反舉也擊也止也下禹俱反避也遠也大也廣也輟慞者玉篇上中劣反憂也仲輟輟短氣也言師云安和上等者有人傳云有本云師云者此非當也今案破空品疏末云睿師歎釋道安鑿荒塗以開轍標玄旨於性空唯性空之宗最得其實準之可悉言爐冶之功等者別記云行菩薩行之功也言冶者信行音義餘赭反鑢銷也冶消也疏云次探法師云等者此下第二列本無異宗初舉外宗後破所迷言外宗者二諦搜玄論十三宗中本無異宗其製論云夫無者何也壑然無形而萬物由之而生者也有雖可生而無能生萬物故佛答梵志四大從空生也山門玄義第五卷二諦章下云彼有竺法深即云諸法本無壑然無形為第一義諦所生萬物名為世諦故佛答梵志四大從空而生準之可悉不真空論云本無者情尚於無觸言而賓無故非有有即無非無無即無元康師云下第三破晉朝竺法汰本無義也情尚等者情多貴尚此無也觸言皆向無也賓者客也客皆向主今本無宗言皆向無也爾雅云賓服也言皆服無故云賓無也耳故非有等者謂經中言非有者無有此有也言非無者無有彼無也慧達疏下卷云破釋道安本無義述義云皆此誤矣禮記禮尚往來解云尚貴也乃尊崇義好樂義焉謂本無者只貴於無即所有言如實為無是故聞佛經中説非有言即以其有如實為實聞于説非無言亦爾準之可悉言此釋為肇公不真空論等者此下破所迷如彼論云尋夫立文之本旨直以非有非真有非無非真無何必非有無此有非無無彼無此真好無之談豈所謂順通事實即物之情哉元康師云尋夫等者謂尋經文本意也直以非有等者真實也非實是有故言非有非實定是無故言非無耳何必等者不言非有無却此有非無無却彼無也此直等者直是好尚於無故觸言向無耳豈所謂等者不順萬事之實性不得即物之實情也述義云下破尋佛經旨非實有故名曰非有非實無故名曰非無如何必言無其因緣有無此直隨斷無之過耳如是之人不悟二諦道理乃至中道正觀此大愚癡不應相語非自一人墮於惡趣而令多人墮惡趣故事者俗諦實者真諦言即物之情者謂覺萬物皆是中道最勝正觀之真心也言經云若法前有後無等者如大品經第三十七卷成就衆生品佛告舍利弗言若衆生先有後無諸佛菩薩即有過罪諸法五道生死亦如是若先有後無乙諸佛菩薩即有過罪論解之曰若衆生及諸法先有今無諸佛賢聖有過罪過罪者所謂令衆生入無餘涅槃永滅色等一切法入空中皆無所有以斷滅衆生及一切法故有過罪述義云準此經論所有諸法非有非無從因緣故假名有無若如深法師作定執言無在有前者此無即是非為有本性是無即前無後有若爾者諸佛菩薩有先無後有之過罪也高僧傳第三云深法師者晉剡東仰山竺潛字法深姓王琅琊人也年十八出家至年二十四講法花大品遊於講席三十餘年以晉寧康二年卒於山館春秋八十有九焉言深法師者有本作琛字敕林反寶也重也寶玉也或本作探字敕含反取也今作深字是餘皆非也準山門玄義可見也只琛法師是作中論百論疏師所謂北土三論師是也剡者以漸反利也會稽郡有剡縣是也潛者似廉反藏也疏云第二即色義等者此下第二約即色義而為言之於中有二總標與別列於別列中又二初關內即色義後道林即色義初中又二初舉宗後被迷言一者闕內等者舉宗也不真空論云即色者明色不自色故雖色而非色夫言色者當色色即色豈待色色而後為色哉述義云此下破關內即色義此師意云細色和合而成麁色若為空時但空麁色不空細色望細色而麁色不自色故又望黑色而是白色白色不白色故言即色空都非無色若有色定相者不待因緣應有色法又麁色有定相者應不因細色而成此明假色不空義也然康達二師並云破支道林即色義此言誤矣言此義為肇公所呵等者後破迷也如不真空論云此直悟色不白色未領色之非色也述義云但知色非白色因緣而成不知色本是空猶存假有也所言領者猶是悟也疏云次支道林等者此後約道林師即色義而為言之如山門玄義第五卷云第八支道林著即色遊玄論云夫色之性色不自色不自雖色而空知不自知雖知而寂彼意明色心法空名真一切不無空色心是俗也述義云其製即色論云吾以為即色是空非色滅空斯言矣何者夫色之性不自有色色不自有雖色而空知不自知雖知恆寂然尋其意同不真空正以因緣之色從緣而有非自有故即名為空不待推尋破壞方空既言夫色之性不自有色色不自有雖色而空然不偏言無自性邊故知即同於不真空也高僧傳第三云支遁字道林本性關陳留人或云河東慮人也年二十五出家以晉太和元年閏四月四日終于所住春秋五十有三焉遁者玉篇徒頓反言支者寺名故高僧傳第三云後還吳立支山寺也疏云第四溫法師用心無義等者此下第三約心無義而為言之山門玄義第五云第一釋僧溫著心無二諦説云有有形也無無像也有形不可無無像不可有而經稱色無者但內止其心不空外色此一公破反明色有故為俗諦心無故為真諦也不真空論云心無者無心於萬物萬物未嘗無述義云破竺法溫心無義二諦搜玄論云晉竺法溫為釋法琛法師之弟子也其製心無論云夫有有形者也無無像者也然則有象不可謂無無形不可謂無是故有為實有色為真色經所謂色為空者但內止其心不滯外色外色不存餘情之內非無如何豈謂廓然無形而為無色乎高僧中沙門道恆執心無義只是資學法溫之義非自意之所立後支慜度追學前義故元康師云破支慜度心無義尋末忘本今云心無者無心於萬物等者不真空論文所引全同元康師云經中言空者但於物上不起執心故言其空然物體是有不曾無也所言曾者猶是都也言此釋意等者疏主顯溫法師意也述義云令心體忘於境而不便執故言空然此中經者大乘經中説也言肇公評之云等者不真空論文所引全同所以不記元康師云下正破也能於法上無執故名為得不知物性是空故名為失述義引般若經云色無邊故般若無邊無邊空之異名也將明心空必舉境以明之故知心空由照空境境空由心而顯境智相成猶如符契灰炭不遣樹想猶生況枝葉並茂而樹想亡耶言破意云等者述義云其師之意但於物上不起執心故言其空然物是有不曾無也故云此計有得有矢也言此四師等者述義云此之四人唯在晉時不及宋代故以衆所知識宜舉之後之三家非衆所知唯曇濟法師引之所言晉者玉篇云晉即刃反進也又州名國名又姓又易卦名也疏云至宋大莊嚴寺等者此下第二約七宗而言也爰至等者高僧傳第六卷曇斌傳末云時莊嚴復有曇濟以學葉才力見重一時濟述七宗論宗著經目及數林準此故知非是吳國嵩山草堂寺曇齊師也爰者及也言第五于法開等者山門玄義第五云第四于法開著惑識二諦論云三界為長夜之宅心識為大夢之主若覺三界本空惑識斯盡位登十地今謂其以惑所覩為俗覺時都空為真準之可悉言覺體者案玉篇上古樂反寤也大也廣韻云古嶽反曉也大也明也寤也知也又古孝反省也下火了反明也曙也慧也知也準之可悉高僧傳第三云晉剡白山于法開不知何許人事蘭公為弟子深思孤發獨見言表善放光及法花年六十卒也言于者氏超世也言第六一法師云等者玄義云第一釋道一著神二諦論云一切諸法皆同幻化同幻化故名為世諦心神猶真不空是第一義若神復空教何所施誰修道隔凡成聖故知神不空準之可悉言是故經云等者述義引大集經第九卷云一切諸法室無相亦復無有次第生其性本來常寂靜無有能作如虛空今取意引佛為海慧菩薩説偈文言難曰經稱等者如大品經第三十八卷佛告須菩提言於汝意云何幻師幻化種種物若象馬男女等是幻有業因緣墮地獄乃至非想非非想處及有修道不不也世尊是法無有異事何當有爾又云須菩提於汝意云何佛所化人是化人有業因緣墮三界有修道不不也世尊是事無有異不可説爾今取意引之述義云無而忽有之義名之為化有而轉變之義是名為幻也言又經借虛以破實等者如大品經第三十八卷佛言菩薩用般若波羅蜜作如是方便力饒益衆生亦不貪著是身何以故著者著法著處是三法皆不可得自性空故空不著空空中無著者亦無著處空中空相不可得故準此經文今云虛者空之異名也高僧傳第四卷云晉山陰嘉祥寺竺道一姓陸吳人也少出家從汰公受學時人號曰九州都維那後暫往吳虎丘山以晉隆安中遇病而卒即葬於山南春秋七十有一焉言第七于道邃等者玄義云第七于法邃著緣會二諦論云緣會故有是俗推拆無是真譬如土木合為舍舍無前體有名無實故佛告羅陀壞滅色相無所見準之可悉言難曰經云等者此引大品經第十三卷文以為難之具引經文如記第二卷今略引之只經云諸法相今云實相所言相者猶是體相也高僧傳第三卷云于道邃晉燉煌人至年十六出家事蘭公為弟子後隨蘭適西域於交泟遇病而終春秋三十有一焉言燉煌者上從昆反下胡光反燉煌郡武帝後元年分酒泉置社林以為古作洲也邃者息遂反深也疏云次齊隱士等者此下第三約三宗論而為言之述義云震旦國鍾山隱士姓周名顒所謂天下無雙者也隱士有二解即就內與外內隱者法華經云一心除亂攝念山林棄國捨榮以求無上道若爾投身命財不逐世情莫望美譽修習般若正觀之類名曰隱士此有二種一者遁身隱者如大經中雪山大士乃至攝嶺大師㔁氏周顒等也二者藏賢隱者如阿踰闍國有一法師名婆須跋陀羅現身為狂癡人聽毗婆沙論等又葉婆國臥落葉中而不瞬者乃至晉代壞度比丘等也外隱士者論語長沮桀溺曰且其從避人之士也豈若從避世之士故何晏注曰士有避人之法有避世之法長沮桀溺謂孔子為士從避人之法者也己之為士即從避世之法也避世之士然有二種一者邑中隱者後漢書云任永君以當時亂詳盲子墜井不救其妻以為實盲對其與人淫及大平後引鏡自照曰世道眼即明妻慚自縊而死也二者林中隱者許由善卷老聃莊周伯夷叔齊等並棄世榮隱居山谷修道攝念所言士者雄幹之義博通古今辨然不然謂之士也説文孔子曰推一合一為士也凡有三品一者隱士即時遁者居山中等二者高士三者處士廣如肇論述義第三卷初也言不空假名者經云等者山門玄義第五卷云第三釋顯亮不空二諦論云經曰因緣諸法有佛無佛性相常住豈可言無哉而經云諸法空者所謂內空無主以無主諸法名世諦諸法無主是真諦此即數部三藏意明事理二諦以三聚無為為俗諦其中十六真理是第一義諦舊詺為鼠婁栗義此一師即第一不空宗準此玄文有人傳云山門等名為晚人者僧詮師也又均正玄義第三云不空二諦者即周顒義引大品經云不壞假名而説諸法實相明諸法無自性故所以是空而自不無諸法假名可以為有故言不懷假名而説諸法實相也山門等詺不空二諦作鼠嘍粟義只如鼠嘍栗內實盡空外穀形有何異假名故有無實故空故舊曰名著不空假名二諦也言嘍者玉篇洛口反嗹嘍也晚者莫遠反後也暮也言難曰論云等者此引此論第三卷行品末破攝論師三性三無性偈文所引全同所以不記碩法師云下第二有一偈無性故不有所以是空義偈上半破性下半破無性非但無性亦無此無性法本破汝計諸行是實故道虛誰妄取破性言假既無實亦無不實無性亦無假也若他人言破外道及數部性義明三假七實為世諦體雖言是假還成性義何者既言七實實豈非性耶又且有此三假之法若也言無即不得為世諦體既可為世諦體即是有法有法即有相有相有性若言無性即應非有既決是有終成性義也偈上下半如文可見言諸法後異者使有定性始終是一不應後時變異而今見後時變異即知無性也準之可悉言此與前即色義等者此與前三家之中關內云色無自性故言即色是空不言即色本性空不異也疏云空假名者一切諸法等者山門玄義于法邃緣會二諦宗支道林即色遊玄此二師即第三空有宗舊詺此師為案瓜義二師所立準上可見均正玄義第三云山門等目名空有二諦為接瓜二諦明瓜沒之時舉體併沒瓜出之時舉體併出時無沒沒時無出何異時空之時無纖毫之有明有之日無毫之空問山門玄義云舊均正玄義云山門等何相違耶答此可有二通一山門者僧詮師初住山門只後住山中今興皇法朗師以僧詮師上足弟子故云山門從師立名二從山門僧詮師而受玄義故云山門玄義有人傳云依均正玄義者空假名不空假名俱是成實師故玄義第三云但成實論亦各執兩家説二諦不同一云空有二諦一往是衆師同明之二云不空二明即周顒義只彼玄義道安本無支道林即色周士不空二諦等為所破故與今異言還同緣會故等者還同于法邃云緣會故有是俗推拆無是真譬如土木合為會會無別體有名無實故等過具引如上疏云第三假名空等者問均正玄義以周顒為不空二諦今何名假名空耶答有人傳云均正玄義約未了時義而言今約已了時義而言今謂準山門玄義釋顯亮師名為不空暇名義于法邃名為本假名周氏名為假名空此得理説故以為第三也準玄義初卷空假名者開善所用假名空者四重二諦初重也所言原者元也本也言論去雖有而無等者如不真空論云誠以即物順通故物莫之逆即偽即真故性莫之易性莫之易故雖無而有物莫之逆故雖有而無雖有而無所謂非有雖無而有所謂非無如此即非無物也物非真物也物非真物於何而物故經云色之性空非色敗空述義云誠以即物至所謂非無者次辨其相凡有三雙六句初雙明中假無礙就此雙中即物順通等者明假不礙中何者假名諸法即為理故名曰順通即理之異名即物之理遍於萬法無有一法而逆於此理矣即偽即真等者明假不礙中何者假法之偽即為真理故非謂改變假法別明于真理中假之性無有改變如以一柱望東西人所以經云不斷煩惱而得涅槃次性莫之易下第二雙示有無義即明假有假無不相礙義性莫之易等者中假之性不改變故即有是空雖空猶是有也物莫之逆等者萬物無逆於真理故即空是有雖有而是空也次雖有而無下第三雙彰表理義以有無表非有無既於非有假言是有雖言是有而非有耳無亦如是如此即至非色敗空者此齊萬物如此非無世俗萬法然以正觀觀察諸法皆畢竟空且如柱等為四微緣和合所生無真性故雖復現見有柱而非真柱即畢竟空何得言柱乃引維摩經證成之如其文云色即是空非色滅空謂色性即是空非謂色滅然後始空而言敗者是舊經文此是色自真如非滅於色而有真如何者滅色之空是世諦空即法之空是畢竟空指有為無指無為有有無二名無有二體故相即矣今略引之元康師云性莫之易等者即有是空此空雖空猶是有也物莫之逆等者即萬物順通性空當知雖有而是空也雖有而無下雖有而無常知非定有下句反此也如此等者非無物也明非無也物非真物也明非有也亦可直云非是無物但物非真有之物耳物非真物等者既云非真於何處有此物乎疏云今總詳之等者此下第二評得失準之可悉疏云攝法門第七等者此下第七門中大文有二第一約十條明攝法第二問答料簡初中又二初總明八不深奧後別列十條就列十條即為十別言一者八不等者第一約十二因緣以辨攝法言大經亦云等者引涅槃經第二十七卷師子吼品文證成八不明十二因緣不生不滅具引如上言以十二因緣等者大乘玄第三卷釋名門云言境界因者即是十二因緣能生觀智以是觀智境界故云境界因疏第十六云二者十二因緣乃至能令人得成佛果此根本能生於佛故名為因準此玄疏文今云境界佛性者以觀智之境界故名為境界成佛之因故名為佛性也言能發無生滅觀等者疏云十二因緣能生觀智既是觀智之根本不宜不正若其不正境即成生滅斷常之境智亦成生滅斷常之智今簡此境是無生滅境智即是無生滅智故將十不以簡十二因緣準此疏文不生滅境能發無生滅觀即以彼所發觀名為觀智佛性也言觀智明了等者玄云菩提者此言正遍知道是從智為名述義云言果性者是佛所有三菩提之智言斷常諸邊等者玄云涅槃者此言寂滅是即從斷為因也述義云果果性者所謂涅槃即菩提上無纍之義言然十二因緣等者如淨名玄第五卷云此之五性更無二體十二因緣能生之義即名為境所發之義便名觀智觀智明了故稱菩提菩提無纍即是果果然十二因緣本性清淨未曾因果亦非境智故名非因非果然此五性既無二體但轉境為智變因為果如此因果未曾因果故五性一體所言性者不改之義亦自體義謂為因時不成餘物故云不改言即一十二因緣等者如統略上卷釋方便品中云涅槃經十二因緣不生不滅是中道即境界佛性發不生滅觀即觀智佛性觀智明了即菩提性斷常斯寂即果果性十二未曾境智亦非智斷即是法不可示名為正性正性者即是佛性體也此但就不生不滅論五性五性但是如來智也既悟因緣宛然不生不滅具五性即知不生不滅宛然亦是觀智及菩提亦是果果性但不得是正佛性準之可悉疏云二者八不即是雪山全如意珠等者此下第二約大經第十四卷全如意珠偈以辨攝法也所言雪山者有人解云在化天竺以北香山以南言全如意珠偈者疏主釋云而今俱是半珠即應皆半字下具足説偈即是全如意珠此中既以珠為喻者還依珠義解大論解如意珠能滅衆生苦能與衆生樂今此偈亦然能破除衆生顛倒之病也言偈云諸行無常等者大經第十四卷羅剎所説偈文具如記初卷疏主釋云善男子去下第二引昔事證此大乘不可思議為一偈故須捨身命真金三種試謂燒打磨內合三試者一形試云示羅剎剎形之像者其有大膽勇以不苦不畏者則能於生死廣度衆生也二皆試者看其能愛樂貪求大乘以不能別知不二求索試者就其索身能布施不也問此試何物解云即如前文云車有兩輪鳥有二翼此以三事試於菩薩二輪何者是菩薩二輪答餘處以定慧為二輪今此中以戒慧為二輪故我見其堅持戒行未知有深智不故今正試以此二種也説半偈正是法試下云半如意珠此言得證常是滿字常亦是半字無常為半字前第五卷云有文今即是其文上云常是滿字一家有時云無常為半字常亦為半出何文今文所得證故生滅滅已寂滅為樂此即半偈珠豈不是半字耶即得以此難他汝若無常為半字常為滿字者亦應無常是半珠常為滿珠而今俱是半珠即應皆半字下具足説偈即是全如意珠此中既以珠為喻者還依珠義解大論解如意珠能滅衆生苦能與衆生樂今此偈亦然能破除衆生顛倒之病也又一云破倒上半即諸行無常是生滅法此即治昔邪常等四倒諸行無常即治常常既去餘三倒然下半生滅滅已寂滅為樂此即治今苦無常四倒也二者破見又上半破衆生常見下半破斷見具破斷常二見衆生起見不出二種如大經所明一者常見二者斷見此二見是諸見根本既破此二見一切六十二見等皆斷見愛斷如此即生老病死斷也三者即是釋共聖行義故如上問云何共聖行沙羅迦鄰提今此中即是明共聖行義上即是標苦無常行下具辨常與無常則異苦無常四常則具常樂我四猶識生死苦無常四為邪方能識涅槃常樂我四為正者即是聖義若不知邪無以識正今明此二則釋聖行也問他亦作此義釋與今何異今明生死未曾常無常涅槃亦未曾常無常而今言生死苦無常者此是令衆生厭畏故假言其無常言涅槃常樂者欲令衆生欣樂希求故假言其常至論此未曾常無常苦樂他則不爾故為異也準之可悉述義云具八行觀者生死無常苦無我不淨為四行觀涅槃常樂我淨為四行觀也上窮霄漢等者且就世俗以一天下論之霄漢者天河淵泉者地際也貴得意者心言路絶無依無得學合道也所言霄者玉篇思姚反霄之言小也在雨部又思搖反夜也在宀部也文字辨嫌二字俱音小焦反但雨下肖字宀雨亦近天赤氣也宀下肖字霄中星虛霄夜今頃宀下肖字也言故非凡夫行等者淨名經中卷文殊問疾品文略引之羅什注云凡夫行者有三種善不善無動行無動行色無色界行也上二界壽命劫數長久外道以為有常不動義也佛亦因世所名而名之故云非凡夫行也一行三邪而不證故云非賢聖行也疏云三者八不偈即涅槃本無今有偈等者此下第三約大經第十卷本無今有偈以辨攝法也所引全同是故不引言廣經如涅槃疏等者如被疏第十卷云爾時世尊説偈四正答然山中法師不講涅槃經諸學士請講師云儂若知得五年活者儂講此經今知不得五年活故不講此經恐不得究意諸師不能奈何但熟讀大品及三論也勝雅師不講此經而為商略本有今無四偈大意山中師既不講此經興皇何得講之明興皇師房中處處口咨決涅槃大意略盡而餘法師不知此咨問故興皇云我無同學也又梁武為此經難解遣使外國覓涅槃論請得真諦三藏還仍值亂不得翻譯晚興皇師請三藏法師翻得本有今無四偈論謂為精要以示山中師了不肯何故爾此豈能得出於正意耶然此偈四出來意不同也今是初出正答其疑廣州大亮釋云言本有者本有煩惱今無者今無煩惱本無者本無般若今有者今有般若此是上半意下半明三世有法無有是處者今日如來不為三世所攝不如上半也何故爾今日如來常住故非三世攝次開善云上半就始有義釋下半明本有義上明始有即是本無今有本有今無與大亮意同下明本有義者本有佛性即非三世攝故言三世有法無有是處今束此四偈不出二意一者約佛二智實方便方便實無三世三世三世無三世義實方便此無三世三世方便實三世無三世無三世三世豈是三世三世無三世豈是無三世非三世非無三世所以為常既非三世非無三世豈得作三世難言佛是無常耶二意約迷悟得失迷故本有煩惱悟故今無煩惱迷故本無般若悟故今有般若此上半偈只約迷悟稀有無迷悟論有無此有無不定有無有無既不定有無者無即是有無有即無有有無不無無有不有此只是不有不無非今非本故下半卷除云三世有法無有是處也此語意正除其前見性難難意正明如來始見佛性應是無常今即明未曾本未曾始未曾見未曾不見故非三世攝所以常也準此疏文今云上半即無三世等者約佛二智而為言之此乃實方便下半三世無三世等者方便實也準之可悉疏云四者此偈等者此下第四約三種般若以辨攝法也言故論引般若無盡品云等者此初牒長行文具明如上也疏云五者即此八不是淨名入不二法門等者此下第五約不二法門以辨攝法也言然不二法門等者述義云此中雖以所證之理為本而取不二正觀名為本耳正觀之所依故兼以舉理故淨名玄初卷云不思議解脫本者謂不二法門所以然者由體不二之道故有無二之智由無二之智故能適化無方也言如肇公云等者如淨名經序云此經所明統萬行即以權智為主樹德本即以六度為根濟朦惑即以慈悲為首語宗極即以不二為言凡此衆説皆不思議之本也今略引之言真極可軌等者疏主釋成也述義云言一道者一切聖人所遊之路更無異趣故名一道亦名一乘無萬有差別義為一所履為道道以能通為義雖能滅除一切煩惱出煩惱外而不離諸煩惱無所不遍故稱能通言清淨者離諸見義謂了悟諸見解脫無二無別本來寂靜以如此義故為不二真者非虛妄義極者究竟之義因位之流未究竟故而是真極不二為諸法之模則故名為法不二之道無所不遍是故為至離六十二見具足萬德義為妙離諸煩惱本性清淨故稱虛通也言蓋者舉自謙辭乃是不定之言將以為是未敢為定故曰蓋也是衆教等者以能詮之教顯理究竟之義旨歸者不二中道也群生等者以能證之人明理圓滿之義靈府者中道佛性如府攝聚一切財物中道佛性有恆沙性功德若無此性雖順一切六度萬行而一向不得之問中道此就空門佛性就不空門佛性如何同耶答佛性二種一理佛性二智佛性今言同者理佛性也一切衆生有佛性者智佛性也不二中道謂畢竟空并無二智境智平等一味之義合為理耳中道佛性謂無二智之性并如如理以為成佛正因之義言佛性也淨名現疾等者上宮此經疏云維摩詰者乃是已登之大聖也論本既興真如冥一談迹即示萬品同量德冠衆聖之表道絶有心之境事以無為為事相以無相為相何有名相可稱國家事業為煩但大悲無息志存益物形同世俗居士處宅毗耶村落而化緣畢將歸妙本現身有疾假寢于床謂以因疾致問為開不思議之理是以文殊知時承旨問疾仍顯大士種種妙行以勸新發然則疾之為體必以大慈悲為本乃至如來雖命五百聲聞八千菩薩各陳昔日受屈而皆辭曰不堪一無欲往故不成問疾唯文殊奉旨即就方丈正陳佛意方成問疾也準之可悉言答三十餘菩薩説不二法命初即云等者淨名經中卷末入不二法門品有三十一菩薩初從法自在菩薩終訖樂實菩薩故云三十餘菩薩今法自在菩薩者三十一菩薩説不二之中此最初菩薩故云説不二命初也如彼文云會中有菩薩名法自在説言諸仁者生滅為二法本不生今即無滅得此無生法忍是為入不二法門釋僧肇曰滅者滅生耳若悟無生滅何所滅此即無生法忍也此菩薩因觀生滅以悟道故説已所解為不二法門也離真皆名二故以不二為言今略引之言然彼品有三階明不二等者括入不二法門一品之意而為言之故彼品云爾時維摩詰謂衆菩薩言諸仁者云何菩薩入不二法門各隨所樂説之舍中有菩薩名法自在説言諸仁者生滅為二法本不生今則無滅得此無生法忍是為入不二法門乃至樂異菩薩曰實不實為二實見者尚不見實何況非實所以者何非肉眼所見慧眼乃能見而此慧眼無見無不見是為入不二法門文殊師利曰如我意者於一切法無言無説無示無説離諸問答是為入不二法門問維摩詰我等各自説巳仁者當説時維摩詰默然無言文殊師利歎曰善哉善哉乃至無有文字言説肯定真入不二法門御製云下根聞説衆生即空便以生疑若爾菩薩亦同二乘以觀空為宗何以為尊菩薩耶故此品明菩薩不二觀之行以遣此疑曰雖同觀空觀空亦不同何則二乘觀者心存空有故捨有證空但求自度不在化他是故名雖觀空便成相觀菩薩觀者在有不失空在空成萬化空即有有即空不偏有無等會不二故名為真空觀豈言便同二乘以遣之也就説不二亦開為三一諸菩薩寄言詮無言二文殊寄言遺言三淨名寄無言以詮無言此三皆顯無言理無淺深但衆生聞諸菩薩各以寄言詮無言便謂理必可以言詮所以文殊寄言以遣言物復計理雖無言應有能遣之言所以淨名默然無言以遺能遣之許也然若以無言為極文殊亦應無言何猶發言讃述耶解曰理實應爾然若文殊不述者惑心唯疑淨名默然不答猶不知以無言為極是故文殊將欲傳物故發言讃述也然即法自在等菩薩假言詮於不二無言之理即為下品文殊雖知無言而言於無言故假言遺言即為中品淨名杜口無言於無言故假無言詮無言即為上品必以所會之道離諸見故能會之聖默然無言如説以無心之妙慧契無相之虛宗緣觀俱寂內外並冥即其義也言一者衆人等者述義云明不二之道有淺中深三重之言初衆人者謂三十一菩薩若是地前三十心若七地以還菩薩而十信位唯有信解而無慧解故不言之文殊淨名就迹論之八地以上雖俱相領而為化物故示淺深也言言辨明者猶是悟也具如名記第二卷初也疏云六者此之八不等者此下第六約妙法蓮花以辨攝法也言藥草喻品云等者如法花經第三卷藥草喻云如來知是一相一味之法所謂解脫相離相滅相究竟涅槃常寂滅相終歸於空今略引之疏主釋云下第二明佛智同衆生不知同就文為二此初明佛能知一相一味者一相謂一實相合一地也一味語一智味合一雨也所謂解脫相下雙釋上一相一味也免五任煩惱縛故名解脫相離三界內外業故名離相滅二生死苦果故名滅相也究竟涅槃下釋上一味離前三相故纍無不盡由離三相故照無不圓照無不圓故非無纍無不盡故非有即是中道之法故云究竟涅槃常寂滅相也言終歸於空者有人云雖過去過塵沙未來復倍上數終入無餘灰斷涅槃故云終歸於空此釋壽量佛無常也有人言依覆相説常解釋者明此常即空無相不可得故言終歸於空也有人言空無二十五有故名寂滅他今明二種一者凡聖終歸大涅槃故云終歸於空二白音已來開五乘教用至於法花息用歸體即無復五乘來本對於五故明不五既無有五亦非不五即言辭寂滅故稱為空問上明終歸一切種智與今何異答通是一道清淨隨義立名或稱種智或名涅槃或名一乘或名般若故前明終歸種智謂三菩提果也今云終歸涅槃為果果也良由二乘智非究竟智故終歸佛智二乘涅槃非究竟故終歸大涅槃也言下云復有住禪等者下重頌合大樹增長二行文所引全同是故不引疏主釋云言聞諸法空等者即上云究竟涅槃常寂滅相終歸於空蓋是明大涅槃果位之法故大樹因人間之歡喜也智度論云譬如震雷小鳥皆怖孔雀大鳥聞之舞踊也畢竟空法亦復如是小人聞之驚疑怖畏大士聽受歡喜踊躍準之可悉言小草者人天是世間乘名為小草也言肇公論云等者如涅槃無名論第一演開宗云恬乎而夷泊焉而泰九流於是乎交歸衆聖於此乎冥會述義云次彰所得恬乎而夷謂大智等因行功德皆成就故泊焉而泰謂大悲等化他功德悉備足故尚書注曰恬安也方言恬靜也泊焉猶冥寂義九道衆生並歸趣之三乘聖人皆會向之無一衆生不成佛者當知一切俱趣如大經云一切衆生乃至須陀洹等皆悉歸於大般涅槃也又云九流者六道三乘此就因位群聖者三乘聖人此就果位也元康師云九流於是乎交歸者此句會法則無法不會於涅槃言九流者謂道流儒流墨流名流法流陰陽流農流縱橫流種流亦云小説流也言此文字語言皆是佛説並會涅槃故云交歸此即金剛經云是故如來説一切法皆是佛法此之謂也衆聖於此乎冥會者此句會人亦無人不會於此道是故如來説一切人皆是聖人故大品云佛即衆生衆生即佛故云衆聖於此乎冥會也疏云七者此之八不即是正法等者此下第七約正法以辨攝法言如花嚴雖有七處八會等者如花嚴綱目云今明此經有七處八會謂人中三處天上四處為七處重會普光法堂是為八會於中第一會佛在摩竭提國寂滅道場菩提樹下師子座上盧舍那佛及十方諸佛同加普賢菩薩入如來淨藏三昧説十世界海及果德法門於中有二品一世間淨眼品二盧舍那佛光品第二會佛在普法堂文殊師利承佛神力説信位法門有六品名號四諦光明覺明難淨行賢首品第三會佛在須彌山頂帝釋宮中妙勝殿師子座上佛加法慧菩薩入菩薩無量方便三昧説十住法門有六品佛升須彌頂菩薩雲集説偈十住梵行初發心菩薩功德明法品第四會佛在夜摩天宮寶莊嚴殿師子座上佛加功德林菩薩入善伏三昧説十行法門有四品佛升夜摩天宮菩薩雲集説偈功德花聚菩薩十行菩薩十無盡品第五會佛在兜率陀天宮一切寶莊嚴殿師子座上佛加金剛幢菩薩入明智三昧説十回向法門三品佛升兜率陀天宮菩薩雲集説偈金剛幢菩薩回向品第六會佛在他化自在天王宮摩尼寶藏殿師子座上佛加金剛藏菩薩入大智慧光明三昧説十地法門十一品十地十明十忍阿僧祇佛壽命菩薩住處佛不思議法如來相海小相光明功德普賢菩薩行寶王如來性起品第七會佛在重會普光法堂師子座上普賢菩薩承佛神力入佛花嚴三昧普慧菩薩二百句問普賢菩薩二千句答謂離世間一品第八會佛在舍衛國祇樹給狐獨園重閣議堂師子座上佛自入如來師子奮迅三昧説法界法門并善財童子歷百十一城求善知識所得法門謂入法界一品故云七處八會也言故云正法性遠離等者花嚴經第三十五卷普費菩薩所説偈文所引全同故不引之述義云四句為趣以非四句名為非趣而正道約四句與非四句故云遠離等故疏主釋云夫正法性非有非無非亦有亦無非非有非非無故云遠離一切趣此則一切諸法之本諸佛菩薩得正法根本故名聖人謂諸佛如來登地以上大菩薩等得正法性故名聖人也別記云趣者善也向佛果故非趣者惡也不向佛果故也言故收前能化所化因果等者別記云約花嚴經一部始從世間淨眼品終訖普賢菩薩行品合有三十一品明能化所化因果寶王如來性起一品明收因果用以歸非因果體後有離世間入法界二品明從正法體更出生因果等用故云爾耳也疏云八者八不即是如來真應二身等者此下第八約真應兩身以辨攝法也言大經云等者如涅槃經第二十七卷佛告師子吼菩薩言以是義故十二因緣名為佛性佛性者即第一義空第一義空名為中道中道者即名為佛佛者名為涅槃今略引之疏主釋云約此一章故開佛性因果等五今則收束此五是一五五只是一一五即無五五一即無一畢竟清淨準此疏文中道之法畢竟清淨名之為佛名為涅槃也言故淨名云等者彼經下卷見阿閦佛品中維摩詰答如來問文具引如上今略引之淨名玄第七卷云觀身實相觀佛亦然法身既即是身中實相故知實相而佛性惟之可悉衆匠異説如記初卷也言故無量義經云等者如彼經德行品大莊嚴菩薩説偈讃言大哉大悟大聖主無垢無染無所著乃至無相之相有相身衆生身相相亦然注解曰如來無相之相同有相之身也衆生有相之身亦等無相之相如淨名云觀身實相觀佛亦然也測法師疏上卷釋云然釋此頌自有兩釋一清辨等云此之一句依世界悉檀辨相非無雖依實相相即是無而依世俗有其諸相故言無相之相有相身又釋此之一句辨相不空是故經言色即是空空即是色後之一句準釋空有遍諸有情謂非但佛相有空不空諸衆生相亦空不空故言衆生身相相亦然二護法等云如來諸相有其二種一者遍計所執三十二相二者依他起性因緣所生此復二種一者有漏唯是依他二者無漏頌中初句明依他有亦是真實後句準是衆生相亦空不空乃至廣説淡海記云無相之相者謂真身也有相身者謂應身也衆生身相者謂真身也相亦然者謂應身也言所以云發心畢竟二不別等者如大經第三十八卷迦葉品末迦葉菩薩即於佛前以偈讃佛言發心畢竟二不別如是二心失心難自未得度先度他是故我禮初發心今取意略引之也有一卷記云初後心中初心難發今欲歎義初發心故云二不別亦可為破迷執故云不別何有人定執初心不成佛後心方得成今為遣破執故云發心畢竟二不別今謂須初説故疏主云第二稱歎也疏云九者此八不亦是一體三寶等者時下第九約一體三寶以明攝法也言既悟法不生等者如花嚴經第九卷菩薩雲集妙勝殿上説偈品中一切慧菩薩承佛神力普觀十方以偈頌曰一切法無生一切法無滅若能如是觀諸佛常現前法藏師疏第五云以解一切法離相故云一切慧既妄取不見誰能見邪謂離妄正解佛常現前於中此初見真佛準之可悉言又大經云等者案彼經第二十五卷云如來不説佛法僧無差別相唯説常住清淨二法無差別耳疏主解云有此文者明非但魔王不解如來涅槃之相只我弟子亦不解我所説義何者我明三寶無差別者何時道三寶是一我明三寶常住清淨此二事無異故言無差別耳三寶之義義常自殊準之可悉但述義云如彼經第五卷佛告迦葉菩薩言有法名一義異者佛常法常比丘僧常涅槃虛空皆亦是常有法名義俱異者佛名為覺法名不覺僧名和合涅槃名解脫虛空名無礙善男子三歸依者亦復如是名義俱異云何為一疏主釋云正明欲引物出離故説三歸依若能體悟三寶一三三三即了真佛性等異不異也善男子有法下第二明三是一三一是三一故自有一三義三一義然具足此文應有四句而只有兩句者意欲相兼而觀此文意只説名為義説義為名何以得知如此上句以常為一名佛法僧為三義而下句言佛法僧名為名異若爾豈不上句以下句名為義以上句義為名耶故得答上問也云何為一者上句云但一別有三歸故今答雖一而異雖異而一云何作一一而難耶言以三二數同不生不滅等者此明三實體所言三寶一體者淨名疏云問云何為一體耶答涅槃經文不同若依涅槃義即三寶皆以涅槃為體是以經云菩薩思惟云何三事與我一體佛自釋云我説三事即大涅槃故名一體若據佛性論三寶三寶同以佛性為體所以經云如是三歸性即是我之性若就真諦明三寶三寶同用真諦為體是以經云若能觀三寶常住同真諦若就常義明三寶同以常為體故經云我亦不説佛法衆僧無有差別唯説常任無差別耳此並隨義説之無相違背準之疏文今云一體者約就常義而為言之言淨名經等者如彼經中卷入不二法門中寂根菩薩曰佛法衆為二佛即是法法即是衆是三寶皆無為相與虛空等一切法亦爾能隨此行者是為入不二法門疏主釋云此明一體三寶義故不二但一體三寶三處三處者一佛果上具三覺義為佛可軌名法和義為僧此通大小教論二者三寶通皆是空亦通大小但毗曇所無三者一體三寶唯大乘所有今此文明三寶無異體者正就同一無為故言不二今取意引之肇法師曰無相真智佛寶也實相無為法寶也修無為道僧寶也三寶雖異皆無為相也疏云十者師云等者此下第十約興皇舊説以辨攝法也言裁下一念心等者述義云所言下者猶置也言一一歷心觀等者別記云約諸八計而為言之非是但舉一一計也言師常多作此意等者述義云寂諸亂念修習禪定故云禪師不缺威儀守持淨戒故云律師不望名利學般若道故云行道六時禮佛種福分善故云苦節也淡海記云苦節者勤也別記云苦節者此有二義一者約六時節而言二者約身而為言之所言為者猶有也疏云問若作此十條等者此下第二問答料簡也言又作十條者由來言等者別記云但説空義故云一遣相明空也今案大義記第八卷二諦義中云俗法參差有等不等不等故精麁萬重等故因假齊一真諦唯遣故一相無相一相無相故理無淺深乃至廣説準之可悉言又作此十條者令得一正觀即徹悟一切法故釋迦等者如大品經第十三卷佛語諸天子云我昔於燃燈佛時花嚴城內四衢道中見佛聞法即得不離六度等及餘無量諸佛法行亦無所得故是時燃燈佛記我當來世過一阿僧祇劫當作佛號釋迦文爾時諸天子白佛言甚希有是般若能令諸菩薩得薩般若於五陰乃至一切種智不取不捨故準之可悉別記云四衢道者四車並去道也又云九車並去道也曇捷師云巨俱反爾雅云四達謂之衢十字交道也言頭者邊也言燃燈佛等者如涅槃無名論折難差第四云佛言我昔為菩薩時名儒幢於燃燈佛所已入涅槃儒幢菩薩時於七住初獲無生忍進修三位述義云梵語修摩提此云善慧而儒幢者儒柔也童幼也梵語摩納縛迦舊云摩那婆義譯而云年少淨行也大論云太子初生身光四邊似燈故名燃燈太子後成佛時名燃燈佛餘經云錠光佛者猶是燃澄也亦言放光佛也然則儒幢值燃燈時住居七地得無生忍今云七住即第七地言無生者畢竟空理悟無生之境故從境為名忍者解也解心安耐曰忍何者世俗故有勝義故空空者無所得也觀法本空何有生等觀此無生而起觀智故淨名云成無所得不起法忍為無生法忍之異名又此智體無有生相智即無生無生即智如此應言智即是如如即是智境智無二非生非無生故云無生法忍言三位者謂八九十三種位地準之可悉言淨名云等者此淨名經中卷文殊問疾品文所引全同故不引之疏主釋云譬如勝怨乃可為勇者此譬説也老病死等是菩薩怨亦是衆生怨又衆生怨即是菩薩怨以菩薩觀物如子子怨即是父怨也若不除子之怨父怨亦不除也兼除老病死者菩薩之謂也者此合譬也二乘但除自怨菩薩即有兼濟之道也道生注曰己及所親皆無復怨也菩薩念衆生如親無異若不除其老病死怨便是已怨亦不除矣準此等文所言兼者約就自他而為言之言又此人若自如此悟等者如大論第七十七卷云佛敕弟子若和合共住常行二事一者賢聖默然二者説法賢聖默然者是般若心説法者説般若波羅蜜是人從般若心出説般若波羅蜜説般若已還入般若中述義云所言正者梵語阿梨耶此反云聖聖者猶正也遠離擾亂邪僻邪見故名曰正心與境冥智與神會契理通神於事無權故曰聖也白虎通云聖者通也道無所不通聞聲知情故大戴禮云孔子所謂聖人智通乎大通應變窮能測萬物之情性也今應説言心不擾亂離諸邪僻而弘聖教名聖説法心不擾亂捨諸邪見而悟聖理名聖默然故思益梵天所問經第三卷云若知一切衆生諸根利鈍而教誨之名為説法常入於定心不散亂名聖默然準之可悉言故語默之間常順佛教為諸佛護念於念念中身心得住無生等者文易見也言所以常須等者述義云不負者不違也別記云不誑也門人者述義云弟子也疏云又大師云自心無所依等者如大經三十五卷佛告迦葉菩薩言我常宣説一切衆生悉有佛性當得菩提是名隨自意説如我所説十住菩薩少見佛性是名隨他意説一切衆生悉有佛性煩惱覆故不能得見我説如是汝説亦爾是名隨自他意説也疏主釋云善男子我常宣説下釋隨自意語衆生不能知有佛性而佛能知説衆生悉有佛性是名隨自意語如我所説下釋隨他意語十住少見佛性佛隨彼故説十住少見佛性是名隨他意語一切衆生悉有佛性下釋隨自他意語而文相違前既有十住少見能知自身成佛不知衆生今何得言一切衆生悉有佛性迦葉亦作此説若爾迦葉菩薩即應具知衆生有佛性今此語異十住菩薩能知一切衆生悉有佛性煩惱覆故不見但不能知衆生悉得成佛久近故前文云不知也三語異者自解此事他人不解隨自意解而説故云隨自意語也他人作此解我隨他解作此解而説故是隨他意語也他作此解我亦作此解而説故是隨自他意語何故明此三語為欲顯於佛性準之可悉別記云隨自心思而説名隨自語也隨他心思而説名隨他意語也疏云答心如步屈蟲等者如大經第七卷末佛言修一切法常者墮於斷見修一切法斷者墮於常見如步屈蟲要因前腳得移後足修斷常者亦復如是要依斷常法寶師云第三明相因起也有法喻合如楞伽密嚴經説如執菟頭無角因執牛頭有角執牛頭有角亦因菟頭無角此中亦爾如步屈蟲要因前腳得移後足疏主釋云修一切法常只應是常見耶是斷見耶今言修者只是觀察因修觀察此常見當有過即執於斷故言修常者墮斷見修斷亦然準之可悉疏云答耳目之徒等者述義云世間淺識好習法門名數禿居士等名為耳目之徒也一實相理名為一相一實智味名為一味遠離三界內外業故名為離相免五住地諸煩惱故名解脫相也別記云此有二義一離相是盡智解脫相是無生智二以理非因故云離相亦非果故云解脫相也劉糾注法花第四卷藥草喻品云相味既一故塵纍不能拘塵纍永盡衆法所不染塵法兩亡所謂滅相滅即常住義顯復曰究竟涅槃寂滅之相準之可悉疏云問弘經通等者述義云非奢者猶非如也別記云違負猶違背也會諸同異者約是違負一切諸師而為言之次第生起者有人傳云生起於文義之次第也疏云第八次第門等者此下第八門於中有二謂問與答答中又二總之與別如文言問八不等者此初問也述義云龍樹菩薩造大無畏論凡有十萬偈而今撮其中要義五百之偈為此中論此中論之極唯是八不故云無畏之中心也別記云此問大意者夫八不理即是無二今何以故二周説耶言再周明八不等者此總答也準之可悉疏云一者初牒八不等者此下第二別答於中有六今此第一約就中中相對而為言之言初明中實等者有人述有説云實無此顛倒者約就論主而為言之橫謂生滅斷常等者約就外人而為言之傳自意云此説不然睿師序云以中為名照其實也碩法師遊意云中是實為義正為義也今此處文虛實相對中偏相對計有如此生滅等者約就外人名為虛實無此顛倒等者約論主名為實也以橫謂有此生滅等者約外人為偏邪無如此生滅斷常等者約論主名為中也今撿有疏云無小所計有無大所計空無汝所計生之與滅亦無汝計無為涅槃梨耶之常亦無汝斷亦無萬行佛果一異亦無汝計無明識崛來與歸本之去無如此等八計若能了知此等八計異竟都無名之為實名之為中若言有八者即名為虛為偏無此等計強名為實為中何但八計凡有所計一切皆無名之為實謂橫洗二十七條竪淨五句畢竟清淨強名為中具明如記初卷也言次重牒八不等者有人傳有説云遊意若是中實中即假前中若是中假中即是轉假明中明假有無非有無也即是假後中此即中實義與中假中相對而言有疏云言中假者既破如此等計便謂無二諦故明中假義無汝所計性有無有如來假名因緣有無洗彼性有無盡顯如來假有假無還令悟中道如佛無異故四依出世當知是大乘三啓閻浮疏云二者前牒八不等者此下第二約中假相對而為言之準上可悉疏云三者經論八不等者此下第三約經論相對而為言之亦準上悉之疏云四者初牒八不等者此下第四約意文相對而為言之言初明意者謂佛為大心人等者如初牒長行云又為已習行有大心堪受深法者以大乘法説因緣相所謂一切法不生不滅不一不異等畢竟空無所有碩法師云又為已習等者第一正稱教之緣即是能感文有三句一是已習行二是有大心三是堪受深佛説小欲令悟大所以先為説小今次説大也有大心者如般若經明菩薩有大心不可壞如金剛能為畢竟衆作上首既道有大心等即是菩提心菩提心者名為佛心能了初後不二佛菩薩平等即是大心有大心故堪受深法耳以大乘法下第二明稱緣之教即是所感此乃正明為大行説大法以大乘法等者標所謂一切下釋大乘無別不生不滅只前生滅者不生不滅即是大乘不生不滅彼作生滅即是小乘次若生滅不生滅作二解即是小乘若了生滅不生滅不二即是大乘故經言有二見者名為小乘無二見者名為大乘既道一切法不生不滅故知此論申則盡申非但中此間佛教乃是申十方諸佛數具明如彼疏第二卷準此疏文今云大心者菩提心也言像末衆生等者如次下文云佛滅度後後五百歲像法中人根轉鈍深著諸法乃至廣説碩法師云文中有三佛滅度後下第一明迷教之時節此文語倒應云佛滅度後五百餘年人根轉鈍下第二辨迷教之意得意迷教只鈍根薄福若佛在世時人根爽利識信堅明但佛滅度後人根轉鈍識信不明所以迷教深著諸法下第二正辨迷大小乘教也準此疏文今云像末者一千年時能正悟即名正飾像行即稱像徴末行即言末也言答即不上求五陰求者如次文云求五陰十二入十八界等決定相不知佛意但著文字碩法師云此第一信小乘故失旨舉類如般若信毀品此人雖能信般若而此信即是毀故稱信毀今亦然此人雖能信小乘而此信即是失故道信小乘故失旨何故失旨聞佛説五陰十二入十八界等為有不知欲表於不有既不知佛意故便謂三科決定有即成失旨元康師云佛藏經第二卷云不淨説法者我見人見衆生見五陰十二入十八界見也今阿毗曇分別陰界入決定取相豈知佛意乎準此等文今不毗曇等故云不上求五陰等也言又不上聞等者如次文云聞大乘法中説畢竟空不知何因緣故空即生見疑有疏云下第二明稟大乘教迷大乘教言聞大乘法等者第一明聞八不之教所言畢竟空者大乘正道之異名故大品云畢竟空亦名法性亦名性空亦名為道亦名般若故畢竟空只是正道般若之異名也不知何因緣故空下第二明起迷之意何意起迷只不知因緣故空所以起迷也即生見疑下第三正明迷教佛在世聞大乘發生二慧末世聞大乘生見疑也元康師云即如此成小乘論師不信無相者是其類也五者與六者文顯可見也師云第九料簡門等者此下第九門於此門中文有二別第一約成論義以料簡之第二約北土三論師義而為言之初中又二即問與答言問成實論師云無生無滅等者均正玄義第二卷云成實師解八不不同一云八不並是真諦中道亦是真諦準之可悉言答若八不等者又云二云不生不滅是中道即是真諦不有不無中道餘六不是俗諦中道故云彼有人言等也言如瓔珞經説之者菩薩本業瓔珞經下卷佛母品文引文如記第二卷也疏云復有北土三論師等者此下第二約北土三論師義而為言之於中有二初述計後破此文初也藈法師疏第一卷云初云不生不滅者此偈略作三對解釋第一就空理解第二就緣起事解第三對執解就空理解者明法性本空非起非出不得名生復非終盡不可名滅非定有故不得名常非定無故復不得名斷一相無相故不可名一空無差別故不可稱異前際空故不可説來後際空故亦不可説出亦可直言所以不生不滅不常斷者良以諸法畢竟性空故言第二就緣起事釋等者次文云二就緣起事解者明法性真空即是因緣深理理雖無生而衆緣合故名用即生緣離散復名用即滅既生滅屬緣寧有實生實滅故云不生不滅次言非常非斷者然因緣之法則因緣果與因性故非常果續故非斷故云不常不斷次言一異者明因果不同不得為一無別兩體不得為異故云不一不異次言來出者果從因生不從外來緣中無果不從中出故云不來不出此明因緣起法性相如是離於定性言第三就對執釋等者次文云第三對執解者對於二乘外道情也薩婆多部云大生生六法小生生一法乃至住滅亦如是外道人言從冥初生覺四緣生知如是等人皆説生滅今對斯二人所執故云不生不滅言小乘人言等者次言斷常者小乘人云三無為是常得道入無餘涅槃是時五陰都盡故名為斷外道人言虛空微塵時方神等不從因生故名為常為因生法必當歸盡故名為斷或言過去有故為常未來有邊故為斷此皆不然故云不常不斷言小乘言等者次言一異者小乘人云諸法同在無常共相故一諸法各各自相故異外道言因果俱有故一相別故異此實不然故云不一不異次言來出者小乘人言未來有法流入現在故名為來現在之法流入過去故名為出外道人言諸法從微塵世性梵王等邊來後時還歸於本故名為出此皆不然故云不來不出此明破執顯理準此疏文今云北土三論師者藈法師也有人引初牒述義云釋僧道師義等者非也別記云一相亦無相故云一相無相也過去世名前際未來世為後際謂約空理而為言理時三世皆空故云爾耳言薩婆多云等者如雜阿毗曇心論第二卷行品云當知前四相相各為八法隨相亦應知相相唯相一釋論云前生除自己生八法三相四隨相及彼法住異滅亦如是三相四隨相及彼法自性不自為故自性不自滅如指端不自觸此四隨相各為一法隨生生前生乃至隨滅滅前滅廣説如彼述義云彼宗明法生時通自體九法俱起謂自體為一四種本相及四隨相即生生等然本相中除其自體生餘八法謂自性并本相中住異滅四隨相是也隨相生生唯生本生住異滅亦如是此四是有為相於法能起名生能安名住能衰名異能壞名城大小四相各有三名大相三者一名本相對隨相故二名大相對小相故三單名生等對生生等故小相三者一名隨相隨本相故二名小相形大相故三名生生等對生等故準此論文今云薩婆多者法勝論師也言外道言等如百論下卷破常品初外曰應有諸法無因法不破故修妬路汝離故有因法不破無因常法如虛空時方微塵涅槃是無因法不破故應有諸法疏主釋云此舉無因釋成常義內外大小義並同之雖正破外道五種常法傍破內人五種常義然只四種外道執常此事難明然今此品品同計同準此論文今云外道者通一異等四種外道也言或言過去等者述義云過去於過去而不謝故云有故為常也未來於未來而不在唯以來於現在故云邊故為斷也別記云有外道云過去是有未來是無以是現在有之邊故云邊所言邊者無之異名也今依此説故藈法師疏云未來有邊故為斷也梁攝論第十五云此明威德力諸外道多行非力便若見外道多行苦行以計有未來生故故斷見外道多行樂行以計無未來生故有人引百論破常品疏文云通四外道者不爾能破所破不相應故何者彼疏云世師九法中時是主諦之一法何言通四耶今應云此破勝諭師也故彼疏云此偈本破其三世時是常正捉外過去是常破無未來也過去時既常即過去定住過去不轉作未來故未來中無過去故云過去未來中無以過去住過去不轉作未來是故無未來也然今此計不常此處也言小乘云未來有法等者疏主釋云數人但有一種三世謂從未來來現在從現在謝過去也成實明二種三世一者實法三世略同數人二假名轉變三世謂從過去來現在從現在至未來具明如去來品疏言外道云等者所言從微塵生者如文軌師因明疏中卷云勝論師宗極微是常謂空劫中有細極微散在處處後劫成時有情業力令諸細微兩兩和合各各生一麁子果微其子微量等二細微如此麁微復相和合轉生麁者如此漸增乃至合生器世界也後劫壞時極麁大者先為交壞漸漸乃至初子果微如此麁果悉遷滅盡唯有根本最細極微不為交壞故是常也準之可悉世性生者琳法師云所謂從冥生覺乃至十一根等後時次第而壞還至本處準之可悉言梵天等邊者如提婆論中圍陀論師説從那羅延天臍中生大蓮花從大蓮花生梵夫梵天作一切命從梵天口中生婆羅門從兩臂中生剎剎從兩髀中生毗舍從兩腳跟生首陀一切大地是修福德戒場生一切花果以為供養化作山野禽獸豬羊驢馬等於戒場中殺之供養梵天得生彼處所言等者等取自在天等也疏云今明若得意用之等者此下第二破此中又二縱之與奪奪中又三第一言但詳此釋意等者破空理釋第二言第二若云等者破緣起釋第三言第三云等者破對執釋也縱破中言以初者有人傳云合訓初也疏云新通門第十等者此下第十門於此門中大文有二總之與別總中言餘至關內等者淡海記云疏主在江南之時真諦三藏下外於日南處不見三藏所翻經論後遇國破到於關內始得此説以此更釋八不之義故云新通所言餘者玉篇餘諸反我也疏主指己自稱云餘也言無上依經者靖邁師圖記云無上依經二卷沙門波羅末陀此言真諦所譯沙門慧愷筆受疏云八不為四人説等者此下第二別釋於中有四第一辨各為四人第二辨破四障第三辨行四因第四明得四果今此第一辨各為四人以釋八不如無上依經上卷菩提品佛言阿難若人貪著三有誹謗大乘名一闡提墮邪定聚一石人著無行無方便墮不定聚復有著無行有方便不著有無行平等通名正定聚如世親佛性論第二卷相分明因品云若略説世間有三種衆生一樂生死恆有復有二種一憎背解脫道無涅槃性決樂生死不樂涅槃二已墮定性者非聖非凡進退無取而是佛法內人憎背大乘法因此人故佛説是言我非是其師其非我弟子舍利弗此人從輕暗入重暗復從重暗入於盲暗取暗為友復取闡捉為友是故我説此人如是二樂滅生死有復有二種一墮非方便二墮方便中就墮非方便復有三一外道九十六種二是佛法內人與外道同執約正法起邪執我見故於正教義不能了達因此人故佛説是言若不信真空即與外道無異復次增上慢人取空為見是真空實解脫門約此空解脫門起於空執謂一切有無普皆是空此空執者即無所有無所有故因果二諦道理並失執此空過故即墮邪無此等執者由空而起故成邪執一切邪執莫不由空故能滅除此執既依空起故不可治因此人故故佛語迦葉若人起我執見如須彌山王我亦許之何以故以可滅故若此增上慢人所起空執猶如髮端四分之一我急呵責決定不許二墮方便中有二一聲聞人自利修行但為自度不為利他二獨覺人於利他心無樂事但起捨心無樂者不樂利他無事者無度人之事準為自覺自利故但起捨心者捨是平等住心不願利人亦無所損獨自覺悟故言獨覺墮方便聲聞亦爾三兩俱不樂有無並亡謂修行大乘最利根人既不同闡提樂生死有亦不墮非方便同外道執亦不墮方便中如二乘人是故此人具行生死涅槃平等之道住無處雖行生死而不染雖行涅槃亦非淨但為大悲故不捨生死為般若故不捨涅槃不離涅槃者異聲聞執永住無為不捨生死者異一闡提樂於生死若樂著生死者名一闡提佛法內人墮定位者亦同闡提如是二人墮在邪定聚中若樂滅生死有者是人墮非方便中則在不定衆若人樂滅生死有是人墮方便中及但不樂得前二者修平等道是在正定衆中準之可悉疏云次明八不對治四障等者此下第二辨破四障也如彼經云菩薩有四種惑障菩提果一者棄背大乘法二者邪執我見三者畏生死苦四者不行利益他衆生事論云四障者一者憎背大乘二身見計執二怖畏死不樂觀利益他事初障闡提二障外道三障聲聞四障獨覺由此四惑令能四人不能得見自性清淨法身準之可悉言如五百婆羅門云等者如涅槃經第十二卷佛告文殊師利言我念往昔於閻浮提作大國王名曰仙預敬重大乘方等經典時世無佛事婆羅門通十二年即作是言師等今應發阿耨菩提心婆羅門言大王菩提之性是無所有大乘經典亦復如是大王云何乃令人物同於虛空我聞誹謗方等即時斷其命根乃至第十六卷云諸婆羅門命終之後生阿鼻獄即有三念一念我從何來即知從人道來二念今生何暖即知生阿鼻獄三念我何業生即知我謗法業國王所殺而來生之即於大衆生信敬心尋時命終生甘露鼓如來世界壽命十劫準之可悉淡海記云仙預國王以畢竟空欲度五百人都不信受還發謗心故王知其機於無量劫可墮何鼻地獄故一時悉殺之言經云若言等者金剛般若經末云佛告須菩提若有人言如來若去若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故如來今略引之疏主釋云下第十三章經來者論生起云菩薩既不受福德則不生世間天王人王云何得往來六道利益衆生耶故今釋云菩薩雖不受世間果而化身往來六道作人王天王利益衆生法身常住即無有去來勿見化身去來利益物便言法身亦有去來勿見法身無去來謂法身亦無去來此中正明化身有去來破法身有去來疑故云若言如來法身有去來者不解法身之義問若爾還是從來義耳答不定義故開二身無去來去來是化來去來無去來是法身皆是為物作此名字耳至論正般若未曾二不二去來無去來準之可悉言此並是用二悉檀意等者所言各各為人者舉境破迷執以我無我是所執境言對治者就行對治迷執以不淨等三是行故疏云次明以四法為四人等者此下第三辨行四因如彼經云阿難不著有無修行平等唯除四人餘有四人一者闡提二者外道三者聲聞四者獨覺有四惑障不能證得如來法身無上菩提何者為四棄捨大乘是闡提障為除此障我説菩薩修行信樂大乘真法於一切處謬執我見是外道障為陰此障我説菩薩修行般若婆羅蜜於生死中厭畏疲極是聲聞障為除此障我説菩薩修行破虛空三昧門背利益他小事為足是緣覺障為除此障我説菩薩修行大悲論云離發行大乘修習無障道人之外所餘闡提外道聲聞獨覺等四人有四種障故不見佛性何者四障一憎背大乘是闡提障為對治此故佛説菩薩修習信樂大乘之法二於諸法中起我見執是外道障為對治此故佛説菩薩修習般若波羅蜜三於生死中定執苦相及厭怖心是聲聞障為對治此故佛説菩薩修習破空三昧空三昧者從初地以上能得此三昧即破虛空等物二執入觀之時不即有無離有無喻如八地真俗雙觀而異八地者八地以上無出入觀初地入時則同出時則異四背衆生利益事作捨衆生意是獨覺障為對治此故佛説修習菩薩大悲菩薩大悲利他為事明獨覺人但自觀因緣無度他意故無大悲聲聞亦爾為滅此四障故以信樂等四種為因準之可悉別記云破虛空三昧者莫著小乘涅槃之語也破者莫著之義也空三昧者謂涅槃也約寂滅義云三昧耳也菩薩修習大悲者約自他不二觀行故云修習也疏云次以四法為因等者此下第四明四果也如經云此四種人有四種惑為除此惑説四聖道因此勝義治四顛倒能證如來無上法身四德波羅蜜果一者最淨二者真我三者妙藥四者常住如佛性論第二卷相分顯果品云由一闡提憎背大乘為翻彼樂生死不淨故修習菩薩信樂大乘法得淨波羅蜜由諸外道於五取陰中執見有我為翻其我執虛妄故修習般若波羅蜜至得最勝無我即我波羅蜜由諸聲聞人怖畏生死苦樂住生死苦滅靜中為翻此樂意故修習破虛空三昧一切相世出世法樂波羅蜜由獨覺聖人者不觀衆生利益等事但樂獨處靜住為翻此意故修習菩薩大悲為利益衆生乃至窮於生死常所護持常波羅蜜如是信樂大乘般若波羅蜜破虛空三昧菩薩大悲等四因能成就如來法身四功德波羅蜜是故佛説由此四德一切如來唯法界為勝乃至廣説準之可悉別記云以非外道一異之我等者有外道云一切衆生之我者是一故云一我也又云別別有故云異也又云常身我是一作身我是異雖轉人天而我是一故云常身我也隨所受身常在不離故也受於天身及以人身而隨所受身別別有故云作身我也言攝大乘論者述義云陳時沙門真諦又云拘羅那他此云親依西天竺人之所譯也凡有十五卷是也中論疏記卷第三之末英憲建長七年九月二十四日於光明山往生院奉書寫畢願以書寫之功廣令流布三論之法願以結緣之力普令利益六道之衆生而已智舜春秋五十七寫本記云保元三年三月二十四日巳刻於東南院書寫畢三論宗沙門章睿之文明五年六月二十六日申刻自猿方買得之同宗相似沙門良瞱
