body:
  text: 中論疏記卷第七之末大安寺沙門安澄撰觀業品餘疏於是中分別等者言一得果捨果等者案康疏云凡夫業為有漏須陀洹已上至阿羅漢業為無漏又云以須陀洹等受身業為有漏得果業為無漏述義解云此之二滅等者就前三果捨果與向名二滅如前明之準之可悉言三者羅漢等者述義解云不失法所持之業如似手足等雖報身有漏而其智無漏故云羅漢捨故業準之可悉疏復次不失法等者言又從業自分因相生等者述義解云自分因業有可生自分果之業此從業生業義也言如初習業輕等者述義解云如作羅網人初作時惡業輕然作不已轉久惡業為重言然又有臨終等者述義解云有人現行五戒十善臨終起邪見心墮惡趣等又現作十惡五逆臨終發菩提心懺悔生天堂等如大論引佛經説應知言從現行滑利業等者述義解云現在雖作善惡之行將死七日之間有善知識為修善者生淨土為作惡者墮三途準之可悉言滑利者玉篇云滑獲八反野玉案説文滑利也謂滑利不澀也利害之利亦曰滑也言業謝過去等者述義解云現在時四相所切過去冥伏時不為所遷既言謝過去故現在之業四相所切言曾者就現在業又大小四相之中小四相用但現在大四相用通三世故業現在時雖四相切而過去時但小四相切而大四相不可切準之可悉疏答曰是義俱不離斷常過等者言答此法持業等者案碩疏云不離斷常可有二義一明若有不失法持業至果者則名為常若持業不至果前滅則名斷二者不失法理數是無常則與業同何能持業若是常者則是無為無為何能持有為業耶是無常即墮斷是常則墮常故不離上斷常過準之可知疏答曰下第二七偈二章等者言初又二前兩偈等者案碩疏云就第一兩偈即為二章初偈明隨緣説世諦不斷不常第二偈明隨緣説第一義諦不生不滅準此疏文應言前偈明世諦不斷常次偈明第二義諦不生滅而言前兩偈者前之字謬寫耳述義解云應言前偈明二諦不斷常謂上半初句雖空不斷者是世諦次句雖有不常者是第一義諦故云明二諦也言涅槃云若以聲聞心等者案彼經第二十四卷云若依聲聞言不見施及果報是則名為破戒邪見今取意引之述義解云此有二義一者聲聞不知實相以不知實相心而言無布施故名破戒邪見二者放生是布施若無布施即不持不殺戒故名破戒邪見也言智度論云聲聞之空等者案彼論第三十七卷釋習應品下末云下墮聲聞辟支佛地者空相應有二種一者但説空二者不可得空但行空墮聲聞辟支佛地行不可得空空亦不可得則無處可墮復次有二種空一者無方便空墮二地二者有方便空則無墮處直至阿耨菩提今取意略引之言九道業者三乘與六道業也言影師論序云等者此偽秦長安曇影師此論序文今案彼序末云以真諦故無有俗諦故無無真故無有即雖無而有俗故無無則雖有而無今取意略引之疏王釋云真故無有雖無而有則是不動真際而建立諸法俗故無無難有而無即是不壞假名而説實相述義解云於非有假説有於非無假説無言真際者猶真諦空則非有義立諸法者謂假説有言假名者猶俗諦法即非無義説實相者謂假説無所言動者猶失也乖也言雖空而有等者此亦影師語故案彼疏釋此偈處云真諦空故雖空不斷俗諦有故雖有不常佛以此義説業不失如何者此不失便謂真諦準之可悉疏若業有性下第二破外人義等者言答論有多體等者述義解云多體者體猶宗也言下半罪福等者案琳疏云損害為罪利益為福若有定性便不可損益害豈有罪福之差準之可悉疏問曰下第五番等者言仍上最後等者案上疏文云後一偈舉煩惱破業準此疏文今言領無因者即上最後從以煩惱破業之文而生起也而述義解云以煩惱破業生者成論者云以見諦惑潤業以修道惑發業數人云以見修二惑潤業以修惑發業此解非也尋之自顯也疏答俱舍論云等者別記解云煩惱者正非是因而業是正因今案彼論二十字缺疏問曰下第六番破起業人義等者言毗婆沙云等者案彼論第二十卷無慚無愧品云問曰如無明是蓋亦是結愛亦是蓋亦是結何以唯説無明覆不説愛覆耶答曰或有説者欲現種種文種種説故若有種種文義則易解復有説者蓋義是覆義更無有結覆衆生慧眼如無明者繫義是結義更無有結繫於衆生者猶如一人有二怨家一縛其手足二以土坌其因是人被縛無因不能有所至如是無明覆衆生慧眼愛結繫之不能趣向涅槃以是事故尊者瞿沙作如是説以無明覆愛結繫故不善法得生今取意略引第二説之言下半立作受二者等者案琳疏云下立作從二者不一不異實法故作者神人謝滅於前牛生於後是故不一假名相續轉人受牛所以不異準之可悉疏答中二偈為兩等者言涅槃經云等者案彼經第十九卷耆婆答阿闍世王言大王若當於佛所聞無作無受所有重罪即當消滅今取意略引之疏主釋云佛則能治身法則能治心具示治身心處則答上言也無作無受者此作受畢竟不可得故是無作無受也與外道六師所説無作無受者彼唯有無作無受一句此中有三句義所以不同言五逆罪滅者世有五人不脫地獄謂五逆罪世王應具三逆而一成餘二逆不成故護財象害佛不成又欲害母復不成今正殺父一種而經云無量無邊罪者殺父復是殺君復是須陀洹人即是無量無邊罪經中説有七逆足殺和上阿闍梨但今言五逆者此五逆之中一故云五逆罪滅也疏答中三偈為二等者言肇公用此作不真空論等者案彼論云故放光云諸法假號不真譬如幻作人非無幻化人幻化人非真人也康疏解云此有三讀一者連三句通為一段二者譬如幻化人為句後兩句相著也三者譬如幻化人非無幻化人為句已後為一段今且從初也幻化異者從無起有為化從有起有為幻也非無等者非無者即非無也非真者即非有也言答佛化與餘人化凡有三異等者述義解云佛滅後能留化者大論第八卷云諸外道及聲聞滅後不能留化如佛世尊自身滅度後復留化如佛無異又第十卷云有時暫來北天竺月氏國降阿婆羅龍王又至月氏國西降女羅剎佛在彼石窟中一宿于今佛影猶在有人就內看之即不見出孔遙觀光相如佛又西域記云北印度那揭羅曷國城西南二十餘里至小石嶺深澗東岸有大洞穴瞿婆龍王之所居也昔有佛影煥若真容近代已來人不遍覩至心祈請暫視不久此龍請佛常居此窟又請諸弟子恆受我供養佛即告龍吾涅槃已後為汝留影遣五羅漢常受供養汝若毒心起時觀吾留影以慈善心毒心當止此賢劫中當來諸佛悉以慈悲為汝皆留影也言毗婆沙云佛但説於七使等者三十四字缺言分別七使為九十八者所言七便者案康疏云衆事分阿毗曇論云謂貪欲使瞋恚使有愛使慢使無明使見使疑使能衆生回轉三界故名為此七便中第一及第三是貪第二是嗔其餘是癡此則分別三毒為七使也準之可悉言九十八使者案琳疏云依毗曇約三界五行下欲界有三十六苦下具十使謂貪瞋癡慢疑身見邊見見取戒取邪見也集下七除身邊二見及戒取滅下七亦除三也道下八除身邊二見思惟有四謂貪瞋癡慢合三十六使也色界五行下三十一苦下九除瞋集下亦除身邊二見瞋及戒取滅下六如集道下七除身邊二見瞋思惟下三謂貪癡慢合有三十一無色界五行下亦三十一與色同三界合九十八使準之可悉言又成論破九十八云等者案彼第十一卷雜問品第一百三十八云問曰若爾者不名九十八使答曰諸使隨地斷不隨界故不限九十八也聰法師疏解云問意是十使通迷四諦者不名九十八使應欲界中三十色界中四十無色中四十合百二十八使以思惟十二足前百三十二使答意並破數義汝義約云界制立九十八使而斷諸使隨地斷不隨界斷若爾汝使頭數應不限九十八使何者明無漏智斷使者斷欲界中四諦下三十二使斷色界中四諦下二十八使斷無色界中四諦下亦爾斷欲界中思惟四使斷初禪思惟三使斷第二禪思惟三使乃至斷非想思惟三使都合百十六使若以有漏等智斷使者斷欲界三十六使斷初禪三十一乃至不用處三十一都合二百五十三使故言不限九十八使若論主制立九十八使者約小乘教門此門衆生不離三界過患故同數義制立論主欲破迷通門執教門曲執故舉迷四諦理通門一邊執別門偏破耳今取意引之言九結者七使等者案琳疏云九結者謂貪瞋癡慢疑見結他取結慳結嫉結述義解云七使者是根本也慳嫉是支條也七使與慳嫉為九結故云根支合説也言十纒六垢等者案琳疏云十纒者謂瞋慢睡眠調悔無慚無愧慳嫉也六垢者謂惱諂誑高恨害也述義解云十纒之中七但在欲界三在色界就三之中諂誑於初禪發也憍至於第四禪也疏主解云五鈍使為五結也身見邪見邊見此三見為見結也戒取見取為他取結合五利為二結也十纒之中偏舉慳嫉者雜心云此二但是不善又是獨頭而生故偏取之婆沙云為帝釋修羅故偏取慳嫉入於九結帝釋慳甘露食嫉修羅美女修羅慳美女嫉帝釋甘露食也故説慳嫉入九結中也準之可悉疏第八卷觀法品第十八疏此品所以來者凡有三義等者約此品來由凡有二門第一明品來由次問法是何義下第二明品名目初中有二第一明遠來由次近從業品生下第二明近來由初中有三第一約通方觀行以明來由第二約破病以明來由第三約實相體用以明來由此文初也言通方者述義解云猶泛論之異名也疏二者破病故來等者此下第二約破病以明來由於中有二初約總別觀以明來由次問答以顯來由此文初也言論有總別破等者述義解云此論因緣品中破四緣七偈中分為總別也言經明廣略等者述義解云如大品經説般若道有廣略等也疏問為破顛倒法等者此下第二問答以顯來由凡有三問答如文言又此論二十五品大開三意等者述義解云此事前後相違何者初大科處云二十五品分為二初二十一品破世間人法辨大乘觀行後四品破出世人法辨大乘觀行就二十一品分為三初十七品破邪執明實相次一品明得益後三品重破執明實相今此處二十五品分為三初二章加前三從破時品以下七品重破執明實相言雖廣略而意旨同言答依智度論解習應品等者案彼論第三十六卷釋習應品中佛告舍利弗言菩薩摩訶薩習應五陰十八界四諦十二因緣一切諸法空若有為若無為是名與般若相應乃至第三十七卷釋習應品下半卷廣説菩薩習應般若故云初説菩薩習應般若言次中間明得益等者案彼論釋習應品下第三十七卷云舍利弗菩薩摩訶薩能如是行般若惡魔不能得其便世間衆事所欲隨意十方各如恆河沙等諸佛皆悉擁護是菩薩令不墮二乘地四天王天乃至阿迦二吒天皆悉擁護是菩薩不令有礙是菩薩所有重罪現世輕受何以故是菩薩用普慈加衆生故言辨得益竟等者同卷次下文亦明習應廣説如彼論主釋曰相應有二種一者心相應二者應菩薩行所謂生好處值遇諸佛常聞法正憶念是名相應也言如來説經等者如來説大品經既有此三龍樹菩薩造論亦有三義不可異人也述義解云明得益者由悟實相隨分證三乘果等是也疏三者自上以來明實相體等者此下第三約實相體用以明來由於中有二初直明體用次問答以顯體用於中有二即問與答如文言九十六術皆云等者二十八字缺言阿毗曇人以四真諦理名之為實者案雜阿毗曇心論第六卷賢聖品云入法中總觀得法真實相此四是無常空無我非樂疏解云此一偈明總相念處入法中總觀者入懷緣法念處中總觀一切法得真實相者離常樂等例名真實相此四是無常空無我非樂者四念處皆是無常及以非樂又論第七卷定品云真實者不顛倒謂四真諦又第一卷界品云真實者四聖諦不顛倒謂以學八忍八智見彼真諦故名見真實疏解云真實者涅槃果法也四聖諦者此四為聖人所成就故名聖諦不顛倒者上解諦義故婆沙云實是諦義審義如義不顛倒義不異義是諦義準之可悉言成論云唯一滅諦等者案彼論第十六卷一諦品云問曰若不以四諦得道以何法得道答曰以一諦得道所謂為滅準之可悉言南方大乘等者述義解云成實論師云真諦四忘故四句之所不及是究竟義故云真實問今宗真諦與彼何異答彼是開門真諦故不究竟今宗合門真諦故是究竟故知異也言北方實相般若等者述義解云智度論師云實相非般若以能生義故名般若問此與今宗何異答約實相有二謂體實相用實相彼是用實相今宗是體實相故知異也言乃至攝大乘學者等者述義解云舊攝論師云阿梨耶識轉微之時名阿摩羅是即涅槃故彼引論云生滅不生滅合名阿梨耶然則生滅為阿梨耶不生不滅為阿摩羅此約細時言之具明如名記第二卷也言今總而究之等者述義解云大論之中具舉四論有無名不實論亦有亦無名二邊論非有非無名愚癡論非非有非非無戲論論準之可悉言故涅槃云等者案彼經第三十卷陳如品末云善男子是相法界畢竟知第一義諦第一義空下智觀故得聲聞菩提中智觀故得緣覺上智觀故得無上菩提法寶疏解云第三辨觀不同也是相等者牒前實相等四也下智觀故以下明三乘人觀彼四法淺深不同得果異也今取意引之言故淨名經云等者此即彼經中卷觀衆生品文今略引具如明記第四卷而言從無住本等者疏主解云由無住故想倒想倒故分別分別故貪欲貪欲故有身既已有身則善惡並陳善惡既陳則萬法斯起故云從無住本住一切法也而言無住者是諸法實體為一切法本既稱無住則絶四句忘百非言斷慮窮然則實相更無有本準之可悉言今舉其二等者述義解云問我無我是明今何故言體用答我無我之非我非無我義即是體故即而言也問一乘具體用今何故但就用答一乘之言教就於實相開若一乘所詮之理即是體也五百部乃至圖書讖記由如此書應悟實相故皆是實相之用也疏近從業品生等者此下第二明近來由案碩疏云此品來者從前品生上外人執有業行為救有諸法論主即破外人即云若爾都無業行果報便墮斷見中論主答雖空不斷雖有不常此論所説離斷常既不斷常即無生滅彼云若無生滅無有業行果報者今那現見有果報事相顯然既有苦樂果驗知有善惡業行故前品末論主舉幻化復化作人為答化人相色顯然對眼而實緣無所有業果亦爾外人因此稍欲生信但未知苦為能得悟即請問觀行方法論主示其觀行方法故云觀法品準之可悉疏問法是何義等者此下大段第二段問答以釋品名義文中有二即問與答如文言如云正法等者此即六十花嚴經第三十五卷普賢菩薩所説偈文今略引第一句疏主釋云夫正法性非有非無非亦有亦無非非有非非無故言遠離一切趣此則一切諸法之本諸佛菩薩得正法根本故名聖人謂諸佛如來登地以上大菩薩等得正法性故名聖人準之可悉言又云一切無礙人等者此亦花嚴經第六卷中普賢菩薩答文殊問之偈文今略引之述義解云一切無畏人者諸佛悉離煩惱業苦諸怖畏事故稱無畏一道出生死者舉一道之利益以體道之人必離生死故自他俱以一乘之道出於生死如法華云我及諸子若不時出必為火燒雖復自他以一乘道俱出生死而今唯論衆生何者若有無畏之人何言從生死出其所言出為開生死為不開耶若言開者雖言為出猶在於內若不開者無生死處應言出是故若不言從生死出者即知出於生死外故是有畏人既言從生死出故知即在於生死內是故為無畏人然即出生死者了悟生死涅槃無二乃名出生死耳雖出生死而無所出是故無出而出出而無出如此妙悟悟諸衆生令出生死以此半偈證前化他義準之可悉言二者自體名法等者述義解云身口色聲是教由此顯理故又色心自體是詮表之教以此色心詮非色非心之法故此色心空義是理教也言大論十八卷明識所緣法等者案彼論第十九卷釋初品中三十七品第二十云問曰法念處是外入攝云何言觀內法答曰除受餘心數法能緣內法心數法是內法緣外法心數法及無為心不相應是為外法復次意識所緣法是名為法如佛所説依緣生意識是中除受餘心數法是為內法餘心不相應行及無為法是為外法今取意略引之慧影疏解云問曰法念處下第四次釋法念處中三種觀也法念處既是法入為意入所緣故云外入攝也答曰除受者乃屬法入攝但四念處分受既屬受念處故云除受也餘心數者即是想數行數法念處中此之二數是心法故能緣內外若緣內法者即屬內法念處也此數等若緣外者即屬外法心不相應行等故宜是外法也如佛所説以下明依緣生識緣內法名內緣外法名外耳緣能生識故意識緣時諸數必隨除於受數餘隨意想行數等以隨意故意識屬內此數亦隨得云屬於內法外法內外法亦如是也然述義云大論第十二卷云一切法者識所緣法是一切法所謂限識緣色等復次智所緣法是一切法所謂若智等今略引之讖所緣法者是意識所緣法就因位中智所緣法者就佛果智也今謂不爾以前為正也言外道亦有此三法者述義解云一軌則名法謂二十五諦法是二自體名法如內色等法是三神所緣法如內意所緣法是也言數論因明此之三法等者三十八字缺言十地經云等者案花嚴經第二十七卷十地品第七地偈文云若到於第八菩薩智慧地爾時過意界住於智業中乃至第九地偈云譬如幻化示種種身色如是諸身相皆無有實事今取意略引二處文言問淨名經云等者案彼經中卷文殊問疾品有此文所引全同疏主釋云此下第三將欲尋物病原故前斷義菩薩自斷乘及空等三病今復欲斷衆生三病者實無三法可除但除空謂病耳如眼病見空花但治眼病無空花法可除故云不除法也又一義不除法者但破衆生執性有等病不除因緣假名法也故涅槃云但斷取著不斷我見我見者則佛性也此二各有其義非無兩釋準之可悉言二者涅槃經云等者此即彼經第五卷末文今略引之疏主解云唯斷取著不斷我見者他云但斷假實二惑不除假實二境故言唯斷取著論人言但斷虛忘取著不除法即法門也今謂淨名經云但除其病而不除法釋此文有二一義言但除心謂分別無所立可除故言但除其病而不除法此非今文意也二者但除理外有所得取等不除理內假名四句以其我無我等因緣佛性義故論云諸佛或説我或説於無我等是今文意也若有所得我無我四句此即竪論若無所得我無我四句此是橫辨何故爾有所得四句是逐執辨一人執有我以無我為破復執無我故以亦我亦無我為破如是乃至四句故是竪論若無所得我無我等四句因緣具足即是佛性故是攝論也問若不除理內法者與地論不除法界法門若為異耶今明彼法門始終常有不可為無成論人云假實兩境今明因緣有豈有法之可有變此故大異彼也疏前問意云從因緣品等者言若以實相入實相等者案大品經第三十六卷實際品云須菩提白佛言若實際即是衆生際菩薩即為建立實際於實際佛言須菩提實際不可建立於實際今菩薩行般若時以方便力故建立衆生於實際實際亦不異衆生際實際衆生際無二無別大論第九十卷釋云須菩提意謂菩薩為度衆生故行般若佛意衆生假名虛誑畢竟不可得菩薩為一切實法故行般若實法即是實際準之可悉疏答滅我我所名為入等者言如今學大小乘人等者述義解云言菩提是所證者就理言也言花嚴云如來深境界等者彼經第六卷明難品中文殊所説偈文所引全同法藏師疏解云此偈答境界上半舉所入法此通二義一齊者等也謂齊等虛空則色真如為所緣境也二齊分齊也謂齊法性真空已去是佛境又上句深下句廣也下半明衆生證入言無所入者以衆生則法身故無更入如常在虛空豈得更言入虛空也準之可悉言大集經云等者案彼經第十八卷末云不可説菩薩語無所衆菩薩觀諸法等名之為佛乃至無轉無説故名轉説無入之入名為法入無門之門名為法門今略引之言亦如開般若宗身子問等者案大品經第一卷末舍利弗白佛言菩薩云何應行般若佛言行般若時不見菩薩不見菩薩字不見般若亦不見我行般若亦不見我不行般若乃至菩薩行般若時不見一切名字不見故不著今略引之言智度論第一卷等者案彼論第一卷末如是我聞一時釋論第二云如説阿陀婆耆經摩犍提難中言決定諸法中橫生種種想悉捨內滅故云何當得道佛答言非見聞覺知亦非持戒得非不見聞等非不持戒得如是論悉捨亦捨我我所不取諸法相如是可得道摩犍提問曰若不見聞等亦非提持戒得非不見聞等非不持戒得如我心觀察持啞法得道佛答言汝依邪見門我知汝癡道汝不見妄想爾時自當亞今略引之慧影師疏解云此中問答臨文當廣説而難言決定法者彼執言但外法可捨不捨內法決定如此內法者即是神我佛云何於此決定法中或復説有或復説無故難佛云橫生種種想若捨內法者則無得道人內法既捨誰復得道執此義故所以難佛云悉捨等也此人執云外法一向定可捨是斷見內法決定不可捨是常見故佛舉非見非不見聞等中道實義來破其境令入中道不知佛法聖人若其則已般若為心論其語也則詮談實相文字性離語無語相即是解脫不解脫不解其指故言行亞法得道也佛答意云汝之妄想不見此理故自言持亞法得道若如汝所見者明若離持戒亦不得道執著持戒相亦汝自當行亞法非佛法中持亞法也應云汝妄相不見爾時自當亞但婆羅門語多倒故乃云汝不見妄想心耳一云非見聞等已下二句明離有見非不見聞等已下明離無見如是論悉捨一句雙離二見亦捨我我所一句離非有非無見也不得道內外兩妄乃可成聖故云如是可得道也述義解云摩犍提者外道名也偈者為通此人難而佛説偈也行亞法得道此就惡亞汝爾時自亞亞此就善亞亞者離著之義也疏偈本關內舊分之為三等者言關內舊等者二十九九字缺言近代人云等者案康疏云此偈文而諸家不同擇善斯從不善斯改深師最往今所據用然取其意不取其言也十二偈分為三章初有五偈明小乘觀行破小乘所破之法解聲聞人悟入實相次有六偈明大乘觀行破大乘所破之法解菩薩人悟入實相復有一偈明中乘觀行破中乘之法解緣覺人悟入實相準之可悉述義解云言近代人者疏主同時人也言又依長行末等者案此品長行末云佛説實相有三種若得諸實相滅諸煩惱名為聲聞法若生大悲發無上心名為大乘若佛不出世無有佛法時辟支佛因遠離生智乃至少觀厭離因緣獨入山林遠離憒鬧得道名辟支佛疏主釋云下第二別釋即是偈中三章初釋第一聲聞法若生大悲下第二釋菩薩法若佛出世下第三釋緣覺法蓋是青目自聞偈為三準之可悉言一師相承開之為五等者案碩疏云答中有十二偈開為五初一行半明除我與我所兩病次第二有一行半明得無我慧第三二行明二種涅槃第四五行廣序佛教第五兩行明三乘人得益不同也述義解云一師者古舊三論等也疏就初五偈明聲聞觀等者言上半破即陰我者案琳疏云如毗曇明只陰其人成論復有即陰義若作此計同外道計有神我故破云我即為生滅準之可悉言下半破離陰我者案琳疏云如成論明攪陰成人別有假人異陰此同外道所計神如虛空等準之可悉言又云我有赤白等四色者案成實論第十卷身是品云有人見神如麥如芥子等住於心中婆羅門神白剎利神黃遠神赤首陀神黑案大經第八云却後數時先逃王子從國還來本云復得為王既登王位復問諸臣汝見刀不答言大王臣等皆見覆復問言其狀何似答言天子其色清淨如優鉢羅花復有答言形如羊角復有説言其色紅赤猶如火聚復有答言猶如黑蛇時王大笑卿等皆悉不見我刀真實之相法寶師疏解云第五聖復本化辨邪異聖喻也待此衆生道機熟時先去菩薩還來現化名後數時先逃王子等者先去菩薩成佛度人名得為王也既登王位等者微憤責實也延云如優鉢羅花等者喻彼外道四色之我外道計婆羅門神白剎利神黃毗舍神赤首陀神黑準之可悉言又云我如淨珠等者案成實論第十卷身見品云又違陀中説冥初時大丈夫神色如日光若人知此能度生死更無餘道小人則小大人則大住身窟中有坐禪人得光明相見身中神如淨珠中縷如是等人計色無我述義解云大論第十二卷中有人言神在心中微細如芥子清淨名為淨色身更有人言如麥有言如豆今取意引亦可推外道經書也此文不當更可推求也疏若無有我者第二明法無我等者言十八卷論主引小乘經云等者案彼論第十八卷釋初品中般若第二十中云空門者生空法空如頻婆娑羅王迎佛經中佛告大王色生時但空生色滅時但空滅諸行亦爾是中無吾我無人無神無人從今世至後世除因緣和合名字等衆生凡夫愚人逐名求實如是等經中佛説生空法空者如佛説大空經中十二因緣無明乃至老死若有人言是老死若言誰老死是皆邪見乃至若説誰老死是邪見是名生空若説是老死名法空乃至無明亦如是慧影疏解云此就小乘解先引大空者聲聞法中以法空為大故引大空經解法空也凡小乘經明生空亦不盡明法空亦不盡於衆法中有是故名衆生也若説誰老死是邪見名生空者誰即是人我等為執實有人我等法是老死故是邪見誰老死誰老死不可得此明無人可老死故云誰老死是生空也是老死者若執著實有此老死法定是老死故是邪見是老死者明是老死法無實不可得是老死法空故故云是老死法空今欲取法空但舉生空成法空義準之可悉言楞伽攝論等明小乘但得人空者案入楞伽經第七卷大慧菩薩白佛言復説諸聲聞得入無我而不得法無我空又第四卷云佛告大慧聲聞辟支佛未證法無我未得不可思議變易生案梁攝論第十二卷末云釋曰所知分中復有二種謂人法二空聲聞於知分中但通達人空止於苦等四諦生無漏智今並略引之疏滅我我所故下第二明稟教得益等者言亦是有為無為二解脫者疏主解云五分法身解脫身謂有為解脫數滅涅槃是無為解脫大乘法中明二智以為解脫不二而二開因果不因果中二智名為有為解脫果門權實謂無為解脫述義云五分法身者戒定慧解脫解脫知見戒者一切無漏戒定者一切無漏定慧者一切無漏緣有為慧解脫者一切無漏勝解解脫知見者緣一切無為解脫無漏智此五勝故積衆多故偏立為身就五陰相攝者初一是色陰所攝後四是行陰所攝戒以無學身口二業為體定以行陰所攝定數為體慧與解脫知見以行陰所攝慧數為體解脫以行陰所攝勝解為體即奮云解脫數乃是小乘通大地中解脫教不異凡夫解脫數解脫者前念緣青第二念即緣異以即離義名解脫也世親論明云何勝解謂於決定事即知所了印可為性若就常無常因位二智名有為解脫果位二智名為無為解脫若就有相無相判之若此因位皆此果位皆是有為解脫準之可悉疏內外我我所下第二明得二涅槃果等者言一云子縛盡等者疏主解云一約小乘明餘無餘煩惱盡為有餘望後猶有餘身智在約後別前名前以為有餘涅槃身智盡竟望後更無餘身智在故曰無餘述義解云猶有餘纍者就未除報身也言肇公云等者案涅槃無名論第一折窮竅體中云將絶朕於九止永淪大虛而有餘緣不盡餘迹不泯業報猶魄聖智常存此有餘涅槃也今取意略引之述義解云此結名字謂佛法身已絶六道三乘之業永證寂滅涅槃之樂而為化道所化有緣本願力故存於身智名曰有餘也言餘緣者謂所應度人天之類不盡猶無邊之異名也如言衆生無邊餘迹者謂本願力由初發心起大悲願盡衆生際未窮盡故爾是曰泯盡也又云夫大患莫若於有身故滅身以歸無勞勤莫先於有智故絶智以淪虛述義解云此初明滅身智謂身患最大無比故曰莫若於作業中智勤最先故曰莫先聖人知之灰身滅智淪於虛無而永不為患苦所牽廣説如彼言大乘餘無餘等者疏主解云一就大乘説餘無餘五住因盡為有餘二生死盡為無餘所以然者金剛心斷變易因盡而變易果猶存有餘纍故曰有餘佛果為解脫道起則無復因患變易生死果亦已則無果纍故無餘纍故故名無餘問若爾小乘金剛心斷分分段因盡分段果猶存羅漢果作解脫道起分段因既盡分段果亦應無答不類佛解脫道起此是常智起常智起即是常身起常身起故無常身即謝小乘解脫道起此是無漏智非是變易報不得言智起變易報亦起分段報即謝所以然者無漏智是變易因故云無漏業因無明為緣感變易報所以無漏起時非變易報起是故分段報不即無問要待佛果常身起無常報方無者亦應要待變易報起分段報方無答非類斷分段因盡而灰身滅智分段報任運無變易報方起如人謝故天報起不由天報起故人報謝佛果法身與此非類要由解脫起解脫道是法身故法身起變易報方無所以非類也問金剛心類變易因盡即名有餘涅槃者亦應金剛斷變易因盡即是盡智答此是一類義要由佛果起方名盡智要由佛果起方名有餘涅槃但約佛果望因盡義邊為有餘望果盡義邊名無餘耳非金剛心斷惑盡即名有餘涅槃問若爾金剛心斷惑不盡答雖盡要待解脫道起證惑無處始相去離故金剛心未得盡智未得涅槃名問若佛果起變易因果即無若爾豈非生死斷為斷見佛果起為常見答有所得人作此解者則墮斷常今明悟變易因果本來無生故名為斷非前有法斷即今無也又云小乘前得有餘後得無餘大乘一時而得但舉佛果望於二患無因患邊説為有餘無果患邊説為無餘準之可悉而言小乘前復得二涅槃者若就體論之是同時得今就用而言故云前後得也言大乘前得無餘者疏主解金光明三身品凡有十五門云五約涅槃論三身門應化二身不住涅槃以二身念念滅數數出現故不住涅槃法身不住槃涅槃槃涅槃者又涅槃也法身既常不入滅也次明三涅槃義二身是有餘涅槃以二身非究竟故也法身是無餘涅槃以法身是究竟故也三身合論是無住處涅槃法身不住生死二身不住涅槃名無住處準之可悉述義解云法身自利自利德滿故為無餘應化利他利他未滿故為有餘也言以其俱滅二著等者以不著生死與涅槃故言七卷金光明經等者此經有五譯中第二梁代真諦三藏譯本於四卷經十八品加三身淨障滿願最淨地四品而為七卷今此三身品在彼經初卷也言攝大乘明四種涅槃等者案梁攝論第十三卷初云釋曰二乘與菩薩同以惑滅為滅諦二乘惑滅一向背生死趣涅槃菩薩惑滅不背生死不背涅槃故異二乘菩薩此滅於四種涅槃中是無住處一本來清淨涅槃二無住處涅槃三有餘四無餘菩薩不見生死涅槃異由般若分別生死即住生死若分別涅槃即住涅槃菩薩得無分別智無所分別故無住處真諦三藏解云此四涅槃同以真如為體由約四位以立四名就凡夫位立自性清淨就菩薩位立無住處約二乘位立有餘就如來位立無餘而無餘等云是道果自性清淨不名道果且無住涅槃為道果者由悲智故生死涅槃俱無所住故仍為目當知始從初地以上無分別智及與大悲為體準之可悉言大小合論等者案勝鬘經中第六説無邊聖諦章云是故世尊有有為生死無為生死涅槃亦如是有餘及無餘疏主解云分段名曰有為變易名曰無為分段之因名為有漏變易因名無漏分段果名有為變易果名無為對界內有語界外為無漏然實是有漏對界內有為名界外無為然是有為也得無為人所得涅槃名無餘涅槃未得無為所得涅槃名有餘涅槃望後猶有大涅槃在故名有餘此是將後別前故名有餘佛性論云二乘有三種餘一煩惱餘謂無明住地二業餘謂無漏業三果報餘即意生身陰準之可悉疏諸佛或説下第二明菩薩觀等言即是法花等者案彼經第一卷方便品比丘偈云説佛智慧故諸佛出於世唯此一事實餘二則非真今略引下半偈文疏主解云此一行揭標唯為一大事出世章門上半標為大事故出世下半舉真偽釋成佛唯一事實餘二非真是故諸佛但為一事故出世問上言無二無三今何故乃云二非真耶答前明無二而無緣覺無三明無聲聞即是今文二非真實但上明其俱無今明方便説有但非真實有耳準之可悉言又本得大等者述義解云猶由大成小也言又下長行青目等者案此品下長行云如般若中説菩薩有我亦不行無我亦不行述義解云此大品經第二卷文故云佛告舍利弗菩薩行般若不習色我不習色非我受想行識亦復如是又第五卷云須菩提言若菩薩欲行般若時不行色受想行識我不行色受想行識無我今應引第五卷文準之可悉疏就初為二等者言如毗曇等者案雜阿毗曇心論第七卷智品云名則十六行事或説十六離於十六行除暗非無漏長行釋云名則十六行者謂無常苦空非我因集有緣滅止妙出道正迹乘衆緣所持故無常逼迫故苦我所見對治故空我見對治故非我種子法故因等起故集相續故有成就故緣諸陰盡故滅三大息故止離內惱故妙離外惱故出趣向故道巧便故正等趣故迹至究竟故乘準之可悉言又如成實者云等者案彼論第十卷身見品第一百三十云問曰若説無我亦是邪見此事云何答云有二諦若説第一義諦有我是為身見若諦説世諦無我是為邪見若説世諦故有我第一義諦故無我是為正見今略引之聰法師疏解云若説第一義諦有我者違第一義諦有我是為身何者第一義諦即是假名我舉體不可得假名從衆緣和合故有若推尋其體舉體不可得即是第一義諦而汝有真實見我不可分柝故乖違舉體不可得第一義故説違於第一義諦有真我即是為身見也若説世諦為無我是為邪見者是説違於世諦假名即是為邪見上來第一一事雙非偏執若説世諦下第二舉是顯非準之可悉言智度論云等者此即彼論第一卷文今略引之述義解云言人等者等取柱瓶乃至萬物如此諸法俗諦故有真諦故無也言若論具足半滿等者述義解云理教具足權實具足乃名滿故云非我無我等也疏諸法實相者第二兩偈釋章門等者言故天女詰身子云等者案淨名經中卷觀衆生品云天曰言説文字皆解脫相乃至所以者何一切諸法是解脫相疏主釋云天曰等者汝乃知解脫無言而未悟言即解脫言所以者何等者釋上言即解脫也一切法皆是解脫豈獨文字異解脫乎今取意引之言四生不能生等者案涅槃無名論第一開宗云六趣不能攝其生力負無以化其體述義解云六趣不能等者明離生義謂凡夫等受生不過六趣然大涅槃已超六趣必不能令攝其生也力負無以等者明不變義無常大力雖負萬物以令變化而不能變涅槃之體言力負者即是無常變易之義廣明如彼準之可悉言智度論四十一卷解等者案彼論第四十三卷釋集散品下云經曰舍利弗復問須菩提云何是色性云何是受想行識性云何乃至實際性須菩提言無所有是色性無所有是受想行識性乃至無所有是實際性影疏解云更廣歷法明所以不可得義準之可悉然述義解云諸法因緣和合生無有自性自性畢竟空故法性不見諸法色性不見法性法性不見色性乃至識性亦如是今取意也言又天主歎須菩提所説等者案大品經第十三卷云佛語帝釋言五陰但假名須菩提不壞假名而説諸法相所以者何諸法相無壞不壞相故須菩提所説亦無壞不壤今略引之琳法師疏解云相即是體即不用陰為體準此疏文今言相者即是體相也即實相是也疏一切實非實下第二等者言此釋即是體相也即實相是也實無等者所言無者二十三字缺言上根人云等者所言箇者玉篇柯賀反廣雅箇凡也説文竹筊也有本作筒字玉篇莫耕反堺蒼竹也述義解云箇者彼也所謂涅槃也言又正將此文望今攝大乘等等者案梁攝論第五卷釋應知勝相第二云論曰一依他性相二分別性相三真實性相依他性相者本識為種子虛妄分別所攝諸識差別釋曰由本識能變異作十一識本識即是十一識種子又云論曰如此等識虛妄分別所攝唯識為體釋曰如此等識即顯十一識及四識一切法中唯有識更無餘法故唯識為體此體由有故異分別性由虛妄分別性攝故異真實性此性非實有非實無故不免虛妄此虛妄是其性故説虛妄分別所攝又云論曰分別性相者實無有塵唯有識體顯現為塵是名分別性相釋曰如無我等塵無有別體唯識為體不以識為分別性識所變異顯現為我等塵無而似有為識所取名分別性論曰真實性相者是依他性由此塵相永無所有此實不無是名真實性相釋曰虛妄義永不有顯現因由顯現體不有故亦不可得譬如我等塵顯現似實有此顯現依證比聖言三量尋求其體實不可得如我塵法塵亦爾永無有體故人法皆無我如此無我實有不無由此二種塵無有體故依他性不可得亦實有不無是名真實性相準之可悉言天親之意等者述義解云舊梵本云婆藪般豆此云天親原夫天親立三性旨良與龍樹正觀之風義趣同焉豈乖反哉言而學人等者述義解云西方護法難陀戒賢等師乃至唐界泰廓基測等僧也疏是名諸佛法者第二結四句教意等者言舊義但得等者述義解云亦實亦非實之句名為一枝也言智度論云等者此即彼論第二十七卷文今取意略引之疏主解云二乘得小空如毛孔空菩薩得空廣遍如十方空廣明如記第三卷也言問經何處等者述義解云實不實非實非非實是名三方便也言答大品如化品云等者此即彼經第三十九卷佛告須菩提之中文今略取之言又云菩薩等者案大品經第二十八卷末須菩提言菩薩行般若無真實不可得何況真實乃至行一切種智死真實法不可得何況真實今取意略引之言問智度論等者案彼論第一卷釋第一義悉檀處云如摩訶衍義偈中説語言盡竟心行亦訖不生不滅法如涅槃説諸行處名世界法説不行處名第一義一切實一切非實及一切實亦非實一切非實非不實是皆名諸法之實相疏解云語言盡竟下四言偈成者初一行明第一義中離諸一切相古今常湛如性淨涅槃也後一行偈約二諦明第一義悉檀體也次一切實下七言偈成者作二意釋之一解云一切實者明真諦一切不實者明俗諦也及一切實亦非實者明諸凡夫以聲為實以響為虛諸小菩薩亦復如此以涅槃為實性死為虛今言涅槃亦皆不實故云及一切實亦不實也故仁王經云聲與響俱空也花嚴經云生死與涅槃二俱不可得也一切非實非不實者明大菩薩體解諸法故亦不以涅槃為實故言一切非實亦不以生死為虛故言非不實故花嚴云生死非雜亂涅槃非寂靜若有生死可坐死則生死可雜亂既無生死故生死非雜亂有涅槃可涅槃者涅槃可寂靜今既無涅槃有何涅槃可寂靜故言一切非實非不實次釋如彼言所絶之理等者述義解云絶四之理絶有相等四句心故云所絶之理絶心也知絶四之理此心亦絶四句故云絶理之心常絶也言答具二義等者述義解云三人有三根之事易故不解但解一人有三根也疏自知不隨他第二示得解人相等者言答造論影傍等者述義解云影猶隨也言故大品云等者案彼經第十三卷中善知識品第五十二末云須菩提言是深般若誰能信解者佛言有菩薩摩訶薩先於諸佛所久行六度善根純熟供養無數百千萬億諸佛與善知識相隨是輩人能信解深般若須菩提白能信解是深般若者有何等性何等相何等貌佛言欲嗔癡斷離是性相貌是菩薩即能信解深般若波羅蜜今略引之言論解云三毒斷等者案大論第七十一卷釋善知識品末云須菩提問佛法是甚深微細誰當信解者佛答説久行等因緣能信更問久行等人有何等相佛答是人離三毒心亦不見是離深入諸法實相故問曰是人未得無生忍法云何言斷三毒答曰斷有二種一者根本斷二者薄少斷此中説薄少斷行者不分別是斷是煩惱何以故煩惱相顛倒不定故煩惱即是斷是故言離今略引之言趣智品明行般若人明五種相等者案大品經第二十三卷趣智品第五十二云若阿鞞跋致菩薩摩訶薩行深般若時不以他人語為堅要亦不隨他教行不為三毒心所牽不遠離六度聞説深般若時心不驚不沒不怖不畏不悔歡喜樂聞受持讀誦正憶念如説行今略引之大論第七十一卷釋驗智品第五十三云阿鞞跋致菩薩所識事於他語中不生念是中有實不實何以故他人有二種在家人著五欲樂虛誑不淨出家外道著諸邪見不實此等所説皆無實事是故不信自得諸法實相故乃至佛身來説破諸法實相者亦不信得無為法故心則安重不復移轉是菩薩雖未得佛道貪欲等諸煩惱折薄故不為所牽心常不離六度知善法果報味故心常愛樂不離六度如是種種因緣聞深般若不怖不畏歡喜欲聞讀誦問義修習如雷電小鳥則怖畏悶死孔雀大鳥歡喜舞戲般若如是邪見凡夫聞則恐怖不退菩薩聞則歡喜乃至廣説準之可悉言又大品就二種門説般若等者述義解云一就法門説般若者從序品至經品耳凡有十九卷四十五品正説般若義是也二就行般若人相等者從大事品至稱揚品凡有九卷十六品明信者行是也疏自知不隨他者天魔外道等者不能干之者玉篇干柯寒反犯也杆也觸也求也言花嚴云等者案彼經第八卷法慧菩薩説十住處云有所聞法即自開解不由他語述義解云不由他語者信解實相正法不由他語悟他法準之可悉言則知法無等者涅槃無名論妙存章明平等相處文取意引之文中有三今此初標也述義解云所證不二之境無因緣有無之相以中道理為萬物軌則義故曰法能證正觀之智無因緣有無之知以無二智為群心之至靈故曰聖如影公曰至人以無心之妙慧契無相之虛宗內外並冥緣觀俱寂然則境無境相智無智相境智一味平等平等言心無有無等者第二釋述義解云至人如此證理之時智相絶內境相絶外也心是內法即能取相以正觀離有無之知故取相之心由是滅也數是外法即所取相以中道絶有無之相故虛妄之數由是息矣既遣內外之取相故境智一味言彼此寂滅者第三結也述義解云此者內智也彼者外境也言浩然大均等者引取第九演通古文加妙存章文以為一句述義解云真正觀無所不遍義曰浩然為一切作本體義言大均也言名為實相者述義解云泊爾寂靜無境智之別朕乃曰實相涅槃大道準之可悉疏若佛不出世自上以來等者言花嚴云等者案彼三十三卷末普賢菩薩答普慧菩薩云菩薩摩訶薩臨命終時於右掌中出大光明名淨境界悉能嚴淨三千世界若有無漏諸辟支佛覺此光者即捨壽命若不覺者光明力故從置他方餘世界中一切諸魔及衆外道有見衆生悉皆從置他方世界除如來住持所他今略引之言答其耻聲聞從師等者述義解云所言二盈之間者盈猶日也滿也又二筒月月生十五日滿望月之間名二盈也言答法花玄義等者法花玄第五卷具明緣覺人今指此文故云且辨之也言答雜心云等者案雜阿毗曇心論第九卷雜品云問何時佛出世何時轉輪聖王出世何時辟支佛出世答劫減佛興世增劫轉輪王二時辟支佛如是應當知長行釋曰劫減時佛興於世順解脫師故佛是解脫師為捨生死出世説法增時衆生向生死見轉勝樂故若爾時佛出世者則為空出以衆生不能捨生死極著樂故減劫衆生背生死見煩惱惡行極增上故能捨生死是故乃至百歲衆生時佛乃出世非減也若減者爾時衆生非法貪不正貪悉行邪法對利煩惱非善法器故轉輪聖王多於增時出于世間能以十善建立衆生是故減時不出以彼衆生向惡行故是故增時易化時淳故初減轉輪聖王亦出於世猶淳故辟支佛二時世出作自事故彼論疏解云此偈明三聖出世劫有增減相故減佛興世者但據釋迦如來為論彌勒即是增時二時辟支佛者佛前佛後又謂增減二時非法貪者謂著五欲不正貪者雖有修善猶求人天不求解脫故言不正作自事者但能自度不能化他也今略引偈文也言一本乘辟支等者疏主解云本發緣覺心後得緣覺果比謂本乘略舉有二一極遲百劫此是大辟支二極疾四世中間不定此二種人成緣覺果決定不值佛然大小緣覺未得果時或值或不值佛此無定也有人云何百劫竟至果竟時名大辟支此人因時雖鈍根而得果竟時即為利根又勝身子此人隨分具足相好故獨出無佛世佛化度衆生故云不遇佛也言二者退菩提辟支智度論云等者案彼論第九卷釋往生品中云復次是補處菩薩離欲來久具足佛法以方便力隨補處法生兜率天未證四諦者故留不證若取證者成辟支佛今略引之影疏解云此據實補處菩薩但出無佛世教化衆生恐成辟支佛故於四諦不取證準之可悉言三聲聞辟支等者疏主解云非本乘緣覺其人本是聲聞於佛法中證得初果初果人但十四生漏值佛則成羅漢不值佛辟支佛如此之人本願見佛故而言第七生中者案賢聖義云對法論説極七返有者謂即預流於人天往來雜受極至七返得盡苦際此論意説次第行者得預流果三界修惑一毫未斷人中三洲及六欲天往來雜受極至七返乃至言一生者人中得道往生天上還來人中一往一來名一大生或唯天上或在人中但受一身名半生故唯此師意今言七生者約大生言之法花玄十四生者約小生言也言答俱舍論云往外道法中等者述義解云梵語袈裟此云離塵服有品數謂五條七條九條九條亦三品謂下中上各有三品從九條至二十五條準知真諦三藏金剛般若疏云五條在彌帝羅國七條在半尸國大衣與錫杖在罽賓國尼師壇在迦毗羅國由此佛三衣至今在世間今案以下文缺言四者有犀角喻辟支等者此本乘緣覺中極遲百劫行之人故俱舍論云犀角喻百劫也疏主解云此人既是利根大辟支雖然出無佛出時既正法滅盡亦無末法此時衆生鈍根故無得暖法義耳非辟支不能令其得道所言犀角者玉篇作𡱝字先啼反説文𡱝遲也獸名之𡱝為𭕬字思雞反形似牛豬頭士腹卑腳腳有三蹄黑色三角一角在頂一在鼻在鼻者即食角也小而𮥞好食棘也有人云此狩四足此中有二一者通天𡱝二者陸行𭕬今取後也言五者有部行辟支等者案俱舍論第九卷分別世間品一云此中部行者先世聲聞或獨覺有餘師説先世凡夫後成部行獨覺若此人於先世已修決擇分善根今生自然覺悟聖道於本行經中説在一山處有五百外仙修難行苦行乃至有一獼猴與獨覺共住後至外仙所現獨覺威德莊嚴五百外仙皆成獨覺疏主解云其人自有徒衆部儻如佛有弟子眷屬故名部行此人行行不必具滿百劫亦可六十劫如身子時節故此人亦不值佛也言答經五百辟支等者述義引報恩經第三卷云佛言過去鹿母夫人生五百子自悟無常出家成辟支佛乃至廣説今具明如法華玄第五卷準之可悉疏如五陰無常下第二明等者言一者欲明五陰等者述義解云能相謂四相中生滅二相也所相謂五陰法也謂如毗婆闍婆提明等者案毗婆沙論第二十卷色品云復有説者言此法是無為如毗婆闍婆提作如是説若此法是有為者其性羸劣以羸劣故不能生法住法滅法無為有力以有力故能令法生住滅或有説此二法是有為一是無為如曇摩崛部作如是説二是有為謂生住是無為謂滅若此是有為其性羸劣不能滅法以是無為法故能滅法準之可悉疏若離五陰下第二破離陰我等者言外云神如虛空無有相貌等者二十字缺言即是顛倒品等者此論第四卷顛倒品偈文今略引上半文碩法師第二明無起惑以之言與也起惑之主即是我人而上半五句求不可得煩惱從何而生耶非正有無求我不可得無我之煩惱有無亦不可得準之可悉言第二釋中初借人日譬等者此文難見應云如來下第二釋三種比於中有三初釋如本次釋如殘後釋失見就第三中又三初借人日譬示比知之相貌次如是苦樂下第二外人正舉共相比知證有神次如見人民下第三引類可也言答百論等者案彼論上卷破神品云內曰不然神能知故修妬路若不知時欲令有神者神則不能知亦無知相所以者何汝神無知時亦有神故復次若無煙時現見火知有火神若有知若無知無能見者是故汝喻非也復次汝説見共相比知故有神此亦非也所以者何見去者去法到彼故修妬路若離去者無去法離去法無去者到彼如是見去者日到彼必知有去法若離神無知是事不然是故不應以知故知有神不可見龜而有毛想不可見石女而有兒想如是不應見知便有神想疏主解云內曰下破其無知時有神也復次汝説下第二破其比知初牒外義也人之與日共有去相見人去比知日亦去名為共相比知草木苦樂若有依相以草木有依比知苦樂亦依於神也此亦非也者第二句總非也所以者何下第三句釋此釋意縱其人日共有去相將人比日奪其草木覺知共有依相將木草有依比此苦樂亦依神也所以縱一奪一者文自釋之言見去者去法等者見人從東至西人既有去亦見日從東至西日亦有去故可得以人比日不得云見草木有依謂苦樂亦應依神注前釋縱人日相比也若離神無知下此釋奪其二依相比汝言草木必依他地離地無草木知必依神離神無知作此比者是事不然也是故不應下結可也不可見下取意重破之外云天下之物皆悉有依如外草木既依於地內之人民則依於王不應苦樂覺知獨自無依是故呵云汝見草木依地見苦樂亦依神者見餘鳥有毛見龜亦應有毛準之可悉疏因有我故下釋第二法無我等者言小乘無我在於見諦八聖道亦在見諦等者疏主解云又約小乘義見諦道正見法輪小乘舊義云牟尼説見道疾故名法輪瞿沙亦爾故云或復説八支轉至於心八支猶是八正道八正道即是見道明佛自悟八正至五人心中故名轉也述義解云小乘舊義者雜心論之意瞿沙此云妙音即薩婆多師也疾者速進也見道是捷疾道以一品道頓斷多結也法宗原云八正道者正見正念正定正精進正思惟正語正業正命初三以大地法中慧念定為性正精進以大善地法中勤為性正思惟以不定中尋為性語業命以色中無表為性皆唯無漏準之可悉言大乘人無我等者案梁攝論第十一卷釋論云先於十解已通達人無我今於初地又通達法無我此二空離有無性若能通達即與此法同是故離修準之可悉疏又無我我所者於第一義亦不可得者前明世諦中等者言故三法印云等者案大經第三十卷云佛在婆枳多城大師子吼一切諸法無常無我涅槃寂靜離諸過惡宜依此文明三法印一諸行無常二諸法無我三涅槃寂靜又大論第二十三卷云一切有為法無常一切法無我寂滅涅槃是名佛法義是三印一切論義師所不能壞也準之可悉疏諸佛以一切智下釋第二菩薩法等者言問為凡夫説無我等者此問意云凡夫迷我無我為凡我無我令悟我無我可有益聖人解我無我為聖人説何益耶答為令聖傳法利人等者此答意云此不就利益判為説直明凡不解我無我聖解我無我以聖解我無我故為聖説我無我此為益凡利他不自利如阿難稱我聞為益衆生也此一番問答顯在二諦章上卷而言如為阿難等者案大論第二卷初云佛般涅槃時阿那律語阿難令聞四事佛具答之我涅槃後經初亦應稱如是我聞一時是故當知是佛所教也法花疏釋我聞云一者佛命令稱我聞今順佛敕故云我聞也二者集法藏時迦葉問阿難佛在何處最初説法阿難以答僧衆故稱如是我聞準之疏文言如為阿難等者當第一釋次言如為聖人等者當第二釋所言如者猶是也顯在玉篇言毗曇人云等案雜阿毗曇心論第一卷界品云真實者四聖諦不顛倒謂以學八忍八智見彼真諦故名見聖人所成就故名聖諦不顛倒者解上諦義又論第十卷擇品末云若事分別時捨名則説等分別無所捨是則第一義長行釋云名者此則等事非等一義次定事不可得故如瓶分別色香味觸時捨瓶名非捨色香味觸別有瓶名是故名等事如是一切分別無所捨是則第一義者若事分別不捨名是第一義如五盛陰名苦諦若分別五峙亦不捨苦名以色是苦故乃至識亦如是準之可悉言成論亦然故云等者此即成實論第十卷身見品文今取意略引之聰法師疏解云若説第一義諦有我者違第一義諦有我是為身何者第一義諦即是假名我舉體不可得假名從衆緣和合故有若推尋其體舉體不可得即是第一義而汝有真實我不可分拆故乖違舉體不可得第一義故説違於第一義諦有真諦有真我即是為身見若説世諦無我是為邪見者是説違於世諦假名我即是為耶見上來第一一事雙非偏執若説世諦下第二舉是顯非準之可悉言如般若中説下等者此引大品經第五卷準上可悉疏問曰下此解釋章門偈等者言一者涅槃名滅等者案琳疏云實相是涅槃名滅若聖人不滅心何得向涅槃耶故知聖人心亦滅準之可悉言第二引例通等者述義解云入無餘時空身心故云空定為心空也今案琳疏云若數人以十六心為三解脫門空無我為本門若無常與集道下各四為無願門滅下四為無相門若論家假名空為空門實法空為無相門平等空為無願門並以真智為三脫門但真觀絶名亡想難可分別故而將方便中名來目於真觀也滅盡想者那含人滅心準之可悉言即是法花經等者彼經第三卷藥草喻品長行在此文略引之疏主解云凡聖終歸大涅槃故云終歸於空又自昔以來開五乘教用至於法花息用歸體即無復五乘末本對於五故明不五既無有五亦非不五即言辭寂滅而論云終歸無餘涅槃今引終歸於空文者或名畢竟空或名大涅槃或名諸佛道然涅槃絶四句超百非不知何以目之強名為空所以為證也琳法師解云終歸無餘者羅漢入滅也準之可悉疏問曰若佛不説我非我下釋第二方便章門等者言一者明佛有無量方便者案琳疏云今且責佛為見衆生為不見衆生若見即顛倒若不見便成盲瞎今言方便力不可見不可言非汝所解而見與不見並隨緣方便也此是佛無生觀也言二者諸法無決定相等者案琳疏諸法無決定者是所觀之境且就色法明非有非無乃至四句準之可悉言但第三句與前二句相違等者述義解云上二句云生死涅槃皆名不實非生死非涅槃名實今第三句云生死名不實涅槃名實所以相違今明不明不相違即各各為人悉檀準之可悉疏問曰知佛下此釋第二章菩薩得益等者言即發起偈二文等者述義解云自知不隨他與下三句是也言寂滅相故下等者所言戲論者疏主釋云無記心中往復言論名為戲論也碩法師解云五鈍煩惱名愛論貪嗔慢疑無明五利使名見論身見邊見戒取見取邪見準之可悉觀時品第十九疏所以有此品來等者就此品來由大文有二初明來由次明品目初中有三初約三章以明來由次二者諸佛菩薩下第二約二段以明來由次問何故下第三問答以明來由今此文初也案琳疏云又前二十一品明世間觀行中有三意前來一十七品略廣二文破遣迷情顯示中道第二觀法品迷執既除實相又顯故有三乘得益但衆生無盡其中復有未悟之者故從此後第三重破迷顯實使未悟之徒因而得曉已解之輩觀行增明而即觀時品者對前法也準之可悉疏二者諸佛菩薩等此下第二引例約就三段以明來由謂約二十一品初十七品名正説明次觀法一品名稱歎今此時品下此第三門準之可悉疏問何故次法品等者此下第三問答明近次上品生凡有三番問答如文可悉述義解云時法相對者數人云因法假名時離法無別時故言三者法品末最後偈云等者案彼偈文云若佛不出世佛法已滅盡諸辟支佛智從於遠離生今取意略引之言既有三時者述義解云辟支出時及前後二時準之可悉疏所言時者外道有二師等者此下第二明品目言外道有二師等者此二外道計顯在大論初卷末具引論文解釋如記第二卷也案碩疏云但外道解時有二種一師云時是常何故爾四時三世是常有故名不變因所以計時是常一師云時是無常何以爾所以釋論云時來衆生熟時出即摧促時能覺悟人是故時為因所以計時是無常言一云時體常等者影疏解云更有實執云諸萬物等非時所作但既時常故以時為生因花果等為了因時既常法微細不可見故以花果等來證取了出此時常知有時是常法是第三家執也言次云別有時體等者影疏解云此第二時執彼人計云微塵世性時方虛空涅槃等是常乃至一切萬物由之而生故云以時為因言故偈云等者時經偈文所言時來等者由夏時來故所以熱春時涼若使然者那無實時今者就熱時為語故云熟耳具明如上也言佛法中亦有二師等者言婆沙云為止此説明法即是時等者二十五字缺言薩婆多部中有四大師等者案婆沙論第四十八卷云薩婆多中有四種論師一説事異二説相異三説時異四説異異乃至第一名達摩多羅第二名瞿沙第三名和須蜜第四名佛陀提婆言一者相異等者婆沙論第四十八卷云相異者言法行世時過去法有過去法有過去相非不有未來現在相餘二亦爾如人愛一女色於餘女色非不有愛彼亦如是今案雜心論第十一卷釋品云相異者過去法與過去相合不離未來現在相如人著一色非不著餘彼亦如是今引雜心文以為潤飾言一為正未來傍有過去現在義等者述義解云此未來有可為過去義亦有為現在義故也所言瞿沙人者雜譯論云尊者妙音也言二者事異等者婆沙云説事異者言法行世時事異體不異譬如金銀器破已更作雖形有異其色不異乳不成酪時香味雖異其色不異如是未來法至現在時雖捨未來法不捨其體現在法至過去時雖捨現在法不捨其體也雜心論亦同之言達摩多羅者新譯論云法救也言第三時異等者言法行世時以異故生於異名非其體異譬如算籌初下名一一轉名十復轉名百如是至千萬算籌是一轉其處故有種種名彼亦如是如是説世者名不嬈亂説以所作故便有三世若法未有所作名未來已作名現在所作已滅名過去雜心略同述義解云此第三世友説以就作用位有差別謂諸法作用未有為未來有作用時為現在作用已滅為過去非體有殊言迎送正望等者述義解云迎就未來言送就過去言正者現在望之應知言正現在等者述義解云正現在謂是現在也曾未來謂今日望昨日為未來也當過去謂今日望明日為過去也言正過去等者述義解云正過去謂望今日而咋日為過去也曾未來謂望去第三日而昨日為未來也曾現在謂當昨日昨日為現在也言正未來等者述義解云正未來謂望今日而明日未有故為未來也當現在謂當明日明日為現在也當過去謂以今日望明日今日為過去也言第四異異等者婆沙云説異異者言法行世峙以前後故生異名猶如一女亦名為女亦名為母以其有母故名女以其有女故名母如是法行世時以前後生於異非時異體異如是説者即名嬈亂所以者何一世則有三世過去世有三世過去前後剎那名過去未來過去中剎那名過去現在未來世亦如是雜心亦同俱舍論第十四卷分別惑品第五具説四種薩娑多恐煩故略之疏品開以二等者言大品云等者案彼經第二十四卷初合利弗問言為欲説有一菩薩乘不須菩提語於諸法如中欲使有三種乘耶舍利弗言不也如中可得分別有三乘不舍利弗言不也是如有若一相若二相若三相舍利弗言不也汝欲於如中乃至有一菩薩乘不舍利弗言不也今取意略引之言次偈明不相在等者述義解云不因過去而有現在相故云不相在也言就釋難中有五等者述義解云何以故下一難也三若字下即為中三難也如是亦應下第五難也疏問曰如有歲月日下生第二等者言體相者述義解云時之相也時者體也故名體相也言攝論約五種明時等者案梁攝論第十一卷釋因果修差別之二修時章第五云阿僧祇有二種一謂阿僧祇劫何以故由此劫日夜半月月時行年雙等時不可數故名阿僧祇劫二謂阿僧祇何以故於此劫中菩薩修行若以劫為量又不可數故名劫阿僧祇今略引之言十二月分為三分等者述義解云十二月下半至四月上半以為一分四月下半至八月上半以為一分八月下半至十二月上半以為一分也西域記云如來聖教歲為三時正月十六日至五月十五日為熱時也五月十六日至九月十五日為雨時也九月十六日至正月十五日寒時也言分有雨時者一分內四月各以二月為一時故也言次有小劫時等也等者硫主解云從八萬四千歲漸減至十歲名一小劫如是十九變為中劫時如是八十變為大劫也言小乘六十數等者疏主解云有人言經言三大僧祇行成佛者此取數六十四為大劫之劫滿三僧祇也今謂經中多明水火劫等為三僧祇不取後大劫為三僧祇若必有文證者亦宣明也又淨名經疏云無劫有大小大劫有三火水風所以名大者時節長故壞處闊從欲界至三禪故人之與物並皆無故故名大也七過火劫起燒欲界初禪然後一水劫起漂欲界乃至二禪如是七七火劫起有七水劫起後更七火劫起然後有一風吹壞欲界乃至三禪也故雜心論第十一卷偈云一火一水災七七火七水復七火後風小劫亦三飢饉疾疫刀兵所以名小者謂時節但又但在欲界唯閻浮提但損於人故名小也準之可悉智度論一彈指等者二十一字缺言康僧會云等者述義解云有傳記云集衆論義而取勝處以集作書又有云是人名未詳應推今案高僧傳第一卷末云康僧會其先康居人世居天竺年十餘歲二親並亡至性奉孝服畢出家厲行甚峻明學三藏博覽從吳黃武元年至建興中所出維摩大般泥洹法句瑞應本起等四十九經曲得聖義并注了本生死經等又出小品及六度集雜譬喻等又注安般守意法鏡道樹等三經并製經序至吳天紀四年四月皓降晉九月會遘疾而終是歲晉武太康元年也言同百論等者案彼論下卷破常品云內曰過去非過去修妬路若過去過去者不名為過去何以故離自相故如火捨熱不名為火離自相故若過去不過去者今不應説過去時行過去相未來亦如是破是故時法無實但有言説今略引注文更加語耳疏主解云注釋為二初別解偈本次是故時法下總結無時初又二前開二關破過去次例破未來初中又二初門有四言若過去等者第一牒也土為過去是一過去也此土復謝滅無復土相復是一過去故云過去過去也不名為過去者第二難也土既滅後無復有土故不名過去也何以故下第三釋也土既謝滅則離土自相故無復過去也如火下第四舉喻也若過去等者第二關正釋偈本又二言過去不過去者第一牒也明過去土住過去土不謝滅故云過去不過去也今不應説下第二破也若過去土不謝滅則猶是現在汝不應言過去行謝滅之相也未來下第二例破未來亦應開兩關問之一云若未來未來則無瓶相以瓶是未來名一未來復未有此瓶復名未來若爾便無未來若未來不未來者已有瓶相便是現在汝不應言未來行未有之相準之可悉觀因果品第二十疏問自上以來等者約此品由來大文有二初問答以明來由次問答以明品目初中有二問與答答中有三初約廣略破以明來由次約所詮義差別以明來由後約品次以明來由此文初也案琳疏云又因果道理衆義大宗立信生解趣正之本然惑者多謬上來諸品雖復略破今復重而廣論準之可悉如外道計等者案康疏云計因果中自有四家迦毗羅人謂因中先有果因果是一衛世師人謂因中先無果因果是異勒沙婆人謂因中亦有果亦無果因果亦一亦異若提子人謂因中非有果非無果因果非一非異準之可悉言大小乘人十家所説者一因中有果家即是僧佉之與上座明因中有果二因中無果家蓋是衛世僧祇二世無義三因與果作因家即成論師義四因不與果作因家是毗曇義亦是攝論師立二義一立聞薰習不滅作報佛二立聞熏習滅不作報佛五因果一時亦是成實五陰一時成人薩婆多八相一時共起義六前果後因家七因滅變為果家八因滅不變果九與十者遍不遍義準之可悉具明如疏疏二者上來雖破因果為成餘法等者此下第二約所詮義以明來由案碩疏云然因果是佛法中難義前來已散破但未別作破因果名目説故如破因緣品中破四緣亦已破因果但來意各有主對因緣意正為破生義破生則涅槃及因果次破五陰破苦即是破果觀行觀業等即是破因雖復已破但是逐執散破未約作破因果名然因果之理難識凡情種種謬計論既將竟故復收來別因果名準之可悉疏若逐近來者從時品生等者此下第三約品次以明來由案碩疏云破時後即以破因果從前品明因果法在三世中而時無別體假法為體彼雖聞破時猶計有因果因果別成時義則在準之可悉疏問因果有幾種等者此下第二問答以明品目凡有二番問答即分為二初番問答顯因果數次番問答正明品目如文案康疏云言因果者因是假藉之名果是先逐之目能生為因所生為果然因果有二種一者內二者外內謂因業有身外謂因種生穀又有二種一者了因因果如燈照物二者生因因果如穀生種又有二種一者正因因果如種生穀二者緣因因果如地水等又碩疏云因果略有三種一者相生因果如泥生瓶如善惡因得苦樂果也二者相緣因果如梁柱成屋合五成捲一時而有也三者了因因果如萬行了出本有涅槃如燈照物等準之可悉疏所以四偈絞絡等者所言絞絡者曇攝字釋云上交絡廣雅云交也五人邊也下力各反郭璞云絡繞也言又佛法因果等者述義解云因果正是中道者就因緣之因果也有無正等者就定性有無也言如經云等者此即大經第二十一卷德王品文今略引之疏主解云此正答他生難前云有漏之法亦是生家之他無漏之法亦爾何故不生無漏之他耶今正答之法寶師解未至生位或未出胎前已有生性故云有漏之法等以有生性故生緣能生故云故生能生也具明如記第六卷也言又若事因於理等者述義解云所言更有所因者即是所依因者由也準之可悉疏第三偈上半重牒有等者言外道泥中之瓶等者百論上卷破一品云外曰不然多因一果現故如色等是瓶修妬路如色分等多因現一瓶果此中非但色為瓶亦不離色為瓶是故色分等不為一足等分與身亦如是準之可悉言內法瓶為四塵成等者述義解云五塵之中簡除聲塵非能造之法故也言又內法等者述義解云成論云泥之四塵是實瓶是假色以識心知實以想心知假故言三者二俱是無等者述義解云所言而有有無者果有因果無因在者成果因亦可在不成果之因也準之可悉疏問曰因為果下第二破等者言成論師云因是有為等者二十字缺言又云一念之因辨果力足等者二十七字缺言故成論文云等者案彼論第三卷過去業品第三十二云論者言迦葉鞞道人説未受報業過去世有餘過去無答曰此業若失則過去過去若不失是則為常失過去異名則為失已後失是業與報作因已滅報在後生如經中説以是事故是得生如乳滅時與酪作因何用分別過去業耶今取意略引之言又云作因已滅等者案成實論第二卷二世無品第二十二云又汝言智生者因與果作因因與果作因與已滅如種與牙作因已滅乃至雖過去滅未來未至以成就故不得言無今略引之聰疏解云又汝言下破第五事習因有故過去有義因與果作因已滅者明過去無邊言雖過去下破第九事就中有三此初明曾有當有是正見之境非溟伏怪有也述義解云成就力者因與果竟雖滅而以成就力現在不失而有故名成就以用不起故名滅耳然成就在故能引生後果如過去冥伏有義也言今遂言作等者今遂言成於自果亦自滅者也言如百論等者案彼論下卷破因有果品內曰修妬路疏文所引全同注釋云汝言泥中當出瓶故因中先有果今瓶破故應當無果是以因中無果疏主解云破上各取因證因中有果也此就當義破之汝果非是現有必是當有泥中之瓶有當來義復有當破義若泥中瓶當成義遂言因中有果者亦因中瓶當破義亦應當無果準之可悉言又難開善義云等者述義解云所言成就現在等者成就現在之心為能緣以不也言若不能緣等者述義解云毗婆闍婆提部義宗立一切煩惱皆攝於不相應故不能緣故非心能緣為故非色若非色非心者應同彼義也今案雜心論第四卷使品末云問彼使為心相應為不相應此何所疑二師異説故毗婆闍婆提欲令不相應育多提婆欲令相應於此有疑準之可悉言又開善亦是過去過去義等者所言同迦葉鞞等者成實論第三卷難迦葉鞞義云失者過去異名則為失已復失準之可悉疏問曰若謂因不與果下第二破等者言至長安見攝論師等者述義解云疏主從南土至長安也言如人工等者述義引婆沙云從金非出金從金出金剛故知金之中精名金剛所言朴者玉篇普木普角二反王逸曰朴大也方言朴卒也郭璞曰倉卒急速也説文木皮也有本作非字言又成實師本執金剛心等者述義云金剛心者此喻名也婆沙云從金非出金從金世金剛故知金之中精名金剛也問金剛與如意珠何異答二義一大論云帝釋與阿修羅鬪時帝釋所執金剛墮閻浮提而還成如意珠故知不異二者婆沙云金剛能破波賴珠亦能破如意珠故知異也準之可悉疏答曰下上半牒等者言破意云夫相生之道等案碩疏云凡論相生之道能生在現在所生在未來不得並又理應能生是有所生是無以能是有故能生他所生是無故從他生如因體是有前牙在未來是有故能生他所生是無故從他生如因體是前牙在未來是無由因有力辨無成有汝若立因果一時俱有則失因果能所相生之義生者能生可生則所生能所一時俱有不可準之可悉言又涅槃云等彼經第二十九卷師子吼品佛告師子吼菩薩文今取意略引之法實師解云此辨縛體也名色之與衆生更無別體故説相續也述義解云名者四陰四陰微細非眼識境故色者四陰具明如縛解品記準之可悉疏問若先有果生下等者言如須達等者金剛般若疏上卷引賢愚經第二十卷文廣説須達長者造祇洹精舍之因緣云舍衛國波斯匿王有一大臣名曰須達其人居家巨富財寶無限好喜布施乃至是時須達繞佛三匝却住一面世尊即説四真諦皆即證初果白佛唯願垂慈願舍衛域中使衆生除邪就正佛言彼無精舍云何得去須達言能起願許世尊默然須達言唯使一弟子共往敕示世尊思惟遣舍利弗於是二人案行諸地無可意處唯有祇陀太子園正得處所舍利弗告之須達白太子欲買太子笑之須達不已太子戲云黃金布地令間無空地便當相與須達布金太子不許須達責之即共往詣斷事人所時首陀會天當為佛起精舍斷事人云不應妄語而有戲哭既已許賣不宜中悔遂斷園與須達乃至諸外道言不可造精舍舍利弗即為説法各得道迹六師弟子三億於舍利弗所出家學道長者共身子還圖精舍地手自捉繩一頭身子含笑長者即問六欲天何處最勝身子答云第四天中少欲知足恆有一生補處菩薩來生其中須達言我正當生第四天中長者出此言已五宮悉滅唯第四天官湛然不變也身子言汝於過去毗婆尸佛亦於此地為彼佛起精舍乃至今日凡九十一劫受一種身不得解脫生死長遠唯福是要不可不兼是故身子憏憂長者悲愍也長者起精舍用妙旃檀為香泥別房住止千二百處凡一百二十處打犍槌施設欲往請佛白波斯匿王我為佛已起精舍願大王遣使請佛時王聞已遣使詣王舍城請佛及僧願赴臨舍衛國爾時世尊與四衆前後圍繞放光動地至舍衛國漸近城邊一切大衆持諸供具迎待世尊到已放大光明指案三千世界皆悉振動乃至世尊爾時隨病為説法藥各得道迹今取意略引之言難陀實未持犯等者述義解云引雜寶藏經第八卷云佛弟難陀其婦孫陀利端正人少雙佛將難陀向阿那波山令見老獼猴至忉利天見諸天女至地獄見苦難等乃至廣説言又影公云等者案影公此論疏云第八遣先果後因非直欲備諸破門破者亦有此謬如謂先有舍法故備棟梁如其先無備之何為今略引之言又經中云等者案大經第一卷末佛告高貴德王菩薩言涅槃之體非本無今有若本無今有者即非無漏常住之法有佛無佛性相常住以諸衆生煩惱覆故不見涅槃便謂為無菩薩以戒定慧勤修其心斷煩惱已便得見之當知涅槃是常住法今略引意疏主解云此答初本無今有可是無常今既本來已有故非無常也然兩土諸師解本有義不出二家今明涅槃未曾有無豈論本始此文所以明本有者此是德王本無今有故無常之難故云本有此一時答難至論涅槃未嘗本始當之與現也準之可悉疏答曰上半牒等者言如數人命根等者述義解云彼宗以修惑發業也以見修二惑通為潤業故雜心論云欲界三十六使一一今有相續故今云十使中隨一使潤一生也準之可悉疏問曰因不盡滅下第二外故等者言舊云昔日等者涅槃經智度論云昔七寶鹿已今變成釋迦等如此等事如來誠言然琳法師光法師等並作經疏同執作有所得分別而説故成所破耳述義解云發心菩薩五陰假者相續至佛故經中言昔時鹿王我身是也此謂人度萬福萬行至金剛心因中行不至佛地故行不度準之可悉言又僧祇義心性本淨等者三十七字缺言又如外道等者大論第七十卷有此外道計具引如先影疏解云從宜初來入即曰後入冥初立此始終二種邊見亦無嵩義然諦云僧佉經廣説世性即是僧佉外道計也言又攝論師云梨耶體無生滅等者二十字缺言楞伽明八識滅義者案入楞伽經第二卷佛告大慧菩薩諸識有二種滅一者相滅二者相續滅阿梨耶識虛妄各別種種熏滅諸根亦滅是名相滅相續滅者相續因滅即相續滅今取意引之疏答曰泥團前滅而有瓶生不名為變等者言如百論等者案彼論下卷破因有果品云內曰若果生故有不失因失故有失修妬路汝言瓶果生泥團不失瓶即是泥團若瓶果生是時失泥團因故是則無因若泥團不失不應分別泥團瓶有異今實見形時力知名等有異故有亦應失今略引注釋文疏主解云破上有不失也注初牒外不失瓶即是泥團正破之也凡有四難初作即是難若瓶果生者第二失因難若泥團不失下第三作無異難今實等者第四舉五事異驗失五事者一泥瓶兩形異謂泥形滅瓶形生謂形失也二泥時滅瓶時生三泥滅瓶力生四智泥智滅智瓶智生五泥名滅瓶名生準之可悉疏問曰因雖滅失下第二破滅不變等者言若謂理善感等者述義解云以佛應為事又佛出世故以可生善遂成之義為事應也言經云有為無常等者三十字缺疏問曰是因遍有果下等者言凡計因果等者案琳疏云問是下第五破遍不遍一雙謂初句牒三句破凡計因果各自不同乃至廣説準此疏意凡計果因下釋偈文破十家因果將就故總釋顯之言見蓮中有子下顯第一有無一雙次見因滅下顯第三前後一時一雙次見乳下顯第四滅變不滅變一雙之中滅變次見鏡中下正釋第五遍不遍偈尋文自顯言數人云等者案婆沙論第三卷云問曰得忍凡夫命終時為捨忍不答曰或有説者捨問曰何以不生惡道答曰復有説者彼惡道也得非數緣滅已得非數滅終不現行慧基毗曇章第三卷四善根義中解云問曰捨凡夫性者若世第一捨為苦法忍捨答婆沙有三説一世第一捨二苦法忍捨二説二處共捨問曰有三邪性一者邪趣謂三惡趣二者邪業五無間業三者邪見謂五見也此何處捨答或有説者苦法忍捨彼三邪問曰邪趣邪業實義言之修道所斷云何乃言苦法忍捨答曰所言對治有其衆多有捨對洽有持對治不作對治不趣對治其苦法忍是凡夫性正捨對治亦於見苦所斷十使為斷對治諸無漏道是持對治不作無間業及餘不善業是不作對治不趣惡趣是不趣對治如是等故名捨邪性準之可悉言今問涅槃破先尼云等者案彼第三十九卷陳如品云梵志先尼言一切衆生有我遍一切處是一作者佛言若我周遍一切處者應當五道一時受報若爾者汝等梵志何因緣故不造衆惡為遮地獄修諸善法為受天身今略引之疏復次若言過去因下第二總破因果等者言又未來當果等者述義解云成論師云未來之境為生現在心在境今難若未來境為現在心生之境者可言現在不可言未來也言經言即生此念時等者勝鬘經初五言偈中有此文今略引上半文疏主解云即生此念時者應時也佛應與心念同時若聲響之相應亦云要須念力成就如來應念現身但示起速無著故云爾佛於空中現者明應處也若約釋者男女有隔既應後宮不宜到地若約理而言法身無為而無所不為即寂而動亦可示起感無方來無處所卓爾現空亦可會勝鬘上難上難云我聞佛音聲世所未曾有世間之人不知感逝空即應今既知感逝空即應故是世間所無準之可悉疏若因空無果下等者言此猶是去來品等者案去來品凡有二十五偈大有七破然最後二偈云有無破亦云決定不決定破謂決定有去者等二偈是也作者品凡有十二偈文分為四初有六偈第一實有實無門二半有半無門三一有一無門四一三門準之可悉謂決定不決定者當果空不空實有實無者當因空不空也成壞品第二十一疏此品來有六意等者約此品由來大文有二初明來由次問云何下第二明品名目初中有六今此初也案淨義等疏云所以此品生者從因緣訖此破世間人法空外情便謂向未被破則有人法成今既被破則人法壞也若爾則有成壞不應都空準之可悉疏二者外人等者此下凡有四段第一約總別以明來由第二約賓主成壞以明來由第三約內外法成壞以明來由初三如文第四之中言五淨土不毀等者案法花經第六卷如來壽量品偈文云我淨土不毀而衆見燒盡憂怖諸苦惱如是悉充滿今略引上半偈文疏主解云此一行偈結淨土不毀衆生見燒準之可悉言如二緣見一質淨穢等者疏主解云次明一質異見者所言一質者此有多門若望正道為論未曾淨穢隨淨穢一緣見淨穢二土以對淨穢二見故言非淨非穢名為一質故言一質二見也若就緣自論一質異見者自有是一淨質薄福之人自見其穢自有是一穢質於福德之人自見其淨準之可悉疏六者世間外道等者此下第六文言聞經中五輪世界成等者備法師廣百論疏初引成立世界經云諸聖弟子問佛言地輪何佛言依金剛輪乃至水輪何依言依止風輪風輪何依虛空輪復更問言空輪何依佛即答言汝問大過虛空無色無見無對當何所依也述義解云此言經者樓炭長阿含等應見五輪者成器世界最下有空於空輪上有風輪風輪上有水輪水輪上有地輪故大論第八卷云此三千大千國土中風上水水上地地上人又新俱舍論第三十一卷云謂諸有情業增上力先於最下依止虛空有風輪起其廣無數厚十六億踰繕那雨澍風上滴如車輪積水成輪感別風起以摶此氷結成金於金輪上有妙高山等也言三災世界壞等者大論第八卷云是三千大千國土大劫亦三種破水火風小劫亦三種破刀病飢火災至初禪水災至第二禪風災至第三禪下皆至無間獄諸經論中處處説之可知言故下文云等者案此品下偈文云復次若謂以現見而有生滅者則為是癡妄而見有生滅今取意略引之碩法師解云此就無生滅引以破成壞偈上半取意明汝若言我眼實見諸法生滅汝云何破言無耶生滅猶是成壞耳下半呵嘖破亦是逈撥破明汝以愚癡因緣橫謂見有生有滅其實無也此一往逈撥是癡妄所見彼猶不信更須為釋癡妄所見不可信意明此肉眼是過去顛倒因生因既是無明虛妄不實果報所見寧當可信耶言然所見境既無等者此取涅槃無名論妙存文以釋顯之如先類引釋恐煩而已言內外並冥等者此曇影師智度論序文略引之言是名涅槃者此亦涅槃無名論文準之可悉云何名成壞等者此下第二問答以明品目言成名衆緣合等者案康疏云成是成就壞是破壞即以緣合為成緣離為壞準之可悉言五輪合等者案寶崛中卷云劫初成時有持水風令水不散有消水風令水漸盡以成世界世界壞從下以向上世界成從上以成故論云初壞處最後成最後壞處最初成故用水聚出生三千大千世界水之輕妙音成上諸天宮殿水之滓濁者成下山河大地是水聚能生大千世界藏問欲界身不能觸得上界物云何得以欲界火燒上界禪答俱舍論云從欲界火別出火燒初禪不用欲界火燒上界禪又淨名疏云時節長故所壞虛闊從欲界至三禪故人之與物並皆無故故名大劫也言六種合等者案大智論第二十卷釋初品中三三昧第二十二云復次四大及造色圍虛空故名為身是中內外入因緣和合生識種身得是種和合作種種事言語坐起去來於空六種和合中強名為男強名為女又淨名疏云時節短故又但在欲界唯閻浮提但損於人故名小劫也言又如地論人等者述義解云總相者真諦是常俗諦是無常故又一切有為法皆無常故別相者俗諦之中三聚別別故又雖無常法而苦空無常無我故同相者三聚之中以色攝色類以心攝心類故不相應亦爾又苦空無常無我雖別而皆同無常故異相者具足四相是有為不具足四相是無為故成相者有為法一念起故壞相者有為法一念壞故準之可悉疏問曰下生第二盡不盡門破等者言故云無常等者述義解云無常是能切行苦是所切也又云成論師義云苦受有輕重而非謂行苦有經重金剛心菩薩生滅無常與三途衆生生滅無常同故無輕重但有麁細耳言地持論稱不成實無常等者案彼論第八卷方便處菩提分法品中廣説菩薩觀一切行無常義具明五陰品記述義解云彼明三種無常一分段無常二念念無常三不成實無常謂非折法法即空故瓶是本來虛假不實故名無常不得成實成無常故準之可悉疏若謂以現見下第六生滅門破成壞等者言即攝論無塵等者案梁攝論第五卷釋應知勝相第二云論曰如此衆識唯識以無塵等故釋曰識所變異雖有內事相不同實唯一識無有塵等別體故皆以識為名若無塵此識離塵愛憎等受用云何得成今取意略引之故云似根識等者案梁攝論第五卷釋應知勝相第二釋論云若廣説有十一種識若略説有四種識一似塵識二似根識三似我識四似識識一切三界中所有虛妄分別不出此義由如此識即約顯現今略引之述義解云似塵識者五塵也似根識者五根也似我識者末那識也似識識者六識也此皆梨耶識為本而作也言又今論與楞伽同實無外四句堺等者言攝論師云等者案梁攝論第八卷云釋曰知塵無所有是通達真知唯有識是通達俗復知此識無有生性是通達真知此識是假有為通達俗若不通達俗無以能得見真以離俗無真故若不通達真無以遣俗以俗無別體故準之可悉然未詳其人名也言並現業品者案彼品云雖空而不斷雖有亦不常業果報不失是名佛所説諸業本不生以無定性故諸業亦不滅以其不生故疏主解云此二偈申二諦中道明業離斷常於中前偈明二諦不斷常次偈明第一義諦無有生滅述義解云初偈明世諦不斷常次偈明真諦無有生滅準之可悉問若爾攝論等者案彼論第十二卷云釋曰外塵本來是無識變異所作識即緣此為境故言無轉為境此義已立不應復疑何以故若撥無此理無成佛義今略引此文以為難問也言又就外義等者若薩婆多義者十四不相應中有生滅即是四相之中二此不相應攝十八界者此法界所攝故云生滅是法塵也然不相應是假故非五識所説一入處為色入答雖有衆色但説一色入當知一色入中陰境界故釋曰於彼入中三眼境界者是為色入肉眼天眼慧眼以色麁故説十種所謂青黃赤白長短正不正方圓高下雲煙塵霧光影明暗彼長等此事三種分別餘悉無記彼論疏解云色入得名廣若十一種此中取二説三眼所見偏得色名以色麁故説二十者舉數別名彼長等下生性各別次下疏文準之可悉言論云此是相待假想心所得等者三十六字缺疏問曰下第二救義等者言犢子亦説等者案真諦所翻俱舍論第二十二卷破説我品第六云跋和弗多羅部所説必定有我與五陰不一不異準之可悉言方廣亦説等者案大論初卷云方廣道人言一切法不生不滅空無所有譬如菟角龜毛常無準之可悉言魔亦説等者案大品經第二十五卷初佛言須菩提惡魔到菩薩所壞其心作是言薩婆若與虛空等無所與有相乃至諸法空無所有相中無有得菩提者亦無有不得者準之可悉言一者就法等者案碩疏云二者約因果謂明不斷不常以因壞滅故不常果起續因故不斷也然此成實師義也言二就人明不斷常如業品云等者案彼品文云無明之可蔽愛結之所縛而於本作者不異亦不一等文略明下半偈又淨義疏解云下偈立作受二者不一不異以人牛約假實實法生滅是故不一假名相續轉人作牛所以不異亦可約人牛兩形是故不一神明無別所以不異準之可悉言故淨名云者此即彼經上卷佛國品寶積長者所説偈文疏主解云此合就人法辨非有無也以無我人是故非有而不無因果所以非無但今為破斷常顯示中道故明無人而有於法所以然者以無人故破其定常以有法故非是斷滅故遠離二邊稱為中道而我是受者異者我為真宰之主此為體也能造善惡之因受禍福之報此二為用是故為異準之可悉疏復次若初有滅者下第八三世門破等者言又毗曇明等者案雜心論第十卷雜品云問幾種有答生有及壞有本有亦復中當知二剎耶一染三有二釋四生有者謂生分五陰與生俱故名生有相續心俱生義壞有者死邊五陰與死俱故名死有設心俱起云本有者除生分死分五陰彼中間有本業所種久住故名本有中有者死已乃至未得餘生有於其中間向受生有五陰所不攝於二中間起故名中有準之可悉言又二生死等者案三卷云七種苦諦滅三種集諦故名出世章第五卷變易生死義中解云三種集諦謂皮諦謂三界分段為三變易有四故七種準之可悉中論疏記卷第七末
